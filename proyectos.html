  h += '</div>';
  h += '<div style="flex:1;font-size:12px;color:#5F5E5A;line-height:1.8">';
  h += '<b>Proyecto:</b> ' + escapeHtml(proj.descripcion || '(sin descripcion)') + '<br>';
  h += '<b>Cliente:</b> ' + escapeHtml(clN(item.cliente_id)) + (proj.cliente_final ? ' (para ' + escapeHtml(proj.cliente_final) + ')' : '') + '<br>';
  h += '<b>Pedido:</b> ' + escapeHtml(proj.pedido_nro || '—') + ' &nbsp; <b>Cantidad:</b> ' + item.cantidad + '<br>';
  // material_id es la columna nueva (FK a materiales). 'item.material' es legacy.
  const itemMatLbl = item.material_id ? ((materiales.find(m => m.id === item.material_id) || {}).nombre || '') : (item.material || '');
  h += '<b>Material:</b> ' + escapeHtml(itemMatLbl || '—') + ' &nbsp; <b>Presentacion:</b> ' + escapeHtml(item.presentacion_mat_prima || '—') + '<br>';
  h += '<b>Ingreso:</b> ' + fmt(proj.fecha_ingreso) + ' &nbsp; <b>Fin estipulado:</b> ' + fmt(item.fecha_fin_estipulada) + '<br>';
  if (item.estado === 'Anulado' && item.observaciones_anulacion) {
    h += '<div style="margin-top:6px;padding:6px 8px;background:#FEF0F0;color:#A32D2D;border-radius:4px;border:1px solid #FEDADA"><b>Anulado:</b> ' + escapeHtml(item.observaciones_anulacion) + '</div>';
  }
  h += '<div style="margin-top:8px;display:flex;gap:6px">';
  h += '<button class="b b-icon" onclick="showItemForm(' + item.id + ')">Editar item</button>';
  h += '<button class="b b-icon" onclick="duplicarItem(' + item.id + ')" title="Crea una copia del item con todos sus procesos">📑 Duplicar item</button>';
  h += '</div>';
  h += '</div></div>';
  h += '<div class="section-t">Procesos del item <button class="b b-p" onclick="showProcesoForm(null)">+ Agregar proceso</button></div>';
  if (procesos.length === 0) {
    h += '<div class="list-empty" style="padding:20px">Aun no hay procesos cargados. Sin procesos, este item no genera actividades en el tablero.</div>';
  } else {
    procesos.forEach((p, idx) => {
      const dur = Math.floor(p.duracion_estimada_min / 60) + 'h' + (p.duracion_estimada_min % 60 ? ' ' + (p.duracion_estimada_min % 60) + 'm' : '');
      let tag;
      if (p.tipo === 'automatica') tag = '<span class="tag tag-auto">AUTO</span>';
      else if (p.tipo === 'semi_automatica') tag = '<span class="tag tag-semi">SEMI</span>';
      else tag = '<span class="tag tag-man">MAN</span>';
      const setup = (p.tipo === 'automatica' || p.tipo === 'semi_automatica') && p.duracion_operario_min ? ' · setup: ' + p.duracion_operario_min + ' min' : '';
      const supMaqs = (p.maquinas_suplentes_ids || []).map(id => mN(parseInt(id))).join(', ');
      const supOps = (p.operarios_suplentes_ids || []).map(id => opN(parseInt(id))).join(', ');
      const isPlanificada = p.estado && p.estado !== 'sin_planificar' && p.fecha !== '1900-01-01';
      const procEstado = p.estado_proceso || 'Planificación Pendiente';
      const peColors = procStateColor(procEstado);
      const peBadge = '<span class="tag" style="background:' + peColors.bg + ';color:' + peColors.fg + ';margin-left:4px;border:1px solid ' + peColors.fg + '">' + procEstado.toUpperCase() + '</span>';
      // Predecessors of this proceso
      const myPreds = correlatividades.filter(c => c.sucesor_id === p.id);
      h += '<div class="proc-card"><div class="proc-card-body">';
      h += '<div class="proc-card-t"><span style="color:#888780;font-weight:400;margin-right:6px">' + (idx + 1) + '.</span>' + escapeHtml(p.proceso || p.descripcion) + tag + peBadge;
      h += '</div>';
      h += '<div class="proc-card-s">';
      h += '<b>Duracion estimada:</b> ' + dur + setup + '<br>';
      h += '<b>Maq. ideal:</b> ' + escapeHtml(p.maquina_ideal_id ? mN(p.maquina_ideal_id) : (p.maquina_ideal_nombre ? p.maquina_ideal_nombre + ' (otra)' : '— ninguna —')) + (supMaqs ? ' · <b>Suplentes:</b> ' + escapeHtml(supMaqs) : '') + '<br>';
      h += '<b>Op. ideal:</b> ' + escapeHtml(opN(p.operario_ideal_id)) + (supOps ? ' · <b>Suplentes:</b> ' + escapeHtml(supOps) : '');
      if (p.descripcion_trabajo) {
        // Render como HTML si trae tags, escapado si es texto plano viejo
        const trabHtml = /[<>]/.test(p.descripcion_trabajo) ? sanitizeRichHtml(p.descripcion_trabajo) : escapeHtml(p.descripcion_trabajo);
        h += '<br><b>Trabajo:</b> ' + trabHtml;
      }
      // Predecesores
      h += '<br><b>Predecesores:</b> ';
      if (myPreds.length === 0) h += '<span style="color:#888780;font-style:italic">ninguno</span> ';
      myPreds.forEach(c => {
        const predAct = actividades.find(x => x.id === c.predecesor_id);
        if (!predAct) return;
        const predItem = items.find(x => x.id === predAct.item_id);
        const predProj = predItem ? proyectos.find(p2 => p2.id === predItem.proyecto_id) : null;
        const label = (predItem ? predItem.descripcion + ' / ' : '') + (predAct.proceso || '?') + (predProj && predProj.pedido_nro ? ' (Ped. ' + predProj.pedido_nro + ')' : '');
        h += '<span style="display:inline-flex;align-items:center;gap:4px;background:#E6F1FB;color:#0C447C;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;margin-right:3px;margin-bottom:2px">↶ ' + escapeHtml(label) + ' <span onclick="removeCorrelatividad(' + c.id + ')" style="cursor:pointer;font-weight:700;opacity:.6" title="Quitar predecesor">×</span></span>';
      });
      h += '<button class="b" style="padding:2px 6px;font-size:10px;margin-left:4px" onclick="showAddPredecesorModal(' + p.id + ')">+ Predecesor</button>';
      h += '</div></div>';
      h += '<div class="card-actions" style="display:flex;flex-direction:column;gap:4px">';
      h += '<div style="display:flex;gap:2px">';
      h += '<button class="b b-icon" ' + (idx === 0 ? 'disabled' : 'onclick="moveProceso(' + p.id + ',-1)"') + ' title="Subir">▲</button>';
      h += '<button class="b b-icon" ' + (idx === procesos.length - 1 ? 'disabled' : 'onclick="moveProceso(' + p.id + ',1)"') + ' title="Bajar">▼</button>';
      h += '</div>';
      h += '<button class="b b-icon" onclick="showProcesoForm(' + p.id + ')">Editar</button>';
      h += '<button class="b b-icon b-d" onclick="confirmDeleteProceso(' + p.id + ')">Eliminar</button>';
      h += '</div></div>';
    });
  }
  h += '</div>';
  main.innerHTML = h;
  setupPhotoPaste();
}

// Mover un proceso del producto matriz: cambia el orden con el adyacente.
async function movePmProceso(procesoId, delta) {
  const proc = productosMatrizProcesos.find(p => p.id === procesoId);
  if (!proc) return;
  const sameProd = productosMatrizProcesos.filter(p => p.producto_id === proc.producto_id)
    .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
  const idx = sameProd.findIndex(p => p.id === procesoId);
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= sameProd.length) return;
  const otro = sameProd[newIdx];
  const ordenA = proc.orden;
  const ordenB = otro.orden;
  await sb.from('productos_matriz_procesos').update({ orden: ordenB }).eq('id', proc.id);
  await sb.from('productos_matriz_procesos').update({ orden: ordenA }).eq('id', otro.id);
  await loadAll();
  render();
}

// Render the chips of predecessors of a given activity (used in the modal).
function renderPredsChipsHtml(actId) {
  const myPreds = correlatividades.filter(c => c.sucesor_id === actId);
  if (myPreds.length === 0) {
    return '<span style="color:#888780;font-style:italic;font-size:11px">Sin predecesores</span>';
  }
  return myPreds.map(c => {
    const predAct = actividades.find(x => x.id === c.predecesor_id);
    if (!predAct) return '';
    const predItem = items.find(x => x.id === predAct.item_id);
    const predProj = predItem ? proyectos.find(p => p.id === predItem.proyecto_id) : null;
    const label = (predItem ? predItem.descripcion + ' / ' : '') + (predAct.proceso || '?') + (predProj && predProj.pedido_nro ? ' (Ped. ' + predProj.pedido_nro + ')' : '');
    return '<span style="display:inline-flex;align-items:center;gap:4px;background:#E6F1FB;color:#0C447C;padding:2px 6px;border-radius:3px;font-size:11px;font-weight:500">↶ ' + escapeHtml(label) + ' <span onclick="removeCorrelatividad(' + c.id + ')" style="cursor:pointer;font-weight:700;opacity:.6" title="Quitar">×</span></span>';
  }).join('');
}

// Refresh the predecesores chips in the modal if it's currently open.
function refreshPredsInModal() {
  const list = document.getElementById('p-preds-list');
  if (!list) return;
  // Find which proceso the modal is currently editing — encoded in the
  // Save button's onclick: saveProceso(<id>)
  const saveBtn = document.querySelector('#proc-modal button.b-p');
  if (!saveBtn) return;
  const m = (saveBtn.getAttribute('onclick') || '').match(/saveProceso\((\d+)\)/);
  if (!m) return;
  const actId = parseInt(m[1]);
  list.innerHTML = renderPredsChipsHtml(actId);
}

async function moveProceso(procesoId, delta) {
  const proceso = actividades.find(a => a.id === procesoId);
  if (!proceso) return;
  const sameItem = actividades.filter(a => a.item_id === proceso.item_id && !a.proceso_eliminado)
    .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
  const idx = sameItem.findIndex(a => a.id === procesoId);
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= sameItem.length) return;
  const swap = sameItem[newIdx];
  // Swap orden
  await sb.from('actividades_tablero').update({ orden: swap.orden }).eq('id', proceso.id);
  await sb.from('actividades_tablero').update({ orden: proceso.orden }).eq('id', swap.id);
  await loadAll();
  render();
}

let predSearchTargetId = null;

function renderPredecesorList() {
  const sucesorId = predSearchTargetId;
  const sucesor = actividades.find(a => a.id === sucesorId);
  if (!sucesor) return;
  const search = document.getElementById('pred-search').value.trim().toLowerCase();
  const existingPredIds = new Set(correlatividades.filter(c => c.sucesor_id === sucesorId).map(c => c.predecesor_id));
  const candidates = actividades
    .filter(a => a.id !== sucesorId && !existingPredIds.has(a.id))
    .map(a => {
      const it = items.find(x => x.id === a.item_id);
      const pr = it ? proyectos.find(p => p.id === it.proyecto_id) : null;
      const itLabel = it ? it.descripcion : '?';
      const projLabel = pr ? (pr.descripcion || ('P.' + pr.id)) : '?';
      const pedLabel = pr && pr.pedido_nro ? pr.pedido_nro : '-';
      const procLabel = a.proceso || a.descripcion || '?';
      const searchable = (itLabel + ' ' + projLabel + ' ' + pedLabel + ' ' + procLabel).toLowerCase();
      return { a, it, pr, itLabel, projLabel, pedLabel, procLabel, searchable };
    })
    .filter(x => !search || x.searchable.includes(search));
  candidates.sort((x, y) => x.itLabel.localeCompare(y.itLabel));
  const list = document.getElementById('pred-list');
  if (candidates.length === 0) {
    list.innerHTML = '<div style="padding:14px;text-align:center;color:#888780;font-size:11px;font-style:italic">No hay procesos que coincidan.</div>';
    return;
  }
  let h = '';
  candidates.slice(0, 60).forEach(x => {
    const checked = _predMultiSelected.has(x.a.id);
    // v69: el checkbox NO dispara la elección directa, solo marca/desmarca.
    // Click en el resto de la fila = elegir uno solo (comportamiento original).
    h += '<div style="display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid #F5F3EC;font-size:12px">';
    h += '<input type="checkbox" id="predcb-' + x.a.id + '"' + (checked ? ' checked' : '') + ' onclick="event.stopPropagation();togglePredMulti(' + x.a.id + ')" style="margin-right:8px;cursor:pointer">';
    h += '<div onclick="addPredecesor(' + x.a.id + ')" style="flex:1;cursor:pointer" onmouseenter="this.style.background=\'#E6F1FB\'" onmouseleave="this.style.background=\'\'">';
    h += '<b>' + escapeHtml(x.procLabel) + '</b> — ' + escapeHtml(x.itLabel);
    h += '<div style="font-size:10px;color:#5F5E5A">Proyecto: ' + escapeHtml(x.projLabel) + ' · Pedido: ' + escapeHtml(x.pedLabel) + '</div>';
    h += '</div>';
    h += '</div>';
  });
  list.innerHTML = h;
}

function togglePredMulti(id) {
  if (_predMultiSelected.has(id)) _predMultiSelected.delete(id);
  else _predMultiSelected.add(id);
  // Actualizar contador del botón sin re-renderizar toda la lista
  const btn = document.getElementById('pred-multi-btn');
  if (btn) {
    btn.textContent = 'Elegir seleccionados (' + _predMultiSelected.size + ')';
    btn.disabled = _predMultiSelected.size === 0;
    btn.style.opacity = _predMultiSelected.size === 0 ? '0.5' : '1';
  }
}

// v69: agrega TODOS los predecesores seleccionados en una sola tanda.
// Reporta cuántos se agregaron y cuántos fallaron (ej. por ciclo).
async function addPredecesoresSeleccionados() {
  const sucesorId = predSearchTargetId;
  if (!sucesorId) return;
  if (_predMultiSelected.size === 0) { toast('No hay nada seleccionado', true); return; }
  const ids = Array.from(_predMultiSelected);
  let agregados = 0;
  const fallidos = [];
  for (const predId of ids) {
    // Chequeo de ciclo individualmente (porque cada inserción puede afectar al siguiente)
    const ancestors = new Set();
    function gatherAncestors(id) {
      const direct = correlatividades.filter(c => c.sucesor_id === id).map(c => c.predecesor_id);
      direct.forEach(p => { if (!ancestors.has(p)) { ancestors.add(p); gatherAncestors(p); } });
    }
    gatherAncestors(predId);
    if (ancestors.has(sucesorId)) {
      const a = actividades.find(x => x.id === predId);
      fallidos.push((a && a.proceso) || ('id ' + predId));
      continue;
    }
    const { error } = await sb.from('correlatividades').insert({ predecesor_id: predId, sucesor_id: sucesorId });
    if (error) {
      const a = actividades.find(x => x.id === predId);
      fallidos.push((a && a.proceso) || ('id ' + predId));
      continue;
    }
    // Reflejar en cache local para que el chequeo de ciclos siguiente lo vea
    correlatividades.push({ predecesor_id: predId, sucesor_id: sucesorId });
    agregados++;
  }
  await loadAll();
  const predModal = document.getElementById('pred-modal');
  if (predModal) predModal.remove();
  let msg = agregados + ' predecesor(es) agregado(s)';
  if (fallidos.length) msg += '. No pudieron agregarse ' + fallidos.length + ' (ciclo o error): ' + fallidos.join(', ');
  toast(msg, fallidos.length > 0);
  refreshPredsInModal();
  render();
}

async function addPredecesor(predId) {
  const sucesorId = predSearchTargetId;
  if (!sucesorId) return;
  // Avoid simple cycles: if predId already has sucesorId in its ancestor chain, block
  const ancestors = new Set();
  function gatherAncestors(id) {
    const direct = correlatividades.filter(c => c.sucesor_id === id).map(c => c.predecesor_id);
    direct.forEach(p => { if (!ancestors.has(p)) { ancestors.add(p); gatherAncestors(p); } });
  }
  gatherAncestors(predId);
  if (ancestors.has(sucesorId)) {
    toast('No se puede: crearia un ciclo de correlatividades', true);
    return;
  }
  const { error } = await sb.from('correlatividades').insert({ predecesor_id: predId, sucesor_id: sucesorId });
  if (error) { toast('Error: ' + error.message, true); return; }
  await loadAll();
  // Close only the predecessor-search modal (not the editing modal if it's open)
  const predModal = document.getElementById('pred-modal');
  if (predModal) predModal.remove();
  toast('Predecesor agregado');
  refreshPredsInModal();
  render();
}

    const peColor = procStateColor(procEstado);
    h += '<div class="ef" style="background:' + peColor.bg + ';padding:8px 10px;border-radius:5px;border:1px solid ' + peColor.fg + '"><div class="ef-l" style="color:' + peColor.fg + '">Estado del proceso</div>';
    h += '<select class="ef-i" id="p-estado">';
    PROC_STATES.forEach(st => {
      h += '<option value="' + st + '"' + (procEstado === st ? ' selected' : '') + '>' + st + '</option>';
    });
    h += '</select>';
    h += '<div class="ef-help" style="color:' + peColor.fg + '">Cuando un proceso esta Cerrado, no aparece en el "+" del tablero ni bloquea a sus sucesores.</div></div>';

    // Predecesores editables
    h += '<div class="ef"><div class="ef-l">Predecesores (procesos que deben terminar antes que este)</div>';
    h += '<div id="p-preds-list" style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:6px;border:1px solid #C8C6BE;border-radius:5px;background:#fff;min-height:34px">';
    h += renderPredsChipsHtml(procesoId);
    h += '</div>';
    h += '<button type="button" class="b" style="padding:4px 10px;font-size:11px;margin-top:6px" onclick="showAddPredecesorModal(' + procesoId + ')">+ Agregar predecesor</button>';
    h += '<div class="ef-help">Tambien podes agregar y quitar predecesores desde la vista del item.</div></div>';
  }

  h += '<div style="margin-top:18px;padding-top:14px;border-top:1px solid #E8E6DF">';
  h += '<div style="font-size:12px;font-weight:600;color:#5F5E5A;margin-bottom:8px">Para la orden de trabajo (impresion)</div>';
  h += '<div class="ef"><div class="ef-l">Detalle de tareas a realizar</div>';
  // Editor rico contenteditable (solo este campo y "Observaciones para mail").
  // Los tamanos son relativos (em) para que el auto-shrink de la OT siga
  // funcionando proporcionalmente sin agrandar verticalmente la hoja.
  // El campo se llama "descripcion_trabajo" en actividades_tablero y
  // "trabajo_a_realizar" en productos_matriz_procesos. Soportamos ambos.
  const trabajoVal = proceso ? (proceso.descripcion_trabajo || proceso.trabajo_a_realizar || '') : '';
  h += renderRichEditor('p-trabajo', trabajoVal, 'Ej. Tornear segun plano. Consultar dudas con Nicolas.');
  h += '<div class="ef-help">Texto que va a aparecer en la orden de trabajo impresa para este proceso.</div></div></div>';

  h += '<div class="actions">';
  h += '<button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button>';
  h += '<button class="b b-p" onclick="saveProceso(' + (procesoId || 'null') + ')">' + (isNew ? 'Agregar' : 'Guardar') + '</button>';
  h += '</div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);
  buildChips('chips-maq', maquinasFiltradas, supMaqIds, 'maq');
  buildChips('chips-op', operarios, supOpIds, 'op');
  // Fix tentativo del bug "no se puede escribir en el modal":
  // 1. Forzamos focus al primer select del modal en el siguiente tick.
  // 2. Logueamos a consola para debug si el bug se reproduce.
  setTimeout(() => {
    const firstSelect = m.querySelector('#p-proceso');
    if (firstSelect) {
      firstSelect.focus();
      console.log('[proc-modal] abierto. activeElement:', document.activeElement, 'tag:', document.activeElement ? document.activeElement.tagName : '(ninguno)');
      // Si el activeElement no esta dentro del modal, hay algun otro elemento
      // capturando el foco. Lo logueamos como warning.
      if (document.activeElement && !m.contains(document.activeElement)) {
        console.warn('[proc-modal] El foco quedo afuera del modal! activeElement:', document.activeElement);
      }
    }
  }, 50);
}

async function saveProceso(procesoId) {
  // Contexto: 'item' (proyecto) o 'producto' (matriz).
  const ctxItem = procCtx.tipo === 'item';
  const ctxProducto = procCtx.tipo === 'producto';

  // Datos del padre segun contexto
  let item = null, proj = null, producto = null;
  if (ctxItem) {
    item = items.find(i => i.id === procCtx.parentId);
    if (!item) return;
    proj = getProject(nav.projectId);
  } else {
    producto = productosMatriz.find(p => p.id === procCtx.parentId);
    if (!producto) { toast('Producto no encontrado', true); return; }
  }

  let proceso_cat = document.getElementById('p-proceso').value;
  if (!proceso_cat || proceso_cat === '') {
    toast('Elegi un proceso (campo obligatorio)', true);
    return;
  }
  if (proceso_cat === 'Otro') {
    const customInput = document.getElementById('p-proceso-custom');
    const customVal = customInput ? customInput.value.trim() : '';
    if (!customVal) { toast('Especifica el proceso (Otro)', true); return; }
    proceso_cat = customVal;
  }
  const dur = parseInt(document.getElementById('p-dur').value);
  const margen = parseInt(document.getElementById('p-margen').value) || 0;
  const tipoEl = document.querySelector('input[name="p-tipo"]:checked');
  const tipo = tipoEl ? tipoEl.value : 'manual';
  const maqVal = document.getElementById('p-maq-ideal').value;
  let maqIdealId = null;
  let maqIdealNombre = null;
  if (!maqVal) { toast('Elegi maquina ideal (o Ninguna/Otra)', true); return; }
  if (maqVal === 'OTRA') {
    const otraVal = document.getElementById('p-maq-otra').value.trim();
    if (!otraVal) { toast('Especifica el nombre de la maquina (Otra)', true); return; }
    maqIdealNombre = otraVal;
  } else if (maqVal === 'NINGUNA') {
    // both null
  } else {
    maqIdealId = parseInt(maqVal);
  }
  const opIdeal = parseInt(document.getElementById('p-op-ideal').value);
  let setup = null;
  if (tipo === 'automatica' || tipo === 'semi_automatica') {
    const v = document.getElementById('p-setup').value.trim();
    if (!v) { toast('Para ' + (tipo === 'automatica' ? 'automaticas' : 'semi-automaticas') + ', ingresa la duracion del setup', true); return; }
    setup = parseInt(v);
  }
  if (!dur || dur < 10) { toast('Duracion estimada minima: 10 min', true); return; }
  if (!opIdeal) { toast('Elegi operario ideal', true); return; }

  const supMaqs = [...chipState.maq];
  const supOps = [...chipState.op];
  const trabajo = readRichEditor('p-trabajo');

  if (ctxProducto) {
    // ---------- CONTEXTO PRODUCTO MATRIZ ----------
    // Estructura mas simple: solo campos estructurales, sin planificacion.
    // Usa columnas tipo array (maquinas_suplentes, operarios_suplentes) en lugar
    // de los _ids que usa actividades_tablero.
    const payload = {
      producto_id: procCtx.parentId,
      proceso: proceso_cat,
      descripcion: producto.descripcion + ' - ' + proceso_cat,
      duracion_estimada_min: dur,
      duracion_margen_min: margen,
      duracion_operario_min: setup,
      tipo: tipo,
      maquina_ideal_id: maqIdealId,
      maquina_ideal_nombre: maqIdealNombre,
      operario_ideal_id: opIdeal,
      maquinas_suplentes: supMaqs.length ? supMaqs : null,
      operarios_suplentes: supOps.length ? supOps : null,
      trabajo_a_realizar: trabajo
    };
    if (procesoId) {
      const { error } = await sb.from('productos_matriz_procesos').update(payload).eq('id', procesoId);
      if (error) { toast('Error: ' + error.message, true); console.error(error); return; }
      toast('Proceso actualizado');
    } else {
      const sameProd = productosMatrizProcesos.filter(p => p.producto_id === procCtx.parentId);
      const maxOrden = sameProd.reduce((mx, a) => Math.max(mx, a.orden || 0), 0);
      payload.orden = maxOrden + 1;
      const { data: newProc, error } = await sb.from('productos_matriz_procesos').insert(payload).select().single();
      if (error) { toast('Error: ' + error.message, true); console.error(error); return; }
      // Auto-correlatividad: el ultimo proceso anterior del mismo producto
      // queda como predecesor del nuevo. Si es el primer proceso, no hay nada
      // que conectar.
      if (sameProd.length > 0 && newProc) {
        const ultimoPrevio = sameProd.reduce((acc, p) =>
          (acc === null || (p.orden || 0) > (acc.orden || 0)) ? p : acc, null);
        if (ultimoPrevio) {
          await sb.from('productos_matriz_correlatividades').insert({
            predecesor_id: ultimoPrevio.id,
            sucesor_id: newProc.id
          });
        }
      }
      toast('Proceso agregado');
    }
    await loadAll();
    document.getElementById('proc-modal').remove();
    render();
    return;
  }

  // ---------- CONTEXTO ITEM (proyecto, comportamiento original) ----------
  const existing = procesoId ? actividades.find(a => a.id === procesoId) : null;
  const isPlanificada = existing && existing.estado && existing.estado !== 'sin_planificar' && existing.fecha !== '1900-01-01';

  const payload = {
    item_id: procCtx.parentId,
    cliente_id: item.cliente_id,
    pedido_nro: proj.pedido_nro,
    descripcion: item.descripcion + ' - ' + proceso_cat,
    descripcion_proyecto: proj.descripcion,
    descripcion_trabajo: trabajo,
    proceso: proceso_cat,
    duracion_estimada_min: dur,
    duracion_margen_min: margen,
    duracion_operario_min: setup,
    tipo: tipo,
    maquina_ideal_id: maqIdealId,
    maquina_ideal_nombre: maqIdealNombre,
    maquinas_suplentes_ids: supMaqs.length ? supMaqs : null,
    operario_ideal_id: opIdeal,
    operarios_suplentes_ids: supOps.length ? supOps : null,
    urgencia: proj.urgencia,
    foto_proyecto_url: proj.foto_url,
    foto_url: item.foto_url,
    fecha_ingreso: proj.fecha_ingreso,
    cliente_final: proj.cliente_final
  };

  if (procesoId) {
    if (!isPlanificada) {
      payload.duracion_planificador_min = dur + margen;
    } else {
      const prevPlanLen = existing.duracion_planificador_min;
      if (prevPlanLen === null || prevPlanLen === undefined) {
        const prevEstMargen = (existing.duracion_estimada_min || 0) + (existing.duracion_margen_min || 0);
        payload.duracion_planificador_min = prevEstMargen;
      }
    }
    const peEl = document.getElementById('p-estado');
    if (peEl) payload.estado_proceso = peEl.value;
    await sb.from('actividades_tablero').update(payload).eq('id', procesoId);
    toast('Proceso actualizado');
  } else {
    const sameItem = actividades.filter(a => a.item_id === procCtx.parentId && !a.proceso_eliminado)
      .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
    const maxOrden = sameItem.reduce((mx, a) => Math.max(mx, a.orden || 0), 0);
    payload.orden = maxOrden + 1;
    payload.estado = 'sin_planificar';
    payload.fecha = '1900-01-01';
    payload.hora_inicio = '06:00:00';
    payload.duracion_planificador_min = dur + margen;
    payload.estado_proceso = 'Planificación Pendiente';
    const { data: newAct, error: insErr } = await sb.from('actividades_tablero').insert(payload).select().single();
    if (insErr) { toast('Error: ' + insErr.message, true); return; }
    if (sameItem.length > 0) {
      const prev = sameItem[sameItem.length - 1];
      await sb.from('correlatividades').insert({
        predecesor_id: prev.id, sucesor_id: newAct.id
      });
    }
    toast('Proceso agregado');
  }
  await loadAll();
  document.getElementById('proc-modal').remove();
  render();
}

async function confirmDeleteProceso(procesoId) {
  // Borrado en contexto 'producto' (matriz): siempre delete fisico, no hay
  // tablero ni planificacion que considerar.
  if (procCtx && procCtx.tipo === 'producto') {
    const proc = productosMatrizProcesos.find(p => p.id === procesoId);
    if (!proc) return;
    confirmModal({
      titulo: 'Eliminar proceso',
      mensaje: 'Eliminar el proceso "' + (proc.proceso || proc.descripcion) + '" del producto?',
      textoConfirmar: 'Eliminar',
      onConfirm: async () => {
        await sb.from('productos_matriz_procesos').delete().eq('id', procesoId);
        await loadAll();
        toast('Proceso eliminado');
        render();
      }
    });
    return;
  }

  // Contexto item (proyecto, comportamiento original)
  const proc = actividades.find(a => a.id === procesoId);
  if (!proc) return;
  const isPlanificada = proc.estado && proc.estado !== 'sin_planificar' && proc.fecha !== '1900-01-01';
  if (isPlanificada) {
    confirmModal({
      titulo: 'Eliminar proceso planificado',
      mensaje: 'Eliminar el proceso "' + (proc.proceso || proc.descripcion) + '"?\n\nEsta actividad ya está planificada en el tablero. Se va a marcar como eliminada y aparecerá con un signo de advertencia para que el responsable de planificación la quite.',
      textoConfirmar: 'Marcar como eliminado',
      onConfirm: async () => {
        await sb.from('actividades_tablero').update({ proceso_eliminado: true }).eq('id', procesoId);
        await loadAll();
        toast('Proceso marcado como eliminado (visible en el tablero como advertencia)');
        render();
      }
    });
    return;
  }
  confirmModal({
    titulo: 'Eliminar proceso',
    mensaje: 'Eliminar el proceso "' + (proc.proceso || proc.descripcion) + '"?',
    textoConfirmar: 'Eliminar',
    onConfirm: async () => {
      await sb.from('actividades_tablero').delete().eq('id', procesoId);
      await loadAll();
      toast('Proceso eliminado');
      render();
    }
  });
}


// Helpers para modal de proceso
// onTipoChange: actualiza el visual de los radios (border/background del label
// activo), muestra/oculta el campo de setup (solo para semi/auto), y muestra
// la advertencia si la actividad esta planificada y se esta cambiando el tipo.
function onTipoChange() {
  const sel = document.querySelector('input[name="p-tipo"]:checked');
  const wrap = document.getElementById('p-setup-wrap');
  if (sel && wrap) {
    const v = sel.value;
    wrap.style.display = (v === 'automatica' || v === 'semi_automatica') ? '' : 'none';
  }
  // Repintar borde/fondo de cada label segun el radio seleccionado
  document.querySelectorAll('input[name="p-tipo"]').forEach(r => {
    const label = r.closest('label');
    if (!label) return;
    const checked = r.checked;
    const v = r.value;
    let borderColor = '#C8C6BE', bgColor = '#fff';
    if (checked) {
      if (v === 'semi_automatica') { borderColor = '#5C4A8A'; bgColor = '#F0EDF7'; }
      else { borderColor = '#1A1A1A'; bgColor = '#F5F4EE'; }
    }
    label.style.border = '1px solid ' + borderColor;
    label.style.background = bgColor;
  });
  // Mostrar advertencia si el proceso ya esta planificado y se cambio el tipo
  const warn = document.getElementById('p-tipo-warn');
  if (warn) {
    // Comparar contra el tipo original (lo guardamos como data-attr en cualquier
    // de los radios al abrir el modal para no depender de una variable global)
    const original = document.getElementById('p-tipo-wrap')?.dataset?.original;
    if (original && sel && sel.value !== original) warn.style.display = 'block';
    else warn.style.display = 'none';
  }
}
function toggleSetupField() { onTipoChange(); }
// Cuando cambia el proceso seleccionado:
// 1. Mostrar/ocultar el input "Otro".
// 2. Resetear maquina ideal y "OTRA".
// 3. Repoblar el dropdown de maquina ideal con las maquinas que pueden hacer
//    el proceso elegido (las que tienen procesos = [] aparecen como fallback).
// 4. Repoblar los chips de maquinas suplentes con la misma lista filtrada.
function onProcesoChange() {
  const sel = document.getElementById('p-proceso');
  const input = document.getElementById('p-proceso-custom');
  if (!input || !sel) return;
  if (sel.value === 'Otro') { input.style.display = 'block'; input.focus(); }
  else { input.style.display = 'none'; input.value = ''; }
  // Determinar el proceso final (si es "Otro", el valor real esta en el input custom)
  const procNombre = sel.value === 'Otro' ? input.value.trim() : sel.value;
  const filtradas = procNombre ? maquinasParaProceso(procNombre) : maquinas;
  // Repoblar dropdown de maquina ideal
  const maqIdeal = document.getElementById('p-maq-ideal');
  if (maqIdeal) {
    let opts = '<option value="">— elegir —</option>';
    filtradas.forEach(m => {
      opts += '<option value="' + m.id + '">' + escapeHtml(m.nombre) + '</option>';
    });
    opts += '<option value="OTRA">Otra (especificar)</option>';
    opts += '<option value="NINGUNA">Ninguna (sin maquina)</option>';
    maqIdeal.innerHTML = opts;
    maqIdeal.value = '';
    const maqOtra = document.getElementById('p-maq-otra');
    if (maqOtra) { maqOtra.style.display = 'none'; maqOtra.value = ''; }
  }
  // Repoblar chips de maquinas suplentes con la lista filtrada (sin nada seleccionado)
  buildChips('chips-maq', filtradas, [], 'maq');
  // v69: aplicar auto-completar de operarios según el proceso seleccionado.
  aplicarAutocompletarPorProceso(procNombre);
}
// Alias retrocompatible
function toggleProcCustom() { onProcesoChange(); }
function toggleMaqOtra() {
  const sel = document.getElementById('p-maq-ideal');
  const input = document.getElementById('p-maq-otra');
  if (!input) return;
  if (sel.value === 'OTRA') { input.style.display = 'block'; input.focus(); }
  else { input.style.display = 'none'; input.value = ''; }
  // v69: aplicar auto-completar por máquina seleccionada.
  aplicarAutocompletarPorMaquina(sel.value);
}

// v69: Reglas de auto-completar operarios. Hardcoded por ahora.
// Tomi pidió: "prefiero que lo pise y, en todo caso, yo tener que volver a
// poner lo que quiero". Así que SIEMPRE sobrescribe cuando aplica una regla.
// Si el operario buscado no existe en la DB, simplemente no se completa esa
// parte (no rompe).
function _opIdPorNombre(busqueda) {
  if (!busqueda) return null;
  const q = busqueda.toLowerCase();
  // Soporta búsqueda por nombre completo o por iniciales/parcial
  const found = operarios.find(o => (o.nombre || '').toLowerCase().includes(q));
  return found ? found.id : null;
}

function aplicarAutocompletarPorProceso(procNombre) {
  if (!procNombre) return;
  const p = procNombre.toLowerCase().trim();
  let opIdeal = null;
  let suplente = null;
  if (p === 'control') {
    opIdeal = _opIdPorNombre('leonardo');
    suplente = _opIdPorNombre('tomas c');
  } else if (p === 'cierre/despacho' || p === 'cierre' || p === 'despacho') {
    opIdeal = _opIdPorNombre('tomás s') || _opIdPorNombre('tomas s');
    suplente = _opIdPorNombre('daniel');  // Daniel Blanco — si no existe, queda null
  } else {
    return;  // ninguna regla aplica
  }
  _setOperarioIdeal(opIdeal);
  _setSuplenteUnico(suplente);
}

function aplicarAutocompletarPorMaquina(maqIdRaw) {
  if (!maqIdRaw || maqIdRaw === 'OTRA' || maqIdRaw === 'NINGUNA') return;
  const maqId = parseInt(maqIdRaw);
  const maq = maquinas.find(m => m.id === maqId);
  if (!maq) return;
  const nombre = (maq.nombre || '').toLowerCase().trim();
  let opIdeal = null;
  if (nombre === 'st-30') {
    opIdeal = _opIdPorNombre('roman');
  } else if (nombre === 'tc alfredo' || nombre === 'tc-alfredo' || nombre.startsWith('tc alfredo') || nombre.startsWith('tc-alfredo')) {
    opIdeal = _opIdPorNombre('alfredo');
  } else {
    return;
  }
  _setOperarioIdeal(opIdeal);
  // v69: las reglas por máquina no especifican suplente, así que limpiamos el
  // suplente que pudiera estar seteado de antes (de una regla por proceso o
  // de carga manual).
  _setSuplenteUnico(null);
}

function _setOperarioIdeal(operarioId) {
  const sel = document.getElementById('p-op-ideal');
  if (!sel) return;
  if (operarioId) {
    sel.value = operarioId;
  } else {
    sel.value = '';
  }
}

// Pone UN único suplente como chip seleccionado (descarta los anteriores).
function _setSuplenteUnico(operarioId) {
  if (operarioId) {
    buildChips('chips-op', operarios, [operarioId], 'op');
  } else {
    buildChips('chips-op', operarios, [], 'op');
  }
}

// Chip multi-select state for machines/operators "suplentes"
const chipState = { maq: new Set(), op: new Set() };
function buildChips(containerId, list, selectedIds, kind) {
  chipState[kind] = new Set(selectedIds);
  renderChips(containerId, list, kind);
}
function renderChips(containerId, list, kind) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  let h = '';
  chipState[kind].forEach(id => {
    const it = list.find(x => x.id === id);
    if (!it) return;
    h += '<span class="chip">' + escapeHtml(it.nombre) + ' <span class="chip-x" onclick="removeChip(\'' + kind + '\',' + id + ')">&times;</span></span>';
  });
  const remaining = list.filter(x => !chipState[kind].has(x.id));
  h += '<input type="text" class="chip-add" id="chip-add-' + kind + '" placeholder="' + (chipState[kind].size === 0 ? 'Agregar...' : '') + '" list="datalist-' + kind + '" onchange="addChipFromInput(\'' + kind + '\')">';
  h += '<datalist id="datalist-' + kind + '">';
  remaining.forEach(it => { h += '<option value="' + escapeHtml(it.nombre) + '">'; });
  h += '</datalist>';
  wrap.innerHTML = h;
}
function addChipFromInput(kind) {
  const input = document.getElementById('chip-add-' + kind);
  const val = input.value.trim();
  if (!val) return;
  const list = kind === 'maq' ? maquinas : operarios;
  const it = list.find(x => x.nombre.toLowerCase() === val.toLowerCase());
  if (!it) { toast('No se encontro: ' + val, true); input.value = ''; return; }
  if (chipState[kind].has(it.id)) { input.value = ''; return; }
  chipState[kind].add(it.id);
  input.value = '';
  renderChips(kind === 'maq' ? 'chips-maq' : 'chips-op', list, kind);
  document.getElementById('chip-add-' + kind).focus();
}
function removeChip(kind, id) {
  chipState[kind].delete(id);
  const list = kind === 'maq' ? maquinas : operarios;
  renderChips(kind === 'maq' ? 'chips-maq' : 'chips-op', list, kind);
}

// Slot de foto:
// - Click en cualquier parte del slot que no sea el boton "Insertar" -> activa
//   el slot (paste con Ctrl+V se pegara aqui).
// - Click en el boton "Insertar" -> abre el explorador de archivos.
// - Drag & drop sobre el slot -> sube el archivo a ese slot.
// La activacion es exclusiva: solo un slot puede estar activo a la vez.
// Si solo hay un slot visible, queda activo automaticamente.
// ============================================================================
// API DE FOTOS MULTIPLES (v60)
// ============================================================================
// Esquema: tabla `fotos` polimorfica con {entidad_tipo, entidad_id, url, orden}.
// La primera foto (orden=0) se sincroniza con foto_url de la tabla origen
// para compatibilidad con todas las vistas que usan foto_url.

// Devuelve las fotos de una entidad ordenadas por orden ascendente.
function getFotos(entidadTipo, entidadId) {
  if (!entidadId) return [];
  return fotos.filter(f => f.entidad_tipo === entidadTipo && f.entidad_id === entidadId)
    .sort((a, b) => (a.orden || 0) - (b.orden || 0));
}

// Devuelve la foto principal (orden=0) o null.
function getFotoPrincipal(entidadTipo, entidadId) {
  const arr = getFotos(entidadTipo, entidadId);
  return arr.length > 0 ? arr[0] : null;
}

// Agrega una foto a una entidad. Si es la primera, también sincroniza foto_url
// en la tabla origen para compat. Retorna {error?, foto?}.
async function agregarFoto(entidadTipo, entidadId, url) {
  if (!entidadId || !url) return { error: 'Datos faltantes' };
  const existentes = getFotos(entidadTipo, entidadId);
  const orden = existentes.length;
  const { data, error } = await sb.from('fotos').insert({
    entidad_tipo: entidadTipo,
    entidad_id: entidadId,
    url: url,
    orden: orden
  }).select().single();
  if (error) return { error: error.message };
  if (orden === 0) {
    await _sincronizarFotoUrl(entidadTipo, entidadId, url);
  }
  // v64: si estamos editando un proyecto, marcar la URL como agregada en
  // esta edición. Permite revertir si el usuario descarta cambios.
  if (entidadTipo === 'proyecto' && _projectEditSnapshot &&
      _projectEditSnapshot.projectId === entidadId) {
    _projectEditSnapshot.fotosNuevasUrls.add(url);
  }
  await loadAll();
  return { foto: data };
}

// Elimina una foto. Si era orden=0, promueve la siguiente a principal.
async function eliminarFoto(fotoId) {
  const f = fotos.find(x => x.id === fotoId);
  if (!f) return { error: 'Foto no encontrada' };
  const { error } = await sb.from('fotos').delete().eq('id', fotoId);
  if (error) return { error: error.message };
  // Re-ordenar las restantes para que orden quede 0..N-1
  const restantes = getFotos(f.entidad_tipo, f.entidad_id).filter(x => x.id !== fotoId);
  for (let i = 0; i < restantes.length; i++) {
    if ((restantes[i].orden || 0) !== i) {
      await sb.from('fotos').update({ orden: i }).eq('id', restantes[i].id);
    }
  }
  // Sincronizar foto_url con la nueva primera (o null si no quedan)
  const nuevaPrincipal = restantes.length > 0 ? restantes[0].url : null;
  await _sincronizarFotoUrl(f.entidad_tipo, f.entidad_id, nuevaPrincipal);
  await loadAll();
  return {};
}

// Mueve una foto en el orden. direction = -1 (subir) o +1 (bajar).
async function moverFoto(fotoId, direction) {
  const f = fotos.find(x => x.id === fotoId);
  if (!f) return;
  const arr = getFotos(f.entidad_tipo, f.entidad_id);
  const idx = arr.findIndex(x => x.id === fotoId);
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= arr.length) return;  // fuera de rango
  const otra = arr[newIdx];
  // Intercambiar ordenes
  await sb.from('fotos').update({ orden: newIdx }).eq('id', f.id);
  await sb.from('fotos').update({ orden: idx }).eq('id', otra.id);
  // Si cualquiera de las afectadas era orden=0 antes o ahora, sincronizar foto_url
  if (idx === 0 || newIdx === 0) {
    const nuevasFotos = getFotos(f.entidad_tipo, f.entidad_id);
    // Recargar antes de leer la nueva primera. Como loadAll viene despues,
    // hacemos un fetch directo de la primera.
    const { data: nueva } = await sb.from('fotos').select('url')
      .eq('entidad_tipo', f.entidad_tipo).eq('entidad_id', f.entidad_id).eq('orden', 0)
      .maybeSingle();
    await _sincronizarFotoUrl(f.entidad_tipo, f.entidad_id, nueva ? nueva.url : null);
  }
  await loadAll();
}

// Sincroniza foto_url en la tabla origen con la URL de la foto principal.
async function _sincronizarFotoUrl(entidadTipo, entidadId, url) {
  const tablaMap = {
    'proyecto': 'proyectos',
    'item': 'items',
    'producto_matriz': 'productos_matriz',
    'actividad': 'actividades_tablero',
    'conjunto': 'conjuntos',
    'cliente': 'clientes'
  };
  const tabla = tablaMap[entidadTipo];
  if (!tabla) return;
  await sb.from(tabla).update({ foto_url: url }).eq('id', entidadId);
}

// ============================================================================
// UI: GALERIA DE FOTOS
// ============================================================================
// Construye el HTML de una galería de fotos para una entidad.
// Si la entidad todavía no existe (entidadId=null, ej. form de creación),
// renderiza un wrap simple con el comportamiento clásico (una foto en
// hidden input). La gestión múltiple solo se habilita después de crear la entidad.

// Estado del slot pendiente de la galería: cuando el usuario aprieta
// "+ Agregar foto", aparece un slot vacío activo donde puede pegar con Ctrl+V,
// arrastrar archivo, o clickear "Insertar". Solo una galería puede tener slot
// pendiente a la vez (más simple).
// Si está activo, _galPendingSlot = { entidadTipo, entidadId, kind }
let _galPendingSlot = null;

function buildPhotoGalleryHtml(entidadTipo, entidadId, kind) {
  // kind: identificador del slot para paste/drop (proj, item, etc.)
  if (!entidadId) {
    // Entidad nueva: usamos el wrap clásico (una sola foto, hidden input)
    return buildPhotoWrapHtml(null, kind);
  }
  const arr = getFotos(entidadTipo, entidadId);
  let h = '<div class="photo-gallery" id="photo-gallery-' + kind + '" data-entidad-tipo="' + entidadTipo + '" data-entidad-id="' + entidadId + '">';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start">';
  arr.forEach((f, idx) => {
    const esPrincipal = idx === 0;
    h += '<div class="photo-thumb" style="position:relative;width:90px;height:90px;border:' + (esPrincipal ? '2px solid #0C447C' : '1px solid #C8C6BE') + ';border-radius:6px;overflow:hidden;background:#FAFAF7">';
    h += '<img src="' + escapeHtml(f.url) + '" style="width:100%;height:100%;object-fit:cover;cursor:pointer" onclick="abrirFotoLightbox(\'' + escapeHtml(f.url) + '\')">';
    if (esPrincipal) {
      h += '<div style="position:absolute;top:2px;left:2px;background:#0C447C;color:#fff;font-size:9px;padding:1px 4px;border-radius:3px">Principal</div>';
    }
    h += '<button type="button" class="b" onclick="confirmEliminarFoto(' + f.id + ')" title="Eliminar foto" style="position:absolute;top:2px;right:2px;background:rgba(163,45,45,0.9);color:#fff;border:none;padding:1px 5px;font-size:11px;line-height:1;border-radius:3px;cursor:pointer">×</button>';
    h += '<div style="position:absolute;bottom:2px;left:2px;display:flex;gap:2px">';
    if (idx > 0) {
      h += '<button type="button" class="b" onclick="moverFotoUI(' + f.id + ',-1)" title="Subir orden" style="background:rgba(255,255,255,0.9);border:1px solid #C8C6BE;padding:0 4px;font-size:11px;line-height:1.2;cursor:pointer">◄</button>';
    }
    if (idx < arr.length - 1) {
      h += '<button type="button" class="b" onclick="moverFotoUI(' + f.id + ',1)" title="Bajar orden" style="background:rgba(255,255,255,0.9);border:1px solid #C8C6BE;padding:0 4px;font-size:11px;line-height:1.2;cursor:pointer">►</button>';
    }
    h += '</div>';
    h += '</div>';
  });
  // Slot pendiente: si está activo Y es para esta galería, renderizarlo aquí
  const pendienteActivoAca = _galPendingSlot &&
    _galPendingSlot.entidadTipo === entidadTipo &&
    _galPendingSlot.entidadId === entidadId;
  if (pendienteActivoAca) {
    // Wrap clásico estilo el "photo-wrap" tradicional, pero embebido en la galería.
    // Tiene paste/drop/insert. Cuando recibe imagen, se llama a uploadPhotoFile,
    // que detecta el prefijo "gal:" y agrega a la tabla fotos.
    const slotKind = 'gal:' + entidadTipo + ':' + entidadId;
    h += '<div style="width:90px;height:90px;flex-shrink:0">';
    h += '<div class="photo-wrap active" id="photo-wrap-' + slotKind + '" data-kind="' + slotKind + '" onclick="onSlotClick(event,\'' + slotKind + '\')" ondragover="onSlotDragOver(event)" ondragleave="onSlotDragLeave(event)" ondrop="onSlotDrop(event,\'' + slotKind + '\')" style="width:90px;height:90px;border:2px dashed #378ADD;background:#E8F2FC">';
    h += '<button type="button" class="photo-insert-btn" onclick="event.stopPropagation();document.getElementById(\'photo-input-' + slotKind + '\').click()" style="font-size:10px">Insertar</button>';
    // Botón × para cancelar el slot pendiente
    h += '<div class="photo-x" onclick="event.stopPropagation();cancelarSlotPendiente()" style="background:#A32D2D;color:#fff" title="Cancelar">&times;</div>';
    h += '</div>';
    h += '<input type="file" id="photo-input-' + slotKind + '" accept="image/*" style="display:none" onchange="onPhotoFile(event,\'' + slotKind + '\')">';
    h += '<input type="hidden" id="photo-url-' + slotKind + '" value="">';
    h += '</div>';
  } else {
    // Slot "+ Agregar" (no activo): al click, activa el slot pendiente
    h += '<div class="photo-add-slot" style="width:90px;height:90px;border:2px dashed #C8C6BE;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#FAFAF7" onclick="abrirSlotPendiente(\'' + entidadTipo + '\',' + entidadId + ',\'' + kind + '\')">';
    h += '<div style="text-align:center;color:#5F5E5A;font-size:11px"><div style="font-size:20px;line-height:1">+</div><div>Agregar</div></div>';
    h += '</div>';
  }
  h += '</div>';
  h += '</div>';
  return h;
}

// Activa el slot pendiente para que el usuario pueda pegar / arrastrar / insertar.
function abrirSlotPendiente(entidadTipo, entidadId, kind) {
  _galPendingSlot = { entidadTipo, entidadId, kind };
  render();
  _refrescarModalContenedorSiAbierto();
  // Activar el slot recién renderizado para que paste funcione
  setTimeout(() => {
    const slotKind = 'gal:' + entidadTipo + ':' + entidadId;
    setActiveSlot(slotKind);
  }, 50);
}

function cancelarSlotPendiente() {
  _galPendingSlot = null;
  render();
  _refrescarModalContenedorSiAbierto();
}

// DEPRECATED v61: agregarFotoUI ahora abre el slot pendiente en lugar de file picker directo.
function agregarFotoUI(entidadTipo, entidadId, kind) {
  abrirSlotPendiente(entidadTipo, entidadId, kind);
}

// onPhotoFileGallery: ya no se usa con el slot pendiente, pero la dejo por compat.
async function onPhotoFileGallery(event, entidadTipo, entidadId, kind) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  showSpinner('Subiendo foto...');
  try {
    const url = await uploadImagenABucket(file);
    if (!url) { toast('Error subiendo la foto', true); return; }
    const res = await agregarFoto(entidadTipo, entidadId, url);
    if (res.error) { toast('Error: ' + res.error, true); return; }
    toast('Foto agregada');
    render();
    _refrescarModalContenedorSiAbierto();
  } finally {
    hideSpinner();
    event.target.value = '';
  }
}

// v70: si el modal Editar Conjunto/Equipo/Subconjunto o el modal de cliente
// está abierto, lo re-renderiza tras una operación de foto (la galería vive
// dentro del modal).
function _refrescarModalContenedorSiAbierto() {
  if (editContenedorState && document.getElementById('edit-cont-modal')) {
    _renderEditarContenedorModal();
  }
  // Modal de cliente: si está abierto, lo re-abrimos para refrescar la galería.
  const cliModal = document.getElementById('cli-modal');
  if (cliModal && cliModal.dataset.clienteId) {
    const cid = parseInt(cliModal.dataset.clienteId);
    cliModal.remove();
    showClienteForm(cid);
  }
}

// Confirma y elimina una foto.
function confirmEliminarFoto(fotoId) {
  confirmModal({
    titulo: 'Eliminar foto',
    mensaje: '¿Eliminar esta foto? La acción no se puede deshacer.',
    textoConfirmar: 'Eliminar',
    onConfirm: async () => {
      showSpinner('Eliminando foto...');
      try {
        const res = await eliminarFoto(fotoId);
        if (res.error) { toast('Error: ' + res.error, true); return; }
        toast('Foto eliminada');
        render();
        _refrescarModalContenedorSiAbierto();
      } finally {
        hideSpinner();
      }
    }
  });
}

// Mover foto en el orden y re-renderizar
async function moverFotoUI(fotoId, direction) {
  showSpinner('Reordenando...');
  try {
    await moverFoto(fotoId, direction);
    render();
    _refrescarModalContenedorSiAbierto();
  } finally {
    hideSpinner();
  }
}

// Lightbox simple para ver foto en grande
function abrirFotoLightbox(url) {
  const existing = document.getElementById('foto-lightbox');
  if (existing) existing.remove();
  const bd = document.createElement('div');
  bd.className = 'mo';
  bd.id = 'foto-lightbox';
  bd.style.cursor = 'pointer';
  bd.onclick = () => bd.remove();
  const img = document.createElement('img');
  img.src = url;
  img.style.cssText = 'max-width:90vw;max-height:90vh;border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,0.4)';
  img.onclick = (e) => e.stopPropagation();
  // Botón copiar
  const btn = document.createElement('button');
  btn.className = 'b';
  btn.textContent = '📋 Copiar imagen';
  btn.style.cssText = 'position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:#fff';
  btn.onclick = (e) => { e.stopPropagation(); copyImageToClipboard(url); };
  bd.appendChild(img);
  bd.appendChild(btn);
  document.body.appendChild(bd);
}

// Sube un File al bucket de Supabase Storage y retorna la URL pública.
// Reusable desde la galería y otros flujos.
async function uploadImagenABucket(file) {
  if (!file) return null;
  const ext = (file.name || '').split('.').pop().toLowerCase() || 'jpg';
  const filename = 'foto_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9) + '.' + ext;
  const { data, error } = await sb.storage.from(PHOTO_BUCKET).upload(filename, file, { contentType: file.type });
  if (error) {
    console.error('Error subiendo foto:', error);
    return null;
  }
  const { data: pub } = sb.storage.from(PHOTO_BUCKET).getPublicUrl(filename);
  return pub ? pub.publicUrl : null;
}

function buildPhotoWrapHtml(currentUrl, kind) {
  let h = '<div class="photo-wrap" id="photo-wrap-' + kind + '" data-kind="' + kind + '" onclick="onSlotClick(event,\'' + kind + '\')" ondragover="onSlotDragOver(event)" ondragleave="onSlotDragLeave(event)" ondrop="onSlotDrop(event,\'' + kind + '\')">';
  if (currentUrl) {
    h += '<img src="' + escapeHtml(currentUrl) + '">';
    h += '<div class="photo-x" onclick="event.stopPropagation();clearPhoto(\'' + kind + '\')">&times;</div>';
  } else {
    h += '<button type="button" class="photo-insert-btn" onclick="event.stopPropagation();document.getElementById(\'photo-input-' + kind + '\').click()">Insertar</button>';
  }
  h += '</div>';
  h += '<input type="file" id="photo-input-' + kind + '" accept="image/*" style="display:none" onchange="onPhotoFile(event,\'' + kind + '\')">';
  h += '<input type="hidden" id="photo-url-' + kind + '" value="' + escapeHtml(currentUrl || '') + '">';
  // Boton "Copiar imagen": copia la foto como blob al portapapeles para
  // pegarla luego en Gmail (Ctrl+V). Solo aparece si hay foto cargada.
  if (currentUrl) {
    h += '<button type="button" class="b" onclick="copyImageToClipboard(\'' + escapeHtml(currentUrl) + '\')" title="Copiar la imagen al portapapeles" style="margin-top:4px;font-size:10px;padding:3px 8px;width:100%">📋 Copiar imagen</button>';
  }
  return h;
}

// Marca un slot como activo (para que paste con Ctrl+V se pegue ahi).
// Desactiva los demas.
function setActiveSlot(kind) {
  document.querySelectorAll('.photo-wrap').forEach(w => {
    w.classList.remove('active');
    const hint = w.querySelector('.photo-paste-hint');
    if (hint) hint.remove();
  });
  const wrap = document.getElementById('photo-wrap-' + kind);
  if (wrap) {
    wrap.classList.add('active');
    if (!wrap.querySelector('.photo-paste-hint')) {
      const hint = document.createElement('div');
      hint.className = 'photo-paste-hint';
      hint.textContent = 'paste';
      wrap.appendChild(hint);
    }
  }
}

// Click en el slot (en area que NO es el boton "Insertar"): solo activa el slot.
function onSlotClick(event, kind) {
  setActiveSlot(kind);
}

function onSlotDragOver(event) {
  event.preventDefault();
  event.currentTarget.classList.add('active');
}
function onSlotDragLeave(event) {
  // Solo quitar el highlight si no es el slot activo de paste
  // (no haremos nada elaborado: si es el activo, lo deja, sino lo saca)
  // Para simplicidad, no quitamos nada aqui — onSlotDrop o setActiveSlot lo manejan
}
async function onSlotDrop(event, kind) {
  event.preventDefault();
  setActiveSlot(kind);
  const dt = event.dataTransfer;
  if (!dt || !dt.files || dt.files.length === 0) return;
  const file = dt.files[0];
  if (!file.type || file.type.indexOf('image') !== 0) {
    toast('Solo se aceptan imagenes', true);
    return;
  }
  await uploadPhotoFile(file, kind);
}

// Auto-activar el slot apropiado cuando se renderiza el form:
// Recorre TODOS los slots visibles y activa el primero que encuentre. Esto
// cubre proj, item, maq, pm y cualquier kind futuro. Si hay varios visibles
// se aplica esta prioridad: proj > item > maq > pm.
function autoActivateSlot() {
  const order = ['proj', 'item', 'maq', 'pm'];
  for (const kind of order) {
    const wrap = document.getElementById('photo-wrap-' + kind);
    if (wrap && wrap.offsetParent !== null) {
      setActiveSlot(kind);
      return;
    }
  }
}

function setupPhotoPaste() {
  // Auto-activa el slot apropiado cada vez que se llama (al abrir un form)
  autoActivateSlot();
  if (window._pastedHooked) return;
  window._pastedHooked = true;
  document.addEventListener('paste', async (e) => {
    // Pega siempre en el slot activo (clase .active). Si no hay slot activo
    // pero hay slots visibles, activa el primero apropiado y pega ahi.
    let activeWrap = document.querySelector('.photo-wrap.active');
    if (!activeWrap) {
      autoActivateSlot();
      activeWrap = document.querySelector('.photo-wrap.active');
    }
    if (!activeWrap) return;
    const kind = activeWrap.dataset.kind;
    if (!kind) return;
    const items_ = (e.clipboardData || e.originalEvent.clipboardData).items;
    for (const it of items_) {
      if (it.type.indexOf('image') !== -1) {
        e.preventDefault();
        const file = it.getAsFile();
        await uploadPhotoFile(file, kind);
        return;
      }
    }
  });
}

async function onPhotoFile(event, kind) {
  const file = event.target.files[0];
  if (file) await uploadPhotoFile(file, kind);
  event.target.value = '';
}

async function uploadPhotoFile(file, kind) {
  // Caso especial: si kind tiene prefijo "gal:", es un slot pendiente de
  // galería. Sube la foto, agrega a la tabla `fotos` y re-renderiza la galería.
  if (kind.startsWith('gal:')) {
    const parts = kind.split(':');
    const entidadTipo = parts[1];
    const entidadId = parseInt(parts[2]);
    const wrap = document.getElementById('photo-wrap-' + kind);
    if (wrap) wrap.innerHTML = '<div class="photo-loading" style="font-size:11px;color:#888">Subiendo...</div>';
    try {
      const ext = (file.name && file.name.split('.').pop()) || (file.type.split('/')[1]) || 'png';
      const filename = 'gal-' + entidadTipo + '-' + entidadId + '-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8) + '.' + ext;
      const { error: errUp } = await sb.storage.from(PHOTO_BUCKET).upload(filename, file, { contentType: file.type });
      if (errUp) throw errUp;
      const { data } = sb.storage.from(PHOTO_BUCKET).getPublicUrl(filename);
      const url = data.publicUrl;
      // Agregar a la tabla `fotos`
      const res = await agregarFoto(entidadTipo, entidadId, url);
      if (res.error) {
        toast('Error: ' + res.error, true);
        return;
      }
      toast('Foto agregada');
      // Re-renderizar: dejamos el slot pendiente activo para que el usuario
      // pueda pegar más sin clickear "+ Agregar". El estado _galPendingSlot
      // se mantiene apuntando a la misma galería.
      render();
      _refrescarModalContenedorSiAbierto();
      // Re-activar el slot pendiente recién renderizado para que paste siga funcionando
      setTimeout(() => {
        setActiveSlot(kind);
      }, 50);
    } catch (err) {
      console.error(err);
      toast('Error al subir foto: ' + (err.message || err), true);
    }
    return;
  }
  // Caso clásico (wrap único con hidden input): comportamiento previo
  const wrap = document.getElementById('photo-wrap-' + kind);
  if (!wrap) return;
  wrap.innerHTML = '<div class="photo-loading" style="font-size:11px;color:#888">Subiendo...</div>';
  try {
    const ext = (file.name && file.name.split('.').pop()) || (file.type.split('/')[1]) || 'png';
    const filename = kind + '-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8) + '.' + ext;
    const { error } = await sb.storage.from(PHOTO_BUCKET).upload(filename, file, { contentType: file.type });
    if (error) throw error;
    const { data } = sb.storage.from(PHOTO_BUCKET).getPublicUrl(filename);
    const url = data.publicUrl;
    document.getElementById('photo-url-' + kind).value = url;
    wrap.innerHTML = '<img src="' + url + '"><div class="photo-x" onclick="event.stopPropagation();clearPhoto(\'' + kind + '\')">&times;</div>';
    if (wrap.classList.contains('active')) {
      const hint = document.createElement('div');
      hint.className = 'photo-paste-hint';
      hint.textContent = 'paste';
      wrap.appendChild(hint);
    }
    toast('Foto subida');
  } catch (err) {
    console.error(err);
    toast('Error al subir foto: ' + (err.message || err), true);
    wrap.innerHTML = '<button type="button" class="photo-insert-btn" onclick="event.stopPropagation();document.getElementById(\'photo-input-' + kind + '\').click()">Insertar</button>';
  }
}

function clearPhoto(kind) {
  document.getElementById('photo-url-' + kind).value = '';
  const wrap = document.getElementById('photo-wrap-' + kind);
  if (!wrap) return;
  wrap.innerHTML = '<button type="button" class="photo-insert-btn" onclick="event.stopPropagation();document.getElementById(\'photo-input-' + kind + '\').click()">Insertar</button>';
  if (wrap.classList.contains('active')) {
    const hint = document.createElement('div');
    hint.className = 'photo-paste-hint';
    hint.textContent = 'paste';
    wrap.appendChild(hint);
  }
}

// Render del listado de clientes (cuerpo HTML, sin main.innerHTML).

function renderClienteCard(c) {
  const pedidosPendientes = getProjects().filter(p =>

  ).length;

  let h = '<div class="card" style="padding:6px 10px;align-items:center;' + (inactivo ? 'opacity:0.55' : '') + '">';

  else title += ' <span title="Falta cargar el código" style="color:#A32D2D;margin-left:6px;font-size:11px">⚠ sin código</span>';
  if (inactivo) title += ' <span style="font-size:10px;background:#FEDADA;color:#A32D2D;padding:1px 6px;border-radius:8px;margin-left:6px">Inactivo</span>';
  h += '<div class="card-t" style="margin:0;font-size:13px">' + title + '</div>';
  h += '<div class="card-s" style="margin:0;font-size:11px">CUIT: ' + escapeHtml(c.cuit || '—') + ' · ' + pedidosPendientes + ' pedido(s) pendiente(s)</div>';
  h += '</div>';
  h += '<div class="card-actions" style="flex:0 0 auto">';
  h += '<button class="b b-icon" onclick="showClienteForm(' + c.id + ')">Editar</button>';

// ============================================================================

// ============================================================================
const MAQ_FILTERS_KEY = 'velasco_maqFilters_v1';
const MAQ_SORT_KEY = 'velasco_maqSort_v1';
const DEFAULT_MAQ_FILTERS = {
  search: '',         // substring sobre nombre
  procesos: []        // multi-select OR: maquinas que hagan al menos uno
};
const DEFAULT_MAQ_SORT = { by: 'nombre', dir: 'asc' };
let maqFilters = (function(){
  try { const r = localStorage.getItem(MAQ_FILTERS_KEY); return r ? { ...DEFAULT_MAQ_FILTERS, ...JSON.parse(r) } : { ...DEFAULT_MAQ_FILTERS }; }
  catch(e){ return { ...DEFAULT_MAQ_FILTERS }; }
})();
let maqSort = (function(){
  try { const r = localStorage.getItem(MAQ_SORT_KEY); return r ? { ...DEFAULT_MAQ_SORT, ...JSON.parse(r) } : { ...DEFAULT_MAQ_SORT }; }
  catch(e){ return { ...DEFAULT_MAQ_SORT }; }
})();
function saveMaqFilters() { try { localStorage.setItem(MAQ_FILTERS_KEY, JSON.stringify(maqFilters)); } catch(e){} }
function saveMaqSort() { try { localStorage.setItem(MAQ_SORT_KEY, JSON.stringify(maqSort)); } catch(e){} }

function countActiveMaqFilters() {
  let n = 0;
  if (maqFilters.search && maqFilters.search.trim()) n++;
  if (maqFilters.procesos && maqFilters.procesos.length > 0) n++;
  return n;
}

function applyMaqFilters(list) {
  let out = list;
  if (maqFilters.search && maqFilters.search.trim()) {
    const q = maqFilters.search.trim().toLowerCase();
    out = out.filter(m => (m.nombre || '').toLowerCase().includes(q));
  }
  if (maqFilters.procesos && maqFilters.procesos.length > 0) {
    const set = new Set(maqFilters.procesos);
    out = out.filter(m => {
      const procs = (m.procesos && Array.isArray(m.procesos)) ? m.procesos : [];
      return procs.some(p => set.has(p));
    });
  }
  return out;
}

function sortMaquinas(list) {
  const out = list.slice();
  out.sort((a, b) => {
    let cmp = 0;
    if (maqSort.by === 'nombre') {
      cmp = (a.nombre || '').localeCompare(b.nombre || '');
    } else if (maqSort.by === 'cant_procesos') {
      const ca = (a.procesos && Array.isArray(a.procesos)) ? a.procesos.length : 0;
      const cb = (b.procesos && Array.isArray(b.procesos)) ? b.procesos.length : 0;
      cmp = ca - cb;
    }
    if (cmp === 0) cmp = (a.id || 0) - (b.id || 0);
    return maqSort.dir === 'asc' ? cmp : -cmp;
  });
  return out;
}

async function saveMaterial(materialId) {
  const nombre = document.getElementById('mat-nombre').value.trim();
  const desc = document.getElementById('mat-desc').value.trim() || null;
  if (!nombre) { toast('Nombre obligatorio', true); return; }
  const dup = materiales.find(m => m.nombre.toLowerCase() === nombre.toLowerCase() && m.id !== materialId);
  if (dup) { toast('Ya existe un material con ese nombre', true); return; }
  const fullPayload = { nombre: nombre, descripcion: desc };
  let result;
  if (materialId) {
    result = await sb.from('materiales').update(fullPayload).eq('id', materialId);
  } else {
    result = await sb.from('materiales').insert(fullPayload);
  }
  if (result.error && /column.*does not exist/i.test(result.error.message || '')) {
    // Reintento con solo nombre (si la columna descripcion no existe aun)
    const minPayload = { nombre: nombre };
    if (materialId) {
      result = await sb.from('materiales').update(minPayload).eq('id', materialId);
    } else {
      result = await sb.from('materiales').insert(minPayload);
    }
    if (!result.error) {
      toast('Material guardado (descripción requiere migración pendiente)');
    }
  }
  if (result.error) { toast('Error: ' + result.error.message, true); return; }
  await loadAll();
  document.getElementById('material-modal').remove();
  toast(materialId ? 'Material actualizado' : 'Material creado');
  render();
}

  const mat = materiales.find(m => m.id === materialId);
  if (!mat) return;
  const usosProd = productosMatriz.filter(p => p.material_id === materialId).length;
  const usosItem = items.filter(it => it.material_id === materialId).length;
  let extraMsg = '';
  if (usosProd > 0 || usosItem > 0) {
    const parts = [];
    if (usosProd > 0) parts.push(usosProd + ' producto(s) matriz');
    if (usosItem > 0) parts.push(usosItem + ' item(s) de proyecto');

async function saveMaquina(maquinaId) {
  const nombre = document.getElementById('maq-nombre').value.trim();
  if (!nombre) { toast('El nombre es obligatorio', true); return; }
  const cbs = document.querySelectorAll('.maq-proc-cb:checked');
  const procs = [...cbs].map(cb => cb.value);
  // Foto (puede ser nueva, sin cambios, o limpiada)
  const fotoEl = document.getElementById('photo-url-maq');
  const foto = fotoEl ? (fotoEl.value || null) : null;
  if (maquinaId) {
    const { error } = await sb.from('maquinas').update({ nombre, procesos: procs, foto_url: foto }).eq('id', maquinaId);
    if (error) { toast('Error al guardar: ' + error.message, true); console.error(error); return; }
  } else {
    const { error } = await sb.from('maquinas').insert({ nombre, procesos: procs, foto_url: foto });
    if (error) { toast('Error al crear: ' + error.message, true); console.error(error); return; }
  }
  document.getElementById('maq-modal').remove();
  await loadAll();
  toast(maquinaId ? 'Máquina actualizada' : 'Máquina creada');
  render();
}

// Filtra la lista de maquinas devolviendo SOLO las que pueden hacer el proceso
// dado. Una maquina con procesos = [] aparece SIEMPRE como fallback (es decir,
// una maquina sin procesos asignados se muestra en todas las opciones).
function maquinasParaProceso(procesoNombre) {
  if (!procesoNombre) return maquinas;
  return maquinas.filter(m => {
    const procs = (m.procesos && Array.isArray(m.procesos)) ? m.procesos : [];
    if (procs.length === 0) return true;  // fallback: sin procesos -> todas
    return procs.includes(procesoNombre);
  });
}

// =============================================================================
// COMPONENTE: searchable picker (dropdown buscable single-select)
// =============================================================================
// Renderiza un input de busqueda con un dropdown que muestra opciones que
// CONTENGAN lo tipeado. Permite ademas "+ Cargar nuevo X" si onCreateLabel
// y onCreateFn estan provistos.
//
// Estado: cada picker se identifica por un id unico. El valor seleccionado
// se guarda en un hidden input con id `<id>-value` y el label visible en
// el input visible `<id>-input`.
//
// API:
//   renderPicker({
//     id: 'pm-cliente',          // id base para todos los elementos
//     value: 7,                  // valor actualmente seleccionado (id) o null
//     valueLabel: 'GDLP',        // label visible si hay valor
//     placeholder: '...',        // placeholder del input
//     options: [...],            // [{id, label, sublabel?}, ...]
//     onSelectFnName: 'foo',     // nombre de funcion global a llamar al elegir
//     onCreateLabel: '+ Cargar nuevo X',  // si esta, agrega opcion al final
//     onCreateFnName: 'bar',     // nombre de funcion global al click crear
//     disabled: false            // si esta, lock total
//   })
//
// La funcion onSelect(picked) recibe el option elegido. La funcion onCreate
// recibe el query actual (lo tipeado al momento del click).
function renderPicker(opts) {
  const id = opts.id;
  const value = opts.value || null;
  const valueLabel = opts.valueLabel || '';
  const placeholder = opts.placeholder || 'Buscar...';
  const disabled = opts.disabled === true;
  const disabledStyle = disabled ? ';background:#F5F3EC;color:#888;cursor:not-allowed' : '';
  let h = '<div class="picker-wrap" data-picker-id="' + id + '" style="position:relative">';
  h += '<input type="text" class="ef-i" id="' + id + '-input" value="' + escapeHtml(valueLabel) + '" placeholder="' + escapeHtml(placeholder) + '"' + (disabled ? ' disabled' : '') + ' autocomplete="off" oninput="pickerInput(\'' + id + '\')" onfocus="pickerOpen(\'' + id + '\')" onblur="setTimeout(function(){pickerClose(\'' + id + '\')}, 200)" style="' + disabledStyle + '">';
  h += '<input type="hidden" id="' + id + '-value" value="' + (value || '') + '">';
  h += '<div id="' + id + '-dropdown" class="combo-list" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:200;max-height:240px;overflow-y:auto"></div>';
  h += '</div>';
  // Guardamos las opciones en window.__pickerCache para que pickerInput pueda accederlas
  if (!window.__pickerCache) window.__pickerCache = {};
  window.__pickerCache[id] = {
    options: opts.options || [],
    onSelectFnName: opts.onSelectFnName,
    onCreateLabel: opts.onCreateLabel,
    onCreateFnName: opts.onCreateFnName
  };
  return h;
}

function pickerOpen(id) { pickerInput(id); const dd = document.getElementById(id + '-dropdown'); if (dd) dd.style.display = 'block'; }
function pickerClose(id) { const dd = document.getElementById(id + '-dropdown'); if (dd) dd.style.display = 'none'; }
function pickerInput(id) {
  const cache = (window.__pickerCache || {})[id];
  if (!cache) return;
  const input = document.getElementById(id + '-input');
  const dd = document.getElementById(id + '-dropdown');
  if (!input || !dd) return;
  const q = (input.value || '').trim().toLowerCase();
  // Filtrar por substring en label o sublabel
  let matches = cache.options.filter(o => {
    const lbl = (o.label || '').toLowerCase();
    const sublbl = (o.sublabel || '').toLowerCase();
    return lbl.includes(q) || sublbl.includes(q);
  });
  let html = '';
  if (matches.length === 0 && !cache.onCreateLabel) {
    html = '<div style="padding:8px 10px;font-size:11px;color:#888;font-style:italic">No hay opciones</div>';
  } else {
    matches.forEach(o => {
      // onmousedown para que dispare antes que el blur del input cierre el dropdown
      let label = escapeHtml(o.label);
      if (o.sublabel) label += ' <span style="color:#888;font-size:10px">' + escapeHtml(o.sublabel) + '</span>';
      html += '<div class="combo-item" style="padding:6px 10px;cursor:pointer;font-size:12px" onmousedown="pickerSelect(\'' + id + '\',\'' + o.id + '\')">' + label + '</div>';
    });
    if (cache.onCreateLabel) {
      html += '<div class="combo-item" style="padding:6px 10px;cursor:pointer;font-size:12px;border-top:1px solid #E8E6DF;color:#0C447C;font-weight:600" onmousedown="pickerCreate(\'' + id + '\')">' + escapeHtml(cache.onCreateLabel) + '</div>';
    }
  }
  dd.innerHTML = html;
  dd.style.display = 'block';
}
function pickerSelect(id, optId) {
  const cache = (window.__pickerCache || {})[id];
  if (!cache) return;
  // optId viene como string del onmousedown
  const opt = cache.options.find(o => String(o.id) === String(optId));
  if (!opt) return;
  document.getElementById(id + '-input').value = opt.label;
  document.getElementById(id + '-value').value = opt.id;
  pickerClose(id);
  if (cache.onSelectFnName && window[cache.onSelectFnName]) {
    window[cache.onSelectFnName](opt);
  }
}
function pickerCreate(id) {
  const cache = (window.__pickerCache || {})[id];
  if (!cache || !cache.onCreateFnName) return;
  const input = document.getElementById(id + '-input');
  const q = input ? (input.value || '').trim() : '';
  pickerClose(id);
  if (window[cache.onCreateFnName]) {
    window[cache.onCreateFnName](q);
  }
}
function pickerSetValue(id, optId, optLabel) {
  // Setea programaticamente el valor del picker (despues de cargar nuevo X)
  const inp = document.getElementById(id + '-input');
  const val = document.getElementById(id + '-value');
  if (inp) inp.value = optLabel || '';
  if (val) val.value = optId || '';
  // Tambien actualizamos el cache si el option recien creado no esta. Lo
  // reconstruye el caller despues de loadAll().
}
function pickerClear(id) {
  const inp = document.getElementById(id + '-input');
  const val = document.getElementById(id + '-value');
  if (inp) inp.value = '';
  if (val) val.value = '';
}

// =============================================================================
// CATALOGOS: helpers para agregar entradas nuevas (materiales, sectores, etc.)
// =============================================================================
// Cada uno abre un modal pequeno con un input + botones, inserta en DB,
// recarga loadAll, y deja la entrada nueva seleccionada en el picker que
// disparo la creacion. El picker se identifica por su id.

// Helper: dado el id del picker que disparo el cargar, actualizar
// pmCompatState si corresponde (cuando el cargar viene del modal de compat).
function _pmcSyncStateAfterLoad(pickerId, newId) {
  // Si el picker es del modal de compat de item (itc-*), delegar
  if (pickerId && pickerId.startsWith('itc-')) {
    _itcSyncStateAfterLoad(pickerId, newId);
    return;
  }
  if (!pmCompatState) return;
  if (pickerId === 'pmc-sector') pmCompatState.sectorId = newId;
  else if (pickerId === 'pmc-equipo') pmCompatState.equipoId = newId;
  else if (pickerId === 'pmc-conjunto') pmCompatState.conjuntoId = newId;
  else if (pickerId === 'pmc-subconjunto') pmCompatState.subconjuntoId = newId;
  // v67: refrescar el form inline de compat dentro del modal de producto
  if (pickerId && pickerId.startsWith('pmc-')) _pmCompatInlineRefresh();
}

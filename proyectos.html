<script>
const SB_URL = 'https://mzjbcfkalvduimqhawur.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16amJjZmthbHZkdWltcWhhd3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzY0MzcsImV4cCI6MjA5MDQ1MjQzN30.P7so8AbiRgR9bIWttIqoG6ievY4cxgDMjzZQLx-95-Q';
const sb = supabase.createClient(SB_URL, SB_KEY);
const PHOTO_BUCKET = 'proyecto-fotos';

let clientes = [], maquinas = [], operarios = [], proyectos = [], items = [], actividades = [], correlatividades = [];
let nav = { view: 'projects' };
// Default filter for projects list: all states except closed/anulado/perdido
let projectFilters = new Set(['Proyectando', 'Presupuestar', 'Confirmado']);

// ============= FILTROS AVANZADOS =============
// Estado persistente en localStorage. Filtros aplicados (no en edicion).
// La estructura es:
//   advFilters = {
//     clientes: [id, id, ...],         // OR entre IDs
//     proyectoNro: '4137',             // string, busqueda exacta
//     pedidoNro: '4135',               // string, busqueda exacta
//     producto: '',                    // por ahora siempre vacio (no funcional)
//     fechaPreset: 'todos' | 'hoy' | 'ayer' | 'esta_semana' | 'ultima_semana' |
//                  'este_mes' | 'ultimo_mes' | 'este_anio' | 'ultimo_anio' | 'rango',
//     fechaDesde: 'YYYY-MM-DD' | null, // solo si preset==='rango'
//     fechaHasta: 'YYYY-MM-DD' | null
//   }
// advFiltersDraft = lo que el usuario esta editando en los inputs (se aplica al
//                   hacer Enter/Apply). Algunos campos (Fecha) se aplican
//                   inmediato porque no hay nada que confirmar.
const ADV_FILTERS_STORAGE_KEY = 'velasco_advFilters_v1';
const ADV_FILTERS_PANEL_OPEN_KEY = 'velasco_advFiltersPanelOpen_v1';
const DEFAULT_ADV_FILTERS = {
  clientes: [],
  incluirClienteFinal: true,  // Si true, busca tambien en cliente_final (texto libre)
  proyectoNro: '',
  pedidoNro: '',
  descProyecto: '',
  descItem: '',
  estadoItem: '',
  producto: '',
  fechaPreset: 'todos',
  fechaDesde: null,
  fechaHasta: null
};
function loadAdvFilters() {
  try {
    const raw = localStorage.getItem(ADV_FILTERS_STORAGE_KEY);
    if (!raw) return { ...DEFAULT_ADV_FILTERS };
    const parsed = JSON.parse(raw);
    return { ...DEFAULT_ADV_FILTERS, ...parsed };
  } catch (e) { return { ...DEFAULT_ADV_FILTERS }; }
}
function saveAdvFilters(f) {
  try { localStorage.setItem(ADV_FILTERS_STORAGE_KEY, JSON.stringify(f)); } catch (e) {}
}
let advFilters = loadAdvFilters();
let advFiltersDraft = JSON.parse(JSON.stringify(advFilters));
let advFiltersPanelOpen = (function(){
  try { return localStorage.getItem(ADV_FILTERS_PANEL_OPEN_KEY) === '1'; } catch (e) { return false; }
})();

// ===== VIEW MODE Y SORT =====
// viewMode: 'projects' | 'items'. Sort por separado para cada vista.
// expandedProjects: set de ids de proyectos con items desplegados (vista projects).
const VIEW_MODE_KEY = 'velasco_viewMode_v1';
const SORT_PROJECTS_KEY = 'velasco_sortProjects_v1';
const SORT_ITEMS_KEY = 'velasco_sortItems_v1';
const EXPANDED_PROJECTS_KEY = 'velasco_expandedProjects_v1';

let viewMode = (function(){
  try { return localStorage.getItem(VIEW_MODE_KEY) || 'projects'; } catch (e) { return 'projects'; }
})();
function setViewMode(m) {
  viewMode = m;
  try { localStorage.setItem(VIEW_MODE_KEY, m); } catch (e) {}
}

// Sort state: { by: 'created' | 'urgencia' | 'cliente' | 'fecha_entrega', dir: 'asc' | 'desc' }
// Defaults: por fecha de creacion descendente (mas recientes primero)
const DEFAULT_SORT_PROJECTS = { by: 'created', dir: 'desc' };
const DEFAULT_SORT_ITEMS = { by: 'created', dir: 'desc' };
function loadSort(key, def) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return { ...def };
    const p = JSON.parse(raw);
    return { ...def, ...p };
  } catch (e) { return { ...def }; }
}
function saveSort(key, s) {
  try { localStorage.setItem(key, JSON.stringify(s)); } catch (e) {}
}
let sortProjects = loadSort(SORT_PROJECTS_KEY, DEFAULT_SORT_PROJECTS);
let sortItems = loadSort(SORT_ITEMS_KEY, DEFAULT_SORT_ITEMS);
function setSort(viewKind, by, dir) {
  if (viewKind === 'projects') {
    sortProjects = { by, dir };
    saveSort(SORT_PROJECTS_KEY, sortProjects);
  } else {
    sortItems = { by, dir };
    saveSort(SORT_ITEMS_KEY, sortItems);
  }
}
function getCurrentSort() { return viewMode === 'items' ? sortItems : sortProjects; }

let expandedProjects = (function(){
  try {
    const raw = localStorage.getItem(EXPANDED_PROJECTS_KEY);
    if (!raw) return new Set();
    return new Set(JSON.parse(raw));
  } catch (e) { return new Set(); }
})();
function saveExpandedProjects() {
  try { localStorage.setItem(EXPANDED_PROJECTS_KEY, JSON.stringify([...expandedProjects])); } catch (e) {}
}
function toggleProjectExpand(projId) {
  if (expandedProjects.has(projId)) expandedProjects.delete(projId);
  else expandedProjects.add(projId);
  saveExpandedProjects();
  render();
}
function collapseAllProjects() {
  expandedProjects = new Set();
  saveExpandedProjects();
  render();
}

// Set de items expandidos en la vista Items (muestra procesos)
const EXPANDED_ITEMS_KEY = 'velasco_expandedItems_v1';
let expandedItems = (function(){
  try {
    const raw = localStorage.getItem(EXPANDED_ITEMS_KEY);
    if (!raw) return new Set();
    return new Set(JSON.parse(raw));
  } catch (e) { return new Set(); }
})();
function saveExpandedItems() {
  try { localStorage.setItem(EXPANDED_ITEMS_KEY, JSON.stringify([...expandedItems])); } catch (e) {}
}
function toggleItemExpand(itemId) {
  if (expandedItems.has(itemId)) expandedItems.delete(itemId);
  else expandedItems.add(itemId);
  saveExpandedItems();
  render();
}
function collapseAllItems() {
  expandedItems = new Set();
  saveExpandedItems();
  render();
}
function setAdvFiltersPanelOpen(open) {
  advFiltersPanelOpen = !!open;
  try { localStorage.setItem(ADV_FILTERS_PANEL_OPEN_KEY, open ? '1' : '0'); } catch (e) {}
}
// Cuenta filtros activos para badge "Filtros (N)"
function countActiveAdvFilters(f) {
  let n = 0;
  if (f.clientes && f.clientes.length) n++;
  if (f.proyectoNro && f.proyectoNro.trim() !== '') n++;
  if (f.pedidoNro && f.pedidoNro.trim() !== '') n++;
  if (f.descProyecto && f.descProyecto.trim() !== '') n++;
  if (f.descItem && f.descItem.trim() !== '') n++;
  if (f.estadoItem && f.estadoItem !== '') n++;
  if (f.fechaPreset && f.fechaPreset !== 'todos') n++;
  return n;
}

// Resuelve el preset de fecha a un rango {desde, hasta} en milisegundos UTC.
// Convencion de "semana": lunes a domingo (semana ISO).
// Devuelve null si preset === 'todos' (sin filtro de fecha).
function resolveDateRange(preset, customDesde, customHasta) {
  if (preset === 'todos') return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let desde, hasta;
  function dayOfWeekMon(d) {
    // Devuelve 0=lunes ... 6=domingo
    const dow = d.getDay();
    return dow === 0 ? 6 : dow - 1;
  }
  if (preset === 'hoy') {
    desde = today;
    hasta = new Date(today.getTime() + 86400000 - 1);
  } else if (preset === 'ayer') {
    desde = new Date(today.getTime() - 86400000);
    hasta = new Date(today.getTime() - 1);
  } else if (preset === 'esta_semana') {
    const dom = dayOfWeekMon(today);
    desde = new Date(today.getTime() - dom * 86400000);
    hasta = new Date(desde.getTime() + 7 * 86400000 - 1);
  } else if (preset === 'ultima_semana') {
    const dom = dayOfWeekMon(today);
    const lunesEsta = new Date(today.getTime() - dom * 86400000);
    desde = new Date(lunesEsta.getTime() - 7 * 86400000);
    hasta = new Date(lunesEsta.getTime() - 1);
  } else if (preset === 'este_mes') {
    desde = new Date(today.getFullYear(), today.getMonth(), 1);
    hasta = new Date(today.getFullYear(), today.getMonth() + 1, 1, 0, 0, 0, -1);
  } else if (preset === 'ultimo_mes') {
    desde = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    hasta = new Date(today.getFullYear(), today.getMonth(), 1, 0, 0, 0, -1);
  } else if (preset === 'este_anio') {
    desde = new Date(today.getFullYear(), 0, 1);
    hasta = new Date(today.getFullYear() + 1, 0, 1, 0, 0, 0, -1);
  } else if (preset === 'ultimo_anio') {
    desde = new Date(today.getFullYear() - 1, 0, 1);
    hasta = new Date(today.getFullYear(), 0, 1, 0, 0, 0, -1);
  } else if (preset === 'rango') {
    if (!customDesde && !customHasta) return null;
    if (customDesde) {
      const [y, m, d] = customDesde.split('-').map(Number);
      desde = new Date(y, m - 1, d);
    } else { desde = new Date(0); }
    if (customHasta) {
      const [y, m, d] = customHasta.split('-').map(Number);
      hasta = new Date(y, m - 1, d, 23, 59, 59, 999);
    } else { hasta = new Date(8640000000000000); }
  } else {
    return null;
  }
  return { desde: desde.getTime(), hasta: hasta.getTime() };
}

// Aplica los filtros avanzados (advFilters) a una lista de proyectos.
function applyAdvFilters(projs) {
  const f = advFilters;
  let out = projs;
  // Cliente: OR entre IDs seleccionados. Si incluirClienteFinal, ademas
  // matchea cualquier proyecto cuyo `cliente_final` contenga (case-insensitive)
  // el nombre del cliente seleccionado. Esto permite encontrar proyectos donde
  // el cliente facturable sea uno y el cliente final otro.
  if (f.clientes && f.clientes.length > 0) {
    const setIds = new Set(f.clientes.map(id => parseInt(id)));
    if (f.incluirClienteFinal) {
      const nombres = (f.clientes || []).map(id => {
        const c = clientes.find(x => x.id === parseInt(id));
        return c ? (c.nombre || '').toLowerCase() : null;
      }).filter(n => n);
      out = out.filter(p => {
        if (setIds.has(p.cliente_id)) return true;
        const cf = (p.cliente_final || '').toLowerCase();
        if (!cf) return false;
        return nombres.some(n => cf.includes(n));
      });
    } else {
      out = out.filter(p => setIds.has(p.cliente_id));
    }
  }
  // Nro de proyecto (id interno) - busqueda exacta
  if (f.proyectoNro && f.proyectoNro.trim() !== '') {
    const target = parseInt(f.proyectoNro.trim());
    if (!isNaN(target)) out = out.filter(p => p.id === target);
    else out = []; // texto no numerico => ningun match
  }
  // Nro de pedido (a nivel proyecto) - busqueda exacta
  if (f.pedidoNro && f.pedidoNro.trim() !== '') {
    const target = f.pedidoNro.trim();
    out = out.filter(p => (p.pedido_nro || '').toString() === target);
  }
  // Descripcion del proyecto: contains case-insensitive
  if (f.descProyecto && f.descProyecto.trim() !== '') {
    const q = f.descProyecto.trim().toLowerCase();
    out = out.filter(p => (p.descripcion || '').toLowerCase().includes(q));
  }
  // Descripcion del item: filtra proyectos que tengan AL MENOS UN item con esa descripcion
  if (f.descItem && f.descItem.trim() !== '') {
    const q = f.descItem.trim().toLowerCase();
    out = out.filter(p => (p.items || []).some(it => (it.descripcion || '').toLowerCase().includes(q)));
  }
  // Producto: no funcional por ahora (no hay matriz)
  // Fecha de creacion
  const range = resolveDateRange(f.fechaPreset, f.fechaDesde, f.fechaHasta);
  if (range) {
    out = out.filter(p => {
      if (!p.created_at) return false;
      const t = new Date(p.created_at).getTime();
      return t >= range.desde && t <= range.hasta;
    });
  }
  return out;
}

// ===== ORDEN =====
// Ordena proyectos segun sortProjects. NO muta la lista entrante.
const URGENCY_RANK = { urgente: 0, alta: 1, media: 2, baja: 3 };
const ITEM_ESTADO_RANK = {
  'Espera MP': 0,
  'Listo para mecanizar': 1,
  'En proceso': 2,
  'Terminado': 3,
  'Despachado': 4
};
function sortProjectsList(arr) {
  const s = sortProjects;
  const out = arr.slice();
  out.sort((a, b) => {
    let cmp = 0;
    if (s.by === 'created') {
      cmp = new Date(a.created_at || 0).getTime() - new Date(b.created_at || 0).getTime();
    } else if (s.by === 'fecha_entrega') {
      const ta = a.fecha_entrega ? new Date(a.fecha_entrega).getTime() : null;
      const tb = b.fecha_entrega ? new Date(b.fecha_entrega).getTime() : null;
      // null al final
      if (ta === null && tb === null) cmp = 0;
      else if (ta === null) return 1;
      else if (tb === null) return -1;
      else cmp = ta - tb;
    } else if (s.by === 'urgencia') {
      cmp = (URGENCY_RANK[a.urgencia] ?? 99) - (URGENCY_RANK[b.urgencia] ?? 99);
    } else if (s.by === 'cliente') {
      cmp = (clN(a.cliente_id) || '').localeCompare(clN(b.cliente_id) || '');
    }
    if (cmp === 0) cmp = a.id - b.id; // tiebreaker por id
    return s.dir === 'asc' ? cmp : -cmp;
  });
  return out;
}

// Construye lista plana de items con metadata del proyecto (cliente, pedido, etc.)
// para la vista de items.
function buildFlatItemsList(filteredProjects) {
  const out = [];
  filteredProjects.forEach(p => {
    (p.items || []).forEach(it => {
      out.push({
        item: it,
        proyecto: p
      });
    });
  });
  return out;
}

// Filtro adicional para vista items: estadoItem (sobre items individuales).
function filterItemsList(itemsList) {
  const f = advFilters;
  let out = itemsList;
  if (f.estadoItem && f.estadoItem !== '') {
    out = out.filter(x => (x.item.estado || 'Espera MP') === f.estadoItem);
  }
  // descItem se aplica como filtro a nivel item (no proyecto)
  if (f.descItem && f.descItem.trim() !== '') {
    const q = f.descItem.trim().toLowerCase();
    out = out.filter(x => (x.item.descripcion || '').toLowerCase().includes(q));
  }
  return out;
}

function sortItemsList(arr) {
  const s = sortItems;
  const out = arr.slice();
  out.sort((a, b) => {
    let cmp = 0;
    if (s.by === 'created') {
      cmp = new Date(a.proyecto.created_at || 0).getTime() - new Date(b.proyecto.created_at || 0).getTime();
    } else if (s.by === 'fecha_entrega') {
      // En vista de items, esto es la fecha_fin_estipulada del item
      const ta = a.item.fecha_fin_estipulada ? new Date(a.item.fecha_fin_estipulada).getTime() : null;
      const tb = b.item.fecha_fin_estipulada ? new Date(b.item.fecha_fin_estipulada).getTime() : null;
      if (ta === null && tb === null) cmp = 0;
      else if (ta === null) return 1;
      else if (tb === null) return -1;
      else cmp = ta - tb;
    } else if (s.by === 'urgencia') {
      cmp = (URGENCY_RANK[a.proyecto.urgencia] ?? 99) - (URGENCY_RANK[b.proyecto.urgencia] ?? 99);
    } else if (s.by === 'cliente') {
      cmp = (clN(a.proyecto.cliente_id) || '').localeCompare(clN(b.proyecto.cliente_id) || '');
    } else if (s.by === 'estado_item') {
      cmp = (ITEM_ESTADO_RANK[a.item.estado] ?? 99) - (ITEM_ESTADO_RANK[b.item.estado] ?? 99);
    }
    if (cmp === 0) cmp = a.item.id - b.item.id;
    return s.dir === 'asc' ? cmp : -cmp;
  });
  return out;
}

function toast(msg, isErr) {
  const t = document.getElementById('to');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('sh');
  setTimeout(() => t.classList.remove('sh'), 3500);
}

function escapeHtml(s){if(s===null||s===undefined)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}
function validCuit(s){return /^\d{11}$/.test(s)}

// Returns all proyectos with their items attached as ".items".
function getProjects() {
  return proyectos.map(p => ({
    ...p,
    items: items.filter(it => it.proyecto_id === p.id)
  }));
}

// Find a single project by id, with items attached.
function getProject(projectId) {
  const p = proyectos.find(x => x.id === projectId);
  if (!p) return null;
  return { ...p, items: items.filter(it => it.proyecto_id === projectId) };
}

async function loadAll() {
  const [c, m, o, p, it, a, co] = await Promise.all([
    sb.from('clientes').select('*').order('nombre'),
    sb.from('maquinas').select('*').order('nombre'),
    sb.from('operarios').select('*').order('nombre'),
    sb.from('proyectos').select('*').order('id', { ascending: false }),
    sb.from('items').select('*').order('id'),
    sb.from('actividades_tablero').select('*').order('orden', { ascending: true, nullsFirst: false }),
    sb.from('correlatividades').select('*')
  ]);
  clientes = c.data || []; maquinas = m.data || []; operarios = o.data || [];
  proyectos = p.data || []; items = it.data || []; actividades = a.data || [];
  correlatividades = co.data || [];
}

function navigate(newNav) { nav = newNav; render(); }

function renderCrumbs() {
  const c = document.getElementById('crumbs');
  let h = '';
  if (nav.view === 'projects') { c.innerHTML = ''; return; }
  const proj = nav.projectId ? getProject(nav.projectId) : null;
  // Project label for breadcrumb: "P.<id>/Ped.<pedido_nro or '-'>"
  const projLabel = proj ? ('P.' + proj.id + ' / Ped.' + (proj.pedido_nro || '-')) : 'Proyecto';
  if (nav.view === 'newProject') {
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> Nuevo';
  } else if (nav.view === 'project') {
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> ' + escapeHtml(projLabel);
  } else if (nav.view === 'item') {
    const item = items.find(i => i.id === nav.itemId);
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> ' +
        '<a onclick="navigate({view:\'project\',projectId:' + nav.projectId + '})">' + escapeHtml(projLabel) + '</a> <span class="sep">›</span> ' +
        escapeHtml(item ? item.descripcion : 'Item');
  } else if (nav.view === 'clientes') {
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> Clientes';
  }
  c.innerHTML = h;
}

function render() {
  renderCrumbs();
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (nav.view === 'projects') return renderProjectsList();
  if (nav.view === 'newProject') return renderNewProjectForm();
  if (nav.view === 'project') return renderProjectDetail();
  if (nav.view === 'item') return renderItemDetail();
  if (nav.view === 'clientes') return renderClientesList();
}

    : [['created', 'Fecha de creacion'], ['fecha_entrega', 'Fecha de entrega'], ['urgencia', 'Urgencia'], ['cliente', 'Cliente']];

      : 'background:#fff;color:#888780;border:1px solid #C8C6BE';

  const filteredProjects = applyAdvFilters(getProjects().filter(p => projectFilters.has(p.estado || 'Confirmado')));

  if (viewMode === 'items') {

  } else {

  }
  main.innerHTML = h;
  if (advFiltersPanelOpen) wireAdvFiltersPanelEvents();
}

// Body de la vista PROYECTOS
function renderProjectsListBody(filteredProjects) {
  const projs = sortProjectsList(filteredProjects);
  if (projs.length === 0) {
    return '<div class="list-empty">No hay proyectos para los filtros seleccionados.</div>';
  }
  let h = '';
  projs.forEach(p => {
    const stColors = projStateColor(p.estado);
    const isClosed = (p.estado === 'Cerrado' || p.estado === 'Anulado' || p.estado === 'Perdido');
    const cardBg = isClosed ? '#F5F3EC' : '#fff';
    const img = p.foto_url
      ? '<img src="' + escapeHtml(p.foto_url) + '" class="card-img" onerror="this.style.display=\'none\'">'
      : '<div class="card-img-empty">sin foto</div>';
    const urg = p.urgencia ? '<span class="urg urg-' + p.urgencia + '">' + p.urgencia + '</span>' : '';
    const stBadge = '<span style="display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;background:' + stColors.bg + ';color:' + stColors.fg + ';margin-left:6px">' + p.estado + (p.estado === 'Cerrado' && p.sub_estado_cerrado ? ' / ' + p.sub_estado_cerrado : '') + '</span>';
    const needsPedidoWarn = PROJ_STATES_REQUIRE_PEDIDO.has(p.estado) && !p.pedido_nro;
    const warnHtml = needsPedidoWarn ? '<span title="Falta numero de pedido" style="color:#A32D2D;margin-left:4px;font-weight:700">⚠ FALTA Nº PEDIDO</span>' : '';
    const isExpanded = expandedProjects.has(p.id);
    const arrow = isExpanded ? '▾' : '▸';
    h += '<div class="card-wrap" style="margin-bottom:8px">';
    h += '<div class="card card-clickable" style="background:' + cardBg + ';margin-bottom:0;display:flex;align-items:stretch" onclick="navigate({view:\'project\',projectId:' + p.id + '})">';
    h += img;
    h += '<div class="card-body" style="flex:1">';
    h += '<div class="card-t">' + escapeHtml(p.descripcion || '(sin descripcion)') + urg + stBadge + warnHtml + '</div>';
    h += '<div class="card-s"><b>' + escapeHtml(clN(p.cliente_id)) + '</b>';

    h += p.pedido_nro ? ' · Ped. ' + escapeHtml(p.pedido_nro) : '';
    h += ' · ' + p.items.length + ' item(s)</div>';
    h += '</div>';
    // Flecha de desplegar items: a la derecha, centrada verticalmente.
    // Tiene padding generoso para click facil; el stopPropagation evita
    // que la tarjeta navegue al detalle.
    h += '<div style="display:flex;align-items:center;padding:0 14px" onclick="event.stopPropagation()">';
    h += '<button onclick="toggleProjectExpand(' + p.id + ')" title="Mostrar items" style="background:none;border:1px solid #C8C6BE;border-radius:4px;cursor:pointer;font-size:13px;padding:4px 10px;color:#5F5E5A;font-weight:700;line-height:1">' + arrow + '</button>';
    h += '</div>';
    h += '</div>';
    // Panel desplegado de items
    if (isExpanded) {
      h += '<div style="background:#FAFAF7;border:1px solid #C8C6BE;border-top:none;border-radius:0 0 6px 6px;padding:8px 14px 8px 56px;font-size:12px">';
      if (p.items && p.items.length > 0) {
        p.items.forEach((it, idx) => {
          const sep = idx < p.items.length - 1 ? ';border-bottom:1px solid #EAE8DF' : '';

          h += '<span><b>' + escapeHtml(it.descripcion || '(sin descripcion)') + '</b>';

          h += '</span>';
          h += '<span style="color:#5F5E5A;font-size:11px">' + escapeHtml(it.estado || 'Espera MP') + '</span>';
          h += '</div>';
        });
      } else {
        h += '<div style="color:#888;font-style:italic">Sin items</div>';
      }
      h += '</div>';
    }
    h += '</div>';
  });
  return h;
}

    h += img;
    h += '<div class="card-body" style="flex:1">';
    h += '<div class="card-t">' + escapeHtml(item.descripcion || '(sin descripcion)') + urg + itemEstadoBadge + stBadge + '</div>';
    h += '<div class="card-s"><b>' + escapeHtml(clN(proyecto.cliente_id)) + '</b>';
    h += ' · Pr. ' + proyecto.id + ' · ' + escapeHtml(proyecto.descripcion || '');
    if (proyecto.pedido_nro) h += ' · Ped. ' + escapeHtml(proyecto.pedido_nro);
    if (item.cantidad) h += ' · cant. ' + item.cantidad;
    h += '</div></div>';
    // Flecha desplegar procesos: a la derecha, centrada vertical
    h += '<div style="display:flex;align-items:center;padding:0 14px" onclick="event.stopPropagation()">';
    h += '<button onclick="toggleItemExpand(' + item.id + ')" title="Mostrar procesos" style="background:none;border:1px solid #C8C6BE;border-radius:4px;cursor:pointer;font-size:13px;padding:4px 10px;color:#5F5E5A;font-weight:700;line-height:1">' + arrow + '</button>';
    h += '</div>';
    h += '</div>';
    // Panel desplegado de procesos
    if (isExpanded) {
      // Buscar procesos cargados en el item (todos los activos, ordenados por orden)
      const procesos = actividades.filter(a => a.item_id === item.id && !a.proceso_eliminado)
        .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
      h += '<div style="background:#FAFAF7;border:1px solid #C8C6BE;border-top:none;border-radius:0 0 6px 6px;padding:8px 14px 8px 56px;font-size:12px">';
      if (procesos.length > 0) {
        procesos.forEach((p, idx) => {
          const sep = idx < procesos.length - 1 ? ';border-bottom:1px solid #EAE8DF' : '';
          // Duracion en formato corto: 90 -> "1h 30m", 60 -> "1h", 45 -> "45m"
          const totMin = p.duracion_estimada_min || 0;
          const horas = Math.floor(totMin / 60);
          const mins = totMin % 60;
          const durStr = totMin === 0 ? '—' : (horas > 0 ? horas + 'h' + (mins ? ' ' + mins + 'm' : '') : mins + 'm');
          h += '<div style="padding:4px 0;display:flex;justify-content:space-between;align-items:center;gap:10px;overflow:hidden' + sep + '">';
          h += '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0">';
          h += '<b>' + escapeHtml(p.proceso || '—') + '</b>';
          if (p.descripcion) h += ' · ' + escapeHtml(p.descripcion);
          h += '</span>';
          h += '<span style="color:#5F5E5A;font-size:11px;flex-shrink:0">' + durStr + '</span>';
          h += '</div>';
        });
      } else {
        h += '<div style="color:#888;font-style:italic">Sin procesos cargados aun</div>';
      }
      h += '</div>';
    }
    h += '</div>';
  });
  return h;
}

// Wire eventos del panel: Enter en inputs aplica, autocomplete de cliente, etc.
function wireAdvFiltersPanelEvents() {
  // Input de cliente: autocomplete inline al tipear
  const cli = document.getElementById('adv-cliente-input');
  if (cli) {
    cli.addEventListener('input', advClienteSuggest);
    cli.addEventListener('focus', advClienteSuggest);
    cli.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); advApply(); }
      else if (e.key === 'Escape') { closeAdvClienteSuggest(); }
    });
    // Cerrar dropdown al click fuera
    setTimeout(() => {
      document.addEventListener('click', advClienteOutsideClick, true);
    }, 0);
  }
  // Inputs de texto: Enter aplica
  const inputMap = {
    'adv-proyecto-nro': 'proyectoNro',
    'adv-pedido-nro': 'pedidoNro',
    'adv-desc-proyecto': 'descProyecto',
    'adv-desc-item': 'descItem'
  };
  Object.entries(inputMap).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); advApply(); }
      });
      el.addEventListener('input', e => {
        advFiltersDraft[key] = el.value;
      });
    }
  });
}

function advEstadoItemChange() {

function advToggleIncluirClienteFinal() {

function advClienteOutsideClick(e) {
  const sug = document.getElementById('adv-cliente-suggest');
  const inp = document.getElementById('adv-cliente-input');
  if (!sug || !inp) {
    document.removeEventListener('click', advClienteOutsideClick, true);
    return;
  }
  if (!sug.contains(e.target) && e.target !== inp) {
    closeAdvClienteSuggest();
  }
}

function advClienteSuggest() {
  const inp = document.getElementById('adv-cliente-input');
  const sug = document.getElementById('adv-cliente-suggest');
  if (!inp || !sug) return;
  const q = inp.value.trim().toLowerCase();
  // Si vacio y no esta enfocado, no mostrar nada (al focus siempre mostrar top 10)
  const sel = new Set((advFiltersDraft.clientes || []).map(id => parseInt(id)));
  let matches = clientes.filter(c => !sel.has(c.id));
  if (q !== '') {
    matches = matches.filter(c => (c.nombre || '').toLowerCase().includes(q));
  }
  matches = matches.slice(0, 12);
  if (matches.length === 0) {
    sug.style.display = 'none';
    return;
  }
  let h = '';
  matches.forEach(c => {
    h += '<div onclick="advAddCliente(' + c.id + ')" style="padding:6px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid #F0EEE6" onmouseover="this.style.background=\'#F5FAFF\'" onmouseout="this.style.background=\'\'">' + escapeHtml(c.nombre) + '</div>';
  });
  sug.innerHTML = h;
  sug.style.display = 'block';
}
function closeAdvClienteSuggest() {
  const sug = document.getElementById('adv-cliente-suggest');
  if (sug) sug.style.display = 'none';
}
function advAddCliente(id) {
  if (!advFiltersDraft.clientes) advFiltersDraft.clientes = [];
  if (!advFiltersDraft.clientes.includes(id)) advFiltersDraft.clientes.push(id);
  // Limpiar input y re-render solo del panel
  closeAdvClienteSuggest();
  refreshAdvFiltersPanel();
  // Foco en el input para que pueda seguir agregando
  setTimeout(() => {
    const inp = document.getElementById('adv-cliente-input');
    if (inp) { inp.value = ''; inp.focus(); }
  }, 10);
}
function advRemoveCliente(id) {
  advFiltersDraft.clientes = (advFiltersDraft.clientes || []).filter(x => parseInt(x) !== parseInt(id));
  refreshAdvFiltersPanel();
}
function advClearField(field) {
  advFiltersDraft[field] = '';
  refreshAdvFiltersPanel();
}
function advFechaPresetChange() {
  const sel = document.getElementById('adv-fecha-preset');
  if (!sel) return;
  advFiltersDraft.fechaPreset = sel.value;
  if (sel.value !== 'rango') {
    advFiltersDraft.fechaDesde = null;
    advFiltersDraft.fechaHasta = null;
  }
  // Si cambia a algo distinto de "rango", aplicar inmediato (no hay inputs por confirmar)
  // Si cambia a "rango", solo re-renderizar para mostrar inputs
  if (sel.value === 'rango') refreshAdvFiltersPanel();
  else { refreshAdvFiltersPanel(); advApply(); }
}
function advFechaRangeChange() {
  const desde = document.getElementById('adv-fecha-desde');
  const hasta = document.getElementById('adv-fecha-hasta');
  advFiltersDraft.fechaDesde = desde && desde.value ? desde.value : null;
  advFiltersDraft.fechaHasta = hasta && hasta.value ? hasta.value : null;
  // Aplica inmediato (date inputs ya son confirmacion)
  advApply();
}
function advClearAll() {
  advFiltersDraft = JSON.parse(JSON.stringify(DEFAULT_ADV_FILTERS));
  advApply(true);  // skipReadInputs: no pisar el draft con los valores viejos del DOM
}
function advApply(skipReadInputs) {
  // Si no se pidio skipReadInputs, leer los valores de los inputs por si el
  // usuario tipeo algo sin confirmar. (Cuando viene de "Limpiar todo", no.)
  if (!skipReadInputs) {
    const pn = document.getElementById('adv-proyecto-nro');
    const ped = document.getElementById('adv-pedido-nro');
    const dp = document.getElementById('adv-desc-proyecto');
    const di = document.getElementById('adv-desc-item');
    if (pn) advFiltersDraft.proyectoNro = pn.value;
    if (ped) advFiltersDraft.pedidoNro = ped.value;
    if (dp) advFiltersDraft.descProyecto = dp.value;
    if (di) advFiltersDraft.descItem = di.value;
  }
  advFilters = JSON.parse(JSON.stringify(advFiltersDraft));
  saveAdvFilters(advFilters);
  render();
}
function refreshAdvFiltersPanel() {
  // Re-render solo del panel sin tocar el resto del listado
  const panel = document.getElementById('adv-filters-panel');
  if (panel) {
    panel.innerHTML = renderAdvFiltersPanelHtml();
    wireAdvFiltersPanelEvents();
  } else {
    render();
  }
}
function toggleAdvFiltersPanel() {
  setAdvFiltersPanelOpen(!advFiltersPanelOpen);
  // Sincronizar draft con filtros actuales al abrir
  if (advFiltersPanelOpen) advFiltersDraft = JSON.parse(JSON.stringify(advFilters));
  render();
}

function advOpenClienteModal() {

  const m = document.createElement('div'); m.className = 'md';

  m.style.flexDirection = 'column';

  bd.appendChild(m); document.body.appendChild(bd);

function advCliModalRender() {
  const list = document.getElementById('adv-cli-modal-list');
  const search = document.getElementById('adv-cli-modal-search');
  if (!list) return;
  const q = (search ? search.value : '').trim().toLowerCase();
  const sel = new Set((advFiltersDraft.clientes || []).map(id => parseInt(id)));
  let matches = clientes.slice();
  if (q !== '') matches = matches.filter(c => (c.nombre || '').toLowerCase().includes(q));
  matches.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
  let h = '';
  matches.forEach(c => {
    const isSel = sel.has(c.id);
    h += '<div onclick="advCliModalToggle(' + c.id + ')" style="padding:8px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid #F0EEE6;background:' + (isSel ? '#E8F2FC' : '#fff') + ';display:flex;justify-content:space-between;align-items:center" onmouseover="if(!this.dataset.sel)this.style.background=\'#F5FAFF\'" onmouseout="this.style.background=\'' + (isSel ? '#E8F2FC' : '#fff') + '\'">';
    h += '<span>' + escapeHtml(c.nombre) + '</span>';
    h += '<span style="color:' + (isSel ? '#2E72B8' : '#C8C6BE') + ';font-weight:700">' + (isSel ? '✓' : '+') + '</span>';
    h += '</div>';
  });
  if (matches.length === 0) h = '<div style="padding:16px;text-align:center;color:#888;font-size:12px">Sin resultados</div>';
  list.innerHTML = h;
}
function advCliModalToggle(id) {
  if (!advFiltersDraft.clientes) advFiltersDraft.clientes = [];
  const idx = advFiltersDraft.clientes.findIndex(x => parseInt(x) === parseInt(id));
  if (idx >= 0) advFiltersDraft.clientes.splice(idx, 1);
  else advFiltersDraft.clientes.push(id);
  advCliModalRender();
  refreshAdvFiltersPanel();
}

// ========== Cliente combobox ==========
function renderClienteCombo() {
  const search = document.getElementById('f-cliente-search');
  const list = document.getElementById('f-cliente-list');
  if (!search || !list) return;
  const q = search.value.trim().toLowerCase();
  const filtered = clientes.filter(c => !q || c.nombre.toLowerCase().includes(q));
  if (filtered.length === 0) {
    list.innerHTML = '<div class="combo-empty">No hay clientes que coincidan con "' + escapeHtml(q) + '"</div>';
  } else {
    list.innerHTML = filtered.map(c =>
      '<div class="combo-item" onmousedown="selectClienteCombo(' + c.id + ', \'' + c.nombre.replace(/'/g, "\\'") + '\')">' +
      escapeHtml(c.nombre) + '</div>'
    ).join('');
  }
  list.style.display = 'block';
}
function selectClienteCombo(id, nombre) {
  document.getElementById('f-cliente').value = id;
  document.getElementById('f-cliente-search').value = nombre;
  document.getElementById('f-cliente-list').style.display = 'none';
}
function closeClienteCombo() {
  const list = document.getElementById('f-cliente-list');
  if (list) list.style.display = 'none';
}

async function saveNewProject() {
  const cliente_id = parseInt(document.getElementById('f-cliente').value);
  const pedido_nro = document.getElementById('f-pedido').value.trim() || null;
  const descripcion = document.getElementById('f-desc').value.trim();
  const urgencia = document.getElementById('f-urg').value;
  const estado = document.getElementById('f-estado').value;
  const itemDesc = document.getElementById('f-item-desc').value.trim();
  const itemCant = parseInt(document.getElementById('f-item-cant').value) || 1;
  const itemMat = document.getElementById('f-item-mat').value.trim() || null;
  const itemPres = document.getElementById('f-item-pres').value.trim() || null;
  const itemFechaFin = document.getElementById('f-item-fechafin').value || null;
  const itemFotoUrl = document.getElementById('photo-url-item').value.trim() || null;
  const itemEstadoEl = document.getElementById('f-item-estado');
  const itemEstado = itemEstadoEl ? itemEstadoEl.value : 'Espera MP';
  const fotoUrl = document.getElementById('photo-url-proj').value.trim() || null;
  const fechaIngreso = document.getElementById('f-fechaing').value || null;
  const fechaEntrega = document.getElementById('f-fechaentrega').value || null;
  const clienteFinal = document.getElementById('f-clifinal').value.trim() || null;
  const errPedido = document.getElementById('err-pedido');
  errPedido.style.display = 'none';
  if (!cliente_id) { toast('Elegi un cliente', true); return; }
  if (!descripcion) { toast('Ingresa descripcion del proyecto', true); return; }
  if (!fechaEntrega) { toast('Ingresa fecha de entrega del proyecto', true); return; }
  if (!itemDesc) { toast('Ingresa descripcion del primer item', true); return; }
  if (pedido_nro) {
    const dup = proyectos.find(p => p.pedido_nro === pedido_nro);
    if (dup) { errPedido.textContent = 'Ya existe un proyecto con el pedido ' + pedido_nro + ' (cliente: ' + clN(dup.cliente_id) + ')'; errPedido.style.display = 'block'; return; }
  }
  const { data: newProj, error: projErr } = await sb.from('proyectos').insert({
    cliente_id, pedido_nro, descripcion, urgencia, foto_url: fotoUrl,
    fecha_ingreso: fechaIngreso, fecha_entrega: fechaEntrega,
    cliente_final: clienteFinal, estado
  }).select().single();
  if (projErr) { toast('Error creando proyecto: ' + projErr.message, true); return; }
  const { error: itemErr } = await sb.from('items').insert({
    proyecto_id: newProj.id, cliente_id, pedido_nro,
    descripcion: itemDesc, cantidad: itemCant,
    foto_url: itemFotoUrl, material: itemMat,
    presentacion_mat_prima: itemPres, fecha_fin_estipulada: itemFechaFin,
    estado: itemEstado
  });
  if (itemErr) { toast('Error creando item: ' + itemErr.message, true); return; }
  await loadAll();
  toast('Proyecto creado');
  navigate({ view: 'project', projectId: newProj.id });
}

async function confirmDeleteItemFromList(itemId) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const procCount = actividades.filter(a => a.item_id === itemId && !a.proceso_eliminado).length;
  if (!confirm('¿Eliminar el item "' + item.descripcion + '"' + (procCount > 0 ? ' y sus ' + procCount + ' proceso(s)' : '') + '?')) return;
  await sb.from('actividades_tablero').delete().eq('item_id', itemId);
  await sb.from('items').delete().eq('id', itemId);
  await loadAll();
  toast('Item eliminado');
  render();
}

async function saveProjectMeta() {
  const proj = getProject(nav.projectId);
  if (!proj) return;
  const descripcion = document.getElementById('f-desc').value.trim();
  const urgencia = document.getElementById('f-urg').value;
  const foto = document.getElementById('photo-url-proj').value.trim() || null;
  const fechaIngreso = document.getElementById('f-fechaing').value || null;
  const fechaEntrega = document.getElementById('f-fechaentrega').value || null;
  const clienteFinal = document.getElementById('f-clifinal').value.trim() || null;
  const pedidoNro = document.getElementById('f-pedido').value.trim() || null;
  if (!descripcion) { toast('Descripcion requerida', true); return; }
  // Check unique pedido_nro
  if (pedidoNro) {
    const dup = proyectos.find(p => p.pedido_nro === pedidoNro && p.id !== proj.id);
    if (dup) { toast('Ya existe un proyecto con el pedido ' + pedidoNro, true); return; }
  }
  await sb.from('proyectos').update({
    descripcion, urgencia, foto_url: foto, fecha_ingreso: fechaIngreso,
    fecha_entrega: fechaEntrega,
    cliente_final: clienteFinal, pedido_nro: pedidoNro
  }).eq('id', proj.id);
  // Propagate to items + activities (cliente_id, pedido_nro)
  await sb.from('items').update({ pedido_nro: pedidoNro }).eq('proyecto_id', proj.id);
  // Propagate to activities of all items
  for (const it of proj.items) {
    await sb.from('actividades_tablero').update({
      pedido_nro: pedidoNro, urgencia, foto_proyecto_url: foto,
      descripcion_proyecto: descripcion, fecha_ingreso: fechaIngreso, cliente_final: clienteFinal
    }).eq('item_id', it.id);
  }
  toast('Proyecto actualizado');
  await loadAll();
  render();
}

async function confirmDeleteProject() {
  const proj = getProject(nav.projectId);
  if (!proj) return;
  const procCount = actividades.filter(a => proj.items.map(it => it.id).includes(a.item_id) && !a.proceso_eliminado).length;
  if (!confirm('Eliminar el proyecto "' + (proj.descripcion || '(sin descripcion)') + '" con sus ' + proj.items.length + ' item(s) y ' + procCount + ' proceso(s)?')) return;
  for (const it of proj.items) {
    await sb.from('actividades_tablero').delete().eq('item_id', it.id);
    await sb.from('items').delete().eq('id', it.id);
  }
  await sb.from('proyectos').delete().eq('id', proj.id);
  await loadAll();
  toast('Proyecto eliminado');
  navigate({ view: 'projects' });
}

// ========== PROJECT STATE CHANGE MODAL ==========
// Reglas de transicion:
// - Proyectando -> Confirmado, Perdido (NO se puede ir directo a Cerrado/Anulado)
// - Confirmado -> Cerrado, Anulado, Perdido (cualquiera con pedido)
// - Cerrado -> ningun cambio (estado final)
// - Anulado -> ningun cambio (estado final)
// - Perdido -> Confirmado (si se reactivara)
// La regla "para llegar a Cerrado o Anulado, el proyecto tiene que estar
// actualmente en Confirmado" se implementa filtrando las opciones del select.
function _allowedNextStates(currentEstado) {
  if (currentEstado === 'Proyectando') return ['Proyectando', 'Confirmado', 'Perdido'];
  if (currentEstado === 'Confirmado') return ['Confirmado', 'Cerrado', 'Anulado', 'Perdido'];
  if (currentEstado === 'Cerrado') return ['Cerrado'];  // estado final
  if (currentEstado === 'Anulado') return ['Anulado'];  // estado final
  if (currentEstado === 'Perdido') return ['Perdido', 'Confirmado'];
  return PROJ_STATES.slice();
}

function showProjectStateModal(projectId) {
  const proj = getProject(projectId);
  if (!proj) return;
  const allowedStates = _allowedNextStates(proj.estado);
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'state-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '500px';
  let h = '<div class="md-t">Cambiar estado del proyecto</div>';
  h += '<div style="font-size:12px;color:#5F5E5A;margin-bottom:12px">Estado actual: <b>' + proj.estado + (proj.estado === 'Cerrado' && proj.sub_estado_cerrado ? ' / ' + proj.sub_estado_cerrado : '') + '</b></div>';
  if (allowedStates.length === 1) {
    h += '<div style="background:#F5F3EC;padding:10px;border-radius:5px;font-size:12px;color:#5F5E5A;margin-bottom:14px">Este estado es final, no admite cambios.</div>';
    h += '<div class="actions"><button class="b" onclick="this.closest(\'.mo\').remove()">Cerrar</button></div>';
    m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);
    return;
  }
  h += '<div class="ef"><div class="ef-l">Nuevo estado <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="ps-estado" onchange="onProjStateChange(' + projectId + ')">';
  allowedStates.forEach(st => {
    h += '<option value="' + st + '"' + (st === proj.estado ? ' selected' : '') + '>' + st + '</option>';
  });
  h += '</select></div>';
  h += '<div class="ef" id="ps-sub-wrap" style="display:none">';
  h += '<div class="ef-l">Sub-estado <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="ps-sub">';
  PROJ_STATES_SUB_CERRADO.forEach(s => {
    h += '<option value="' + s + '"' + (s === proj.sub_estado_cerrado ? ' selected' : '') + '>' + s + '</option>';
  });
  h += '</select></div>';
  h += '<div class="ef" id="ps-obs-wrap" style="display:none">';
  h += '<div class="ef-l">Observaciones de anulacion <span style="color:#A32D2D">*</span></div>';
  h += '<textarea class="ef-i" id="ps-obs" rows="3" placeholder="Ej. Cliente se arrepintio, se cobra parcial">' + escapeHtml(proj.observaciones_anulacion || '') + '</textarea></div>';
  // Campo Nº pedido inline. Solo se muestra cuando: (a) el estado nuevo
  // requiere pedido (Confirmado/Cerrado/Anulado), Y (b) el proyecto NO tiene
  // ya un pedido cargado. Asi evitamos pisar valores existentes.
  h += '<div class="ef" id="ps-pedido-wrap" style="display:none">';
  h += '<div class="ef-l">Numero de pedido</div>';
  h += '<input type="text" class="ef-i" id="ps-pedido" placeholder="Si lo dejas vacio, queda con advertencia roja hasta cargarlo">';
  h += '</div>';
  h += '<div class="actions">';
  h += '<button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button>';
  h += '<button class="b b-p" onclick="saveProjectState(' + projectId + ')">Aplicar</button></div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);
  // Disparar onChange inicial para mostrar/ocultar campos segun el estado seleccionado
  onProjStateChange(projectId);
}

function onProjStateChange(projectId) {
  const proj = getProject(projectId);
  const v = document.getElementById('ps-estado').value;
  document.getElementById('ps-sub-wrap').style.display = (v === 'Cerrado') ? 'block' : 'none';
  document.getElementById('ps-obs-wrap').style.display = (v === 'Anulado') ? 'block' : 'none';
  // Nº pedido: solo si el estado nuevo lo requiere y no hay pedido cargado
  const needsPedido = PROJ_STATES_REQUIRE_PEDIDO.has(v) && !proj.pedido_nro;
  document.getElementById('ps-pedido-wrap').style.display = needsPedido ? 'block' : 'none';
}

async function saveProjectState(projectId) {
  const proj = getProject(projectId);
  if (!proj) return;
  const newEstado = document.getElementById('ps-estado').value;
  const newSub = newEstado === 'Cerrado' ? document.getElementById('ps-sub').value : null;
  const newObs = newEstado === 'Anulado' ? document.getElementById('ps-obs').value.trim() : null;
  if (newEstado === 'Anulado' && !newObs) { toast('Las observaciones son obligatorias al anular', true); return; }

  // Pedido inline: tomar lo escrito si el campo se mostro
  const pedidoEl = document.getElementById('ps-pedido');
  const pedidoNew = (pedidoEl && pedidoEl.style.display !== 'none' && pedidoEl.value.trim()) ? pedidoEl.value.trim() : null;
  // Verificar si el wrap del pedido esta visible (puede pasar que el input
  // exista pero el wrap este oculto si el proyecto ya tenia pedido).
  const pedidoWrap = document.getElementById('ps-pedido-wrap');
  const pedidoVisible = pedidoWrap && pedidoWrap.style.display === 'block';

  // Si el estado nuevo requiere pedido y el proyecto NO tiene, y el campo
  // estaba visible y vacio, mostrar advertencia (no bloqueante).
  if (PROJ_STATES_REQUIRE_PEDIDO.has(newEstado) && !proj.pedido_nro && pedidoVisible && !pedidoNew) {
    if (!confirm('Vas a dejar el proyecto sin numero de pedido. Va a aparecer una advertencia roja hasta que lo cargues. ¿Continuar?')) return;
  }

  const payload = {
    estado: newEstado, sub_estado_cerrado: newSub, observaciones_anulacion: newObs
  };
  if (pedidoNew) payload.pedido_nro = pedidoNew;

  await sb.from('proyectos').update(payload).eq('id', projectId);
  await loadAll();
  document.getElementById('state-modal').remove();
  toast('Estado actualizado');
  render();
}

// ========== ITEM FORM ==========

function onItemStateChange() {
  const v = document.getElementById('i-estado').value;
  document.getElementById('i-obs-wrap').style.display = (v === 'Anulado') ? 'block' : 'none';
}

async function saveItem(itemId) {
  const proj = getProject(nav.projectId);
  if (!proj) return;
  const desc = document.getElementById('i-desc').value.trim();
  const cant = parseInt(document.getElementById('i-cant').value) || 1;
  const foto = document.getElementById('photo-url-item').value.trim() || null;
  const material = document.getElementById('i-mat').value.trim() || null;
  const presentacion = document.getElementById('i-pres').value.trim() || null;
  const fechaFin = document.getElementById('i-fechafin').value || null;
  if (!desc) { toast('Descripcion requerida', true); return; }
  let estado = 'Espera MP';
  let obs = null;
  const estadoEl = document.getElementById('i-estado');
  if (estadoEl) {
    estado = estadoEl.value;
    if (estado === 'Anulado') {
      obs = document.getElementById('i-obs').value.trim();
      if (!obs) { toast('Las observaciones son obligatorias al anular', true); return; }
    }
  }
  const payload = {
    descripcion: desc, cantidad: cant, foto_url: foto,
    material, presentacion_mat_prima: presentacion, fecha_fin_estipulada: fechaFin,
    estado, observaciones_anulacion: obs
  };
  if (itemId) {
    await sb.from('items').update(payload).eq('id', itemId);
    // Update related activities (only fields that should propagate)
    const itemActs = actividades.filter(a => a.item_id === itemId && !a.proceso_eliminado);
    for (const a of itemActs) {
      await sb.from('actividades_tablero').update({
        descripcion: desc + ' - ' + (a.proceso || ''),
        foto_url: foto
      }).eq('id', a.id);
    }
    toast('Item actualizado');
  } else {
    payload.proyecto_id = proj.id;
    payload.cliente_id = proj.cliente_id;
    payload.pedido_nro = proj.pedido_nro;
    await sb.from('items').insert(payload);
    toast('Item agregado');
  }
  await loadAll();
  document.getElementById('item-modal').remove();
  render();
}

async function confirmDeleteItem(itemId) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const procCount = actividades.filter(a => a.item_id === itemId && !a.proceso_eliminado).length;
  if (!confirm('Eliminar el item "' + item.descripcion + '" y sus ' + procCount + ' proceso(s)?')) return;
  await sb.from('actividades_tablero').delete().eq('item_id', itemId);
  await sb.from('items').delete().eq('id', itemId);
  await loadAll();
  document.getElementById('item-modal').remove();
  toast('Item eliminado');
  render();
}

// Render the chips of predecessors of a given activity (used in the modal).
function renderPredsChipsHtml(actId) {
  const myPreds = correlatividades.filter(c => c.sucesor_id === actId);
  if (myPreds.length === 0) {
    return '<span style="color:#888780;font-style:italic;font-size:11px">Sin predecesores</span>';
  }
  return myPreds.map(c => {
    const predAct = actividades.find(x => x.id === c.predecesor_id);
    if (!predAct) return '';
    const predItem = items.find(x => x.id === predAct.item_id);
    const predProj = predItem ? proyectos.find(p => p.id === predItem.proyecto_id) : null;
    const label = (predItem ? predItem.descripcion + ' / ' : '') + (predAct.proceso || '?') + (predProj && predProj.pedido_nro ? ' (Ped. ' + predProj.pedido_nro + ')' : '');
    return '<span style="display:inline-flex;align-items:center;gap:4px;background:#E6F1FB;color:#0C447C;padding:2px 6px;border-radius:3px;font-size:11px;font-weight:500">↶ ' + escapeHtml(label) + ' <span onclick="removeCorrelatividad(' + c.id + ')" style="cursor:pointer;font-weight:700;opacity:.6" title="Quitar">×</span></span>';
  }).join('');
}

// Refresh the predecesores chips in the modal if it's currently open.
function refreshPredsInModal() {
  const list = document.getElementById('p-preds-list');
  if (!list) return;
  // Find which proceso the modal is currently editing — encoded in the
  // Save button's onclick: saveProceso(<id>)
  const saveBtn = document.querySelector('#proc-modal button.b-p');
  if (!saveBtn) return;
  const m = (saveBtn.getAttribute('onclick') || '').match(/saveProceso\((\d+)\)/);
  if (!m) return;
  const actId = parseInt(m[1]);
  list.innerHTML = renderPredsChipsHtml(actId);
}

async function moveProceso(procesoId, delta) {
  const proceso = actividades.find(a => a.id === procesoId);
  if (!proceso) return;
  const sameItem = actividades.filter(a => a.item_id === proceso.item_id && !a.proceso_eliminado)
    .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
  const idx = sameItem.findIndex(a => a.id === procesoId);
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= sameItem.length) return;
  const swap = sameItem[newIdx];
  // Swap orden
  await sb.from('actividades_tablero').update({ orden: swap.orden }).eq('id', proceso.id);
  await sb.from('actividades_tablero').update({ orden: proceso.orden }).eq('id', swap.id);
  await loadAll();
  render();
}

// ========== Correlatividad: agregar y eliminar predecesores ==========
async function removeCorrelatividad(corrId) {
  if (!confirm('Quitar este predecesor?')) return;
  await sb.from('correlatividades').delete().eq('id', corrId);
  await loadAll();
  toast('Predecesor quitado');
  refreshPredsInModal();
  render();
}

let predSearchTargetId = null;
function showAddPredecesorModal(sucesorId) {
  predSearchTargetId = sucesorId;
  const sucesor = actividades.find(a => a.id === sucesorId);
  if (!sucesor) return;
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'pred-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '600px';
  let h = '<div class="md-t">Agregar predecesor</div>';
  h += '<div style="font-size:12px;color:#5F5E5A;margin-bottom:10px">Buscar el proceso predecesor por descripcion del item, proyecto, o tipo de proceso.</div>';
  h += '<input type="text" class="ef-i" id="pred-search" placeholder="Buscar..." autocomplete="off" oninput="renderPredecesorList()" style="margin-bottom:10px">';
  h += '<div id="pred-list" style="max-height:380px;overflow-y:auto;border:1px solid #C8C6BE;border-radius:5px"></div>';
  h += '<div class="actions"><button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button></div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);
  renderPredecesorList();
}

function renderPredecesorList() {
  const sucesorId = predSearchTargetId;
  const sucesor = actividades.find(a => a.id === sucesorId);
  if (!sucesor) return;
  const search = document.getElementById('pred-search').value.trim().toLowerCase();
  const existingPredIds = new Set(correlatividades.filter(c => c.sucesor_id === sucesorId).map(c => c.predecesor_id));
  // List of all activities except: itself, already-linked predecessors, and any that would create cycles (will check at insert)
  const candidates = actividades
    .filter(a => a.id !== sucesorId && !existingPredIds.has(a.id))
    .map(a => {
      const it = items.find(x => x.id === a.item_id);
      const pr = it ? proyectos.find(p => p.id === it.proyecto_id) : null;
      const itLabel = it ? it.descripcion : '?';
      const projLabel = pr ? (pr.descripcion || ('P.' + pr.id)) : '?';
      const pedLabel = pr && pr.pedido_nro ? pr.pedido_nro : '-';
      const procLabel = a.proceso || a.descripcion || '?';
      const searchable = (itLabel + ' ' + projLabel + ' ' + pedLabel + ' ' + procLabel).toLowerCase();
      return { a, it, pr, itLabel, projLabel, pedLabel, procLabel, searchable };
    })
    .filter(x => !search || x.searchable.includes(search));
  candidates.sort((x, y) => x.itLabel.localeCompare(y.itLabel));
  const list = document.getElementById('pred-list');
  if (candidates.length === 0) {
    list.innerHTML = '<div style="padding:14px;text-align:center;color:#888780;font-size:11px;font-style:italic">No hay procesos que coincidan.</div>';
    return;
  }
  let h = '';
  candidates.slice(0, 60).forEach(x => {
    h += '<div onclick="addPredecesor(' + x.a.id + ')" style="padding:8px 10px;border-bottom:1px solid #F5F3EC;cursor:pointer;font-size:12px" onmouseenter="this.style.background=\'#E6F1FB\'" onmouseleave="this.style.background=\'\'">';
    h += '<b>' + escapeHtml(x.procLabel) + '</b> — ' + escapeHtml(x.itLabel);
    h += '<div style="font-size:10px;color:#5F5E5A">Proyecto: ' + escapeHtml(x.projLabel) + ' · Pedido: ' + escapeHtml(x.pedLabel) + '</div>';
    h += '</div>';
  });
  list.innerHTML = h;
}

async function addPredecesor(predId) {
  const sucesorId = predSearchTargetId;
  if (!sucesorId) return;
  // Avoid simple cycles: if predId already has sucesorId in its ancestor chain, block
  const ancestors = new Set();
  function gatherAncestors(id) {
    const direct = correlatividades.filter(c => c.sucesor_id === id).map(c => c.predecesor_id);
    direct.forEach(p => { if (!ancestors.has(p)) { ancestors.add(p); gatherAncestors(p); } });
  }
  gatherAncestors(predId);
  if (ancestors.has(sucesorId)) {
    toast('No se puede: crearia un ciclo de correlatividades', true);
    return;
  }
  const { error } = await sb.from('correlatividades').insert({ predecesor_id: predId, sucesor_id: sucesorId });
  if (error) { toast('Error: ' + error.message, true); return; }
  await loadAll();
  // Close only the predecessor-search modal (not the editing modal if it's open)
  const predModal = document.getElementById('pred-modal');
  if (predModal) predModal.remove();
  toast('Predecesor agregado');
  refreshPredsInModal();
  render();
}

async function saveProceso(procesoId) {
  const item = items.find(i => i.id === nav.itemId);
  if (!item) return;
  const proj = getProject(nav.projectId);
  let proceso_cat = document.getElementById('p-proceso').value;
  // Proceso obligatorio: si quedo vacio, no se puede crear/modificar
  if (!proceso_cat || proceso_cat === '') {
    toast('Elegi un proceso (campo obligatorio)', true);
    return;
  }
  if (proceso_cat === 'Otro') {
    const customInput = document.getElementById('p-proceso-custom');
    const customVal = customInput ? customInput.value.trim() : '';
    if (!customVal) { toast('Especifica el proceso (Otro)', true); return; }
    proceso_cat = customVal;
  }
  const dur = parseInt(document.getElementById('p-dur').value);
  const margen = parseInt(document.getElementById('p-margen').value) || 0;
  const tipoEl = document.querySelector('input[name="p-tipo"]:checked');
  const tipo = tipoEl ? tipoEl.value : 'manual';
  const maqVal = document.getElementById('p-maq-ideal').value;
  let maqIdealId = null;
  let maqIdealNombre = null;
  if (!maqVal) { toast('Elegi maquina ideal (o Ninguna/Otra)', true); return; }
  if (maqVal === 'OTRA') {
    const otraVal = document.getElementById('p-maq-otra').value.trim();
    if (!otraVal) { toast('Especifica el nombre de la maquina (Otra)', true); return; }
    maqIdealNombre = otraVal;
  } else if (maqVal === 'NINGUNA') {
    // both null
  } else {
    maqIdealId = parseInt(maqVal);
  }
  const opIdeal = parseInt(document.getElementById('p-op-ideal').value);
  let setup = null;
  if (tipo === 'automatica' || tipo === 'semi_automatica') {
    const v = document.getElementById('p-setup').value.trim();
    if (!v) { toast('Para ' + (tipo === 'automatica' ? 'automaticas' : 'semi-automaticas') + ', ingresa la duracion del setup', true); return; }
    setup = parseInt(v);
  }
  if (!dur || dur < 10) { toast('Duracion estimada minima: 10 min', true); return; }
  if (!opIdeal) { toast('Elegi operario ideal', true); return; }

  const supMaqs = [...chipState.maq];
  const supOps = [...chipState.op];
  const trabajo = document.getElementById('p-trabajo').value.trim() || null;

  const existing = procesoId ? actividades.find(a => a.id === procesoId) : null;
  const isPlanificada = existing && existing.estado && existing.estado !== 'sin_planificar' && existing.fecha !== '1900-01-01';

  // Common payload (without estado/fecha/orden which we handle conditionally)
  const payload = {
    item_id: nav.itemId,
    cliente_id: item.cliente_id,
    pedido_nro: proj.pedido_nro,
    descripcion: item.descripcion + ' - ' + proceso_cat,
    descripcion_proyecto: proj.descripcion,
    descripcion_trabajo: trabajo,
    proceso: proceso_cat,
    duracion_estimada_min: dur,
    duracion_margen_min: margen,
    duracion_operario_min: setup,
    tipo: tipo,
    maquina_ideal_id: maqIdealId,
    maquina_ideal_nombre: maqIdealNombre,
    maquinas_suplentes_ids: supMaqs.length ? supMaqs : null,
    operario_ideal_id: opIdeal,
    operarios_suplentes_ids: supOps.length ? supOps : null,
    urgencia: proj.urgencia,
    foto_proyecto_url: proj.foto_url,
    foto_url: item.foto_url,
    fecha_ingreso: proj.fecha_ingreso,
    cliente_final: proj.cliente_final
  };

  if (procesoId) {
    // Update — DO NOT touch estado, fecha, hora_inicio, orden, duracion_planificador if already planned
    if (!isPlanificada) {
      // Not planned: also reset planificador-driven duration to default
      payload.duracion_planificador_min = dur + margen;
    } else {
      // Planificada: el largo del bloque en el tablero debe quedar congelado
      // al valor previo. El planificador vera el cartel de divergencia y
      // decide si aplica o ignora los cambios.
      // Si duracion_planificador_min es null en la DB (caso legacy), lo
      // congelamos explicitamente al valor anterior de estimada+margen para
      // que el tablero no use el fallback (que tomaria los nuevos estimada+margen).
      const prevPlanLen = existing.duracion_planificador_min;
      if (prevPlanLen === null || prevPlanLen === undefined) {
        const prevEstMargen = (existing.duracion_estimada_min || 0) + (existing.duracion_margen_min || 0);
        payload.duracion_planificador_min = prevEstMargen;
      }
      // El setup (duracion_operario_min) tambien lo aplica D() pero solo
      // indirectamente via Dop(). Para que el setup tampoco cambie el
      // comportamiento del bloque hasta que el planificador aplique:
      // necesitamos guardar el nuevo valor pero el render debe seguir usando
      // el viejo. Esto NO se puede congelar en duracion_operario_min porque
      // ese campo ES el setup nuevo. La unica forma seria una columna paralela
      // (planificador_setup_min). Por simplicidad, dejamos que el setup nuevo
      // se refleje aunque modifique levemente el comportamiento. Si Tomi
      // observa esto como bug futuro, agregamos la columna.
    }
    // Process state, only set if user changed it (only present when editing)
    const peEl = document.getElementById('p-estado');
    if (peEl) payload.estado_proceso = peEl.value;
    await sb.from('actividades_tablero').update(payload).eq('id', procesoId);
    toast('Proceso actualizado');
  } else {
    // New: assign next orden value
    const sameItem = actividades.filter(a => a.item_id === nav.itemId && !a.proceso_eliminado)
      .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
    const maxOrden = sameItem.reduce((mx, a) => Math.max(mx, a.orden || 0), 0);
    payload.orden = maxOrden + 1;
    payload.estado = 'sin_planificar';
    payload.fecha = '1900-01-01';
    payload.hora_inicio = '06:00:00';
    payload.duracion_planificador_min = dur + margen;
    payload.estado_proceso = 'Planificación Pendiente';
    const { data: newAct, error: insErr } = await sb.from('actividades_tablero').insert(payload).select().single();
    if (insErr) { toast('Error: ' + insErr.message, true); return; }
    // Auto-link as successor of the previous proceso of the same item, if any
    if (sameItem.length > 0) {
      const prev = sameItem[sameItem.length - 1];
      await sb.from('correlatividades').insert({
        predecesor_id: prev.id, sucesor_id: newAct.id
      });
    }
    toast('Proceso agregado');
  }
  await loadAll();
  document.getElementById('proc-modal').remove();
  render();
}

async function confirmDeleteProceso(procesoId) {
  const proc = actividades.find(a => a.id === procesoId);
  if (!proc) return;
  const isPlanificada = proc.estado && proc.estado !== 'sin_planificar' && proc.fecha !== '1900-01-01';
  // Si esta planificada, no la borramos: la marcamos como eliminada para que
  // el responsable de planificacion la quite del tablero manualmente con
  // contexto. Si no esta planificada, la borramos directamente porque no
  // afecta a nadie.
  if (isPlanificada) {
    if (!confirm('Eliminar el proceso "' + (proc.proceso || proc.descripcion) + '"?\n\nEsta actividad ya esta planificada en el tablero. Se va a marcar como eliminada y aparecera con un signo de advertencia para que el responsable de planificacion la quite.')) return;
    await sb.from('actividades_tablero').update({ proceso_eliminado: true }).eq('id', procesoId);
    await loadAll();
    toast('Proceso marcado como eliminado (visible en el tablero como advertencia)');
    render();
    return;
  }
  if (!confirm('Eliminar el proceso "' + (proc.proceso || proc.descripcion) + '"?')) return;
  await sb.from('actividades_tablero').delete().eq('id', procesoId);
  await loadAll();
  toast('Proceso eliminado');
  render();
}


// Helpers para modal de proceso
// onTipoChange: actualiza el visual de los radios (border/background del label
// activo), muestra/oculta el campo de setup (solo para semi/auto), y muestra
// la advertencia si la actividad esta planificada y se esta cambiando el tipo.
function onTipoChange() {
  const sel = document.querySelector('input[name="p-tipo"]:checked');
  const wrap = document.getElementById('p-setup-wrap');
  if (sel && wrap) {
    const v = sel.value;
    wrap.style.display = (v === 'automatica' || v === 'semi_automatica') ? '' : 'none';
  }
  // Repintar borde/fondo de cada label segun el radio seleccionado
  document.querySelectorAll('input[name="p-tipo"]').forEach(r => {
    const label = r.closest('label');
    if (!label) return;
    const checked = r.checked;
    const v = r.value;
    let borderColor = '#C8C6BE', bgColor = '#fff';
    if (checked) {
      if (v === 'semi_automatica') { borderColor = '#5C4A8A'; bgColor = '#F0EDF7'; }
      else { borderColor = '#1A1A1A'; bgColor = '#F5F4EE'; }
    }
    label.style.border = '1px solid ' + borderColor;
    label.style.background = bgColor;
  });
  // Mostrar advertencia si el proceso ya esta planificado y se cambio el tipo
  const warn = document.getElementById('p-tipo-warn');
  if (warn) {
    // Comparar contra el tipo original (lo guardamos como data-attr en cualquier
    // de los radios al abrir el modal para no depender de una variable global)
    const original = document.getElementById('p-tipo-wrap')?.dataset?.original;
    if (original && sel && sel.value !== original) warn.style.display = 'block';
    else warn.style.display = 'none';
  }
}
function toggleSetupField() { onTipoChange(); }
// Cuando cambia el proceso seleccionado, ocultar/mostrar el input "Otro" y
// resetear las selecciones de maquina (ideal y suplentes) ya que la maquina
// debe corresponder al proceso. En la Iteracion B se filtraran las opciones
// de maquina segun el proceso elegido. Por ahora solo limpiamos.
function onProcesoChange() {
  const sel = document.getElementById('p-proceso');
  const input = document.getElementById('p-proceso-custom');
  if (!input || !sel) return;
  if (sel.value === 'Otro') { input.style.display = 'block'; input.focus(); }
  else { input.style.display = 'none'; input.value = ''; }
  // Reset de maquina ideal: vuelve a "— elegir —"
  const maqIdeal = document.getElementById('p-maq-ideal');
  if (maqIdeal) {
    maqIdeal.value = '';
    // Ocultar y limpiar el input de "OTRA" si estaba abierto
    const maqOtra = document.getElementById('p-maq-otra');
    if (maqOtra) { maqOtra.style.display = 'none'; maqOtra.value = ''; }
  }
  // Limpiar chips de maquinas suplentes
  if (typeof selectedMachines !== 'undefined') {
    selectedMachines = [];
    const chips = document.getElementById('chips-maq');
    if (chips && typeof renderChipsMaq === 'function') renderChipsMaq();
  }
}
// Alias retrocompatible (por si quedo referenciado en algun lado del DOM
// que ya esta cacheado en la pagina)
function toggleProcCustom() { onProcesoChange(); }
function toggleMaqOtra() {
  const sel = document.getElementById('p-maq-ideal');
  const input = document.getElementById('p-maq-otra');
  if (!input) return;
  if (sel.value === 'OTRA') { input.style.display = 'block'; input.focus(); }
  else { input.style.display = 'none'; input.value = ''; }
}

// Chip multi-select state for machines/operators "suplentes"
const chipState = { maq: new Set(), op: new Set() };
function buildChips(containerId, list, selectedIds, kind) {
  chipState[kind] = new Set(selectedIds);
  renderChips(containerId, list, kind);
}
function renderChips(containerId, list, kind) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  let h = '';
  chipState[kind].forEach(id => {
    const it = list.find(x => x.id === id);
    if (!it) return;
    h += '<span class="chip">' + escapeHtml(it.nombre) + ' <span class="chip-x" onclick="removeChip(\'' + kind + '\',' + id + ')">&times;</span></span>';
  });
  const remaining = list.filter(x => !chipState[kind].has(x.id));
  h += '<input type="text" class="chip-add" id="chip-add-' + kind + '" placeholder="' + (chipState[kind].size === 0 ? 'Agregar...' : '') + '" list="datalist-' + kind + '" onchange="addChipFromInput(\'' + kind + '\')">';
  h += '<datalist id="datalist-' + kind + '">';
  remaining.forEach(it => { h += '<option value="' + escapeHtml(it.nombre) + '">'; });
  h += '</datalist>';
  wrap.innerHTML = h;
}
function addChipFromInput(kind) {
  const input = document.getElementById('chip-add-' + kind);
  const val = input.value.trim();
  if (!val) return;
  const list = kind === 'maq' ? maquinas : operarios;
  const it = list.find(x => x.nombre.toLowerCase() === val.toLowerCase());
  if (!it) { toast('No se encontro: ' + val, true); input.value = ''; return; }
  if (chipState[kind].has(it.id)) { input.value = ''; return; }
  chipState[kind].add(it.id);
  input.value = '';
  renderChips(kind === 'maq' ? 'chips-maq' : 'chips-op', list, kind);
  document.getElementById('chip-add-' + kind).focus();
}
function removeChip(kind, id) {
  chipState[kind].delete(id);
  const list = kind === 'maq' ? maquinas : operarios;
  renderChips(kind === 'maq' ? 'chips-maq' : 'chips-op', list, kind);
}

// Slot de foto:
// - Click en cualquier parte del slot que no sea el boton "Insertar" -> activa
//   el slot (paste con Ctrl+V se pegara aqui).
// - Click en el boton "Insertar" -> abre el explorador de archivos.
// - Drag & drop sobre el slot -> sube el archivo a ese slot.
// La activacion es exclusiva: solo un slot puede estar activo a la vez.
// Si solo hay un slot visible, queda activo automaticamente.
function buildPhotoWrapHtml(currentUrl, kind) {
  let h = '<div class="photo-wrap" id="photo-wrap-' + kind + '" data-kind="' + kind + '" onclick="onSlotClick(event,\'' + kind + '\')" ondragover="onSlotDragOver(event)" ondragleave="onSlotDragLeave(event)" ondrop="onSlotDrop(event,\'' + kind + '\')">';
  if (currentUrl) {
    h += '<img src="' + escapeHtml(currentUrl) + '">';
    h += '<div class="photo-x" onclick="event.stopPropagation();clearPhoto(\'' + kind + '\')">&times;</div>';
  } else {
    h += '<button type="button" class="photo-insert-btn" onclick="event.stopPropagation();document.getElementById(\'photo-input-' + kind + '\').click()">Insertar</button>';
  }
  h += '</div>';
  h += '<input type="file" id="photo-input-' + kind + '" accept="image/*" style="display:none" onchange="onPhotoFile(event,\'' + kind + '\')">';
  h += '<input type="hidden" id="photo-url-' + kind + '" value="' + escapeHtml(currentUrl || '') + '">';
  // Boton "Copiar imagen": copia la foto como blob al portapapeles para
  // pegarla luego en Gmail (Ctrl+V). Solo aparece si hay foto cargada.
  if (currentUrl) {
    h += '<button type="button" class="b" onclick="copyImageToClipboard(\'' + escapeHtml(currentUrl) + '\')" title="Copiar la imagen al portapapeles" style="margin-top:4px;font-size:10px;padding:3px 8px;width:100%">📋 Copiar imagen</button>';
  }
  return h;
}

// Marca un slot como activo (para que paste con Ctrl+V se pegue ahi).
// Desactiva los demas.
function setActiveSlot(kind) {
  document.querySelectorAll('.photo-wrap').forEach(w => {
    w.classList.remove('active');
    const hint = w.querySelector('.photo-paste-hint');
    if (hint) hint.remove();
  });
  const wrap = document.getElementById('photo-wrap-' + kind);
  if (wrap) {
    wrap.classList.add('active');
    if (!wrap.querySelector('.photo-paste-hint')) {
      const hint = document.createElement('div');
      hint.className = 'photo-paste-hint';
      hint.textContent = 'paste';
      wrap.appendChild(hint);
    }
  }
}

// Click en el slot (en area que NO es el boton "Insertar"): solo activa el slot.
function onSlotClick(event, kind) {
  setActiveSlot(kind);
}

function onSlotDragOver(event) {
  event.preventDefault();
  event.currentTarget.classList.add('active');
}
function onSlotDragLeave(event) {
  // Solo quitar el highlight si no es el slot activo de paste
  // (no haremos nada elaborado: si es el activo, lo deja, sino lo saca)
  // Para simplicidad, no quitamos nada aqui — onSlotDrop o setActiveSlot lo manejan
}
async function onSlotDrop(event, kind) {
  event.preventDefault();
  setActiveSlot(kind);
  const dt = event.dataTransfer;
  if (!dt || !dt.files || dt.files.length === 0) return;
  const file = dt.files[0];
  if (!file.type || file.type.indexOf('image') !== 0) {
    toast('Solo se aceptan imagenes', true);
    return;
  }
  await uploadPhotoFile(file, kind);
}

// Auto-activar el slot apropiado cuando se renderiza el form:
// - Si hay slot 'proj' visible (Nuevo Proyecto), ese queda activo por defecto
//   (asi paste cae en proyecto, no en item).
// - Si solo hay slot 'item' visible, ese queda activo.
// - Si solo hay slot 'proj' visible (Editar Proyecto), ese queda activo.
function autoActivateSlot() {
  const projWrap = document.getElementById('photo-wrap-proj');
  const itemWrap = document.getElementById('photo-wrap-item');
  const projVisible = projWrap && projWrap.offsetParent !== null;
  const itemVisible = itemWrap && itemWrap.offsetParent !== null;
  if (projVisible) setActiveSlot('proj');
  else if (itemVisible) setActiveSlot('item');
}

function setupPhotoPaste() {
  // Auto-activa el slot apropiado cada vez que se llama (al abrir un form)
  autoActivateSlot();
  if (window._pastedHooked) return;
  window._pastedHooked = true;
  document.addEventListener('paste', async (e) => {
    // Pega siempre en el slot activo (clase .active). Si no hay slot activo
    // pero hay slots visibles, activa el primero apropiado y pega ahi.
    let activeWrap = document.querySelector('.photo-wrap.active');
    if (!activeWrap) {
      autoActivateSlot();
      activeWrap = document.querySelector('.photo-wrap.active');
    }
    if (!activeWrap) return;
    const kind = activeWrap.dataset.kind;
    if (!kind) return;
    const items_ = (e.clipboardData || e.originalEvent.clipboardData).items;
    for (const it of items_) {
      if (it.type.indexOf('image') !== -1) {
        e.preventDefault();
        const file = it.getAsFile();
        await uploadPhotoFile(file, kind);
        return;
      }
    }
  });
}

async function onPhotoFile(event, kind) {
  const file = event.target.files[0];
  if (file) await uploadPhotoFile(file, kind);
  event.target.value = '';
}

async function uploadPhotoFile(file, kind) {
  const wrap = document.getElementById('photo-wrap-' + kind);
  if (!wrap) return;
  // No destruimos el slot - solo cambiamos el contenido visual
  wrap.innerHTML = '<div class="photo-loading" style="font-size:11px;color:#888">Subiendo...</div>';
  try {
    const ext = (file.name && file.name.split('.').pop()) || (file.type.split('/')[1]) || 'png';
    const filename = kind + '-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8) + '.' + ext;
    const { error } = await sb.storage.from(PHOTO_BUCKET).upload(filename, file, { contentType: file.type });
    if (error) throw error;
    const { data } = sb.storage.from(PHOTO_BUCKET).getPublicUrl(filename);
    const url = data.publicUrl;
    document.getElementById('photo-url-' + kind).value = url;
    // Reconstruir el contenido del slot con la imagen + "X" para borrar
    wrap.innerHTML = '<img src="' + url + '"><div class="photo-x" onclick="event.stopPropagation();clearPhoto(\'' + kind + '\')">&times;</div>';
    // Re-agregar el hint si es el slot activo
    if (wrap.classList.contains('active')) {
      const hint = document.createElement('div');
      hint.className = 'photo-paste-hint';
      hint.textContent = 'paste';
      wrap.appendChild(hint);
    }
    toast('Foto subida');
  } catch (err) {
    console.error(err);
    toast('Error al subir foto: ' + (err.message || err), true);
    wrap.innerHTML = '<button type="button" class="photo-insert-btn" onclick="event.stopPropagation();document.getElementById(\'photo-input-' + kind + '\').click()">Insertar</button>';
  }
}

function clearPhoto(kind) {
  document.getElementById('photo-url-' + kind).value = '';
  const wrap = document.getElementById('photo-wrap-' + kind);
  if (!wrap) return;
  wrap.innerHTML = '<button type="button" class="photo-insert-btn" onclick="event.stopPropagation();document.getElementById(\'photo-input-' + kind + '\').click()">Insertar</button>';
  if (wrap.classList.contains('active')) {
    const hint = document.createElement('div');
    hint.className = 'photo-paste-hint';
    hint.textContent = 'paste';
    wrap.appendChild(hint);
  }
}

      h += '<div class="card-img-empty">' + escapeHtml(c.nombre.charAt(0).toUpperCase()) + '</div>';
      h += '<div class="card-body">';

  }

}

function showClienteForm(clienteId) {
  const cliente = clienteId ? clientes.find(c => c.id === clienteId) : null;
  const isNew = !cliente;
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'cli-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '480px';
  let h = '<div class="md-t">' + (isNew ? 'Nuevo cliente' : 'Editar cliente') + '</div>';
  h += '<div class="ef"><div class="ef-l">Nombre <span style="color:#A32D2D">*</span></div>';
  h += '<input type="text" class="ef-i" id="c-nombre" value="' + escapeHtml(cliente ? cliente.nombre : '') + '" placeholder="Ej. Gente de la Pampa"></div>';
  h += '<div class="ef"><div class="ef-l">CUIT <span style="color:#A32D2D">*</span></div>';
  h += '<input type="text" class="ef-i" id="c-cuit" value="' + escapeHtml(cliente && cliente.cuit ? cliente.cuit : '') + '" placeholder="11 digitos sin guiones" maxlength="11">';
  h += '<div class="ef-help">Ej: 30712345678 (11 digitos exactos, sin guiones).</div>';
  h += '<div class="ef-err" id="err-cuit" style="display:none"></div></div>';
  h += '<div class="row">';
  h += '<div class="ef" style="flex:2"><div class="ef-l">Contacto</div>';
  h += '<input type="text" class="ef-i" id="c-contacto" value="' + escapeHtml(cliente && cliente.contacto ? cliente.contacto : '') + '" placeholder="Nombre de la persona de contacto"></div>';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Telefono</div>';
  h += '<input type="text" class="ef-i" id="c-telefono" value="' + escapeHtml(cliente && cliente.telefono ? cliente.telefono : '') + '" placeholder="Ej. 2302-XXXXXX"></div>';
  h += '</div>';
  h += '<div class="actions">';
  h += '<button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button>';
  h += '<button class="b b-p" onclick="saveCliente(' + (clienteId || 'null') + ')">' + (isNew ? 'Crear' : 'Guardar') + '</button></div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);
}

async function saveCliente(clienteId) {
  const nombre = document.getElementById('c-nombre').value.trim();
  const cuit = document.getElementById('c-cuit').value.trim();
  const contacto = document.getElementById('c-contacto').value.trim() || null;
  const telefono = document.getElementById('c-telefono').value.trim() || null;
  const errCuit = document.getElementById('err-cuit');
  errCuit.style.display = 'none';
  if (!nombre) { toast('Ingresa el nombre', true); return; }
  if (!cuit) { errCuit.textContent = 'CUIT requerido'; errCuit.style.display = 'block'; return; }
  if (!validCuit(cuit)) { errCuit.textContent = 'CUIT debe tener 11 digitos sin guiones'; errCuit.style.display = 'block'; return; }
  const dup = clientes.find(c => c.cuit === cuit && c.id !== clienteId);
  if (dup) { errCuit.textContent = 'Ya existe un cliente con ese CUIT: ' + dup.nombre; errCuit.style.display = 'block'; return; }
  const payload = { nombre, cuit, contacto, telefono };
  if (clienteId) {
    await sb.from('clientes').update(payload).eq('id', clienteId);
    toast('Cliente actualizado');
  } else {
    const { error } = await sb.from('clientes').insert(payload);
    if (error) { toast('Error: ' + error.message, true); return; }
    toast('Cliente creado');
  }
  await loadAll();
  document.getElementById('cli-modal').remove();
  render();
}

async function confirmDeleteCliente(clienteId) {
  const cliente = clientes.find(c => c.id === clienteId);
  if (!cliente) return;
  if (!confirm('Eliminar cliente "' + cliente.nombre + '"?')) return;
  const { error } = await sb.from('clientes').delete().eq('id', clienteId);
  if (error) { toast('Error: ' + error.message, true); return; }
  await loadAll();
  toast('Cliente eliminado');
  render();
}

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Velasco App 2.0 — Proyectos v3</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#FAFAF7;color:#2C2C2A;font-size:13px}
.app{max-width:1100px;margin:0 auto;padding:20px}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #E8E6DF}
.hd h1{font-size:20px;font-weight:700}
.hd-r{display:flex;gap:8px;align-items:center}
.crumbs{display:flex;align-items:center;gap:6px;font-size:12px;color:#5F5E5A;margin-bottom:14px}
.crumbs a{color:#0C447C;cursor:pointer;text-decoration:none}
.crumbs a:hover{text-decoration:underline}
.crumbs .sep{color:#C8C6BE}
.b{padding:7px 14px;border:1px solid #C8C6BE;border-radius:5px;background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:#2C2C2A;font-family:inherit}
.b:hover{filter:brightness(.95)}
.b-p{background:#0C447C;color:#fff;border-color:#0C447C}
.b-p:hover{background:#0A3866}
.b-d{background:#FEF0F0;color:#A32D2D;border-color:#E24B4A}
.b:disabled{opacity:.5;cursor:not-allowed}
.list-empty{padding:30px;text-align:center;color:#888780;background:#fff;border:1px dashed #C8C6BE;border-radius:8px}
.card{background:#fff;border:1px solid #C8C6BE;border-radius:8px;padding:14px 16px;margin-bottom:10px;display:flex;gap:14px;align-items:center}
.card-clickable{cursor:pointer;transition:all .12s}
.card-clickable:hover{border-color:#378ADD;background:#F5FAFF;box-shadow:0 2px 6px rgba(55,138,221,.12)}
.card-img{width:60px;height:60px;border-radius:6px;background:#E8E6DF;flex-shrink:0;object-fit:cover}
.card-img-empty{width:60px;height:60px;border-radius:6px;background:#E8E6DF;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#888780;font-size:9px;text-align:center;padding:4px}
.card-body{flex:1;min-width:0}
.card-t{font-size:14px;font-weight:600;margin-bottom:3px}
.card-s{font-size:11px;color:#5F5E5A;line-height:1.5}
.card-actions{display:flex;gap:4px;flex-shrink:0}
.urg{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;margin-left:6px}
.urg-urgente{background:#1A1A1A;color:#fff}
.urg-alta{background:#FEDADA;color:#A32D2D}
.urg-media{background:#FFF4D5;color:#854F0B}
.urg-baja{background:#E5F5E1;color:#1B6B1B}
.form{background:#fff;border:1px solid #C8C6BE;border-radius:8px;padding:20px;margin-bottom:20px}
.form-t{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #E8E6DF}
.row{display:flex;gap:12px;margin-bottom:12px}
.row > .ef{flex:1}
.ef{margin-bottom:12px}
.ef-l{font-size:11px;color:#5F5E5A;margin-bottom:4px;font-weight:500}
.ef-i{width:100%;padding:7px 10px;border:1px solid #C8C6BE;border-radius:5px;font-size:13px;background:#fff;font-family:inherit}
.ef-i:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.15)}
.ef-i:disabled{background:#F5F3EC;color:#5F5E5A}
.ef-help{font-size:10px;color:#888780;margin-top:3px}
.ef-err{font-size:11px;color:#A32D2D;margin-top:3px;font-weight:500}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid #E8E6DF}
.section-t{font-size:14px;font-weight:600;margin:20px 0 10px;display:flex;justify-content:space-between;align-items:center}
.proc-card{background:#FAFAF7;border:1px solid #E8E6DF;border-radius:6px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.proc-card-body{flex:1;min-width:0}
.proc-card-t{font-weight:600;font-size:12px;margin-bottom:3px}
.proc-card-s{font-size:11px;color:#5F5E5A;line-height:1.6}
.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin-left:4px}
.tag-man{background:#E8E6DF;color:#5F5E5A}
.tag-auto{background:#1A1A1A;color:#fff}
.b-icon{padding:4px 8px;font-size:11px}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center}
.md{background:#fff;border-radius:10px;padding:22px;min-width:480px;max-width:680px;max-height:88vh;overflow-y:auto;border:1px solid #C8C6BE}
.md-t{font-size:16px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #E8E6DF}
.chip-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:5px;border:1px solid #C8C6BE;border-radius:5px;background:#fff;min-height:34px;cursor:text}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 6px 3px 8px;background:#E6F1FB;color:#0C447C;border-radius:4px;font-size:11px;font-weight:500}
.chip-x{cursor:pointer;font-weight:700;opacity:.6}
.chip-x:hover{opacity:1}
.chip-add{flex:1;min-width:80px;border:none;outline:none;font-size:12px;background:transparent;padding:3px}
.photo-wrap{position:relative;width:120px;height:120px;border:2px dashed #C8C6BE;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#FAFAF7;overflow:hidden}
.photo-wrap:hover{border-color:#378ADD;background:#F5FAFF}
.photo-wrap img{width:100%;height:100%;object-fit:cover}
.photo-empty{font-size:11px;color:#888780;text-align:center;padding:10px}
.photo-x{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-weight:700}
.photo-x:hover{background:rgba(0,0,0,.8)}
.photo-loading{font-size:10px;color:#5F5E5A;font-style:italic}
.to{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:10px 24px;border-radius:8px;font-size:12px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.to.sh{opacity:1}
.to.err{background:#A32D2D}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <h1>Proyectos — Metalúrgica Velasco</h1>
    <div class="hd-r">
      <button class="b" onclick="navigate({view:'clientes'})">Clientes</button>
      <button class="b" onclick="window.open('tablero_operarios.html','_blank')">Tablero</button>
      <button class="b b-p" onclick="navigate({view:'newProject'})">+ Nuevo proyecto</button>
    </div>
  </div>
  <div id="crumbs" class="crumbs"></div>
  <div id="main"></div>
</div>
<div class="to" id="to"></div>

<script>
const SB_URL = 'https://mzjbcfkalvduimqhawur.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16amJjZmthbHZkdWltcWhhd3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzY0MzcsImV4cCI6MjA5MDQ1MjQzN30.P7so8AbiRgR9bIWttIqoG6ievY4cxgDMjzZQLx-95-Q';
const sb = supabase.createClient(SB_URL, SB_KEY);
const PHOTO_BUCKET = 'proyecto-fotos';

let clientes = [], maquinas = [], operarios = [], items = [], actividades = [];
let nav = { view: 'projects' };

function toast(msg, isErr) {
  const t = document.getElementById('to');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('sh');
  setTimeout(() => t.classList.remove('sh'), 3500);
}
function clN(id){const c=clientes.find(x=>x.id===id);return c?c.nombre:'?'}
function mN(id){const m=maquinas.find(x=>x.id===id);return m?m.nombre:'?'}
function opN(id){const o=operarios.find(x=>x.id===id);return o?o.nombre:'?'}
function escapeHtml(s){if(s===null||s===undefined)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}
function validCuit(s){return /^\d{11}$/.test(s)}

function getProjects() {
  const map = new Map();
  items.forEach(it => {
    const key = it.cliente_id + '|' + it.pedido_nro;
    if (!map.has(key)) map.set(key, { key, cliente_id: it.cliente_id, pedido_nro: it.pedido_nro, items: [] });
    map.get(key).items.push(it);
  });
  return [...map.values()];
}

function getProjectMeta(projKey) {
  const proj = getProjects().find(p => p.key === projKey);
  if (!proj) return null;
  let firstAct = null;
  for (const it of proj.items) {
    const itemActs = actividades.filter(a => a.item_id === it.id);
    if (itemActs.length) { firstAct = itemActs[0]; break; }
  }
  const saved = sessionStorage.getItem('proj-meta-' + projKey);
  const meta = saved ? JSON.parse(saved) : {};
  return {
    descripcion: (firstAct && firstAct.descripcion_proyecto) || meta.descripcion || '',
    urgencia: (firstAct && firstAct.urgencia) || meta.urgencia || 'media',
    foto_proyecto_url: (firstAct && firstAct.foto_proyecto_url) || meta.foto_proyecto_url || null,
    fecha_ingreso: (firstAct && firstAct.fecha_ingreso) || meta.fecha_ingreso || null,
    cliente_final: (firstAct && firstAct.cliente_final) || meta.cliente_final || null
  };
}

async function loadAll() {
  const [c, m, o, it, a] = await Promise.all([
    sb.from('clientes').select('*').order('nombre'),
    sb.from('maquinas').select('*').order('nombre'),
    sb.from('operarios').select('*').order('nombre'),
    sb.from('items').select('*').order('id'),
    sb.from('actividades_tablero').select('*')
  ]);
  clientes = c.data || []; maquinas = m.data || []; operarios = o.data || [];
  items = it.data || []; actividades = a.data || [];
}

function navigate(newNav) { nav = newNav; render(); }

function renderCrumbs() {
  const c = document.getElementById('crumbs');
  let h = '';
  if (nav.view === 'projects') { c.innerHTML = ''; return; }
  if (nav.view === 'newProject') h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> Nuevo';
  else if (nav.view === 'project') {
    const meta = getProjectMeta(nav.projKey);
    const proj = getProjects().find(p => p.key === nav.projKey);
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> ' +
        escapeHtml(meta && meta.descripcion ? meta.descripcion : (proj ? 'Ped. ' + proj.pedido_nro : 'Proyecto'));
  } else if (nav.view === 'item') {
    const proj = getProjects().find(p => p.key === nav.projKey);
    const meta = getProjectMeta(nav.projKey);
    const item = items.find(i => i.id === nav.itemId);
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> ' +
        '<a onclick="navigate({view:\'project\',projKey:\'' + nav.projKey.replace(/'/g, "\\'") + '\'})">' +
        escapeHtml(meta && meta.descripcion ? meta.descripcion : (proj ? 'Ped. ' + proj.pedido_nro : 'Proyecto')) +
        '</a> <span class="sep">›</span> ' + escapeHtml(item ? item.descripcion : 'Item');
  } else if (nav.view === 'clientes') {
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> Clientes';
  }
  c.innerHTML = h;
}

function render() {
  renderCrumbs();
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (nav.view === 'projects') return renderProjectsList();
  if (nav.view === 'newProject') return renderNewProjectForm();
  if (nav.view === 'project') return renderProjectDetail();
  if (nav.view === 'item') return renderItemDetail();
  if (nav.view === 'clientes') return renderClientesList();
}

function renderProjectsList() {
  const main = document.getElementById('main');
  const projects = getProjects();
  if (projects.length === 0) {
    main.innerHTML = '<div class="list-empty">No hay proyectos cargados todavia.<br><br>Cliquea <b>+ Nuevo proyecto</b> para empezar.</div>';
    return;
  }
  let h = '';
  projects.forEach(p => {
    const meta = getProjectMeta(p.key);
    const img = meta.foto_proyecto_url
      ? '<img src="' + escapeHtml(meta.foto_proyecto_url) + '" class="card-img" onerror="this.style.display=\'none\'">'
      : '<div class="card-img-empty">sin foto</div>';
    const urg = meta.urgencia ? '<span class="urg urg-' + meta.urgencia + '">' + meta.urgencia + '</span>' : '';
    h += '<div class="card card-clickable" onclick="navigate({view:\'project\',projKey:\'' + p.key.replace(/'/g, "\\'") + '\'})">';
    h += img;
    h += '<div class="card-body">';
    h += '<div class="card-t">' + escapeHtml(meta.descripcion || '(sin descripcion)') + urg + '</div>';
    h += '<div class="card-s"><b>' + escapeHtml(clN(p.cliente_id)) + '</b> · Ped. ' + escapeHtml(p.pedido_nro) + ' · ' + p.items.length + ' item(s)</div>';
    h += '</div></div>';
  });
  main.innerHTML = h;
}

function renderNewProjectForm() {
  const main = document.getElementById('main');
  const clientesOpts = clientes.map(c => '<option value="' + c.id + '">' + escapeHtml(c.nombre) + '</option>').join('');
  let h = '<div class="form">';
  h += '<div class="form-t">Nuevo proyecto</div>';
  h += '<div style="font-size:12px;color:#5F5E5A;margin-bottom:14px">Carga los datos del proyecto y al menos un primer item.</div>';
  h += '<div style="display:flex;gap:20px;margin-bottom:14px">';
  h += '<div style="flex-shrink:0"><div class="ef-l">Foto del proyecto</div>' + buildPhotoWrapHtml(null, 'proj') + '</div>';
  h += '<div style="flex:1">';
  h += '<div class="row">';
  h += '<div class="ef" style="flex:2"><div class="ef-l">Cliente <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="f-cliente"><option value="">— elegir —</option>' + clientesOpts + '</select>';
  h += '<div style="margin-top:6px"><button type="button" class="b" style="padding:4px 10px;font-size:11px" onclick="showClienteForm(null)">+ Nuevo cliente</button></div></div>';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Numero de pedido <span style="color:#A32D2D">*</span></div>';
  h += '<input type="text" class="ef-i" id="f-pedido" placeholder="Ej. 4130">';
  h += '<div class="ef-err" id="err-pedido" style="display:none"></div></div></div>';
  h += '<div class="ef"><div class="ef-l">Descripcion del proyecto <span style="color:#A32D2D">*</span></div>';
  h += '<input type="text" class="ef-i" id="f-desc" placeholder="Ej. Bomba centrifuga AJM2000"></div>';
  h += '<div class="row">';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Urgencia <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="f-urg">';
  ['urgente','alta','media','baja'].forEach(u => {
    h += '<option value="' + u + '"' + (u === 'media' ? ' selected' : '') + '>' + u.charAt(0).toUpperCase() + u.slice(1) + '</option>';
  });
  h += '</select></div>';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Fecha de ingreso</div>';
  h += '<input type="date" class="ef-i" id="f-fechaing" value="' + new Date().toISOString().substring(0, 10) + '"></div>';
  h += '</div>';
  h += '<div class="ef"><div class="ef-l">Cliente final (opcional)</div>';
  h += '<input type="text" class="ef-i" id="f-clifinal" placeholder="Ej. GDLP — solo si el cliente directo es Velasco">';
  h += '<div class="ef-help">Para casos como stock interno donde el destinatario real es otro.</div></div>';
  h += '</div></div>';
  h += '<div class="section-t" style="margin-top:24px">Primer item del proyecto <span style="font-size:11px;color:#A32D2D;font-weight:500">* obligatorio</span></div>';
  h += '<div style="background:#FAFAF7;border:1px solid #E8E6DF;border-radius:6px;padding:14px">';
  h += '<div class="row">';
  h += '<div class="ef" style="flex:3"><div class="ef-l">Descripcion del item <span style="color:#A32D2D">*</span></div>';
  h += '<input type="text" class="ef-i" id="f-item-desc" placeholder="Ej. Eje principal"></div>';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Cantidad</div>';
  h += '<input type="number" class="ef-i" id="f-item-cant" value="1" min="1" step="1"></div></div></div>';
  h += '<div class="actions">';
  h += '<button class="b" onclick="navigate({view:\'projects\'})">Cancelar</button>';
  h += '<button class="b b-p" onclick="saveNewProject()">Crear proyecto</button>';
  h += '</div></div>';
  main.innerHTML = h;
  setupPhotoPaste();
}

async function saveNewProject() {
  const cliente_id = parseInt(document.getElementById('f-cliente').value);
  const pedido_nro = document.getElementById('f-pedido').value.trim();
  const descripcion = document.getElementById('f-desc').value.trim();
  const urgencia = document.getElementById('f-urg').value;
  const itemDesc = document.getElementById('f-item-desc').value.trim();
  const itemCant = parseInt(document.getElementById('f-item-cant').value) || 1;
  const fotoUrl = document.getElementById('photo-url-proj').value.trim() || null;
  const fechaIngreso = document.getElementById('f-fechaing').value || null;
  const clienteFinal = document.getElementById('f-clifinal').value.trim() || null;
  const errPedido = document.getElementById('err-pedido');
  errPedido.style.display = 'none';
  if (!cliente_id) { toast('Elegi un cliente', true); return; }
  if (!pedido_nro) { toast('Ingresa numero de pedido', true); return; }
  if (!descripcion) { toast('Ingresa descripcion del proyecto', true); return; }
  if (!itemDesc) { toast('Ingresa descripcion del primer item', true); return; }
  const dup = items.find(it => it.pedido_nro === pedido_nro);
  if (dup) { errPedido.textContent = 'Ya existe un proyecto con el pedido ' + pedido_nro + ' (cliente: ' + clN(dup.cliente_id) + ')'; errPedido.style.display = 'block'; return; }
  const { error: itemErr } = await sb.from('items').insert({
    cliente_id, pedido_nro, descripcion: itemDesc, cantidad: itemCant, foto_url: null
  });
  if (itemErr) { toast('Error creando item: ' + itemErr.message, true); return; }
  const projKey = cliente_id + '|' + pedido_nro;
  sessionStorage.setItem('proj-meta-' + projKey, JSON.stringify({
    descripcion, urgencia, foto_proyecto_url: fotoUrl,
    fecha_ingreso: fechaIngreso, cliente_final: clienteFinal
  }));
  await loadAll();
  toast('Proyecto creado');
  navigate({ view: 'project', projKey });
}

function renderProjectDetail() {
  const main = document.getElementById('main');
  const proj = getProjects().find(p => p.key === nav.projKey);
  if (!proj) { main.innerHTML = '<div class="list-empty">El proyecto no existe.</div>'; return; }
  const meta = getProjectMeta(nav.projKey);
  let h = '<div class="form">';
  h += '<div class="form-t">Proyecto: ' + escapeHtml(meta.descripcion || '(sin descripcion)') + '</div>';
  h += '<div style="display:flex;gap:20px;margin-bottom:14px">';
  h += '<div style="flex-shrink:0"><div class="ef-l">Foto del proyecto</div>' + buildPhotoWrapHtml(meta.foto_proyecto_url, 'proj') + '</div>';
  h += '<div style="flex:1">';
  h += '<div class="row">';
  h += '<div class="ef" style="flex:2"><div class="ef-l">Cliente</div><input type="text" class="ef-i" value="' + escapeHtml(clN(proj.cliente_id)) + '" disabled></div>';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Numero de pedido</div><input type="text" class="ef-i" value="' + escapeHtml(proj.pedido_nro) + '" disabled></div></div>';
  h += '<div class="ef"><div class="ef-l">Descripcion del proyecto</div><input type="text" class="ef-i" id="f-desc" value="' + escapeHtml(meta.descripcion) + '"></div>';
  h += '<div class="row">';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Urgencia</div><select class="ef-i" id="f-urg">';
  ['urgente','alta','media','baja'].forEach(u => {
    h += '<option value="' + u + '"' + (meta.urgencia === u ? ' selected' : '') + '>' + u.charAt(0).toUpperCase() + u.slice(1) + '</option>';
  });
  h += '</select></div>';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Fecha de ingreso</div>';
  h += '<input type="date" class="ef-i" id="f-fechaing" value="' + (meta.fecha_ingreso || '') + '"></div>';
  h += '</div>';
  h += '<div class="ef"><div class="ef-l">Cliente final (opcional)</div>';
  h += '<input type="text" class="ef-i" id="f-clifinal" value="' + escapeHtml(meta.cliente_final || '') + '" placeholder="Solo si el destinatario real es otro"></div>';
  h += '</div></div>';
  h += '<div class="actions" style="margin-top:8px">';
  h += '<button class="b b-d" onclick="confirmDeleteProject()">Eliminar proyecto</button>';
  h += '<button class="b b-p" onclick="saveProjectMeta()">Guardar cambios del proyecto</button></div>';
  h += '<div class="section-t">Items del proyecto <button class="b b-p" onclick="showItemForm(null)">+ Agregar item</button></div>';
  if (proj.items.length === 0) {
    h += '<div class="list-empty" style="padding:20px">Aun no hay items cargados.</div>';
  } else {
    proj.items.forEach(it => {
      const procCount = actividades.filter(a => a.item_id === it.id).length;
      const img = it.foto_url

async function saveProjectMeta() {
  const proj = getProjects().find(p => p.key === nav.projKey);
  if (!proj) return;
  const descripcion = document.getElementById('f-desc').value.trim();
  const urgencia = document.getElementById('f-urg').value;
  const foto = document.getElementById('photo-url-proj').value.trim() || null;
  const fechaIngreso = document.getElementById('f-fechaing').value || null;
  const clienteFinal = document.getElementById('f-clifinal').value.trim() || null;
  if (!descripcion) { toast('Descripcion requerida', true); return; }
  sessionStorage.setItem('proj-meta-' + nav.projKey, JSON.stringify({
    descripcion, urgencia, foto_proyecto_url: foto,
    fecha_ingreso: fechaIngreso, cliente_final: clienteFinal
  }));
  const projItemIds = proj.items.map(it => it.id);
  const projActs = actividades.filter(a => projItemIds.includes(a.item_id));
  for (const a of projActs) {
    await sb.from('actividades_tablero').update({
      urgencia, foto_proyecto_url: foto, descripcion_proyecto: descripcion,
      fecha_ingreso: fechaIngreso, cliente_final: clienteFinal
    }).eq('id', a.id);
    a.urgencia = urgencia; a.foto_proyecto_url = foto; a.descripcion_proyecto = descripcion;
    a.fecha_ingreso = fechaIngreso; a.cliente_final = clienteFinal;
  }
  toast('Proyecto actualizado');
  await loadAll();
  render();
}

async function confirmDeleteProject() {
  const proj = getProjects().find(p => p.key === nav.projKey);
  if (!proj) return;
  const meta = getProjectMeta(nav.projKey);
  const procCount = actividades.filter(a => proj.items.map(it => it.id).includes(a.item_id)).length;
  if (!confirm('Eliminar el proyecto "' + meta.descripcion + '" con sus ' + proj.items.length + ' item(s) y ' + procCount + ' proceso(s)?')) return;
  for (const it of proj.items) {
    await sb.from('actividades_tablero').delete().eq('item_id', it.id);
    await sb.from('items').delete().eq('id', it.id);
  }
  sessionStorage.removeItem('proj-meta-' + nav.projKey);
  await loadAll();
  toast('Proyecto eliminado');
  navigate({ view: 'projects' });
}

async function saveItem(itemId) {
  const proj = getProjects().find(p => p.key === nav.projKey);
  if (!proj) return;
  const desc = document.getElementById('i-desc').value.trim();
  const cant = parseInt(document.getElementById('i-cant').value) || 1;
  const foto = document.getElementById('photo-url-item').value.trim() || null;
  const material = document.getElementById('i-mat').value.trim() || null;
  const presentacion = document.getElementById('i-pres').value.trim() || null;
  const fechaFin = document.getElementById('i-fechafin').value || null;
  if (!desc) { toast('Descripcion requerida', true); return; }
  const payload = {
    descripcion: desc, cantidad: cant, foto_url: foto,
    material, presentacion_mat_prima: presentacion, fecha_fin_estipulada: fechaFin
  };
  if (itemId) {
    await sb.from('items').update(payload).eq('id', itemId);
    // Propagate description and foto change to all activities of this item.
    // The activity's "descripcion" is composed as "<item> - <proceso>".
    const itemActs = actividades.filter(a => a.item_id === itemId);
    for (const a of itemActs) {
      await sb.from('actividades_tablero').update({
        descripcion: desc + ' - ' + (a.proceso || ''),
        foto_url: foto
      }).eq('id', a.id);
    }
    toast('Item actualizado');
  } else {
    payload.cliente_id = proj.cliente_id;
    payload.pedido_nro = proj.pedido_nro;
    await sb.from('items').insert(payload);
    toast('Item agregado');
  }
  await loadAll();
  document.getElementById('item-modal').remove();
  render();
}

function toggleSetupField() {

}
function toggleProcCustom() {
  const sel = document.getElementById('p-proceso');
  const input = document.getElementById('p-proceso-custom');
  if (!input) return;
  if (sel.value === 'Otro') {
    input.style.display = 'block';
    input.focus();
  } else {
    input.style.display = 'none';
    input.value = '';
  }
}

const chipState = { maq: new Set(), op: new Set() };
function buildChips(containerId, items_, selectedIds, kind) { chipState[kind] = new Set(selectedIds); renderChips(containerId, items_, kind); }
function renderChips(containerId, items_, kind) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  let h = '';
  chipState[kind].forEach(id => {
    const item = items_.find(x => x.id === id);
    if (!item) return;
    h += '<span class="chip">' + escapeHtml(item.nombre) + ' <span class="chip-x" onclick="removeChip(\'' + kind + '\',' + id + ')">&times;</span></span>';
  });
  const remaining = items_.filter(x => !chipState[kind].has(x.id));
  h += '<input type="text" class="chip-add" id="chip-add-' + kind + '" placeholder="' + (chipState[kind].size === 0 ? 'Agregar...' : '') + '" list="datalist-' + kind + '" onchange="addChipFromInput(\'' + kind + '\')">';
  h += '<datalist id="datalist-' + kind + '">';
  remaining.forEach(it => { h += '<option value="' + escapeHtml(it.nombre) + '">'; });
  h += '</datalist>';
  wrap.innerHTML = h;
}
function addChipFromInput(kind) {
  const input = document.getElementById('chip-add-' + kind);
  const val = input.value.trim();
  if (!val) return;
  const items_ = kind === 'maq' ? maquinas : operarios;
  const it = items_.find(x => x.nombre.toLowerCase() === val.toLowerCase());
  if (!it) { toast('No se encontro: ' + val, true); input.value = ''; return; }
  if (chipState[kind].has(it.id)) { input.value = ''; return; }
  chipState[kind].add(it.id);
  input.value = '';
  renderChips(kind === 'maq' ? 'chips-maq' : 'chips-op', items_, kind);
  document.getElementById('chip-add-' + kind).focus();
}
function removeChip(kind, id) {
  chipState[kind].delete(id);
  const items_ = kind === 'maq' ? maquinas : operarios;
  renderChips(kind === 'maq' ? 'chips-maq' : 'chips-op', items_, kind);
}

async function saveProceso(procesoId) {
  const item = items.find(i => i.id === nav.itemId);
  if (!item) return;
  let proceso_cat = document.getElementById('p-proceso').value;
  if (proceso_cat === 'Otro') {
    const customInput = document.getElementById('p-proceso-custom');
    const customVal = customInput ? customInput.value.trim() : '';
    if (!customVal) { toast('Especifica el proceso (Otro)', true); return; }
    proceso_cat = customVal;
  }
  const dur = parseInt(document.getElementById('p-dur').value);
  const tipo = document.getElementById('p-tipo').value;
  const maqIdeal = parseInt(document.getElementById('p-maq-ideal').value);
  const opIdeal = parseInt(document.getElementById('p-op-ideal').value);
  let setup = null;
  if (tipo === 'automatica') {
    const v = document.getElementById('p-setup').value.trim();
    if (!v) { toast('Para automaticas, ingresa la duracion del setup', true); return; }
    setup = parseInt(v);
  }
  if (!dur || dur < 10) { toast('Duracion estimada minima: 10 min', true); return; }
  if (!maqIdeal) { toast('Elegi maquina ideal', true); return; }
  if (!opIdeal) { toast('Elegi operario ideal', true); return; }
  const meta = getProjectMeta(nav.projKey);
  const supMaqs = [...chipState.maq];
  const supOps = [...chipState.op];
  const trabajo = document.getElementById('p-trabajo').value.trim() || null;
  const payload = {
    item_id: nav.itemId,
    cliente_id: item.cliente_id,
    pedido_nro: item.pedido_nro,
    descripcion: item.descripcion + ' - ' + proceso_cat,
    descripcion_proyecto: meta.descripcion,
    descripcion_trabajo: trabajo,
    proceso: proceso_cat,
    duracion_estimada_min: dur,
    duracion_margen_min: 0,
    duracion_operario_min: setup,
    tipo: tipo,
    maquina_ideal_id: maqIdeal,
    maquinas_suplentes_ids: supMaqs.length ? supMaqs : null,
    operario_ideal_id: opIdeal,
    operarios_suplentes_ids: supOps.length ? supOps : null,
    urgencia: meta.urgencia,
    foto_proyecto_url: meta.foto_proyecto_url,
    foto_url: item.foto_url,
    fecha_ingreso: meta.fecha_ingreso,

    estado: 'sin_planificar',

}

async function confirmDeleteProceso(procesoId) {
  const proc = actividades.find(a => a.id === procesoId);
  if (!proc) return;
  if (!confirm('Eliminar el proceso "' + (proc.proceso || proc.descripcion) + '"?')) return;
  await sb.from('actividades_tablero').delete().eq('id', procesoId);
  await loadAll();
  toast('Proceso eliminado');
  render();
}

function buildPhotoWrapHtml(currentUrl, kind) {
  let h = '<div class="photo-wrap" id="photo-wrap-' + kind + '" onclick="document.getElementById(\'photo-input-' + kind + '\').click()">';
  if (currentUrl) {
    h += '<img src="' + escapeHtml(currentUrl) + '">';
    h += '<div class="photo-x" onclick="event.stopPropagation();clearPhoto(\'' + kind + '\')">&times;</div>';
  } else {
    h += '<div class="photo-empty">Click o pega para subir</div>';
  }
  h += '</div>';
  h += '<input type="file" id="photo-input-' + kind + '" accept="image/*" style="display:none" onchange="onPhotoFile(event,\'' + kind + '\')">';
  h += '<input type="hidden" id="photo-url-' + kind + '" value="' + escapeHtml(currentUrl || '') + '">';
  return h;
}

function setupPhotoPaste() {
  if (window._pastedHooked) return;
  window._pastedHooked = true;
  document.addEventListener('paste', async (e) => {
    const projWrap = document.getElementById('photo-wrap-proj');
    const itemWrap = document.getElementById('photo-wrap-item');
    let kind = null;
    if (itemWrap && itemWrap.offsetParent !== null) kind = 'item';
    else if (projWrap && projWrap.offsetParent !== null) kind = 'proj';
    if (!kind) return;
    const items_ = (e.clipboardData || e.originalEvent.clipboardData).items;
    for (const it of items_) {
      if (it.type.indexOf('image') !== -1) {
        e.preventDefault();
        const file = it.getAsFile();
        await uploadPhotoFile(file, kind);
        return;
      }
    }
  });
}

async function onPhotoFile(event, kind) {
  const file = event.target.files[0];
  if (file) await uploadPhotoFile(file, kind);
  event.target.value = '';
}

async function uploadPhotoFile(file, kind) {
  const wrap = document.getElementById('photo-wrap-' + kind);
  if (!wrap) return;
  wrap.innerHTML = '<div class="photo-loading">Subiendo...</div>';
  try {
    const ext = (file.name && file.name.split('.').pop()) || (file.type.split('/')[1]) || 'png';
    const filename = kind + '-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8) + '.' + ext;
    const { error } = await sb.storage.from(PHOTO_BUCKET).upload(filename, file, { contentType: file.type });
    if (error) throw error;
    const { data } = sb.storage.from(PHOTO_BUCKET).getPublicUrl(filename);
    const url = data.publicUrl;
    document.getElementById('photo-url-' + kind).value = url;
    wrap.innerHTML = '<img src="' + url + '"><div class="photo-x" onclick="event.stopPropagation();clearPhoto(\'' + kind + '\')">&times;</div>';
    toast('Foto subida');
  } catch (err) {
    console.error(err);
    toast('Error al subir foto: ' + (err.message || err), true);
    wrap.innerHTML = '<div class="photo-empty">Error. Click o pega para reintentar</div>';
  }
}

function clearPhoto(kind) {
  document.getElementById('photo-url-' + kind).value = '';
  document.getElementById('photo-wrap-' + kind).innerHTML = '<div class="photo-empty">Click o pega para subir</div>';
}

function renderClientesList() {
  const main = document.getElementById('main');
  let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  h += '<h2 style="font-size:16px;font-weight:600">Clientes</h2>';
  h += '<button class="b b-p" onclick="showClienteForm(null)">+ Nuevo cliente</button></div>';
  if (clientes.length === 0) {
    h += '<div class="list-empty">No hay clientes cargados.</div>';
  } else {
    clientes.forEach(c => {
      const projCount = getProjects().filter(p => p.cliente_id === c.id).length;
      h += '<div class="card">';
      h += '<div class="card-img-empty">' + escapeHtml(c.nombre.charAt(0).toUpperCase()) + '</div>';
      h += '<div class="card-body">';
      h += '<div class="card-t">' + escapeHtml(c.nombre) + '</div>';
      h += '<div class="card-s">CUIT: ' + escapeHtml(c.cuit || '—') + ' · ' + projCount + ' proyecto(s)</div></div>';
      h += '<div class="card-actions">';
      h += '<button class="b b-icon" onclick="showClienteForm(' + c.id + ')">Editar</button>';
      if (projCount === 0) h += '<button class="b b-icon b-d" onclick="confirmDeleteCliente(' + c.id + ')">Eliminar</button>';
      h += '</div></div>';
    });
  }
  main.innerHTML = h;
}

function showClienteForm(clienteId) {
  const cliente = clienteId ? clientes.find(c => c.id === clienteId) : null;
  const isNew = !cliente;
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'cli-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '480px';
  let h = '<div class="md-t">' + (isNew ? 'Nuevo cliente' : 'Editar cliente') + '</div>';
  h += '<div class="ef"><div class="ef-l">Nombre <span style="color:#A32D2D">*</span></div>';
  h += '<input type="text" class="ef-i" id="c-nombre" value="' + escapeHtml(cliente ? cliente.nombre : '') + '" placeholder="Ej. Gente de la Pampa"></div>';
  h += '<div class="ef"><div class="ef-l">CUIT <span style="color:#A32D2D">*</span></div>';
  h += '<input type="text" class="ef-i" id="c-cuit" value="' + escapeHtml(cliente && cliente.cuit ? cliente.cuit : '') + '" placeholder="11 digitos sin guiones" maxlength="11">';
  h += '<div class="ef-help">Ej: 30712345678 (11 digitos exactos, sin guiones).</div>';
  h += '<div class="ef-err" id="err-cuit" style="display:none"></div></div>';
  h += '<div class="row">';
  h += '<div class="ef" style="flex:2"><div class="ef-l">Contacto</div>';
  h += '<input type="text" class="ef-i" id="c-contacto" value="' + escapeHtml(cliente && cliente.contacto ? cliente.contacto : '') + '" placeholder="Nombre de la persona de contacto"></div>';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Telefono</div>';
  h += '<input type="text" class="ef-i" id="c-telefono" value="' + escapeHtml(cliente && cliente.telefono ? cliente.telefono : '') + '" placeholder="Ej. 2302-XXXXXX"></div>';
  h += '</div>';
  h += '<div class="actions">';
  h += '<button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button>';
  h += '<button class="b b-p" onclick="saveCliente(' + (clienteId || 'null') + ')">' + (isNew ? 'Crear' : 'Guardar') + '</button></div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd);
}

async function saveCliente(clienteId) {
  const nombre = document.getElementById('c-nombre').value.trim();
  const cuit = document.getElementById('c-cuit').value.trim();
  const contacto = document.getElementById('c-contacto').value.trim() || null;
  const telefono = document.getElementById('c-telefono').value.trim() || null;
  const errCuit = document.getElementById('err-cuit');
  errCuit.style.display = 'none';
  if (!nombre) { toast('Ingresa el nombre', true); return; }
  if (!cuit) { errCuit.textContent = 'CUIT requerido'; errCuit.style.display = 'block'; return; }
  if (!validCuit(cuit)) { errCuit.textContent = 'CUIT debe tener 11 digitos sin guiones'; errCuit.style.display = 'block'; return; }
  const dup = clientes.find(c => c.cuit === cuit && c.id !== clienteId);
  if (dup) { errCuit.textContent = 'Ya existe un cliente con ese CUIT: ' + dup.nombre; errCuit.style.display = 'block'; return; }
  const payload = { nombre, cuit, contacto, telefono };
  if (clienteId) {
    await sb.from('clientes').update(payload).eq('id', clienteId);
    toast('Cliente actualizado');
  } else {
    const { error } = await sb.from('clientes').insert(payload);
    if (error) { toast('Error: ' + error.message, true); return; }
    toast('Cliente creado');
  }
  await loadAll();
  document.getElementById('cli-modal').remove();
  render();
}

async function confirmDeleteCliente(clienteId) {
  const cliente = clientes.find(c => c.id === clienteId);
  if (!cliente) return;
  if (!confirm('Eliminar cliente "' + cliente.nombre + '"?')) return;
  const { error } = await sb.from('clientes').delete().eq('id', clienteId);
  if (error) { toast('Error: ' + error.message, true); return; }
  await loadAll();
  toast('Cliente eliminado');
  render();
}

// ========== GENERATE CARPETA (PDF via window.print) ==========
function generateCarpeta(itemId) {
  const item = items.find(i => i.id === itemId);
  if (!item) { toast('Item no encontrado', true); return; }
  const procesos = actividades.filter(a => a.item_id === itemId)
    .sort((a, b) => a.id - b.id);  // sequential order = creation order
  if (procesos.length === 0) { toast('El item no tiene procesos', true); return; }
  const proj = getProjects().find(p => p.key === nav.projKey);
  const meta = getProjectMeta(nav.projKey);
  const cliente = clientes.find(c => c.id === item.cliente_id);

  // Format dd/mm/aaaa
  const fmt = d => { if (!d) return ''; const [y, m, da] = d.split('-'); return da + '/' + m + '/' + y; };
  const itemFoto = item.foto_url || meta.foto_proyecto_url || null;

  // Cliente con cliente final entre paréntesis (estilo "Velasco (para GDLP)")
  const clienteDisplay = (cliente ? cliente.nombre : '?') +
    (meta.cliente_final ? ' (para ' + meta.cliente_final + ')' : '');

  // Build the printable HTML
  let html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<title>Carpeta - ${escapeHtml(item.descripcion)} - Ped. ${escapeHtml(item.pedido_nro)}</title>
<style>
@page { size: A4; margin: 12mm; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; font-size: 11px; color: #000; }
.page { page-break-after: always; }
.page:last-child { page-break-after: auto; }

/* ===== PORTADA ===== */
.cover-header { display: flex; align-items: center; border: 1.5px solid #000; padding: 8px; margin-bottom: 0; }
.cover-header img { height: 28px; margin-right: 14px; }
.cover-header h1 { font-size: 18px; font-weight: 700; flex: 1; text-align: center; }
.cover-info { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
.cover-info td { border: 1px solid #000; padding: 5px 8px; vertical-align: middle; font-size: 11px; }
.cover-info td.label { background: #fff; font-weight: 700; width: 38%; text-transform: uppercase; }
.cover-info td.value { background: #fff; }
.cover-info td.value.bold { font-weight: 700; }

.proc-table { width: 100%; border-collapse: collapse; margin: 14px 0 10px; }
.proc-table th, .proc-table td { border: 1px solid #000; padding: 4px 6px; font-size: 10.5px; text-align: left; }
.proc-table th { background: #E5E5E5; font-weight: 700; text-transform: uppercase; text-align: center; font-size: 9.5px; }
.proc-table td.center { text-align: center; }
.proc-table td.num { width: 28px; text-align: center; }
.proc-table td.realizado { width: 80px; }

.cover-photo { display: flex; justify-content: center; margin-top: 14px; }
.cover-photo img { max-width: 100%; max-height: 320px; object-fit: contain; border: 1px solid #000; }

/* ===== ORDEN DE TRABAJO (mitad de hoja) ===== */
.ot-page { display: flex; flex-direction: column; gap: 10px; height: calc(100vh - 24mm); }
.ot { flex: 1; border: 1.5px solid #000; padding: 6px 10px; display: flex; flex-direction: column; min-height: 0; }
.ot-cut { border: none; border-top: 1px dashed #888; height: 1px; margin: 0; position: relative; }
.ot-cut::before { content: '✂ - - - - - - - cortar aqui - - - - - - -'; position: absolute; top: -7px; left: 50%; transform: translateX(-50%); background: #fff; padding: 0 8px; font-size: 8px; color: #888; letter-spacing: 1px; }
.ot-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; padding-bottom: 4px; border-bottom: 1.5px solid #000; }
.ot-head-l { font-size: 10px; line-height: 1.4; }
.ot-head-l .ot-num { font-size: 13px; font-weight: 700; }
.ot-head-r { text-align: right; font-size: 10px; line-height: 1.4; }
.ot-urg { display: inline-block; padding: 1px 5px; border: 1px solid #000; font-weight: 700; text-transform: uppercase; font-size: 9px; margin-top: 1px; }
.ot-info { width: 100%; border-collapse: collapse; margin: 6px 0 4px; }
.ot-info td { border: 1px solid #000; padding: 3px 6px; font-size: 10px; }
.ot-info td.label { background: #F5F5F5; font-weight: 700; width: 28%; }
.ot-tarea { font-size: 12px; font-weight: 700; padding: 5px 6px; border: 1px solid #000; background: #F5F5F5; margin-top: 3px; }
.ot-trabajo { flex: 1; padding: 6px; border: 1px solid #000; border-top: none; min-height: 60px; font-size: 11px; line-height: 1.5; white-space: pre-wrap; }
.ot-trabajo-empty { color: #888; font-style: italic; }
.ot-completar { margin-top: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 2px 4px; background: #000; color: #fff; }
.ot-fields { width: 100%; border-collapse: collapse; }
.ot-fields td { border: 1px solid #000; padding: 2px 5px; font-size: 9.5px; height: 18px; }
.ot-fields td.label { background: #F5F5F5; font-weight: 700; width: 35%; }
.ot-obs { border: 1px solid #000; padding: 3px 6px; min-height: 30px; font-size: 9.5px; }
.ot-obs-l { font-weight: 700; font-size: 9px; }

@media print {
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .ot-cut::before { background: #fff; }
}
</style></head><body>`;

  // ============= PORTADA =============
  html += `<div class="page">

      <h1>PLANILLA DE TRABAJO</h1>
    </div>
    <table class="cover-info">
      <tr><td class="label">CLIENTE:</td><td class="value bold" colspan="3">${escapeHtml(clienteDisplay)}</td></tr>
      <tr><td class="label">PIEZA:</td><td class="value bold" colspan="3">${escapeHtml(meta.descripcion || '')} - ${escapeHtml(item.descripcion)}</td></tr>
      <tr>
        <td class="label">NUMERO DE PEDIDO:</td><td class="value">${escapeHtml(item.pedido_nro)}</td>
        <td class="label" style="width:18%">CONTACTO:</td><td class="value">${escapeHtml(cliente && cliente.contacto ? cliente.contacto : '')}</td>
      </tr>
      <tr>
        <td class="label">CANTIDAD A REALIZAR:</td><td class="value bold">${item.cantidad}</td>
        <td class="label">TELEFONO:</td><td class="value">${escapeHtml(cliente && cliente.telefono ? cliente.telefono : '')}</td>
      </tr>
      <tr><td class="label">MATERIAL:</td><td class="value" colspan="3">${escapeHtml(item.material || '')}</td></tr>
      <tr><td class="label">PRESENTACION MAT. PRIMA:</td><td class="value" colspan="3">${escapeHtml(item.presentacion_mat_prima || '')}</td></tr>
      <tr><td class="label">FECHA DE INGRESO:</td><td class="value" colspan="3">${fmt(meta.fecha_ingreso)}</td></tr>
      <tr><td class="label">FECHA DE FIN ESTIPULADA:</td><td class="value" colspan="3">${fmt(item.fecha_fin_estipulada)}</td></tr>
      <tr><td class="label">FECHA REAL DE FINALIZACION:</td><td class="value">FECHA:</td><td class="label">HORA:</td><td class="value"></td></tr>
    </table>
    <table class="proc-table">
      <thead><tr><th>Nº</th><th>PROCESO</th><th>RESPONSABLE</th><th>REALIZADO</th></tr></thead>
      <tbody>`;
  procesos.forEach((p, idx) => {
    html += `<tr><td class="num">${idx + 1}</td><td>${escapeHtml((p.proceso || p.descripcion || '').toUpperCase())}</td><td class="center">${escapeHtml(opN(p.operario_ideal_id).toUpperCase())}</td><td class="realizado"></td></tr>`;
  });
  // Add empty rows up to 8 total for visual completeness
  const filled = procesos.length;
  for (let i = filled; i < 8; i++) {
    html += `<tr><td class="num">${i + 1}</td><td></td><td></td><td></td></tr>`;
  }
  html += `</tbody></table>`;
  if (itemFoto) {
    html += `<div class="cover-photo"><img src="${escapeHtml(itemFoto)}"></div>`;
  }
  html += `</div>`;

  // ============= ORDENES DE TRABAJO (2 por hoja) =============
  // Render in pages of 2 procesos each.
  for (let i = 0; i < procesos.length; i += 2) {
    const p1 = procesos[i];
    const p2 = procesos[i + 1];
    html += `<div class="page ot-page">`;
    html += renderOT(p1, i + 1, procesos.length, item, meta, clienteDisplay);
    html += `<hr class="ot-cut">`;
    if (p2) html += renderOT(p2, i + 2, procesos.length, item, meta, clienteDisplay);
    else html += `<div style="flex:1"></div>`;  // empty space if only 1 proceso left
    html += `</div>`;
  }

  html += `<script>window.onload = function() { setTimeout(function() { window.print(); }, 300); }<\/script></body></html>`;

  // Open in new window
  const w = window.open('', '_blank');
  if (!w) { toast('Permitir pop-ups para generar la carpeta', true); return; }
  w.document.open();
  w.document.write(html);
  w.document.close();
}

function renderOT(p, idx, total, item, meta, clienteDisplay) {
  const fmt = d => { if (!d) return ''; const [y, m, da] = d.split('-'); return da + '/' + m + '/' + y; };
  const tarea = (p.proceso || p.descripcion || '').toUpperCase();
  const responsable = opN(p.operario_ideal_id).toUpperCase();
  const maquina = mN(p.maquina_ideal_id);
  const trabajo = p.descripcion_trabajo || '';
  const urg = (meta.urgencia || 'media').toUpperCase();
  return `<div class="ot">
    <div class="ot-head">
      <div class="ot-head-l">
        <div class="ot-num">Orden de Trabajo: ${idx} / ${total}</div>
        <div><b>Cliente:</b> ${escapeHtml(clienteDisplay)}</div>
        <div><b>Pieza:</b> ${escapeHtml(meta.descripcion || '')} - ${escapeHtml(item.descripcion)}</div>
      </div>
      <div class="ot-head-r">
        <div><b>Responsable:</b> ${escapeHtml(responsable)}</div>
        <div><b>Nº de Pedido:</b> ${escapeHtml(item.pedido_nro)}</div>
        <div><b>Cantidad:</b> ${item.cantidad}</div>
        <div>URGENCIA: <span class="ot-urg">${urg}</span></div>
      </div>
    </div>
    <table class="ot-info">
      <tr>
        <td class="label">Tarea:</td><td><b>${escapeHtml(tarea)}</b></td>
        <td class="label" style="width:18%">Material:</td><td>${escapeHtml(item.material || '')}</td>
      </tr>
      <tr>
        <td class="label">Maquina sugerida:</td><td>${escapeHtml(maquina)}</td>
        <td class="label">Forma inicial:</td><td>${escapeHtml(item.presentacion_mat_prima || '')}</td>
      </tr>
    </table>
    <div class="ot-tarea">DETALLE DE TAREAS A REALIZAR:</div>
    <div class="ot-trabajo${trabajo ? '' : ' ot-trabajo-empty'}">${escapeHtml(trabajo) || '(sin detalle)'}</div>
    <div class="ot-completar">COMPLETAR POR EL OPERARIO</div>
    <table class="ot-fields">
      <tr><td class="label">Maquina utilizada:</td><td></td></tr>
      <tr><td class="label">Material utilizado:</td><td></td></tr>
      <tr><td class="label">Fecha y hora de inicio:</td><td></td></tr>
      <tr><td class="label">Fecha y hora de fin:</td><td></td></tr>
      <tr><td class="label">Tiempo requerido:</td><td>______ HS  ______ MIN</td></tr>
    </table>
    <div class="ot-obs"><div class="ot-obs-l">OBSERVACIONES:</div></div>
  </div>`;
}


async function init() { await loadAll(); render(); }
init();
</script>
</body>
</html>

// ========== GENERATE CARPETA (PDF via window.print) ==========
// ============================================================================
// COPIAR PARA MAIL: genera HTML enriquecido con el formato del mail
// estandarizado de Oficina Tecnica y lo copia al portapapeles. Estructura:
//   __Informacion General__ (negrita+subrayado)
//      Cliente, Contacto, Descripcion, Cantidad, Cotizar, Fecha Cotizacion,
//      Cargar Pedido, Fecha Entrega (en rojo), Tel/Mail, Observaciones
//   __Procesos aproximados__ (negrita+subrayado)
//      Lista de items con sus procesos como bullets anidados
//   __Fotos (si hay)__ - solo enumerada (las imagenes se copian aparte)
// ============================================================================
async function copyProjectForMail(projectId) {
  const proj = getProject(projectId);
  if (!proj) { toast('Proyecto no encontrado', true); return; }
  const cli = clientes.find(c => c.id === proj.cliente_id);
  const projItems = items.filter(i => i.proyecto_id === projectId);
  // Helpers de formato
  const fmt = d => {
    if (!d) return '';
    const [y, m, da] = d.split('-');
    return da + '/' + m + '/' + y;
  };
  const sect = txt => '<p style="margin:0 0 4px 0"><b><u>' + escapeHtml(txt) + '</u></b></p>';
  const line = (lbl, val, valStyle) => '<p style="margin:0"><b>' + escapeHtml(lbl) + ':</b>' + (val ? ' ' + (valStyle ? '<span style="' + valStyle + '">' + escapeHtml(val) + '</span>' : escapeHtml(val)) : '') + '</p>';

  // Construir HTML
  let html = '<div style="font-family:Arial,sans-serif;font-size:13px;color:#000;line-height:1.45">';
  // Info general
  html += sect('Información General');
  html += line('Cliente', cli ? cli.nombre : '');
  html += line('Nombre de Contacto', '');
  html += line('Descripción', proj.descripcion || '');
  // Cantidad: si hay un solo item lo ponemos. Si hay varios queda en blanco
  // y se ve cantidad por item en Procesos aproximados.
  if (projItems.length === 1) {
    html += line('Cantidad', String(projItems[0].cantidad || ''));
  } else {
    html += line('Cantidad', '');
  }
  html += line('Cotizar', 'No');
  html += line('Fecha de Cotización', '-');
  html += line('Cargar Pedido', 'Si');
  // Fecha de entrega en rojo
  html += line('Fecha de Entrega', fmt(proj.fecha_entrega), 'color:#A32D2D;font-weight:600');
  html += line('Teléfono o mail de Contacto (si se cree relevante)', '');
  html += line('Observaciones', '');
  html += '<p style="margin:10px 0 0 0">&nbsp;</p>';

  // Procesos aproximados
  html += sect('Procesos aproximados');
  html += '<ul style="margin:6px 0 0 0;padding-left:24px">';
  projItems.forEach((it, idx) => {
    const procs = actividades.filter(a => a.item_id === it.id && !a.proceso_eliminado)
      .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
    const cant = it.cantidad ? ' (Cant.: ' + it.cantidad + ')' : '';
    const verFoto = it.foto_url ? ' (Ver foto ' + (idx + 1) + ')' : '';
    html += '<li style="margin-bottom:2px"><b>' + escapeHtml((it.descripcion || '').toUpperCase()) + '</b>' + escapeHtml(cant + verFoto);
    if (procs.length > 0) {
      html += '<ul style="margin:2px 0 4px 0;padding-left:24px">';
      procs.forEach(p => {
        const procName = p.proceso || '';
        const procDesc = p.descripcion || '';
        const txt = procDesc ? procName + ' — ' + procDesc : procName;
        html += '<li>' + escapeHtml(txt) + '</li>';
      });
      html += '</ul>';
    }
    html += '</li>';
  });
  html += '</ul>';
  html += '<p style="margin:10px 0 0 0">&nbsp;</p>';

  // Fotos (si hay): solo enumeradas
  const itemsConFoto = projItems.filter(it => it.foto_url);
  if (proj.foto_url || itemsConFoto.length > 0) {
    html += sect('Fotos (si hay)');
    let fotoIdx = 1;
    if (proj.foto_url) {
      html += '<p style="margin:0">Foto general del proyecto</p>';
    }
    itemsConFoto.forEach(it => {
      html += '<p style="margin:0">Foto ' + fotoIdx + ': ' + escapeHtml(it.descripcion || '') + '</p>';
      fotoIdx++;
    });
  }
  html += '</div>';

  // Texto plano de fallback (cuando se pega en un editor que no admite HTML)
  let plain = 'Información General\n';
  plain += 'Cliente: ' + (cli ? cli.nombre : '') + '\n';
  plain += 'Descripción: ' + (proj.descripcion || '') + '\n';
  plain += 'Fecha de Entrega: ' + fmt(proj.fecha_entrega) + '\n\n';
  plain += 'Procesos aproximados:\n';
  projItems.forEach((it, idx) => {
    const procs = actividades.filter(a => a.item_id === it.id && !a.proceso_eliminado).sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
    plain += '* ' + (it.descripcion || '').toUpperCase() + (it.cantidad ? ' (Cant.: ' + it.cantidad + ')' : '') + '\n';
    procs.forEach(p => {
      plain += '   * ' + (p.proceso || '') + (p.descripcion ? ' — ' + p.descripcion : '') + '\n';
    });
  });

  // Copiar al portapapeles como text/html + text/plain
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      const item = new ClipboardItem({
        'text/html': new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([plain], { type: 'text/plain' })
      });
      await navigator.clipboard.write([item]);
      toast('Texto copiado. Pegalo en Gmail con Ctrl+V.');
    } else {
      // Fallback: solo texto plano
      await navigator.clipboard.writeText(plain);
      toast('Texto copiado (sin formato). Pegalo en Gmail con Ctrl+V.');
    }
  } catch (e) {
    console.error('Error al copiar:', e);
    toast('No se pudo copiar al portapapeles. Probalo en otro navegador.', true);
  }
}

// Copia una imagen (URL publica) al portapapeles como PNG. Despues podes
// pegarla en Gmail con Ctrl+V y aparece inline. Requiere CORS habilitado
// en el bucket.
async function copyImageToClipboard(url) {
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('No se pudo descargar la imagen (' + resp.status + ')');
    let blob = await resp.blob();
    // El clipboard solo acepta PNG. Si la imagen no es PNG la convertimos
    // dibujandola en un canvas y exportando a PNG.
    if (blob.type !== 'image/png') {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      const blobUrl = URL.createObjectURL(blob);
      await new Promise((res, rej) => {
        img.onload = res;
        img.onerror = () => rej(new Error('No se pudo cargar la imagen'));
        img.src = blobUrl;
      });
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      canvas.getContext('2d').drawImage(img, 0, 0);
      blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      URL.revokeObjectURL(blobUrl);
    }
    const item = new ClipboardItem({ 'image/png': blob });
    await navigator.clipboard.write([item]);
    toast('Imagen copiada. Pegala en Gmail con Ctrl+V.');
  } catch (e) {
    console.error('Error al copiar imagen:', e);
    toast('No se pudo copiar la imagen. Verifica CORS en Supabase Storage.', true);
  }
}

// ============================================================================
// COPIAR PROYECTO: crea un proyecto nuevo con todos los datos del original.
// Se duplican los items con sus procesos. NO se duplican: id, pedido_nro,
// fecha_ingreso (queda hoy), fecha_entrega (queda en blanco), estado (queda
// "Proyectando"). Las fotos se copian referenciando los mismos URLs (no se
// re-suben).
// ============================================================================
async function copyProject(projectId) {
  const proj = getProject(projectId);
  if (!proj) { toast('Proyecto no encontrado', true); return; }
  if (!confirm('¿Crear una copia del proyecto "' + (proj.descripcion || '') + '"? Va a abrir el proyecto nuevo para editar.')) return;

  // 1. Crear el proyecto nuevo
  const { data: newProj, error: errProj } = await sb.from('proyectos').insert({
    cliente_id: proj.cliente_id,
    pedido_nro: null,
    descripcion: proj.descripcion,
    urgencia: proj.urgencia,
    foto_url: proj.foto_url,
    fecha_ingreso: new Date().toISOString().substring(0, 10),
    fecha_entrega: null,
    cliente_final: proj.cliente_final,
    estado: 'Proyectando'
  }).select().single();
  if (errProj || !newProj) {
    console.error(errProj);
    toast('Error al crear copia del proyecto', true);
    return;
  }

  // 2. Copiar items (uno por uno para mantener ids correctos)
  const origItems = items.filter(i => i.proyecto_id === projectId);
  for (const oi of origItems) {
    const { data: newItem, error: errItem } = await sb.from('items').insert({
      proyecto_id: newProj.id,
      descripcion: oi.descripcion,
      cantidad: oi.cantidad,
      material: oi.material,
      presentacion_mat_prima: oi.presentacion_mat_prima,
      foto_url: oi.foto_url,
      fecha_fin_estipulada: null,
      estado: 'Espera MP'
    }).select().single();
    if (errItem || !newItem) {
      console.error(errItem);
      continue;
    }
    // 3. Copiar procesos (actividades) del item. Se reinician los campos
    // de planificacion: la copia arranca como "sin_planificar".
    const origProcs = actividades.filter(a => a.item_id === oi.id && !a.proceso_eliminado)
      .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
    for (const op of origProcs) {
      await sb.from('actividades_tablero').insert({
        item_id: newItem.id,
        proyecto_id: newProj.id,
        descripcion: op.descripcion,
        proceso: op.proceso,
        orden: op.orden,
        duracion_estimada_min: op.duracion_estimada_min,
        duracion_margen_min: op.duracion_margen_min,
        duracion_operario_min: op.duracion_operario_min,
        duracion_planificador_min: op.duracion_planificador_min,
        tipo: op.tipo,
        maquina_ideal_id: op.maquina_ideal_id,
        maquina_ideal_nombre: op.maquina_ideal_nombre,
        operario_ideal_id: op.operario_ideal_id,
        maquinas_suplentes: op.maquinas_suplentes,
        operarios_suplentes: op.operarios_suplentes,
        trabajo_a_realizar: op.trabajo_a_realizar,
        cliente_id: proj.cliente_id,
        pedido_nro: null,
        urgencia: proj.urgencia,
        // La copia arranca SIN planificar
        estado: 'sin_planificar',
        estado_proceso: 'Planificación Pendiente',
        fecha: '1900-01-01',
        hora_inicio: null,
        maquina_id: null,
        operario_id: op.operario_ideal_id,
        es_pulmon: false,
        proceso_eliminado: false
      });
    }
  }

  toast('Proyecto copiado. Editando el nuevo.');
  await loadAll();
  navigate({ view: 'project', projectId: newProj.id });
}

/* Observaciones with ruled lines */

  // ============= PORTADA =============
  // Layout compacto:

  procesos.forEach((p, idx) => {

  // ============= ORDENES DE TRABAJO (2 por hoja) =============
  for (let i = 0; i < procesos.length; i += 2) {

  html += `<script>
// Auto-shrink: reduce font-size hasta que el contenido entre en el padre o
// se llegue al minimo (9pt = ~12px). Si no entra al minimo, se mantiene el
// minimo y el padre lo corta con overflow:hidden.
function fitOne(el, minPx) {
  if (!el) return;
  var parent = el.parentElement;
  if (!parent) return;
  var parentStyle = window.getComputedStyle(parent);
  var maxH = parent.clientHeight - (parseFloat(parentStyle.paddingTop) || 0) - (parseFloat(parentStyle.paddingBottom) || 0);
  if (maxH <= 0) maxH = parent.clientHeight;
  // Empezar con la fuente actual
  var cs = window.getComputedStyle(el);
  var fs = parseFloat(cs.fontSize);
  if (!fs || isNaN(fs)) return;
  var safety = 30;
  while ((el.scrollHeight > maxH + 1 || el.scrollWidth > el.clientWidth + 1) && fs > minPx && safety-- > 0) {
    fs -= 0.5;
    el.style.fontSize = fs + 'px';
  }
}

// Especial para .ot-trabajo-text (detalle de tareas):
// - Primero auto-shrink hasta 9pt (12px).
// - Si despues del shrink al minimo SIGUE sin entrar en su contenedor (es decir
//   hay texto que se cortaria), marca la OT con clase ".grew" para que toda
//   la OT crezca y absorba el contenido completo. Esa OT individual ocupa una
//   hoja sola, pero las demas siguen pegadas de a 2 por hoja porque cada par
//   esta en su propio .ot-page.
function fitTrabajo(el) {
  if (!el) return;
  var trabajo = el.parentElement; // .ot-trabajo
  if (!trabajo) return;
  var ot = trabajo.closest('.ot');
  if (!ot) return;
  // Auto-shrink primero
  fitOne(el, 12);
  // Despues del shrink: comparar scrollHeight vs clientHeight del trabajo.
  // Si scroll excede el visible, el detalle no entra ni a 9pt -> permitir
  // que la OT crezca.
  if (el.scrollHeight > trabajo.clientHeight + 1) {
    ot.classList.add('grew');
  }
}

window.onload = function() {
  // Auto-shrink en todos los .fit-content (single-line)
  document.querySelectorAll('.fit-content').forEach(function(el){ fitOne(el, 12); });
  // Auto-shrink en .fit-content-multi (multilinea, descripcion)
  document.querySelectorAll('.fit-content-multi').forEach(function(el){
    if (el.classList.contains('ot-trabajo-text')) fitTrabajo(el);
    else fitOne(el, 12);
  });
  setTimeout(function() { window.print(); }, 400);
};
<\/script></body></html>`;

// ========== Modal drag ==========
// Allows any .md element to be dragged by its .md-t header.
function makeModalDraggable(modalEl) {
  // Inject the X close button if it isn't already present.
  if (!modalEl.querySelector('.md-x')) {
    const x = document.createElement('div');
    x.className = 'md-x';
    x.textContent = '×';
    x.title = 'Cerrar';
    x.addEventListener('click', (e) => {
      e.stopPropagation();
      const mo = modalEl.closest('.mo');
      if (mo) mo.remove();
    });
    modalEl.appendChild(x);
  }
  // Close on Esc (only the topmost modal)
  if (!window._escHooked) {
    window._escHooked = true;
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      const modals = document.querySelectorAll('.mo');
      if (modals.length === 0) return;
      modals[modals.length - 1].remove();
    });
  }
  const header = modalEl.querySelector('.md-t');
  if (!header) return;
  let dragX = 0, dragY = 0;
  let pos = { x: 0, y: 0 };
  let startPos = { x: 0, y: 0 };
  header.addEventListener('mousedown', (e) => {
    if (e.target.closest('button')) return;  // don't drag if clicking a button
    e.preventDefault();
    dragX = e.clientX;
    dragY = e.clientY;
    startPos = { ...pos };
    function onMove(ev) {
      const dx = ev.clientX - dragX;
      const dy = ev.clientY - dragY;
      pos.x = startPos.x + dx;
      pos.y = startPos.y + dy;
      modalEl.style.transform = 'translate(' + pos.x + 'px, ' + pos.y + 'px)';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}
// Watch for new modals being added to the DOM
const modalObserver = new MutationObserver((mutations) => {
  mutations.forEach(mu => {
    mu.addedNodes.forEach(node => {
      if (node.nodeType !== 1) return;
      if (node.classList && node.classList.contains('mo')) {
        const md = node.querySelector('.md');
        if (md) makeModalDraggable(md);
      }
    });
  });
});
modalObserver.observe(document.body, { childList: true, subtree: true });

}

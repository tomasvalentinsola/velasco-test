      .sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
    subs.forEach(s => {
      const sel = usarPrecarga && st.subconjuntoId && s.id === st.subconjuntoId;
      h += '<option value="' + s.id + '"' + (sel ? ' selected' : '') + '>' + escapeHtml(s.nombre) + '</option>';
    });
  } else {
    subSel.disabled = true;
  }
  subSel.innerHTML = h;
}

// Lee los valores de ruta actualmente seleccionados en el modal.
function _ceLeerRuta() {
  const get = (id) => {
    const el = document.getElementById(id);
    return el && el.value ? parseInt(el.value) : null;
  };
  return {
    clienteId: get('ce-cliente'),
    sectorId: get('ce-sector'),
    equipoId: get('ce-equipo'),
    conjuntoId: get('ce-conjunto'),
    subconjuntoId: get('ce-subconjunto')
  };
}

async function _ceCrear() {
  const st = crearEntidadState;
  if (!st) return;
  const tipo = st.tipo;
  const ruta = _ceLeerRuta();

  // Validaciones de ruta según el tipo
  if (!ruta.clienteId) { toast('Elegí un cliente', true); return; }
  if (tipo !== 'sector' && !ruta.sectorId) { toast('Elegí un sector', true); return; }
  if ((tipo === 'conjunto' || tipo === 'subconjunto' || tipo === 'producto') && !ruta.equipoId) {
    toast('Elegí un equipo', true); return;
  }
  if (tipo === 'subconjunto' && !ruta.conjuntoId) { toast('Elegí un conjunto', true); return; }

  showSpinner('Creando ' + tipo + '...');
  try {
    if (tipo === 'sector') {
      const nombre = (document.getElementById('ce-nombre').value || '').trim();
      if (!nombre) { toast('Ingresá el nombre', true); return; }
      const { data: nuevoSec, error } = await sb.from('sectores').insert({ cliente_id: ruta.clienteId, nombre }).select().single();
      if (error) { toast('Error: ' + error.message, true); return; }
      // v70: auto-crear el equipo default "Sin equipo específico" del sector,
      // así se le pueden colgar conjuntos/productos sin tener que crear un
      // equipo manualmente primero.
      await sb.from('equipos').insert({ sector_id: nuevoSec.id, nombre: 'Sin equipo específico' });

    } else if (tipo === 'equipo') {
      const nombre = (document.getElementById('ce-nombre').value || '').trim();
      if (!nombre) { toast('Ingresá el nombre', true); return; }
      const { error } = await sb.from('equipos').insert({ sector_id: ruta.sectorId, nombre });
      if (error) { toast('Error: ' + error.message, true); return; }

    } else if (tipo === 'conjunto') {
      const nombre = (document.getElementById('ce-nombre').value || '').trim();
      if (!nombre) { toast('Ingresá el nombre', true); return; }
      const { data, error } = await sb.from('conjuntos').insert({ cliente_id: ruta.clienteId, nombre }).select().single();
      if (error) { toast('Error: ' + error.message, true); return; }
      // Vincular al equipo
      await sb.from('equipo_conjuntos').insert({ equipo_id: ruta.equipoId, conjunto_id: data.id, cantidad: 1 });

    } else if (tipo === 'subconjunto') {
      const nombre = (document.getElementById('ce-nombre').value || '').trim();
      if (!nombre) { toast('Ingresá el nombre', true); return; }
      const { data, error } = await sb.from('subconjuntos').insert({ cliente_id: ruta.clienteId, nombre }).select().single();
      if (error) { toast('Error: ' + error.message, true); return; }
      // Vincular al conjunto
      await sb.from('conjunto_subconjuntos').insert({ conjunto_id: ruta.conjuntoId, subconjunto_id: data.id, cantidad: 1 });

    } else if (tipo === 'producto') {
      const desc = (document.getElementById('ce-desc').value || '').trim();
      if (!desc) { toast('La descripción es obligatoria', true); return; }
      const codigo = (document.getElementById('ce-cod').value || '').trim() || null;
      const matVal = document.getElementById('ce-material').value;
      const materialId = matVal ? parseInt(matVal) : null;
      const presentacion = (document.getElementById('ce-presentacion').value || '').trim() || null;
      const { data, error } = await sb.from('productos_matriz').insert({
        descripcion: desc, cliente_id: ruta.clienteId, codigo_cliente: codigo,
        material_id: materialId, presentacion_mat_prima: presentacion,
        updated_at: new Date().toISOString()
      }).select().single();
      if (error) { toast('Error: ' + error.message, true); return; }
      // Asignar a la composición según el nivel más específico
      if (ruta.subconjuntoId) {
        await sb.from('subconjunto_productos').insert({ subconjunto_id: ruta.subconjuntoId, producto_id: data.id, cantidad: 1 });
      } else if (ruta.conjuntoId) {
        await sb.from('conjunto_productos').insert({ conjunto_id: ruta.conjuntoId, producto_id: data.id, cantidad: 1 });
      } else if (ruta.equipoId) {
        await sb.from('equipo_productos').insert({ equipo_id: ruta.equipoId, producto_id: data.id, cantidad: 1 });
      }
      document.getElementById('crear-ent-modal').remove();
      crearEntidadState = null;
      await loadAll();
      toast('Producto creado');
      navigate({ view: 'productoMatriz', productoId: data.id });
      setTimeout(() => { showProcesoForm(null, { tipo: 'producto', parentId: data.id }); }, 100);
      return;
    }

    document.getElementById('crear-ent-modal').remove();
    crearEntidadState = null;
    await loadAll();
    toast(_ceTipoLabel[tipo] + ' creado');
    render();
  } finally {
    hideSpinner();
  }
}

// =============================================================================
// v70: Modal "Editar grupo/conjunto" dentro del proyecto
// =============================================================================
// Permite cambiar la cantidad del conjunto (multiplicador) y las anotaciones.
// Al cambiar la cantidad, recalcula las cantidades de TODOS los items del grupo
// desde las cantidades base de la matriz.

function showEditarGrupoModal(grupoUid) {
  const proj = getProject(nav.projectId);
  if (!proj) return;
  const itemsDelGrupo = proj.items.filter(it => it.grupo_uid === grupoUid);
  if (itemsDelGrupo.length === 0) return;
  const primero = itemsDelGrupo[0];
  const etiqueta = primero.grupo_etiqueta || 'Conjunto';
  const cantActual = primero.grupo_cantidad || 1;
  const notas = primero.grupo_notas || '';
  const conjuntoId = primero.grupo_matriz_conjunto_id;

  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'edit-grupo-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '520px';
  let h = '<div class="md-t">Editar conjunto: ' + escapeHtml(etiqueta) + '</div>';

  h += '<div class="ef"><div class="ef-l">Cantidad de conjuntos</div>';
  h += '<input type="number" class="ef-i" id="eg-cantidad" value="' + cantActual + '" min="1" step="1">';
  h += '<div class="ef-help">Al cambiar este número, se recalculan las cantidades de los ' + itemsDelGrupo.length + ' producto(s) del conjunto, usando las cantidades base de la matriz.</div>';
  h += '</div>';

  h += '<div class="ef"><div class="ef-l">Anotaciones del conjunto</div>';
  h += '<textarea class="ef-i" id="eg-notas" rows="4" placeholder="Notas sobre este conjunto...">' + escapeHtml(notas) + '</textarea>';
  h += '</div>';

  // Aviso si no se puede recalcular (conjunto borrado de la matriz)
  if (!conjuntoId || !conjuntos.find(c => c.id === conjuntoId)) {
    h += '<div style="background:#FEF5E7;color:#854F0B;padding:8px 12px;border-radius:5px;font-size:11px;margin-bottom:10px">El conjunto original ya no existe en la matriz. Podés cambiar las notas, pero el recálculo de cantidades por multiplicador no estará disponible.</div>';
  }

  h += '<div class="actions">';
  h += '<button class="b" onclick="document.getElementById(\'edit-grupo-modal\').remove()">Cancelar</button>';
  h += '<button class="b b-p" onclick="_egGuardar(\'' + grupoUid + '\')">Guardar</button>';
  h += '</div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);
}

async function _egGuardar(grupoUid) {
  const proj = getProject(nav.projectId);
  if (!proj) return;
  const itemsDelGrupo = proj.items.filter(it => it.grupo_uid === grupoUid);
  if (itemsDelGrupo.length === 0) return;
  const nuevaCantidad = parseInt(document.getElementById('eg-cantidad').value) || 1;
  const nuevasNotas = document.getElementById('eg-notas').value.trim();
  const conjuntoId = itemsDelGrupo[0].grupo_matriz_conjunto_id;
  const cantAnterior = itemsDelGrupo[0].grupo_cantidad || 1;

  showSpinner('Actualizando conjunto...');
  try {
    // 1. Actualizar grupo_cantidad y grupo_notas en TODOS los items del grupo
    for (const it of itemsDelGrupo) {
      await sb.from('items').update({
        grupo_cantidad: nuevaCantidad,
        grupo_notas: nuevasNotas
      }).eq('id', it.id);
    }
    // 2. Si la cantidad cambió y el conjunto existe en la matriz, recalcular
    // las cantidades de cada item desde las cantidades base.
    if (nuevaCantidad !== cantAnterior && conjuntoId && conjuntos.find(c => c.id === conjuntoId)) {
      // Expandir el conjunto con multiplicador = nuevaCantidad para obtener
      // las cantidades base × nuevaCantidad.
      const expansion = _expandirConjunto(conjuntoId, nuevaCantidad);
      // Mapear producto_id -> cantidad esperada
      const cantPorProducto = {};
      expansion.productos.forEach(({ prodId, cant }) => { cantPorProducto[prodId] = cant; });
      // Actualizar cada item del grupo según su producto de origen
      for (const it of itemsDelGrupo) {
        const prodId = it.imported_from_matriz_id;
        if (prodId && cantPorProducto[prodId] !== undefined) {
          await sb.from('items').update({ cantidad: cantPorProducto[prodId] }).eq('id', it.id);
        }
      }
    }
    document.getElementById('edit-grupo-modal').remove();
    await loadAll();
    toast('Conjunto actualizado');
    render();
  } finally {
    hideSpinner();
  }
}

// =============================================================================
// v70 Fase 3: MODALES DE EDICIÓN DE CONTENEDORES
// =============================================================================
// Tres modales (Equipo, Conjunto, Subconjunto) para administrar la composición
// sin pasar por el modal del producto. Cada uno permite:
//   - Renombrar el contenedor.
//   - Ver/editar los items que lo componen (subconjuntos/conjuntos/productos).
//   - Cambiar cantidades.
//   - Agregar items existentes o crear nuevos.
//   - Quitar items (desvinculación, no borra el item en sí).

// Estado en memoria mientras el modal está abierto. Lo usamos para acumular
// cambios y mostrarlos en pantalla sin tocar la DB hasta que el usuario "Guarde".
// Estructura:
//   { tipo: 'equipo'|'conjunto'|'subconjunto', id, nombre, items: [...] }
//   donde items es un array de filas con {tipo, id, nombre, cantidad, _new}.
let editContenedorState = null;

function showEditarEquipoModal(equipoId) {
  const eq = equipos.find(e => e.id === equipoId);
  if (!eq) return;
  const items = [];
  // Conjuntos vinculados al equipo
  equipoConjuntos.filter(ec => ec.equipo_id === equipoId).forEach(ec => {
    const c = conjuntos.find(x => x.id === ec.conjunto_id);
    if (c) items.push({ tipo: 'conjunto', id: c.id, nombre: c.nombre, cantidad: ec.cantidad || 1 });
  });
  // Productos directos
  equipoProductos.filter(ep => ep.equipo_id === equipoId).forEach(ep => {
    const p = productosMatriz.find(x => x.id === ep.producto_id);
    if (p) items.push({ tipo: 'producto', id: p.id, nombre: p.descripcion, cantidad: ep.cantidad || 1 });
  });
  editContenedorState = { tipo: 'equipo', id: equipoId, nombre: eq.nombre, items };
  _renderEditarContenedorModal();
}

function showEditarConjuntoModal(conjuntoId) {
  const con = conjuntos.find(c => c.id === conjuntoId);
  if (!con) return;
  const items = [];
  // Subconjuntos vinculados al conjunto
  conjuntoSubconjuntos.filter(cs => cs.conjunto_id === conjuntoId).forEach(cs => {
    const s = subconjuntos.find(x => x.id === cs.subconjunto_id);
    if (s) items.push({ tipo: 'subconjunto', id: s.id, nombre: s.nombre, cantidad: cs.cantidad || 1 });
  });
  // Productos directos
  conjuntoProductos.filter(cp => cp.conjunto_id === conjuntoId).forEach(cp => {
    const p = productosMatriz.find(x => x.id === cp.producto_id);
    if (p) items.push({ tipo: 'producto', id: p.id, nombre: p.descripcion, cantidad: cp.cantidad || 1 });
  });
  editContenedorState = { tipo: 'conjunto', id: conjuntoId, nombre: con.nombre, items, clienteId: con.cliente_id };
  _renderEditarContenedorModal();
}

function showEditarSubconjuntoModal(subconjuntoId) {
  const sub = subconjuntos.find(s => s.id === subconjuntoId);
  if (!sub) return;
  const items = [];
  // Productos del subconjunto
  subconjuntoProductos.filter(sp => sp.subconjunto_id === subconjuntoId).forEach(sp => {
    const p = productosMatriz.find(x => x.id === sp.producto_id);
    if (p) items.push({ tipo: 'producto', id: p.id, nombre: p.descripcion, cantidad: sp.cantidad || 1 });
  });
  editContenedorState = { tipo: 'subconjunto', id: subconjuntoId, nombre: sub.nombre, items, clienteId: sub.cliente_id };
  _renderEditarContenedorModal();
}

// v70: Modal de Editar Sector. El sector es simple: solo nombre. Incluye
// botón eliminar (con las mismas opciones desvincular/borrar todo).
function showEditarSectorModal(sectorId) {
  const sec = sectores.find(s => s.id === sectorId);
  if (!sec) return;
  const esGeneral = _esSectorGeneral(sec);
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'edit-sector-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '480px';
  let h = '<div class="md-t">Editar sector</div>';

async function _esGuardarSector(sectorId) {
  const nombre = (document.getElementById('es-nombre').value || '').trim();
  if (!nombre) { toast('El nombre no puede estar vacío', true); return; }
  showSpinner('Guardando sector...');
  try {
    const { error } = await sb.from('sectores').update({ nombre }).eq('id', sectorId);
    if (error) { toast('Error: ' + error.message, true); return; }
    document.getElementById('edit-sector-modal').remove();

    hideSpinner();
  }
}

function eliminarSector(sectorId) {
  const sec = sectores.find(s => s.id === sectorId);
  if (!sec) return;
  if (_esSectorGeneral(sec)) { toast('No se puede eliminar el sector General', true); return; }
  const eqs = equipos.filter(e => e.sector_id === sectorId);
  // ¿Tiene contenido real? (equipos no-default o productos)
  let totalProds = 0;
  eqs.forEach(e => { totalProds += _matrizProdIdsEquipo(e.id).size; });
  const eqsReales = eqs.filter(e => !_esEquipoDefault(e));

  const sm = document.getElementById('edit-sector-modal'); if (sm) sm.remove();
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'del-cont-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '480px'; m.style.zIndex = '1100';
  let h = '<div class="md-t">Eliminar sector: ' + escapeHtml(sec.nombre) + '</div>';
  if (eqsReales.length === 0 && totalProds === 0) {
    h += '<div style="font-size:13px;color:#5F5E5A;line-height:1.5;margin-bottom:14px">El sector está vacío. ¿Eliminarlo?</div>';
    h += '<div class="actions">';
    h += '<button class="b" onclick="document.getElementById(\'del-cont-modal\').remove()">Cancelar</button>';
    h += '<button class="b" style="background:#A32D2D;color:#fff;border-color:#A32D2D" onclick="_ejecutarEliminarSector(' + sectorId + ',\'borrar\')">Eliminar</button>';
    h += '</div>';
  } else {
    h += '<div style="font-size:13px;color:#5F5E5A;line-height:1.5;margin-bottom:14px">El sector contiene ' + eqsReales.length + ' equipo(s) y ' + totalProds + ' producto(s) en total. ¿Qué hacer?</div>';
    h += '<div class="actions" style="flex-direction:column;gap:8px;align-items:stretch">';
    h += '<button class="b" style="background:#A32D2D;color:#fff;border-color:#A32D2D" onclick="_confirmarBorrarTodoSector(' + sectorId + ')">Borrar todo (equipos, conjuntos y productos)</button>';
    h += '<button class="b" onclick="document.getElementById(\'del-cont-modal\').remove()">Cancelar</button>';
    h += '</div>';
    h += '<div class="ef-help">Para eliminar un sector con contenido solo está disponible "Borrar todo". Si querés conservar equipos o productos, movélos a otro sector antes (editando cada equipo).</div>';
  }
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd);
}

function _confirmarBorrarTodoSector(sectorId) {
  const eqs = equipos.filter(e => e.sector_id === sectorId);
  let totalProds = 0;
  eqs.forEach(e => { totalProds += _matrizProdIdsEquipo(e.id).size; });
  const dm = document.getElementById('del-cont-modal'); if (dm) dm.remove();
  confirmModal({
    titulo: 'Borrar sector completo',
    mensaje: 'Se eliminará el sector, sus ' + eqs.length + ' equipo(s), sus conjuntos/subconjuntos y se borrarán los productos que no se usen en otro lado (' + totalProds + ' producto(s) aproximadamente). Esta acción no se puede deshacer.',
    textoConfirmar: 'Borrar todo',
    onConfirm: () => _ejecutarEliminarSector(sectorId, 'borrar')
  });
}

async function _ejecutarEliminarSector(sectorId, modo) {
  const dm = document.getElementById('del-cont-modal'); if (dm) dm.remove();
  showSpinner('Eliminando sector...');
  try {
    const eqs = equipos.filter(e => e.sector_id === sectorId);
    // Borrar productos huérfanos, conjuntos, subconjuntos de cada equipo
    for (const eq of eqs) {
      const prodIds = [..._matrizProdIdsEquipo(eq.id)];
      for (const pid of prodIds) {
        if (!_productoUsadoEnOtroLado(pid, 'equipo', eq.id)) {
          // Verificar que no esté en conjuntos de OTROS equipos tampoco —
          // _productoUsadoEnOtroLado ya cubre conjunto/subconjunto/equipo.
          await sb.from('productos_matriz').delete().eq('id', pid);
        }
      }
      const conIds = equipoConjuntos.filter(ec => ec.equipo_id === eq.id).map(ec => ec.conjunto_id);
      for (const cid of conIds) {
        const con = conjuntos.find(c => c.id === cid);
        if (con && _esConjuntoDefault(con)) continue;
        const subIds = conjuntoSubconjuntos.filter(cs => cs.conjunto_id === cid).map(cs => cs.subconjunto_id);
        for (const sid of subIds) {
          await sb.from('subconjuntos').delete().eq('id', sid);
        }
        await sb.from('conjuntos').delete().eq('id', cid);
      }
      await sb.from('equipos').delete().eq('id', eq.id);
    }
    await sb.from('sectores').delete().eq('id', sectorId);
    await loadAll();
    toast('Sector eliminado');
    render();
  } finally {
    hideSpinner();
  }
}

// v70 Fase 5: crear un conjunto/subconjunto/producto nuevo desde el modal de
// agregar componente. El tipo se toma del radio activo. El item nuevo se crea
// en la DB, se agrega a la lista del contenedor en edición, y queda listo.
async function _ecCrearNuevo() {
  const st = editContenedorState;
  if (!st) return;
  const tipo = _ecAddGetTipo();
  // Cliente del contenedor que estamos editando
  let cliId = st.clienteId || null;
  if (st.tipo === 'equipo') {
    const eq = equipos.find(e => e.id === st.id);
    const sec = eq ? sectores.find(s => s.id === eq.sector_id) : null;
    cliId = sec ? sec.cliente_id : null;
  }
  const nombre = prompt('Nombre del ' + tipo + ' nuevo:');
  if (!nombre || !nombre.trim()) return;
  showSpinner('Creando ' + tipo + '...');
  try {
    let nuevoId = null;
    if (tipo === 'conjunto') {
      const { data, error } = await sb.from('conjuntos').insert({ cliente_id: cliId, nombre: nombre.trim() }).select().single();
      if (error) { toast('Error: ' + error.message, true); return; }
      nuevoId = data.id;
    } else if (tipo === 'subconjunto') {
      const { data, error } = await sb.from('subconjuntos').insert({ cliente_id: cliId, nombre: nombre.trim() }).select().single();
      if (error) { toast('Error: ' + error.message, true); return; }
      nuevoId = data.id;
    } else if (tipo === 'producto') {
      const { data, error } = await sb.from('productos_matriz').insert({ cliente_id: cliId, descripcion: nombre.trim(), updated_at: new Date().toISOString() }).select().single();
      if (error) { toast('Error: ' + error.message, true); return; }
      nuevoId = data.id;
    }
    if (nuevoId) {
      // Vincular inmediatamente el item nuevo al contenedor en edición, en la DB.
      // Así aparece en la matriz aunque el usuario no apriete "Guardar".
      if (st.tipo === 'equipo' && tipo === 'conjunto') {
        await sb.from('equipo_conjuntos').insert({ equipo_id: st.id, conjunto_id: nuevoId, cantidad: 1 });
      } else if (st.tipo === 'equipo' && tipo === 'producto') {
        await sb.from('equipo_productos').insert({ equipo_id: st.id, producto_id: nuevoId, cantidad: 1 });
      } else if (st.tipo === 'conjunto' && tipo === 'subconjunto') {
        await sb.from('conjunto_subconjuntos').insert({ conjunto_id: st.id, subconjunto_id: nuevoId, cantidad: 1 });
      } else if (st.tipo === 'conjunto' && tipo === 'producto') {
        await sb.from('conjunto_productos').insert({ conjunto_id: st.id, producto_id: nuevoId, cantidad: 1 });
      } else if (st.tipo === 'subconjunto' && tipo === 'producto') {
        await sb.from('subconjunto_productos').insert({ subconjunto_id: st.id, producto_id: nuevoId, cantidad: 1 });
      }
      // Recargar datos para que el item nuevo esté en las listas globales
      await loadAll();
      // Agregar el item nuevo a la composición en edición
      editContenedorState.items.push({ tipo, id: nuevoId, nombre: nombre.trim(), cantidad: 1 });
      const modal = document.getElementById('ec-agregar-modal');
      if (modal) modal.remove();
      _ecRefreshItems();
      toast(tipo.charAt(0).toUpperCase() + tipo.slice(1) + ' creado y agregado');
    }
  } finally {
    hideSpinner();
  }
}

  // Filtros de jerarquía

  const fequipo = feqEl && feqEl.value ? parseInt(feqEl.value) : null;
  const fconEl = document.getElementById('ec-add-fconjunto');
  const fconjunto = fconEl && fconEl.value ? parseInt(fconEl.value) : null;
  // El filtro material/código solo aplica a productos: ocultarlo si no.
  const filtrosBox = document.getElementById('ec-add-filtros');
  if (filtrosBox) filtrosBox.style.display = (tipo === 'producto') ? 'flex' : 'none';
  // El filtro de jerarquía aplica a productos y subconjuntos.
  const filtrosJer = document.getElementById('ec-add-filtros-jer');
  if (filtrosJer) filtrosJer.style.display = (tipo === 'conjunto') ? 'none' : 'flex';

  // Conjunto de ids permitidos por el filtro de jerarquía (productos).
  // Si no hay filtro de jerarquía activo, queda null (sin restricción).
  let prodIdsJerarquia = null;
  if (tipo === 'producto' && (fconjunto || fequipo || fsector)) {
    prodIdsJerarquia = new Set();
    if (fconjunto) {
      _matrizProdIdsConjunto(fconjunto).forEach(id => prodIdsJerarquia.add(id));
    } else if (fequipo) {
      _matrizProdIdsEquipo(fequipo).forEach(id => prodIdsJerarquia.add(id));
    } else if (fsector) {
      _matrizProdIdsSector(fsector).forEach(id => prodIdsJerarquia.add(id));
    }
  }
  // Para subconjuntos: ids permitidos según jerarquía.
  let subIdsJerarquia = null;
  if (tipo === 'subconjunto' && (fconjunto || fequipo || fsector)) {
    subIdsJerarquia = new Set();
    if (fconjunto) {
      conjuntoSubconjuntos.filter(cs => cs.conjunto_id === fconjunto).forEach(cs => subIdsJerarquia.add(cs.subconjunto_id));
    } else if (fequipo) {
      const conIds = equipoConjuntos.filter(ec => ec.equipo_id === fequipo).map(ec => ec.conjunto_id);
      conjuntoSubconjuntos.filter(cs => conIds.includes(cs.conjunto_id)).forEach(cs => subIdsJerarquia.add(cs.subconjunto_id));
    } else if (fsector) {
      const eqIds = equipos.filter(e => e.sector_id === fsector).map(e => e.id);
      const conIds = equipoConjuntos.filter(ec => eqIds.includes(ec.equipo_id)).map(ec => ec.conjunto_id);
      conjuntoSubconjuntos.filter(cs => conIds.includes(cs.conjunto_id)).forEach(cs => subIdsJerarquia.add(cs.subconjunto_id));
    }
  }

  const yaIds = new Set(st.items.filter(it => it.tipo === tipo).map(it => it.id));
  let candidatos;
  if (tipo === 'producto') {
    candidatos = productosMatriz.filter(p => !yaIds.has(p.id));
    if (st.clienteId) {
      candidatos = candidatos.filter(p => p.cliente_id === st.clienteId || !p.cliente_id);
    }
    if (fmaterial) candidatos = candidatos.filter(p => p.material_id === fmaterial);
    if (fcodigo) candidatos = candidatos.filter(p => (p.codigo_cliente || '').toLowerCase().includes(fcodigo));
    if (prodIdsJerarquia) candidatos = candidatos.filter(p => prodIdsJerarquia.has(p.id));
    candidatos = candidatos.map(p => ({
      id: p.id,
      nombre: p.descripcion || '?',
      sub: [(p.material_id ? (materiales.find(m => m.id === p.material_id) || {}).nombre : null),
            (p.codigo_cliente ? 'Cód: ' + p.codigo_cliente : null)].filter(Boolean).join(' · ')
    }));
  } else if (tipo === 'conjunto') {
    const eq = equipos.find(e => e.id === st.id);
    const cliId = eq ? (sectores.find(s => s.id === eq.sector_id) || {}).cliente_id : null;
    candidatos = conjuntos.filter(c => !yaIds.has(c.id) && (!cliId || c.cliente_id === cliId) && !_esConjuntoDefault(c));
    candidatos = candidatos.map(c => ({ id: c.id, nombre: c.nombre || '?', sub: '' }));
  } else if (tipo === 'subconjunto') {
    candidatos = subconjuntos.filter(s => !yaIds.has(s.id) && (!st.clienteId || s.cliente_id === st.clienteId) && !_esSubconjuntoDefault(s));
    if (subIdsJerarquia) candidatos = candidatos.filter(s => subIdsJerarquia.has(s.id));
    candidatos = candidatos.map(s => ({ id: s.id, nombre: s.nombre || '?', sub: '' }));
  } else {
    candidatos = [];
  }
  if (search) candidatos = candidatos.filter(c => c.nombre.toLowerCase().includes(search));
  candidatos.sort((a, b) => a.nombre.localeCompare(b.nombre));

  const list = document.getElementById('ec-add-list');
  if (!list) return;
  if (candidatos.length === 0) {
    list.innerHTML = '<div style="padding:14px;text-align:center;color:#888;font-size:11px;font-style:italic">Sin resultados con esos filtros.</div>';
    return;
  }
  let h = '';
  candidatos.slice(0, 150).forEach(c => {
    h += '<div onclick="_ecAddElegir(\'' + tipo + '\',' + c.id + ',\'' + escapeHtml(c.nombre).replace(/'/g, "\\'") + '\')" style="padding:7px 10px;border-bottom:1px solid #F5F3EC;cursor:pointer;font-size:12px" onmouseenter="this.style.background=\'#E6F1FB\'" onmouseleave="this.style.background=\'\'">';
    h += '<div style="font-weight:600">' + escapeHtml(c.nombre) + '</div>';
    if (c.sub) h += '<div style="font-size:10px;color:#888">' + escapeHtml(c.sub) + '</div>';
    h += '</div>';
  });
  if (candidatos.length > 150) {
    h += '<div style="padding:8px;text-align:center;color:#888;font-size:10px;font-style:italic">' + (candidatos.length - 150) + ' resultado(s) más. Afiná la búsqueda.</div>';
  }
  list.innerHTML = h;
}

function _ecAddElegir(tipo, id, nombre) {
  if (!editContenedorState) return;
  editContenedorState.items.push({ tipo, id, nombre, cantidad: 1 });
  const modal = document.getElementById('ec-agregar-modal');
  if (modal) modal.remove();
  _ecRefreshItems();
}

// Guardar todos los cambios en la DB.
async function _ecGuardar() {
  if (!editContenedorState) return;
  const st = editContenedorState;
  // 1. Actualizar nombre si cambió
  const nuevoNombre = document.getElementById('ec-nombre').value.trim();
  if (!nuevoNombre) { toast('El nombre no puede estar vacío', true); return; }
  if (nuevoNombre !== st.nombre) {
    const tabla = st.tipo === 'equipo' ? 'equipos' : (st.tipo === 'conjunto' ? 'conjuntos' : 'subconjuntos');
    const { error } = await sb.from(tabla).update({ nombre: nuevoNombre }).eq('id', st.id);
    if (error) { toast('Error al renombrar: ' + error.message, true); return; }
  }
  showSpinner('Guardando composición...');
  try {
  // 2. Sincronizar items: borrar lo que había antes, insertar lo que está ahora.
  // Para cada tipo de tabla afectada según contenedor.
  if (st.tipo === 'equipo') {
    await sb.from('equipo_conjuntos').delete().eq('equipo_id', st.id);
    await sb.from('equipo_productos').delete().eq('equipo_id', st.id);
    const ecRows = st.items.filter(it => it.tipo === 'conjunto').map(it => ({ equipo_id: st.id, conjunto_id: it.id, cantidad: it.cantidad }));
    const epRows = st.items.filter(it => it.tipo === 'producto').map(it => ({ equipo_id: st.id, producto_id: it.id, cantidad: it.cantidad }));
    if (ecRows.length) await sb.from('equipo_conjuntos').insert(ecRows);
    if (epRows.length) await sb.from('equipo_productos').insert(epRows);
  } else if (st.tipo === 'conjunto') {
    await sb.from('conjunto_subconjuntos').delete().eq('conjunto_id', st.id);
    await sb.from('conjunto_productos').delete().eq('conjunto_id', st.id);
    const csRows = st.items.filter(it => it.tipo === 'subconjunto').map(it => ({ conjunto_id: st.id, subconjunto_id: it.id, cantidad: it.cantidad }));
    const cpRows = st.items.filter(it => it.tipo === 'producto').map(it => ({ conjunto_id: st.id, producto_id: it.id, cantidad: it.cantidad }));
    if (csRows.length) await sb.from('conjunto_subconjuntos').insert(csRows);
    if (cpRows.length) await sb.from('conjunto_productos').insert(cpRows);
  } else if (st.tipo === 'subconjunto') {
    await sb.from('subconjunto_productos').delete().eq('subconjunto_id', st.id);
    const spRows = st.items.filter(it => it.tipo === 'producto').map(it => ({ subconjunto_id: st.id, producto_id: it.id, cantidad: it.cantidad }));
    if (spRows.length) await sb.from('subconjunto_productos').insert(spRows);
  }
  // 3. Cerrar y refrescar
  document.getElementById('edit-cont-modal').remove();
  editContenedorState = null;
  await loadAll();
  toast('Composición actualizada');
  render();
  } finally {
    hideSpinner();
  }
}

// =============================================================================
// v70 Fase 5: ELIMINAR contenedores (equipo / conjunto / subconjunto)
// =============================================================================
// Cada uno con dos modos:
//  - "desvincular": borra el contenedor pero los productos/subconjuntos que
//    contenía siguen existiendo; los productos suben al nivel superior.
//  - "borrar todo": borra el contenedor + sus subcontenedores + sus productos
//    (solo los productos que no se usan en otro lado).
// Los contenedores default no se pueden eliminar.

// Helper: ¿el producto se usa en algún OTRO contenedor además del dado?
// `excepto` = {tipo, id} del contenedor que estamos por borrar.
function _productoUsadoEnOtroLado(productoId, exceptoTipo, exceptoId) {
  let count = 0;
  subconjuntoProductos.forEach(sp => {
    if (sp.producto_id === productoId && !(exceptoTipo === 'subconjunto' && sp.subconjunto_id === exceptoId)) count++;
  });
  conjuntoProductos.forEach(cp => {
    if (cp.producto_id === productoId && !(exceptoTipo === 'conjunto' && cp.conjunto_id === exceptoId)) count++;
  });
  equipoProductos.forEach(ep => {
    if (ep.producto_id === productoId && !(exceptoTipo === 'equipo' && ep.equipo_id === exceptoId)) count++;
  });
  return count > 0;
}

// ---- Eliminar SUBCONJUNTO ----
function eliminarSubconjunto(subconjuntoId) {
  const sub = subconjuntos.find(s => s.id === subconjuntoId);
  if (!sub) return;
  if (_esSubconjuntoDefault(sub)) { toast('No se puede eliminar un subconjunto por defecto', true); return; }
  const prodIds = subconjuntoProductos.filter(sp => sp.subconjunto_id === subconjuntoId).map(sp => sp.producto_id);
  // Modal con dos opciones
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'del-cont-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '480px'; m.style.zIndex = '1100';
  let h = '<div class="md-t">Eliminar subconjunto: ' + escapeHtml(sub.nombre) + '</div>';
  if (prodIds.length === 0) {
    h += '<div style="font-size:13px;color:#5F5E5A;line-height:1.5;margin-bottom:14px">El subconjunto no tiene productos. ¿Eliminarlo?</div>';
    h += '<div class="actions">';
    h += '<button class="b" onclick="document.getElementById(\'del-cont-modal\').remove()">Cancelar</button>';
    h += '<button class="b" style="background:#A32D2D;color:#fff;border-color:#A32D2D" onclick="_ejecutarEliminarSubconjunto(' + subconjuntoId + ',\'desvincular\')">Eliminar</button>';
    h += '</div>';
  } else {
    h += '<div style="font-size:13px;color:#5F5E5A;line-height:1.5;margin-bottom:14px">El subconjunto tiene ' + prodIds.length + ' producto(s). ¿Qué hacer con ellos?</div>';
    h += '<div class="actions" style="flex-direction:column;gap:8px;align-items:stretch">';
    h += '<button class="b b-p" onclick="_ejecutarEliminarSubconjunto(' + subconjuntoId + ',\'desvincular\')">Solo desvincular — los productos pasan al conjunto</button>';
    h += '<button class="b" style="background:#A32D2D;color:#fff;border-color:#A32D2D" onclick="_confirmarBorrarTodoSubconjunto(' + subconjuntoId + ')">Borrar también los productos</button>';
    h += '<button class="b" onclick="document.getElementById(\'del-cont-modal\').remove()">Cancelar</button>';
    h += '</div>';
  }
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd);
}

function _confirmarBorrarTodoSubconjunto(subconjuntoId) {
  const prodIds = subconjuntoProductos.filter(sp => sp.subconjunto_id === subconjuntoId).map(sp => sp.producto_id);
  const aBorrar = prodIds.filter(pid => !_productoUsadoEnOtroLado(pid, 'subconjunto', subconjuntoId));
  const aDesvincular = prodIds.length - aBorrar.length;
  let msg = 'Se eliminará el subconjunto y se borrarán ' + aBorrar.length + ' producto(s) con sus procesos.';
  if (aDesvincular > 0) msg += '\n\n' + aDesvincular + ' producto(s) NO se borran porque se usan en otro contenedor (solo se desvinculan).';
  msg += '\n\nEsta acción no se puede deshacer.';
  const dm = document.getElementById('del-cont-modal'); if (dm) dm.remove();
  confirmModal({
    titulo: 'Borrar subconjunto y productos',
    mensaje: msg,
    textoConfirmar: 'Borrar todo',
    onConfirm: () => _ejecutarEliminarSubconjunto(subconjuntoId, 'borrar')
  });
}

async function _ejecutarEliminarSubconjunto(subconjuntoId, modo) {
  const dm = document.getElementById('del-cont-modal'); if (dm) dm.remove();
  showSpinner('Eliminando subconjunto...');
  try {
    const spList = subconjuntoProductos.filter(sp => sp.subconjunto_id === subconjuntoId);
    const prodIds = spList.map(sp => sp.producto_id);
    if (modo === 'borrar') {
      // Borrar los productos que no se usan en otro lado
      for (const pid of prodIds) {
        if (!_productoUsadoEnOtroLado(pid, 'subconjunto', subconjuntoId)) {
          await sb.from('productos_matriz').delete().eq('id', pid);
        }
      }
    } else {
      // modo 'desvincular': los productos del subconjunto pasan al/los
      // conjunto(s) que contienen este subconjunto. Si no, quedarían huérfanos
      // porque el cascade borra subconjunto_productos al borrar el subconjunto.
      const conIds = conjuntoSubconjuntos.filter(cs => cs.subconjunto_id === subconjuntoId).map(cs => cs.conjunto_id);
      const conDestino = conIds[0] || null;
      if (conDestino) {
        for (const sp of spList) {
          const ya = conjuntoProductos.find(cp => cp.conjunto_id === conDestino && cp.producto_id === sp.producto_id);
          if (!ya) {
            await sb.from('conjunto_productos').insert({ conjunto_id: conDestino, producto_id: sp.producto_id, cantidad: sp.cantidad || 1 });
          }
        }
      }
    }
    // Borrar el subconjunto (cascade limpia subconjunto_productos y conjunto_subconjuntos)
    await sb.from('subconjuntos').delete().eq('id', subconjuntoId);
    // Cerrar modal de edición si estaba abierto
    const ec = document.getElementById('edit-cont-modal');
    if (ec) { ec.remove(); editContenedorState = null; }
    await loadAll();
    toast('Subconjunto eliminado');
    render();
  } finally {
    hideSpinner();
  }
}

// ---- Eliminar CONJUNTO ----
function eliminarConjunto(conjuntoId) {
  const con = conjuntos.find(c => c.id === conjuntoId);
  if (!con) return;
  if (_esConjuntoDefault(con)) { toast('No se puede eliminar un conjunto por defecto', true); return; }
  // Contar contenido
  const prodDirectos = conjuntoProductos.filter(cp => cp.conjunto_id === conjuntoId).length;
  const subs = conjuntoSubconjuntos.filter(cs => cs.conjunto_id === conjuntoId).length;
  const totalProds = _matrizProdIdsConjunto(conjuntoId).size;

  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'del-cont-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '480px'; m.style.zIndex = '1100';
  let h = '<div class="md-t">Eliminar conjunto: ' + escapeHtml(con.nombre) + '</div>';
  if (prodDirectos === 0 && subs === 0) {
    h += '<div style="font-size:13px;color:#5F5E5A;line-height:1.5;margin-bottom:14px">El conjunto está vacío. ¿Eliminarlo?</div>';
    h += '<div class="actions">';
    h += '<button class="b" onclick="document.getElementById(\'del-cont-modal\').remove()">Cancelar</button>';
    h += '<button class="b" style="background:#A32D2D;color:#fff;border-color:#A32D2D" onclick="_ejecutarEliminarConjunto(' + conjuntoId + ',\'desvincular\')">Eliminar</button>';
    h += '</div>';
  } else {
    h += '<div style="font-size:13px;color:#5F5E5A;line-height:1.5;margin-bottom:14px">El conjunto contiene ' + subs + ' subconjunto(s) y ' + totalProds + ' producto(s) en total. ¿Qué hacer?</div>';
    h += '<div class="actions" style="flex-direction:column;gap:8px;align-items:stretch">';
    h += '<button class="b b-p" onclick="_ejecutarEliminarConjunto(' + conjuntoId + ',\'desvincular\')">Solo desvincular — productos y subconjuntos pasan al equipo</button>';
    h += '<button class="b" style="background:#A32D2D;color:#fff;border-color:#A32D2D" onclick="_confirmarBorrarTodoConjunto(' + conjuntoId + ')">Borrar todo (subconjuntos y productos)</button>';
    h += '<button class="b" onclick="document.getElementById(\'del-cont-modal\').remove()">Cancelar</button>';
    h += '</div>';
  }
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd);
}

function _confirmarBorrarTodoConjunto(conjuntoId) {
  const prodIds = [..._matrizProdIdsConjunto(conjuntoId)];
  const aBorrar = prodIds.filter(pid => !_productoUsadoEnOtroLado(pid, 'conjunto', conjuntoId));
  const aDesvincular = prodIds.length - aBorrar.length;
  const subs = conjuntoSubconjuntos.filter(cs => cs.conjunto_id === conjuntoId).length;
  let msg = 'Se eliminará el conjunto, sus ' + subs + ' subconjunto(s), y se borrarán ' + aBorrar.length + ' producto(s) con sus procesos.';
  if (aDesvincular > 0) msg += '\n\n' + aDesvincular + ' producto(s) NO se borran porque se usan en otro contenedor.';
  msg += '\n\nEsta acción no se puede deshacer.';
  const dm = document.getElementById('del-cont-modal'); if (dm) dm.remove();
  confirmModal({
    titulo: 'Borrar conjunto completo',
    mensaje: msg,
    textoConfirmar: 'Borrar todo',
    onConfirm: () => _ejecutarEliminarConjunto(conjuntoId, 'borrar')
  });
}

async function _ejecutarEliminarConjunto(conjuntoId, modo) {
  const dm = document.getElementById('del-cont-modal'); if (dm) dm.remove();
  showSpinner('Eliminando conjunto...');
  try {
    // Equipos que contienen este conjunto (para reubicar al desvincular)
    const equiposDelConjunto = equipoConjuntos.filter(ec => ec.conjunto_id === conjuntoId).map(ec => ec.equipo_id);
    const subIds = conjuntoSubconjuntos.filter(cs => cs.conjunto_id === conjuntoId).map(cs => cs.subconjunto_id);

    if (modo === 'borrar') {
      // Borrar productos directos del conjunto + de sus subconjuntos (los que no se usan en otro lado)
      const prodIds = [..._matrizProdIdsConjunto(conjuntoId)];
      for (const pid of prodIds) {
        if (!_productoUsadoEnOtroLado(pid, 'conjunto', conjuntoId)) {
          await sb.from('productos_matriz').delete().eq('id', pid);
        }
      }
      // Borrar los subconjuntos del conjunto
      for (const sid of subIds) {
        await sb.from('subconjuntos').delete().eq('id', sid);
      }
    } else {
      // Desvincular: los productos directos del conjunto pasan al equipo;
      // los subconjuntos pasan al equipo también (vía equipo... pero equipo no
      // contiene subconjuntos. Entonces: los productos de los subconjuntos
      // suben al equipo y los subconjuntos quedan sueltos).
      const eqDestino = equiposDelConjunto[0] || null;
      if (eqDestino) {
        // Productos directos del conjunto -> equipo_productos
        const directos = conjuntoProductos.filter(cp => cp.conjunto_id === conjuntoId);
        for (const cp of directos) {
          const ya = equipoProductos.find(ep => ep.equipo_id === eqDestino && ep.producto_id === cp.producto_id);
          if (!ya) {
            await sb.from('equipo_productos').insert({ equipo_id: eqDestino, producto_id: cp.producto_id, cantidad: cp.cantidad || 1 });
          }
        }
        // Productos de los subconjuntos -> también al equipo
        for (const sid of subIds) {
          const spList = subconjuntoProductos.filter(sp => sp.subconjunto_id === sid);
          for (const sp of spList) {
            const ya = equipoProductos.find(ep => ep.equipo_id === eqDestino && ep.producto_id === sp.producto_id);
            if (!ya) {
              await sb.from('equipo_productos').insert({ equipo_id: eqDestino, producto_id: sp.producto_id, cantidad: sp.cantidad || 1 });
            }
          }
        }
      }
      // Los subconjuntos quedan sueltos (se desvinculan al borrar el conjunto por cascade).
    }
    // Borrar el conjunto (cascade limpia equipo_conjuntos, conjunto_productos, conjunto_subconjuntos)
    await sb.from('conjuntos').delete().eq('id', conjuntoId);
    const ec = document.getElementById('edit-cont-modal');
    if (ec) { ec.remove(); editContenedorState = null; }
    await loadAll();
    toast('Conjunto eliminado');
    render();
  } finally {
    hideSpinner();
  }
}

// ---- Eliminar EQUIPO ----
function eliminarEquipo(equipoId) {
  const eq = equipos.find(e => e.id === equipoId);
  if (!eq) return;
  if (_esEquipoDefault(eq)) { toast('No se puede eliminar un equipo por defecto', true); return; }
  const cons = equipoConjuntos.filter(ec => ec.equipo_id === equipoId).length;
  const totalProds = _matrizProdIdsEquipo(equipoId).size;

  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'del-cont-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '480px'; m.style.zIndex = '1100';
  let h = '<div class="md-t">Eliminar equipo: ' + escapeHtml(eq.nombre) + '</div>';
  if (cons === 0 && totalProds === 0) {
    h += '<div style="font-size:13px;color:#5F5E5A;line-height:1.5;margin-bottom:14px">El equipo está vacío. ¿Eliminarlo?</div>';
    h += '<div class="actions">';
    h += '<button class="b" onclick="document.getElementById(\'del-cont-modal\').remove()">Cancelar</button>';
    h += '<button class="b" style="background:#A32D2D;color:#fff;border-color:#A32D2D" onclick="_ejecutarEliminarEquipo(' + equipoId + ',\'desvincular\')">Eliminar</button>';
    h += '</div>';
  } else {
    h += '<div style="font-size:13px;color:#5F5E5A;line-height:1.5;margin-bottom:14px">El equipo contiene ' + cons + ' conjunto(s) y ' + totalProds + ' producto(s) en total. ¿Qué hacer?</div>';
    h += '<div class="actions" style="flex-direction:column;gap:8px;align-items:stretch">';
    h += '<button class="b b-p" onclick="_ejecutarEliminarEquipo(' + equipoId + ',\'desvincular\')">Solo desvincular — el contenido queda suelto</button>';
    h += '<button class="b" style="background:#A32D2D;color:#fff;border-color:#A32D2D" onclick="_confirmarBorrarTodoEquipo(' + equipoId + ')">Borrar todo (conjuntos y productos)</button>';
    h += '<button class="b" onclick="document.getElementById(\'del-cont-modal\').remove()">Cancelar</button>';
    h += '</div>';
  }
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd);
}

function _confirmarBorrarTodoEquipo(equipoId) {
  const prodIds = [..._matrizProdIdsEquipo(equipoId)];
  const aBorrar = prodIds.filter(pid => !_productoUsadoEnOtroLado(pid, 'equipo', equipoId));
  const aDesvincular = prodIds.length - aBorrar.length;
  const cons = equipoConjuntos.filter(ec => ec.equipo_id === equipoId).length;
  let msg = 'Se eliminará el equipo, sus ' + cons + ' conjunto(s) y los subconjuntos, y se borrarán ' + aBorrar.length + ' producto(s) con sus procesos.';
  if (aDesvincular > 0) msg += '\n\n' + aDesvincular + ' producto(s) NO se borran porque se usan en otro contenedor.';
  msg += '\n\nEsta acción no se puede deshacer.';
  const dm = document.getElementById('del-cont-modal'); if (dm) dm.remove();
  confirmModal({
    titulo: 'Borrar equipo completo',
    mensaje: msg,
    textoConfirmar: 'Borrar todo',
    onConfirm: () => _ejecutarEliminarEquipo(equipoId, 'borrar')
  });
}

async function _ejecutarEliminarEquipo(equipoId, modo) {
  const dm = document.getElementById('del-cont-modal'); if (dm) dm.remove();
  showSpinner('Eliminando equipo...');
  try {
    if (modo === 'borrar') {
      const prodIds = [..._matrizProdIdsEquipo(equipoId)];
      for (const pid of prodIds) {
        if (!_productoUsadoEnOtroLado(pid, 'equipo', equipoId)) {
          await sb.from('productos_matriz').delete().eq('id', pid);
        }
      }
      // Borrar conjuntos del equipo + sus subconjuntos
      const conIds = equipoConjuntos.filter(ec => ec.equipo_id === equipoId).map(ec => ec.conjunto_id);
      for (const cid of conIds) {
        const con = conjuntos.find(c => c.id === cid);
        if (con && _esConjuntoDefault(con)) continue;  // no borrar defaults
        const subIds = conjuntoSubconjuntos.filter(cs => cs.conjunto_id === cid).map(cs => cs.subconjunto_id);
        for (const sid of subIds) {
          await sb.from('subconjuntos').delete().eq('id', sid);
        }
        await sb.from('conjuntos').delete().eq('id', cid);
      }
    }
    // Borrar el equipo (cascade limpia equipo_conjuntos, equipo_productos)
    await sb.from('equipos').delete().eq('id', equipoId);
    const ec = document.getElementById('edit-cont-modal');
    if (ec) { ec.remove(); editContenedorState = null; }
    await loadAll();
    toast('Equipo eliminado');
    render();
  } finally {
    hideSpinner();
  }
}

// Helper central: duplica un producto de la matriz con todos sus procesos.
// Devuelve el id del producto nuevo, o null si falló.
// `overrides` permite cambiar campos del producto nuevo (ej. cliente_id, descripcion).
async function _duplicarProductoMatriz(productoIdOrig, overrides) {
  const orig = productosMatriz.find(p => p.id === productoIdOrig);
  if (!orig) return null;
  const ov = overrides || {};
  const payload = {
    descripcion: ov.descripcion !== undefined ? ov.descripcion : ((orig.descripcion || '') + ' (copia)'),
    cliente_id: ov.cliente_id !== undefined ? ov.cliente_id : (orig.cliente_id || null),
    codigo_cliente: orig.codigo_cliente || null,
    material_id: orig.material_id || null,
    presentacion_mat_prima: orig.presentacion_mat_prima || null,
    foto_url: orig.foto_url || null,
    updated_at: new Date().toISOString()
  };
  const { data: nuevo, error } = await sb.from('productos_matriz').insert(payload).select().single();
  if (error) { console.error('Error duplicando producto:', error); return null; }
  // Copiar procesos
  const procs = productosMatrizProcesos.filter(pp => pp.producto_id === productoIdOrig)
    .sort((a, b) => (a.orden || 0) - (b.orden || 0));
  if (procs.length > 0) {
    const inserts = procs.map((pp, i) => ({
      producto_id: nuevo.id,
      proceso: pp.proceso,
      descripcion: (payload.descripcion) + ' - ' + (pp.proceso || ''),
      duracion_estimada_min: pp.duracion_estimada_min,
      duracion_margen_min: pp.duracion_margen_min,
      duracion_operario_min: pp.duracion_operario_min,
      tipo: pp.tipo,
      maquina_ideal_id: pp.maquina_ideal_id,
      maquina_ideal_nombre: pp.maquina_ideal_nombre,
      operario_ideal_id: pp.operario_ideal_id,
      maquinas_suplentes: pp.maquinas_suplentes,
      operarios_suplentes: pp.operarios_suplentes,
      trabajo_a_realizar: pp.trabajo_a_realizar,
      orden: i + 1
    }));
    await sb.from('productos_matriz_procesos').insert(inserts);
  }
  return nuevo.id;
}

function _duppClienteChange() {
  const cliSel = document.getElementById('dupp-cliente');
  const secSel = document.getElementById('dupp-sector');
  if (!cliSel || !secSel) return;
  const cliId = cliSel.value ? parseInt(cliSel.value) : null;
  if (!cliId) {
    secSel.innerHTML = '<option value="">—</option>';
    secSel.disabled = true;
  } else {
    secSel.disabled = false;
    const secs = sectores.filter(s => s.cliente_id === cliId).sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
    secSel.innerHTML = secs.map(s => '<option value="' + s.id + '"' + (_esSectorGeneral(s) ? ' selected' : '') + '>' + escapeHtml(s.nombre) + '</option>').join('');
  }
  _duppSectorChange();
}

function _duppSectorChange() {
  const secSel = document.getElementById('dupp-sector');
  const eqSel = document.getElementById('dupp-equipo');
  if (!secSel || !eqSel) return;
  const secId = secSel.value ? parseInt(secSel.value) : null;
  if (!secId) {
    eqSel.innerHTML = '<option value="">—</option>';
    eqSel.disabled = true;
  } else {
    eqSel.disabled = false;

function _duppEquipoChange() {
  const eqSel = document.getElementById('dupp-equipo');

  if (!eqSel || !conSel) return;
  const eqId = eqSel.value ? parseInt(eqSel.value) : null;
  let h = '<option value="">(Ninguno — va directo al equipo)</option>';
  if (eqId) {
    // Conjuntos vinculados al equipo
    const conIds = equipoConjuntos.filter(ec => ec.equipo_id === eqId).map(ec => ec.conjunto_id);
    const cons = conjuntos.filter(c => conIds.includes(c.id))
      .sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
    cons.forEach(c => {
      h += '<option value="' + c.id + '">' + escapeHtml(c.nombre) + '</option>';
    });
  }
  conSel.innerHTML = h;
  _duppConjuntoChange();
}

function _duppConjuntoChange() {
  const conSel = document.getElementById('dupp-conjunto');
  const subSel = document.getElementById('dupp-subconjunto');
  if (!conSel || !subSel) return;
  const conId = conSel.value ? parseInt(conSel.value) : null;
  let h = '<option value="">(Ninguno — va directo al conjunto)</option>';
  if (conId) {
    const subIds = conjuntoSubconjuntos.filter(cs => cs.conjunto_id === conId).map(cs => cs.subconjunto_id);
    const subs = subconjuntos.filter(s => subIds.includes(s.id))
      .sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
    subs.forEach(s => {
      h += '<option value="' + s.id + '">' + escapeHtml(s.nombre) + '</option>';
    });
    subSel.disabled = false;
  } else {
    subSel.disabled = true;
  }
  subSel.innerHTML = h;
}

async function _duppEjecutar() {
  const st = duplicarProductoState;
  if (!st) return;
  const nombreNuevo = document.getElementById('dupp-nombre').value.trim();
  if (!nombreNuevo) { toast('Ingresá el nombre del producto nuevo', true); return; }
  const cliId = document.getElementById('dupp-cliente').value ? parseInt(document.getElementById('dupp-cliente').value) : null;
  const eqSel = document.getElementById('dupp-equipo');
  const conSel = document.getElementById('dupp-conjunto');
  const subSel = document.getElementById('dupp-subconjunto');
  const equipoId = eqSel && eqSel.value ? parseInt(eqSel.value) : null;
  const conjuntoId = conSel && conSel.value ? parseInt(conSel.value) : null;
  const subconjuntoId = subSel && subSel.value ? parseInt(subSel.value) : null;

  showSpinner('Duplicando producto...');
  try {
    const nuevoId = await _duplicarProductoMatriz(st.productoIdOrig, {
      cliente_id: cliId,
      descripcion: nombreNuevo
    });
    if (!nuevoId) { toast('Error al duplicar', true); return; }
    // Asignar a la composición según el nivel más específico elegido
    if (subconjuntoId) {
      await sb.from('subconjunto_productos').insert({ subconjunto_id: subconjuntoId, producto_id: nuevoId, cantidad: 1 });
    } else if (conjuntoId) {
      await sb.from('conjunto_productos').insert({ conjunto_id: conjuntoId, producto_id: nuevoId, cantidad: 1 });
    } else if (equipoId) {
      await sb.from('equipo_productos').insert({ equipo_id: equipoId, producto_id: nuevoId, cantidad: 1 });
    }
    document.getElementById('dup-prod-modal').remove();
    duplicarProductoState = null;
    await loadAll();
    toast('Producto duplicado');
    navigate({ view: 'productoMatriz', productoId: nuevoId });
  } finally {
    hideSpinner();
  }
}

// ---- Duplicar conjunto (modal con checkboxes por producto) ----
let duplicarConjuntoState = null;

function showDuplicarConjuntoModal(conjuntoId) {
  const con = conjuntos.find(c => c.id === conjuntoId);
  if (!con) return;
  // Juntar todos los productos del conjunto (directos + de subconjuntos)
  const productosInfo = [];  // {prodId, nombre, cantidad, subId|null, subNombre|null}
  conjuntoProductos.filter(cp => cp.conjunto_id === conjuntoId).forEach(cp => {
    const p = productosMatriz.find(x => x.id === cp.producto_id);
    if (p) productosInfo.push({ prodId: p.id, nombre: p.descripcion, cantidad: cp.cantidad || 1, subId: null, subNombre: null });
  });
  conjuntoSubconjuntos.filter(cs => cs.conjunto_id === conjuntoId).forEach(cs => {
    const sub = subconjuntos.find(s => s.id === cs.subconjunto_id);
    if (!sub) return;
    subconjuntoProductos.filter(sp => sp.subconjunto_id === sub.id).forEach(sp => {
      const p = productosMatriz.find(x => x.id === sp.producto_id);
      if (p) productosInfo.push({ prodId: p.id, nombre: p.descripcion, cantidad: sp.cantidad || 1, subId: sub.id, subNombre: sub.nombre });
    });
  });
  duplicarConjuntoState = {
    conjuntoId,
    nombreOrig: con.nombre,
    clienteOrig: con.cliente_id,
    productos: productosInfo.map(pi => Object.assign({}, pi, { modo: 'duplicar' }))  // modo: 'duplicar' | 'mismo'
  };
  _renderDuplicarConjuntoModal();
}

function _renderDuplicarConjuntoModal() {
  const st = duplicarConjuntoState;
  if (!st) return;
  const existing = document.getElementById('dup-con-modal');
  if (existing) existing.remove();
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'dup-con-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '640px'; m.style.maxHeight = '90vh'; m.style.overflowY = 'auto';
  let h = '<div class="md-t">Duplicar conjunto: ' + escapeHtml(st.nombreOrig) + '</div>';

  // Cliente destino
  h += '<div class="ef"><div class="ef-l">Cliente destino</div>';
  h += '<select class="ef-i" id="dup-cliente" onchange="_dupConClienteChange()">';
  clientes.slice().sort((a, b) => (a.nombre || '').localeCompare(b.nombre || '')).forEach(c => {
    h += '<option value="' + c.id + '"' + (c.id === st.clienteOrig ? ' selected' : '') + '>' + escapeHtml(c.nombre) + '</option>';
  });
  h += '</select></div>';

  // Sector y equipo destino
  h += '<div class="row">';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Sector destino</div>';
  h += '<select class="ef-i" id="dup-sector" onchange="_dupConSectorChange()"></select></div>';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Equipo destino</div>';
  h += '<select class="ef-i" id="dup-equipo"></select></div>';
  h += '</div>';

  // Nombre del conjunto nuevo
  h += '<div class="ef"><div class="ef-l">Nombre del conjunto nuevo</div>';
  h += '<input type="text" class="ef-i" id="dup-nombre" value="' + escapeHtml(st.nombreOrig + ' (copia)') + '"></div>';

  // Aviso de cliente distinto
  h += '<div id="dup-aviso-cliente" style="display:none;background:#FEF5E7;color:#854F0B;padding:8px 12px;border-radius:5px;font-size:11px;margin-bottom:10px">Al duplicar a otro cliente, todos los productos se crean nuevos. Para compartir productos entre clientes vas a poder usar los gemelos más adelante.</div>';

  // Control "marcar todos"
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0 6px">';

function _dupConProdListHtml() {
  const st = duplicarConjuntoState;
  if (!st || st.productos.length === 0) {
    return '<div style="padding:14px;text-align:center;color:#888;font-size:11px;font-style:italic">El conjunto no tiene productos.</div>';
  }
  // ¿Cliente distinto? Entonces checkboxes bloqueados
  const cliSel = document.getElementById('dup-cliente');
  const clienteDistinto = cliSel ? (parseInt(cliSel.value) !== st.clienteOrig) : false;
  let h = '';
  st.productos.forEach((pi, idx) => {
    h += '<div style="display:flex;align-items:center;padding:6px 10px;border-bottom:1px solid #F5F3EC;font-size:12px;gap:8px">';
    h += '<div style="flex:1;min-width:0">';
    h += '<div style="font-weight:600">' + escapeHtml(pi.nombre) + '</div>';
    if (pi.subNombre) h += '<div style="font-size:10px;color:#888">en ' + escapeHtml(pi.subNombre) + '</div>';
    h += '</div>';
    if (clienteDistinto) {
      h += '<span style="font-size:10px;color:#888;font-style:italic">se duplica</span>';
    } else {
      h += '<label style="font-size:11px;margin-right:8px"><input type="radio" name="dup-modo-' + idx + '" value="duplicar"' + (pi.modo === 'duplicar' ? ' checked' : '') + ' onchange="_dupConSetModo(' + idx + ',\'duplicar\')"> Duplicar</label>';

    h += '</div>';
  });
  return h;

function _dupConSetModo(idx, modo) {
  if (duplicarConjuntoState && duplicarConjuntoState.productos[idx]) {
    duplicarConjuntoState.productos[idx].modo = modo;
  }
}

function _dupConMarcarTodos(modo) {
  if (!duplicarConjuntoState) return;
  duplicarConjuntoState.productos.forEach(pi => { pi.modo = modo; });
  const list = document.getElementById('dup-prod-list');
  if (list) list.innerHTML = _dupConProdListHtml();

function _dupConClienteChange() {
  const st = duplicarConjuntoState;
  if (!st) return;
  const cliSel = document.getElementById('dup-cliente');
  const cliId = cliSel ? parseInt(cliSel.value) : st.clienteOrig;

  const aviso = document.getElementById('dup-aviso-cliente');
  if (aviso) aviso.style.display = (cliId !== st.clienteOrig) ? 'block' : 'none';

    secSel.innerHTML = secs.map(s => '<option value="' + s.id + '"' + (_esSectorGeneral(s) ? ' selected' : '') + '>' + escapeHtml(s.nombre) + '</option>').join('');

function _dupConSectorChange() {
  const secSel = document.getElementById('dup-sector');
  const eqSel = document.getElementById('dup-equipo');
  if (!secSel || !eqSel) return;
  const secId = parseInt(secSel.value);
  const eqs = equipos.filter(e => e.sector_id === secId).sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
  eqSel.innerHTML = eqs.map(e => '<option value="' + e.id + '"' + (_esEquipoDefault(e) ? ' selected' : '') + '>' + escapeHtml(e.nombre) + '</option>').join('');
}

// Helper: ¿es el sector "General" (default)?
function _esSectorGeneral(s) {
  return s && (s.nombre || '').trim().toLowerCase() === 'general';
}

async function _dupConEjecutar() {
  const st = duplicarConjuntoState;
  if (!st) return;
  const nombreNuevo = document.getElementById('dup-nombre').value.trim();
  if (!nombreNuevo) { toast('Ingresá el nombre del conjunto nuevo', true); return; }
  const cliId = parseInt(document.getElementById('dup-cliente').value);
  const eqSel = document.getElementById('dup-equipo');
  const equipoDestino = eqSel && eqSel.value ? parseInt(eqSel.value) : null;
  if (!equipoDestino) { toast('Elegí un equipo destino', true); return; }

  showSpinner('Duplicando conjunto...');
  try {
    // 1. Crear el conjunto nuevo
    const { data: nuevoCon, error: conErr } = await sb.from('conjuntos')
      .insert({ cliente_id: cliId, nombre: nombreNuevo }).select().single();
    if (conErr) { toast('Error al crear conjunto: ' + conErr.message, true); return; }

    // 2. Vincular el conjunto nuevo al equipo destino
    await sb.from('equipo_conjuntos').insert({ equipo_id: equipoDestino, conjunto_id: nuevoCon.id, cantidad: 1 });

    // 3. Resolver cada producto (duplicar o usar el mismo) y agrupar por destino
    //    (subconjunto nuevo o directo al conjunto).
    // Primero, duplicar los subconjuntos como contenedores nuevos.
    const subMap = {};  // subId viejo -> subId nuevo
    for (const pi of st.productos) {
      if (pi.subId && !subMap[pi.subId]) {
        const subOrig = subconjuntos.find(s => s.id === pi.subId);
        const { data: nuevoSub, error: subErr } = await sb.from('subconjuntos')
          .insert({ cliente_id: cliId, nombre: subOrig ? subOrig.nombre : 'Subconjunto' }).select().single();
        if (!subErr && nuevoSub) {
          subMap[pi.subId] = nuevoSub.id;
          await sb.from('conjunto_subconjuntos').insert({ conjunto_id: nuevoCon.id, subconjunto_id: nuevoSub.id, cantidad: 1 });
        }
      }
    }
    // 4. Procesar productos
    for (const pi of st.productos) {
      let prodIdFinal = pi.prodId;
      if (pi.modo === 'duplicar') {
        const nuevoProdId = await _duplicarProductoMatriz(pi.prodId, {
          cliente_id: cliId,
          descripcion: (productosMatriz.find(p => p.id === pi.prodId) || {}).descripcion || 'Producto'
        });
        if (nuevoProdId) prodIdFinal = nuevoProdId;
      }
      // Insertar en la tabla de composición correspondiente
      if (pi.subId && subMap[pi.subId]) {
        await sb.from('subconjunto_productos').insert({ subconjunto_id: subMap[pi.subId], producto_id: prodIdFinal, cantidad: pi.cantidad });
      } else {
        await sb.from('conjunto_productos').insert({ conjunto_id: nuevoCon.id, producto_id: prodIdFinal, cantidad: pi.cantidad });
      }
    }
    document.getElementById('dup-con-modal').remove();
    duplicarConjuntoState = null;
    await loadAll();
    toast('Conjunto duplicado');
    render();
  } finally {
    hideSpinner();
  }
}

// ---- Duplicar subconjunto ----
let duplicarSubconjuntoState = null;

function showDuplicarSubconjuntoModal(subconjuntoId) {
  const sub = subconjuntos.find(s => s.id === subconjuntoId);
  if (!sub) return;
  const productosInfo = [];
  subconjuntoProductos.filter(sp => sp.subconjunto_id === subconjuntoId).forEach(sp => {
    const p = productosMatriz.find(x => x.id === sp.producto_id);
    if (p) productosInfo.push({ prodId: p.id, nombre: p.descripcion, cantidad: sp.cantidad || 1 });
  });
  duplicarSubconjuntoState = {
    subconjuntoId,
    nombreOrig: sub.nombre,
    clienteOrig: sub.cliente_id,
    productos: productosInfo.map(pi => Object.assign({}, pi, { modo: 'duplicar' }))
  };
  _renderDuplicarSubconjuntoModal();
}

function _renderDuplicarSubconjuntoModal() {
  const st = duplicarSubconjuntoState;

function _dupSubProdListHtml() {
  const st = duplicarSubconjuntoState;
  if (!st || st.productos.length === 0) {
    return '<div style="padding:14px;text-align:center;color:#888;font-size:11px;font-style:italic">Sin productos.</div>';
  }
  let h = '';
  st.productos.forEach((pi, idx) => {
    h += '<div style="display:flex;align-items:center;padding:6px 10px;border-bottom:1px solid #F5F3EC;font-size:12px;gap:8px">';

    h += '</div>';

}

function _dupSubSetModo(idx, modo) {
  if (duplicarSubconjuntoState && duplicarSubconjuntoState.productos[idx]) {
    duplicarSubconjuntoState.productos[idx].modo = modo;
  }
}

function _dupSubMarcarTodos(modo) {
  if (!duplicarSubconjuntoState) return;
  duplicarSubconjuntoState.productos.forEach(pi => { pi.modo = modo; });
  const list = document.getElementById('dupsub-prod-list');
  if (list) list.innerHTML = _dupSubProdListHtml();
}

async function _dupSubEjecutar() {
  const st = duplicarSubconjuntoState;
  if (!st) return;
  const nombreNuevo = document.getElementById('dupsub-nombre').value.trim();
  if (!nombreNuevo) { toast('Ingresá el nombre del subconjunto nuevo', true); return; }
  showSpinner('Duplicando subconjunto...');
  try {
    const { data: nuevoSub, error: subErr } = await sb.from('subconjuntos')
      .insert({ cliente_id: st.clienteOrig, nombre: nombreNuevo }).select().single();
    if (subErr) { toast('Error: ' + subErr.message, true); return; }
    for (const pi of st.productos) {
      let prodIdFinal = pi.prodId;
      if (pi.modo === 'duplicar') {
        const nuevoProdId = await _duplicarProductoMatriz(pi.prodId, {
          cliente_id: st.clienteOrig,
          descripcion: (productosMatriz.find(p => p.id === pi.prodId) || {}).descripcion || 'Producto'
        });
        if (nuevoProdId) prodIdFinal = nuevoProdId;
      }
      await sb.from('subconjunto_productos').insert({ subconjunto_id: nuevoSub.id, producto_id: prodIdFinal, cantidad: pi.cantidad });
    }
    document.getElementById('dup-sub-modal').remove();
    duplicarSubconjuntoState = null;
    await loadAll();
    toast('Subconjunto duplicado');
    render();
  } finally {
    hideSpinner();
  }
}

function pmCambiarCantidadUbicacion(idx, value) {
  if (!pmFormState) return;

    toast('La cantidad debe ser ≥ 1', true);

    const list = document.getElementById('pm-ubicaciones-list');
    if (list) list.innerHTML = _pmUbicacionesListHtml();
    return;
  }
  pmFormState.ubicacionesPendientes[idx].cantidad = n;

// v64: Helpers de navegación que LIMPIAN todos los filtros, aplican los del
// nivel clickeado, expanden la rama y navegan a la vista anidada. La
// vista anidada respeta `matrizFilters`, así que ya filtra automáticamente.
function _matrizNavConFiltros(filtros, expandKeys) {
  // Limpiar todos los filtros actuales
  matrizFilters.search = '';
  matrizFilters.codigos = '';
  matrizFilters.clienteIds = [];
  matrizFilters.sectorIds = [];
  matrizFilters.equipoIds = [];
  matrizFilters.conjuntoIds = [];
  matrizFilters.subconjuntoIds = [];
  // Aplicar los del nivel
  Object.assign(matrizFilters, filtros);
  saveMatrizFilters();
  // Expandir ramas
  expandKeys.forEach(k => matrizExpanded.add(k));
  navigate({ view: 'recursos', tab: 'matriz', matrizView: 'clientes' });
}

function navMatrizACliente(clienteId) {
  if (clienteId == null) {
    // Genéricos: no hay filtro por cliente; mostramos solo "Productos Genéricos"
    // expandido. La vista anidada igual mostrará otros clientes con productos.
    // Para limitarlo a genéricos solamente, no hay filtro existente — dejamos
    // que el usuario filtre manualmente. Solo limpiamos y expandimos genéricos.
    _matrizNavConFiltros({}, ['gen']);
  } else {
    _matrizNavConFiltros(
      { clienteIds: [clienteId] },
      ['cli:' + clienteId]
    );
  }
}
function navMatrizASector(clienteId, sectorId) {
  _matrizNavConFiltros(
    { clienteIds: [clienteId], sectorIds: [sectorId] },
    ['cli:' + clienteId, 'sec:' + sectorId]
  );
}
function navMatrizAEquipo(clienteId, sectorId, equipoId) {
  _matrizNavConFiltros(
    { clienteIds: [clienteId], sectorIds: [sectorId], equipoIds: [equipoId] },
    ['cli:' + clienteId, 'sec:' + sectorId, 'eq:' + equipoId]
  );
}
function navMatrizAConjunto(clienteId, sectorId, equipoId, conjuntoId) {
  _matrizNavConFiltros(
    { clienteIds: [clienteId], sectorIds: [sectorId], equipoIds: [equipoId], conjuntoIds: [conjuntoId] },
    ['cli:' + clienteId, 'sec:' + sectorId, 'eq:' + equipoId, 'con:' + conjuntoId]
  );
}
function navMatrizASubconjunto(clienteId, sectorId, equipoId, conjuntoId, subconjuntoId) {
  _matrizNavConFiltros(
    { clienteIds: [clienteId], sectorIds: [sectorId], equipoIds: [equipoId], conjuntoIds: [conjuntoId], subconjuntoIds: [subconjuntoId] },
    ['cli:' + clienteId, 'sec:' + sectorId, 'eq:' + equipoId, 'con:' + conjuntoId, 'sub:' + subconjuntoId]
  );
}

// Construye la ruta clickeable Cliente > Sector > Equipo > Conjunto > Subconjunto.
// Cada nivel navega a la vista anidada con esa rama pre-expandida.
function _pmUbicacionRouteClickable(u) {
  const parts = [];
  if (u.cliente_id) {
    const c = clientes.find(x => x.id === u.cliente_id);
    const lbl = c ? c.nombre : '?';
    parts.push('<a onclick="event.stopPropagation();navMatrizACliente(' + u.cliente_id + ')" style="color:#0C447C;cursor:pointer;text-decoration:underline">' + escapeHtml(lbl) + '</a>');
  }
  if (u.sector_id) {
    const s = sectores.find(x => x.id === u.sector_id);
    const lbl = s ? s.nombre : '?';
    parts.push('<a onclick="event.stopPropagation();navMatrizASector(' + u.cliente_id + ',' + u.sector_id + ')" style="color:#0C447C;cursor:pointer;text-decoration:underline">' + escapeHtml(lbl) + '</a>');
  } else if (u.cliente_id) {
    parts.push('<i style="color:#888">Sin Sector</i>');
  }
  if (u.equipo_id) {
    const e = equipos.find(x => x.id === u.equipo_id);
    const lbl = e ? e.nombre : '?';
    parts.push('<a onclick="event.stopPropagation();navMatrizAEquipo(' + u.cliente_id + ',' + u.sector_id + ',' + u.equipo_id + ')" style="color:#0C447C;cursor:pointer;text-decoration:underline">' + escapeHtml(lbl) + '</a>');
  } else if (u.sector_id) {
    parts.push('<i style="color:#888">Sin Equipo</i>');
  }
  if (u.conjunto_id) {
    const c = conjuntos.find(x => x.id === u.conjunto_id);
    const lbl = c ? c.nombre : '?';
    parts.push('<a onclick="event.stopPropagation();navMatrizAConjunto(' + u.cliente_id + ',' + u.sector_id + ',' + u.equipo_id + ',' + u.conjunto_id + ')" style="color:#0C447C;cursor:pointer;text-decoration:underline">' + escapeHtml(lbl) + '</a>');
  } else if (u.equipo_id) {
    parts.push('<i style="color:#888">Sin Conjunto</i>');
  }
  if (u.subconjunto_id) {
    const s = subconjuntos.find(x => x.id === u.subconjunto_id);
    const lbl = s ? s.nombre : '?';
    parts.push('<a onclick="event.stopPropagation();navMatrizASubconjunto(' + u.cliente_id + ',' + u.sector_id + ',' + u.equipo_id + ',' + u.conjunto_id + ',' + u.subconjunto_id + ')" style="color:#0C447C;cursor:pointer;text-decoration:underline">' + escapeHtml(lbl) + '</a>');
  }
  return parts.join(' <span style="color:#888">›</span> ');
}

// Devuelve string "Cliente > Sector > Equipo > Conjunto > Subconjunto"
function _pmUbicacionRoute(u) {
  const parts = [];
  if (u.cliente_id) {
    const c = clientes.find(x => x.id === u.cliente_id);
    parts.push(c ? c.nombre : '?');
  }
  if (u.sector_id) {
    const s = sectores.find(x => x.id === u.sector_id);
    parts.push(s ? s.nombre : '?');
  } else if (u.cliente_id) {
    parts.push('<i style="color:#888">Sin Sector</i>');
  }
  if (u.equipo_id) {
    const e = equipos.find(x => x.id === u.equipo_id);
    parts.push(e ? e.nombre : '?');
  } else if (u.sector_id) {
    parts.push('<i style="color:#888">Sin Equipo</i>');
  }
  if (u.conjunto_id) {
    const c = conjuntos.find(x => x.id === u.conjunto_id);
    parts.push(c ? c.nombre : '?');
  } else if (u.equipo_id) {
    parts.push('<i style="color:#888">Sin Conjunto</i>');
  }
  if (u.subconjunto_id) {
    const s = subconjuntos.find(x => x.id === u.subconjunto_id);
    parts.push(s ? s.nombre : '?');
  } else if (u.conjunto_id) {
    parts.push('<i style="color:#888">Sin Subconjunto</i>');
  }
  return parts.length > 0 ? parts.map(p => '<b>' + p + '</b>').join(' <span style="color:#888">›</span> ') : '<i>(sin ubicación)</i>';
}

function pmQuitarUbicacion(idx) {
  if (!pmFormState) return;
  pmFormState.ubicacionesPendientes.splice(idx, 1);

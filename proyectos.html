// ============================================================================
// MATRIZ DE PRODUCTOS (subtab del modulo Recursos)
// ============================================================================
// Productos plantilla para acelerar la carga de items en proyectos nuevos.
// Cuando se importa al proyecto se hace COPIA INDEPENDIENTE: cambios
// posteriores en uno NO afectan al otro.
//
// La vista tiene dos modos: 'productos' (lista de productos) y 'clientes'
// (lista de clientes con sus productos desplegables).
//
// Productos sin cliente -> agrupados bajo "Productos Genéricos" (cliente
// virtual, no es entrada en la tabla clientes).
//
// Estado: nav.matrizView ('productos'|'clientes'), nav.matrizExpanded (set de
// ids expandidos para mostrar procesos/productos).
// ============================================================================

const MATRIZ_FILTERS_KEY = 'velasco_matrizFilters_v3';
const MATRIZ_SORT_KEY = 'velasco_matrizSort_v1';
const DEFAULT_MATRIZ_FILTERS = {
  search: '',          // substring sobre descripcion del producto
  clienteIds: [],      // multi-select: array de ids o 'GENERICO'
  sectorIds: [],       // multi-select: array de ids
  equipoIds: [],       // multi-select: array de ids
  conjuntoIds: [],     // multi-select: array de ids
  subconjuntoIds: [],  // multi-select: array de ids
  codigos: ''          // substring transversal: matchea contra codigo del cliente,
                       // codigo de equipo del cliente, codigo de cliente del producto,
                       // ID interno del producto.
};
const DEFAULT_MATRIZ_SORT = { by: 'descripcion', dir: 'asc' };
let matrizFilters = (function(){
  try { const r = localStorage.getItem(MATRIZ_FILTERS_KEY); return r ? { ...DEFAULT_MATRIZ_FILTERS, ...JSON.parse(r) } : { ...DEFAULT_MATRIZ_FILTERS }; }
  catch(e){ return { ...DEFAULT_MATRIZ_FILTERS }; }
})();
let matrizSort = (function(){
  try { const r = localStorage.getItem(MATRIZ_SORT_KEY); return r ? { ...DEFAULT_MATRIZ_SORT, ...JSON.parse(r) } : { ...DEFAULT_MATRIZ_SORT }; }
  catch(e){ return { ...DEFAULT_MATRIZ_SORT }; }
})();
function saveMatrizFilters() { try { localStorage.setItem(MATRIZ_FILTERS_KEY, JSON.stringify(matrizFilters)); } catch(e){} }
function saveMatrizSort() { try { localStorage.setItem(MATRIZ_SORT_KEY, JSON.stringify(matrizSort)); } catch(e){} }

// Estado de despliegue (no persistente). Usamos un solo Set con claves
// tipo "cli:N", "sec:N", "eq:N", "con:N", "sub:N", "prod:N", "gen" (para el
// nodo virtual de Productos Genericos). Asi la vista anidada puede manejar
// cualquier nivel.
let matrizExpanded = new Set();
// Compat con el codigo viejo (vista Productos plana usa esto):
let matrizExpandedProds = {
  has: id => matrizExpanded.has('prod:' + id),
  add: id => matrizExpanded.add('prod:' + id),
  delete: id => matrizExpanded.delete('prod:' + id)
};
let matrizExpandedClientes = {
  has: id => matrizExpanded.has('cli:' + id),
  add: id => matrizExpanded.add('cli:' + id),
  delete: id => matrizExpanded.delete('cli:' + id)
};

function countActiveMatrizFilters() {
  let n = 0;
  if (matrizFilters.search && matrizFilters.search.trim()) n++;
  if (matrizFilters.clienteIds && matrizFilters.clienteIds.length > 0) n++;
  if (matrizFilters.sectorIds && matrizFilters.sectorIds.length > 0) n++;
  if (matrizFilters.equipoIds && matrizFilters.equipoIds.length > 0) n++;
  if (matrizFilters.conjuntoIds && matrizFilters.conjuntoIds.length > 0) n++;
  if (matrizFilters.subconjuntoIds && matrizFilters.subconjuntoIds.length > 0) n++;
  if (matrizFilters.codigos && matrizFilters.codigos.trim()) n++;
  return n;
}

// Filtra los productos aplicando todos los criterios. Para los filtros
// jerarquicos (sector/equipo/conjunto/subconjunto), un producto matchea si
// CUALQUIERA de sus ubicaciones matchea. Esto es cascada flexible: los
// filtros se aplican en AND entre dimensiones, OR dentro de cada dimension,
// y OR entre las ubicaciones del producto.
function applyMatrizFilters(list) {
  let out = list;
  // 1. Busqueda por descripcion (substring)
  if (matrizFilters.search && matrizFilters.search.trim()) {
    const q = matrizFilters.search.trim().toLowerCase();
    out = out.filter(p => (p.descripcion || '').toLowerCase().includes(q));
  }
  // 2. Filtro de cliente (multi OR). Considera 'GENERICO' = sin cliente.
  if (matrizFilters.clienteIds && matrizFilters.clienteIds.length > 0) {
    const includesGenerico = matrizFilters.clienteIds.includes('GENERICO');
    const numericIds = new Set(matrizFilters.clienteIds.filter(x => x !== 'GENERICO').map(x => parseInt(x)));
    out = out.filter(p => {
      if (!p.cliente_id) return includesGenerico;
      return numericIds.has(p.cliente_id);
    });
  }
  // 3. Filtros jerarquicos: cada uno mira si alguna ubicacion del producto
  //    apunta al sector/equipo/conjunto/subconjunto seleccionado.
  const sectIds = new Set((matrizFilters.sectorIds || []).map(x => parseInt(x)));
  const eqIds = new Set((matrizFilters.equipoIds || []).map(x => parseInt(x)));
  const conIds = new Set((matrizFilters.conjuntoIds || []).map(x => parseInt(x)));
  const subIds = new Set((matrizFilters.subconjuntoIds || []).map(x => parseInt(x)));
  if (sectIds.size > 0 || eqIds.size > 0 || conIds.size > 0 || subIds.size > 0) {
    out = out.filter(p => {
      const ubics = productosMatrizUbicaciones.filter(u => u.producto_id === p.id);
      // El producto matchea si CUALQUIERA de sus ubicaciones cumple TODOS los
      // filtros jerarquicos activos. Para una ubicacion U:
      //   U matchea sectores si U.sector_id ∈ sectIds (o sectIds vacio)
      // Y asi para los demas niveles.
      return ubics.some(u => {
        if (sectIds.size > 0 && !sectIds.has(u.sector_id)) return false;
        if (eqIds.size > 0 && !eqIds.has(u.equipo_id)) return false;
        if (conIds.size > 0 && !conIds.has(u.conjunto_id)) return false;
        if (subIds.size > 0 && !subIds.has(u.subconjunto_id)) return false;
        return true;
      });
    });
  }
  // 4. Filtro transversal de codigos (substring case-insensitive)
  if (matrizFilters.codigos && matrizFilters.codigos.trim()) {
    const q = matrizFilters.codigos.trim().toLowerCase();
    out = out.filter(p => {
      // Codigo del cliente del producto
      const cli = p.cliente_id ? clientes.find(c => c.id === p.cliente_id) : null;
      if (cli && cli.codigo && cli.codigo.toLowerCase().includes(q)) return true;
      // Codigo de cliente del producto (texto libre del producto)
      if (p.codigo_cliente && p.codigo_cliente.toLowerCase().includes(q)) return true;
      // ID interno del producto (numerico, comparado como string)
      if (String(p.id).includes(q)) return true;
      // Codigo de equipo del cliente: revisar en cualquiera de las ubicaciones
      const ubics = productosMatrizUbicaciones.filter(u => u.producto_id === p.id);
      for (const u of ubics) {
        if (u.equipo_id) {
          const eq = equipos.find(e => e.id === u.equipo_id);
          if (eq && eq.codigo_cliente && eq.codigo_cliente.toLowerCase().includes(q)) return true;
        }
        // Codigo del cliente de la ubicacion (puede ser distinto al del producto)
        if (u.cliente_id) {
          const cu = clientes.find(c => c.id === u.cliente_id);
          if (cu && cu.codigo && cu.codigo.toLowerCase().includes(q)) return true;
        }
      }
      return false;
    });
  }
  return out;
}

function sortMatriz(list) {
  const out = list.slice();
  out.sort((a, b) => {
    let cmp = 0;
    if (matrizSort.by === 'descripcion') {
      cmp = (a.descripcion || '').localeCompare(b.descripcion || '');
    } else if (matrizSort.by === 'cliente') {
      const ca = a.cliente_id ? clN(a.cliente_id) : 'Productos Genéricos';
      const cb = b.cliente_id ? clN(b.cliente_id) : 'Productos Genéricos';
      cmp = ca.localeCompare(cb);
    } else if (matrizSort.by === 'created') {
      const ta = a.created_at ? new Date(a.created_at).getTime() : 0;
      const tb = b.created_at ? new Date(b.created_at).getTime() : 0;
      cmp = ta - tb;
    } else if (matrizSort.by === 'cant_procesos') {
      const ca = productosMatrizProcesos.filter(pr => pr.producto_id === a.id).length;
      const cb = productosMatrizProcesos.filter(pr => pr.producto_id === b.id).length;
      cmp = ca - cb;
    }
    if (cmp === 0) cmp = (a.id || 0) - (b.id || 0);
    return matrizSort.dir === 'asc' ? cmp : -cmp;
  });
  return out;
}

// Toggle generico para multi-select. fieldName es el nombre del campo en
// matrizFilters (clienteIds, sectorIds, etc.). v puede ser numero o 'GENERICO'
// (solo para clienteIds).
function matrizToggleFilter(fieldName, v) {
  const norm = (v === 'GENERICO') ? 'GENERICO' : parseInt(v);
  const list = (matrizFilters[fieldName] || []).slice();
  const idx = list.findIndex(x => x === norm);
  if (idx >= 0) list.splice(idx, 1);
  else list.push(norm);
  matrizFilters[fieldName] = list;
  saveMatrizFilters();
  render();
}

// =============================================================================
// COMPONENTE GENERICO: filtro multi-select buscable
// =============================================================================
// Encapsula el patron "chips arriba + input buscable + dropdown".
// Cada filtro se identifica por su id base (ej. 'matriz-cli', 'matriz-sec', etc.).
// Los handlers de open/close/input son nombrados por convencion:
//   <baseId>SearchOpen, <baseId>SearchClose, <baseId>SearchInput
//
// Para evitar tener que codear handlers especificos para cada filtro,
// usamos una unica funcion generica matrizMultiSelectInput que toma el id
// y la fuente de datos de los candidatos.

// Construye el HTML de un filtro multi-select buscable.
// Args:
//   - id: id base ('matriz-cli', 'matriz-sec', etc.)
//   - label: etiqueta visible ('Clientes', 'Sectores', etc.)
//   - selectedItems: array de ids seleccionados [{key, label}, ...]
//   - placeholder: texto del input
//   - onToggleFn: nombre de funcion para toggle (string)
//   - onSearchFn: nombre de funcion para input event (string)
//   - flexBasis: estilo flex para el wrap exterior (opcional)
function _buildMultiFilter(opts) {
  const { id, label, selectedItems, placeholder, onToggleFn, onSearchFn, flexBasis } = opts;
  const wrapStyle = flexBasis ? ('flex:' + flexBasis) : 'flex:1';
  let h = '<div style="display:flex;align-items:flex-start;gap:6px;' + wrapStyle + '">';

}

// Renderiza el dropdown de un filtro multi-select. Recibe el id base, la
// lista de candidatos disponibles {key, label, sublabel?} y la funcion de toggle.
function _renderMultiDropdown(id, query, candidates, onToggleFn) {
  const dd = document.getElementById(id + '-dropdown');
  if (!dd) return;
  const q = (query || '').toLowerCase();
  const matches = candidates.filter(c =>
    c.label.toLowerCase().includes(q) ||
    (c.sublabel || '').toLowerCase().includes(q)
  );
  if (matches.length === 0) {
    dd.innerHTML = '<div style="padding:8px 10px;font-size:11px;color:#888;font-style:italic">Sin opciones</div>';
  } else {
    dd.innerHTML = matches.map(c => {
      let lblHtml = escapeHtml(c.label);
      if (c.sublabel) lblHtml += ' <span style="color:#888;font-size:10px">' + escapeHtml(c.sublabel) + '</span>';
      return '<div class="combo-item" style="padding:6px 10px;cursor:pointer;font-size:12px" onmousedown="' + onToggleFn + '(\'' + c.key + '\')">' + lblHtml + '</div>';
    }).join('');
  }
  dd.style.display = 'block';
}

// Sectores. Si hay clientes filtrados, mostramos solo los sectores de esos
// clientes (sin prefijo). Si no hay, mostramos todos con prefijo "Cliente >".
function matrizSecSearchInput() {
  const input = document.getElementById('matriz-sec-search');
  if (!input) return;
  const selected = new Set((matrizFilters.sectorIds || []).map(x => parseInt(x)));
  const cliFilter = matrizFilters.clienteIds || [];
  const numericCli = new Set(cliFilter.filter(x => x !== 'GENERICO').map(x => parseInt(x)));
  // Genericos no tienen sectores (los productos sin cliente no estan en jerarquia)
  let candidatos = sectores.slice();
  if (cliFilter.length > 0 && !cliFilter.includes('GENERICO')) {
    candidatos = candidatos.filter(s => numericCli.has(s.cliente_id));
  } else if (cliFilter.length > 0 && cliFilter.includes('GENERICO') && numericCli.size > 0) {
    candidatos = candidatos.filter(s => numericCli.has(s.cliente_id));
  }
  // Si no hay cliente filtrado, mostramos todos con prefijo
  const showPrefix = cliFilter.length === 0;
  const candidates = candidatos.filter(s => !selected.has(s.id)).map(s => {
    const cli = clientes.find(c => c.id === s.cliente_id);
    return {
      key: s.id,
      label: showPrefix ? (cli ? cli.nombre + ' > ' + s.nombre : s.nombre) : s.nombre,
      sublabel: ''
    };
  });

// Genera el breadcrumb del filtro: una linea con las dimensiones activas
// separadas por ›. Ej: "GDLP › Producción › Tapadora › (Cualquier conjunto) › Brida".
// Cada dimension muestra:
//   - una sola seleccion: el nombre.
//   - varias selecciones: "(Nombre1, Nombre2, ...)" o "(N items)".
//   - sin seleccion: nada (no se muestra esa dimension).
// Si no hay nada activo, devuelve null.
function _matrizFilterBreadcrumbHtml() {
  const parts = [];
  // Codigos: si esta activo, lo ponemos al inicio como filtro especial
  if (matrizFilters.codigos && matrizFilters.codigos.trim()) {
    parts.push('<b>Códigos:</b> "' + escapeHtml(matrizFilters.codigos.trim()) + '"');
  }
  // Search: si esta activo, igual
  if (matrizFilters.search && matrizFilters.search.trim()) {
    parts.push('<b>Buscar:</b> "' + escapeHtml(matrizFilters.search.trim()) + '"');
  }
  // Jerarquia
  const dimensions = [
    { ids: matrizFilters.clienteIds || [], get: (id) => id === 'GENERICO' ? 'Productos Genéricos' : clN(id), name: 'Cliente' },
    { ids: matrizFilters.sectorIds || [], get: (id) => { const s = sectores.find(x => x.id === parseInt(id)); return s ? s.nombre : '?'; }, name: 'Sector' },
    { ids: matrizFilters.equipoIds || [], get: (id) => { const e = equipos.find(x => x.id === parseInt(id)); return e ? e.nombre : '?'; }, name: 'Equipo' },
    { ids: matrizFilters.conjuntoIds || [], get: (id) => { const c = conjuntos.find(x => x.id === parseInt(id)); return c ? c.nombre : '?'; }, name: 'Conjunto' },
    { ids: matrizFilters.subconjuntoIds || [], get: (id) => { const s = subconjuntos.find(x => x.id === parseInt(id)); return s ? s.nombre : '?'; }, name: 'Subconjunto' }
  ];
  const jerParts = [];
  dimensions.forEach(d => {
    if (d.ids.length === 0) return;
    if (d.ids.length === 1) {
      jerParts.push('<b>' + escapeHtml(d.get(d.ids[0])) + '</b>');
    } else if (d.ids.length <= 3) {
      jerParts.push('<b>' + d.ids.map(i => escapeHtml(d.get(i))).join(', ') + '</b>');
    } else {
      jerParts.push('<b>' + d.ids.length + ' ' + d.name.toLowerCase() + 's</b>');
    }
  });
  if (jerParts.length > 0) {
    parts.push(jerParts.join(' <span style="color:#999">›</span> '));
  }
  if (parts.length === 0) return null;
  return parts.join(' <span style="color:#888;margin:0 6px">·</span> ');
}

function _matrizProductoCardHtml(p) {
  const procs = productosMatrizProcesos.filter(pr => pr.producto_id === p.id)
    .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
  const expanded = matrizExpandedProds.has(p.id);
  const ubics = productosMatrizUbicaciones.filter(u => u.producto_id === p.id);
  let h = '<div style="background:#fff;border:1px solid #C8C6BE;border-radius:8px;margin-bottom:8px;overflow:hidden">';
  h += '<div style="display:flex;align-items:center;padding:8px 12px;gap:10px">';

  h += '<button class="b" onclick="event.stopPropagation();matrizToggleExpandProd(' + p.id + ')" style="background:transparent;border:none;padding:4px;font-size:14px;color:#5F5E5A;cursor:pointer;flex:0 0 auto">' + (expanded ? '▼' : '▶') + '</button>';
  // Foto/icono también navega a detalle al hacer click

    h += '<div class="card-img" style="flex:0 0 auto;cursor:pointer" onclick="navigate({view:\'productoMatriz\',productoId:' + p.id + '})"><img src="' + escapeHtml(p.foto_url) + '" alt=""></div>';
  } else {
    h += '<div class="card-img-empty" style="flex:0 0 auto;cursor:pointer" onclick="navigate({view:\'productoMatriz\',productoId:' + p.id + '})">🔧</div>';
  }
  // Body: descripción clickeable para ir al detalle del producto.
  // La ruta de ubicaciones se muestra abajo, con cada nivel clickeable a la vista anidada.
  h += '<div style="flex:1;min-width:0">';
  const validacion = validarProductoMatriz(p.id);
  const warnIcon = validacion.ok ? '' : _warningIconHtml('Producto incompleto o desactualizado:\n' + validacion.problemas.join('\n'));
  h += '<div class="card-t" style="cursor:pointer" onclick="navigate({view:\'productoMatriz\',productoId:' + p.id + '})">' + escapeHtml(p.descripcion || '(sin descripción)') + warnIcon + '</div>';
  // Rutas (una por línea si hay varias ubicaciones), o "Productos Genéricos" si no tiene
  if (ubics.length === 0) {
    h += '<div class="card-s" style="margin-top:2px"><span style="color:#5F5E5A">Productos Genéricos</span> · <span>' + procs.length + ' proceso(s)</span></div>';
  } else {
    ubics.forEach(u => {
      h += '<div class="card-s" style="margin-top:2px">' + _pmUbicacionRouteClickable(u) + '</div>';
    });
    h += '<div class="card-s" style="margin-top:2px;color:#888">' + procs.length + ' proceso(s)</div>';
  }
  h += '</div>';
  // Acciones
  h += '<div class="card-actions" style="flex:0 0 auto">';
  h += '<button class="b b-icon" onclick="event.stopPropagation();showProductoMatrizForm(' + p.id + ')">Editar</button>';
  h += '<button class="b b-icon b-d" onclick="event.stopPropagation();confirmDeleteProductoMatriz(' + p.id + ')">Eliminar</button>';
  h += '</div></div>';
  // Procesos desplegados
  if (expanded) {
    h += '<div style="border-top:1px solid #E8E6DF;background:#FAF9F5;padding:10px 16px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    h += '<div style="font-size:11px;font-weight:600;color:#5F5E5A">PROCESOS</div>';
    h += '<button class="b b-p" style="padding:3px 10px;font-size:11px" onclick="showProcesoForm(null, {tipo:\'producto\',parentId:' + p.id + '})">+ Agregar proceso</button>';
    h += '</div>';
    if (procs.length === 0) {
      h += '<div style="font-size:11px;color:#888;font-style:italic;padding:6px 0">Sin procesos cargados.</div>';
    } else {
      procs.forEach((pr, idx) => {
        h += '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;border-top:' + (idx > 0 ? '1px solid #E8E6DF' : 'none') + '">';
        h += '<span style="color:#5F5E5A;flex:0 0 24px">' + (idx + 1) + '.</span>';
        h += '<span style="font-weight:600;flex:0 0 auto">' + escapeHtml(pr.proceso || '?') + '</span>';
        const dur = pr.duracion_estimada_min ? (pr.duracion_estimada_min + 'min') : '';
        const maq = pr.maquina_ideal_id ? mN(pr.maquina_ideal_id) : (pr.maquina_ideal_nombre || '');
        const op = pr.operario_ideal_id ? opN(pr.operario_ideal_id) : '';
        const meta = [dur, maq, op].filter(Boolean).join(' · ');
        if (meta) h += '<span style="color:#888;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(meta) + '</span>';
        h += '<button class="b b-icon" onclick="showProcesoForm(' + pr.id + ', {tipo:\'producto\',parentId:' + p.id + '})">Editar</button>';
        h += '<button class="b b-icon b-d" onclick="procCtx={tipo:\'producto\',parentId:' + p.id + '};confirmDeleteProceso(' + pr.id + ')">×</button>';
        h += '</div>';
      });
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// Vista clientes: lista de clientes con productos desplegables
// =============================================================================
// VISTA CLIENTES - render anidado completo
// =============================================================================
// Niveles: Cliente -> Sectores -> Equipos -> Conjuntos -> Subconjuntos ->
// Productos -> Procesos.
//
// En cada nivel anidado el orden es: hijos directos del nivel actual primero
// (conjuntos, subconjuntos), despues los productos que estan ubicados
// directamente en este nivel (sin descender mas).
//
// Aplica los filtros activos. Un nivel se muestra solo si contiene al menos
// un producto que pase los filtros.
//
// Toggle generico de expansion: claves "cli:N", "sec:N", "eq:N", "con:N",
// "sub:N", "prod:N" (para los procesos del producto).
// =============================================================================

function matrizToggleExpand(key) {
  if (matrizExpanded.has(key)) matrizExpanded.delete(key);
  else matrizExpanded.add(key);
  // Re-renderizar solo la lista (no la barra) para no perder foco de inputs
  _matrizRerenderList();
}

// Wrappers retrocompatibles
function matrizToggleExpandProd(id) { matrizToggleExpand('prod:' + id); }
function matrizToggleExpandCliente(idOrGen) { matrizToggleExpand('cli:' + idOrGen); }

// Helpers de jerarquia: dado un nivel y un padre, devuelve sus hijos.
// Cada uno aplica los filtros (chips activos) si corresponde.
function _matrizSectoresDelCliente(cliId) {
  const sectIds = (matrizFilters.sectorIds || []).map(x => parseInt(x));
  let secs = sectores.filter(s => s.cliente_id === cliId);
  // Si hay filtro de sectores, recortar a esos
  if (sectIds.length > 0) secs = secs.filter(s => sectIds.includes(s.id));
  return secs.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
}
function _matrizEquiposDelSector(secId) {
  const eqIds = (matrizFilters.equipoIds || []).map(x => parseInt(x));
  let eqs = equipos.filter(e => e.sector_id === secId);
  if (eqIds.length > 0) eqs = eqs.filter(e => eqIds.includes(e.id));
  return eqs.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
}
function _matrizConjuntosDelEquipo(eqId, cliId) {
  const conIds = (matrizFilters.conjuntoIds || []).map(x => parseInt(x));
  // v70: usar equipo_conjuntos (nueva tabla) en vez de conjuntos_equipos (vieja).
  const linkedConIds = new Set(equipoConjuntos.filter(ec => ec.equipo_id === eqId).map(ec => ec.conjunto_id));
  let cons = conjuntos.filter(c => linkedConIds.has(c.id));
  cons = cons.filter(c => c.cliente_id === cliId);
  if (conIds.length > 0) cons = cons.filter(c => conIds.includes(c.id));
  return cons.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
}
function _matrizSubconjuntosDelConjunto(conId, cliId) {
  const subIds = (matrizFilters.subconjuntoIds || []).map(x => parseInt(x));
  // v70: usar conjunto_subconjuntos (nueva) en vez de subconjuntos_conjuntos (vieja).
  const linkedSubIds = new Set(conjuntoSubconjuntos.filter(cs => cs.conjunto_id === conId).map(cs => cs.subconjunto_id));
  let subs = subconjuntos.filter(s => linkedSubIds.has(s.id));
  subs = subs.filter(s => s.cliente_id === cliId);
  if (subIds.length > 0) subs = subs.filter(s => subIds.includes(s.id));
  return subs.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
}

// v70: NUEVA función. Reemplaza _matrizProductosEnNivel.
// Lee productos directamente de la tabla de composición del contenedor.
// `tipo` = 'equipo' | 'conjunto' | 'subconjunto'. `contenedorId` es el id.
function _matrizProductosDelContenedor(tipo, contenedorId) {
  let rows;
  if (tipo === 'subconjunto') {
    rows = subconjuntoProductos.filter(sp => sp.subconjunto_id === contenedorId);
  } else if (tipo === 'conjunto') {
    rows = conjuntoProductos.filter(cp => cp.conjunto_id === contenedorId);
  } else if (tipo === 'equipo') {
    rows = equipoProductos.filter(ep => ep.equipo_id === contenedorId);
  } else {
    return [];
  }
  // Mapear a productos completos y aplicar filtros activos
  const productosIds = new Set(rows.map(r => r.producto_id));
  const filteredProds = applyMatrizFilters(productosMatriz);
  return filteredProds.filter(p => productosIds.has(p.id));
}

// v70: Función de compat para el código que todavía llama con opts antiguos.
// Decide qué tabla leer según los campos de opts.
function _matrizProductosEnNivel(opts) {
  // Si tiene subconjuntoId definido (no null), va a subconjunto_productos
  if (opts.subconjuntoId !== null && opts.subconjuntoId !== undefined) {
    return _matrizProductosDelContenedor('subconjunto', opts.subconjuntoId);
  }
  // Si tiene conjuntoId definido (no null), va a conjunto_productos
  if (opts.conjuntoId !== null && opts.conjuntoId !== undefined) {
    return _matrizProductosDelContenedor('conjunto', opts.conjuntoId);
  }
  // Si tiene equipoId definido (no null), va a equipo_productos
  if (opts.equipoId !== null && opts.equipoId !== undefined) {
    return _matrizProductosDelContenedor('equipo', opts.equipoId);
  }
  // Niveles superiores (cliente o sector sin equipo): en v70 ya no hay productos
  // sueltos en esos niveles (todo va al menos al "Sin equipo específico").
  return [];
}

// v70: Devuelve la cantidad del producto en un contenedor específico.
// `tipo` = 'equipo' | 'conjunto' | 'subconjunto'. Devuelve 0 si no está.
function _matrizCantidadProductoEn(tipo, contenedorId, productoId) {
  let row;
  if (tipo === 'subconjunto') {
    row = subconjuntoProductos.find(sp => sp.subconjunto_id === contenedorId && sp.producto_id === productoId);
  } else if (tipo === 'conjunto') {
    row = conjuntoProductos.find(cp => cp.conjunto_id === contenedorId && cp.producto_id === productoId);
  } else if (tipo === 'equipo') {
    row = equipoProductos.find(ep => ep.equipo_id === contenedorId && ep.producto_id === productoId);
  }
  return row ? (row.cantidad || 1) : 0;
}

// =============================================================================
// VALIDACION DE PRODUCTO MATRIZ
// =============================================================================
// validarProductoMatriz(productoId): devuelve {ok, problemas} donde problemas
// es un array de strings describiendo cada falla. Se usa al importar y al
// renderizar el indicador ⚠ en las vistas.
//
// Reglas:
// - Material asignado (material_id no null).
// - Presentacion de materia prima (presentacion_mat_prima no null/vacia).
// - Al menos un proceso cargado.
// - Cada proceso debe tener: maquina ideal, operario ideal, duracion estimada,
//   detalle de tareas (trabajo_a_realizar).
// - Operarios y maquinas referenciados deben estar activos (activo=true).
function validarProductoMatriz(productoId) {
  const problemas = [];
  const prod = productosMatriz.find(p => p.id === productoId);
  if (!prod) return { ok: false, problemas: ['Producto no encontrado'] };

  // 1. Material
  if (!prod.material_id) problemas.push('Falta material asignado');
  // 2. Presentación
  if (!prod.presentacion_mat_prima || !prod.presentacion_mat_prima.trim()) {
    problemas.push('Falta presentación de materia prima');
  }
  // 3. Procesos
  const procs = productosMatrizProcesos.filter(pp => pp.producto_id === productoId);
  if (procs.length === 0) {
    problemas.push('No tiene procesos cargados');
  } else {
    procs.forEach((pp, idx) => {
      const n = (idx + 1) + ' (' + (pp.proceso || '?') + ')';
      if (!pp.duracion_estimada_min || pp.duracion_estimada_min < 1) {
        problemas.push('Proceso ' + n + ': falta duración estimada');
      }
      // NOTA: la maquina ideal puede ser null/null intencionalmente cuando el
      // usuario eligió "Ninguna" (proceso sin maquina). No es una falla.
      // El form de proceso obliga a elegir una opción (NINGUNA, OTRA, o máquina),
      // así que null/null en DB siempre es "Ninguna" elegida explícitamente.
      if (!pp.operario_ideal_id) {
        problemas.push('Proceso ' + n + ': falta operario ideal');
      }
      if (!pp.trabajo_a_realizar || !String(pp.trabajo_a_realizar).trim()) {
        problemas.push('Proceso ' + n + ': falta detalle de tareas');
      }
      // Activos
      if (pp.maquina_ideal_id) {
        const mq = maquinas.find(m => m.id === pp.maquina_ideal_id);
        if (mq && mq.activo === false) {
          problemas.push('Proceso ' + n + ': la máquina ideal "' + mq.nombre + '" está inactiva');
        }
      }
      if (pp.operario_ideal_id) {
        const op = operarios.find(o => o.id === pp.operario_ideal_id);
        if (op && op.activo === false) {
          problemas.push('Proceso ' + n + ': el operario ideal "' + op.nombre + '" está inactivo');
        }
      }
      // Suplentes inactivos
      (pp.maquinas_suplentes || []).forEach(mqId => {
        const mq = maquinas.find(m => m.id === parseInt(mqId));
        if (mq && mq.activo === false) {
          problemas.push('Proceso ' + n + ': la máquina suplente "' + mq.nombre + '" está inactiva');
        }
      });
      (pp.operarios_suplentes || []).forEach(opId => {
        const op = operarios.find(o => o.id === parseInt(opId));
        if (op && op.activo === false) {
          problemas.push('Proceso ' + n + ': el operario suplente "' + op.nombre + '" está inactivo');
        }
      });
    });
  }

  return { ok: problemas.length === 0, problemas: problemas };
}

// Devuelve true si el producto tiene algun problema (para el indicador ⚠).
function _matrizProductoTieneProblemas(productoId) {
  return !validarProductoMatriz(productoId).ok;
}

// v70: Devuelve true si en este nodo hay al menos un producto con problemas.
// Lee de las tablas de composición nuevas.
function _matrizNivelTieneProblemas(opts) {
  // opts: {clienteId, sectorId, equipoId, conjuntoId, subconjuntoId}
  // Solo UNO suele venir definido (el más específico). Recorremos la jerarquía.
  let prodIds;
  if (opts.subconjuntoId !== undefined && opts.subconjuntoId !== null) {
    prodIds = _matrizProdIdsSubconjunto(opts.subconjuntoId);
  } else if (opts.conjuntoId !== undefined && opts.conjuntoId !== null) {
    prodIds = _matrizProdIdsConjunto(opts.conjuntoId);
  } else if (opts.equipoId !== undefined && opts.equipoId !== null) {
    prodIds = _matrizProdIdsEquipo(opts.equipoId);
  } else if (opts.sectorId !== undefined && opts.sectorId !== null) {
    prodIds = _matrizProdIdsSector(opts.sectorId);
  } else if (opts.clienteId !== undefined && opts.clienteId !== null) {
    prodIds = _matrizProdIdsCliente(opts.clienteId);
  } else {
    return false;
  }
  for (const id of prodIds) {
    if (_matrizProductoTieneProblemas(id)) return true;
  }
  return false;
}

// Icono ⚠ con tooltip. Usar como sufijo en titulos.
function _warningIconHtml(tooltip) {
  const tt = tooltip ? ' title="' + escapeHtml(tooltip) + '"' : '';
  return ' <span style="font-size:13px"' + tt + '>⚠️</span>';
}

// v70: Counters usando las tablas de composición nuevas.
// Lógica: bajamos por la jerarquía y juntamos ids de productos únicos.

// Helper: ids de productos en un subconjunto
function _matrizProdIdsSubconjunto(subId) {
  return new Set(subconjuntoProductos.filter(sp => sp.subconjunto_id === subId).map(sp => sp.producto_id));
}
// Helper: ids de productos en un conjunto (directos + via subconjuntos del conjunto)
function _matrizProdIdsConjunto(conId) {
  const ids = new Set(conjuntoProductos.filter(cp => cp.conjunto_id === conId).map(cp => cp.producto_id));
  conjuntoSubconjuntos.filter(cs => cs.conjunto_id === conId).forEach(cs => {
    _matrizProdIdsSubconjunto(cs.subconjunto_id).forEach(id => ids.add(id));
  });
  return ids;
}
// Helper: ids de productos en un equipo (directos + via conjuntos del equipo)
function _matrizProdIdsEquipo(eqId) {
  const ids = new Set(equipoProductos.filter(ep => ep.equipo_id === eqId).map(ep => ep.producto_id));
  equipoConjuntos.filter(ec => ec.equipo_id === eqId).forEach(ec => {
    _matrizProdIdsConjunto(ec.conjunto_id).forEach(id => ids.add(id));
  });
  return ids;
}
// Helper: ids de productos en un sector (suma de equipos del sector)
function _matrizProdIdsSector(secId) {
  const ids = new Set();
  equipos.filter(e => e.sector_id === secId).forEach(e => {
    _matrizProdIdsEquipo(e.id).forEach(id => ids.add(id));
  });
  return ids;
}
// Helper: ids de productos en un cliente (suma de sectores del cliente)
function _matrizProdIdsCliente(cliId) {
  const ids = new Set();
  sectores.filter(s => s.cliente_id === cliId).forEach(s => {
    _matrizProdIdsSector(s.id).forEach(id => ids.add(id));
  });
  return ids;
}

function _matrizCountProdsDelCliente(cliId) {
  const ids = _matrizProdIdsCliente(cliId);
  const filtered = applyMatrizFilters(productosMatriz);
  return filtered.filter(p => ids.has(p.id)).length;
}
function _matrizCountProdsDelSector(secId) {
  const ids = _matrizProdIdsSector(secId);
  const filtered = applyMatrizFilters(productosMatriz);
  return filtered.filter(p => ids.has(p.id)).length;
}
function _matrizCountProdsDelEquipo(eqId) {
  const ids = _matrizProdIdsEquipo(eqId);
  const filtered = applyMatrizFilters(productosMatriz);
  return filtered.filter(p => ids.has(p.id)).length;
}
function _matrizCountProdsDelConjunto(conId) {
  const ids = _matrizProdIdsConjunto(conId);
  const filtered = applyMatrizFilters(productosMatriz);
  return filtered.filter(p => ids.has(p.id)).length;
}
function _matrizCountProdsDelSubconjunto(subId) {
  const ids = _matrizProdIdsSubconjunto(subId);
  const filtered = applyMatrizFilters(productosMatriz);
  return filtered.filter(p => ids.has(p.id)).length;
}

// ---- Render de cada nivel ----

// Render de un nodo expandible generico (cliente, sector, equipo, etc).
// Args:
//   key: 'cli:N', 'sec:N', etc.
//   icon: emoji o caracter para el header
//   title: titulo principal del header
//   meta: linea secundaria del header (ej. "8 producto(s)")
//   color: color del titulo (HEX)
//   indent: paddingLeft del bloque expandido (px)
//   childrenHtml: callback que devuelve el HTML interior cuando esta expandido
//   fotoUrl: (opcional) URL de imagen a mostrar AL LADO del emoji
function _matrizRenderNode(key, icon, title, meta, color, indent, childrenHtml, iconSize, addBtnFn, editBtnFn, fotoUrl) {
  const expanded = matrizExpanded.has(key);
  let h = '<div style="background:#fff;border:1px solid #C8C6BE;border-radius:6px;margin-bottom:6px;overflow:hidden">';
  h += '<div style="display:flex;align-items:center;padding:8px 12px;gap:8px;cursor:pointer" onclick="matrizToggleExpand(\'' + key + '\')">';
  h += '<span style="font-size:13px;color:#5F5E5A;flex:0 0 auto;width:14px">' + (expanded ? '▼' : '▶') + '</span>';
  const size = iconSize || 14;
  // El emoji/ícono siempre se muestra (es la pista visual del tipo de nodo).
  if (icon) {
    h += '<span style="font-size:' + size + 'px;flex:0 0 auto;line-height:1">' + icon + '</span>';
  }
  // v70 Fase 4.5: si hay foto, se muestra como miniatura AL LADO del ícono.
  if (fotoUrl) {
    const imgSize = Math.max(size + 8, 24);
    h += '<img src="' + escapeHtml(fotoUrl) + '" style="width:' + imgSize + 'px;height:' + imgSize + 'px;border-radius:4px;object-fit:cover;flex:0 0 auto;border:1px solid #C8C6BE" onerror="this.style.display=\'none\'">';
  }
  h += '<div style="flex:1;min-width:0">';
  h += '<div style="font-weight:600;color:' + color + ';font-size:13px">' + title + '</div>';
  if (meta) h += '<div style="font-size:11px;color:#888;margin-top:1px">' + meta + '</div>';
  h += '</div>';
  // v70: botón "Editar" para abrir el modal de composición del contenedor.
  if (editBtnFn) {
    h += '<button class="b b-icon" title="Editar contenedor" onclick="event.stopPropagation();' + editBtnFn + '" style="flex:0 0 auto;font-size:12px;padding:2px 8px;color:#5F5E5A">✎</button>';
  }
  // v69: botón "+" para cargar producto pre-rellenado con la ubicación de este nodo.
  if (addBtnFn) {
    h += '<button class="b b-icon" title="Nuevo producto en esta ubicación" onclick="event.stopPropagation();' + addBtnFn + '" style="flex:0 0 auto;font-size:14px;font-weight:600;padding:2px 8px;color:#0C447C">+</button>';
  }
  h += '</div>';
  if (expanded) {
    h += '<div style="border-top:1px solid #E8E6DF;background:#FAF9F5;padding:8px 8px 8px ' + indent + 'px">';
    h += childrenHtml();
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// Card de un producto (forma reducida, para anidar en jerarquia)
// Cuando se expande, muestra los procesos.
// v69: Acepta opcionalmente `contextoUbic` con {conjuntoId, subconjuntoId, equipoId}
// para mostrar el chip con la cantidad del producto en ese contenedor. Si no se
// pasa contexto, no muestra chip.
function _matrizRenderProductoCardNested(p, contextoUbic) {
  const procs = productosMatrizProcesos.filter(pr => pr.producto_id === p.id)
    .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
  const expanded = matrizExpanded.has('prod:' + p.id);
  // v69/v70: calcular cantidad en este contenedor (si aplica). El chip aparece
  // solo si hay contenedor Y cantidad > 0. En v70 lee de las tablas nuevas.
  let cantidadChip = '';
  if (contextoUbic) {
    let cant = 0;
    if (contextoUbic.subconjuntoId) {
      cant = _matrizCantidadProductoEn('subconjunto', contextoUbic.subconjuntoId, p.id);
    } else if (contextoUbic.conjuntoId) {
      cant = _matrizCantidadProductoEn('conjunto', contextoUbic.conjuntoId, p.id);
    } else if (contextoUbic.equipoId) {
      cant = _matrizCantidadProductoEn('equipo', contextoUbic.equipoId, p.id);
    }
    if (cant > 0) {
      cantidadChip = ' <span style="display:inline-block;background:#0C447C;color:#fff;font-size:9px;font-weight:600;padding:1px 6px;border-radius:8px;margin-left:4px;vertical-align:middle">×' + cant + '</span>';
    }
  }
  let h = '<div style="background:#fff;border:1px solid #C8C6BE;border-radius:5px;margin-bottom:5px;overflow:hidden">';
  h += '<div style="display:flex;align-items:center;padding:6px 10px;gap:8px;cursor:pointer" onclick="navigate({view:\'productoMatriz\',productoId:' + p.id + '})">';
  h += '<button class="b" onclick="event.stopPropagation();matrizToggleExpand(\'prod:' + p.id + '\')" style="background:transparent;border:none;padding:2px;font-size:13px;color:#5F5E5A;cursor:pointer;flex:0 0 auto">' + (expanded ? '▼' : '▶') + '</button>';
  if (p.foto_url) {
    h += '<img src="' + escapeHtml(p.foto_url) + '" style="width:32px;height:32px;object-fit:cover;border-radius:3px;flex:0 0 auto">';
  } else {
    h += '<div style="width:32px;height:32px;background:#E8E6DF;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:14px;flex:0 0 auto">🔧</div>';
  }
  h += '<div style="flex:1;min-width:0">';
  const validacion = validarProductoMatriz(p.id);
  const warnIcon = validacion.ok ? '' : _warningIconHtml('Producto incompleto o desactualizado:\n' + validacion.problemas.join('\n'));
  h += '<div style="font-weight:600;font-size:12px">' + escapeHtml(p.descripcion || '(sin descripción)') + cantidadChip + warnIcon + '</div>';
  const matLbl = p.material_id ? ((materiales.find(m => m.id === p.material_id) || {}).nombre || '') : '';
  const meta = [p.codigo_cliente, matLbl, procs.length + ' proceso(s)'].filter(Boolean).join(' · ');
  if (meta) h += '<div style="color:#888;font-size:10px;margin-top:1px">' + escapeHtml(meta) + '</div>';
  h += '</div>';
  h += '</div>';
  if (expanded) {
    h += '<div style="border-top:1px solid #E8E6DF;background:#FAF9F5;padding:8px 12px">';
    h += '<div style="font-size:10px;font-weight:600;color:#5F5E5A;margin-bottom:4px">PROCESOS</div>';
    if (procs.length === 0) {
      h += '<div style="font-size:10px;color:#888;font-style:italic;padding:4px 0">Sin procesos.</div>';
    } else {
      procs.forEach((pr, idx) => {
        h += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;border-top:' + (idx > 0 ? '1px solid #E8E6DF' : 'none') + '">';
        h += '<span style="color:#5F5E5A;flex:0 0 18px">' + (idx + 1) + '.</span>';
        h += '<span style="font-weight:600;flex:0 0 auto">' + escapeHtml(pr.proceso || '?') + '</span>';
        const dur = pr.duracion_estimada_min ? (pr.duracion_estimada_min + 'min') : '';
        const mq = pr.maquina_ideal_id ? mN(pr.maquina_ideal_id) : (pr.maquina_ideal_nombre || '');
        const op = pr.operario_ideal_id ? opN(pr.operario_ideal_id) : '';
        const procMeta = [dur, mq, op].filter(Boolean).join(' · ');
        if (procMeta) h += '<span style="color:#888;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(procMeta) + '</span>';
        h += '<button class="b b-icon" onclick="event.stopPropagation();matrizEditarProcesoDesdeAnidado(' + p.id + ',' + pr.id + ')" style="font-size:10px">Editar</button>';
        h += '</div>';
      });
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// Editar un proceso desde la vista anidada de Matriz: navega a la vista
// completa del producto y, encima, abre el modal de edicion del proceso.
function matrizEditarProcesoDesdeAnidado(productoId, procesoId) {
  // Primero navegamos a la vista del producto. navigate() llama a render() que
  // va a montar el DOM completo de la vista. Despues, en el siguiente tick,
  // abrimos el modal del proceso encima.
  navigate({ view: 'productoMatriz', productoId: productoId });
  setTimeout(() => {
    showProcesoForm(procesoId, { tipo: 'producto', parentId: productoId });
  }, 50);
}

// Vista clientes anidada
function _matrizListClientesHtml() {
  if (!productosMatriz || productosMatriz.length === 0) {
    return '<div class="list-empty">No hay productos cargados. Apretá "+ Nuevo producto" para empezar.</div>';
  }
  // Aplicar filtros (sobre productos) para saber que clientes tienen contenido.
  const filteredProds = applyMatrizFilters(productosMatriz);
  if (filteredProds.length === 0) {
    return '<div class="list-empty">No hay productos que coincidan con los filtros.</div>';
  }
  // Determinar que clientes tienen al menos un producto que pase los filtros.
  const clientesConProductos = new Set();
  let tieneGenerico = false;
  filteredProds.forEach(p => {
    const ubics = productosMatrizUbicaciones.filter(u => u.producto_id === p.id);
    if (ubics.length === 0) {
      if (!p.cliente_id) tieneGenerico = true;
      else clientesConProductos.add(p.cliente_id);
    } else {
      ubics.forEach(u => {
        if (u.cliente_id) clientesConProductos.add(u.cliente_id);
      });
    }
  });

  // Ordenar clientes alfabeticamente
  const cliList = clientes.filter(c => clientesConProductos.has(c.id))
    .sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));

  let h = '';
  cliList.forEach(c => {
    h += _matrizRenderClienteNode(c);
  });
  // Genericos al final
  if (tieneGenerico) {
    h += _matrizRenderGenericosNode();
  }
  return h;
}

function _matrizRenderClienteNode(cli) {
  const cnt = _matrizCountProdsDelCliente(cli.id);
  const codigoChip = cli.codigo
    ? ' <span style="display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;background:#0C447C;color:#fff;font-weight:500;margin-left:4px;letter-spacing:0.3px">' + escapeHtml(cli.codigo) + '</span>'
    : '';
  const warn = _matrizNivelTieneProblemas({ clienteId: cli.id }) ? _warningIconHtml('Algún producto debajo requiere atención') : '';
  return _matrizRenderNode(
    'cli:' + cli.id,
    '🏢',
    escapeHtml(cli.nombre) + codigoChip + warn,
    cnt + ' producto(s)',
    '#0C447C',
    20,
    () => {
      let inner = '';
      const secs = _matrizSectoresDelCliente(cli.id);
      secs.forEach(sec => {
        // v70: mostrar todos los sectores (aunque estén vacíos), para poder
        // navegar y cargar contenido. Son pocos sectores por cliente.
        inner += _matrizRenderSectorNode(sec, cli.id);
      });
      const directos = _matrizProductosEnNivel({
        clienteId: cli.id, sectorId: null, equipoId: null, conjuntoId: null, subconjuntoId: null
      });
      directos.forEach(p => {
        inner += _matrizRenderProductoCardNested(p);
      });
      if (!inner) inner = '<div style="font-size:11px;color:#888;font-style:italic;padding:4px 0">Sin sectores ni productos directos.</div>';
      return inner;
    },
    null,
    'pmNuevoConUbicacion({clienteId:' + cli.id + ',contexto:\'cliente\'})',
    null,
    cli.foto_url || null
  );
}

function _matrizRenderSectorNode(sec, cliId) {
  const cnt = _matrizCountProdsDelSector(sec.id);
  const warn = _matrizNivelTieneProblemas({ sectorId: sec.id }) ? _warningIconHtml('Algún producto debajo requiere atención') : '';
  return _matrizRenderNode(
    'sec:' + sec.id,
    '🏭',
    escapeHtml(sec.nombre) + warn,
    cnt + ' producto(s)',
    '#5F5E5A',
    24,
    () => {
      let inner = '';
      const eqs = _matrizEquiposDelSector(sec.id);
      eqs.forEach(eq => {
        if (_esEquipoDefault(eq)) {
          // v70: el equipo default se promociona (muestra sus hijos al nivel
          // del sector) si tiene productos directos O conjuntos reales —
          // aunque esos conjuntos estén vacíos, para poder cargarles cosas.
          const tieneProds = equipoProductos.some(ep => ep.equipo_id === eq.id);
          const conjuntosReales = _matrizConjuntosDelEquipo(eq.id, cliId).filter(c => !_esConjuntoDefault(c));
          if (!tieneProds && conjuntosReales.length === 0) {
            // ver si el conjunto default tiene algo
            const defaultConProds = _matrizConjuntosDelEquipo(eq.id, cliId)
              .some(c => _esConjuntoDefault(c) && _matrizCountProdsDelConjunto(c.id) > 0);
            if (!defaultConProds) return;
          }
          inner += _matrizRenderInnerEquipo(eq, cliId);
        } else {
          inner += _matrizRenderEquipoNode(eq, cliId);
        }
      });
      // Productos directos del sector (ubicación termina en sector, sin equipo)
      const directos = _matrizProductosEnNivel({
        clienteId: cliId, sectorId: sec.id, equipoId: null, conjuntoId: null, subconjuntoId: null
      });
      directos.forEach(p => {
        inner += _matrizRenderProductoCardNested(p);
      });
      if (!inner) inner = '<div style="font-size:11px;color:#888;font-style:italic;padding:4px 0">Sin equipos ni productos directos.</div>';
      return inner;
    },
    null,
    'pmNuevoConUbicacion({clienteId:' + cliId + ',sectorId:' + sec.id + ',contexto:\'sector\'})',
    'showEditarSectorModal(' + sec.id + ')'
  );
}

// v69: extraído. Renderiza el CONTENIDO de un equipo (conjuntos + productos
// directos). Se reutiliza desde el render normal del equipo y desde la
// promoción de hijos cuando el equipo es default.
function _matrizRenderInnerEquipo(eq, cliId) {
  let inner = '';
  const cons = _matrizConjuntosDelEquipo(eq.id, cliId);
  cons.forEach(con => {
    const cnt2 = _matrizCountProdsDelConjunto(con.id);
    // v70: los conjuntos default vacíos NO se muestran (son estructura interna).
    // Los conjuntos reales SÍ se muestran aunque estén vacíos, para poder
    // cargarles productos con el botón "+".
    if (_esConjuntoDefault(con)) {
      if (cnt2 === 0) return;
      // default con productos: promover sus hijos al nivel del equipo.
      inner += _matrizRenderInnerConjunto(con, cliId);
    } else {
      inner += _matrizRenderConjuntoNode(con, cliId);
    }
  });
  const directos = _matrizProductosEnNivel({
    clienteId: cliId, sectorId: eq.sector_id, equipoId: eq.id, conjuntoId: null, subconjuntoId: null
  });
  directos.forEach(p => {
    inner += _matrizRenderProductoCardNested(p, { equipoId: eq.id });
  });
  return inner;
}

function _matrizRenderEquipoNode(eq, cliId) {
  const cnt = _matrizCountProdsDelEquipo(eq.id);
  const codeChip = eq.codigo_cliente
    ? ' <span style="font-size:10px;color:#888;font-weight:400">[' + escapeHtml(eq.codigo_cliente) + ']</span>'
    : '';
  const warn = _matrizNivelTieneProblemas({ equipoId: eq.id }) ? _warningIconHtml('Algún producto debajo requiere atención') : '';
  return _matrizRenderNode(
    'eq:' + eq.id,
    '🤖',
    escapeHtml(eq.nombre) + codeChip + warn,
    cnt + ' producto(s)',
    '#5F5E5A',
    24,
    () => {
      let inner = _matrizRenderInnerEquipo(eq, cliId);
      if (!inner) inner = '<div style="font-size:11px;color:#888;font-style:italic;padding:4px 0">Sin conjuntos ni productos directos.</div>';
      return inner;
    },
    null,
    'pmNuevoConUbicacion({clienteId:' + cliId + ',sectorId:' + eq.sector_id + ',equipoId:' + eq.id + ',contexto:\'equipo\'})',
    'showEditarEquipoModal(' + eq.id + ')'
  );
}

// v69: extraído. Renderiza el CONTENIDO de un conjunto (subconjuntos + productos
// directos), para promoción.
function _matrizRenderInnerConjunto(con, cliId) {
  let inner = '';
  const subs = _matrizSubconjuntosDelConjunto(con.id, cliId);
  subs.forEach(sub => {
    const cnt2 = _matrizCountProdsDelSubconjunto(sub.id);
    if (cnt2 === 0) return;
    if (_esSubconjuntoDefault(sub)) {
      inner += _matrizRenderInnerSubconjunto(sub, cliId);
    } else {
      inner += _matrizRenderSubconjuntoNode(sub, cliId);
    }
  });
  const directos = _matrizProductosEnNivel({
    conjuntoId: con.id, subconjuntoId: null
  });
  directos.forEach(p => {
    inner += _matrizRenderProductoCardNested(p, { conjuntoId: con.id });
  });
  return inner;
}

function _matrizRenderConjuntoNode(con, cliId) {
  const cnt = _matrizCountProdsDelConjunto(con.id);
  const warn = _matrizNivelTieneProblemas({ conjuntoId: con.id }) ? _warningIconHtml('Algún producto debajo requiere atención') : '';
  // v70: prefill del botón "+". El equipo del conjunto se saca de la tabla
  // nueva equipo_conjuntos (no de productos_matriz_ubicaciones que está vacía).
  const ecRel = equipoConjuntos.find(ec => ec.conjunto_id === con.id);
  const equipoDelConjunto = ecRel ? equipos.find(e => e.id === ecRel.equipo_id) : null;
  const equipoIdPrefill = equipoDelConjunto ? equipoDelConjunto.id : 'null';
  const sectorIdPrefill = equipoDelConjunto && equipoDelConjunto.sector_id ? equipoDelConjunto.sector_id : 'null';
  return _matrizRenderNode(
    'con:' + con.id,
    '📦',
    escapeHtml(con.nombre) + warn,
    cnt + ' producto(s)',
    '#5F5E5A',
    24,
    () => {
      let inner = _matrizRenderInnerConjunto(con, cliId);
      if (!inner) inner = '<div style="font-size:11px;color:#888;font-style:italic;padding:4px 0">Sin subconjuntos ni productos.</div>';
      return inner;
    },
    22,
    'pmNuevoConUbicacion({clienteId:' + cliId + ',sectorId:' + sectorIdPrefill + ',equipoId:' + equipoIdPrefill + ',conjuntoId:' + con.id + ',contexto:\'conjunto\'})',
    'showEditarConjuntoModal(' + con.id + ')',
    con.foto_url || null
  );
}

function _matrizRenderInnerSubconjunto(sub, cliId) {
  let inner = '';
  const directos = _matrizProductosEnNivel({ subconjuntoId: sub.id });
  directos.forEach(p => {
    inner += _matrizRenderProductoCardNested(p, { subconjuntoId: sub.id });
  });
  return inner;
}

function _matrizRenderSubconjuntoNode(sub, cliId) {
  const cnt = _matrizCountProdsDelSubconjunto(sub.id);
  const warn = _matrizNivelTieneProblemas({ subconjuntoId: sub.id }) ? _warningIconHtml('Algún producto debajo requiere atención') : '';
  // v70: prefill del botón "+". El conjunto del subconjunto se saca de
  // conjunto_subconjuntos; el equipo, de equipo_conjuntos.
  const csRel = conjuntoSubconjuntos.find(cs => cs.subconjunto_id === sub.id);
  const conjuntoIdPrefill = csRel ? csRel.conjunto_id : 'null';
  let equipoIdPrefill = 'null', sectorIdPrefill = 'null';
  if (csRel) {
    const ecRel = equipoConjuntos.find(ec => ec.conjunto_id === csRel.conjunto_id);
    if (ecRel) {
      const eq = equipos.find(e => e.id === ecRel.equipo_id);
      if (eq) { equipoIdPrefill = eq.id; sectorIdPrefill = eq.sector_id || 'null'; }
    }
  }
  return _matrizRenderNode(
    'sub:' + sub.id,
    '📦',
    escapeHtml(sub.nombre) + warn,
    cnt + ' producto(s)',
    '#5F5E5A',
    24,
    () => {
      let inner = _matrizRenderInnerSubconjunto(sub, cliId);
      if (!inner) inner = '<div style="font-size:11px;color:#888;font-style:italic;padding:4px 0">Sin productos.</div>';
      return inner;
    },
    14,
    'pmNuevoConUbicacion({clienteId:' + cliId + ',sectorId:' + sectorIdPrefill + ',equipoId:' + equipoIdPrefill + ',conjuntoId:' + conjuntoIdPrefill + ',subconjuntoId:' + sub.id + ',contexto:\'subconjunto\'})',
    'showEditarSubconjuntoModal(' + sub.id + ')'
  );
}

function _matrizRenderGenericosNode() {
  // Productos sin cliente ni ubicaciones
  const filtered = applyMatrizFilters(productosMatriz);
  const generics = filtered.filter(p => !p.cliente_id);
  if (generics.length === 0) return '';
  const hayProblemas = generics.some(p => _matrizProductoTieneProblemas(p.id));
  const warn = hayProblemas ? _warningIconHtml('Algún producto debajo requiere atención') : '';
  return _matrizRenderNode(
    'gen',
    '📦',
    'Productos Genéricos' + warn,
    generics.length + ' producto(s)',
    '#5F5E5A',
    20,
    () => {
      let inner = '';
      generics.forEach(p => {
        inner += _matrizRenderProductoCardNested(p);
      });
      return inner;
    }
  );
}

// ----- Form de creacion/edicion de producto matriz -----
// Estado en memoria del form de producto matriz. Necesario porque cuando el
// usuario abre un sub-modal (ej. "+ Cargar nuevo sector") y vuelve, el estado
// de los pickers en cascada hay que reconstruirlo.
//
// pmFormState = {
//   productoId: <id|null>,
//   nuevaUbicacion: { clienteId, sectorId, equipoId, conjuntoId, subconjuntoId } | null,
//   ubicacionesPendientes: [...]   // lista de ubicaciones a guardar al hacer Save
// }
let pmFormState = null;

function showProductoMatrizForm(productoId, prefillUbicacion) {
  const isNew = !productoId;
  const prod = isNew ? null : productosMatriz.find(p => p.id === productoId);
  if (!isNew && !prod) return;

  // v70 Camino B: el modal del producto YA NO gestiona la composición.
  // ubicacionesPendientes queda vacío siempre y saveProductoMatriz no la toca.
  // La composición se edita desde los modales de contenedor (Editar Conjunto,
  // etc.). Mantenemos pmFormState con la lista vacía por compatibilidad con
  // código que la referencia.
  const ubicaciones = [];

  pmFormState = {
    productoId: productoId,
    ubicacionesPendientes: ubicaciones,
    // v70: si el producto se crea desde el botón "+" de una tarjeta de la
    // matriz, guardamos la ubicación destino para asociarlo automáticamente
    // al contenedor correcto después de crearlo.
    prefillUbicacion: (isNew && prefillUbicacion) ? prefillUbicacion : null
  };

  _renderPmModal(prod);
}

// v69: Wrapper para abrir el form de Nuevo Producto pre-rellenando la ubicación
// según el nodo de la matriz desde donde se llamó (botón "+" en cada tarjeta).
// v70: Devuelve HTML (solo lectura) con las "rutas" donde se usa un producto.
// Recorre las tablas de composición nuevas. Si el producto no está en ningún
// lado, devuelve ''.
function _pmRutasDelProductoHtml(productoId) {
  const rutas = [];
  // En subconjuntos
  subconjuntoProductos.filter(sp => sp.producto_id === productoId).forEach(sp => {
    const sub = subconjuntos.find(s => s.id === sp.subconjunto_id);
    if (!sub) return;
    // Buscar el conjunto que contiene ese subconjunto
    const cs = conjuntoSubconjuntos.find(x => x.subconjunto_id === sub.id);
    const con = cs ? conjuntos.find(c => c.id === cs.conjunto_id) : null;
    const cli = sub.cliente_id ? clientes.find(c => c.id === sub.cliente_id) : null;
    const partes = [cli ? cli.nombre : '?'];
    if (con && !_esConjuntoDefault(con)) partes.push(con.nombre);
    if (!_esSubconjuntoDefault(sub)) partes.push(sub.nombre);
    rutas.push({ texto: partes.join(' › '), cant: sp.cantidad || 1 });
  });
  // En conjuntos (directos)
  conjuntoProductos.filter(cp => cp.producto_id === productoId).forEach(cp => {
    const con = conjuntos.find(c => c.id === cp.conjunto_id);
    if (!con) return;
    const cli = con.cliente_id ? clientes.find(c => c.id === con.cliente_id) : null;
    const partes = [cli ? cli.nombre : '?'];
    if (!_esConjuntoDefault(con)) partes.push(con.nombre);
    rutas.push({ texto: partes.join(' › '), cant: cp.cantidad || 1 });
  });
  // En equipos (directos)
  equipoProductos.filter(ep => ep.producto_id === productoId).forEach(ep => {
    const eq = equipos.find(e => e.id === ep.equipo_id);
    if (!eq) return;
    const sec = sectores.find(s => s.id === eq.sector_id);
    const cli = sec ? clientes.find(c => c.id === sec.cliente_id) : null;
    const partes = [cli ? cli.nombre : '?'];
    if (sec) partes.push(sec.nombre);
    if (!_esEquipoDefault(eq)) partes.push(eq.nombre);
    rutas.push({ texto: partes.join(' › '), cant: ep.cantidad || 1 });
  });
  if (rutas.length === 0) return '';
  let h = '<div style="display:flex;flex-direction:column;gap:4px">';
  rutas.forEach(r => {
    h += '<div style="background:#EEF4FB;border:1px solid #A8C8E8;border-radius:4px;padding:4px 8px;font-size:11px;color:#0C447C">';
    h += '📍 ' + escapeHtml(r.texto);
    h += ' <span style="background:#0C447C;color:#fff;border-radius:6px;padding:0 5px;font-size:9px;margin-left:4px">×' + r.cant + '</span>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}

// =============================================================================
// v70 Fase 5b: MODAL ÚNICO DE CREACIÓN
// =============================================================================
// Un solo modal para crear Sector / Equipo / Conjunto / Subconjunto / Producto.
// Se abre desde el "+" de cada tarjeta de la matriz y desde el botón azul
// global. Tiene:
//  - Desplegable "¿Qué crear?" con opciones según el contexto.
//  - Ruta explícita (cliente/sector/equipo/conjunto/subconjunto) precargada
//    y editable. Cuántos selectores se muestran depende del tipo a crear.
//  - Campos según el tipo: sector/equipo -> nombre; conjunto/subconjunto ->
//    nombre + foto; producto -> modal completo.

let crearEntidadState = null;

// `opts` = { clienteId, sectorId, equipoId, conjuntoId, subconjuntoId, contexto }
// `contexto` = 'cliente' | 'sector' | 'equipo' | 'conjunto' | 'subconjunto' | 'global'
function pmNuevoConUbicacion(opts) {
  opts = opts || {};
  const norm = (v) => (v && v !== 'null') ? parseInt(v) : null;
  crearEntidadState = {
    contexto: opts.contexto || 'global',
    clienteId: norm(opts.clienteId),
    sectorId: norm(opts.sectorId),
    equipoId: norm(opts.equipoId),
    conjuntoId: norm(opts.conjuntoId),
    subconjuntoId: norm(opts.subconjuntoId),
    tipo: null  // se setea al renderizar según el contexto
  };
  // Tipo inicial por defecto según contexto
  const opcionesPorContexto = _ceOpcionesDeContexto(crearEntidadState.contexto);
  crearEntidadState.tipo = opcionesPorContexto[0];
  _renderCrearEntidadModal();
}

// Devuelve qué tipos se pueden crear según el contexto donde se apretó "+".
function _ceOpcionesDeContexto(contexto) {
  if (contexto === 'cliente') return ['sector'];
  if (contexto === 'sector') return ['equipo', 'conjunto', 'subconjunto', 'producto'];
  if (contexto === 'equipo') return ['conjunto', 'subconjunto', 'producto'];
  if (contexto === 'conjunto') return ['subconjunto', 'producto'];
  if (contexto === 'subconjunto') return ['producto'];
  // global: se puede crear cualquier cosa
  return ['producto', 'conjunto', 'subconjunto', 'equipo', 'sector'];
}

const _ceTipoLabel = {
  sector: 'Sector', equipo: 'Equipo', conjunto: 'Conjunto',
  subconjunto: 'Subconjunto', producto: 'Producto'
};

function _renderCrearEntidadModal() {
  const st = crearEntidadState;
  if (!st) return;
  const existing = document.getElementById('crear-ent-modal');
  if (existing) existing.remove();
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'crear-ent-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '640px';
  m.style.maxHeight = '90vh'; m.style.overflowY = 'auto';

  const opciones = _ceOpcionesDeContexto(st.contexto);

  let h = '<div class="md-t">Crear nuevo</div>';

  // Desplegable "¿Qué crear?"
  h += '<div class="ef"><div class="ef-l">¿Qué querés crear?</div>';
  h += '<select class="ef-i" id="ce-tipo" onchange="_ceTipoChange()">';
  opciones.forEach(op => {
    h += '<option value="' + op + '"' + (op === st.tipo ? ' selected' : '') + '>' + _ceTipoLabel[op] + '</option>';
  });
  h += '</select></div>';

  // Contenedor de campos dinámicos (cambia según el tipo)
  h += '<div id="ce-campos">' + _ceCamposHtml() + '</div>';

  h += '<div class="actions">';
  h += '<button class="b" onclick="document.getElementById(\'crear-ent-modal\').remove();crearEntidadState=null">Cancelar</button>';
  h += '<button class="b b-p" onclick="_ceCrear()">Crear</button>';
  h += '</div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);
  _ceInicializarSelects();
}

// Cuando cambia el tipo en el desplegable, re-renderizamos los campos.
function _ceTipoChange() {
  const sel = document.getElementById('ce-tipo');
  if (!sel || !crearEntidadState) return;

// HTML de los campos según el tipo elegido. Incluye:
//  - Ruta (selectores) hasta el nivel necesario.
//  - Campos propios del tipo.
function _ceCamposHtml() {
  const st = crearEntidadState;
  const tipo = st.tipo;
  let h = '';

  // ---- RUTA ----
  // Qué niveles de ruta se muestran según el tipo a crear:
  //  - sector: cliente
  //  - equipo: cliente, sector
  //  - conjunto: cliente, sector, equipo
  //  - subconjunto: cliente, sector, equipo, conjunto
  //  - producto: cliente, sector, equipo, conjunto (opc.), subconjunto (opc.)
  h += '<div style="font-size:12px;font-weight:600;color:#5F5E5A;margin:14px 0 6px">Ubicación</div>';

  // Cliente (siempre)
  h += '<div class="ef"><div class="ef-l">🏢 Cliente</div>';
  h += '<select class="ef-i" id="ce-cliente" onchange="_ceClienteChange()">';
  h += '<option value="">(Elegir cliente)</option>';
  clientes.slice().sort((a, b) => (a.nombre || '').localeCompare(b.nombre || '')).forEach(c => {
    h += '<option value="' + c.id + '">' + escapeHtml(c.nombre) + '</option>';
  });
  h += '</select></div>';

  // Sector (para equipo, conjunto, subconjunto, producto)
  if (tipo !== 'sector') {
    h += '<div class="ef"><div class="ef-l">🏭 Sector</div>';
    h += '<select class="ef-i" id="ce-sector" onchange="_ceSectorChange()"></select></div>';
  }
  // Equipo (para conjunto, subconjunto, producto)
  if (tipo === 'conjunto' || tipo === 'subconjunto' || tipo === 'producto') {
    h += '<div class="ef"><div class="ef-l">🤖 Equipo</div>';
    h += '<select class="ef-i" id="ce-equipo" onchange="_ceEquipoChange()"></select></div>';
  }
  // Conjunto (para subconjunto, producto) — opcional para producto
  if (tipo === 'subconjunto' || tipo === 'producto') {
    const lbl = tipo === 'producto' ? 'Conjunto (opcional)' : 'Conjunto';
    h += '<div class="ef"><div class="ef-l">📦 ' + lbl + '</div>';
    h += '<select class="ef-i" id="ce-conjunto" onchange="_ceConjuntoChange()"></select></div>';
  }
  // Subconjunto (solo para producto, opcional)
  if (tipo === 'producto') {
    h += '<div class="ef"><div class="ef-l">📦 Subconjunto (opcional)</div>';
    h += '<select class="ef-i" id="ce-subconjunto"></select></div>';
  }

  // ---- CAMPOS PROPIOS DEL TIPO ----
  h += '<div style="font-size:12px;font-weight:600;color:#5F5E5A;margin:14px 0 6px">Datos</div>';

  if (tipo === 'sector' || tipo === 'equipo') {
    h += '<div class="ef"><div class="ef-l">Nombre <span style="color:#A32D2D">*</span></div>';
    h += '<input type="text" class="ef-i" id="ce-nombre" placeholder="Nombre del ' + tipo + '"></div>';
  } else if (tipo === 'conjunto' || tipo === 'subconjunto') {
    h += '<div class="ef"><div class="ef-l">Nombre <span style="color:#A32D2D">*</span></div>';
    h += '<input type="text" class="ef-i" id="ce-nombre" placeholder="Nombre del ' + tipo + '"></div>';
    h += '<div class="ef-help" style="margin-bottom:4px">La foto se agrega después, desde el botón ✎ del ' + tipo + '.</div>';
  } else if (tipo === 'producto') {
    h += '<div class="ef"><div class="ef-l">Descripción <span style="color:#A32D2D">*</span></div>';
    h += '<input type="text" class="ef-i" id="ce-desc" placeholder="Ej. Eje cónico"></div>';
    h += '<div class="row">';
    h += '<div class="ef" style="flex:1"><div class="ef-l">Código de cliente</div>';
    h += '<input type="text" class="ef-i" id="ce-cod"></div>';
    h += '<div class="ef" style="flex:1"><div class="ef-l">Material</div>';
    h += '<select class="ef-i" id="ce-material"><option value="">(Sin material)</option>';
    materiales.slice().sort((a, b) => (a.nombre || '').localeCompare(b.nombre || '')).forEach(mat => {
      h += '<option value="' + mat.id + '">' + escapeHtml(mat.nombre) + '</option>';
    });
    h += '</select></div>';
    h += '</div>';
    h += '<div class="ef"><div class="ef-l">Presentación de materia prima</div>';
    h += '<input type="text" class="ef-i" id="ce-presentacion" placeholder="Ej. Redondo Ø50"></div>';
  }
  return h;
}

// Inicializa la cascada de selects con los valores precargados del state.
function _ceInicializarSelects() {
  const st = crearEntidadState;
  const cliSel = document.getElementById('ce-cliente');
  if (cliSel && st.clienteId) cliSel.value = String(st.clienteId);
  _ceClienteChange(true);
}

function _ceClienteChange(usarPrecarga) {
  const st = crearEntidadState;
  const cliSel = document.getElementById('ce-cliente');
  const secSel = document.getElementById('ce-sector');
  if (!cliSel) return;
  const cliId = cliSel.value ? parseInt(cliSel.value) : null;
  if (secSel) {
    if (!cliId) {
      secSel.innerHTML = '<option value="">(Elegir cliente primero)</option>';
      secSel.disabled = true;
    } else {
      secSel.disabled = false;
      const secs = sectores.filter(s => s.cliente_id === cliId).sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
      let h = '';
      secs.forEach(s => {
        let sel;
        if (usarPrecarga && st.sectorId) sel = (s.id === st.sectorId);
        else sel = _esSectorGeneral(s);
        h += '<option value="' + s.id + '"' + (sel ? ' selected' : '') + '>' + escapeHtml(s.nombre) + '</option>';
      });
      secSel.innerHTML = h;
    }
  }
  _ceSectorChange(usarPrecarga);
}

function _ceSectorChange(usarPrecarga) {
  const st = crearEntidadState;
  const secSel = document.getElementById('ce-sector');
  const eqSel = document.getElementById('ce-equipo');

  const secId = secSel && secSel.value ? parseInt(secSel.value) : null;

    eqs.forEach(e => {

      if (usarPrecarga && st.equipoId) sel = (e.id === st.equipoId);

      h += '<option value="' + e.id + '"' + (sel ? ' selected' : '') + '>' + escapeHtml(e.nombre) + '</option>';
    });
    eqSel.innerHTML = h;
  }
  _ceEquipoChange(usarPrecarga);
}

function _ceEquipoChange(usarPrecarga) {
  const st = crearEntidadState;
  const eqSel = document.getElementById('ce-equipo');
  const conSel = document.getElementById('ce-conjunto');
  if (!conSel) return;
  const eqId = eqSel && eqSel.value ? parseInt(eqSel.value) : null;

      .sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
    cons.forEach(c => {
      const sel = usarPrecarga && st.conjuntoId && c.id === st.conjuntoId;
      h += '<option value="' + c.id + '"' + (sel ? ' selected' : '') + '>' + escapeHtml(c.nombre) + '</option>';
    });
  }
  conSel.innerHTML = h;
  _ceConjuntoChange(usarPrecarga);
}

function _ceConjuntoChange(usarPrecarga) {
  const st = crearEntidadState;
  const conSel = document.getElementById('ce-conjunto');
  const subSel = document.getElementById('ce-subconjunto');
  if (!subSel) return;
  const conId = conSel && conSel.value ? parseInt(conSel.value) : null;
  let h = '<option value="">(Ninguno — directo al conjunto)</option>';
  if (conId) {
    subSel.disabled = false;
    const subIds = conjuntoSubconjuntos.filter(cs => cs.conjunto_id === conId).map(cs => cs.subconjunto_id);

// Una vez que showCargar* retorna y selecciona el option en el picker via
// pickerSetValue, necesitamos actualizar pmCompatState. Lo hacemos con un
// hook: el callback onSelect del picker dispara pmcOn*, pero pickerSetValue
// no llama onSelect. Solucion: leemos el value del hidden input y actualizamos
// state ahi mismo. Pero el handler de pickerSetValue no lo hace... lo hacemos
// post-loadAll en showCargar*. La forma simple: al cargar un sector/equipo/etc.
// nuevo, ya quedan en sectores/equipos/etc. globales y la siguiente vez que
// renderizamos el modal, los pickers ya tendran ese option en sus catalogos.
// Pero el state en pmCompatState... lo actualizamos manualmente despues de
// pickerSetValue? Mejor: re-renderizamos el modal completo con state que ya
// tiene el id seleccionado. Para eso, en showCargar* hacemos un workaround:
// despues de cargar, si el callback es 'pmc-X', actualizamos pmCompatState
// y re-renderizamos. Lo haremos parcheando el callback.
// SOLUCION SIMPLE: en lugar de pickerSetValue desde showCargar*, vamos a
// disparar un evento custom que el modal escucha y actualiza pmCompatState.
// Demasiado complejo. Mejor:
// - showCargar* ya recarga loadAll y deja la entrada en globals.
// - Devolvemos el id del nuevo desde showCargar* y desde pmcCargarX
//   actualizamos pmCompatState directamente.
// Refactorizo showCargar* para que devuelva la entrada nueva.

function pmGuardarCompatibilidad() {
  if (!pmCompatState || !pmCompatState.clienteId) {
    toast('Cliente es obligatorio', true);
    return;
  }
  if (!pmFormState) return;
  // Verificar que no esté duplicada
  const dup = pmFormState.ubicacionesPendientes.find(u =>
    u.cliente_id === pmCompatState.clienteId &&
    u.sector_id === pmCompatState.sectorId &&
    u.equipo_id === pmCompatState.equipoId &&
    u.conjunto_id === pmCompatState.conjuntoId &&
    u.subconjunto_id === pmCompatState.subconjuntoId
  );
  if (dup) {
    toast('Ya está asignada esa ruta', true);
    return;
  }
  pmFormState.ubicacionesPendientes.push({
    cliente_id: pmCompatState.clienteId,
    sector_id: pmCompatState.sectorId,
    equipo_id: pmCompatState.equipoId,
    conjunto_id: pmCompatState.conjuntoId,
    subconjunto_id: pmCompatState.subconjuntoId,
    cantidad: 1
  });
  // v67: re-renderizar la lista de ubicaciones (chips) y resetear el form inline
  const list = document.getElementById('pm-ubicaciones-list');
  if (list) list.innerHTML = _pmUbicacionesListHtml();
  _pmCompatInlineReset();
  _pmCompatInlineRefresh();
  toast('Compatibilidad agregada');
}

// v68: Crea las relaciones N:M necesarias (conjuntos_equipos, subconjuntos_conjuntos)
// para las ubicaciones de un producto, si no existen. Idempotente (usa upsert
// por compatibilidad o detecta duplicado y lo ignora).
// `ubicaciones` es un array con {cliente_id, sector_id, equipo_id, conjunto_id, subconjunto_id}.
async function _sincronizarRelacionesNM(ubicaciones) {
  if (!Array.isArray(ubicaciones) || ubicaciones.length === 0) return;
  // 1. conjuntos_equipos: para cada (equipo_id, conjunto_id) que aparezca en ubicaciones
  const pairsCE = new Map();  // key "eq_id:con_id" => {equipo_id, conjunto_id}
  ubicaciones.forEach(u => {
    if (u.equipo_id && u.conjunto_id) {
      const key = u.equipo_id + ':' + u.conjunto_id;
      pairsCE.set(key, { equipo_id: u.equipo_id, conjunto_id: u.conjunto_id });
    }
  });
  for (const par of pairsCE.values()) {
    const yaExiste = conjuntosEquipos.find(ce => ce.equipo_id === par.equipo_id && ce.conjunto_id === par.conjunto_id);
    if (yaExiste) continue;
    const { error } = await sb.from('conjuntos_equipos').insert(par);
    if (error && error.code !== '23505') {
      console.warn('No pude crear conjuntos_equipos:', par, error);
    }
  }
  // 2. subconjuntos_conjuntos: para cada (conjunto_id, subconjunto_id)
  const pairsSC = new Map();
  ubicaciones.forEach(u => {
    if (u.conjunto_id && u.subconjunto_id) {
      const key = u.conjunto_id + ':' + u.subconjunto_id;
      pairsSC.set(key, { conjunto_id: u.conjunto_id, subconjunto_id: u.subconjunto_id });
    }
  });
  for (const par of pairsSC.values()) {
    const yaExiste = subconjuntosConjuntos.find(sc => sc.conjunto_id === par.conjunto_id && sc.subconjunto_id === par.subconjunto_id);
    if (yaExiste) continue;
    const { error } = await sb.from('subconjuntos_conjuntos').insert(par);
    if (error && error.code !== '23505') {
      console.warn('No pude crear subconjuntos_conjuntos:', par, error);
    }
  }
}

// v70: Sincroniza las tablas de composición nuevas con las ubicaciones que se
// están guardando. Para el producto `savedProductoId`, recorre las ubicaciones
// pendientes y crea/actualiza las filas correspondientes en:
//   - subconjunto_productos (si la ubicación tiene subconjunto_id)
//   - conjunto_productos (si tiene conjunto_id pero NO subconjunto_id)
//   - equipo_productos (si tiene equipo_id pero NO conjunto_id)
// Antes de insertar borra todas las filas previas del producto en esas tablas,
// para que el estado final sea exactamente lo que tiene el form.
// También asegura las relaciones de composición entre contenedores
// (equipo_conjuntos, conjunto_subconjuntos) si no existen.
async function _sincronizarComposicionV70(savedProductoId, ubicaciones) {
  if (!savedProductoId) return;
  // 1. Borrar todas las filas previas del producto en las 3 tablas
  await sb.from('subconjunto_productos').delete().eq('producto_id', savedProductoId);
  await sb.from('conjunto_productos').delete().eq('producto_id', savedProductoId);
  await sb.from('equipo_productos').delete().eq('producto_id', savedProductoId);

  // 2. Preparar inserts agrupados por nivel. Si el mismo producto aparece varias
  // veces en el mismo contenedor, se suman las cantidades.
  const subProds = new Map();
  const conProds = new Map();
  const eqProds = new Map();
  ubicaciones.forEach(u => {
    const cant = u.cantidad || 1;
    if (u.subconjunto_id) {
      const k = u.subconjunto_id + ':' + savedProductoId;
      const prev = subProds.get(k);
      subProds.set(k, { subconjunto_id: u.subconjunto_id, producto_id: savedProductoId, cantidad: (prev ? prev.cantidad : 0) + cant });
    } else if (u.conjunto_id) {
      const k = u.conjunto_id + ':' + savedProductoId;
      const prev = conProds.get(k);
      conProds.set(k, { conjunto_id: u.conjunto_id, producto_id: savedProductoId, cantidad: (prev ? prev.cantidad : 0) + cant });
    } else if (u.equipo_id) {
      const k = u.equipo_id + ':' + savedProductoId;
      const prev = eqProds.get(k);
      eqProds.set(k, { equipo_id: u.equipo_id, producto_id: savedProductoId, cantidad: (prev ? prev.cantidad : 0) + cant });
    }
  });

  if (subProds.size > 0) {
    const { error } = await sb.from('subconjunto_productos').insert([...subProds.values()]);
    if (error) console.warn('Error subconjunto_productos:', error);
  }
  if (conProds.size > 0) {
    const { error } = await sb.from('conjunto_productos').insert([...conProds.values()]);
    if (error) console.warn('Error conjunto_productos:', error);
  }
  if (eqProds.size > 0) {
    const { error } = await sb.from('equipo_productos').insert([...eqProds.values()]);
    if (error) console.warn('Error equipo_productos:', error);
  }

  // 3. Asegurar relaciones de composición entre contenedores
  const ecPairs = new Map();
  const csPairs = new Map();
  ubicaciones.forEach(u => {
    if (u.equipo_id && u.conjunto_id) {
      ecPairs.set(u.equipo_id + ':' + u.conjunto_id, { equipo_id: u.equipo_id, conjunto_id: u.conjunto_id, cantidad: 1 });
    }
    if (u.conjunto_id && u.subconjunto_id) {
      csPairs.set(u.conjunto_id + ':' + u.subconjunto_id, { conjunto_id: u.conjunto_id, subconjunto_id: u.subconjunto_id, cantidad: 1 });
    }
  });
  for (const par of ecPairs.values()) {
    const ya = equipoConjuntos.find(ec => ec.equipo_id === par.equipo_id && ec.conjunto_id === par.conjunto_id);
    if (!ya) {
      const { error } = await sb.from('equipo_conjuntos').insert(par);
      if (error && error.code !== '23505') console.warn('Error equipo_conjuntos:', error);
    }
  }
  for (const par of csPairs.values()) {
    const ya = conjuntoSubconjuntos.find(cs => cs.conjunto_id === par.conjunto_id && cs.subconjunto_id === par.subconjunto_id);
    if (!ya) {
      const { error } = await sb.from('conjunto_subconjuntos').insert(par);
      if (error && error.code !== '23505') console.warn('Error conjunto_subconjuntos:', error);
    }
  }
}

async function saveProductoMatriz(productoId) {
  const descripcion = document.getElementById('pm-desc').value.trim();
  if (!descripcion) { toast('La descripción es obligatoria', true); return; }
  const codigo_cliente = document.getElementById('pm-cod-cli').value.trim() || null;
  const matVal = document.getElementById('pm-material-value').value;
  const material_id = matVal ? parseInt(matVal) : null;
  const presentacion_mat_prima = document.getElementById('pm-presentacion').value.trim() || null;
  const fotoEl = document.getElementById('photo-url-pm');
  const foto_url = fotoEl ? (fotoEl.value || null) : null;

  // v70 Camino B: el cliente del producto.
  // - Si edito: mantengo el cliente_id que ya tenía.
  // - Si creo desde el "+" de una tarjeta: lo tomo del prefill.
  // - Si creo suelto: queda genérico (null).
  let cliente_id = null;
  const prefill = pmFormState && pmFormState.prefillUbicacion;
  if (productoId) {
    const prodPrev = productosMatriz.find(p => p.id === productoId);
    cliente_id = prodPrev ? (prodPrev.cliente_id || null) : null;
  } else if (prefill && prefill.clienteId) {
    cliente_id = prefill.clienteId;
  }

  const payload = {
    descripcion, cliente_id, codigo_cliente, material_id, presentacion_mat_prima, foto_url,
    updated_at: new Date().toISOString()
  };

  let savedProductoId = productoId;
  showSpinner(productoId ? 'Guardando producto...' : 'Creando producto...');
  try {
  if (productoId) {
    const { error } = await sb.from('productos_matriz').update(payload).eq('id', productoId);
    if (error) { toast('Error: ' + error.message, true); console.error(error); return; }
  } else {
    const { data, error } = await sb.from('productos_matriz').insert(payload).select().single();
    if (error) { toast('Error: ' + error.message, true); console.error(error); return; }
    savedProductoId = data.id;
    if (foto_url) {
      await sb.from('fotos').insert({
        entidad_tipo: 'producto_matriz',
        entidad_id: savedProductoId,
        url: foto_url,
        orden: 0
      });
    }
    // v70: si el producto se creó desde el botón "+" de una tarjeta de la
    // matriz, lo asociamos automáticamente al contenedor destino. Se inserta
    // en la tabla de composición del nivel más específico del prefill.
    if (prefill) {
      if (prefill.subconjuntoId) {
        await sb.from('subconjunto_productos').insert({ subconjunto_id: prefill.subconjuntoId, producto_id: savedProductoId, cantidad: 1 });
      } else if (prefill.conjuntoId) {
        await sb.from('conjunto_productos').insert({ conjunto_id: prefill.conjuntoId, producto_id: savedProductoId, cantidad: 1 });
      } else if (prefill.equipoId) {
        await sb.from('equipo_productos').insert({ equipo_id: prefill.equipoId, producto_id: savedProductoId, cantidad: 1 });
      }
    }
  }
  // v70 Camino B: saveProductoMatriz NO sincroniza la composición del producto.
  // La composición se gestiona exclusivamente desde los modales de contenedor.

  document.getElementById('prod-matriz-modal').remove();
  pmFormState = null;
  await loadAll();
  const wasNew = !productoId;
  toast(productoId ? 'Producto actualizado' : 'Producto creado');
  if (wasNew && savedProductoId) {
    navigate({ view: 'productoMatriz', productoId: savedProductoId });
    setTimeout(() => {
      showProcesoForm(null, { tipo: 'producto', parentId: savedProductoId });
    }, 100);
  } else {
    render();
  }
  } finally {
    hideSpinner();
  }
}

// =============================================================================
// CORRELATIVIDADES EN PRODUCTO MATRIZ (D2.5)
// =============================================================================
// Cada proceso de producto matriz puede tener predecesores: otros procesos
// (del mismo producto o de otros productos del mismo cliente) que deben
// terminar antes que este. Al importar al proyecto:
//   - Producto solo → solo correlatividades intra-producto.
//   - Conjunto/subconjunto → todas las correlatividades cuyo predecesor Y
//     sucesor estén entre los productos importados.

// Devuelve los procesos predecesores (de la matriz) de un proceso dado.
function _pmGetPredecesores(procesoId) {
  const rels = productosMatrizCorrelatividades.filter(c => c.sucesor_id === procesoId);
  return rels.map(r => productosMatrizProcesos.find(p => p.id === r.predecesor_id)).filter(Boolean);
}

// Render chips de predecesores en la card del proceso, con boton "+ Predecesor"
// y boton "×" en cada chip para quitar.
function _renderPmPredChipsHtml(proceso) {
  const preds = _pmGetPredecesores(proceso.id);
  let h = '';
  if (preds.length === 0) {
    h += '<span style="color:#888;font-style:italic">sin predecesores</span> ';
  } else {
    preds.forEach(pred => {
      const prodPred = productosMatriz.find(p => p.id === pred.producto_id);

      const label = (prodPred ? prodPred.descripcion : '?') + ' · #' + ordenIdx + ' ' + (pred.proceso || '');
      const procesoId = proceso.id;
      const predId = pred.id;

}

async function removePmCorrelatividad(predId, sucId) {

// v69: Set de IDs seleccionados para selección múltiple en el picker de
// predecesores de producto matriz.
let _pmPredMultiSelected = new Set();

// Modal para elegir un predecesor entre los procesos disponibles.
// Candidatos: todos los procesos del mismo cliente (intra-producto + inter-producto),
// EXCEPTO el proceso mismo. Se filtran los que ya son predecesores y los que
// crearian ciclo (sucesor de este).
function showPmPredecesorPicker(procesoId) {
  _pmPredMultiSelected = new Set();
  const proceso = productosMatrizProcesos.find(p => p.id === procesoId);
  if (!proceso) return;
  const prod = productosMatriz.find(p => p.id === proceso.producto_id);
  if (!prod) return;
  const cliId = prod.cliente_id;  // puede ser null (genérico)

  // Procesos candidatos: del mismo cliente (o ambos genéricos)
  let candidatos = productosMatrizProcesos.filter(p => {
    if (p.id === procesoId) return false;
    const pProd = productosMatriz.find(x => x.id === p.producto_id);
    if (!pProd) return false;
    return pProd.cliente_id === cliId;
  });
  // Ya predecesores: excluir
  const yaPreds = new Set(productosMatrizCorrelatividades
    .filter(c => c.sucesor_id === procesoId).map(c => c.predecesor_id));
  candidatos = candidatos.filter(p => !yaPreds.has(p.id));
  // Evitar ciclos directos: si el candidato tiene a este proceso como predecesor
  // (transitivo), no lo permitimos. Por simplicidad solo verificamos el 1er nivel.
  const sucesoresDeEste = new Set(productosMatrizCorrelatividades
    .filter(c => c.predecesor_id === procesoId).map(c => c.sucesor_id));
  candidatos = candidatos.filter(p => !sucesoresDeEste.has(p.id));

  // Agrupar candidatos por producto
  const grupos = new Map();  // productoId -> [procesos]
  candidatos.forEach(p => {
    if (!grupos.has(p.producto_id)) grupos.set(p.producto_id, []);
    grupos.get(p.producto_id).push(p);
  });

  const existing = document.getElementById('pm-pred-modal');
  if (existing) existing.remove();
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'pm-pred-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '600px'; m.style.zIndex = '1100';
  let h = '<div class="md-t">Elegir predecesor para "' + escapeHtml(proceso.proceso || '?') + '"</div>';
  h += '<div style="font-size:11px;color:#5F5E5A;margin-bottom:8px">';
  h += 'Producto actual: <b>' + escapeHtml(prod.descripcion) + '</b>. ';
  h += 'Cliente: <b>' + escapeHtml(cliId ? ((clientes.find(c => c.id === cliId) || {}).nombre || '?') : 'Genérico') + '</b>. ';
  h += 'Mostrando procesos del mismo cliente. Podés elegir uno (click en la fila o botón Elegir) o varios con los checkboxes.';
  h += '</div>';
  if (grupos.size === 0) {
    h += '<div style="padding:20px;text-align:center;color:#888;font-size:12px;font-style:italic">No hay procesos candidatos disponibles.</div>';
  } else {
    h += '<div style="max-height:400px;overflow-y:auto;border:1px solid #E8E6DF;border-radius:5px">';
    const sortedGrupos = [...grupos.entries()].sort((a, b) => {
      if (a[0] === proceso.producto_id) return -1;
      if (b[0] === proceso.producto_id) return 1;
      const pa = productosMatriz.find(x => x.id === a[0]);
      const pb = productosMatriz.find(x => x.id === b[0]);
      return (pa ? pa.descripcion : '').localeCompare(pb ? pb.descripcion : '');
    });
    sortedGrupos.forEach(([prodId, procs]) => {
      const p = productosMatriz.find(x => x.id === prodId);
      if (!p) return;
      const esMismoProducto = prodId === proceso.producto_id;
      h += '<div style="background:' + (esMismoProducto ? '#FFF4D5' : '#F5F3EC') + ';padding:6px 10px;font-size:11px;font-weight:600;color:#5F5E5A;border-bottom:1px solid #E8E6DF">';
      h += escapeHtml(p.descripcion) + (esMismoProducto ? ' <span style="color:#854F0B">(mismo producto)</span>' : '');
      h += '</div>';
      procs.sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
      procs.forEach(pp => {
        // v69: checkbox para selección múltiple + el click en la fila sigue
        // siendo "elegir uno solo" (comportamiento original).
        h += '<div style="display:flex;align-items:center;padding:6px 14px;border-bottom:1px solid #E8E6DF;font-size:12px;gap:8px">';
        h += '<input type="checkbox" id="pmpredcb-' + pp.id + '" onclick="event.stopPropagation();togglePmPredMulti(' + pp.id + ')" style="cursor:pointer;flex:0 0 auto">';
        h += '<div style="flex:1;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="addPmPredecesor(' + pp.id + ',' + procesoId + ')">';
        h += '<span><span style="color:#888;margin-right:6px">#' + (pp.orden || '?') + '</span>' + escapeHtml(pp.proceso || '?') + '</span>';
        h += '<button class="b b-p" style="padding:2px 8px;font-size:10px">Elegir</button>';
        h += '</div>';
        h += '</div>';
      });
    });
    h += '</div>';
  }
  h += '<div class="actions">';
  h += '<button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button>';
  h += '<button class="b b-p" id="pm-pred-multi-btn" onclick="addPmPredecesoresSeleccionados(' + procesoId + ')" disabled style="opacity:0.5">Elegir seleccionados (0)</button>';
  h += '</div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);
}

function togglePmPredMulti(id) {
  if (_pmPredMultiSelected.has(id)) _pmPredMultiSelected.delete(id);
  else _pmPredMultiSelected.add(id);
  const btn = document.getElementById('pm-pred-multi-btn');
  if (btn) {
    btn.textContent = 'Elegir seleccionados (' + _pmPredMultiSelected.size + ')';
    btn.disabled = _pmPredMultiSelected.size === 0;
    btn.style.opacity = _pmPredMultiSelected.size === 0 ? '0.5' : '1';
  }
}

async function addPmPredecesoresSeleccionados(sucId) {
  if (_pmPredMultiSelected.size === 0) { toast('No hay nada seleccionado', true); return; }
  const ids = Array.from(_pmPredMultiSelected);
  let ok = 0;
  const fallidos = [];
  for (const predId of ids) {
    const { error } = await sb.from('productos_matriz_correlatividades').insert({
      predecesor_id: predId, sucesor_id: sucId
    });
    if (error) {
      const p = productosMatrizProcesos.find(x => x.id === predId);
      fallidos.push((p && p.proceso) || ('id ' + predId));
      continue;
    }
    ok++;
  }
  await loadAll();
  const modal = document.getElementById('pm-pred-modal');
  if (modal) modal.remove();
  let msg = ok + ' predecesor(es) agregado(s)';
  if (fallidos.length) msg += '. Fallaron ' + fallidos.length + ': ' + fallidos.join(', ');
  toast(msg, fallidos.length > 0);
  render();
}

async function addPmPredecesor(predId, sucId) {
  const { error } = await sb.from('productos_matriz_correlatividades').insert({
    predecesor_id: predId, sucesor_id: sucId
  });
  if (error) { toast('Error: ' + error.message, true); console.error(error); return; }
  await loadAll();
  document.getElementById('pm-pred-modal').remove();
  toast('Predecesor agregado');
  render();
}

async function confirmDeleteProductoMatriz(productoId) {
  const prod = productosMatriz.find(p => p.id === productoId);
  if (!prod) return;
  const procsCnt = productosMatrizProcesos.filter(pr => pr.producto_id === productoId).length;
  const msg = '¿Eliminar el producto "' + (prod.descripcion || '') + '"?'
    + (procsCnt > 0 ? '\n\nTambién se eliminarán sus ' + procsCnt + ' proceso(s) asociado(s).' : '')
    + '\n\nEsto NO afecta a los proyectos existentes que ya importaron este producto.';
  confirmModal({
    titulo: 'Eliminar producto matriz',
    mensaje: msg,
    textoConfirmar: 'Eliminar',
    onConfirm: async () => {
      showSpinner('Eliminando producto...');
      try {
        const { error } = await sb.from('productos_matriz').delete().eq('id', productoId);
        if (error) { toast('Error: ' + error.message, true); console.error(error); return; }
        await loadAll();
        toast('Producto eliminado');
        if (nav.view === 'productoMatriz' && nav.productoId === productoId) {
          navigate({ view: 'recursos', tab: 'matriz' });
        } else {
          render();
        }
      } finally {
        hideSpinner();
      }
    }
  });
}

// HTML de la lista de contactos para mostrar dentro del modal de cliente.
// Solo muestra activos. Cada uno con botón Editar e Inhabilitar/Reactivar.
function _renderContactosListHtml(clienteId) {
  // Mostrar todos (activos primero, luego inactivos)
  const contactos = clienteContactos.filter(c => c.cliente_id === clienteId)
    .sort((a, b) => {
      if (a.activo !== b.activo) return a.activo ? -1 : 1;
      const aL = ((a.apellido || '') + ' ' + (a.nombre || '')).toLowerCase();
      const bL = ((b.apellido || '') + ' ' + (b.nombre || '')).toLowerCase();
      return aL.localeCompare(bL);
    });
  if (contactos.length === 0) {
    return '<div style="font-size:12px;color:#888;font-style:italic;padding:10px;text-align:center;background:#FAFAF7;border-radius:4px">Aún no hay contactos. Apretá "+ Nuevo contacto".</div>';
  }
  let h = '';
  contactos.forEach(c => {
    const inactivo = c.activo === false;
    h += '<div style="display:flex;align-items:center;gap:10px;padding:6px 10px;background:#fff;border:1px solid #E8E6DF;border-radius:4px;margin-bottom:5px;' + (inactivo ? 'opacity:0.55' : '') + '">';
    h += '<div style="flex:1;min-width:0">';
    let nombre = '<b>' + escapeHtml(c.apellido || '') + (c.apellido && c.nombre ? ', ' : '') + escapeHtml(c.nombre || '') + '</b>';
    if (inactivo) nombre += ' <span style="font-size:10px;background:#FEDADA;color:#A32D2D;padding:1px 6px;border-radius:8px;margin-left:6px">Inactivo</span>';
    h += '<div style="font-size:12px">' + nombre + '</div>';
    const meta = [c.telefono, c.mail].filter(Boolean).join(' · ');
    if (meta) h += '<div style="font-size:10px;color:#888;margin-top:1px">' + escapeHtml(meta) + '</div>';
    h += '</div>';
    h += '<div style="display:flex;gap:3px;flex-shrink:0">';
    h += '<button type="button" class="b b-icon" onclick="showContactoForm(' + c.id + ',' + clienteId + ')" style="font-size:10px;padding:2px 8px">Editar</button>';
    if (inactivo) {
      h += '<button type="button" class="b b-icon" onclick="reactivarContacto(' + c.id + ')" style="font-size:10px;padding:2px 8px;color:#0C447C">Reactivar</button>';
    } else {
      h += '<button type="button" class="b b-icon b-d" onclick="inhabilitarContacto(' + c.id + ')" style="font-size:10px;padding:2px 8px">Inhabilitar</button>';
    }
    h += '</div>';
    h += '</div>';
  });
  return h;
}

async function saveContacto(contactoId, clienteId) {
  const nombre = document.getElementById('ct-nombre').value.trim();
  const apellido = document.getElementById('ct-apellido').value.trim() || null;
  if (!nombre) { toast('Ingresá el nombre del contacto', true); return; }
  const payload = { cliente_id: clienteId, nombre, apellido };
  let savedId = contactoId;
  if (contactoId) {
    const { error } = await sb.from('cliente_contactos').update(payload).eq('id', contactoId);
    if (error) { toast('Error: ' + error.message, true); return; }
    toast('Contacto actualizado');
  } else {
    const { data, error } = await sb.from('cliente_contactos').insert(payload).select().single();
    if (error) { toast('Error: ' + error.message, true); return; }
    savedId = data.id;
    toast('Contacto creado');
  }
  await loadAll();
  document.querySelectorAll('#cont-modal').forEach(el => el.remove());
  // Si hay form de proyecto abierto con este cliente: seleccionar el contacto nuevo
  const cliSel = document.getElementById('f-cliente');
  if (cliSel && parseInt(cliSel.value) === clienteId) {
    _llenarComboContactoProj(clienteId, savedId);
  }
  // Refrescar la lista dentro del modal del cliente si está abierto
  const listEl = document.getElementById('contactos-list-cli');
  if (listEl) listEl.innerHTML = _renderContactosListHtml(clienteId);
}

async function inhabilitarContacto(contactoId) {
  const c = clienteContactos.find(x => x.id === contactoId);
  if (!c) return;
  confirmModal({
    titulo: 'Inhabilitar contacto',
    mensaje: '¿Inhabilitar a "' + [c.apellido, c.nombre].filter(Boolean).join(', ') + '"? El contacto queda oculto pero podés reactivarlo.',
    textoConfirmar: 'Inhabilitar',
    onConfirm: async () => {
      const { error } = await sb.from('cliente_contactos').update({ activo: false }).eq('id', contactoId);
      if (error) { toast('Error: ' + error.message, true); return; }
      await loadAll();
      toast('Contacto inhabilitado');
      const listEl = document.getElementById('contactos-list-cli');
      if (listEl) listEl.innerHTML = _renderContactosListHtml(c.cliente_id);
    }
  });
}

async function reactivarContacto(contactoId) {
  const c = clienteContactos.find(x => x.id === contactoId);
  if (!c) return;
  const { error } = await sb.from('cliente_contactos').update({ activo: true }).eq('id', contactoId);
  if (error) { toast('Error: ' + error.message, true); return; }
  await loadAll();
  toast('Contacto reactivado');
  const listEl = document.getElementById('contactos-list-cli');
  if (listEl) listEl.innerHTML = _renderContactosListHtml(c.cliente_id);
}

// Si hay un combo de contactos en el form de proyecto visible para este
// cliente, lo refrescamos para que el nuevo contacto aparezca disponible.
function _refrescarComboContactoSiVisible(clienteId) {
  const combo = document.getElementById('f-contacto');
  if (!combo) return;
  // Identificar qué cliente está seleccionado
  const cliSel = document.getElementById('f-cliente');
  if (!cliSel || parseInt(cliSel.value) !== clienteId) return;
  // Re-renderizar el contenido del combo
  _llenarComboContactoProj(clienteId, combo.value);
}

// v67: Asegura que el cliente tenga creado "General" como sector y
// "Sin equipo específico" como equipo dentro de ese sector. Idempotente:
// si ya existen no los duplica. Se llama al crear cliente y al abrir el
// form de compatibilidad por si faltan.
async function _ensureDefaultsCliente(clienteId) {
  if (!clienteId) return;
  let sectorGeneral = sectores.find(s => s.cliente_id === clienteId && (s.nombre || '').toLowerCase() === 'general');
  if (!sectorGeneral) {
    const { data, error } = await sb.from('sectores').insert({ cliente_id: clienteId, nombre: 'General' }).select().single();
    if (error) {
      if (error.code === '23505') {
        await loadAll();
        sectorGeneral = sectores.find(s => s.cliente_id === clienteId && (s.nombre || '').toLowerCase() === 'general');
      } else {
        console.warn('No pude crear sector General:', error);
        return;
      }
    } else {
      sectorGeneral = data;
      sectores.push(data);
    }
  }
  if (!sectorGeneral) return;
  const eqExiste = equipos.find(e => e.sector_id === sectorGeneral.id && (e.nombre || '').toLowerCase() === 'sin equipo específico');
  if (!eqExiste) {
    const { data, error } = await sb.from('equipos').insert({ sector_id: sectorGeneral.id, nombre: 'Sin equipo específico' }).select().single();
    if (error && error.code !== '23505') {
      console.warn('No pude crear equipo Sin equipo específico:', error);
    } else if (data) {
      equipos.push(data);
    }
  }
}

async function saveCliente(clienteId) {
  const nombre = document.getElementById('c-nombre').value.trim();
  const cuit = document.getElementById('c-cuit').value.trim();
  const errCuit = document.getElementById('err-cuit');
  const errCodigo = document.getElementById('err-codigo');
  errCuit.style.display = 'none';
  errCodigo.style.display = 'none';
  if (!nombre) { toast('Ingresa el nombre', true); return; }
  if (!cuit) { errCuit.textContent = 'CUIT requerido'; errCuit.style.display = 'block'; return; }
  if (!validCuit(cuit)) { errCuit.textContent = 'CUIT debe tener 11 digitos sin guiones'; errCuit.style.display = 'block'; return; }
  const dup = clientes.find(c => c.cuit === cuit && c.id !== clienteId);
  if (dup) { errCuit.textContent = 'Ya existe un cliente con ese CUIT: ' + dup.nombre; errCuit.style.display = 'block'; return; }

  // Codigo: solo lo procesamos si esta editable (campo no disabled, o sea: nuevo
  // o viejo sin codigo). Si ya tenia codigo, ignoramos cualquier cosa que digan.
  const cliente = clienteId ? clientes.find(c => c.id === clienteId) : null;
  const tieneCodigo = cliente && cliente.codigo;
  let codigo = cliente ? cliente.codigo : null;  // por defecto, mantenemos el actual
  if (!tieneCodigo) {
    const codigoInput = document.getElementById('c-codigo').value.trim().toUpperCase();
    if (!clienteId) {
      if (!codigoInput) { errCodigo.textContent = 'Código requerido'; errCodigo.style.display = 'block'; return; }
      if (!/^[A-Z0-9]{4}$/.test(codigoInput)) { errCodigo.textContent = 'Código debe tener exactamente 4 caracteres alfanuméricos (A-Z, 0-9)'; errCodigo.style.display = 'block'; return; }
      const dupCod = clientes.find(c => c.codigo && c.codigo.toUpperCase() === codigoInput);
      if (dupCod) { errCodigo.textContent = 'Ya existe un cliente con ese código: ' + dupCod.nombre; errCodigo.style.display = 'block'; return; }
      codigo = codigoInput;
    } else {
      if (codigoInput) {
        if (!/^[A-Z0-9]{4}$/.test(codigoInput)) { errCodigo.textContent = 'Código debe tener exactamente 4 caracteres alfanuméricos (A-Z, 0-9)'; errCodigo.style.display = 'block'; return; }
        const dupCod = clientes.find(c => c.codigo && c.codigo.toUpperCase() === codigoInput && c.id !== clienteId);
        if (dupCod) { errCodigo.textContent = 'Ya existe un cliente con ese código: ' + dupCod.nombre; errCodigo.style.display = 'block'; return; }
        codigo = codigoInput;
      } else {
        codigo = null;
      }
    }
  }

  const payload = { nombre, cuit, codigo };
  let savedId = clienteId;
  if (clienteId) {
    const { error } = await sb.from('clientes').update(payload).eq('id', clienteId);
    if (error) { toast('Error: ' + error.message, true); return; }
    toast('Cliente actualizado');
  } else {
    const { data, error } = await sb.from('clientes').insert(payload).select().single();
    if (error) { toast('Error: ' + error.message, true); return; }
    savedId = data.id;
    // v67: auto-crear "General" + "Sin equipo específico" para el cliente
    // recién creado. Idempotente: si ya existen no los duplica.
    await _ensureDefaultsCliente(savedId);
    toast('Cliente creado');
  }
  await loadAll();
  // Si veníamos del flujo "+ Cliente nuevo" en el form de proyecto, queremos
  // dejarlo seleccionado.
  if (window._clienteFormCallback) {
    const cb = window._clienteFormCallback;
    window._clienteFormCallback = null;
    document.getElementById('cli-modal').remove();
    cb(savedId);
    return;
  }
  // Si era cliente nuevo, reabrir el modal en modo edición para poder agregar contactos
  if (!clienteId) {
    document.getElementById('cli-modal').remove();
    showClienteForm(savedId);
    return;
  }
  document.getElementById('cli-modal').remove();
  render();
}

async function confirmDeleteCliente(clienteId) {
  const cliente = clientes.find(c => c.id === clienteId);
  if (!cliente) return;
  confirmModal({
    titulo: 'Eliminar cliente',
    mensaje: 'Eliminar cliente "' + cliente.nombre + '"?',
    textoConfirmar: 'Eliminar',
    onConfirm: async () => {
      const { error } = await sb.from('clientes').delete().eq('id', clienteId);
      if (error) { toast('Error: ' + error.message, true); return; }
      await loadAll();
      toast('Cliente eliminado');
      render();
    }
  });
}

// ========== GENERATE CARPETA (PDF via window.print) ==========
// ============================================================================
// COPIAR PARA MAIL: genera HTML enriquecido con el formato del mail
// estandarizado de Oficina Tecnica y lo copia al portapapeles. Estructura:
//   __Informacion General__ (negrita+subrayado)
//      Cliente, Contacto, Descripcion, Cantidad, Cotizar, Fecha Cotizacion,
//      Cargar Pedido, Fecha Entrega (en rojo), Tel/Mail, Observaciones
//   __Procesos aproximados__ (negrita+subrayado)
//      Lista de items con sus procesos como bullets anidados
//   __Fotos (si hay)__ - solo enumerada (las imagenes se copian aparte)
// ============================================================================
async function copyProjectForMail(projectId) {
  const proj = getProject(projectId);
  if (!proj) { toast('Proyecto no encontrado', true); return; }
  const cli = clientes.find(c => c.id === proj.cliente_id);
  const projItems = items.filter(i => i.proyecto_id === projectId);
  // Helpers de formato
  const fmt = d => {
    if (!d) return '';
    const [y, m, da] = d.split('-');
    return da + '/' + m + '/' + y;
  };
  const sect = txt => '<p style="margin:0 0 4px 0"><b><u>' + escapeHtml(txt) + '</u></b></p>';
  const line = (lbl, val, valStyle) => '<p style="margin:0"><b>' + escapeHtml(lbl) + ':</b>' + (val ? ' ' + (valStyle ? '<span style="' + valStyle + '">' + escapeHtml(val) + '</span>' : escapeHtml(val)) : '') + '</p>';
  // Trunca un texto a N caracteres SIN sufijo (segun pedido). Si excede, corta seco.
  const trunc20 = s => {
    if (!s) return '';
    if (s.length <= 20) return s;
    return s.substring(0, 20);
  };
  // Cotizar: "Si" si el proyecto esta en estado Proyectando o Presupuestar.
  // Para los demas estados, "No". Esto se puede modificar a mano en el mail.
  const cotizarVal = (proj.estado === 'Proyectando' || proj.estado === 'Presupuestar') ? 'Si' : 'No';

  // Construir HTML
  let html = '<div style="font-family:Arial,sans-serif;font-size:13px;color:#000;line-height:1.45">';
  // Info general
  html += sect('Información General');
  html += line('Cliente', cli ? cli.nombre : '');
  html += line('Nombre de Contacto', '');
  html += line('Descripción', proj.descripcion || '');
  if (projItems.length === 1) {
    html += line('Cantidad', String(projItems[0].cantidad || ''));
  } else {
    html += line('Cantidad', '');
  }
  html += line('Cotizar', cotizarVal);
  // Fecha de cotizacion: siempre vacia, la completa Oficina Tecnica a mano
  html += line('Fecha de Cotización', '');
  html += line('Cargar Pedido', 'Si');
  // Fecha de entrega en rojo
  html += line('Fecha de Entrega', fmt(proj.fecha_entrega), 'color:#A32D2D;font-weight:600');
  html += line('Teléfono o mail de Contacto (si se cree relevante)', '');
  // Observaciones desde el campo nuevo observaciones_mail. Puede venir como
  // HTML enriquecido (negritas, colores, tamanos) - lo insertamos directo
  // sanitizando para seguridad. Si es texto plano viejo, los \n se vuelven <br>.
  if (proj.observaciones_mail && proj.observaciones_mail.trim()) {
    html += '<p style="margin:0"><b>Observaciones:</b></p>';
    const isHtml = /[<>]/.test(proj.observaciones_mail);
    const obsHtml = isHtml
      ? sanitizeRichHtml(proj.observaciones_mail)
      : escapeHtml(proj.observaciones_mail).replace(/\n/g, '<br>');
    html += '<div style="margin:0">' + obsHtml + '</div>';
  } else {
    html += line('Observaciones', '');
  }
  html += '<p style="margin:10px 0 0 0">&nbsp;</p>';

  // Procesos aproximados
  html += sect('Procesos aproximados');
  html += '<ul style="margin:6px 0 0 0;padding-left:24px">';
  projItems.forEach((it, idx) => {
    const procs = actividades.filter(a => a.item_id === it.id && !a.proceso_eliminado)
      .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
    const cant = it.cantidad ? ' (Cant.: ' + it.cantidad + ')' : '';
    const verFoto = it.foto_url ? ' (Ver foto ' + (idx + 1) + ')' : '';
    html += '<li style="margin-bottom:2px"><b>' + escapeHtml((it.descripcion || '').toUpperCase()) + '</b>' + escapeHtml(cant + verFoto);
    if (procs.length > 0) {
      html += '<ul style="margin:2px 0 4px 0;padding-left:24px">';
      procs.forEach(p => {
        // Formato simple: "Proceso - descripcion truncada a 20 chars"
        // Sin deteccion de duplicados ni "...". Si la desc es vacia,
        // solo se muestra el nombre del proceso.
        const procName = p.proceso || '';
        const procDesc = p.descripcion || '';
        const descTrunc = trunc20(procDesc);
        const txt = descTrunc ? procName + ' - ' + descTrunc : procName;
        html += '<li>' + escapeHtml(txt) + '</li>';
      });
      html += '</ul>';
    }
    html += '</li>';
  });
  html += '</ul>';
  html += '<p style="margin:10px 0 0 0">&nbsp;</p>';

  // Fotos (si hay): solo enumeradas
  const itemsConFoto = projItems.filter(it => it.foto_url);
  if (proj.foto_url || itemsConFoto.length > 0) {
    html += sect('Fotos (si hay)');
    let fotoIdx = 1;
    if (proj.foto_url) {
      html += '<p style="margin:0">Foto general del proyecto</p>';
    }
    itemsConFoto.forEach(it => {
      html += '<p style="margin:0">Foto ' + fotoIdx + ': ' + escapeHtml(it.descripcion || '') + '</p>';
      fotoIdx++;
    });
  }
  html += '</div>';

  // Texto plano fallback
  let plain = 'Información General\n';
  plain += 'Cliente: ' + (cli ? cli.nombre : '') + '\n';
  plain += 'Descripción: ' + (proj.descripcion || '') + '\n';
  plain += 'Cotizar: ' + cotizarVal + '\n';
  plain += 'Fecha de Entrega: ' + fmt(proj.fecha_entrega) + '\n';
  if (proj.observaciones_mail && proj.observaciones_mail.trim()) {
    // Strip HTML para texto plano fallback
    const tmp = document.createElement('div');
    tmp.innerHTML = proj.observaciones_mail;
    plain += 'Observaciones:\n' + (tmp.textContent || tmp.innerText || '') + '\n';
  }
  plain += '\nProcesos aproximados:\n';
  projItems.forEach((it) => {
    const procs = actividades.filter(a => a.item_id === it.id && !a.proceso_eliminado).sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
    plain += '* ' + (it.descripcion || '').toUpperCase() + (it.cantidad ? ' (Cant.: ' + it.cantidad + ')' : '') + '\n';
    procs.forEach(p => {
      const descTrunc = trunc20(p.descripcion || '');
      plain += '   * ' + (p.proceso || '') + (descTrunc ? ' - ' + descTrunc : '') + '\n';
    });
  });

  // Copiar al clipboard
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      const item = new ClipboardItem({
        'text/html': new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([plain], { type: 'text/plain' })
      });
      await navigator.clipboard.write([item]);
      toast('Texto copiado. Pegalo en Gmail con Ctrl+V.');
    } else {
      await navigator.clipboard.writeText(plain);
      toast('Texto copiado (sin formato).');
    }
  } catch (e) {
    console.error('Error al copiar:', e);
    toast('No se pudo copiar al portapapeles.', true);
  }
}

// Copia una imagen (URL publica) al portapapeles como PNG. Despues podes
// pegarla en Gmail con Ctrl+V y aparece inline. Requiere CORS habilitado
// en el bucket.
async function copyImageToClipboard(url) {
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('No se pudo descargar la imagen (' + resp.status + ')');
    let blob = await resp.blob();
    // El clipboard solo acepta PNG. Si la imagen no es PNG la convertimos
    // dibujandola en un canvas y exportando a PNG.
    if (blob.type !== 'image/png') {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      const blobUrl = URL.createObjectURL(blob);
      await new Promise((res, rej) => {
        img.onload = res;
        img.onerror = () => rej(new Error('No se pudo cargar la imagen'));
        img.src = blobUrl;
      });
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      canvas.getContext('2d').drawImage(img, 0, 0);
      blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      URL.revokeObjectURL(blobUrl);
    }
    const item = new ClipboardItem({ 'image/png': blob });
    await navigator.clipboard.write([item]);
    toast('Imagen copiada. Pegala en Gmail con Ctrl+V.');
  } catch (e) {
    console.error('Error al copiar imagen:', e);
    toast('No se pudo copiar la imagen. Verifica CORS en Supabase Storage.', true);
  }
}

// ============================================================================
// COPIAR PROYECTO: crea un proyecto nuevo con todos los datos del original.
// Se duplican los items con sus procesos. NO se duplican: id, pedido_nro,
// fecha_ingreso (queda hoy), fecha_entrega (queda en blanco), estado (queda
// "Proyectando"). Las fotos se copian referenciando los mismos URLs (no se
// re-suben).
// ============================================================================
async function copyProject(projectId) {
  const proj = getProject(projectId);
  if (!proj) { toast('Proyecto no encontrado', true); return; }
  confirmModal({
    titulo: 'Duplicar proyecto',
    mensaje: '¿Duplicar el proyecto "' + (proj.descripcion || '') + '"? Va a abrir el proyecto nuevo para editar.',
    textoConfirmar: 'Duplicar',
    peligroso: false,
    onConfirm: () => _doCopyProject(projectId)
  });
}

async function _doCopyProject(projectId) {
  const proj = getProject(projectId);
  if (!proj) return;

  // Contadores para reportar al final
  let itemsCopied = 0, itemsFailed = 0, procsCopied = 0, procsFailed = 0;
  const errors = [];

  // 1. Crear el proyecto nuevo
  const { data: newProj, error: errProj } = await sb.from('proyectos').insert({
    cliente_id: proj.cliente_id,
    pedido_nro: null,
    descripcion: proj.descripcion,
    urgencia: proj.urgencia,
    foto_url: proj.foto_url,
    fecha_ingreso: new Date().toISOString().substring(0, 10),
    fecha_entrega: null,
    cliente_final: proj.cliente_final,
    estado: 'Proyectando',
    observaciones_mail: proj.observaciones_mail || null
  }).select().single();
  if (errProj || !newProj) {
    console.error('[copyProject] Error creando proyecto nuevo:', errProj);
    toast('Error al crear copia del proyecto: ' + (errProj ? errProj.message : 'sin datos'), true);
    return;
  }

  // 2. Copiar items
  const origItems = items.filter(i => i.proyecto_id === projectId);
  console.log('[copyProject] Items originales encontrados:', origItems.length);

  for (const oi of origItems) {
    const { data: newItem, error: errItem } = await sb.from('items').insert({
      proyecto_id: newProj.id,
      cliente_id: proj.cliente_id,  // heredar el cliente del proyecto (era el bug "Cliente: ?")
      descripcion: oi.descripcion,
      cantidad: oi.cantidad,
      material: oi.material,
      presentacion_mat_prima: oi.presentacion_mat_prima,
      foto_url: oi.foto_url,
      fecha_fin_estipulada: null,
      estado: 'Espera MP'
    }).select().single();
    if (errItem || !newItem) {
      console.error('[copyProject] Error creando item:', errItem, 'item original:', oi);
      itemsFailed++;
      errors.push('Item "' + (oi.descripcion || '?') + '": ' + (errItem ? errItem.message : 'sin datos'));
      continue;
    }
    itemsCopied++;

    // 3. Copiar procesos del item. Filtramos directamente por item_id en
    // el array global actividades.
    const origProcs = actividades.filter(a => a.item_id === oi.id && !a.proceso_eliminado)
      .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
    console.log('[copyProject] Procesos a copiar para item', oi.id, ':', origProcs.length);

    for (const op of origProcs) {
      // Construir el payload del nuevo proceso. NO incluir proyecto_id:
      // la tabla actividades_tablero NO tiene esa columna. La relacion con
      // el proyecto es indirecta via item_id -> items.proyecto_id.
      const payload = {
        item_id: newItem.id,
        descripcion: op.descripcion,
        proceso: op.proceso,
        orden: op.orden,
        duracion_estimada_min: op.duracion_estimada_min,
        duracion_margen_min: op.duracion_margen_min || 0,
        duracion_operario_min: op.duracion_operario_min,
        duracion_planificador_min: op.duracion_planificador_min,
        tipo: op.tipo,
        maquina_ideal_id: op.maquina_ideal_id,
        maquina_ideal_nombre: op.maquina_ideal_nombre,
        operario_ideal_id: op.operario_ideal_id,
        maquinas_suplentes: op.maquinas_suplentes,
        operarios_suplentes: op.operarios_suplentes,
        trabajo_a_realizar: op.trabajo_a_realizar,
        cliente_id: proj.cliente_id,
        pedido_nro: null,
        urgencia: proj.urgencia,
        estado: 'sin_planificar',
        estado_proceso: 'Planificación Pendiente',
        fecha: '1900-01-01',
        hora_inicio: '06:00:00',  // NOT NULL constraint en DB. Default igual al que usa saveProceso.
        maquina_id: null,
        operario_id: op.operario_ideal_id || null,
        es_pulmon: false,
        proceso_eliminado: false
      };
      const { error: errProc } = await sb.from('actividades_tablero').insert(payload);
      if (errProc) {
        console.error('[copyProject] Error insertando proceso:', errProc, 'payload:', payload);
        procsFailed++;
        errors.push('Proceso "' + (op.proceso || '?') + '" en item "' + (oi.descripcion || '?') + '": ' + errProc.message);
      } else {
        procsCopied++;
      }
    }
  }

  // Reportar resultado al usuario
  console.log('[copyProject] Resultado:', { itemsCopied, itemsFailed, procsCopied, procsFailed });
  if (procsFailed > 0 || itemsFailed > 0) {
    const detail = errors.slice(0, 3).join('\n');
    alert('Duplicacion parcial:\n' +
      '- Items copiados: ' + itemsCopied + (itemsFailed ? ' (fallaron ' + itemsFailed + ')' : '') + '\n' +
      '- Procesos copiados: ' + procsCopied + (procsFailed ? ' (fallaron ' + procsFailed + ')' : '') + '\n\n' +
      'Errores:\n' + detail + '\n\nVer la consola del navegador (F12) para mas detalle.');
  } else {
    toast('Proyecto duplicado. ' + procsCopied + ' procesos copiados.');
  }
  await loadAll();
  navigate({ view: 'project', projectId: newProj.id });
}

  procesos.forEach((p, idx) => {

  for (let i = filled; i < 8; i++) {
    const cls = i % 2 === 1 ? ' class="shade"' : '';
    html += `<tr${cls}><td class="num">${i + 1}</td><td></td><td></td><td></td></tr>`;
  }
  html += `</tbody></table></div>`;
  if (itemFoto) {
    html += `<div class="cover-photo"><img src="${escapeHtml(itemFoto)}"></div>`;
  }
  html += `</div>`;

  // ============= ORDENES DE TRABAJO (2 por hoja) =============
  for (let i = 0; i < procesos.length; i += 2) {
    const p1 = procesos[i];
    const p2 = procesos[i + 1];
    html += `<div class="page ot-page">`;
    html += renderOT(p1, i + 1, procesos.length, item, meta, clienteDisplay);
    html += `<div class="ot-cut"></div>`;
    if (p2) html += renderOT(p2, i + 2, procesos.length, item, meta, clienteDisplay);
    else html += `<div style="flex:1"></div>`;
    html += `</div>`;
  }

  html += `<script>
// Auto-shrink: reduce font-size hasta que el contenido entre en el padre o
// se llegue al minimo (9pt = ~12px). Si no entra al minimo, se mantiene el
// minimo y el padre lo corta con overflow:hidden.
function fitOne(el, minPx) {
  if (!el) return;
  var parent = el.parentElement;
  if (!parent) return;
  var parentStyle = window.getComputedStyle(parent);
  var maxH = parent.clientHeight - (parseFloat(parentStyle.paddingTop) || 0) - (parseFloat(parentStyle.paddingBottom) || 0);
  if (maxH <= 0) maxH = parent.clientHeight;
  // Empezar con la fuente actual
  var cs = window.getComputedStyle(el);
  var fs = parseFloat(cs.fontSize);
  if (!fs || isNaN(fs)) return;
  var safety = 30;
  while ((el.scrollHeight > maxH + 1 || el.scrollWidth > el.clientWidth + 1) && fs > minPx && safety-- > 0) {
    fs -= 0.5;
    el.style.fontSize = fs + 'px';
  }
}

// Especial para .ot-trabajo-text (detalle de tareas):
// - Primero auto-shrink hasta 9pt (12px).
// - Si despues del shrink al minimo SIGUE sin entrar en su contenedor (es decir
//   hay texto que se cortaria), marca la OT con clase ".grew" para que toda
//   la OT crezca y absorba el contenido completo. Esa OT individual ocupa una
//   hoja sola, pero las demas siguen pegadas de a 2 por hoja porque cada par
//   esta en su propio .ot-page.
function fitTrabajo(el) {
  if (!el) return;
  var trabajo = el.parentElement; // .ot-trabajo
  if (!trabajo) return;
  var ot = trabajo.closest('.ot');
  if (!ot) return;
  // Auto-shrink primero
  fitOne(el, 12);
  // Despues del shrink: comparar scrollHeight vs clientHeight del trabajo.
  // Si scroll excede el visible, el detalle no entra ni a 9pt -> permitir
  // que la OT crezca.
  if (el.scrollHeight > trabajo.clientHeight + 1) {
    ot.classList.add('grew');
  }
}

window.onload = function() {
  // Auto-shrink en todos los .fit-content (single-line)
  document.querySelectorAll('.fit-content').forEach(function(el){ fitOne(el, 12); });
  // Auto-shrink en .fit-content-multi (multilinea, descripcion)
  document.querySelectorAll('.fit-content-multi').forEach(function(el){
    if (el.classList.contains('ot-trabajo-text')) fitTrabajo(el);
    else fitOne(el, 12);
  });
  setTimeout(function() { window.print(); }, 400);
};
<\/script></body></html>`;

  const w = window.open('', '_blank');
  if (!w) { toast('Permitir pop-ups para generar la carpeta', true); return; }
  w.document.open();
  w.document.write(html);
  w.document.close();
}

// Hardcoded checklist for "Despacho/Cierre" processes
const DESPACHO_CHECKLIST = [
  'Embalaje (si es necesario)',
  'Drive',
  'Nota y escenario en Tactica',
  'Completar orden de trabajo',
  'Check en portada de planilla'
];

function renderOT(p, idx, total, item, meta, clienteDisplay) {
  const fmt = d => { if (!d) return ''; const [y, m, da] = d.split('-'); return da + '/' + m + '/' + y; };
  // v66: resolver el material del item (FK a materiales + fallback a campo legacy)
  const itemMatLbl = item.material_id ? ((materiales.find(m => m.id === item.material_id) || {}).nombre || '') : (item.material || '');
  const tarea = (p.proceso || p.descripcion || '').toUpperCase();
  // Responsable: ideal + suplentes concatenados con " / "
  const respIds = [];
  if (p.operario_ideal_id) respIds.push(p.operario_ideal_id);
  (p.operarios_suplentes_ids || []).forEach(sid => {
    const id = parseInt(sid);
    if (id && !respIds.includes(id)) respIds.push(id);
  });
  const responsable = respIds.map(id => opN(id)).join(' / ').toUpperCase();
  // Resolve machine display name (real machine, "Otra" custom name, or "Ninguna")
  let maquina;
  if (p.maquina_ideal_id) maquina = mN(p.maquina_ideal_id);
  else if (p.maquina_ideal_nombre) maquina = p.maquina_ideal_nombre + ' (otra)';
  else maquina = '— ninguna —';
  const trabajo = p.descripcion_trabajo || '';
  const urg = (meta.urgencia || 'media').toUpperCase();
  const isDespacho = (p.proceso || '') === 'Despacho/Cierre';

  // Detail block: either checklist (Despacho/Cierre) or freeform text
  // Para Despacho: acciones a la izquierda, checkboxes a la derecha.
  // Para resto: si hay texto, se muestra arriba; sin renglones para no
  // complicar el layout. El "trabajo" puede venir como HTML (editor rico)
  // o como texto plano de proyectos viejos. Si trae tags, lo usamos como
  // HTML (sanitizado). Si no, lo escapamos.
  const trabajoIsHtml = /[<>]/.test(trabajo);
  const trabajoRendered = trabajoIsHtml ? sanitizeRichHtml(trabajo) : escapeHtml(trabajo).replace(/\n/g, '<br>');
  let detalleBlock;
  if (isDespacho) {
    let items = '';
    DESPACHO_CHECKLIST.forEach(it => {
      items += `<div class="ot-checklist-item"><span class="ot-checklist-text">${escapeHtml(it)}</span><div class="ot-checklist-box"></div></div>`;
    });
    const trabajoExtra = trabajo ? `<div style="margin-bottom:6px;font-size:11px">${trabajoRendered}</div>` : '';
    detalleBlock = `<div class="ot-trabajo" style="background-image:none">${trabajoExtra}<div class="ot-checklist">${items}</div></div>`;
  } else {
    if (trabajo) {
      detalleBlock = `<div class="ot-trabajo ot-trabajo-fit"><div class="ot-trabajo-text fit-content-multi">${trabajoRendered}</div></div>`;
    } else {
      detalleBlock = `<div class="ot-trabajo ot-trabajo-fit"></div>`;
    }
  }

  // Layout segun spec del usuario:
  //   Renglon 1 (header negro): TAREA + "Orden de trabajo X/N" centrado + URG
  //   Renglon 2: CLIENTE | RESPONSABLE
  //   Renglon 3: PROYECTO | PEDIDO
  //   Renglon 4-5 (alto doble): DESCRIPCION | CANTIDAD + ingreso
  //     -> Descripcion ocupa el alto de los 2 renglones (campo grande).
  //     -> Lado derecho: CANTIDAD en una mitad, INGRESO en la otra mitad
  //   Renglon 6: MATERIAL | FORMA INICIAL
  return `<div class="ot">
    <div class="ot-tarea-band">
      <div class="tarea-name">${escapeHtml(tarea)}</div>
      <div class="ot-num-mid">Orden de Trabajo: ${idx} / ${total}</div>
      <div class="urg-pill"><span class="urg-lbl">Urgencia:</span> <span class="urg-val">${urg}</span></div>
    </div>
    <table class="ot-info-big">
      <colgroup>
        <col style="width:14%">
        <col>
        <col style="width:14%">
        <col style="width:13%">
      </colgroup>
      <tr>
        <td class="lblb">CLIENTE</td>
        <td class="valb value-fit"><div class="fit-content">${escapeHtml((clienteDisplay || '').toUpperCase())}</div></td>
        <td class="lblb lblb-narrow">RESPONSABLE</td>
        <td class="valb valb-narrow value-fit"><div class="fit-content">${escapeHtml((responsable || '').toUpperCase())}</div></td>
      </tr>
      <tr class="row-proj">
        <td class="lblb lblb-small">PROYECTO</td>
        <td class="valb valb-small value-fit"><div class="fit-content">${escapeHtml((meta.descripcion || '').toUpperCase())}</div></td>
        <td class="lblb lblb-narrow">PEDIDO</td>
        <td class="valb valb-narrow value-fit ot-pedido"><div class="fit-content">${escapeHtml((item.pedido_nro || '').toString().toUpperCase())}</div></td>
      </tr>
      <tr>
        <td class="lblb desc-tall" rowspan="2">DESCRIPCIÓN</td>
        <td class="valb desc-cell" rowspan="2"><div class="fit-content-multi desc-content">${escapeHtml((item.descripcion || '').toUpperCase())}</div></td>
        <td class="lblb lblb-narrow">CANTIDAD</td>
        <td class="valb valb-narrow">${item.cantidad}</td>
      </tr>
      <tr>
        <td class="lblb lblb-narrow lblb-lower">ingreso</td>
        <td class="valb valb-narrow valb-lower">${fmt(meta.fecha_ingreso)}</td>
      </tr>
    </table>
    <table class="ot-info">
      <tr>
        <td class="label" style="width:14%">Material:</td>
        <td class="value-fit" style="width:38%"><div class="fit-content">${escapeHtml(itemMatLbl)}</div></td>
        <td class="label" style="width:14%">Forma inicial:</td>
        <td class="value-fit" style="width:34%"><div class="fit-content">${escapeHtml(item.presentacion_mat_prima || '')}</div></td>
      </tr>
    </table>
    <div style="border-top:1px solid #000"></div>
    ${detalleBlock}
    <div class="ot-completar-band">COMPLETAR POR EL OPERARIO</div>
    <table class="ot-fill">
      <tr>
        <td class="label lbl-big" style="width:22%">TIEMPO REQUERIDO:</td>
        <td class="val-big" style="width:30%">________ HS ______ MIN</td>
        <td class="label lbl-big" style="width:14%">MÁQUINA:</td>
        <td class="val-big value-fit" style="width:34%"><div class="fit-content">${escapeHtml((maquina || '').toUpperCase())}</div></td>
      </tr>
      <tr>
        <td class="label lbl-big">MATERIAL UTILIZADO:</td>
        <td class="val-big" colspan="3"></td>
      </tr>
      <tr>
        <td class="label lbl-mid" style="width:18%">Inicio:</td>
        <td class="val-mid" style="width:32%"></td>
        <td class="label lbl-mid" style="width:18%">Fin:</td>
        <td class="val-mid" style="width:32%"></td>
      </tr>
    </table>
    <div class="ot-obs-wrap">
      <div class="ot-obs-l">OBSERVACIONES:</div>
      <div class="ot-obs"></div>
    </div>
  </div>`;
}
// ========== Modal drag ==========
// Allows any .md element to be dragged by its .md-t header.
function makeModalDraggable(modalEl) {
  // Inject the X close button if it isn't already present.
  if (!modalEl.querySelector('.md-x')) {
    const x = document.createElement('div');
    x.className = 'md-x';
    x.textContent = '×';
    x.title = 'Cerrar';
    x.addEventListener('click', (e) => {
      e.stopPropagation();
      const mo = modalEl.closest('.mo');
      if (mo) mo.remove();
    });
    modalEl.appendChild(x);
  }
  // Close on Esc (only the topmost modal)
  if (!window._escHooked) {
    window._escHooked = true;
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      const modals = document.querySelectorAll('.mo');
      if (modals.length === 0) return;
      modals[modals.length - 1].remove();
    });
  }
  const header = modalEl.querySelector('.md-t');
  if (!header) return;
  let dragX = 0, dragY = 0;
  let pos = { x: 0, y: 0 };
  let startPos = { x: 0, y: 0 };
  header.addEventListener('mousedown', (e) => {
    if (e.target.closest('button')) return;  // don't drag if clicking a button
    e.preventDefault();
    dragX = e.clientX;
    dragY = e.clientY;
    startPos = { ...pos };
    function onMove(ev) {
      const dx = ev.clientX - dragX;
      const dy = ev.clientY - dragY;
      pos.x = startPos.x + dx;
      pos.y = startPos.y + dy;
      modalEl.style.transform = 'translate(' + pos.x + 'px, ' + pos.y + 'px)';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}
// Watch for new modals being added to the DOM
const modalObserver = new MutationObserver((mutations) => {
  mutations.forEach(mu => {
    mu.addedNodes.forEach(node => {
      if (node.nodeType !== 1) return;
      if (node.classList && node.classList.contains('mo')) {
        const md = node.querySelector('.md');
        if (md) makeModalDraggable(md);
      }
    });
  });
});
modalObserver.observe(document.body, { childList: true, subtree: true });

async function init() {
  document.getElementById('hd-logo').src = LOGO_DATA_URL;
  await loadAll();
  render();
}
init();

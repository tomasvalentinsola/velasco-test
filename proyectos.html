<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Velasco App 2.0 — Proyectos v1</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#FAFAF7;color:#2C2C2A;font-size:13px}
.app{max-width:1100px;margin:0 auto;padding:20px}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #E8E6DF}
.hd h1{font-size:20px;font-weight:700}
.hd-r{display:flex;gap:8px;align-items:center}
.b{padding:7px 14px;border:1px solid #C8C6BE;border-radius:5px;background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:#2C2C2A}
.b:hover{filter:brightness(.95)}
.b-p{background:#0C447C;color:#fff;border-color:#0C447C}
.b-p:hover{background:#0A3866}
.b-d{background:#FEF0F0;color:#A32D2D;border-color:#E24B4A}
.b:disabled{opacity:.5;cursor:not-allowed}

/* ===== List view ===== */
.list-empty{padding:40px;text-align:center;color:#888780;background:#fff;border:1px dashed #C8C6BE;border-radius:8px}
.proj-card{background:#fff;border:1px solid #C8C6BE;border-radius:8px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .12s;display:flex;gap:14px;align-items:center}
.proj-card:hover{border-color:#378ADD;background:#F5FAFF;box-shadow:0 2px 6px rgba(55,138,221,.15)}
.proj-card-img{width:60px;height:60px;border-radius:6px;background:#E8E6DF;flex-shrink:0;object-fit:cover}
.proj-card-img-empty{width:60px;height:60px;border-radius:6px;background:#E8E6DF;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#888780;font-size:9px}
.proj-card-body{flex:1;min-width:0}
.proj-card-t{font-size:14px;font-weight:600;margin-bottom:3px}
.proj-card-s{font-size:11px;color:#5F5E5A;line-height:1.5}
.proj-urgencia{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;margin-left:6px}
.urg-urgente{background:#1A1A1A;color:#fff}
.urg-alta{background:#FEDADA;color:#A32D2D}
.urg-media{background:#FFF4D5;color:#854F0B}
.urg-baja{background:#E5F5E1;color:#1B6B1B}

/* ===== Form ===== */
.form{background:#fff;border:1px solid #C8C6BE;border-radius:8px;padding:20px;margin-bottom:20px}
.form-t{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #E8E6DF}
.row{display:flex;gap:12px;margin-bottom:12px}
.row > .ef{flex:1}
.ef{margin-bottom:12px}
.ef-l{font-size:11px;color:#5F5E5A;margin-bottom:4px;font-weight:500}
.ef-i{width:100%;padding:7px 10px;border:1px solid #C8C6BE;border-radius:5px;font-size:13px;background:#fff;font-family:inherit}
.ef-i:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.15)}
.ef-i[type="file"]{padding:5px;font-size:12px}
.ef-help{font-size:10px;color:#888780;margin-top:3px}
.ef-err{font-size:11px;color:#A32D2D;margin-top:3px;font-weight:500}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid #E8E6DF}

/* ===== Process list ===== */
.proc-list-t{font-size:14px;font-weight:600;margin:20px 0 10px;display:flex;justify-content:space-between;align-items:center}
.proc-card{background:#FAFAF7;border:1px solid #E8E6DF;border-radius:6px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.proc-card-body{flex:1;min-width:0}
.proc-card-t{font-weight:600;font-size:12px;margin-bottom:3px}
.proc-card-s{font-size:11px;color:#5F5E5A;line-height:1.6}
.proc-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin-left:4px}
.tag-man{background:#E8E6DF;color:#5F5E5A}
.tag-auto{background:#1A1A1A;color:#fff}
.proc-actions{display:flex;gap:4px;flex-shrink:0}
.b-icon{padding:4px 8px;font-size:11px}

/* ===== Modal ===== */
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center}
.md{background:#fff;border-radius:10px;padding:22px;min-width:480px;max-width:680px;max-height:88vh;overflow-y:auto;border:1px solid #C8C6BE}
.md-t{font-size:16px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #E8E6DF}

/* ===== Multi-select chips ===== */
.chip-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:5px;border:1px solid #C8C6BE;border-radius:5px;background:#fff;min-height:34px;cursor:text}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 6px 3px 8px;background:#E6F1FB;color:#0C447C;border-radius:4px;font-size:11px;font-weight:500}
.chip-x{cursor:pointer;font-weight:700;opacity:.6}
.chip-x:hover{opacity:1}
.chip-add{flex:1;min-width:80px;border:none;outline:none;font-size:12px;background:transparent;padding:3px}

/* ===== Photo upload ===== */
.photo-wrap{position:relative;width:120px;height:120px;border:2px dashed #C8C6BE;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#FAFAF7;overflow:hidden}
.photo-wrap:hover{border-color:#378ADD;background:#F5FAFF}
.photo-wrap img{width:100%;height:100%;object-fit:cover}
.photo-wrap .photo-empty{font-size:11px;color:#888780;text-align:center;padding:10px}
.photo-x{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-weight:700}
.photo-x:hover{background:rgba(0,0,0,.8)}
.photo-loading{font-size:10px;color:#5F5E5A;font-style:italic}

/* ===== Toast ===== */
.to{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:10px 24px;border-radius:8px;font-size:12px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.to.sh{opacity:1}
.to.err{background:#A32D2D}
</style>
</head>
<body>

<div class="app">
  <div class="hd">
    <h1>Proyectos — Metalúrgica Velasco</h1>
    <div class="hd-r">
      <button class="b" id="btn-clientes" onclick="showClientesView()">Clientes</button>
      <button class="b b-p" id="btn-new" onclick="showProjectForm(null)">+ Nuevo proyecto</button>
    </div>
  </div>

  <div id="main"></div>
</div>

<div class="to" id="to"></div>

<script>
// ========== SUPABASE CLIENT ==========
const SB_URL = 'https://mzjbcfkalvduimqhawur.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16amJjZmthbHZkdWltcWhhd3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzY0MzcsImV4cCI6MjA5MDQ1MjQzN30.P7so8AbiRgR9bIWttIqoG6ievY4cxgDMjzZQLx-95-Q';
const sb = supabase.createClient(SB_URL, SB_KEY);

// ========== STATE ==========
let clientes = [];
let maquinas = [];
let operarios = [];
let actividades = [];  // all rows in actividades_tablero (sin_planificar y planificadas)

// Map of cliente_id+pedido_nro → "project" view (computed from actividades).
// Each "project" = group of actividades sharing the same cliente_id and pedido_nro.

// ========== HELPERS ==========
function toast(msg, isErr) {
  const t = document.getElementById('to');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('sh');
  setTimeout(() => t.classList.remove('sh'), 3500);
}

function clN(id) { const c = clientes.find(x => x.id === id); return c ? c.nombre : '?'; }
function mN(id) { const m = maquinas.find(x => x.id === id); return m ? m.nombre : '?'; }
function opN(id) { const o = operarios.find(x => x.id === id); return o ? o.nombre : '?'; }
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// CUIT validation: exactly 11 digits (no hyphens)
function validCuit(s) { return /^\d{11}$/.test(s); }

// Group actividades by (cliente_id, pedido_nro) into "projects"
function getProjects() {
  const map = new Map();
  actividades.forEach(a => {
    if (!a.pedido_nro) return;  // skip activities without pedido
    const key = a.cliente_id + '|' + a.pedido_nro;
    if (!map.has(key)) {
      map.set(key, {
        key,
        cliente_id: a.cliente_id,
        pedido_nro: a.pedido_nro,
        urgencia: a.urgencia,
        descripcion: '',  // we'll derive from first activity
        foto_proyecto_url: a.foto_proyecto_url,
        actividades: []
      });
    }
    map.get(key).actividades.push(a);
  });
  // Derive project description: take from a special "project meta" activity if any,
  // else from the first activity's grupo_correlativo or just use pedido_nro.
  // For simplicity now: use pedido as title, descripción comes from first act.
  const projects = [...map.values()];
  projects.forEach(p => {
    if (!p.descripcion && p.actividades.length) {
      p.descripcion = p.actividades[0].descripcion;
    }
  });
  return projects;
}

// ========== MAIN VIEWS ==========
async function loadAll() {
  const [c, m, o, a] = await Promise.all([
    sb.from('clientes').select('*').order('nombre'),
    sb.from('maquinas').select('*').order('id'),
    sb.from('operarios').select('*').order('id'),
    sb.from('actividades_tablero').select('*')
  ]);
  clientes = c.data || [];
  maquinas = m.data || [];
  operarios = o.data || [];
  actividades = a.data || [];
}

function showProjectsList() {
  const main = document.getElementById('main');
  const projects = getProjects();
  if (projects.length === 0) {
    main.innerHTML = '<div class="list-empty">No hay proyectos cargados todavia.<br><br>Cliquea <b>+ Nuevo proyecto</b> para empezar.</div>';
    return;
  }
  let h = '';
  projects.forEach(p => {
    const img = p.foto_proyecto_url
      ? '<img src="' + escapeHtml(p.foto_proyecto_url) + '" class="proj-card-img" onerror="this.style.display=\'none\'">'
      : '<div class="proj-card-img-empty">sin foto</div>';
    const urgBadge = p.urgencia ? '<span class="proj-urgencia urg-' + p.urgencia + '">' + p.urgencia + '</span>' : '';
    h += '<div class="proj-card" onclick="showProjectForm(\'' + p.key.replace(/'/g, "\\'") + '\')">';
    h += img;
    h += '<div class="proj-card-body">';
    h += '<div class="proj-card-t">' + escapeHtml(p.descripcion) + urgBadge + '</div>';
    h += '<div class="proj-card-s"><b>' + escapeHtml(clN(p.cliente_id)) + '</b> &middot; Ped. ' + escapeHtml(p.pedido_nro) + ' &middot; ' + p.actividades.length + ' proceso(s)</div>';
    h += '</div></div>';
  });
  main.innerHTML = h;
}

// ========== PROJECT FORM ==========
let editingProjectKey = null;

function showProjectForm(projectKey) {
  editingProjectKey = projectKey;
  const proj = projectKey ? getProjects().find(p => p.key === projectKey) : null;
  const isNew = !proj;

  const clientesOpts = clientes.map(c =>
    '<option value="' + c.id + '"' + (proj && proj.cliente_id === c.id ? ' selected' : '') + '>' + escapeHtml(c.nombre) + '</option>'
  ).join('');

  const main = document.getElementById('main');
  let h = '<div class="form">';
  h += '<div class="form-t">' + (isNew ? 'Nuevo proyecto' : 'Editar proyecto') + '</div>';

  // Top: photo + main fields side by side
  h += '<div style="display:flex;gap:20px;margin-bottom:14px">';
  h += '<div style="flex-shrink:0">';
  h += '<div class="ef-l">Foto del proyecto</div>';
  h += '<div class="photo-wrap" id="photo-wrap" onclick="document.getElementById(\'photo-input\').click()">';
  if (proj && proj.foto_proyecto_url) {
    h += '<img id="photo-img" src="' + escapeHtml(proj.foto_proyecto_url) + '">';
    h += '<div class="photo-x" onclick="event.stopPropagation();clearPhoto()">&times;</div>';
  } else {
    h += '<div class="photo-empty" id="photo-empty">Click o pega para subir</div>';
  }
  h += '</div>';
  h += '<input type="file" id="photo-input" accept="image/*" style="display:none" onchange="onPhotoFile(event)">';
  h += '<input type="hidden" id="photo-url" value="' + escapeHtml(proj && proj.foto_proyecto_url ? proj.foto_proyecto_url : '') + '">';
  h += '</div>';

  h += '<div style="flex:1">';
  h += '<div class="row">';
  h += '<div class="ef" style="flex:2">';
  h += '<div class="ef-l">Cliente <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="f-cliente"' + (isNew ? '' : ' disabled') + '>';
  h += '<option value="">— elegir —</option>' + clientesOpts;
  h += '</select>';
  if (!isNew) h += '<div class="ef-help">El cliente no se puede cambiar despues de crear el proyecto.</div>';
  h += '<div style="margin-top:6px"><button type="button" class="b" style="padding:4px 10px;font-size:11px" onclick="showClienteForm(null)">+ Nuevo cliente</button></div>';
  h += '</div>';
  h += '<div class="ef" style="flex:1">';
  h += '<div class="ef-l">Numero de pedido <span style="color:#A32D2D">*</span></div>';
  h += '<input type="text" class="ef-i" id="f-pedido" value="' + escapeHtml(proj ? proj.pedido_nro : '') + '"' + (isNew ? '' : ' disabled') + '>';
  if (!isNew) h += '<div class="ef-help">El pedido no se puede cambiar.</div>';
  h += '<div class="ef-err" id="err-pedido" style="display:none"></div>';
  h += '</div>';
  h += '</div>';

  h += '<div class="ef">';
  h += '<div class="ef-l">Descripcion del proyecto <span style="color:#A32D2D">*</span></div>';
  h += '<input type="text" class="ef-i" id="f-desc" value="' + escapeHtml(proj ? proj.descripcion : '') + '" placeholder="Ej. Bomba centrifuga AJM2000">';
  h += '</div>';

  h += '<div class="ef">';
  h += '<div class="ef-l">Urgencia <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="f-urg">';
  ['urgente', 'alta', 'media', 'baja'].forEach(u => {
    h += '<option value="' + u + '"' + (proj && proj.urgencia === u ? ' selected' : '') + '>' + u.charAt(0).toUpperCase() + u.slice(1) + '</option>';
  });
  h += '</select>';
  h += '</div>';
  h += '</div>';
  h += '</div>';

  // Procesos
  if (!isNew) {
    h += '<div class="proc-list-t">Procesos / actividades <button class="b b-p" onclick="showProcesoForm(null)">+ Agregar proceso</button></div>';
    h += '<div id="proc-list"></div>';
  } else {
    h += '<div style="font-size:11px;color:#888780;margin-top:14px;padding:10px;background:#F5F3EC;border-radius:6px">Despues de crear el proyecto vas a poder agregarle procesos.</div>';
  }

  h += '<div class="actions">';
  h += '<button class="b" onclick="showProjectsList()">Volver al listado</button>';
  if (!isNew) h += '<button class="b b-d" onclick="confirmDeleteProject()">Eliminar proyecto</button>';
  h += '<button class="b b-p" onclick="saveProject()">' + (isNew ? 'Crear proyecto' : 'Guardar cambios') + '</button>';
  h += '</div>';
  h += '</div>';

  main.innerHTML = h;
  if (!isNew) renderProcesosList();

  // Hook clipboard paste for photo
  setupPhotoPaste();
}

function renderProcesosList() {
  const proj = getProjects().find(p => p.key === editingProjectKey);
  const list = document.getElementById('proc-list');
  if (!list) return;
  if (!proj || proj.actividades.length === 0) {
    list.innerHTML = '<div class="list-empty" style="padding:20px">Aun no hay procesos cargados.</div>';
    return;
  }
  let h = '';
  proj.actividades.forEach(a => {
    const dur = Math.floor(a.duracion_estimada_min / 60) + 'h' + (a.duracion_estimada_min % 60 ? ' ' + (a.duracion_estimada_min % 60) + 'm' : '');
    const tag = a.tipo === 'automatica' ? '<span class="proc-tag tag-auto">AUTO</span>' : '<span class="proc-tag tag-man">MAN</span>';
    const setup = a.tipo === 'automatica' && a.duracion_operario_min ? ' &middot; setup: ' + a.duracion_operario_min + ' min' : '';
    const supMaqs = (a.maquinas_suplentes_ids || []).map(id => mN(parseInt(id))).join(', ');
    const supOps = (a.operarios_suplentes_ids || []).map(id => opN(parseInt(id))).join(', ');
    h += '<div class="proc-card">';
    h += '<div class="proc-card-body">';
    h += '<div class="proc-card-t">' + escapeHtml(a.descripcion) + tag + '</div>';
    h += '<div class="proc-card-s">';
    h += '<b>Duracion:</b> ' + dur + setup + '<br>';
    h += '<b>Maq. ideal:</b> ' + escapeHtml(mN(a.maquina_ideal_id)) + (supMaqs ? ' &middot; <b>Suplentes:</b> ' + escapeHtml(supMaqs) : '') + '<br>';
    h += '<b>Op. ideal:</b> ' + escapeHtml(opN(a.operario_ideal_id)) + (supOps ? ' &middot; <b>Suplentes:</b> ' + escapeHtml(supOps) : '');
    h += '</div></div>';
    h += '<div class="proc-actions">';
    h += '<button class="b b-icon" onclick="showProcesoForm(' + a.id + ')">Editar</button>';
    h += '<button class="b b-icon b-d" onclick="confirmDeleteProceso(' + a.id + ')">Eliminar</button>';
    h += '</div>';
    h += '</div>';
  });
  list.innerHTML = h;
}

async function saveProject() {
  const cliente_id = parseInt(document.getElementById('f-cliente').value);
  const pedido_nro = document.getElementById('f-pedido').value.trim();
  const descripcion = document.getElementById('f-desc').value.trim();
  const urgencia = document.getElementById('f-urg').value;
  const foto_url = document.getElementById('photo-url').value.trim() || null;
  const errPedido = document.getElementById('err-pedido');
  errPedido.style.display = 'none';

  if (!cliente_id) { toast('Elegi un cliente', true); return; }
  if (!pedido_nro) { toast('Ingresa numero de pedido', true); return; }
  if (!descripcion) { toast('Ingresa una descripcion', true); return; }

  if (!editingProjectKey) {
    // New project: validate pedido_nro is unique across all projects
    const existing = getProjects().find(p => p.pedido_nro === pedido_nro);
    if (existing) {
      errPedido.textContent = 'Ya existe un proyecto con el pedido ' + pedido_nro + ' (cliente: ' + clN(existing.cliente_id) + ')';
      errPedido.style.display = 'block';
      return;
    }
    // Insert a "placeholder" activity so the project shows up. Actually no:
    // an empty project doesn't exist as a row in actividades_tablero. We'll
    // just store the project metadata for now in localStorage AND require
    // adding at least one proceso later. But that's awkward.
    //
    // Simpler approach: a project IS its activities. To "create" a project
    // with no activities, we don't insert anything yet — just open the form
    // in "saved" mode (with key set) so user can add procesos. The actual
    // first INSERT happens when they add the first proceso.
    //
    // Persist project metadata in actividades_tablero rows when they're created.
    editingProjectKey = cliente_id + '|' + pedido_nro;
    // Save metadata to a side store (sessionStorage) so it can be retrieved
    // until first proceso creates a row.
    sessionStorage.setItem('proj-meta-' + editingProjectKey, JSON.stringify({
      descripcion, urgencia, foto_proyecto_url: foto_url
    }));
    toast('Proyecto creado. Agregale procesos.');
    showProjectForm(editingProjectKey);
    return;
  }

  // Edit existing project: update metadata fields on ALL its activities
  const proj = getProjects().find(p => p.key === editingProjectKey);
  if (!proj) { toast('Proyecto no encontrado', true); return; }
  const updates = { urgencia, foto_proyecto_url: foto_url };
  // Note: we don't propagate descripcion to activities (each activity has its own description).
  // But we DO update urgencia and foto_proyecto_url across all activities.
  for (const a of proj.actividades) {
    await sb.from('actividades_tablero').update(updates).eq('id', a.id);
    Object.assign(a, updates);
  }
  // Save updated project descripcion in sessionStorage so list view shows it
  // (we use first activity's description by default, which works fine)
  toast('Proyecto actualizado');
  await loadAll();
  showProjectsList();
}

async function confirmDeleteProject() {
  if (!editingProjectKey) return;
  const proj = getProjects().find(p => p.key === editingProjectKey);
  if (!proj) return;
  const n = proj.actividades.length;
  if (!confirm('Eliminar el proyecto "' + proj.descripcion + '" y sus ' + n + ' proceso(s)?')) return;
  for (const a of proj.actividades) {
    await sb.from('actividades_tablero').delete().eq('id', a.id);
  }
  sessionStorage.removeItem('proj-meta-' + editingProjectKey);
  await loadAll();
  toast('Proyecto eliminado');
  showProjectsList();
}

// ========== PROCESO FORM (modal) ==========
let editingProcesoId = null;

function showProcesoForm(procesoId) {
  editingProcesoId = procesoId;
  const proj = getProjects().find(p => p.key === editingProjectKey);
  const meta = proj || JSON.parse(sessionStorage.getItem('proj-meta-' + editingProjectKey) || 'null');
  const proceso = procesoId ? actividades.find(a => a.id === procesoId) : null;
  const isNew = !proceso;
  const tipo = proceso ? proceso.tipo : 'manual';

  const maqOpts = maquinas.map(m =>
    '<option value="' + m.id + '"' + (proceso && proceso.maquina_ideal_id === m.id ? ' selected' : '') + '>' + escapeHtml(m.nombre) + '</option>'
  ).join('');
  const opOpts = operarios.map(o =>
    '<option value="' + o.id + '"' + (proceso && proceso.operario_ideal_id === o.id ? ' selected' : '') + '>' + escapeHtml(o.nombre) + '</option>'
  ).join('');

  const supMaqIds = proceso ? (proceso.maquinas_suplentes_ids || []).map(x => parseInt(x)) : [];
  const supOpIds = proceso ? (proceso.operarios_suplentes_ids || []).map(x => parseInt(x)) : [];

  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'proc-modal';
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove() });
  const m = document.createElement('div'); m.className = 'md';

  let h = '<div class="md-t">' + (isNew ? 'Nuevo proceso' : 'Editar proceso') + '</div>';

  h += '<div class="ef">';
  h += '<div class="ef-l">Descripcion <span style="color:#A32D2D">*</span></div>';
  h += '<input type="text" class="ef-i" id="p-desc" value="' + escapeHtml(proceso ? proceso.descripcion : '') + '" placeholder="Ej. Torneado eje principal">';
  h += '</div>';

  h += '<div class="row">';
  h += '<div class="ef" style="flex:1">';
  h += '<div class="ef-l">Proceso (categoria) <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="p-proceso">';
  ['Torneado', 'Fresado', 'Agujereado', 'Electroerosion', 'Soldadura', 'Plegado', 'Corte', 'Otro'].forEach(p => {
    h += '<option value="' + p + '"' + (proceso && proceso.proceso === p ? ' selected' : '') + '>' + p + '</option>';
  });
  h += '</select>';
  h += '</div>';
  h += '<div class="ef" style="flex:1">';
  h += '<div class="ef-l">Duracion estimada (min) <span style="color:#A32D2D">*</span></div>';
  h += '<input type="number" class="ef-i" id="p-dur" value="' + (proceso ? proceso.duracion_estimada_min : '') + '" min="10" step="10" placeholder="Ej. 240">';
  h += '<div class="ef-help">Tiempo total que la maquina trabajara en esta tarea.</div>';
  h += '</div>';
  h += '</div>';

  h += '<div class="ef">';
  h += '<div class="ef-l">Tipo <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="p-tipo" onchange="toggleSetupField()">';
  h += '<option value="manual"' + (tipo === 'manual' ? ' selected' : '') + '>Manual (operario presente todo el tiempo)</option>';
  h += '<option value="automatica"' + (tipo === 'automatica' ? ' selected' : '') + '>Automatica (operario solo durante el setup)</option>';
  h += '</select>';
  h += '</div>';

  h += '<div class="ef" id="p-setup-wrap" style="' + (tipo === 'automatica' ? '' : 'display:none') + '">';
  h += '<div class="ef-l">Duracion del setup (min) <span style="color:#A32D2D">*</span></div>';
  h += '<input type="number" class="ef-i" id="p-setup" value="' + (proceso && proceso.duracion_operario_min ? proceso.duracion_operario_min : '') + '" min="0" step="5" placeholder="Ej. 30">';
  h += '<div class="ef-help">Tiempo que el operario esta atado a la maquina (programacion + carga de material).</div>';
  h += '</div>';

  h += '<div class="ef">';
  h += '<div class="ef-l">Maquina ideal <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="p-maq-ideal">' + maqOpts + '</select>';
  h += '</div>';

  h += '<div class="ef">';
  h += '<div class="ef-l">Maquinas suplentes</div>';
  h += '<div class="chip-wrap" id="chips-maq" onclick="document.getElementById(\'chip-add-maq\').focus()"></div>';
  h += '<div class="ef-help">Otras maquinas que pueden ejecutar este proceso si la ideal no esta disponible.</div>';
  h += '</div>';

  h += '<div class="ef">';
  h += '<div class="ef-l">Operario ideal <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="p-op-ideal">' + opOpts + '</select>';
  h += '</div>';

  h += '<div class="ef">';
  h += '<div class="ef-l">Operarios suplentes</div>';
  h += '<div class="chip-wrap" id="chips-op" onclick="document.getElementById(\'chip-add-op\').focus()"></div>';
  h += '</div>';

  h += '<div class="actions">';
  h += '<button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button>';
  h += '<button class="b b-p" onclick="saveProceso()">' + (isNew ? 'Agregar' : 'Guardar') + '</button>';
  h += '</div>';

  m.innerHTML = h;
  bd.appendChild(m);
  document.body.appendChild(bd);

  // Build chip widgets
  buildChips('chips-maq', maquinas, supMaqIds, 'maq');
  buildChips('chips-op', operarios, supOpIds, 'op');
}

function toggleSetupField() {
  const tipo = document.getElementById('p-tipo').value;
  document.getElementById('p-setup-wrap').style.display = tipo === 'automatica' ? '' : 'none';
}

// Multi-select chips: for maqs / ops suplentes
const chipState = { maq: new Set(), op: new Set() };

function buildChips(containerId, items, selectedIds, kind) {
  chipState[kind] = new Set(selectedIds);
  renderChips(containerId, items, kind);
}

function renderChips(containerId, items, kind) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  let h = '';
  chipState[kind].forEach(id => {
    const item = items.find(x => x.id === id);
    if (!item) return;
    h += '<span class="chip">' + escapeHtml(item.nombre) + ' <span class="chip-x" onclick="removeChip(\'' + kind + '\',' + id + ')">&times;</span></span>';
  });
  // Datalist + input
  const remaining = items.filter(x => !chipState[kind].has(x.id));
  h += '<input type="text" class="chip-add" id="chip-add-' + kind + '" placeholder="' + (chipState[kind].size === 0 ? 'Agregar...' : '') + '" list="datalist-' + kind + '" onchange="addChipFromInput(\'' + kind + '\')">';
  h += '<datalist id="datalist-' + kind + '">';
  remaining.forEach(it => { h += '<option value="' + escapeHtml(it.nombre) + '">'; });
  h += '</datalist>';
  wrap.innerHTML = h;
}

function addChipFromInput(kind) {
  const input = document.getElementById('chip-add-' + kind);
  const val = input.value.trim();
  if (!val) return;
  const items = kind === 'maq' ? maquinas : operarios;
  const item = items.find(x => x.nombre.toLowerCase() === val.toLowerCase());
  if (!item) {
    toast('No se encontro: ' + val, true);
    input.value = '';
    return;
  }
  if (chipState[kind].has(item.id)) {
    input.value = '';
    return;
  }
  chipState[kind].add(item.id);
  input.value = '';
  renderChips(kind === 'maq' ? 'chips-maq' : 'chips-op', items, kind);
  document.getElementById('chip-add-' + kind).focus();
}

function removeChip(kind, id) {
  chipState[kind].delete(id);
  const items = kind === 'maq' ? maquinas : operarios;
  renderChips(kind === 'maq' ? 'chips-maq' : 'chips-op', items, kind);
}

async function saveProceso() {
  const desc = document.getElementById('p-desc').value.trim();
  const proceso_cat = document.getElementById('p-proceso').value;
  const dur = parseInt(document.getElementById('p-dur').value);
  const tipo = document.getElementById('p-tipo').value;
  const maqIdeal = parseInt(document.getElementById('p-maq-ideal').value);
  const opIdeal = parseInt(document.getElementById('p-op-ideal').value);
  let setup = null;
  if (tipo === 'automatica') {
    const v = document.getElementById('p-setup').value.trim();
    if (!v) { toast('Para automaticas, ingresa la duracion del setup', true); return; }
    setup = parseInt(v);
  }
  if (!desc) { toast('Descripcion requerida', true); return; }
  if (!dur || dur < 10) { toast('Duracion estimada minima: 10 min', true); return; }
  if (!maqIdeal) { toast('Elegi maquina ideal', true); return; }
  if (!opIdeal) { toast('Elegi operario ideal', true); return; }

  // Get project metadata (from existing project or sessionStorage)
  const proj = getProjects().find(p => p.key === editingProjectKey);
  let cliente_id, pedido_nro, urgencia, foto_proyecto_url;
  if (proj) {
    cliente_id = proj.cliente_id;
    pedido_nro = proj.pedido_nro;
    urgencia = proj.urgencia;
    foto_proyecto_url = proj.foto_proyecto_url;
  } else {
    // First proceso for a brand-new project
    const meta = JSON.parse(sessionStorage.getItem('proj-meta-' + editingProjectKey) || '{}');
    [cliente_id, pedido_nro] = editingProjectKey.split('|');
    cliente_id = parseInt(cliente_id);
    urgencia = meta.urgencia || 'media';
    foto_proyecto_url = meta.foto_proyecto_url || null;
  }

  const supMaqs = [...chipState.maq];
  const supOps = [...chipState.op];

  const payload = {
    descripcion: desc,
    proceso: proceso_cat,
    duracion_estimada_min: dur,
    duracion_margen_min: 0,
    duracion_operario_min: setup,
    tipo: tipo,
    maquina_ideal_id: maqIdeal,
    maquinas_suplentes_ids: supMaqs.length ? supMaqs : null,
    operario_ideal_id: opIdeal,
    operarios_suplentes_ids: supOps.length ? supOps : null,
    cliente_id: cliente_id,
    pedido_nro: pedido_nro,
    urgencia: urgencia,
    foto_proyecto_url: foto_proyecto_url,
    estado: 'sin_planificar',
    fecha: '1900-01-01',
    hora_inicio: '06:00:00'
  };

  if (editingProcesoId) {
    await sb.from('actividades_tablero').update(payload).eq('id', editingProcesoId);
    toast('Proceso actualizado');
  } else {
    await sb.from('actividades_tablero').insert(payload);
    toast('Proceso agregado');
    // Clear sessionStorage meta if it existed (now the project has a real row)
    sessionStorage.removeItem('proj-meta-' + editingProjectKey);
  }
  await loadAll();
  document.getElementById('proc-modal').remove();
  showProjectForm(editingProjectKey);
}

async function confirmDeleteProceso(procesoId) {
  const proceso = actividades.find(a => a.id === procesoId);
  if (!proceso) return;
  if (!confirm('Eliminar el proceso "' + proceso.descripcion + '"?')) return;
  await sb.from('actividades_tablero').delete().eq('id', procesoId);
  await loadAll();
  toast('Proceso eliminado');
  showProjectForm(editingProjectKey);
}

// ========== PHOTO UPLOAD ==========
const PHOTO_BUCKET = 'proyecto-fotos';

function setupPhotoPaste() {
  // Hook a single-time listener for paste events while the form is open.
  // Pastes anywhere on the page → uploads the image.
  if (window._photoPasteHookSet) return;
  window._photoPasteHookSet = true;
  document.addEventListener('paste', async (e) => {
    const wrap = document.getElementById('photo-wrap');
    if (!wrap) return;  // not on form
    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
    for (const item of items) {
      if (item.type.indexOf('image') !== -1) {
        e.preventDefault();
        const file = item.getAsFile();
        await uploadPhotoFile(file);
        return;
      }
    }
  });
}

async function onPhotoFile(event) {
  const file = event.target.files[0];
  if (file) await uploadPhotoFile(file);
  event.target.value = '';
}

async function uploadPhotoFile(file) {
  const wrap = document.getElementById('photo-wrap');
  if (!wrap) return;
  wrap.innerHTML = '<div class="photo-loading">Subiendo...</div>';
  try {
    const ext = (file.name && file.name.split('.').pop()) || (file.type.split('/')[1]) || 'png';
    const filename = 'proj-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8) + '.' + ext;
    const { error } = await sb.storage.from(PHOTO_BUCKET).upload(filename, file, { contentType: file.type });
    if (error) throw error;
    const { data } = sb.storage.from(PHOTO_BUCKET).getPublicUrl(filename);
    const url = data.publicUrl;
    document.getElementById('photo-url').value = url;
    wrap.innerHTML = '<img src="' + url + '"><div class="photo-x" onclick="event.stopPropagation();clearPhoto()">&times;</div>';
    toast('Foto subida');
  } catch (err) {
    console.error(err);
    toast('Error al subir foto: ' + (err.message || err), true);
    wrap.innerHTML = '<div class="photo-empty">Error. Click o pega para reintentar</div>';
  }
}

function clearPhoto() {
  document.getElementById('photo-url').value = '';
  document.getElementById('photo-wrap').innerHTML = '<div class="photo-empty">Click o pega para subir</div>';
}

// ========== CLIENTES VIEW ==========
function showClientesView() {
  const main = document.getElementById('main');
  let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  h += '<h2 style="font-size:16px;font-weight:600">Clientes</h2>';
  h += '<button class="b b-p" onclick="showClienteForm(null)">+ Nuevo cliente</button>';
  h += '</div>';
  if (clientes.length === 0) {
    h += '<div class="list-empty">No hay clientes cargados todavia.</div>';
  } else {
    clientes.forEach(c => {
      const projCount = getProjects().filter(p => p.cliente_id === c.id).length;
      h += '<div class="proj-card">';
      h += '<div class="proj-card-img-empty">' + escapeHtml(c.nombre.charAt(0).toUpperCase()) + '</div>';
      h += '<div class="proj-card-body">';
      h += '<div class="proj-card-t">' + escapeHtml(c.nombre) + '</div>';
      h += '<div class="proj-card-s">CUIT: ' + escapeHtml(c.cuit || '—') + ' &middot; ' + projCount + ' proyecto(s)</div>';
      h += '</div>';
      h += '<div class="proc-actions">';
      h += '<button class="b b-icon" onclick="showClienteForm(' + c.id + ')">Editar</button>';
      if (projCount === 0) {
        h += '<button class="b b-icon b-d" onclick="confirmDeleteCliente(' + c.id + ')">Eliminar</button>';
      }
      h += '</div>';
      h += '</div>';
    });
  }
  h += '<div class="actions"><button class="b" onclick="showProjectsList()">Volver al listado de proyectos</button></div>';
  main.innerHTML = h;
}

function showClienteForm(clienteId) {
  const cliente = clienteId ? clientes.find(c => c.id === clienteId) : null;
  const isNew = !cliente;

  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'cli-modal';
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove() });
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '480px';

  let h = '<div class="md-t">' + (isNew ? 'Nuevo cliente' : 'Editar cliente') + '</div>';
  h += '<div class="ef">';
  h += '<div class="ef-l">Nombre <span style="color:#A32D2D">*</span></div>';
  h += '<input type="text" class="ef-i" id="c-nombre" value="' + escapeHtml(cliente ? cliente.nombre : '') + '" placeholder="Ej. Gente de la Pampa">';
  h += '</div>';
  h += '<div class="ef">';
  h += '<div class="ef-l">CUIT <span style="color:#A32D2D">*</span></div>';
  h += '<input type="text" class="ef-i" id="c-cuit" value="' + escapeHtml(cliente && cliente.cuit ? cliente.cuit : '') + '" placeholder="11 digitos sin guiones" maxlength="11">';
  h += '<div class="ef-help">Ej: 30712345678 (11 digitos exactos, sin guiones).</div>';
  h += '<div class="ef-err" id="err-cuit" style="display:none"></div>';
  h += '</div>';
  h += '<div class="actions">';
  h += '<button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button>';
  h += '<button class="b b-p" onclick="saveCliente(' + (clienteId || 'null') + ')">' + (isNew ? 'Crear' : 'Guardar') + '</button>';
  h += '</div>';

  m.innerHTML = h;
  bd.appendChild(m);
  document.body.appendChild(bd);
}

async function saveCliente(clienteId) {
  const nombre = document.getElementById('c-nombre').value.trim();
  const cuit = document.getElementById('c-cuit').value.trim();
  const errCuit = document.getElementById('err-cuit');
  errCuit.style.display = 'none';
  if (!nombre) { toast('Ingresa el nombre', true); return; }
  if (!cuit) { errCuit.textContent = 'CUIT requerido'; errCuit.style.display = 'block'; return; }
  if (!validCuit(cuit)) { errCuit.textContent = 'CUIT debe tener exactamente 11 digitos sin guiones'; errCuit.style.display = 'block'; return; }
  // Check uniqueness
  const dup = clientes.find(c => c.cuit === cuit && c.id !== clienteId);
  if (dup) { errCuit.textContent = 'Ya existe un cliente con ese CUIT: ' + dup.nombre; errCuit.style.display = 'block'; return; }

  if (clienteId) {
    await sb.from('clientes').update({ nombre, cuit }).eq('id', clienteId);
    toast('Cliente actualizado');
  } else {
    const { error } = await sb.from('clientes').insert({ nombre, cuit });
    if (error) { toast('Error: ' + error.message, true); return; }
    toast('Cliente creado');
  }
  await loadAll();
  document.getElementById('cli-modal').remove();
  // If we were in a project form, refresh client dropdown by re-rendering
  if (editingProjectKey || document.querySelector('#f-cliente')) {
    if (editingProjectKey) showProjectForm(editingProjectKey);
    else if (document.querySelector('.form-t')) showProjectForm(null);
    else showClientesView();
  } else {
    showClientesView();
  }
}

async function confirmDeleteCliente(clienteId) {
  const cliente = clientes.find(c => c.id === clienteId);
  if (!cliente) return;
  if (!confirm('Eliminar cliente "' + cliente.nombre + '"?')) return;
  const { error } = await sb.from('clientes').delete().eq('id', clienteId);
  if (error) { toast('Error: ' + error.message, true); return; }
  await loadAll();
  toast('Cliente eliminado');
  showClientesView();
}

// ========== INIT ==========
async function init() {
  await loadAll();
  showProjectsList();
}
init();

</script>

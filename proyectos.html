      fecha_ingreso: _normDate(proj.fecha_ingreso),
      fecha_entrega: _normDate(proj.fecha_entrega),
      contacto_id: proj.contacto_id || null,
      observaciones_mail: proj.observaciones_mail || ''
    },
    fotosProj,
    // URLs de fotos agregadas durante esta edición (las marcamos al subirlas
    // para poder borrarlas del bucket si el usuario descarta).
    fotosNuevasUrls: new Set()
  };
}

// v64: Devuelve true si el form/galería tienen cambios respecto del snapshot.
// v66: comparaciones robustas (fechas normalizadas, HTML equivalente) y log
// del primer campo que difiere para debug en consola.
function _projectHasUnsavedChanges() {
  if (!_projectEditSnapshot) return false;
  const projId = _projectEditSnapshot.projectId;
  if (nav.view !== 'project' || nav.projectId !== projId) return false;
  const snap = _projectEditSnapshot.campos;
  const getVal = id => { const el = document.getElementById(id); return el ? el.value : null; };
  const descripcion = (getVal('f-desc') || '').trim();
  const urgencia = getVal('f-urg') || '';
  const pedido_nro = (getVal('f-pedido') || '').trim();
  const cliente_id_raw = getVal('f-cliente');
  // v66: si el cliente está bloqueado (estados Confirmado/Cerrado/Anulado), el
  // campo f-cliente no se renderiza. En ese caso, el cliente no puede haber
  // cambiado, así que usamos el valor del snapshot para no detectar falso cambio.
  const cliente_id = cliente_id_raw === null
    ? (snap.cliente_id || null)
    : (cliente_id_raw ? parseInt(cliente_id_raw) : null);
  const cliente_final = (getVal('f-clifinal') || '').trim();
  const fecha_ingreso = _normDate(getVal('f-fechaing') || '');
  const fecha_entrega = _normDate(getVal('f-fechaentrega') || '');
  const contactoSel = document.getElementById('f-contacto');
  const contacto_id = contactoSel && contactoSel.value && contactoSel.value !== '__nuevo__'
    ? parseInt(contactoSel.value) : null;
  let obsMail = '';
  try { obsMail = readRichEditor('f-obs-mail') || ''; } catch (e) { obsMail = ''; }
  // Helper para logear el primer diff
  const diff = (campo, dom, snapVal) => {
    console.log('[unsaved] campo "' + campo + '" cambió. DOM:', JSON.stringify(dom), 'snapshot:', JSON.stringify(snapVal));
    return true;
  };
  if (descripcion !== (snap.descripcion || '')) return diff('descripcion', descripcion, snap.descripcion);
  if (urgencia !== (snap.urgencia || '')) return diff('urgencia', urgencia, snap.urgencia);
  if (pedido_nro !== (snap.pedido_nro || '')) return diff('pedido_nro', pedido_nro, snap.pedido_nro);
  if (cliente_id !== (snap.cliente_id || null)) return diff('cliente_id', cliente_id, snap.cliente_id);
  if (cliente_final !== (snap.cliente_final || '')) return diff('cliente_final', cliente_final, snap.cliente_final);
  if (fecha_ingreso !== (snap.fecha_ingreso || '')) return diff('fecha_ingreso', fecha_ingreso, snap.fecha_ingreso);
  if (fecha_entrega !== (snap.fecha_entrega || '')) return diff('fecha_entrega', fecha_entrega, snap.fecha_entrega);
  if (contacto_id !== (snap.contacto_id || null)) return diff('contacto_id', contacto_id, snap.contacto_id);
  // observaciones_mail: comparar de forma equivalente para evitar falsos
  // positivos por la normalización HTML del editor rich text.
  if (!_htmlEquivalent(obsMail, snap.observaciones_mail || '')) {
    return diff('observaciones_mail', obsMail, snap.observaciones_mail);
  }
  // Comparar fotos (ids + orden)
  const actuales = getFotos('proyecto', projId);
  if (actuales.length !== _projectEditSnapshot.fotosProj.length) {
    return diff('fotos.length', actuales.length, _projectEditSnapshot.fotosProj.length);
  }
  for (let i = 0; i < actuales.length; i++) {
    const a = actuales[i];
    const s = _projectEditSnapshot.fotosProj[i];
    if (!s || a.id !== s.id || a.orden !== s.orden) {
      return diff('fotos[' + i + ']', { id: a.id, orden: a.orden }, s);
    }
  }
  return false;
}

// v64: Descarta los cambios revirtiendo lo modificado durante la edición.
// - Fotos nuevas: las elimina de la tabla `fotos` y del bucket de Storage.
// - Fotos eliminadas durante la edición: las re-inserta. NOTA: en v64 todavía
//   no implementamos el tracking de "eliminadas". Si el usuario eliminó una
//   foto durante la edición, ese cambio se mantiene (no se restaura). El
//   archivo del bucket sí queda hasta que limpiemos, pero la galería no la
//   muestra. Mejora futura: trackear eliminadas y restaurarlas.
// - Orden de fotos: lo restauramos al snapshot.
// - Campos: forzamos re-render desde la DB (los inputs vuelven a los valores
//   guardados).
async function _revertProjectChanges() {
  if (!_projectEditSnapshot) return;
  const projId = _projectEditSnapshot.projectId;
  showSpinner('Descartando cambios...');
  try {
    // 1. Eliminar fotos NUEVAS (las que se agregaron durante la edición)
    const fotosActuales = getFotos('proyecto', projId);
    const idsSnapshot = new Set(_projectEditSnapshot.fotosProj.map(f => f.id));
    const fotosNuevas = fotosActuales.filter(f => !idsSnapshot.has(f.id));
    for (const f of fotosNuevas) {
      try {
        // Borrar de la tabla
        await sb.from('fotos').delete().eq('id', f.id);
        // Borrar del bucket si la URL pertenece al bucket
        const path = _extractBucketPath(f.url);
        if (path) {
          await sb.storage.from(PHOTO_BUCKET).remove([path]);
        }
      } catch (e) {
        console.warn('No pude borrar foto nueva durante descarte:', f.url, e);
      }
    }
    // 2. Restaurar el orden de las fotos que existían en el snapshot.
    //    (Si el usuario las reordenó, las dejamos como estaban antes de editar.)
    for (const snap of _projectEditSnapshot.fotosProj) {
      try {
        await sb.from('fotos').update({ orden: snap.orden }).eq('id', snap.id);
      } catch (e) {
        console.warn('No pude restaurar orden de foto:', snap.id, e);
      }
    }
    // 3. Re-sincronizar foto_url del proyecto con la primera foto del snapshot
    const primeraFoto = _projectEditSnapshot.fotosProj.find(f => f.orden === 0);
    await _sincronizarFotoUrl('proyecto', projId, primeraFoto ? primeraFoto.url : null);
  } finally {
    hideSpinner();
  }
  // Limpiar snapshot para que al re-renderizar tome uno nuevo del estado fresco
  _projectEditSnapshot = null;
  await loadAll();
}

// v64: Extrae el path del archivo dentro del bucket a partir de la URL pública.
// La URL típica es:
//   https://<proj>.supabase.co/storage/v1/object/public/proyecto-fotos/<archivo>
function _extractBucketPath(url) {
  if (!url) return null;
  const marker = '/object/public/' + PHOTO_BUCKET + '/';
  const idx = url.indexOf(marker);
  if (idx < 0) return null;
  return url.substring(idx + marker.length);
}

// v63: Descartar cambios del form de proyecto. Como los campos viven en el DOM
// y se persisten al guardar, descartar = re-renderizar la vista para repintar
// con los datos actuales de la DB (los del cache `proyectos`). Si el cache
// estaba sucio porque hubo guardadas parciales (otras tabs), hacemos un loadAll
// para asegurar.
async function descartarCambiosProyecto() {
  if (!_projectHasUnsavedChanges()) {

    onConfirm: async () => {
      await _revertProjectChanges();

    }
  });
}

async function saveProjectMeta() {

  // v62: contacto_id (opcional, con warning si no se asigna)

  showSpinner('Guardando proyecto...');

  await sb.from('items').update({ cliente_id: nuevoClienteId, pedido_nro: pedidoNro }).eq('proyecto_id', proj.id);
  for (const it of proj.items) {

    }).eq('item_id', it.id);

  setTimeout(() => {

// ========== PROJECT STATE CHANGE MODAL ==========
// Reglas de transicion:
// - Proyectando -> Confirmado, Perdido (NO se puede ir directo a Cerrado/Anulado)
// - Confirmado -> Cerrado, Anulado, Perdido (cualquiera con pedido)
// - Cerrado -> ningun cambio (estado final)
// - Anulado -> ningun cambio (estado final)
// - Perdido -> Confirmado (si se reactivara)
// La regla "para llegar a Cerrado o Anulado, el proyecto tiene que estar
// actualmente en Confirmado" se implementa filtrando las opciones del select.
function _allowedNextStates(currentEstado) {
  if (currentEstado === 'Proyectando') return ['Proyectando', 'Confirmado', 'Perdido'];
  if (currentEstado === 'Confirmado') return ['Confirmado', 'Cerrado', 'Anulado', 'Perdido'];
  if (currentEstado === 'Cerrado') return ['Cerrado'];  // estado final
  if (currentEstado === 'Anulado') return ['Anulado'];  // estado final
  if (currentEstado === 'Perdido') return ['Perdido', 'Confirmado'];
  return PROJ_STATES.slice();
}

function showProjectStateModal(projectId) {
  const proj = getProject(projectId);
  if (!proj) return;
  const allowedStates = _allowedNextStates(proj.estado);
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'state-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '500px';
  let h = '<div class="md-t">Cambiar estado del proyecto</div>';
  h += '<div style="font-size:12px;color:#5F5E5A;margin-bottom:12px">Estado actual: <b>' + proj.estado + (proj.estado === 'Cerrado' && proj.sub_estado_cerrado ? ' / ' + proj.sub_estado_cerrado : '') + '</b></div>';
  if (allowedStates.length === 1) {
    h += '<div style="background:#F5F3EC;padding:10px;border-radius:5px;font-size:12px;color:#5F5E5A;margin-bottom:14px">Este estado es final, no admite cambios.</div>';
    h += '<div class="actions"><button class="b" onclick="this.closest(\'.mo\').remove()">Cerrar</button></div>';
    m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);
    return;
  }
  h += '<div class="ef"><div class="ef-l">Nuevo estado <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="ps-estado" onchange="onProjStateChange(' + projectId + ')">';
  allowedStates.forEach(st => {
    h += '<option value="' + st + '"' + (st === proj.estado ? ' selected' : '') + '>' + st + '</option>';
  });
  h += '</select></div>';
  h += '<div class="ef" id="ps-sub-wrap" style="display:none">';
  h += '<div class="ef-l">Sub-estado <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="ps-sub">';
  PROJ_STATES_SUB_CERRADO.forEach(s => {
    h += '<option value="' + s + '"' + (s === proj.sub_estado_cerrado ? ' selected' : '') + '>' + s + '</option>';
  });
  h += '</select></div>';
  h += '<div class="ef" id="ps-obs-wrap" style="display:none">';
  h += '<div class="ef-l">Observaciones de anulacion <span style="color:#A32D2D">*</span></div>';
  h += '<textarea class="ef-i" id="ps-obs" rows="3" placeholder="Ej. Cliente se arrepintio, se cobra parcial">' + escapeHtml(proj.observaciones_anulacion || '') + '</textarea></div>';
  // Campo Nº pedido inline. Solo se muestra cuando: (a) el estado nuevo
  // requiere pedido (Confirmado/Cerrado/Anulado), Y (b) el proyecto NO tiene
  // ya un pedido cargado. Asi evitamos pisar valores existentes.
  h += '<div class="ef" id="ps-pedido-wrap" style="display:none">';
  h += '<div class="ef-l">Numero de pedido</div>';
  h += '<input type="text" class="ef-i" id="ps-pedido" placeholder="Si lo dejas vacio, queda con advertencia roja hasta cargarlo">';
  h += '</div>';
  h += '<div class="actions">';
  h += '<button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button>';
  h += '<button class="b b-p" onclick="saveProjectState(' + projectId + ')">Aplicar</button></div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);
  // Disparar onChange inicial para mostrar/ocultar campos segun el estado seleccionado
  onProjStateChange(projectId);
}

function onProjStateChange(projectId) {
  const proj = getProject(projectId);
  const v = document.getElementById('ps-estado').value;
  document.getElementById('ps-sub-wrap').style.display = (v === 'Cerrado') ? 'block' : 'none';
  document.getElementById('ps-obs-wrap').style.display = (v === 'Anulado') ? 'block' : 'none';
  // Nº pedido: solo si el estado nuevo lo requiere y no hay pedido cargado
  const needsPedido = PROJ_STATES_REQUIRE_PEDIDO.has(v) && !proj.pedido_nro;
  document.getElementById('ps-pedido-wrap').style.display = needsPedido ? 'block' : 'none';
}

async function saveProjectState(projectId) {
  const proj = getProject(projectId);
  if (!proj) return;
  const newEstado = document.getElementById('ps-estado').value;
  const newSub = newEstado === 'Cerrado' ? document.getElementById('ps-sub').value : null;
  const newObs = newEstado === 'Anulado' ? document.getElementById('ps-obs').value.trim() : null;
  if (newEstado === 'Anulado' && !newObs) { toast('Las observaciones son obligatorias al anular', true); return; }

  // Pedido inline: tomar lo escrito si el campo se mostro
  const pedidoEl = document.getElementById('ps-pedido');
  const pedidoNew = (pedidoEl && pedidoEl.style.display !== 'none' && pedidoEl.value.trim()) ? pedidoEl.value.trim() : null;
  // Verificar si el wrap del pedido esta visible (puede pasar que el input
  // exista pero el wrap este oculto si el proyecto ya tenia pedido).
  const pedidoWrap = document.getElementById('ps-pedido-wrap');
  const pedidoVisible = pedidoWrap && pedidoWrap.style.display === 'block';

  // Si el estado nuevo requiere pedido y el proyecto NO tiene, y el campo
  // estaba visible y vacio, mostrar advertencia (no bloqueante).
  if (PROJ_STATES_REQUIRE_PEDIDO.has(newEstado) && !proj.pedido_nro && pedidoVisible && !pedidoNew) {
    confirmModal({
      titulo: 'Sin número de pedido',
      mensaje: 'Vas a dejar el proyecto sin número de pedido. Va a aparecer una advertencia roja hasta que lo cargues. ¿Continuar?',
      textoConfirmar: 'Continuar',
      peligroso: false,
      onConfirm: async () => {
        const payload2 = {
          estado: newEstado, sub_estado_cerrado: newSub, observaciones_anulacion: newObs
        };
        if (pedidoNew) payload2.pedido_nro = pedidoNew;
        await sb.from('proyectos').update(payload2).eq('id', projectId);
        await loadAll();
        document.getElementById('state-modal').remove();
        toast('Estado actualizado');
        render();
      }
    });
    return;
  }

  const payload = {
    estado: newEstado, sub_estado_cerrado: newSub, observaciones_anulacion: newObs
  };
  if (pedidoNew) payload.pedido_nro = pedidoNew;

  await sb.from('proyectos').update(payload).eq('id', projectId);
  await loadAll();
  document.getElementById('state-modal').remove();
  toast('Estado actualizado');
  render();
}

// ========== ITEM FORM ==========
// Estado en memoria del form de item. Necesario porque cuando se abre un

// Render principal del modal del item. Se separa para poder re-renderizar
// cuando se modifica la lista de ubicaciones sin perder los datos del form.
function _renderItemModal(item, proj) {
  const captured = _itCaptureFormValues();

    foto_url: item ? (item.foto_url || '') : '',

function _itCaptureFormValues() {
  const desc = document.getElementById('i-desc');
  if (!desc) return null;
  const matVal = document.getElementById('i-material-value');
  const matInp = document.getElementById('i-material-input');
  return {

function _itUbicacionesListHtml() {

    return '<div style="font-size:11px;color:#888;font-style:italic;padding:6px 0">Sin equipos compatibles asignados.</div>';
  }
  const importedFromMatriz = itFormState.importedFromMatriz;
  let h = '';
  itFormState.ubicacionesPendientes.forEach((u, idx) => {
    h += '<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#F5F3EC;border:1px solid #C8C6BE;border-radius:5px;margin-bottom:5px;font-size:12px">';

      h += '<button class="b b-icon b-d" onclick="itQuitarUbicacion(' + idx + ')" title="Quitar esta ubicación" style="padding:2px 8px;font-size:11px">×</button>';

function itQuitarUbicacion(idx) {
  if (!itFormState) return;
  itFormState.ubicacionesPendientes.splice(idx, 1);

  if (list) list.innerHTML = _itUbicacionesListHtml();

function itCargarMaterial(initialName) {

}

// ----- Modal "Asignar compatibilidad" para item -----
// Igual al de producto matriz. Solo cambia el destino: itFormState en lugar de pmFormState.
let itCompatState = null;

function itAsignarCompatibilidad() {
  // Pre-cargar cliente del proyecto. Tomi pidio: por defecto filtrar por
  // cliente del proyecto, con checkbox "Habilitar todos los clientes".
  const proj = getProject(nav.projectId);
  itCompatState = {
    clienteId: proj ? proj.cliente_id : null,
    sectorId: null, equipoId: null, conjuntoId: null, subconjuntoId: null,
    habilitarTodos: false
  };
  _itRenderCompatModal();
}

function _itRenderCompatModal() {
  const existing = document.getElementById('it-compat-modal');
  if (existing) existing.remove();
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'it-compat-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '520px';
  m.style.zIndex = '1100';
  const proj = getProject(nav.projectId);

  let h = '<div class="md-t">Asignar compatibilidad</div>';
  h += '<div style="font-size:11px;color:#5F5E5A;margin-bottom:10px">Definí la ruta donde el item se utiliza. Por defecto se filtra por el cliente del proyecto (' + escapeHtml(proj ? clN(proj.cliente_id) : '?') + ').</div>';
  // Checkbox "Habilitar todos los clientes"
  h += '<div class="ef" style="margin-bottom:10px"><label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">';
  h += '<input type="checkbox" id="it-compat-todos"' + (itCompatState.habilitarTodos ? ' checked' : '') + ' onchange="itCompatToggleTodos()"> Habilitar todos los clientes';
  h += '</label></div>';

  // Cliente picker (deshabilitado si no es habilitarTodos)
  const cliV = itCompatState.clienteId;
  const cliLbl = cliV ? clN(cliV) : '';
  h += '<div class="ef"><div class="ef-l">Cliente <span style="color:#A32D2D">*</span></div>';
  h += renderPicker({
    id: 'itc-cliente',
    value: cliV || '',
    valueLabel: cliLbl,
    placeholder: 'Buscar cliente...',
    disabled: !itCompatState.habilitarTodos,
    options: clientes.filter(c => c.activo !== false || c.id === cliV).map(c => ({ id: c.id, label: c.nombre, sublabel: c.codigo || '' })),
    onSelectFnName: 'itcOnCliente'
  });
  h += '</div>';

  // Sector picker
  const secV = itCompatState.sectorId;
  const secLbl = secV ? (sectores.find(x => x.id === secV) || {}).nombre || '' : '';
  h += '<div class="ef"><div class="ef-l">Sector</div>';
  h += renderPicker({
    id: 'itc-sector',
    value: secV || '',
    valueLabel: secLbl,
    placeholder: cliV ? 'Buscar sector o cargar nuevo...' : 'Primero elegí cliente',
    disabled: !cliV,
    options: cliV ? sectoresParaCliente(cliV).map(s => ({ id: s.id, label: s.nombre })) : [],
    onSelectFnName: 'itcOnSector',
    onCreateLabel: cliV ? '+ Cargar nuevo sector' : null,
    onCreateFnName: 'itcCargarSector'
  });
  h += '</div>';

  // Equipo
  const eqV = itCompatState.equipoId;
  const eqLbl = eqV ? (equipos.find(x => x.id === eqV) || {}).nombre || '' : '';
  h += '<div class="ef"><div class="ef-l">Equipo</div>';
  h += renderPicker({
    id: 'itc-equipo',
    value: eqV || '',
    valueLabel: eqLbl,
    placeholder: secV ? 'Buscar equipo o cargar nuevo...' : 'Primero elegí sector',
    disabled: !secV,
    options: secV ? equiposParaSector(secV).map(e => ({ id: e.id, label: e.nombre, sublabel: e.codigo_cliente || '' })) : [],
    onSelectFnName: 'itcOnEquipo',
    onCreateLabel: secV ? '+ Cargar nuevo equipo' : null,
    onCreateFnName: 'itcCargarEquipo'
  });
  h += '</div>';

  // Conjunto
  const conV = itCompatState.conjuntoId;
  const conLbl = conV ? (conjuntos.find(x => x.id === conV) || {}).nombre || '' : '';
  h += '<div class="ef"><div class="ef-l">Conjunto</div>';
  h += renderPicker({
    id: 'itc-conjunto',
    value: conV || '',
    valueLabel: conLbl,
    placeholder: eqV ? 'Buscar conjunto o cargar nuevo...' : 'Primero elegí equipo',
    disabled: !eqV,
    options: eqV && cliV ? conjuntosParaCliente(cliV).map(c => ({ id: c.id, label: c.nombre })) : [],
    onSelectFnName: 'itcOnConjunto',
    onCreateLabel: eqV ? '+ Cargar nuevo conjunto' : null,
    onCreateFnName: 'itcCargarConjunto'
  });
  h += '</div>';

  // Subconjunto
  const subV = itCompatState.subconjuntoId;
  const subLbl = subV ? (subconjuntos.find(x => x.id === subV) || {}).nombre || '' : '';
  h += '<div class="ef"><div class="ef-l">Subconjunto</div>';
  h += renderPicker({
    id: 'itc-subconjunto',
    value: subV || '',
    valueLabel: subLbl,
    placeholder: conV ? 'Buscar subconjunto o cargar nuevo...' : 'Solo si hay conjunto',
    disabled: !conV,
    options: conV && cliV ? subconjuntosParaCliente(cliV).map(s => ({ id: s.id, label: s.nombre })) : [],
    onSelectFnName: 'itcOnSubconjunto',

    onCreateFnName: 'itcCargarSubconjunto'

  h += '<button class="b" onclick="document.getElementById(\'it-compat-modal\').remove()">Cancelar</button>';
  h += '<button class="b b-p" onclick="itGuardarCompatibilidad()">Guardar compatibilidad</button>';
  h += '</div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);

function itCompatToggleTodos() {
  const cb = document.getElementById('it-compat-todos');
  if (!cb) return;
  itCompatState.habilitarTodos = cb.checked;
  if (!cb.checked) {
    // Volver a fijar al cliente del proyecto
    const proj = getProject(nav.projectId);
    itCompatState.clienteId = proj ? proj.cliente_id : null;
    itCompatState.sectorId = null;
    itCompatState.equipoId = null;
    itCompatState.conjuntoId = null;
    itCompatState.subconjuntoId = null;
  }
  _itRenderCompatModal();
}

function itcCargarEquipo(initial) { showCargarEquipo(initial, itCompatState.sectorId, 'itc-equipo'); }
function itcCargarConjunto(initial) { showCargarConjunto(initial, itCompatState.clienteId, 'itc-conjunto'); }

// Helper: cuando se carga un nuevo X desde el modal de compat de item, sync state.
// Lo agregamos a la cadena existente de _pmcSyncStateAfterLoad.
function _itcSyncStateAfterLoad(pickerId, newId) {
  if (!itCompatState) return;
  if (pickerId === 'itc-sector') itCompatState.sectorId = newId;
  else if (pickerId === 'itc-equipo') itCompatState.equipoId = newId;
  else if (pickerId === 'itc-conjunto') itCompatState.conjuntoId = newId;
  else if (pickerId === 'itc-subconjunto') itCompatState.subconjuntoId = newId;
  if (pickerId.startsWith('itc-')) _itRenderCompatModal();
}

function itGuardarCompatibilidad() {
  if (!itCompatState.clienteId) {
    toast('Cliente es obligatorio', true);
    return;
  }
  if (!itFormState) return;
  const dup = itFormState.ubicacionesPendientes.find(u =>
    u.cliente_id === itCompatState.clienteId &&
    u.sector_id === itCompatState.sectorId &&
    u.equipo_id === itCompatState.equipoId &&
    u.conjunto_id === itCompatState.conjuntoId &&
    u.subconjunto_id === itCompatState.subconjuntoId
  );
  if (dup) { toast('Ya está asignada esa ruta', true); return; }
  itFormState.ubicacionesPendientes.push({
    cliente_id: itCompatState.clienteId,
    sector_id: itCompatState.sectorId,
    equipo_id: itCompatState.equipoId,
    conjunto_id: itCompatState.conjuntoId,
    subconjunto_id: itCompatState.subconjuntoId
  });
  document.getElementById('it-compat-modal').remove();
  const list = document.getElementById('it-ubicaciones-list');
  if (list) list.innerHTML = _itUbicacionesListHtml();
  toast('Compatibilidad asignada');
}

function onItemStateChange() {
  const v = document.getElementById('i-estado').value;
  document.getElementById('i-obs-wrap').style.display = (v === 'Anulado') ? 'block' : 'none';
}

async function saveItem(itemId) {
  const proj = getProject(nav.projectId);
  if (!proj) return;
  const desc = document.getElementById('i-desc').value.trim();
  const cant = parseInt(document.getElementById('i-cant').value) || 1;
  const foto = document.getElementById('photo-url-item').value.trim() || null;
  const codigoClienteEl = document.getElementById('i-cod-cli');
  const codigo_cliente = codigoClienteEl ? (codigoClienteEl.value.trim() || null) : null;
  const matValEl = document.getElementById('i-material-value');
  const material_id = matValEl && matValEl.value ? parseInt(matValEl.value) : null;
  const presentacion = document.getElementById('i-pres').value.trim() || null;
  const fechaFin = document.getElementById('i-fechafin').value || null;
  if (!desc) { toast('Descripcion requerida', true); return; }
  let estado = 'Espera MP';
  let obs = null;
  const estadoEl = document.getElementById('i-estado');
  if (estadoEl) {
    estado = estadoEl.value;
    if (estado === 'Anulado') {
      obs = document.getElementById('i-obs').value.trim();
      if (!obs) { toast('Las observaciones son obligatorias al anular', true); return; }
    }
  }
  const payload = {
    descripcion: desc, cantidad: cant, foto_url: foto,
    material_id, codigo_cliente,
    presentacion_mat_prima: presentacion, fecha_fin_estipulada: fechaFin,
    estado, observaciones_anulacion: obs
  };

  let savedItemId = itemId;
  if (itemId) {
    await sb.from('items').update(payload).eq('id', itemId);
    const itemActs = actividades.filter(a => a.item_id === itemId && !a.proceso_eliminado);
    for (const a of itemActs) {
      await sb.from('actividades_tablero').update({
        descripcion: desc + ' - ' + (a.proceso || ''),
        foto_url: foto
      }).eq('id', a.id);
    }
    toast('Item actualizado');
  } else {
    payload.proyecto_id = proj.id;
    payload.cliente_id = proj.cliente_id;
    payload.pedido_nro = proj.pedido_nro;
    const { data, error } = await sb.from('items').insert(payload).select().single();
    if (error) { toast('Error: ' + error.message, true); return; }
    savedItemId = data.id;
    toast('Item agregado');
  }

  // Sincronizar ubicaciones (solo si no es importado de matriz, o sea, editable)
  if (!itFormState.importedFromMatriz) {
    await sb.from('items_ubicaciones').delete().eq('item_id', savedItemId);
    if (itFormState.ubicacionesPendientes && itFormState.ubicacionesPendientes.length > 0) {
      const inserts = itFormState.ubicacionesPendientes.map(u => ({
        item_id: savedItemId,
        cliente_id: u.cliente_id,
        sector_id: u.sector_id,
        equipo_id: u.equipo_id,
        conjunto_id: u.conjunto_id,
        subconjunto_id: u.subconjunto_id
      }));
      await sb.from('items_ubicaciones').insert(inserts);
    }
  }

  await loadAll();
  document.getElementById('item-modal').remove();
  itFormState = null;
  render();
}

// =============================================================================
// "+ Desde Matriz": importar producto matriz al proyecto como item nuevo.
// =============================================================================
// Modal con lista de productos matriz filtrados por cliente del proyecto.
// Checkbox "Habilitar todos los clientes" para mostrar todos.
// Click en producto -> copia el producto al proyecto como item nuevo,
// incluyendo descripcion, codigo del cliente, material, presentacion, foto,
// ubicaciones y procesos. Usa imported_from_matriz_id para marcar el origen.

// Estado del modal "+ Agregar desde Matriz". Tiene los mismos filtros que la
// pagina de Matriz, mas dos campos de modo:
//   - modo: 'project' | 'newProject'
//   - clienteProjId: cliente del proyecto (para pre-llenar filtros)
//
// Los filtros del modal son INDEPENDIENTES de los de la pagina de Matriz.
let agregarDesdeMatrizState = null;

function showAgregarDesdeMatriz(opts) {
  // opts es opcional. Si no viene, asume modo 'project' usando nav.projectId.
  let cliId = null;
  let modo = 'project';
  if (opts && opts.modo === 'newProject') {
    modo = 'newProject';
    cliId = opts.clienteProjId;
  } else {
    const proj = getProject(nav.projectId);
    if (!proj) return;
    cliId = proj.cliente_id;
  }
  if (!cliId) { toast('Falta cliente del proyecto', true); return; }

  // Pre-llenar filtros: cliente del proyecto + Genericos por default
  agregarDesdeMatrizState = {
    modo: modo,
    clienteProjId: cliId,
    filters: {
      search: '',
      codigos: '',
      clienteIds: [cliId, 'GENERICO'],
      sectorIds: [],
      equipoIds: [],
      conjuntoIds: [],
      subconjuntoIds: []
    },
    sort: { by: 'descripcion', dir: 'asc' }

// Set de nodos expandidos en el modal "Agregar desde Matriz". Keys:
//   "con:N", "sub:N" (no se expanden productos, son hojas).
// Productos genéricos / productos sueltos del cliente no necesitan expansión
// porque son hojas.
let afmExpanded = new Set();

function afmToggleExpand(key) {
  if (afmExpanded.has(key)) afmExpanded.delete(key);
  else afmExpanded.add(key);
  _afmRerenderList();

// Genera el HTML del cuerpo del modal: vista anidada Conjunto > Subconjunto > Producto.
// No incluye clientes / sectores / equipos. La selección de cliente viene de los filtros.
//
// Estructura visual:
//   📦 [Conjunto X]         "Importar todo" →  expandido:
//      🔧 [Subconjunto A]   "Importar todo" →  expandido:
//          📦 producto P1   "Importar"
//          📦 producto P2   "Importar"
//      📦 producto directo del conjunto (sin subconjunto)
//   📦 Productos sueltos    (productos cuya ubicación termina antes de un conjunto, o sin ubicación)
function _afmListaHtml() {
  const state = agregarDesdeMatrizState;
  if (!state) return '';
  const f = state.filters;

  // Determinar clientes de interes (de los filtros). Si no hay filtro, todos.
  const cliFilter = f.clienteIds || [];
  const includesGenerico = cliFilter.includes('GENERICO');
  const numericCli = new Set(cliFilter.filter(x => x !== 'GENERICO').map(x => parseInt(x)));
  const usarTodosCli = cliFilter.length === 0;

  // 1. Conjuntos: filtrar por cliente.
  let conjuntosFiltrados = conjuntos.slice();
  if (!usarTodosCli) {
    conjuntosFiltrados = conjuntosFiltrados.filter(c => numericCli.has(c.cliente_id));
  }
  // Filtrar por search (sobre el nombre del conjunto, sus subconjuntos, o productos)
  if (f.search && f.search.trim()) {
    const q = f.search.trim().toLowerCase();
    conjuntosFiltrados = conjuntosFiltrados.filter(c => {
      // Match directo en nombre del conjunto
      if ((c.nombre || '').toLowerCase().includes(q)) return true;
      // Match en algun subconjunto
      const subRels = subconjuntosConjuntos.filter(sc => sc.conjunto_id === c.id);
      for (const sr of subRels) {
        const sub = subconjuntos.find(s => s.id === sr.subconjunto_id);
        if (sub && (sub.nombre || '').toLowerCase().includes(q)) return true;
      }
      // Match en algun producto del conjunto (directo o via subconjunto)
      const exp = _expandirConjunto(c.id, 1);
      return exp.productos.some(({ prodId }) => {
        const p = productosMatriz.find(x => x.id === prodId);
        return p && (p.descripcion || '').toLowerCase().includes(q);
      });
    });
  }
  conjuntosFiltrados.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));

  // 2. Productos sueltos (del cliente, NO en conjunto): para mostrar al final
  // como una lista plana. Estos son productos cuya ubicacion no apunta a un
  // conjunto, o que no tienen ubicacion (genericos).
  let prodsSueltosCandidatos = afmGetFilteredProductos();
  // Quitar productos que ya aparecen en algún conjunto/subconjunto (para no duplicar)
  const productosEnConjuntos = new Set();
  conjuntosFiltrados.forEach(c => {
    const exp = _expandirConjunto(c.id, 1);
    exp.productos.forEach(({ prodId }) => productosEnConjuntos.add(prodId));
  });
  prodsSueltosCandidatos = prodsSueltosCandidatos.filter(p => !productosEnConjuntos.has(p.id));

  // ===== RENDER =====
  if (conjuntosFiltrados.length === 0 && prodsSueltosCandidatos.length === 0) {
    return '<div style="padding:20px;text-align:center;color:#888;font-size:12px;font-style:italic">No hay conjuntos ni productos que coincidan con los filtros.</div>';
  }
  let h = '<div style="padding:8px">';

  // Conjuntos anidados (v70: omitir el conjunto default "Sin conjunto
  // específico" si está vacío, igual que en la vista anidada de la matriz)
  conjuntosFiltrados.forEach(c => {
    if (_esConjuntoDefault(c)) {
      const exp = _expandirConjunto(c.id, 1);
      if (exp.productos.length === 0) return;  // default vacío: no mostrar
    }
    h += _afmRenderConjuntoNode(c);
  });

  // Productos sueltos: lista plana al final
  if (prodsSueltosCandidatos.length > 0) {
    h += '<div style="margin-top:12px;font-size:11px;font-weight:700;color:#5F5E5A;text-transform:uppercase;letter-spacing:0.5px;padding:8px 4px 4px">Productos sueltos (no asignados a un conjunto)</div>';
    prodsSueltosCandidatos.forEach(p => {
      h += _afmRenderProductoLeaf(p);
    });
  }

  h += '</div>';
  return h;
}

  const warn = hayProblemas ? _warningIconHtml('Contiene productos incompletos o desactualizados') : '';
  const cliLbl = clN(c.cliente_id);

  let h = '<div style="background:#fff;border:1px solid #C8C6BE;border-radius:6px;margin-bottom:6px;overflow:hidden">';
  h += '<div style="display:flex;align-items:center;padding:8px 12px;gap:8px">';

  h += '<div style="font-size:11px;color:#888;margin-top:1px">' + escapeHtml(cliLbl) + ' · ' + numUnicos + ' tipo(s) de producto · ' + totalUnidades + ' unidad(es) total</div>';
  h += '</div>';
  const stateAfm = agregarDesdeMatrizState;
  const btnLabel = (stateAfm.modo === 'newProject') ? 'Elegir todo' : 'Importar todo';
  h += '<button class="b b-p" style="padding:4px 10px;font-size:11px" onclick="afmSeleccionarConjunto(' + c.id + ')">' + btnLabel + '</button>';
  h += '</div>';
  if (expanded) {
    h += '<div style="border-top:1px solid #E8E6DF;background:#FAF9F5;padding:8px 8px 8px 24px">';
    // v70: Subconjuntos del conjunto (de conjunto_subconjuntos)
    const subRels = conjuntoSubconjuntos.filter(cs => cs.conjunto_id === c.id);
    let subsRenderizados = 0;
    subRels.forEach(cs => {
      const sub = subconjuntos.find(s => s.id === cs.subconjunto_id);

      // Omitir subconjunto default vacío
      if (_esSubconjuntoDefault(sub)) {

        if (exp.productos.length === 0) return;
      }
      h += _afmRenderSubconjuntoNode(sub);
      subsRenderizados++;
    });
    // v70: Productos directos del conjunto (de conjunto_productos)
    const prodsDirectos = conjuntoProductos.filter(cp => cp.conjunto_id === c.id);
    prodsDirectos.forEach(cp => {
      const p = productosMatriz.find(x => x.id === cp.producto_id);
      if (p) h += _afmRenderProductoLeaf(p, cp.cantidad || 1);

    if (subsRenderizados === 0 && prodsDirectos.length === 0) {
      h += '<div style="font-size:11px;color:#888;font-style:italic;padding:4px 0">Sin subconjuntos ni productos directos.</div>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// =============================================================================
// EXPANSION RECURSIVA DE CONJUNTOS / SUBCONJUNTOS
// =============================================================================
// _expandirConjunto(conjuntoId, multiplicador) -> { productos: [{prodId, cant}], problemas: [productoId, ...] }
// Recorre recursivamente: subconjuntos del conjunto + productos directos del conjunto.
// Las cantidades se MULTIPLICAN por el multiplicador externo.
// Productos repetidos se SUMAN (mismo producto desde 2 lugares = sumas las cantidades).
// =============================================================================

function _expandirConjunto(conjuntoId, multiplicador) {
  const productosMap = new Map();  // prodId -> cantidad total
  const problemas = new Set();
  // v70: Productos directos del conjunto (de conjunto_productos)
  conjuntoProductos.filter(cp => cp.conjunto_id === conjuntoId).forEach(cp => {
    const cant = (cp.cantidad || 1) * multiplicador;
    productosMap.set(cp.producto_id, (productosMap.get(cp.producto_id) || 0) + cant);
    if (_matrizProductoTieneProblemas(cp.producto_id)) problemas.add(cp.producto_id);
  });
  // v70: Subconjuntos asociados al conjunto (de conjunto_subconjuntos)
  conjuntoSubconjuntos.filter(cs => cs.conjunto_id === conjuntoId).forEach(cs => {
    const subMult = (cs.cantidad || 1) * multiplicador;
    const subExp = _expandirSubconjunto(cs.subconjunto_id, subMult);
    subExp.productos.forEach(({ prodId, cant }) => {
      productosMap.set(prodId, (productosMap.get(prodId) || 0) + cant);
    });
    subExp.problemas.forEach(p => problemas.add(p));
  });
  return {
    productos: [...productosMap.entries()].map(([prodId, cant]) => ({ prodId, cant })),
    problemas: [...problemas]
  };
}

function _expandirSubconjunto(subconjuntoId, multiplicador) {
  const productosMap = new Map();
  const problemas = new Set();
  // v70: Productos del subconjunto (de subconjunto_productos)
  subconjuntoProductos.filter(sp => sp.subconjunto_id === subconjuntoId).forEach(sp => {
    const cant = (sp.cantidad || 1) * multiplicador;
    productosMap.set(sp.producto_id, (productosMap.get(sp.producto_id) || 0) + cant);
    if (_matrizProductoTieneProblemas(sp.producto_id)) problemas.add(sp.producto_id);
  });
  return {
    productos: [...productosMap.entries()].map(([prodId, cant]) => ({ prodId, cant })),
    problemas: [...problemas]
  };
}

// Variante JERARQUICA de _expandirConjunto: NO colapsa productos repetidos.
// Devuelve la estructura por nivel para que la vista anidada pueda mostrarla.
//
// Retorna:
// {
//   productosDirectos: [{prodId, cant}],   // productos del conjunto SIN subconjunto
//   subconjuntos: [
//     { subId, subNombre, cantSub, productos: [{prodId, cant}] }
//   ],
//   problemas: [prodId, ...]
// }
//
// Las cantidades de productos dentro de subconjuntos ya están multiplicadas por
// (multiplicador del conjunto × cantidad del subconjunto en el conjunto).
function _expandirConjuntoJerarquico(conjuntoId, multiplicador) {
  const problemas = new Set();
  // v70: Productos directos del conjunto (de conjunto_productos)
  const productosDirectos = [];
  conjuntoProductos.filter(cp => cp.conjunto_id === conjuntoId).forEach(cp => {
    const cant = (cp.cantidad || 1) * multiplicador;
    productosDirectos.push({ prodId: cp.producto_id, cant: cant });
    if (_matrizProductoTieneProblemas(cp.producto_id)) problemas.add(cp.producto_id);
  });
  // v70: Subconjuntos del conjunto (de conjunto_subconjuntos)
  const subconjuntosArr = [];
  conjuntoSubconjuntos.filter(cs => cs.conjunto_id === conjuntoId).forEach(cs => {
    const sub = subconjuntos.find(s => s.id === cs.subconjunto_id);
    if (!sub) return;
    const cantSub = (cs.cantidad || 1) * multiplicador;
    const subExp = _expandirSubconjunto(cs.subconjunto_id, cantSub);
    subconjuntosArr.push({
      subId: sub.id,
      subNombre: sub.nombre,
      cantSub: cantSub,
      productos: subExp.productos
    });
    subExp.problemas.forEach(p => problemas.add(p));
  });
  return {
    productosDirectos: productosDirectos,
    subconjuntos: subconjuntosArr,
    problemas: [...problemas]
  };
}

// ----- Helpers de filtros del modal "Agregar desde Matriz" -----
// Reusan la logica de applyMatrizFilters pero leyendo de state.filters
// en lugar de matrizFilters global.
function afmCountActiveFilters() {
  const f = agregarDesdeMatrizState && agregarDesdeMatrizState.filters;
  if (!f) return 0;
  let n = 0;
  if (f.search && f.search.trim()) n++;
  if (f.codigos && f.codigos.trim()) n++;
  // Cliente: contamos solo si NO es exactamente el default (cliProj + GENERICO)
  // Para simplicidad, contamos si tiene mas de 2 elementos o si no incluye exactamente esos dos.
  if (f.clienteIds && f.clienteIds.length > 0) {
    const def = new Set([agregarDesdeMatrizState.clienteProjId, 'GENERICO']);
    const cur = new Set(f.clienteIds);
    if (cur.size !== def.size || ![...def].every(x => cur.has(x))) n++;
  }
  if (f.sectorIds && f.sectorIds.length > 0) n++;
  if (f.equipoIds && f.equipoIds.length > 0) n++;
  if (f.conjuntoIds && f.conjuntoIds.length > 0) n++;
  if (f.subconjuntoIds && f.subconjuntoIds.length > 0) n++;
  return n;
}

function afmGetFilteredProductos() {
  const state = agregarDesdeMatrizState;
  if (!state) return [];
  const f = state.filters;
  let out = productosMatriz.slice();

  // 1. Busqueda
  if (f.search && f.search.trim()) {
    const q = f.search.trim().toLowerCase();
    out = out.filter(p => (p.descripcion || '').toLowerCase().includes(q));
  }
  // 2. Cliente (multi OR, con GENERICO)
  if (f.clienteIds && f.clienteIds.length > 0) {
    const includesGenerico = f.clienteIds.includes('GENERICO');
    const numericIds = new Set(f.clienteIds.filter(x => x !== 'GENERICO').map(x => parseInt(x)));
    out = out.filter(p => {
      if (!p.cliente_id) return includesGenerico;
      return numericIds.has(p.cliente_id);
    });
  }
  // 3. Jerarquia — v70: usa tablas de composición nuevas
  const sectIds = new Set((f.sectorIds || []).map(x => parseInt(x)));
  const eqIds = new Set((f.equipoIds || []).map(x => parseInt(x)));
  const conIds = new Set((f.conjuntoIds || []).map(x => parseInt(x)));
  const subIds = new Set((f.subconjuntoIds || []).map(x => parseInt(x)));
  if (sectIds.size > 0 || eqIds.size > 0 || conIds.size > 0 || subIds.size > 0) {
    out = out.filter(p => {
      // El producto matchea si aparece en algún contenedor que cumpla los filtros.
      // Subconjuntos:
      if (subIds.size > 0) {
        const ok = subconjuntoProductos.some(sp => sp.producto_id === p.id && subIds.has(sp.subconjunto_id));
        if (ok) return true;
      }
      // Conjuntos (directos):
      if (conIds.size > 0) {
        const ok = conjuntoProductos.some(cp => cp.producto_id === p.id && conIds.has(cp.conjunto_id));
        if (ok) return true;
      }
      // Equipos (directos):
      if (eqIds.size > 0) {
        const ok = equipoProductos.some(ep => ep.producto_id === p.id && eqIds.has(ep.equipo_id));
        if (ok) return true;
      }
      // Sectores: el producto está en algún equipo del sector
      if (sectIds.size > 0) {
        for (const sid of sectIds) {
          if (_matrizProdIdsSector(sid).has(p.id)) return true;
        }
      }
      return false;
    });
  }
  // 4. Codigos transversal
  if (f.codigos && f.codigos.trim()) {
    const q = f.codigos.trim().toLowerCase();
    out = out.filter(p => {
      const cli = p.cliente_id ? clientes.find(c => c.id === p.cliente_id) : null;
      if (cli && cli.codigo && cli.codigo.toLowerCase().includes(q)) return true;
      if (p.codigo_cliente && p.codigo_cliente.toLowerCase().includes(q)) return true;
      if (String(p.id).includes(q)) return true;
      return false;
    });
  }
  // 5. Ordenamiento
  out.sort((a, b) => {
    let cmp = 0;
    if (state.sort.by === 'descripcion') cmp = (a.descripcion || '').localeCompare(b.descripcion || '');
    else if (state.sort.by === 'cliente') {
      const ca = a.cliente_id ? clN(a.cliente_id) : 'Productos Genéricos';
      const cb = b.cliente_id ? clN(b.cliente_id) : 'Productos Genéricos';
      cmp = ca.localeCompare(cb);
    } else if (state.sort.by === 'created') {
      const ta = a.created_at ? new Date(a.created_at).getTime() : 0;
      const tb = b.created_at ? new Date(b.created_at).getTime() : 0;
      cmp = ta - tb;
    } else if (state.sort.by === 'cant_procesos') {
      const ca = productosMatrizProcesos.filter(pr => pr.producto_id === a.id).length;
      const cb = productosMatrizProcesos.filter(pr => pr.producto_id === b.id).length;
      cmp = ca - cb;
    }
    if (cmp === 0) cmp = (a.id || 0) - (b.id || 0);
    return state.sort.dir === 'asc' ? cmp : -cmp;
  });
  return out;
}

// Handler unificado: si modo newProject -> guarda en state global y vuelve al form.
// Si modo project -> importa al proyecto directamente (mismo flujo de antes).
function afmSeleccionarProducto(productoId) {
  const state = agregarDesdeMatrizState;
  if (!state) return;
  if (state.modo === 'newProject') {
    // Mostrar el modal de import (cantidad/fecha/presentación + validaciones).
    // Al confirmar, agregamos el item al buffer y volvemos al form de nuevo proyecto.
    _mostrarModalImportar({
      modo: 'newProject',
      productoId: productoId,
      onConfirm: (valores, ignorarValidaciones) => {
        const prod = productosMatriz.find(p => p.id === productoId);
        if (!prod) return;
        const ubics = productosMatrizUbicaciones.filter(u => u.producto_id === productoId);
        const procs = productosMatrizProcesos.filter(pr => pr.producto_id === productoId)
          .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
        // Si force, blanquear maquinas/operarios inactivos en una copia de los procesos
        const procesosFinales = procs.map(pp => {
          const copia = Object.assign({}, pp);
          if (ignorarValidaciones) {
            if (copia.maquina_ideal_id) {
              const mq = maquinas.find(m => m.id === copia.maquina_ideal_id);
              if (mq && mq.activo === false) copia.maquina_ideal_id = null;
            }
            if (copia.operario_ideal_id) {
              const op = operarios.find(o => o.id === copia.operario_ideal_id);
              if (op && op.activo === false) copia.operario_ideal_id = null;
            }
            copia.maquinas_suplentes = (copia.maquinas_suplentes || []).filter(id => {
              const mq = maquinas.find(m => m.id === parseInt(id));
              return !mq || mq.activo !== false;
            });
            copia.operarios_suplentes = (copia.operarios_suplentes || []).filter(id => {
              const op = operarios.find(o => o.id === parseInt(id));
              return !op || op.activo !== false;
            });
          }
          return copia;
        });
        // Agregar al buffer (en lugar de reemplazar)
        newProjectItemsBuffer.push({
          descripcion: prod.descripcion,
          codigo_cliente: prod.codigo_cliente,
          material_id: prod.material_id,
          presentacion_mat_prima: valores.presentacion_mat_prima,
          cantidad: valores.cantidad,
          fecha_fin_estipulada: valores.fecha_fin_estipulada,
          estado: valores.estado || 'Espera MP',
          foto_url: prod.foto_url,
          fromMatriz: {
            productoId: prod.id,
            ubicaciones: ubics,
            procesos: procesosFinales,
            ignorarValidaciones: ignorarValidaciones
          },
          fromGrupo: null,
          fromSubconjunto: null,
          groupKey: null
        });
        const modalAfm = document.getElementById('add-from-matriz-modal');
        if (modalAfm) modalAfm.remove();
        // Capturar el form actual para preservarlo al re-renderizar
        try { newProjectDraft = _newProjectCaptureFormValues(); } catch (e) {}
        renderNewProjectForm();
        toast('Item agregado: ' + prod.descripcion + (ignorarValidaciones ? ' (forzado)' : ''));
      }
    });
  } else {
    // Modo project: importar directo
    importarProductoAlProyecto(productoId);
  }
}

function _confirmarImportGrupal(mode) {
  const opts = window._importarGrupoPendingOpts;
  if (!opts) return;
  const cant = parseInt(document.getElementById('impg-cant').value) || 0;
  const fechaFin = document.getElementById('impg-fechafin').value || null;
  const estado = document.getElementById('impg-estado').value;
  if (cant < 1) { toast('La cantidad debe ser ≥ 1', true); return; }
  if (!fechaFin) { toast('Ingresá la fecha de fin estipulada', true); return; }
  document.getElementById('import-grupo-modal').remove();
  window._importarGrupoPendingOpts = null;
  const force = (mode === 'force');
  // Re-expandir con el multiplicador
  let expansion;
  if (opts.tipo === 'conjunto') {
    expansion = _expandirConjunto(opts.grupoId, cant);
  } else {
    expansion = _expandirSubconjunto(opts.grupoId, cant);
  }
  // Ejecutar import segun el modo (project / newProject)
  const stateAfm = agregarDesdeMatrizState;
  if (stateAfm && stateAfm.modo === 'newProject') {
    _seleccionarGrupoParaNewProject(Object.assign({}, opts, { multiplicador: cant }), expansion, fechaFin, estado, force);
  } else {
    // v70: para conjuntos, pasamos grupoInfo para que los items queden agrupados.
    // Para subconjuntos sueltos (importados directo) también los agrupamos.
    const grupoInfo = {
      conjuntoId: opts.tipo === 'conjunto' ? opts.grupoId : null,
      etiqueta: opts.nombreGrupo,
      cantidad: cant
    };
    _ejecutarImportGrupalProyecto(expansion, fechaFin, estado, force, opts.nombreGrupo, grupoInfo);
  }
}

async function _ejecutarImportGrupalProyecto(expansion, fechaFin, estado, ignorarValidaciones, nombreGrupo, grupoInfo) {
  const proj = getProject(nav.projectId);
  if (!proj) return;
  const total = expansion.productos.length;
  showSpinner('Importando ' + total + ' producto(s)...');
  let importados = 0;
  let totalUnidades = 0;
  const globalPmpToAct = {};
  const BATCH_SIZE = 5;
  // v70: uid único para este grupo importado (permite distinguir importaciones
  // repetidas del mismo conjunto al mismo proyecto).
  const grupoUid = grupoInfo ? ('grp_' + Date.now() + '_' + Math.floor(Math.random() * 10000)) : null;
  try {
    for (let i = 0; i < expansion.productos.length; i += BATCH_SIZE) {
      const batch = expansion.productos.slice(i, i + BATCH_SIZE);
      updateSpinnerMsg('Importando producto(s) ' + (i + 1) + ' a ' + Math.min(i + BATCH_SIZE, total) + ' de ' + total + '...');
      const promesas = batch.map(({ prodId, cant }) => {
        const valores = {
          cantidad: cant,
          fecha_fin_estipulada: fechaFin,
          estado: estado,
          presentacion_mat_prima: (productosMatriz.find(p => p.id === prodId) || {}).presentacion_mat_prima || null
        };
        // v70: pasar info de grupo si corresponde
        if (grupoInfo) {
          valores.grupo = {
            conjuntoId: grupoInfo.conjuntoId || null,
            etiqueta: grupoInfo.etiqueta || nombreGrupo,
            cantidad: grupoInfo.cantidad || 1,
            uid: grupoUid
          };
        }
        return _importarProductoCore(prodId, valores, ignorarValidaciones).then(res => {
          if (!res.error) {
            importados++;
            totalUnidades += cant;
            if (res.pmpToActMap) {
              Object.assign(globalPmpToAct, res.pmpToActMap);
            }
          }
          return res;
        });
      });
      await Promise.all(promesas);
    }
    // Correlatividades INTER-producto: buscar correlatividades de la matriz
    // cuyo predecesor Y sucesor estén ambos en el mapeo global (entre productos
    // distintos importados). Las intra-producto ya las creó _importarProductoCore.
    updateSpinnerMsg('Conectando dependencias entre productos...');
    const productosImportadosIds = new Set(expansion.productos.map(x => x.prodId));
    // Para cada correlatividad de matriz, ver si ambos extremos están en distintos productos importados.
    const corrsInterProducto = productosMatrizCorrelatividades.filter(c => {
      const pPred = productosMatrizProcesos.find(p => p.id === c.predecesor_id);
      const pSuc = productosMatrizProcesos.find(p => p.id === c.sucesor_id);
      if (!pPred || !pSuc) return false;
      if (pPred.producto_id === pSuc.producto_id) return false;  // intra ya hecha
      return productosImportadosIds.has(pPred.producto_id) && productosImportadosIds.has(pSuc.producto_id);
    });
    if (corrsInterProducto.length > 0) {
      const corrInserts = corrsInterProducto
        .map(c => ({
          predecesor_id: globalPmpToAct[c.predecesor_id],
          sucesor_id: globalPmpToAct[c.sucesor_id]
        }))
        .filter(c => c.predecesor_id && c.sucesor_id);
      if (corrInserts.length > 0) {
        await sb.from('correlatividades').insert(corrInserts);
      }
    }
    const modalAfm = document.getElementById('add-from-matriz-modal');
    if (modalAfm) modalAfm.remove();
    updateSpinnerMsg('Refrescando datos...');
    await loadAll();
    render();
    const corrMsg = corrsInterProducto.length > 0 ? ', ' + corrsInterProducto.length + ' dependencia(s) entre items' : '';
    toast('Importado(s) ' + importados + ' producto(s) de "' + nombreGrupo + '" (' + totalUnidades + ' unidad(es) total' + corrMsg + ')');
  } finally {
    hideSpinner();
  }
}

// Para modo newProject: el usuario eligió un conjunto/subconjunto. Se expande
// y se agrega cada producto al buffer como un item, marcado con fromGrupo
// para visualizar de qué conjunto/subconjunto vino.
// Genera un groupKey único para cada importación de grupo. Permite distinguir
// importaciones repetidas del mismo conjunto (se muestran como grupos separados).
let _afmGroupKeyCounter = 0;
function _afmNextGroupKey() { _afmGroupKeyCounter++; return 'g' + Date.now() + '_' + _afmGroupKeyCounter; }

// Helper: crea el objeto de item para el buffer a partir de un producto matriz.
// Aplica ignorarValidaciones a procesos (blanquea operario/maquina inactivos).
function _crearItemBufferDesdeProducto(prodId, cant, fechaFin, estado, force, fromGrupoLabel, fromSubconjuntoLabel, groupKey) {
  const prod = productosMatriz.find(p => p.id === prodId);
  if (!prod) return null;
  const ubics = productosMatrizUbicaciones.filter(u => u.producto_id === prodId);
  const procs = productosMatrizProcesos.filter(pr => pr.producto_id === prodId)
    .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
  const procesosFinales = procs.map(pp => {
    const copia = Object.assign({}, pp);
    if (force) {
      if (copia.maquina_ideal_id) {
        const mq = maquinas.find(m => m.id === copia.maquina_ideal_id);
        if (mq && mq.activo === false) copia.maquina_ideal_id = null;
      }
      if (copia.operario_ideal_id) {
        const op = operarios.find(o => o.id === copia.operario_ideal_id);
        if (op && op.activo === false) copia.operario_ideal_id = null;
      }
      copia.maquinas_suplentes = (copia.maquinas_suplentes || []).filter(id => {
        const mq = maquinas.find(m => m.id === parseInt(id));
        return !mq || mq.activo !== false;
      });
      copia.operarios_suplentes = (copia.operarios_suplentes || []).filter(id => {
        const op = operarios.find(o => o.id === parseInt(id));
        return !op || op.activo !== false;
      });
    }
    return copia;
  });
  return {
    descripcion: prod.descripcion,
    codigo_cliente: prod.codigo_cliente,
    material_id: prod.material_id,
    presentacion_mat_prima: prod.presentacion_mat_prima,
    cantidad: cant,
    fecha_fin_estipulada: fechaFin,
    estado: estado || 'Espera MP',
    foto_url: prod.foto_url,
    fromMatriz: {
      productoId: prod.id,
      ubicaciones: ubics,
      procesos: procesosFinales,
      ignorarValidaciones: !!force
    },
    fromGrupo: fromGrupoLabel,
    fromSubconjunto: fromSubconjuntoLabel,
    groupKey: groupKey
  };
}

// Importar conjunto o subconjunto al buffer, preservando jerarquía.
// Cada importación genera un groupKey único, así múltiples importaciones del
// mismo conjunto se muestran como grupos separados.
function _seleccionarGrupoParaNewProject(opts, expansion, fechaFin, estado, force) {
  const labelTipo = opts.tipo === 'conjunto' ? 'Conjunto' : 'Subconjunto';
  const groupKey = _afmNextGroupKey();
  const fromGrupoLabel = labelTipo + ': ' + opts.nombreGrupo;
  let cantItems = 0;

  if (opts.tipo === 'subconjunto') {
    // Subconjunto: todos sus productos son hojas, sin nivel intermedio.
    // _expandirSubconjunto sigue siendo aplanado (no necesita jerarquía interna).
    const subExp = _expandirSubconjunto(opts.grupoId, 1);  // cantidad ya multiplicada en el modal
    // En realidad, expansion ya viene multiplicada (de _confirmarImportGrupal con la cantidad).
    // Pero como ese flujo va a opts.multiplicador * cant_base, usamos expansion.productos.
    expansion.productos.forEach(({ prodId, cant }) => {
      const it = _crearItemBufferDesdeProducto(prodId, cant, fechaFin, estado, force, fromGrupoLabel, null, groupKey);
      if (it) {
        newProjectItemsBuffer.push(it);
        cantItems++;
      }
    });
  } else {
    // Conjunto: usar versión JERÁRQUICA para preservar subconjuntos.
    // El multiplicador externo es la cantidad de conjuntos elegida por el usuario.
    // expansion ya viene calculada con ese multiplicador. Replico el cálculo aquí.
    // El multiplicador efectivo es expansion.productos[0].cant / cant_base_producto;
    // pero más simple: recalculamos llamando _expandirConjuntoJerarquico con
    // el mismo multiplicador que usó _confirmarImportGrupal.
    // Como _confirmarImportGrupal pasa `cant` como el number del input, lo
    // recuperamos del valor original; o, mejor, lo pasamos como opts.multiplicador.
    const mult = opts.multiplicador || 1;
    const exp = _expandirConjuntoJerarquico(opts.grupoId, mult);
    // Productos directos del conjunto (sin subconjunto)
    exp.productosDirectos.forEach(({ prodId, cant }) => {
      const it = _crearItemBufferDesdeProducto(prodId, cant, fechaFin, estado, force, fromGrupoLabel, null, groupKey);
      if (it) {
        newProjectItemsBuffer.push(it);
        cantItems++;
      }
    });
    // Productos via subconjuntos
    exp.subconjuntos.forEach(s => {
      const fromSubLabel = 'Subconjunto: ' + s.subNombre;
      s.productos.forEach(({ prodId, cant }) => {
        const it = _crearItemBufferDesdeProducto(prodId, cant, fechaFin, estado, force, fromGrupoLabel, fromSubLabel, groupKey);
        if (it) {
          newProjectItemsBuffer.push(it);
          cantItems++;
        }
      });
    });
  }

  const modalAfm = document.getElementById('add-from-matriz-modal');
  if (modalAfm) modalAfm.remove();
  // Capturar el form actual para preservarlo al re-renderizar
  try { newProjectDraft = _newProjectCaptureFormValues(); } catch (e) {}
  renderNewProjectForm();
  toast(opts.tipo + ' agregado: "' + opts.nombreGrupo + '" (' + cantItems + ' item(s) agregado(s) al proyecto)');
}

// Importar producto matriz al proyecto: abre primero un modal para que el
// usuario complete cantidad, fecha de fin estipulada y eventualmente edite
// la presentación de materia prima. Si el producto tiene validaciones
// fallidas, muestra las advertencias y un botón rojo "Cargar igualmente".
async function importarProductoAlProyecto(productoId) {
  const proj = getProject(nav.projectId);
  if (!proj) return;
  const prod = productosMatriz.find(p => p.id === productoId);
  if (!prod) return;
  _mostrarModalImportar({
    modo: 'project',
    productoId: productoId,
    onConfirm: (valores, ignorarValidaciones) => {
      _ejecutarImportProyecto(productoId, valores, ignorarValidaciones);
    }
  });
}

// Modal compartido: para modo project (importa al proyecto al confirmar) y
// modo newProject (guarda la seleccion para mostrar en el form).

  const prod = productosMatriz.find(p => p.id === opts.productoId);

  const validacion = validarProductoMatriz(opts.productoId);

  const existing = document.getElementById('import-prod-modal');
  if (existing) existing.remove();
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'import-prod-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '520px'; m.style.zIndex = '1100';

  let h = '<div class="md-t">Importar "' + escapeHtml(prod.descripcion) + '"</div>';

  // Si hay validaciones fallidas, mostrar advertencias.
  if (!validacion.ok) {
    h += '<div style="background:#FEF5E7;color:#854F0B;padding:10px 14px;border-radius:5px;margin-bottom:12px;font-size:12px;border:1px solid #F5C842">';
    h += '<b>⚠️ El producto tiene campos pendientes o desactualizados:</b><ul style="margin:6px 0 0 18px;padding:0">';
    validacion.problemas.forEach(p => {
      h += '<li style="margin:2px 0">' + escapeHtml(p) + '</li>';
    });

  }

  // Campos a completar al importar
  h += '<div class="row">';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Cantidad <span style="color:#A32D2D">*</span></div>';
  h += '<input type="number" class="ef-i" id="imp-cant" value="1" min="1" step="1"></div>';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Fecha de fin estipulada <span style="color:#A32D2D">*</span></div>';
  h += '<input type="date" class="ef-i" id="imp-fechafin"></div>';
  h += '</div>';

  // Presentación: default la del producto matriz, editable.
  h += '<div class="ef"><div class="ef-l">Presentación de materia prima</div>';
  h += '<input type="text" class="ef-i" id="imp-presentacion" value="' + escapeHtml(prod.presentacion_mat_prima || '') + '" placeholder="Ej. Ø290 x 1 1/2 pulg">';
  h += '<div class="ef-help">Default = la del producto matriz. Si para este proyecto se usa otra, modificala.</div></div>';

  // Estado del item: igual al form de item normal. Default "Espera MP".
  h += '<div class="ef" style="background:#FFF4D5;padding:8px 10px;border-radius:5px;border:1px solid #F5C842">';
  h += '<div class="ef-l" style="color:#854F0B">Estado del item</div>';
  h += '<select class="ef-i" id="imp-estado">';
  ITEM_STATES.forEach(st => {
    h += '<option value="' + st + '"' + (st === 'Espera MP' ? ' selected' : '') + '>' + st + '</option>';
  });
  h += '</select>';
  h += '<div class="ef-help" style="color:#854F0B">Si la materia prima ya está en el taller, podés setearlo en "Llegó MP" o el estado real.</div></div>';

  // Acciones
  h += '<div class="actions">';
  h += '<button class="b" onclick="document.getElementById(\'import-prod-modal\').remove()">Cancelar</button>';
  if (!validacion.ok) {
    h += '<button class="b" style="background:#A32D2D;color:#fff;border-color:#A32D2D" onclick="_confirmarImport(\'force\')">Cargar igualmente</button>';
    h += '<button class="b b-p" disabled title="Hay validaciones fallidas. Actualizá el producto en Matriz para habilitar la carga normal." style="opacity:.5;cursor:not-allowed">Importar</button>';
  } else {
    h += '<button class="b b-p" onclick="_confirmarImport(\'ok\')">Importar</button>';
  }
  h += '</div>';

  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);

}

// Llamado desde los botones del modal. mode = 'ok' | 'force'.
function _confirmarImport(mode) {
  const opts = window._importarPendingOpts;
  if (!opts) return;
  const cant = parseInt(document.getElementById('imp-cant').value) || 0;
  const fechaFin = document.getElementById('imp-fechafin').value || null;
  const presentacion = document.getElementById('imp-presentacion').value.trim() || null;
  const estado = (document.getElementById('imp-estado') || { value: 'Espera MP' }).value;
  if (cant < 1) { toast('La cantidad debe ser >= 1', true); return; }
  if (!fechaFin) { toast('Ingresá la fecha de fin estipulada', true); return; }
  const valores = { cantidad: cant, fecha_fin_estipulada: fechaFin, presentacion_mat_prima: presentacion, estado: estado };
  document.getElementById('import-prod-modal').remove();
  window._importarPendingOpts = null;
  opts.onConfirm(valores, mode === 'force');
}

async function _ejecutarImportProyecto(productoId, valores, ignorarValidaciones) {
  showSpinner('Importando producto...');
  try {
    await _importarProductoCore(productoId, valores, ignorarValidaciones);
    const modalAfm = document.getElementById('add-from-matriz-modal');
    if (modalAfm) modalAfm.remove();
    await loadAll();
    const prodProcs = productosMatrizProcesos.filter(pp => pp.producto_id === productoId);
    toast('Item importado de la matriz: ' + prodProcs.length + ' proceso(s)' + (ignorarValidaciones ? ' (forzado)' : ''));
    render();
  } finally {
    hideSpinner();
  }
}

// Versión interna: crea item + ubicaciones + procesos + correlatividades para
// UN producto, en batch (4 queries fijas + 1 para ubicaciones si las hay).
// NO hace loadAll, NO cierra modales, NO toast. Sirve para llamar en lote
// desde _ejecutarImportGrupalProyecto.
//
// Retorna {itemId, actIds} o {error}. La paralelización por items distintos
// se hace afuera de esta función con Promise.all.
async function _importarProductoCore(productoId, valores, ignorarValidaciones) {
  const proj = getProject(nav.projectId);
  if (!proj) return { error: 'No project' };
  const prod = productosMatriz.find(p => p.id === productoId);
  if (!prod) return { error: 'Producto no encontrado' };

  // 1. Crear item
  const itemPayload = {
    proyecto_id: proj.id,
    cliente_id: proj.cliente_id,
    pedido_nro: proj.pedido_nro,
    descripcion: prod.descripcion,
    cantidad: valores.cantidad,
    foto_url: prod.foto_url || null,
    material_id: prod.material_id || null,
    codigo_cliente: prod.codigo_cliente || null,
    presentacion_mat_prima: valores.presentacion_mat_prima || prod.presentacion_mat_prima || null,
    fecha_fin_estipulada: valores.fecha_fin_estipulada,
    estado: valores.estado || 'Espera MP',
    imported_from_matriz_id: prod.id
  };
  // v70: si el producto se importa como parte de un grupo (conjunto), marcamos
  // las columnas de agrupación para poder mostrarlo agrupado en el proyecto.
  if (valores.grupo) {
    itemPayload.grupo_matriz_conjunto_id = valores.grupo.conjuntoId || null;
    itemPayload.grupo_etiqueta = valores.grupo.etiqueta || null;
    itemPayload.grupo_cantidad = valores.grupo.cantidad || 1;
    itemPayload.grupo_uid = valores.grupo.uid || null;
  }
  const { data: newItem, error: itErr } = await sb.from('items').insert(itemPayload).select().single();
  if (itErr) { console.error('Error creando item:', itErr); return { error: itErr.message }; }

  // 2. Ubicaciones (batch)
  const ubics = productosMatrizUbicaciones.filter(u => u.producto_id === productoId);
  if (ubics.length > 0) {
    const ubicInserts = ubics.map(u => ({
      item_id: newItem.id,
      cliente_id: u.cliente_id,
      sector_id: u.sector_id,
      equipo_id: u.equipo_id,
      conjunto_id: u.conjunto_id,
      subconjunto_id: u.subconjunto_id
    }));
    await sb.from('items_ubicaciones').insert(ubicInserts);
  }

  // 3. Procesos (batch). Resolvemos máquinas/operarios inactivos si force.
  const prodProcs = productosMatrizProcesos.filter(pp => pp.producto_id === productoId)
    .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
  const actInserts = prodProcs.map((pp, i) => {
    let maq_id = pp.maquina_ideal_id;
    let op_id = pp.operario_ideal_id;
    if (ignorarValidaciones && maq_id) {
      const mq = maquinas.find(m => m.id === maq_id);
      if (mq && mq.activo === false) maq_id = null;
    }
    if (ignorarValidaciones && op_id) {
      const op = operarios.find(o => o.id === op_id);
      if (op && op.activo === false) op_id = null;
    }
    let maq_supl = pp.maquinas_suplentes || [];
    let op_supl = pp.operarios_suplentes || [];
    if (ignorarValidaciones) {
      maq_supl = maq_supl.filter(id => {
        const mq = maquinas.find(m => m.id === parseInt(id));
        return !mq || mq.activo !== false;
      });
      op_supl = op_supl.filter(id => {
        const op = operarios.find(o => o.id === parseInt(id));
        return !op || op.activo !== false;
      });
    }
    return {
      item_id: newItem.id,
      cliente_id: proj.cliente_id,
      pedido_nro: proj.pedido_nro,
      descripcion: prod.descripcion + ' - ' + (pp.proceso || ''),
      descripcion_proyecto: proj.descripcion,
      descripcion_trabajo: pp.trabajo_a_realizar || null,
      proceso: pp.proceso,
      duracion_estimada_min: pp.duracion_estimada_min,
      duracion_margen_min: pp.duracion_margen_min || 0,
      duracion_operario_min: pp.duracion_operario_min,
      duracion_planificador_min: (pp.duracion_estimada_min || 0) + (pp.duracion_margen_min || 0),
      tipo: pp.tipo,
      maquina_ideal_id: maq_id,
      maquina_ideal_nombre: pp.maquina_ideal_nombre,
      maquinas_suplentes_ids: maq_supl,
      operario_ideal_id: op_id,
      operarios_suplentes_ids: op_supl,
      urgencia: proj.urgencia,
      foto_proyecto_url: proj.foto_url,
      foto_url: prod.foto_url,
      fecha_ingreso: proj.fecha_ingreso,
      cliente_final: proj.cliente_final,
      orden: i + 1,
      estado: 'sin_planificar',
      fecha: '1900-01-01',
      hora_inicio: '06:00:00',
      estado_proceso: 'Planificación Pendiente'
    };
  });
  let newActIds = [];
  let pmpToActMap = {};  // mapeo pmp_id -> act_id, para correlatividades
  if (actInserts.length > 0) {
    // Insertamos en batch. Supabase preserva el orden de los inserts en los
    // returns, así que los IDs vuelven en el mismo orden que los enviamos.
    const { data: actsData, error: actErr } = await sb.from('actividades_tablero').insert(actInserts).select('id');
    if (actErr) { console.error('Error creando procesos:', actErr); return { error: actErr.message }; }
    newActIds = (actsData || []).map(x => x.id);
    // Construir mapeo pmp_id -> act_id (ordenados igual)
    prodProcs.forEach((pp, idx) => {
      if (newActIds[idx]) pmpToActMap[pp.id] = newActIds[idx];
    });
  }

  // 4. Correlatividades INTRA-producto: si en la matriz hay correlatividades
  // definidas entre procesos de ESTE producto, las usamos. Si no, fallback
  // secuencial (legacy: cada proceso depende del anterior). Las correlatividades
  // INTER-producto se manejan afuera de esta función, en la versión grupal.
  const pmpIds = new Set(prodProcs.map(pp => pp.id));
  const corrsIntraProducto = productosMatrizCorrelatividades.filter(c =>
    pmpIds.has(c.predecesor_id) && pmpIds.has(c.sucesor_id));
  if (corrsIntraProducto.length > 0) {
    // Usar las correlatividades de la matriz
    const corrInserts = corrsIntraProducto
      .map(c => ({
        predecesor_id: pmpToActMap[c.predecesor_id],
        sucesor_id: pmpToActMap[c.sucesor_id]
      }))
      .filter(c => c.predecesor_id && c.sucesor_id);
    if (corrInserts.length > 0) {
      await sb.from('correlatividades').insert(corrInserts);
    }
  } else if (newActIds.length > 1) {
    // Fallback secuencial (producto viejo sin correlatividades definidas)
    const corrInserts = [];
    for (let i = 0; i < newActIds.length - 1; i++) {
      corrInserts.push({ predecesor_id: newActIds[i], sucesor_id: newActIds[i + 1] });
    }
    await sb.from('correlatividades').insert(corrInserts);
  }

  return { itemId: newItem.id, actIds: newActIds, pmpToActMap: pmpToActMap, productoId: productoId };
}

// Duplica un item del proyecto: crea una copia con todos sus procesos,
// correlatividades intra-item, ubicaciones y fotos. La descripción del nuevo
// item lleva " (copia)" como sufijo. Permite agregar variaciones rápidas.
async function duplicarItem(itemId) {
  const orig = items.find(i => i.id === itemId);
  if (!orig) return;
  confirmModal({
    titulo: 'Duplicar item',
    mensaje: '¿Crear una copia de "' + orig.descripcion + '" con todos sus procesos y datos?',
    textoConfirmar: 'Duplicar',
    peligroso: false,
    onConfirm: async () => {
      showSpinner('Duplicando item...');
      try {
        // 1. Crear el item copia (sin foto_url; las fotos las insertamos aparte)
        const itemPayload = {
          proyecto_id: orig.proyecto_id,
          cliente_id: orig.cliente_id,
          pedido_nro: orig.pedido_nro,
          descripcion: (orig.descripcion || '') + ' (copia)',
          cantidad: orig.cantidad,
          foto_url: orig.foto_url,
          material_id: orig.material_id || null,
          codigo_cliente: orig.codigo_cliente || null,
          presentacion_mat_prima: orig.presentacion_mat_prima || null,
          fecha_fin_estipulada: orig.fecha_fin_estipulada || null,
          estado: orig.estado || 'Espera MP',
          imported_from_matriz_id: orig.imported_from_matriz_id || null
        };
        const { data: newItem, error: itErr } = await sb.from('items').insert(itemPayload).select().single();
        if (itErr) { toast('Error: ' + itErr.message, true); return; }

        // 2. Ubicaciones
        const ubics = itemsUbicaciones.filter(u => u.item_id === itemId);
        if (ubics.length > 0) {
          const ubicInserts = ubics.map(u => ({
            item_id: newItem.id,
            cliente_id: u.cliente_id,
            sector_id: u.sector_id,
            equipo_id: u.equipo_id,
            conjunto_id: u.conjunto_id,
            subconjunto_id: u.subconjunto_id
          }));
          await sb.from('items_ubicaciones').insert(ubicInserts);
        }

        // 3. Procesos (en batch, en mismo orden)
        const procs = actividades.filter(a => a.item_id === itemId && !a.proceso_eliminado)
          .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
        const actInserts = procs.map((p, i) => ({
          item_id: newItem.id,
          cliente_id: p.cliente_id,
          pedido_nro: p.pedido_nro,
          descripcion: p.descripcion,
          descripcion_proyecto: p.descripcion_proyecto,
          descripcion_trabajo: p.descripcion_trabajo,
          proceso: p.proceso,
          duracion_estimada_min: p.duracion_estimada_min,
          duracion_margen_min: p.duracion_margen_min || 0,
          duracion_operario_min: p.duracion_operario_min,
          duracion_planificador_min: p.duracion_planificador_min,
          tipo: p.tipo,
          maquina_ideal_id: p.maquina_ideal_id,
          maquina_ideal_nombre: p.maquina_ideal_nombre,
          maquinas_suplentes_ids: p.maquinas_suplentes_ids,
          operario_ideal_id: p.operario_ideal_id,
          operarios_suplentes_ids: p.operarios_suplentes_ids,
          urgencia: p.urgencia,
          foto_proyecto_url: p.foto_proyecto_url,
          foto_url: p.foto_url,
          fecha_ingreso: p.fecha_ingreso,
          cliente_final: p.cliente_final,
          orden: i + 1,
          estado: 'sin_planificar',
          fecha: '1900-01-01',
          hora_inicio: '06:00:00',
          estado_proceso: 'Planificación Pendiente'
        }));
        let newActIds = [];
        let oldToNewActMap = {};
        if (actInserts.length > 0) {
          const { data: actsData, error: actErr } = await sb.from('actividades_tablero').insert(actInserts).select('id');
          if (actErr) { toast('Error procesos: ' + actErr.message, true); return; }
          newActIds = (actsData || []).map(x => x.id);
          procs.forEach((p, idx) => { if (newActIds[idx]) oldToNewActMap[p.id] = newActIds[idx]; });
        }

        // 4. Correlatividades intra-item (mismo predecesor y sucesor entre procesos del item)
        const oldActIds = new Set(procs.map(p => p.id));
        const corrsIntra = await sb.from('correlatividades').select('*');
        const corrsRelevantes = (corrsIntra.data || []).filter(c =>
          oldActIds.has(c.predecesor_id) && oldActIds.has(c.sucesor_id));
        if (corrsRelevantes.length > 0) {
          const corrInserts = corrsRelevantes
            .map(c => ({
              predecesor_id: oldToNewActMap[c.predecesor_id],
              sucesor_id: oldToNewActMap[c.sucesor_id]
            }))
            .filter(c => c.predecesor_id && c.sucesor_id);
          if (corrInserts.length > 0) await sb.from('correlatividades').insert(corrInserts);
        }

        // 5. Fotos del item original → copiar al nuevo
        const fotosOrig = getFotos('item', itemId);
        if (fotosOrig.length > 0) {
          const fotosInserts = fotosOrig.map((f, idx) => ({
            entidad_tipo: 'item',
            entidad_id: newItem.id,
            url: f.url,
            orden: idx,
            descripcion: f.descripcion
          }));
          await sb.from('fotos').insert(fotosInserts);
        }

        await loadAll();
        toast('Item duplicado: "' + newItem.descripcion + '"');
        navigate({ view: 'item', projectId: newItem.proyecto_id, itemId: newItem.id });
      } finally {
        hideSpinner();
      }
    }
  });
}

async function confirmDeleteItem(itemId) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const procCount = actividades.filter(a => a.item_id === itemId && !a.proceso_eliminado).length;
  confirmModal({
    titulo: 'Eliminar item',
    mensaje: 'Eliminar el item "' + item.descripcion + '" y sus ' + procCount + ' proceso(s)?',
    textoConfirmar: 'Eliminar',
    onConfirm: async () => {
      showSpinner('Eliminando item...');
      try {
        await sb.from('actividades_tablero').delete().eq('item_id', itemId);
        await sb.from('items').delete().eq('id', itemId);
        await loadAll();
        const md = document.getElementById('item-modal');
        if (md) md.remove();
        toast('Item eliminado');
        render();
      } finally {
        hideSpinner();
      }
    }
  });
}

.combo-item{padding:7px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid #F5F3EC}

.to.sh{opacity:1}
.to.err{background:#A32D2D}
</style>

<script>
const SB_URL = 'https://mzjbcfkalvduimqhawur.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16amJjZmthbHZkdWltcWhhd3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzY0MzcsImV4cCI6MjA5MDQ1MjQzN30.P7so8AbiRgR9bIWttIqoG6ievY4cxgDMjzZQLx-95-Q';
const sb = supabase.createClient(SB_URL, SB_KEY);
const PHOTO_BUCKET = 'proyecto-fotos';

let clientes = [], maquinas = [], operarios = [], proyectos = [], items = [], actividades = [], correlatividades = [];
// Matriz de Productos (Iteracion B)
let productosMatriz = [];
let productosMatrizProcesos = [];
// Catalogos de jerarquia (B1.6.a)
let materiales = [];
let sectores = [];
let equipos = [];
let conjuntos = [];
let subconjuntos = [];
let conjuntosEquipos = [];        // pivot N:M (DEPRECADO en v70, se mantiene para compat)
let subconjuntosConjuntos = [];   // pivot N:M (DEPRECADO en v70, se mantiene para compat)
let productosMatrizUbicaciones = [];  // DEPRECADO en v70, se mantiene para compat
let productosMatrizCorrelatividades = [];  // D2.5
let fotos = [];  // v60: tabla polimórfica de fotos {entidad_tipo, entidad_id, url, orden, descripcion}
let clienteContactos = [];  // v62: contactos de cliente

// v70: Nuevas tablas de composición. El modelo nuevo: el producto NO tiene
// cantidad propia. La cantidad vive en la relación contenedor↔contenido.
// - equipoConjuntos: {equipo_id, conjunto_id, cantidad} — composición del equipo.
// - conjuntoSubconjuntos: {conjunto_id, subconjunto_id, cantidad} — composición del conjunto.
// - equipoProductos: {equipo_id, producto_id, cantidad} — productos directos del equipo.
// - conjuntoProductos: {conjunto_id, producto_id, cantidad} — productos directos del conjunto.
// - subconjuntoProductos: {subconjunto_id, producto_id, cantidad} — productos del subconjunto.
// - productosGemelos: {producto_a_id, producto_b_id} — productos funcionalmente equivalentes.
let equipoConjuntos = [];
let conjuntoSubconjuntos = [];
let equipoProductos = [];
let conjuntoProductos = [];
let subconjuntoProductos = [];
let productosGemelos = [];
// v62: toggles "mostrar inactivos" por módulo (solo dentro del módulo Recursos).
// Cada uno es una llave booleana que se setea desde la UI.
let mostrarInactivos = { clientes: false, materiales: false, operarios: false, maquinas: false };

// v69: Nombres "default" que el sistema crea automáticamente para mantener la
// jerarquía completa. En la vista anidada de la matriz los nodos con estos
// nombres se OMITEN visualmente (sus hijos suben al nivel del padre). En los
// combos siguen apareciendo normalmente para que se puedan elegir al cargar.
const DEFAULT_NAMES_OMITIBLES = {
  equipo: 'sin equipo específico',
  conjunto: 'sin conjunto específico',
  subconjunto: 'sin subconjunto específico'
  // Nota: 'Sector General' NO se omite (Tomi quiere agrupar por sector general).
};
function _esEquipoDefault(eq) {
  return eq && (eq.nombre || '').toLowerCase().trim() === DEFAULT_NAMES_OMITIBLES.equipo;
}
function _esConjuntoDefault(con) {
  return con && (con.nombre || '').toLowerCase().trim() === DEFAULT_NAMES_OMITIBLES.conjunto;
}
function _esSubconjuntoDefault(sub) {
  return sub && (sub.nombre || '').toLowerCase().trim() === DEFAULT_NAMES_OMITIBLES.subconjunto;
}
let itemsUbicaciones = [];   // Entrega A: ubicaciones de items en proyectos
let nav = { view: 'projects' };
// Default filter for projects list: all states except closed/anulado/perdido
let projectFilters = new Set(['Proyectando', 'Presupuestar', 'Confirmado']);

// ============= FILTROS AVANZADOS =============
// Estado persistente en localStorage. Filtros aplicados (no en edicion).
// La estructura es:
//   advFilters = {
//     clientes: [id, id, ...],         // OR entre IDs
//     proyectoNro: '4137',             // string, busqueda exacta
//     pedidoNro: '4135',               // string, busqueda exacta
//     producto: '',                    // por ahora siempre vacio (no funcional)
//     fechaPreset: 'todos' | 'hoy' | 'ayer' | 'esta_semana' | 'ultima_semana' |
//                  'este_mes' | 'ultimo_mes' | 'este_anio' | 'ultimo_anio' | 'rango',
//     fechaDesde: 'YYYY-MM-DD' | null, // solo si preset==='rango'
//     fechaHasta: 'YYYY-MM-DD' | null
//   }
// advFiltersDraft = lo que el usuario esta editando en los inputs (se aplica al
//                   hacer Enter/Apply). Algunos campos (Fecha) se aplican
//                   inmediato porque no hay nada que confirmar.
const ADV_FILTERS_STORAGE_KEY = 'velasco_advFilters_v1';
const ADV_FILTERS_PANEL_OPEN_KEY = 'velasco_advFiltersPanelOpen_v1';
const DEFAULT_ADV_FILTERS = {
  clientes: [],
  incluirClienteFinal: true,  // Si true, busca tambien en cliente_final (texto libre)
  proyectoNro: '',
  pedidoNro: '',
  descProyecto: '',
  descItem: '',
  estadoItem: '',
  producto: '',
  fechaPreset: 'todos',
  fechaDesde: null,
  fechaHasta: null
};
function loadAdvFilters() {
  try {
    const raw = localStorage.getItem(ADV_FILTERS_STORAGE_KEY);
    if (!raw) return { ...DEFAULT_ADV_FILTERS };
    const parsed = JSON.parse(raw);
    return { ...DEFAULT_ADV_FILTERS, ...parsed };
  } catch (e) { return { ...DEFAULT_ADV_FILTERS }; }
}
function saveAdvFilters(f) {
  try { localStorage.setItem(ADV_FILTERS_STORAGE_KEY, JSON.stringify(f)); } catch (e) {}
}
let advFilters = loadAdvFilters();
let advFiltersDraft = JSON.parse(JSON.stringify(advFilters));
let advFiltersPanelOpen = (function(){
  try { return localStorage.getItem(ADV_FILTERS_PANEL_OPEN_KEY) === '1'; } catch (e) { return false; }
})();

// ===== VIEW MODE Y SORT =====
// viewMode: 'projects' | 'items'. Sort por separado para cada vista.
// expandedProjects: set de ids de proyectos con items desplegados (vista projects).
const VIEW_MODE_KEY = 'velasco_viewMode_v1';
const SORT_PROJECTS_KEY = 'velasco_sortProjects_v1';
const SORT_ITEMS_KEY = 'velasco_sortItems_v1';
const EXPANDED_PROJECTS_KEY = 'velasco_expandedProjects_v1';

let viewMode = (function(){
  try { return localStorage.getItem(VIEW_MODE_KEY) || 'projects'; } catch (e) { return 'projects'; }
})();
function setViewMode(m) {
  viewMode = m;
  try { localStorage.setItem(VIEW_MODE_KEY, m); } catch (e) {}
}

// Sort state: { by: 'created' | 'urgencia' | 'cliente' | 'fecha_entrega', dir: 'asc' | 'desc' }
// Defaults: por fecha de creacion descendente (mas recientes primero)
const DEFAULT_SORT_PROJECTS = { by: 'created', dir: 'desc' };
const DEFAULT_SORT_ITEMS = { by: 'created', dir: 'desc' };
function loadSort(key, def) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return { ...def };
    const p = JSON.parse(raw);
    return { ...def, ...p };
  } catch (e) { return { ...def }; }
}
function saveSort(key, s) {
  try { localStorage.setItem(key, JSON.stringify(s)); } catch (e) {}
}
let sortProjects = loadSort(SORT_PROJECTS_KEY, DEFAULT_SORT_PROJECTS);
let sortItems = loadSort(SORT_ITEMS_KEY, DEFAULT_SORT_ITEMS);
function setSort(viewKind, by, dir) {
  if (viewKind === 'projects') {
    sortProjects = { by, dir };
    saveSort(SORT_PROJECTS_KEY, sortProjects);
  } else {
    sortItems = { by, dir };
    saveSort(SORT_ITEMS_KEY, sortItems);
  }
}
function getCurrentSort() { return viewMode === 'items' ? sortItems : sortProjects; }

let expandedProjects = (function(){
  try {
    const raw = localStorage.getItem(EXPANDED_PROJECTS_KEY);
    if (!raw) return new Set();
    return new Set(JSON.parse(raw));
  } catch (e) { return new Set(); }
})();
function saveExpandedProjects() {
  try { localStorage.setItem(EXPANDED_PROJECTS_KEY, JSON.stringify([...expandedProjects])); } catch (e) {}
}
function toggleProjectExpand(projId) {
  if (expandedProjects.has(projId)) expandedProjects.delete(projId);
  else expandedProjects.add(projId);
  saveExpandedProjects();
  render();
}
function collapseAllProjects() {
  expandedProjects = new Set();
  saveExpandedProjects();
  render();
}

// Set de items expandidos en la vista Items (muestra procesos)
const EXPANDED_ITEMS_KEY = 'velasco_expandedItems_v1';
let expandedItems = (function(){
  try {
    const raw = localStorage.getItem(EXPANDED_ITEMS_KEY);
    if (!raw) return new Set();
    return new Set(JSON.parse(raw));
  } catch (e) { return new Set(); }
})();
function saveExpandedItems() {
  try { localStorage.setItem(EXPANDED_ITEMS_KEY, JSON.stringify([...expandedItems])); } catch (e) {}
}
function toggleItemExpand(itemId) {
  if (expandedItems.has(itemId)) expandedItems.delete(itemId);
  else expandedItems.add(itemId);
  saveExpandedItems();
  render();
}
function collapseAllItems() {
  expandedItems = new Set();
  saveExpandedItems();
  render();
}
function setAdvFiltersPanelOpen(open) {
  advFiltersPanelOpen = !!open;
  try { localStorage.setItem(ADV_FILTERS_PANEL_OPEN_KEY, open ? '1' : '0'); } catch (e) {}
}
// Cuenta filtros activos para badge "Filtros (N)"
function countActiveAdvFilters(f) {
  let n = 0;
  if (f.clientes && f.clientes.length) n++;
  if (f.proyectoNro && f.proyectoNro.trim() !== '') n++;
  if (f.pedidoNro && f.pedidoNro.trim() !== '') n++;
  if (f.descProyecto && f.descProyecto.trim() !== '') n++;
  if (f.descItem && f.descItem.trim() !== '') n++;
  if (f.estadoItem && f.estadoItem !== '') n++;
  if (f.fechaPreset && f.fechaPreset !== 'todos') n++;
  return n;
}

// Resuelve el preset de fecha a un rango {desde, hasta} en milisegundos UTC.
// Convencion de "semana": lunes a domingo (semana ISO).
// Devuelve null si preset === 'todos' (sin filtro de fecha).
function resolveDateRange(preset, customDesde, customHasta) {
  if (preset === 'todos') return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let desde, hasta;
  function dayOfWeekMon(d) {
    // Devuelve 0=lunes ... 6=domingo
    const dow = d.getDay();
    return dow === 0 ? 6 : dow - 1;
  }
  if (preset === 'hoy') {
    desde = today;
    hasta = new Date(today.getTime() + 86400000 - 1);
  } else if (preset === 'ayer') {
    desde = new Date(today.getTime() - 86400000);
    hasta = new Date(today.getTime() - 1);
  } else if (preset === 'esta_semana') {
    const dom = dayOfWeekMon(today);
    desde = new Date(today.getTime() - dom * 86400000);
    hasta = new Date(desde.getTime() + 7 * 86400000 - 1);
  } else if (preset === 'ultima_semana') {
    const dom = dayOfWeekMon(today);
    const lunesEsta = new Date(today.getTime() - dom * 86400000);
    desde = new Date(lunesEsta.getTime() - 7 * 86400000);
    hasta = new Date(lunesEsta.getTime() - 1);
  } else if (preset === 'este_mes') {
    desde = new Date(today.getFullYear(), today.getMonth(), 1);
    hasta = new Date(today.getFullYear(), today.getMonth() + 1, 1, 0, 0, 0, -1);
  } else if (preset === 'ultimo_mes') {
    desde = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    hasta = new Date(today.getFullYear(), today.getMonth(), 1, 0, 0, 0, -1);
  } else if (preset === 'este_anio') {
    desde = new Date(today.getFullYear(), 0, 1);
    hasta = new Date(today.getFullYear() + 1, 0, 1, 0, 0, 0, -1);
  } else if (preset === 'ultimo_anio') {
    desde = new Date(today.getFullYear() - 1, 0, 1);
    hasta = new Date(today.getFullYear(), 0, 1, 0, 0, 0, -1);
  } else if (preset === 'rango') {
    if (!customDesde && !customHasta) return null;
    if (customDesde) {
      const [y, m, d] = customDesde.split('-').map(Number);
      desde = new Date(y, m - 1, d);
    } else { desde = new Date(0); }
    if (customHasta) {
      const [y, m, d] = customHasta.split('-').map(Number);
      hasta = new Date(y, m - 1, d, 23, 59, 59, 999);
    } else { hasta = new Date(8640000000000000); }
  } else {
    return null;
  }
  return { desde: desde.getTime(), hasta: hasta.getTime() };
}

// Aplica los filtros avanzados (advFilters) a una lista de proyectos.
function applyAdvFilters(projs) {
  const f = advFilters;
  let out = projs;
  // Cliente: OR entre IDs seleccionados. Si incluirClienteFinal, ademas
  // matchea cualquier proyecto cuyo `cliente_final` contenga (case-insensitive)
  // el nombre del cliente seleccionado. Esto permite encontrar proyectos donde
  // el cliente facturable sea uno y el cliente final otro.
  if (f.clientes && f.clientes.length > 0) {
    const setIds = new Set(f.clientes.map(id => parseInt(id)));
    if (f.incluirClienteFinal) {
      const nombres = (f.clientes || []).map(id => {
        const c = clientes.find(x => x.id === parseInt(id));
        return c ? (c.nombre || '').toLowerCase() : null;
      }).filter(n => n);
      out = out.filter(p => {
        if (setIds.has(p.cliente_id)) return true;
        const cf = (p.cliente_final || '').toLowerCase();
        if (!cf) return false;
        return nombres.some(n => cf.includes(n));
      });
    } else {
      out = out.filter(p => setIds.has(p.cliente_id));
    }
  }
  // Nro de proyecto (id interno) - busqueda exacta
  if (f.proyectoNro && f.proyectoNro.trim() !== '') {
    const target = parseInt(f.proyectoNro.trim());
    if (!isNaN(target)) out = out.filter(p => p.id === target);
    else out = []; // texto no numerico => ningun match
  }
  // Nro de pedido (a nivel proyecto) - busqueda exacta
  if (f.pedidoNro && f.pedidoNro.trim() !== '') {
    const target = f.pedidoNro.trim();
    out = out.filter(p => (p.pedido_nro || '').toString() === target);
  }
  // Descripcion del proyecto: contains case-insensitive
  if (f.descProyecto && f.descProyecto.trim() !== '') {
    const q = f.descProyecto.trim().toLowerCase();
    out = out.filter(p => (p.descripcion || '').toLowerCase().includes(q));
  }
  // Descripcion del item: filtra proyectos que tengan AL MENOS UN item con esa descripcion
  if (f.descItem && f.descItem.trim() !== '') {
    const q = f.descItem.trim().toLowerCase();
    out = out.filter(p => (p.items || []).some(it => (it.descripcion || '').toLowerCase().includes(q)));
  }
  // Producto: no funcional por ahora (no hay matriz)
  // Fecha de creacion
  const range = resolveDateRange(f.fechaPreset, f.fechaDesde, f.fechaHasta);
  if (range) {
    out = out.filter(p => {
      if (!p.created_at) return false;
      const t = new Date(p.created_at).getTime();
      return t >= range.desde && t <= range.hasta;
    });
  }
  return out;
}

// ===== ORDEN =====
// Ordena proyectos segun sortProjects. NO muta la lista entrante.
const URGENCY_RANK = { urgente: 0, alta: 1, media: 2, baja: 3 };
const ITEM_ESTADO_RANK = {
  'Espera MP': 0,
  'Listo para mecanizar': 1,
  'En proceso': 2,
  'Terminado': 3,
  'Despachado': 4
};
function sortProjectsList(arr) {
  const s = sortProjects;
  const out = arr.slice();
  out.sort((a, b) => {
    let cmp = 0;
    if (s.by === 'created') {
      cmp = new Date(a.created_at || 0).getTime() - new Date(b.created_at || 0).getTime();
    } else if (s.by === 'fecha_entrega') {
      const ta = a.fecha_entrega ? new Date(a.fecha_entrega).getTime() : null;
      const tb = b.fecha_entrega ? new Date(b.fecha_entrega).getTime() : null;
      // null al final
      if (ta === null && tb === null) cmp = 0;
      else if (ta === null) return 1;
      else if (tb === null) return -1;
      else cmp = ta - tb;
    } else if (s.by === 'urgencia') {
      cmp = (URGENCY_RANK[a.urgencia] ?? 99) - (URGENCY_RANK[b.urgencia] ?? 99);
    } else if (s.by === 'cliente') {
      cmp = (clN(a.cliente_id) || '').localeCompare(clN(b.cliente_id) || '');
    }
    if (cmp === 0) cmp = a.id - b.id; // tiebreaker por id
    return s.dir === 'asc' ? cmp : -cmp;
  });
  return out;
}

// Construye lista plana de items con metadata del proyecto (cliente, pedido, etc.)
// para la vista de items.
function buildFlatItemsList(filteredProjects) {
  const out = [];
  filteredProjects.forEach(p => {
    (p.items || []).forEach(it => {
      out.push({
        item: it,
        proyecto: p
      });
    });
  });
  return out;
}

// Filtro adicional para vista items: estadoItem (sobre items individuales).
function filterItemsList(itemsList) {
  const f = advFilters;
  let out = itemsList;
  if (f.estadoItem && f.estadoItem !== '') {
    out = out.filter(x => (x.item.estado || 'Espera MP') === f.estadoItem);
  }
  // descItem se aplica como filtro a nivel item (no proyecto)
  if (f.descItem && f.descItem.trim() !== '') {
    const q = f.descItem.trim().toLowerCase();
    out = out.filter(x => (x.item.descripcion || '').toLowerCase().includes(q));
  }
  return out;
}

function sortItemsList(arr) {
  const s = sortItems;
  const out = arr.slice();
  out.sort((a, b) => {
    let cmp = 0;
    if (s.by === 'created') {
      cmp = new Date(a.proyecto.created_at || 0).getTime() - new Date(b.proyecto.created_at || 0).getTime();
    } else if (s.by === 'fecha_entrega') {
      // En vista de items, esto es la fecha_fin_estipulada del item
      const ta = a.item.fecha_fin_estipulada ? new Date(a.item.fecha_fin_estipulada).getTime() : null;
      const tb = b.item.fecha_fin_estipulada ? new Date(b.item.fecha_fin_estipulada).getTime() : null;
      if (ta === null && tb === null) cmp = 0;
      else if (ta === null) return 1;
      else if (tb === null) return -1;
      else cmp = ta - tb;
    } else if (s.by === 'urgencia') {
      cmp = (URGENCY_RANK[a.proyecto.urgencia] ?? 99) - (URGENCY_RANK[b.proyecto.urgencia] ?? 99);
    } else if (s.by === 'cliente') {
      cmp = (clN(a.proyecto.cliente_id) || '').localeCompare(clN(b.proyecto.cliente_id) || '');
    } else if (s.by === 'estado_item') {
      cmp = (ITEM_ESTADO_RANK[a.item.estado] ?? 99) - (ITEM_ESTADO_RANK[b.item.estado] ?? 99);
    }
    if (cmp === 0) cmp = a.item.id - b.item.id;
    return s.dir === 'asc' ? cmp : -cmp;
  });
  return out;
}

// Spinner global: bloquea la UI mientras se hace una operación larga.
// Uso: showSpinner('Importando productos...'); await ...; hideSpinner();
// Modal de confirmación con estilo de la app. Reemplaza confirm() nativo.
// Uso: confirmModal({ titulo, mensaje, onConfirm, textoConfirmar, peligroso }).
//   - onConfirm: callback que se llama si el usuario confirma.
//   - textoConfirmar: texto del botón principal (default "Eliminar").
//   - peligroso: si true, botón rojo (default true). Pasar false para acciones normales.
function confirmModal(opts) {
  opts = opts || {};
  const titulo = opts.titulo || 'Confirmar';
  const mensaje = opts.mensaje || '';
  const textoConfirmar = opts.textoConfirmar || 'Eliminar';
  const peligroso = opts.peligroso !== false;
  const onConfirm = opts.onConfirm || (() => {});

  const existing = document.getElementById('confirm-modal');
  if (existing) existing.remove();
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'confirm-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '460px'; m.style.zIndex = '1100';
  let h = '<div class="md-t">' + escapeHtml(titulo) + '</div>';
  // Mensaje (acepta \n para saltos de linea)
  h += '<div style="font-size:13px;color:#5F5E5A;line-height:1.5;margin-bottom:14px;white-space:pre-line">' + escapeHtml(mensaje) + '</div>';
  h += '<div class="actions">';
  h += '<button class="b" onclick="document.getElementById(\'confirm-modal\').remove()">Cancelar</button>';
  const btnStyle = peligroso ? 'background:#A32D2D;color:#fff;border-color:#A32D2D' : '';
  const btnClass = peligroso ? 'b' : 'b b-p';
  h += '<button class="' + btnClass + '" style="' + btnStyle + '" onclick="_confirmModalOk()">' + escapeHtml(textoConfirmar) + '</button>';
  h += '</div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd);
  window._confirmModalCb = onConfirm;
}
function _confirmModalOk() {
  const cb = window._confirmModalCb;
  document.getElementById('confirm-modal').remove();
  window._confirmModalCb = null;
  if (cb) cb();
}

// =============================================================================
// EDITOR DE TEXTO RICO (minimal, sin libreria externa)
// =============================================================================
// Se aplica a "Detalle de tareas" del proceso y "Observaciones para mail" del
// proyecto. Estructura:
//   <div class="rich-wrap">
//     <div class="rich-toolbar">[B][I][U][color][tamano][limpiar]</div>
//     <div class="rich-content" contenteditable="true" data-rich-id="X">...</div>
//   </div>
// Tamanos en em (relativos) para que el auto-shrink de la OT siga funcionando
// proporcionalmente sin agrandar verticalmente la hoja.
//
// IDs:
//   - El contenedor exterior se identifica por data-rich-id
//   - readRichEditor(id) devuelve el HTML sanitizado, listo para guardar.
//
// Sanitizacion: al pegar (paste) limpiamos el HTML para que solo queden tags
// permitidos (b/i/u/span con style permitidos). Esto evita HTML sucio de Word.
function renderRichEditor(id, initialHtml, placeholder) {
  // El HTML inicial puede venir vacio o como texto plano (proyectos viejos);
  // lo metemos tal cual ya que el contenteditable acepta ambos.
  const safeInit = sanitizeRichHtml(initialHtml || '');
  let h = '<div class="rich-wrap" data-rich-id="' + id + '">';
  h += '<div class="rich-toolbar" onmousedown="event.preventDefault()">';  // preventDefault evita perder seleccion al clickear
  h += '<button type="button" class="rich-btn" onclick="richExec(\'' + id + '\',\'bold\')" title="Negrita"><b>B</b></button>';
  h += '<button type="button" class="rich-btn" onclick="richExec(\'' + id + '\',\'italic\')" title="Italica"><i>I</i></button>';
  h += '<button type="button" class="rich-btn" onclick="richExec(\'' + id + '\',\'underline\')" title="Subrayado"><u>U</u></button>';
  // Color picker (6 colores fijos)
  h += '<span class="rich-sep"></span>';
  const colors = ['#000000', '#A32D2D', '#1B7340', '#0C447C', '#854F0B', '#666666'];
  colors.forEach(c => {
    h += '<button type="button" class="rich-btn rich-color" style="background:' + c + '" onclick="richExec(\'' + id + '\',\'foreColor\',\'' + c + '\')" title="Color"></button>';
  });
  // Tamanos (em relativos)
  h += '<span class="rich-sep"></span>';
  h += '<button type="button" class="rich-btn" onclick="richSize(\'' + id + '\',\'small\')" title="Chico (default)">A<sub style="font-size:9px">−</sub></button>';
  h += '<button type="button" class="rich-btn" onclick="richSize(\'' + id + '\',\'medium\')" title="Mediano">A</button>';
  h += '<button type="button" class="rich-btn" onclick="richSize(\'' + id + '\',\'large\')" title="Grande" style="font-size:14px">A<sup style="font-size:9px">+</sup></button>';
  // Limpiar formato
  h += '<span class="rich-sep"></span>';
  h += '<button type="button" class="rich-btn" onclick="richExec(\'' + id + '\',\'removeFormat\')" title="Limpiar formato">⌫</button>';
  h += '</div>';
  // Editor en si
  h += '<div class="rich-content" contenteditable="true" data-rich-content="' + id + '" data-placeholder="' + escapeHtml(placeholder || '') + '" onpaste="richPaste(event)">' + safeInit + '</div>';
  h += '</div>';
  return h;
}

function richExec(id, cmd, value) {
  const el = document.querySelector('[data-rich-content="' + id + '"]');
  if (!el) return;
  el.focus();
  document.execCommand(cmd, false, value || null);
}

// Aplica un tamaño de fuente a la seleccion del editor.
// Usa el approach estandar del browser: execCommand('fontSize', N) con
// valor 1-7. El browser se encarga de todos los casos de anidacion (es
// imposible hacer eso bien manualmente). Despues recorremos el DOM y
// convertimos cada <font size="N"> en <span style="font-size:Xem">, para
// que (a) el HTML guardado sea limpio, (b) los tamanos sean en em (relativos)
// y la OT pueda aplicar auto-shrink.
//
// sizeKey: 'small' | 'medium' | 'large'
function richSize(id, sizeKey) {
  const el = document.querySelector('[data-rich-content="' + id + '"]');
  if (!el) return;
  el.focus();
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;

  // execCommand fontSize acepta 1-7. Usamos 3 valores fijos que despues
  // mapeamos a em: 2->small, 4->medium, 6->large. (1, 3, 5, 7 no se usan.)
  // El browser hace toda la magia: si la seleccion estaba dentro de un
  // <font size="X"> previo, lo modifica/desenvuelve correctamente sin
  // anidar.
  const fontSizeNum = sizeKey === 'small' ? 2 : (sizeKey === 'medium' ? 4 : 6);
  document.execCommand('fontSize', false, fontSizeNum);

  // Convertir los <font size="N"> que acaba de crear el browser en
  // <span style="font-size:Xem">. Solo los del editor actual.
  // Mapeo: 2 -> 1em, 4 -> 1.15em, 6 -> 1.35em.
  // CRITICO: si el <font> trae tambien atributo color (cuando la seleccion
  // ya tenia color aplicado), preservarlo en el style del span. Antes se
  // perdia el color al cambiar tamano.
  const FONT_SIZE_MAP = { '2': '1em', '4': '1.15em', '6': '1.35em' };
  const fonts = el.querySelectorAll('font[size]');
  fonts.forEach(f => {
    const size = f.getAttribute('size');
    const color = f.getAttribute('color');  // puede ser null
    const em = FONT_SIZE_MAP[size];
    if (em) {
      const span = document.createElement('span');
      let style = 'font-size:' + em;
      if (color) style += ';color:' + color;
      span.setAttribute('style', style);
      while (f.firstChild) span.appendChild(f.firstChild);
      f.parentNode.replaceChild(span, f);
    } else {
      // Tamano que no manejamos - desenvolvemos pero preservamos color en span
      // si lo tenia.
      if (color) {
        const span = document.createElement('span');
        span.setAttribute('style', 'color:' + color);
        while (f.firstChild) span.appendChild(f.firstChild);
        f.parentNode.replaceChild(span, f);
      } else {
        while (f.firstChild) f.parentNode.insertBefore(f.firstChild, f);
        f.remove();
      }
    }
  });

  // Limpieza adicional: si quedaron spans anidados con el mismo font-size,
  // los aplastamos. Caso tipico: <span 1.15em><span 1.15em>texto</span></span>
  // queda como <span 1.15em>texto</span>.
  function flattenNestedSpans(node) {
    if (node.nodeType !== 1) return;
    [...node.childNodes].forEach(flattenNestedSpans);
    if (node.tagName === 'SPAN' && node.style.fontSize) {
      // Si tiene un solo hijo span con el mismo font-size, lo aplastamos
      const onlyChild = node.children.length === 1 ? node.children[0] : null;
      if (onlyChild && onlyChild.tagName === 'SPAN' && onlyChild.style.fontSize === node.style.fontSize) {
        // Mover los hijos del nieto al padre y eliminar el nieto
        while (onlyChild.firstChild) node.insertBefore(onlyChild.firstChild, onlyChild);
        onlyChild.remove();
      }
    }
  }
  flattenNestedSpans(el);
}

// Al pegar, sanitizamos el HTML (saca tags peligrosos y atributos dudosos).
function richPaste(e) {
  e.preventDefault();
  const html = (e.clipboardData || window.clipboardData).getData('text/html');
  const text = (e.clipboardData || window.clipboardData).getData('text/plain');
  const cleaned = html ? sanitizeRichHtml(html) : escapeHtml(text || '').replace(/\n/g, '<br>');
  document.execCommand('insertHTML', false, cleaned);
}

// Sanitizador de HTML para el editor: solo deja tags y atributos seguros.
// Permite: b, strong, i, em, u, br, span (con style limitado: font-size,
// color, font-weight, font-style, text-decoration), p, div, ul, ol, li.
function sanitizeRichHtml(html) {
  if (!html) return '';
  // Crear contenedor temporal y dejar que el browser parsee
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  // Recorrer y limpiar
  const allowed = new Set(['B', 'STRONG', 'I', 'EM', 'U', 'BR', 'SPAN', 'P', 'DIV', 'UL', 'OL', 'LI', 'FONT']);
  const allowedStyles = new Set(['font-size', 'color', 'font-weight', 'font-style', 'text-decoration']);
  function clean(node) {
    if (node.nodeType === 3) return; // texto
    if (node.nodeType !== 1) { node.remove(); return; }
    if (!allowed.has(node.tagName)) {
      // Tag no permitido: reemplazar por su contenido textual
      const parent = node.parentNode;
      while (node.firstChild) parent.insertBefore(node.firstChild, node);
      node.remove();
      return;
    }
    // Limpiar atributos
    [...node.attributes].forEach(attr => {
      if (attr.name === 'style') {
        // Mantener solo las propiedades de la lista permitida
        const newStyle = [];
        attr.value.split(';').forEach(decl => {
          const [k, v] = decl.split(':').map(s => (s || '').trim());
          if (!k || !v) return;
          if (allowedStyles.has(k.toLowerCase())) newStyle.push(k + ':' + v);
        });
        if (newStyle.length > 0) node.setAttribute('style', newStyle.join(';'));
        else node.removeAttribute('style');
      } else if (attr.name !== 'color' && attr.name !== 'face' && attr.name !== 'size') {
        // Borrar todos los demas atributos (incluso onclick, href, etc.)
        node.removeAttribute(attr.name);
      }
    });
    // Recursion
    [...node.childNodes].forEach(clean);
  }
  [...tmp.childNodes].forEach(clean);
  return tmp.innerHTML;
}

function readRichEditor(id) {
  const el = document.querySelector('[data-rich-content="' + id + '"]');
  if (!el) return null;
  // Sanitizamos al guardar (defensa en profundidad)
  const html = sanitizeRichHtml(el.innerHTML || '');
  // Si solo tiene un <br> o <p><br></p>, considerar vacio
  const txt = el.textContent || '';
  if (!txt.trim() && !/<img|<br/i.test(html)) return null;
  return html;
}

// Draft del Nuevo Proyecto (en memoria). Se guarda cuando el usuario navega
// fuera del form sin completar y se restaura al volver. Cancelar o crear lo limpian.
let newProjectDraft = null;

function navigate(newNav) {
  // v64: si salimos de la vista de un proyecto con cambios sin guardar
  // (y no estamos navegando dentro del mismo proyecto), mostrar modal.
  // _projectNavBypass permite saltearse el chequeo desde "Guardar" / "Descartar".
  if (!_projectNavBypass && nav && nav.view === 'project' &&
      _projectEditSnapshot && _projectEditSnapshot.projectId === nav.projectId) {
    // v66: navegar a un item del MISMO proyecto NO se considera "salir del
    // proyecto" — el usuario está bajando un nivel a un item del proyecto que
    // está editando. Tampoco dispara modal navegar al mismo proyecto.
    const sigueEnProyecto =
      (newNav.view === 'project' && newNav.projectId === nav.projectId) ||
      (newNav.view === 'item' && newNav.projectId === nav.projectId);
    const saliendoDelProyecto = !sigueEnProyecto;
    if (saliendoDelProyecto && _projectHasUnsavedChanges()) {
      _showUnsavedChangesModal(newNav);
      return;  // bloquear navegación hasta que el usuario decida
    }
    // Si no hay cambios, limpiar snapshot al salir del proyecto
    if (saliendoDelProyecto) _projectEditSnapshot = null;
  }
  _projectNavBypass = false;

  // Si estamos saliendo del form de Nuevo Proyecto a otra vista (no a si mismo),
  // guardar el estado actual del form para restaurarlo si el usuario vuelve.
  try {
    if (nav && nav.view === 'newProject' && newNav.view !== 'newProject') {
      newProjectDraft = _newProjectCaptureFormValues();
    }
  } catch (e) {
    console.warn('[navigate] no se pudo capturar draft:', e);
  }
  _galPendingSlot = null;
  nav = newNav;
  render();
}

// v64: Modal "Hay cambios sin guardar" al salir de la vista de un proyecto editado.
// Botones: Guardar y salir, Descartar y salir, Cancelar (queda en el proyecto).
function _showUnsavedChangesModal(targetNav) {
  const existing = document.getElementById('unsaved-modal');
  if (existing) existing.remove();
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'unsaved-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '480px'; m.style.zIndex = '1100';
  let h = '<div class="md-t">Cambios sin guardar</div>';
  h += '<div style="font-size:13px;color:#5F5E5A;line-height:1.5;margin-bottom:14px">Hiciste cambios en este proyecto que todavía no guardaste (incluye fotos agregadas o reordenadas). ¿Qué querés hacer?</div>';
  h += '<div class="actions">';
  h += '<button class="b" onclick="document.getElementById(\'unsaved-modal\').remove()">Cancelar</button>';
  h += '<button class="b" style="background:#A32D2D;color:#fff;border-color:#A32D2D" onclick="_unsavedModalDescartar()">Descartar y salir</button>';
  h += '<button class="b b-p" onclick="_unsavedModalGuardar()">Guardar y salir</button>';
  h += '</div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd);
  window._unsavedModalTargetNav = targetNav;
}

async function _unsavedModalGuardar() {
  document.getElementById('unsaved-modal').remove();
  const target = window._unsavedModalTargetNav;
  window._unsavedModalTargetNav = null;
  try {
    await saveProjectMeta();
    // saveProjectMeta llama loadAll y render. Después navegamos al destino.
    _projectEditSnapshot = null;
    _projectNavBypass = true;
    navigate(target);
  } catch (e) {
    console.error(e);
    toast('Error al guardar', true);
  }
}

async function _unsavedModalDescartar() {
  document.getElementById('unsaved-modal').remove();
  const target = window._unsavedModalTargetNav;
  window._unsavedModalTargetNav = null;
  await _revertProjectChanges();
  _projectNavBypass = true;
  navigate(target);
}

function renderCrumbs() {
  const c = document.getElementById('crumbs');
  let h = '';
  if (nav.view === 'projects') { c.innerHTML = ''; return; }
  const proj = nav.projectId ? getProject(nav.projectId) : null;
  // Project label for breadcrumb: "P.<id>/Ped.<pedido_nro or '-'>"
  const projLabel = proj ? ('P.' + proj.id + ' / Ped.' + (proj.pedido_nro || '-')) : 'Proyecto';
  if (nav.view === 'newProject') {
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> Nuevo';
  } else if (nav.view === 'project') {
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> ' + escapeHtml(projLabel);
  } else if (nav.view === 'item') {
    const item = items.find(i => i.id === nav.itemId);
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> ' +
        '<a onclick="navigate({view:\'project\',projectId:' + nav.projectId + '})">' + escapeHtml(projLabel) + '</a> <span class="sep">›</span> ' +
        escapeHtml(item ? item.descripcion : 'Item');
  } else if (nav.view === 'clientes') {
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> Clientes';
  } else if (nav.view === 'recursos') {
    const tabLabels = { clientes: 'Clientes', matriz: 'Matriz de Productos', rrhh: 'RRHH', maquinas: 'Máquinas', materiales: 'Materiales' };
    const tab = nav.tab || _recursosLastTab || 'matriz';
    const tabLbl = tabLabels[tab] || tab;
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> ' +
        '<a onclick="navigate({view:\'recursos\'})">Recursos</a> <span class="sep">›</span> ' + tabLbl;
  } else if (nav.view === 'productoMatriz') {
    const prod = productosMatriz.find(p => p.id === nav.productoId);
    const cliLbl = prod && prod.cliente_id ? clN(prod.cliente_id) : 'Productos Genéricos';
    h = '<a onclick="navigate({view:\'projects\'})">Proyectos</a> <span class="sep">›</span> ' +
        '<a onclick="navigate({view:\'recursos\',tab:\'matriz\'})">Recursos</a> <span class="sep">›</span> ' +
        '<a onclick="navigate({view:\'recursos\',tab:\'matriz\'})">Matriz de Productos</a> <span class="sep">›</span> ' +
        escapeHtml(cliLbl) + ' <span class="sep">›</span> ' +
        escapeHtml(prod ? prod.descripcion : 'Producto');
  }
  c.innerHTML = h;
}

function render() {
  renderCrumbs();
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (nav.view === 'projects') return renderProjectsList();
  if (nav.view === 'newProject') return renderNewProjectForm();
  if (nav.view === 'project') return renderProjectDetail();
  if (nav.view === 'item') return renderItemDetail();
  if (nav.view === 'clientes') {
    // Compatibilidad v59: la vista standalone de clientes se reemplazó por la
    // pestaña Clientes dentro de Recursos. Redirigimos para que cualquier link
    // viejo siga funcionando.
    nav = { view: 'recursos', tab: 'clientes' };
    return renderRecursos();
  }
  if (nav.view === 'recursos') return renderRecursos();
  if (nav.view === 'productoMatriz') return renderProductoMatrizDetail();
}

// Body de la vista PROYECTOS
function renderProjectsListBody(filteredProjects) {
  const projs = sortProjectsList(filteredProjects);
  if (projs.length === 0) {
    return '<div class="list-empty">No hay proyectos para los filtros seleccionados.</div>';
  }
  let h = '';
  projs.forEach(p => {
    const stColors = projStateColor(p.estado);
    const isClosed = (p.estado === 'Cerrado' || p.estado === 'Anulado' || p.estado === 'Perdido');
    // v63: fondo celeste para proyectos activos (identifica visualmente "Proyecto"
    // vs Item, Conjunto, Subconjunto que usan blanco/gris). Cerrados quedan grises.
    const cardBg = isClosed ? '#F5F3EC' : '#f0f6fc';
    const img = p.foto_url
      ? '<img src="' + escapeHtml(p.foto_url) + '" class="card-img" onerror="this.style.display=\'none\'">'
      : '<div class="card-img-empty">sin foto</div>';
    const urg = p.urgencia ? '<span class="urg urg-' + p.urgencia + '">' + p.urgencia + '</span>' : '';
    const stBadge = '<span style="display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;background:' + stColors.bg + ';color:' + stColors.fg + ';margin-left:6px">' + p.estado + (p.estado === 'Cerrado' && p.sub_estado_cerrado ? ' / ' + p.sub_estado_cerrado : '') + '</span>';
    const needsPedidoWarn = PROJ_STATES_REQUIRE_PEDIDO.has(p.estado) && !p.pedido_nro;
    const warnHtml = needsPedidoWarn ? '<span title="Falta numero de pedido" style="color:#A32D2D;margin-left:4px;font-weight:700">⚠ FALTA Nº PEDIDO</span>' : '';
    const isExpanded = expandedProjects.has(p.id);
    const arrow = isExpanded ? '▼' : '▶';
    h += '<div class="card-wrap" style="margin-bottom:8px">';
    h += '<div class="card card-clickable" style="background:' + cardBg + ';margin-bottom:0;display:flex;align-items:stretch" onclick="navigate({view:\'project\',projectId:' + p.id + '})">';
    // Flecha de desplegar items: a la izquierda, antes de la imagen.
    // Mismo estilo que la vista anidada de Matriz: ▶/▼ minimalista.
    h += '<div style="display:flex;align-items:center;padding:0 4px 0 10px" onclick="event.stopPropagation()">';
    h += '<button onclick="toggleProjectExpand(' + p.id + ')" title="Mostrar items" style="background:transparent;border:none;padding:4px;font-size:14px;color:#5F5E5A;cursor:pointer;flex:0 0 auto">' + arrow + '</button>';
    h += '</div>';
    h += img;

        p.items.forEach((it, idx) => {
          const sep = idx < p.items.length - 1 ? ';border-bottom:1px solid #EAE8DF' : '';
          h += '<div style="padding:4px 0;display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer' + sep + '" onclick="event.stopPropagation();navigate({view:\'item\',projectId:' + p.id + ',itemId:' + it.id + '})" title="Ver item">';
          h += '<span><b>' + escapeHtml(it.descripcion || '(sin descripcion)') + '</b>';

    h += '</div>';

}

// Body de la vista ITEMS (lista plana de items con info del proyecto)
function renderItemsListBody(filteredProjects) {
  const flat = sortItemsList(filterItemsList(buildFlatItemsList(filteredProjects)));
  if (flat.length === 0) {
    return '<div class="list-empty">No hay items para los filtros seleccionados.</div>';
  }
  let h = '';
  flat.forEach(({ item, proyecto }) => {
    const stColors = projStateColor(proyecto.estado);
    const isClosed = (proyecto.estado === 'Cerrado' || proyecto.estado === 'Anulado' || proyecto.estado === 'Perdido');
    const cardBg = isClosed ? '#F5F3EC' : '#fff';
    const fotoUrl = item.foto_url || proyecto.foto_url;
    const img = fotoUrl
      ? '<img src="' + escapeHtml(fotoUrl) + '" class="card-img" onerror="this.style.display=\'none\'">'
      : '<div class="card-img-empty">sin foto</div>';
    const urg = proyecto.urgencia ? '<span class="urg urg-' + proyecto.urgencia + '">' + proyecto.urgencia + '</span>' : '';
    const stBadge = '<span style="display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;background:' + stColors.bg + ';color:' + stColors.fg + ';margin-left:6px">' + proyecto.estado + '</span>';
    const itemEstado = item.estado || 'Espera MP';
    const itemEstadoBadge = '<span style="display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;background:#E8F2FC;color:#0C447C;margin-left:6px">' + escapeHtml(itemEstado) + '</span>';
    const isExpanded = expandedItems.has(item.id);
    const arrow = isExpanded ? '▼' : '▶';
    h += '<div class="card-wrap" style="margin-bottom:8px">';
    h += '<div class="card card-clickable" style="background:' + cardBg + ';margin-bottom:0;display:flex;align-items:stretch" onclick="navigate({view:\'item\',projectId:' + proyecto.id + ',itemId:' + item.id + '})">';
    // Flecha desplegar procesos: a la izquierda, mismo estilo que matriz
    h += '<div style="display:flex;align-items:center;padding:0 4px 0 10px" onclick="event.stopPropagation()">';
    h += '<button onclick="toggleItemExpand(' + item.id + ')" title="Mostrar procesos" style="background:transparent;border:none;padding:4px;font-size:14px;color:#5F5E5A;cursor:pointer;flex:0 0 auto">' + arrow + '</button>';
    h += '</div>';
    h += img;
    h += '<div class="card-body" style="flex:1">';
    h += '<div class="card-t">' + escapeHtml(item.descripcion || '(sin descripcion)') + urg + itemEstadoBadge + stBadge + '</div>';
    h += '<div class="card-s"><b>' + escapeHtml(clN(proyecto.cliente_id)) + '</b>';
    h += ' · Pr. ' + proyecto.id + ' · ' + escapeHtml(proyecto.descripcion || '');
    if (proyecto.pedido_nro) h += ' · Ped. ' + escapeHtml(proyecto.pedido_nro);
    if (item.cantidad) h += ' · cant. ' + item.cantidad;
    h += '</div></div>';
    h += '</div>';
    // Panel desplegado de procesos
    if (isExpanded) {
      // Buscar procesos cargados en el item (todos los activos, ordenados por orden)
      const procesos = actividades.filter(a => a.item_id === item.id && !a.proceso_eliminado)
        .sort((a, b) => (a.orden || 999999) - (b.orden || 999999));
      h += '<div style="background:#FAFAF7;border:1px solid #C8C6BE;border-top:none;border-radius:0 0 6px 6px;padding:8px 14px 8px 56px;font-size:12px">';
      if (procesos.length > 0) {
        procesos.forEach((p, idx) => {
          const sep = idx < procesos.length - 1 ? ';border-bottom:1px solid #EAE8DF' : '';
          // Duracion en formato corto: 90 -> "1h 30m", 60 -> "1h", 45 -> "45m"
          const totMin = p.duracion_estimada_min || 0;
          const horas = Math.floor(totMin / 60);
          const mins = totMin % 60;
          const durStr = totMin === 0 ? '—' : (horas > 0 ? horas + 'h' + (mins ? ' ' + mins + 'm' : '') : mins + 'm');
          h += '<div style="padding:4px 0;display:flex;justify-content:space-between;align-items:center;gap:10px;overflow:hidden' + sep + '">';
          h += '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0">';
          h += '<b>' + escapeHtml(p.proceso || '—') + '</b>';
          if (p.descripcion) h += ' · ' + escapeHtml(p.descripcion);
          h += '</span>';
          h += '<span style="color:#5F5E5A;font-size:11px;flex-shrink:0">' + durStr + '</span>';
          h += '</div>';
        });
      } else {
        h += '<div style="color:#888;font-style:italic">Sin procesos cargados aun</div>';
      }
      h += '</div>';
    }
    h += '</div>';
  });
  return h;
}

// Wire eventos del panel: Enter en inputs aplica, autocomplete de cliente, etc.
function wireAdvFiltersPanelEvents() {
  // Input de cliente: autocomplete inline al tipear
  const cli = document.getElementById('adv-cliente-input');
  if (cli) {
    cli.addEventListener('input', advClienteSuggest);
    cli.addEventListener('focus', advClienteSuggest);
    cli.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); advApply(); }
      else if (e.key === 'Escape') { closeAdvClienteSuggest(); }
    });
    // Cerrar dropdown al click fuera
    setTimeout(() => {
      document.addEventListener('click', advClienteOutsideClick, true);
    }, 0);
  }
  // Inputs de texto: Enter aplica
  const inputMap = {
    'adv-proyecto-nro': 'proyectoNro',
    'adv-pedido-nro': 'pedidoNro',
    'adv-desc-proyecto': 'descProyecto',
    'adv-desc-item': 'descItem'
  };
  Object.entries(inputMap).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); advApply(); }
      });
      el.addEventListener('input', e => {
        advFiltersDraft[key] = el.value;
      });
    }
  });
}

function advEstadoItemChange() {
  const sel = document.getElementById('adv-estado-item');
  if (!sel) return;
  advFiltersDraft.estadoItem = sel.value;
  advApply();
}

function advToggleIncluirClienteFinal() {
  const cb = document.getElementById('adv-incluir-cliente-final');
  if (!cb) return;
  advFiltersDraft.incluirClienteFinal = cb.checked;
  advApply();
}

function advClienteOutsideClick(e) {
  const sug = document.getElementById('adv-cliente-suggest');
  const inp = document.getElementById('adv-cliente-input');
  if (!sug || !inp) {
    document.removeEventListener('click', advClienteOutsideClick, true);
    return;
  }
  if (!sug.contains(e.target) && e.target !== inp) {
    closeAdvClienteSuggest();
  }
}

function advClienteSuggest() {
  const inp = document.getElementById('adv-cliente-input');
  const sug = document.getElementById('adv-cliente-suggest');
  if (!inp || !sug) return;
  const q = inp.value.trim().toLowerCase();
  // Si vacio y no esta enfocado, no mostrar nada (al focus siempre mostrar top 10)
  const sel = new Set((advFiltersDraft.clientes || []).map(id => parseInt(id)));
  let matches = clientes.filter(c => !sel.has(c.id) && c.activo !== false);
  if (q !== '') {
    matches = matches.filter(c => (c.nombre || '').toLowerCase().includes(q));
  }
  matches = matches.slice(0, 12);
  if (matches.length === 0) {
    sug.style.display = 'none';
    return;
  }
  let h = '';
  matches.forEach(c => {
    h += '<div onclick="advAddCliente(' + c.id + ')" style="padding:6px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid #F0EEE6" onmouseover="this.style.background=\'#F5FAFF\'" onmouseout="this.style.background=\'\'">' + escapeHtml(c.nombre) + '</div>';
  });
  sug.innerHTML = h;
  sug.style.display = 'block';
}
function closeAdvClienteSuggest() {
  const sug = document.getElementById('adv-cliente-suggest');
  if (sug) sug.style.display = 'none';
}
function advAddCliente(id) {
  if (!advFiltersDraft.clientes) advFiltersDraft.clientes = [];
  if (!advFiltersDraft.clientes.includes(id)) advFiltersDraft.clientes.push(id);
  // Limpiar input y re-render solo del panel
  closeAdvClienteSuggest();
  refreshAdvFiltersPanel();
  // Foco en el input para que pueda seguir agregando
  setTimeout(() => {
    const inp = document.getElementById('adv-cliente-input');
    if (inp) { inp.value = ''; inp.focus(); }
  }, 10);
}
function advRemoveCliente(id) {
  advFiltersDraft.clientes = (advFiltersDraft.clientes || []).filter(x => parseInt(x) !== parseInt(id));
  refreshAdvFiltersPanel();
}
function advClearField(field) {
  advFiltersDraft[field] = '';
  refreshAdvFiltersPanel();
}
function advFechaPresetChange() {
  const sel = document.getElementById('adv-fecha-preset');
  if (!sel) return;
  advFiltersDraft.fechaPreset = sel.value;
  if (sel.value !== 'rango') {
    advFiltersDraft.fechaDesde = null;
    advFiltersDraft.fechaHasta = null;
  }
  // Si cambia a algo distinto de "rango", aplicar inmediato (no hay inputs por confirmar)
  // Si cambia a "rango", solo re-renderizar para mostrar inputs
  if (sel.value === 'rango') refreshAdvFiltersPanel();
  else { refreshAdvFiltersPanel(); advApply(); }
}
function advFechaRangeChange() {
  const desde = document.getElementById('adv-fecha-desde');
  const hasta = document.getElementById('adv-fecha-hasta');
  advFiltersDraft.fechaDesde = desde && desde.value ? desde.value : null;
  advFiltersDraft.fechaHasta = hasta && hasta.value ? hasta.value : null;
  // Aplica inmediato (date inputs ya son confirmacion)
  advApply();
}
function advClearAll() {
  advFiltersDraft = JSON.parse(JSON.stringify(DEFAULT_ADV_FILTERS));
  advApply(true);  // skipReadInputs: no pisar el draft con los valores viejos del DOM
}
function advApply(skipReadInputs) {
  // Si no se pidio skipReadInputs, leer los valores de los inputs por si el
  // usuario tipeo algo sin confirmar. (Cuando viene de "Limpiar todo", no.)
  if (!skipReadInputs) {
    const pn = document.getElementById('adv-proyecto-nro');
    const ped = document.getElementById('adv-pedido-nro');
    const dp = document.getElementById('adv-desc-proyecto');
    const di = document.getElementById('adv-desc-item');
    if (pn) advFiltersDraft.proyectoNro = pn.value;
    if (ped) advFiltersDraft.pedidoNro = ped.value;
    if (dp) advFiltersDraft.descProyecto = dp.value;
    if (di) advFiltersDraft.descItem = di.value;
  }
  advFilters = JSON.parse(JSON.stringify(advFiltersDraft));
  saveAdvFilters(advFilters);
  render();
}
function refreshAdvFiltersPanel() {
  // Re-render solo del panel sin tocar el resto del listado
  const panel = document.getElementById('adv-filters-panel');
  if (panel) {
    panel.innerHTML = renderAdvFiltersPanelHtml();
    wireAdvFiltersPanelEvents();
  } else {
    render();
  }
}
function toggleAdvFiltersPanel() {
  setAdvFiltersPanelOpen(!advFiltersPanelOpen);
  // Sincronizar draft con filtros actuales al abrir
  if (advFiltersPanelOpen) advFiltersDraft = JSON.parse(JSON.stringify(advFilters));
  render();
}

function advOpenClienteModal() {
  const bd = document.createElement('div'); bd.className = 'mo';
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove(); });
  const m = document.createElement('div'); m.className = 'md';
  m.style.maxHeight = '80vh';
  m.style.display = 'flex';
  m.style.flexDirection = 'column';
  let h = '<button class="md-x" onclick="this.closest(\'.mo\').remove()">&times;</button>';
  h += '<div class="md-t">Seleccionar clientes</div>';
  h += '<input type="text" id="adv-cli-modal-search" placeholder="Buscar..." style="width:100%;padding:8px 10px;border:1px solid #C8C6BE;border-radius:5px;font-size:13px;margin-bottom:10px" autocomplete="off">';
  h += '<div id="adv-cli-modal-list" style="flex:1;overflow-y:auto;border:1px solid #E8E6DF;border-radius:5px"></div>';
  h += '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px"><button class="b b-p" onclick="this.closest(\'.mo\').remove()">Listo</button></div>';
  m.innerHTML = h;
  bd.appendChild(m); document.body.appendChild(bd);
  document.getElementById('adv-cli-modal-search').addEventListener('input', advCliModalRender);
  advCliModalRender();
}
function advCliModalRender() {
  const list = document.getElementById('adv-cli-modal-list');
  const search = document.getElementById('adv-cli-modal-search');
  if (!list) return;
  const q = (search ? search.value : '').trim().toLowerCase();
  const sel = new Set((advFiltersDraft.clientes || []).map(id => parseInt(id)));
  let matches = clientes.slice();
  if (q !== '') matches = matches.filter(c => (c.nombre || '').toLowerCase().includes(q));
  matches.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
  let h = '';
  matches.forEach(c => {
    const isSel = sel.has(c.id);
    h += '<div onclick="advCliModalToggle(' + c.id + ')" style="padding:8px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid #F0EEE6;background:' + (isSel ? '#E8F2FC' : '#fff') + ';display:flex;justify-content:space-between;align-items:center" onmouseover="if(!this.dataset.sel)this.style.background=\'#F5FAFF\'" onmouseout="this.style.background=\'' + (isSel ? '#E8F2FC' : '#fff') + '\'">';
    h += '<span>' + escapeHtml(c.nombre) + '</span>';
    h += '<span style="color:' + (isSel ? '#2E72B8' : '#C8C6BE') + ';font-weight:700">' + (isSel ? '✓' : '+') + '</span>';
    h += '</div>';
  });
  if (matches.length === 0) h = '<div style="padding:16px;text-align:center;color:#888;font-size:12px">Sin resultados</div>';
  list.innerHTML = h;
}
function advCliModalToggle(id) {
  if (!advFiltersDraft.clientes) advFiltersDraft.clientes = [];
  const idx = advFiltersDraft.clientes.findIndex(x => parseInt(x) === parseInt(id));
  if (idx >= 0) advFiltersDraft.clientes.splice(idx, 1);
  else advFiltersDraft.clientes.push(id);
  advCliModalRender();
  refreshAdvFiltersPanel();
}

// Render del buffer de items pendientes (lista plana en v56; vista anidada en v57).
// Set de groupKeys y subKeys expandidos en la lista de items del Nuevo Proyecto.
// Por defecto, todo arranca expandido (los grupos nuevos se agregan acá).
let npExpanded = new Set();

function npToggleExpand(key) {
  if (npExpanded.has(key)) npExpanded.delete(key);
  else npExpanded.add(key);
  _refreshNpItemsList();
}

// Render anidado del buffer:
//   📦 Conjunto: X         [▼ expandido]  [Quitar grupo]
//      📦 Subconjunto: Y   [▼ expandido]
//          🔧 Producto P1  x2  [Editar][Quitar]
//      🔧 Producto P2 (directo del conjunto)  [Editar][Quitar]
//   ── Items sueltos ──
//   🔧 Producto suelto  [Editar][Quitar]
//
// Iconos:
//   📦 grande (font-size 26) = Conjunto
//   📦 normal (font-size 18) = Subconjunto
//   🔧                       = Producto (hoja)
function _renderNpItemsListHtml() {
  if (!newProjectItemsBuffer || newProjectItemsBuffer.length === 0) {
    return '<div style="font-size:12px;color:#888;font-style:italic;text-align:center;padding:20px">Aún no hay items. Apretá "+ Agregar item" o "+ Agregar desde Matriz" para empezar.</div>';
  }

  // Agrupar items por groupKey, preservando el orden de aparición.
  // groupKey === null = item suelto (no grupal).
  const groupsOrder = [];   // [groupKey | null]
  const groupsMap = new Map(); // groupKey -> {nombre, items: [{idx, item}]}
  newProjectItemsBuffer.forEach((it, idx) => {
    const key = it.groupKey || null;
    if (!groupsMap.has(key)) {
      groupsOrder.push(key);
      groupsMap.set(key, {
        nombre: it.fromGrupo || null,
        items: []
      });
    }
    groupsMap.get(key).items.push({ idx, item: it });
  });

  let h = '';
  // Primero los grupos (orden de importación)
  groupsOrder.forEach(key => {
    if (key === null) return;  // los sueltos van al final
    h += _renderNpGroupCard(key, groupsMap.get(key));
  });
  // Items sueltos al final
  if (groupsMap.has(null)) {
    const sueltos = groupsMap.get(null);
    h += '<div style="margin-top:8px;font-size:11px;font-weight:700;color:#5F5E5A;text-transform:uppercase;letter-spacing:0.5px;padding:8px 4px 4px;border-top:1px solid #E8E6DF">Items sueltos</div>';
    sueltos.items.forEach(({ idx, item }) => {
      h += _renderNpItemLeaf(idx, item, false);
    });
  }
  return h;
}

// Renderiza la tarjeta de un grupo (conjunto) con sus subconjuntos y productos.
function _renderNpGroupCard(groupKey, groupData) {
  const expanded = !npExpanded.has(groupKey + '__col');  // por default expandido; el set guarda los colapsados
  // Total de items en el grupo
  const totalItems = groupData.items.length;
  const totalUnidades = groupData.items.reduce((acc, x) => acc + (x.item.cantidad || 1), 0);

  // Subdividir por subconjunto dentro del grupo. Cada subconjunto se muestra como
  // sub-card expandible. Productos directos del conjunto van fuera de subconjuntos.
  const subsMap = new Map();  // subLabel -> [{idx, item}]
  const directos = [];
  groupData.items.forEach(({ idx, item }) => {
    if (item.fromSubconjunto) {
      if (!subsMap.has(item.fromSubconjunto)) subsMap.set(item.fromSubconjunto, []);
      subsMap.get(item.fromSubconjunto).push({ idx, item });
    } else {
      directos.push({ idx, item });
    }
  });

  let h = '<div style="background:#fff;border:1px solid #C8C6BE;border-radius:6px;margin-bottom:8px;overflow:hidden">';
  // Header del conjunto
  h += '<div style="display:flex;align-items:center;padding:10px 12px;gap:10px;background:#F5F3EC">';
  h += '<button type="button" onclick="npToggleExpand(\'' + groupKey + '__col\')" style="background:transparent;border:none;padding:4px;font-size:14px;color:#5F5E5A;cursor:pointer;flex:0 0 auto">' + (expanded ? '▼' : '▶') + '</button>';
  h += '<span style="font-size:26px;flex:0 0 auto;line-height:1">📦</span>';
  h += '<div style="flex:1;min-width:0;cursor:pointer" onclick="npToggleExpand(\'' + groupKey + '__col\')">';
  h += '<div style="font-weight:700;color:#5F5E5A;font-size:14px">' + escapeHtml(groupData.nombre || 'Grupo') + '</div>';
  h += '<div style="font-size:11px;color:#888;margin-top:1px">' + totalItems + ' item(s) · ' + totalUnidades + ' unidad(es) total</div>';
  h += '</div>';
  h += '<button class="b b-icon b-d" onclick="newProjectRemoveGroup(\'' + groupKey + '\')" style="font-size:10px;padding:3px 8px;flex:0 0 auto">Quitar grupo</button>';
  h += '</div>';
  if (expanded) {
    h += '<div style="border-top:1px solid #E8E6DF;background:#FAFAF7;padding:8px 8px 8px 24px">';
    // Subconjuntos primero
    subsMap.forEach((items, subLabel) => {
      h += _renderNpSubconjuntoCard(groupKey, subLabel, items);
    });
    // Productos directos del conjunto
    directos.forEach(({ idx, item }) => {
      h += _renderNpItemLeaf(idx, item, true);
    });
    if (subsMap.size === 0 && directos.length === 0) {
      h += '<div style="font-size:11px;color:#888;font-style:italic;padding:4px 0">Sin items.</div>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// Renderiza la sub-tarjeta de un subconjunto con sus productos.
function _renderNpSubconjuntoCard(groupKey, subLabel, items) {
  const subKey = groupKey + '__sub__' + subLabel;
  const expanded = !npExpanded.has(subKey + '__col');
  const totalUnidades = items.reduce((acc, x) => acc + (x.item.cantidad || 1), 0);

  let h = '<div style="background:#fff;border:1px solid #C8C6BE;border-radius:5px;margin-bottom:6px;overflow:hidden">';
  h += '<div style="display:flex;align-items:center;padding:8px 10px;gap:8px">';
  h += '<button type="button" onclick="npToggleExpand(\'' + subKey + '__col\')" style="background:transparent;border:none;padding:4px;font-size:12px;color:#5F5E5A;cursor:pointer;flex:0 0 auto">' + (expanded ? '▼' : '▶') + '</button>';
  h += '<span style="font-size:18px;flex:0 0 auto;line-height:1">📦</span>';
  h += '<div style="flex:1;min-width:0;cursor:pointer" onclick="npToggleExpand(\'' + subKey + '__col\')">';
  h += '<div style="font-weight:600;color:#5F5E5A;font-size:12px">' + escapeHtml(subLabel) + '</div>';
  h += '<div style="font-size:10px;color:#888;margin-top:1px">' + items.length + ' item(s) · ' + totalUnidades + ' unidad(es)</div>';
  h += '</div>';
  h += '</div>';
  if (expanded) {
    h += '<div style="border-top:1px solid #E8E6DF;background:#FAFAF7;padding:6px 6px 6px 20px">';
    items.forEach(({ idx, item }) => {
      h += _renderNpItemLeaf(idx, item, true);
    });
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// Renderiza un item hoja (producto). insideGroup = true para usar fondo más claro
// (ya estamos dentro de una tarjeta de grupo).
function _renderNpItemLeaf(idx, it, insideGroup) {
  const matLbl = it.material_id ? ((materiales.find(m => m.id === it.material_id) || {}).nombre || '') : '';
  const fromMatrizChip = it.fromMatriz
    ? '<span style="font-size:10px;background:#E8F2FC;color:#0C447C;padding:1px 6px;border-radius:8px;margin-left:6px">de matriz</span>'
    : '';
  let procsInfo = '';
  if (it.fromMatriz && it.fromMatriz.productoId) {
    const cnt = productosMatrizProcesos.filter(pr => pr.producto_id === it.fromMatriz.productoId).length;
    procsInfo = ' · ' + cnt + ' proceso(s)';
  }
  const bg = insideGroup ? '#fff' : '#fff';
  let h = '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:' + bg + ';border:1px solid #E8E6DF;border-radius:5px;margin-bottom:5px">';
  // Icono / foto del producto (llave 🔧 + foto miniatura si tiene)
  if (it.foto_url) {
    h += '<img src="' + escapeHtml(it.foto_url) + '" style="width:42px;height:42px;object-fit:cover;border-radius:4px;flex:0 0 auto">';
  } else {
    h += '<div style="width:42px;height:42px;background:#E8E6DF;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto">🔧</div>';
  }
  h += '<div style="flex:1;min-width:0">';
  h += '<div style="font-weight:600;font-size:13px">' + escapeHtml(it.descripcion || '(sin descripción)') + fromMatrizChip + '</div>';
  const subInfo = [matLbl, it.codigo_cliente, it.presentacion_mat_prima].filter(Boolean).join(' · ');
  if (subInfo) h += '<div style="font-size:11px;color:#888;margin-top:2px">' + escapeHtml(subInfo) + procsInfo + '</div>';
  h += '</div>';
  h += '<label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#5F5E5A;flex:0 0 auto">Cant.:';
  h += '<input type="number" min="1" step="1" value="' + (it.cantidad || 1) + '" onchange="newProjectChangeItemCantidad(' + idx + ', this.value)" style="width:60px;padding:2px 4px;border:1px solid #C8C6BE;border-radius:3px;font-size:11px">';
  h += '</label>';
  h += '<div style="display:flex;flex-direction:column;gap:3px">';
  h += '<button class="b b-icon" onclick="newProjectEditItem(' + idx + ')" style="font-size:10px;padding:2px 8px">Editar</button>';
  h += '<button class="b b-icon b-d" onclick="newProjectRemoveItem(' + idx + ')" style="font-size:10px;padding:2px 8px">Quitar</button>';
  h += '</div>';
  h += '</div>';
  return h;
}

// Quitar todos los items de un grupo (conjunto importado) del buffer.
function newProjectRemoveGroup(groupKey) {
  const itemsDelGrupo = newProjectItemsBuffer.filter(it => it.groupKey === groupKey);
  if (itemsDelGrupo.length === 0) return;
  const nombreGrupo = itemsDelGrupo[0].fromGrupo || 'el grupo';
  confirmModal({
    titulo: 'Quitar grupo',
    mensaje: '¿Quitar el grupo "' + nombreGrupo + '" y sus ' + itemsDelGrupo.length + ' item(s) del proyecto?',
    textoConfirmar: 'Quitar grupo',
    onConfirm: () => {
      newProjectItemsBuffer = newProjectItemsBuffer.filter(it => it.groupKey !== groupKey);
      try { newProjectDraft = _newProjectCaptureFormValues(); } catch (e) {}
      renderNewProjectForm();
      toast('Grupo "' + nombreGrupo + '" quitado');
    }
  });
}

// Cambia la cantidad de un item del buffer.
function newProjectChangeItemCantidad(idx, value) {
  const n = parseInt(value);
  if (!n || n < 1) {
    toast('La cantidad debe ser ≥ 1', true);
    _refreshNpItemsList();
    return;
  }
  if (!newProjectItemsBuffer[idx]) return;
  newProjectItemsBuffer[idx].cantidad = n;
}

function _refreshNpItemsList() {
  const list = document.getElementById('np-items-list');
  if (list) list.innerHTML = _renderNpItemsListHtml();
  // Actualizar contador en la cabecera de items
  const headerCount = document.querySelector('.section-t span:last-child');
  // (no esencial, no rompe nada si no actualiza)
}

// Quitar un item del buffer.
function newProjectRemoveItem(idx) {
  if (!newProjectItemsBuffer[idx]) return;
  const it = newProjectItemsBuffer[idx];
  confirmModal({
    titulo: 'Quitar item',
    mensaje: '¿Quitar el item "' + (it.descripcion || '(sin descripción)') + '" del proyecto?',
    textoConfirmar: 'Quitar',
    onConfirm: () => {
      newProjectItemsBuffer.splice(idx, 1);
      try { newProjectDraft = _newProjectCaptureFormValues(); } catch (e) {}
      renderNewProjectForm();
    }
  });
}

// Guarda los valores del modal en el buffer.
function saveNewProjectItemFromModal(idx) {
  const desc = document.getElementById('np-it-desc').value.trim();
  if (!desc) { toast('Ingresá la descripción', true); return; }
  const cant = parseInt(document.getElementById('np-it-cant').value) || 0;
  if (cant < 1) { toast('La cantidad debe ser ≥ 1', true); return; }
  const codCli = document.getElementById('np-it-codcli').value.trim() || null;
  const matValEl = document.getElementById('np-it-material-value');
  const matId = matValEl && matValEl.value ? parseInt(matValEl.value) : null;
  const pres = document.getElementById('np-it-pres').value.trim() || null;
  const fechaFin = document.getElementById('np-it-fechafin').value || null;
  const estado = document.getElementById('np-it-estado').value;
  const fotoUrl = (document.getElementById('photo-url-np-item') || { value: '' }).value.trim() || null;

  const isNew = idx === null || idx === undefined;
  const existing = isNew ? {} : newProjectItemsBuffer[idx];
  // Mantener fromMatriz y otros metadatos si existe
  const item = Object.assign({}, existing, {
    descripcion: desc,
    cantidad: cant,
    codigo_cliente: codCli,
    material_id: matId,
    presentacion_mat_prima: pres,
    fecha_fin_estipulada: fechaFin,
    estado: estado,
    foto_url: fotoUrl
  });
  if (isNew) {
    newProjectItemsBuffer.push(item);
  } else {
    newProjectItemsBuffer[idx] = item;
  }
  document.getElementById('np-item-modal').remove();
  // Capturar el form actual para preservarlo al re-renderizar
  try { newProjectDraft = _newProjectCaptureFormValues(); } catch (e) {}
  renderNewProjectForm();
}

function _llenarComboContactoProj(clienteId, selectedId) {
  const sel = document.getElementById('f-contacto');
  if (!sel) return;
  if (!clienteId) {
    sel.innerHTML = '<option value="">— Seleccioná un cliente primero —</option>';
    sel.disabled = true;

    return;
  }
  sel.disabled = false;
  const contactos = contactosDeCliente(clienteId);
  let h = '<option value="">— Sin asignar —</option>';
  contactos.forEach(c => {
    const lbl = [c.apellido, c.nombre].filter(Boolean).join(', ') || '(sin nombre)';
    const sel_ = selectedId && selectedId === c.id ? ' selected' : '';
    h += '<option value="' + c.id + '"' + sel_ + '>' + escapeHtml(lbl) + '</option>';
  });
  h += '<option value="__nuevo__" style="color:#0C447C;font-weight:600">+ Nuevo contacto</option>';
  sel.innerHTML = h;
  sel.onchange = onContactoComboChange;

async function saveNewProject() {
  const cliente_id = parseInt(document.getElementById('f-cliente').value);
  const pedido_nro = document.getElementById('f-pedido').value.trim() || null;
  const descripcion = document.getElementById('f-desc').value.trim();
  const urgencia = document.getElementById('f-urg').value;
  const estado = document.getElementById('f-estado').value;
  const fotoUrl = document.getElementById('photo-url-proj').value.trim() || null;
  const fechaIngreso = document.getElementById('f-fechaing').value || null;
  const fechaEntrega = document.getElementById('f-fechaentrega').value || null;
  const clienteFinal = document.getElementById('f-clifinal').value.trim() || null;
  // v62: contacto_id (opcional pero con warning amarillo)
  const contactoSel = document.getElementById('f-contacto');
  const contacto_id = contactoSel && contactoSel.value && contactoSel.value !== '__nuevo__'
    ? parseInt(contactoSel.value) : null;
  const errPedido = document.getElementById('err-pedido');
  errPedido.style.display = 'none';
  if (!cliente_id) { toast('Elegi un cliente', true); return; }
  if (!descripcion) { toast('Ingresa descripcion del proyecto', true); return; }
  if (!fechaEntrega) { toast('Ingresa fecha de entrega del proyecto', true); return; }
  if (pedido_nro) {
    const dup = proyectos.find(p => p.pedido_nro === pedido_nro);
    if (dup) { errPedido.textContent = 'Ya existe un proyecto con el pedido ' + pedido_nro + ' (cliente: ' + clN(dup.cliente_id) + ')'; errPedido.style.display = 'block'; return; }
  }
  if (!newProjectItemsBuffer || newProjectItemsBuffer.length === 0) {
    toast('Agregá al menos un item antes de crear el proyecto', true);
    return;
  }

  showSpinner('Creando proyecto...');

  try {
    // 1. Crear proyecto
    const { data: newProj, error: projErr } = await sb.from('proyectos').insert({
      cliente_id, pedido_nro, descripcion, urgencia, foto_url: fotoUrl,
      fecha_ingreso: fechaIngreso, fecha_entrega: fechaEntrega,
      cliente_final: clienteFinal, estado, contacto_id
    }).select().single();
    if (projErr) { toast('Error creando proyecto: ' + projErr.message, true); return; }

    // v65: si vino con foto desde el form, insertarla en la tabla `fotos`
    // polimórfica. Si no se hace, la galería del proyecto sale vacía cuando
    // se entra a la vista de detalle (lee de `fotos`, no de `proyectos.foto_url`).
    if (fotoUrl) {
      await sb.from('fotos').insert({
        entidad_tipo: 'proyecto',
        entidad_id: newProj.id,
        url: fotoUrl,
        orden: 0
      });
    }

    // Setear nav y cache temporal para que _importarProductoCore funcione
    nav = { ...nav, view: 'project', projectId: newProj.id };
    proyectos.push({ ...newProj, items: [] });

    const total = newProjectItemsBuffer.length;
    updateSpinnerMsg('Creando ' + total + ' item(s)...');

    let creados = 0;
    // Mapeo global pmp_id → act_id para correlatividades inter-producto al final.
    const globalPmpToAct = {};
    // Procesar items en batches de 5 (paralelos)
    const BATCH_SIZE = 5;
    for (let i = 0; i < newProjectItemsBuffer.length; i += BATCH_SIZE) {
      const batch = newProjectItemsBuffer.slice(i, i + BATCH_SIZE);
      updateSpinnerMsg('Creando item(s) ' + (i + 1) + ' a ' + Math.min(i + BATCH_SIZE, total) + ' de ' + total + '...');
      const promesas = batch.map(item => _crearItemDesdeBuffer(item, newProj, descripcion, urgencia, fotoUrl, fechaIngreso, clienteFinal).then(res => {
        if (!res.error) {
          creados++;
          if (res.pmpToActMap) Object.assign(globalPmpToAct, res.pmpToActMap);
        }
        return res;
      }));
      await Promise.all(promesas);
    }

    // Correlatividades inter-producto: solo si hay items que vinieron de matriz
    const productosImportadosIds = new Set(
      newProjectItemsBuffer
        .filter(it => it.fromMatriz)
        .map(it => it.fromMatriz.productoId)
    );
    if (productosImportadosIds.size > 1) {
      updateSpinnerMsg('Conectando dependencias entre items...');
      const corrsInterProducto = productosMatrizCorrelatividades.filter(c => {
        const pPred = productosMatrizProcesos.find(p => p.id === c.predecesor_id);
        const pSuc = productosMatrizProcesos.find(p => p.id === c.sucesor_id);
        if (!pPred || !pSuc) return false;
        if (pPred.producto_id === pSuc.producto_id) return false;
        return productosImportadosIds.has(pPred.producto_id) && productosImportadosIds.has(pSuc.producto_id);
      });
      if (corrsInterProducto.length > 0) {
        const corrInserts = corrsInterProducto
          .map(c => ({
            predecesor_id: globalPmpToAct[c.predecesor_id],
            sucesor_id: globalPmpToAct[c.sucesor_id]
          }))
          .filter(c => c.predecesor_id && c.sucesor_id);
        if (corrInserts.length > 0) {
          await sb.from('correlatividades').insert(corrInserts);
        }
      }
    }

    // Limpiar estado
    newProjectMatrizSelection = null;
    newProjectDraft = null;
    newProjectItemsBuffer = [];
    updateSpinnerMsg('Refrescando datos...');
    await loadAll();
    toast('Proyecto creado con ' + creados + ' item(s)');
    navigate({ view: 'project', projectId: newProj.id });
  } finally {
    hideSpinner();
  }
}

// Crea UN item del buffer en la DB. Si el item vino de matriz, copia ubicaciones,
// procesos y genera las correlatividades intra-producto (de matriz o secuencial
// fallback). Si es item libre, solo crea el item sin procesos.
//
// Retorna { itemId, actIds, pmpToActMap } o { error }.
async function _crearItemDesdeBuffer(item, proj, projDesc, urgencia, projFoto, fechaIngreso, clienteFinal) {
  const itemPayload = {
    proyecto_id: proj.id,
    cliente_id: proj.cliente_id,
    pedido_nro: proj.pedido_nro,
    descripcion: item.descripcion,
    cantidad: item.cantidad || 1,
    foto_url: item.foto_url || null,
    material_id: item.material_id || null,
    codigo_cliente: item.codigo_cliente || null,
    presentacion_mat_prima: item.presentacion_mat_prima || null,
    fecha_fin_estipulada: item.fecha_fin_estipulada || null,
    estado: item.estado || 'Espera MP'
  };
  if (item.fromMatriz) {
    itemPayload.imported_from_matriz_id = item.fromMatriz.productoId;
  }
  const { data: newItem, error: itemErr } = await sb.from('items').insert(itemPayload).select().single();
  if (itemErr) { console.error('Error creando item:', itemErr); return { error: itemErr.message }; }

  // v65: si el item vino con foto, insertarla en la tabla `fotos` polimórfica.
  // Sin esto, la galería del item sale vacía al entrar a su vista de detalle.
  if (item.foto_url) {
    await sb.from('fotos').insert({
      entidad_tipo: 'item',
      entidad_id: newItem.id,
      url: item.foto_url,
      orden: 0
    });
  }

  let pmpToActMap = {};

  if (item.fromMatriz) {
    // Ubicaciones (batch)
    const ubics = item.fromMatriz.ubicaciones || [];
    if (ubics.length > 0) {
      const ubicInserts = ubics.map(u => ({
        item_id: newItem.id,
        cliente_id: u.cliente_id,
        sector_id: u.sector_id,
        equipo_id: u.equipo_id,
        conjunto_id: u.conjunto_id,
        subconjunto_id: u.subconjunto_id
      }));
      await sb.from('items_ubicaciones').insert(ubicInserts);
    }
    // Procesos (batch)
    const procs = item.fromMatriz.procesos || [];
    if (procs.length > 0) {
      const actInserts = procs.map((pp, i) => ({
        item_id: newItem.id,
        cliente_id: proj.cliente_id,
        pedido_nro: proj.pedido_nro,
        descripcion: item.descripcion + ' - ' + (pp.proceso || ''),
        descripcion_proyecto: projDesc,
        descripcion_trabajo: pp.trabajo_a_realizar || null,
        proceso: pp.proceso,
        duracion_estimada_min: pp.duracion_estimada_min,
        duracion_margen_min: pp.duracion_margen_min || 0,
        duracion_operario_min: pp.duracion_operario_min,
        duracion_planificador_min: (pp.duracion_estimada_min || 0) + (pp.duracion_margen_min || 0),
        tipo: pp.tipo,
        maquina_ideal_id: pp.maquina_ideal_id,
        maquina_ideal_nombre: pp.maquina_ideal_nombre,
        maquinas_suplentes_ids: pp.maquinas_suplentes,
        operario_ideal_id: pp.operario_ideal_id,
        operarios_suplentes_ids: pp.operarios_suplentes,
        urgencia: urgencia,
        foto_proyecto_url: projFoto,
        foto_url: item.foto_url,
        fecha_ingreso: fechaIngreso,
        cliente_final: clienteFinal,
        orden: i + 1,
        estado: 'sin_planificar',
        fecha: '1900-01-01',
        hora_inicio: '06:00:00',
        estado_proceso: 'Planificación Pendiente'
      }));
      const { data: actsData, error: actErr } = await sb.from('actividades_tablero').insert(actInserts).select('id');
      if (actErr) { console.error('Error creando procesos:', actErr); return { error: actErr.message }; }
      const newActIds = (actsData || []).map(x => x.id);
      // Mapeo pmp_id → act_id
      procs.forEach((pp, idx) => {
        if (newActIds[idx]) pmpToActMap[pp.id] = newActIds[idx];
      });
      // Correlatividades intra-producto
      const pmpIds = new Set(procs.map(pp => pp.id));
      const corrsIntra = productosMatrizCorrelatividades.filter(c =>
        pmpIds.has(c.predecesor_id) && pmpIds.has(c.sucesor_id));
      if (corrsIntra.length > 0) {
        const corrInserts = corrsIntra
          .map(c => ({
            predecesor_id: pmpToActMap[c.predecesor_id],
            sucesor_id: pmpToActMap[c.sucesor_id]
          }))
          .filter(c => c.predecesor_id && c.sucesor_id);
        if (corrInserts.length > 0) await sb.from('correlatividades').insert(corrInserts);
      } else if (newActIds.length > 1) {
        // Fallback secuencial (producto sin correlatividades definidas)
        const corrInserts = [];
        for (let i = 0; i < newActIds.length - 1; i++) {
          corrInserts.push({ predecesor_id: newActIds[i], sucesor_id: newActIds[i + 1] });
        }
        await sb.from('correlatividades').insert(corrInserts);
      }
    }
  }
  // Item libre (sin matriz): no se crean procesos, el usuario los agregará después
  return { itemId: newItem.id, pmpToActMap: pmpToActMap };
}

      h += '<span style="font-size:18px;flex:0 0 auto">📦</span>';

      h += '<div style="font-size:11px;color:#5F5E5A">' + g.items.length + ' producto(s) · ' + procTotal + ' proceso(s)' + (g.notas ? ' · 📝 con notas' : '') + '</div>';

        g.items.forEach(it => {

    // Render de sueltos
    sueltos.forEach(it => {

      h += renderItemCard(it, numero);

  }
  h += '</div>';
  main.innerHTML = h;
  setupPhotoPaste();

  if (!_projectEditSnapshot || _projectEditSnapshot.projectId !== proj.id) {
    _takeProjectSnapshot(proj.id);
  }

// v64: Captura snapshot de los campos editables del proyecto + fotos.
// Lo usamos para detectar cambios sin guardar al salir, y para revertir si
// el usuario elige "Descartar".
// v66: normaliza una fecha que puede venir como "2025-05-14" o
// "2025-05-14T00:00:00+00:00" o vacía. Devuelve solo "YYYY-MM-DD" o "".
function _normDate(d) {
  if (!d) return '';
  const s = String(d);
  // Si tiene "T", recortar al primer "T"
  const idxT = s.indexOf('T');
  return idxT >= 0 ? s.substring(0, idxT) : s;
}

// v66: HTML "vacío" desde el editor rich text puede ser "", "<br>", "<p></p>",
// "<p><br></p>", " ", etc. Devuelve true si el HTML no tiene contenido textual.
function _isHtmlEmpty(html) {
  if (!html) return true;
  // Quitar tags y &nbsp;, dejar solo texto plano
  const tmp = document.createElement('div');
  tmp.innerHTML = String(html);
  const text = (tmp.textContent || '').replace(/\u00a0/g, ' ').trim();
  return text === '';
}

// v66: Compara dos HTMLs ignorando diferencias triviales de formato (espacios,
// envoltura en <p>, vacíos equivalentes). NO compara formato fino (negrita,
// estilos). Para el caso de comparar snapshot vs DOM de un editor rich text.
function _htmlEquivalent(a, b) {
  const aEmpty = _isHtmlEmpty(a);
  const bEmpty = _isHtmlEmpty(b);
  if (aEmpty && bEmpty) return true;
  if (aEmpty !== bEmpty) return false;
  // Comparar texto plano (suficiente para nuestros casos donde el editor
  // re-renderiza el HTML guardado en DB y puede normalizar tags).
  const norm = (h) => {
    const tmp = document.createElement('div');
    tmp.innerHTML = String(h);
    return (tmp.textContent || '').replace(/\s+/g, ' ').trim();
  };
  return norm(a) === norm(b);
}

function _takeProjectSnapshot(projectId) {
  const proj = getProject(projectId);
  if (!proj) { _projectEditSnapshot = null; return; }
  const fotosProj = getFotos('proyecto', projectId).map(f => ({ id: f.id, url: f.url, orden: f.orden, descripcion: f.descripcion }));
  _projectEditSnapshot = {
    projectId,
    campos: {
      descripcion: proj.descripcion || '',
      urgencia: proj.urgencia || 'media',
      pedido_nro: proj.pedido_nro || '',
      cliente_id: proj.cliente_id || null,

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FAFAF8;color:#2C2C2A;font-size:13px;display:flex;flex-direction:column;overflow:hidden}

.hd-l{display:flex;align-items:center;gap:16px}.hd-t{font-size:17px;font-weight:600}.hd-d{font-size:11px;color:#888780}

.hr{background:#DEEBF7;border-right:2px solid #A8A79F;border-bottom:2px solid #A8A79F;padding:6px 8px;font-size:13px;font-weight:700;position:sticky;left:0;z-index:10;display:flex;flex-direction:column;justify-content:center;min-height:68px;color:#0C447C}
.hr.td{background:#A8D8F0}.hr.ps{background:#9E9C96;color:#5F5E5A}

.cl{border-right:3px solid #1a1a1a;border-bottom:2px solid #1a1a1a;position:relative;overflow:visible;background:#fff;padding:0}
.cl.ps{background:#9E9C96}.cl.td{background:#fff}.cl.ra{background:#F3F2EC}.cl.ra.ps{background:#9E9C96}
.wk-sep{border-bottom:8px solid #1a1a1a !important}
.ab{position:absolute;bottom:2px;right:4px;border:1px dashed #C8C6BE;border-radius:3px;padding:2px 6px;font-size:8px;color:#888780;background:rgba(255,255,255,.8);z-index:6;cursor:pointer}

.ab.pb:hover{border-color:#854F0B;background:#FFF4D5}

.nl{position:absolute;top:0;bottom:0;left:54.55%;border-left:1.5px dashed #C8C6BE;pointer-events:none;z-index:2}
.sg{position:absolute;top:0;bottom:0;right:0;width:45.45%;background:#9E9C96;pointer-events:none;z-index:1}
.bk{position:absolute;border-radius:4px;padding:3px 5px;cursor:pointer;font-size:9px;line-height:1.3;border-style:solid;border-width:5px 2.5px;user-select:none;z-index:5;display:flex;flex-direction:column;justify-content:center;overflow:hidden;min-width:6px}
.bk-u{background:#1A1A1A;color:#fff}.bk-u .bt,.bk-u .bs,.bk-u .bm,.bk-u .bma{color:#fff}
.bk-a{background:#FF9B9B;color:#000}.bk-m{background:#F0D47A;color:#000}.bk-b{background:#BDECB6;color:#000}
.bk-pulmon{background:repeating-linear-gradient(45deg,#FFF4D5,#FFF4D5 6px,#F0E0A0 6px,#F0E0A0 12px);color:#5F4811}
.bk-pulmon .bt,.bk-pulmon .bs,.bk-pulmon .bm,.bk-pulmon .bma{color:#5F4811}
.bk-d{background:#E0DEDA;opacity:.5}
.bt{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px}
.bs{color:#2C2C2A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:9px}

.ba{position:absolute;top:2px;right:3px;width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.25);font-size:7px;display:flex;align-items:center;justify-content:center;color:inherit;font-weight:700}
/* Advertencia: emoji de triangulo con punta arriba (estandar Unicode U+26A0).
   Posicionado en la esquina superior izquierda del bloque. */
.bk-warn{position:absolute;top:0;left:1px;font-size:13px;line-height:1;z-index:6;pointer-events:none;text-shadow:0 0 2px rgba(255,255,255,.8)}
/* Cartel rojo "proceso eliminado": emoji de prohibido (U+26D4) tambien con
   punta visual mas natural. */
.bk-deleted{position:absolute;top:0;left:1px;font-size:13px;line-height:1;z-index:6;pointer-events:none;text-shadow:0 0 2px rgba(255,255,255,.8)}
.tip{position:fixed;background:#2C2C2A;color:#fff;padding:10px 14px;border-radius:8px;font-size:11px;line-height:1.5;z-index:400;max-width:320px;pointer-events:none}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.15);z-index:200;display:flex;align-items:center;justify-content:center}
/* Allow clicks on background to pass through when modal is dragged/resized,
   but the backdrop still dims things visually. */
.md{background:#fff;border-radius:10px;padding:20px;min-width:380px;max-width:540px;max-height:80vh;overflow:auto;border:1px solid #C8C6BE;resize:both;box-shadow:0 8px 30px rgba(0,0,0,.2);position:relative}

/* Selector items: cards with clear separation + hover */

.ms-wrap{position:relative}
.ms-btn{padding:6px 10px;border:1px solid #C8C6BE;border-radius:4px;background:#fff;font-size:12px;cursor:pointer;min-height:29px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;box-sizing:border-box}
.ms-btn:hover{border-color:#888}
.ms-dd{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #C8C6BE;border-radius:4px;margin-top:2px;box-shadow:0 4px 10px rgba(0,0,0,.1);z-index:50;max-height:220px;overflow-y:auto;min-width:180px}
.ms-dd label{display:flex;align-items:center;gap:6px;padding:6px 10px;cursor:pointer;font-size:12px;white-space:nowrap;user-select:none}
.ms-dd label:hover{background:#F5FAFF}
.ms-dd input[type="checkbox"]{flex-shrink:0}
.lg{display:flex;flex-wrap:wrap;gap:12px;padding:8px 16px;background:#F3F2EC;border-bottom:1px solid #C8C6BE;font-size:10px;align-items:center}
.li{display:flex;align-items:center;gap:4px}
.ls{width:14px;height:10px;border-radius:2px;border:1px solid #888}
.lo{width:14px;height:10px;border:2.5px solid;border-radius:2px;background:#fff}
.ld{width:1px;height:14px;background:#C8C6BE;margin:0 4px}
.to{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:10px 24px;border-radius:8px;font-size:12px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}.to.sh{opacity:1}
.b-u{background:#FAEEDA;color:#633806;border-color:#FAC775}
.b-p{background:#E6F1FB;color:#0C447C;border-color:#85B7EB;font-weight:500}
.bk:hover{filter:brightness(.93)}.bk:active{cursor:grabbing}.bk.dg{opacity:.3}
.cl.dov{outline:2px dashed #378ADD;outline-offset:-2px;background:rgba(55,138,221,.12)!important}
.md-x{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:#888780}
.ef{margin-bottom:10px}.ef-l{font-size:11px;color:#888780;margin-bottom:3px}
.ef-i{width:100%;padding:6px 8px;border:1px solid #C8C6BE;border-radius:5px;font-size:13px}
.alert-stack{position:fixed;bottom:16px;right:16px;z-index:350;display:flex;flex-direction:column-reverse;gap:10px;max-height:70vh;overflow-y:auto;align-items:flex-end}
.alert-card{border-radius:14px;padding:14px 16px;width:300px;font-size:12px;box-shadow:0 6px 24px rgba(0,0,0,.25);animation:alertIn .3s ease;position:relative;color:#000}
.alert-card.alert-gray{background:#D8D8D8}.alert-card.alert-yellow{background:#FFEAA0}.alert-card.alert-red{background:#FF9B9B}
.alert-card .alert-x{position:absolute;top:8px;right:10px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.25);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;line-height:1}
.alert-card .alert-x:hover{background:rgba(0,0,0,.45)}
.alert-card .alert-title{font-weight:700;font-size:13px;margin-bottom:6px;padding-right:30px}
.alert-card .alert-body{line-height:1.6;font-size:11px}
.alert-close-all{background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:10px;padding:8px 20px;font-size:11px;cursor:pointer;font-weight:600}
.alert-close-all:hover{background:rgba(0,0,0,.75)}
@keyframes alertIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>

<body>

<div class="hd">
  <div class="hd-l">
    <div>
      <div class="hd-t">Tablero por Operario — Velasco</div>
      <div class="hd-d" id="hd-d"></div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="b-nav" onclick="navWeek(-1)">← Sem. ant.</button>

</div>

<div class="to" id="to"></div>

<script>
const SUPA_URL = 'https://mzjbcfkalvduimqhawur.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16amJjZmthbHZkdWltcWhhd3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzY0MzcsImV4cCI6MjA5MDQ1MjQzN30.P7so8AbiRgR9bIWttIqoG6ievY4cxgDMjzZQLx-95-Q';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// Operator column order (left to right)
const OP_ORDER = ['Roman','Alfredo','Ariel','Tomas C.','Victor','Claudio'];

// Machine -> border color mapping (this tablero uses machine colors on borders)
const MACH_COLORS = {
  'ST-30':        '#C62828',
  'TR-1':         '#fa6497',
  'TC-Alfredo':   '#FF9800',
  'AR-3300':      '#2E7D32',
  'AR-1000':      '#6ffc74',
  'VF3-YT':       '#1565C0',
  'VF4':          '#73bbf5',
  'Perfect-Jet':  '#26dad4',
  'Otra':         '#9E9E9E'
};
function machColor(machId) {
  const m = maq.find(x => x.id === machId);
  if (!m) return '#9E9E9E';
  return MACH_COLORS[m.nombre] || '#9E9E9E';
}

const GAP = 10;
const DAY_MIN_HEIGHT = 104;
const MAX_SIMULTANEAS = 3;  // Max simultaneous activities per operator (4+ = blocked)

// Vacation data (hardcoded for now; matches v10)
const VACACIONES = [
  {operarioNombre:'Ariel', desde:'2026-04-13', hasta:'2026-04-18'}
];
function getVacaciones(dateStr){
  return VACACIONES.filter(v=>dateStr>=v.desde&&dateStr<=v.hasta).map(v=>{
    const op=ops.find(o=>o.nombre===v.operarioNombre);
    return{nombre:v.operarioNombre.split(' ')[0],color:op?op.color_borde:'#888'};
  });
}

// ========== STATE ==========
let maq=[],ops=[],cls=[],acts=[],items=[],proys=[],corrs=[],uStack=[],dragD=null,tipEl=null,weekOffset=0;
// HTML escape (used by modals when rendering names that may have & < > " ').
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
// Sticky preference for what to do with pulmones in the way of a move.
// 'cascadear' (default) treats them like any activity and shifts them forward.
// 'pisar' deletes them when they overlap. Persisted in localStorage.
let pulmonActionPref = (function () {
  try { return localStorage.getItem('velasco_pulmonAction') || 'cascadear'; }
  catch (e) { return 'cascadear'; }
})();
function setPulmonActionPref(v) {
  pulmonActionPref = v;
  try { localStorage.setItem('velasco_pulmonAction', v); } catch (e) {}
}
// States that allow an activity to appear in the "+" picker
const PROJ_ACTIVE_FOR_TABLERO = new Set(['Pedido']);
const ITEM_ACTIVE_FOR_TABLERO = new Set(['Espera MP', 'Llegó MP', 'Proceso', 'Enviar a TT', 'TT', 'Llegó TT']);
function isActAvailableForPlanning(a) {
  if (a.estado !== 'sin_planificar') return false;
  const it = items.find(x => x.id === a.item_id);
  if (!it) return true;  // legacy activities without item_id: allow
  if (!ITEM_ACTIVE_FOR_TABLERO.has(it.estado || 'Espera MP')) return false;
  const p = proys.find(x => x.id === it.proyecto_id);
  if (!p) return true;  // legacy
  if (!PROJ_ACTIVE_FOR_TABLERO.has(p.estado || 'Pedido')) return false;
  return true;
}

// Returns true when ALL predecessors are either Planificado (in board) or Cerrado.
// If any predecessor is still in 'Planificación Pendiente', this activity should
// appear greyed out in the "+" picker.
function hasPredecessorsReady(actId) {
  const preds = corrs.filter(c => c.sucesor_id === actId).map(c => c.predecesor_id);
  if (preds.length === 0) return true;
  for (const pid of preds) {
    const pa = acts.find(a => a.id === pid);
    if (!pa) continue;  // missing — treat as not blocking
    // v70 Fase 10: una actividad marcada como hecha (completada) NO bloquea
    // a sus sucesores, sin importar dónde esté planificada.
    if (pa.estado === 'completada') continue;
    const ps = pa.estado_proceso || 'Planificación Pendiente';
    if (ps === 'Planificación Pendiente') return false;
  }
  return true;
}
let alertCounter = 0;
let suppressNextToast = false;

// ========== DATE/TIME HELPERS ==========
function getDays(){
  const today=new Date();today.setHours(12,0,0,0);
  const days=[];
  const baseMonday=new Date(today);baseMonday.setDate(today.getDate()-((today.getDay()+6)%7));
  const firstDay=new Date(baseMonday);firstDay.setDate(baseMonday.getDate()+(weekOffset*7)-1);
  for(let i=0;i<8;i++){
    const d=new Date(firstDay);d.setDate(firstDay.getDate()+i);
    if(d.getDay()===0){firstDay.setDate(firstDay.getDate()+1);i--;continue}
    const tk=dK(today),dk=dK(d);
    days.push({date:new Date(d),type:dk===tk?'today':(dk<tk?'past':'future')});
  }
  return days;
}
function navWeek(dir){
  if(dir===0)weekOffset=0;else weekOffset+=dir;
  render();
  document.getElementById('hd-d').textContent=weekOffset===0?new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'}):'Semana '+(weekOffset>0?'+':'')+weekOffset;
}
function fD(d){return['Dom','Lun','Mar','Mie','Jue','Vie','Sab'][d.getDay()]+' '+d.getDate()+'/'+(d.getMonth()+1)}
function dK(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function tM(t){if(!t)return 0;const p=t.split(':');return+p[0]*60+(+p[1])}
function mT(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}
function pL(m){return Math.max(0,(m-360)/660*100)}
function pW(d){return d/660*100}
function opC(id){const o=ops.find(x=>x.id===id);return o?o.color_borde:'#888'}
function opN(id){
  const o=ops.find(x=>x.id===id);
  if(!o)return'?';
  const ap=(o.apellido||'').trim();
  return ap?(o.nombre+' '+ap.charAt(0).toUpperCase()+'.'):(o.nombre||'?');
}
function opI(name){const o=ops.find(x=>x.nombre===name);return o?o.id:null}
function clN(id){const c=cls.find(x=>x.id===id);return c?c.nombre:'?'}
function mN(id){const m=maq.find(x=>x.id===id);return m?m.nombre:'?'}
function mI(n){const m=maq.find(x=>x.nombre===n);return m?m.id:null}
// REGLA GLOBAL: el tablero NUNCA usa los valores actuales del proceso
// (a.duracion_estimada_min, a.tipo, a.duracion_operario_min, etc.) cuando hay
// un snapshot reconocido por el planificador (las columnas ot_ack_*). Esto
// garantiza que cualquier modificacion en Proyectos quede pendiente hasta
// que el responsable apriete "Aplicar cambios de OT" en el bloque.
// Helpers para extraer el valor "efectivo" que el tablero debe usar:
function effDurEstimada(a) {
  return (a.ot_ack_dur_estimada_min !== null && a.ot_ack_dur_estimada_min !== undefined)
    ? a.ot_ack_dur_estimada_min : a.duracion_estimada_min;
}
function effMargen(a) {
  return (a.ot_ack_margen_min !== null && a.ot_ack_margen_min !== undefined)
    ? a.ot_ack_margen_min : (a.duracion_margen_min || 0);
}
function effSetup(a) {
  return (a.ot_ack_setup_min !== null && a.ot_ack_setup_min !== undefined)
    ? a.ot_ack_setup_min : a.duracion_operario_min;
}
function effTipo(a) {
  return (a.ot_ack_tipo !== null && a.ot_ack_tipo !== undefined && a.ot_ack_tipo !== '')
    ? a.ot_ack_tipo : a.tipo;
}

// Duracion total de la actividad. Prioriza duracion_planificador_min (lo que
// el usuario edito en el modal "Duracion total") sobre el snapshot ack.
function D(a){
  if (a.duracion_planificador_min !== null && a.duracion_planificador_min !== undefined) {
    return a.duracion_planificador_min;
  }
  return effDurEstimada(a) + effMargen(a);
}
// Helpers de tipo (usan el snapshot ack, no el campo actual del proceso):
function isAuto(a) { const t = effTipo(a); return t === 'automatica' || t === 'semi_automatica'; }
function is247(a) { return effTipo(a) === 'automatica'; }
function isSemi(a) { return effTipo(a) === 'semi_automatica'; }
function isManual(a) { return effTipo(a) === 'manual'; }
function tipoLabel(a) {
  const t = effTipo(a);
  if (t === 'automatica') return 'auto 24/7';
  if (t === 'semi_automatica') return 'semi';
  return 'manual';
}
// Operator time: how long the operator is attached to the activity.
// Para auto/semi: solo el setup. Para manual: toda la duracion.
// Usa effSetup (snapshot del setup que el planificador reconocio).
function Dop(a) {
  if (isAuto(a)) {
    const s = effSetup(a);
    if (s !== null && s !== undefined) return s;
  }
  return D(a);
}

// Detecta divergencia entre los valores actuales del proceso (cargados por
// Oficina Tecnica desde proyectos.html) y los valores que el planificador ha
// "reconocido" o "aplicado" (guardados en columnas ot_ack_*).
// Devuelve un objeto:
//   { hasDiv: bool,                              // hay alguna divergencia (sin contar eliminado)
//     isDeleted: bool,                           // proceso_eliminado=true (caso especial)
//     fields: {                                  // campos divergentes con sus valores
//       dur_estimada: { ot, ack } | null,
//       margen:       { ot, ack } | null,
//       setup:        { ot, ack } | null,
//       tipo:         { ot, ack } | null,
//       op_ideal:     { ot, ack } | null,
//       maq_ideal:    { ot, ack, otNombre, ackNombre } | null
//     }
//   }
// Si una columna ot_ack_* es null/undefined (caso de actividad no migrada),
// se considera que NO hay divergencia para ese campo (default conservador,
// evita falsos positivos en datos legacy).
function hasOTDivergence(a) {
  const out = { hasDiv: false, isDeleted: !!a.proceso_eliminado, fields: {} };
  function diff(otVal, ackVal) {
    if (ackVal === null || ackVal === undefined) return false; // legacy / no migrado
    return otVal !== ackVal;
  }
  if (diff(a.duracion_estimada_min, a.ot_ack_dur_estimada_min)) {
    out.fields.dur_estimada = { ot: a.duracion_estimada_min, ack: a.ot_ack_dur_estimada_min };
    out.hasDiv = true;
  }
  if (diff(a.duracion_margen_min || 0, a.ot_ack_margen_min)) {
    out.fields.margen = { ot: a.duracion_margen_min || 0, ack: a.ot_ack_margen_min };
    out.hasDiv = true;
  }
  if (diff(a.duracion_operario_min, a.ot_ack_setup_min)) {
    out.fields.setup = { ot: a.duracion_operario_min, ack: a.ot_ack_setup_min };
    out.hasDiv = true;
  }
  if (diff(a.tipo, a.ot_ack_tipo)) {
    out.fields.tipo = { ot: a.tipo, ack: a.ot_ack_tipo };
    out.hasDiv = true;
  }
  if (diff(a.operario_ideal_id, a.ot_ack_operario_ideal_id)) {
    out.fields.op_ideal = { ot: a.operario_ideal_id, ack: a.ot_ack_operario_ideal_id };
    out.hasDiv = true;
  }
  // Para maquina ideal comparar id Y nombre (el caso "Otra")
  if (diff(a.maquina_ideal_id, a.ot_ack_maquina_ideal_id) ||
      diff(a.maquina_ideal_nombre, a.ot_ack_maquina_ideal_nombre)) {
    out.fields.maq_ideal = {
      ot: a.maquina_ideal_id,
      ack: a.ot_ack_maquina_ideal_id,
      otNombre: a.maquina_ideal_nombre,
      ackNombre: a.ot_ack_maquina_ideal_nombre
    };
    out.hasDiv = true;
  }
  return out;
}

// Aplica los valores actuales del proceso a las columnas ot_ack_*. Esto
// "reconoce" las divergencias y limpia el triangulo amarillo. Si OT modifica
// algo despues, las columnas ack quedan desactualizadas y el triangulo
// vuelve a aparecer.
async function applyOTAck(actId, fieldsToAck) {
  const a = acts.find(x => x.id === actId); if (!a) return;
  const payload = {};
  // Si fieldsToAck no se pasa, ack todos los campos de divergencia
  if (!fieldsToAck) {
    payload.ot_ack_dur_estimada_min = a.duracion_estimada_min;
    payload.ot_ack_margen_min = a.duracion_margen_min || 0;
    payload.ot_ack_setup_min = a.duracion_operario_min;
    payload.ot_ack_tipo = a.tipo;
    payload.ot_ack_operario_ideal_id = a.operario_ideal_id;
    payload.ot_ack_maquina_ideal_id = a.maquina_ideal_id;
    payload.ot_ack_maquina_ideal_nombre = a.maquina_ideal_nombre;
  } else {
    if (fieldsToAck.dur_estimada) payload.ot_ack_dur_estimada_min = a.duracion_estimada_min;
    if (fieldsToAck.margen) payload.ot_ack_margen_min = a.duracion_margen_min || 0;
    if (fieldsToAck.setup) payload.ot_ack_setup_min = a.duracion_operario_min;
    if (fieldsToAck.tipo) payload.ot_ack_tipo = a.tipo;
    if (fieldsToAck.op_ideal) payload.ot_ack_operario_ideal_id = a.operario_ideal_id;
    if (fieldsToAck.maq_ideal) {
      payload.ot_ack_maquina_ideal_id = a.maquina_ideal_id;
      payload.ot_ack_maquina_ideal_nombre = a.maquina_ideal_nombre;
    }
  }
  await sb.from('actividades_tablero').update(payload).eq('id', actId);
  // Reflejar localmente
  Object.keys(payload).forEach(k => { a[k] = payload[k]; });
}

// ========== VISUAL BLOCKS (multi-day aware) ==========
// Splits each activity across days according to operator's shift schedule.
// Para 'automatica' (24/7): el setup respeta jornada; despues, la maquina
// corre calendario continuo y se renderiza solo en las franjas de jornada
// que esten dentro de su periodo (las horas fuera de jornada/noches/domingos
// se "evaporan" porque la maquina no necesita operario).
function computeVB() {
  const vb = [];
  acts.filter(a => a.estado !== 'sin_planificar' && a.fecha !== '1900-01-01' && !a.es_pulmon).forEach(act => {
    if (!act.operario_id) return;

    if (is247(act) && effSetup(act) !== null && effSetup(act) !== undefined) {
      // === AUTO 24/7 ===
      // Generar partes visibles en el tablero. La numeracion de partes es
      // CONTINUA: parte 1, 2, 3, etc., sin importar si es del setup o de la
      // maquina sola. Si una parte de maquina es contigua a una parte de
      // setup en el mismo dia, se fusionan (suman dur) y no se cuenta como
      // parte nueva.
      const setupMin = effSetup(act);
      const machineRest = D(act) - setupMin;
      const parts = [];

      // Fase 1: setup respetando jornada. Cada dia donde cae setup genera una
      // parte. La numeracion arranca en 1 y se incrementa por cada parte real.
      let rem = setupMin, cd = act.fecha, ct = tM(act.hora_inicio), safe = 0;
      while (rem > 0 && safe < 20) {
        safe++;
        const ds = sS(act.operario_id), de = sE(act.operario_id, cd);
        if (ct < ds) ct = ds;
        const av = de - ct;
        if (av <= 0) { cd = nwd(cd); ct = sS(act.operario_id); continue; }
        const bd = Math.min(rem, av);
        parts.push({ actId: act.id, act, date: cd, startMin: ct, dur: bd, _phase: 'setup' });
        rem -= bd;
        if (rem > 0) { cd = nwd(cd); ct = sS(act.operario_id); }
        else { ct += bd; }
      }
      // cd/ct = momento en que termina el setup. La maquina corre desde aqui
      // calendario continuo durante machineRest minutos.

      // Fase 2: maquina sola 24/7. Intersectar con jornadas dia a dia.
      let calMinRem = machineRest;
      let curDate = cd, curTime = ct;  // posicion actual de la maquina
      let dayHop = 0;
      while (calMinRem > 0 && dayHop < 30) {
        dayHop++;
        const minsLeftInDay = 1440 - curTime;
        const consumeToday = Math.min(calMinRem, minsLeftInDay);
        const machineEndOfDay = curTime + consumeToday;

        const dow = new Date(curDate + 'T12:00:00').getDay();
        if (dow !== 0) {
          const ds = sS(act.operario_id), de = sE(act.operario_id, curDate);
          const visStart = Math.max(curTime, ds);
          const visEnd = Math.min(machineEndOfDay, de);
          if (visEnd > visStart) {
            // Buscar parte de setup del mismo dia que termine justo donde
            // arranca este bloque visible. Si existe, fusionar.
            const existingSetup = parts.find(p =>
              p.date === curDate && Math.abs(p.startMin + p.dur - visStart) < 1
            );
            if (existingSetup) {
              existingSetup.dur += (visEnd - visStart);
            } else {
              parts.push({ actId: act.id, act, date: curDate, startMin: visStart, dur: visEnd - visStart, _phase: 'machine' });
            }
          }
        }

        calMinRem -= consumeToday;
        if (calMinRem > 0) {
          const d = new Date(curDate + 'T12:00:00'); d.setDate(d.getDate() + 1);
          curDate = dK(d);
          curTime = 0;
        }
      }

      // Numerar las partes en orden cronologico (date+start).
      parts.sort((a, b) => {
        if (a.date < b.date) return -1;
        if (a.date > b.date) return 1;
        return a.startMin - b.startMin;
      });
      const tot = parts.length;
      parts.forEach((p, idx) => {
        p.part = idx + 1;
        p.totalParts = tot;
        vb.push(p);
      });
      return;
    }

    // === MANUAL o SEMI-AUTOMATICA: respeta jornada del operario ===
    let rem = D(act), cd = act.fecha, ct = tM(act.hora_inicio), pn = 1;
    const parts = []; let safe = 0;
    while (rem > 0 && safe < 20) {
      safe++;
      const ds = sS(act.operario_id), de = sE(act.operario_id, cd);
      if (ct < ds) ct = ds;
      const av = de - ct;
      if (av <= 0) { cd = nwd(cd); ct = sS(act.operario_id); continue; }
      const bd = Math.min(rem, av);
      parts.push({ actId: act.id, act, date: cd, startMin: ct, dur: bd, part: pn });
      rem -= bd;
      if (rem > 0) { cd = nwd(cd); ct = sS(act.operario_id); pn++; }
    }
    const tot = parts.length;
    parts.forEach(p => { p.totalParts = tot; vb.push(p); });
  });
  return vb;
}

// ========== SCHEDULING CORE (imported from v10 tablero extendido) ==========
// These functions deal with resolving machine conflicts after any placement.
// When a block is dropped on operator X but the machine already has other
// activities at that time, this cascade pushes them forward.

function realEnd(a) {
  // Para 'automatica' (24/7): el setup respeta jornada del operario, pero la
  // parte de maquina sola corre 24/7 sumando minutos calendario sin parar
  // (incluye noche y domingos).
  // Para 'semi_automatica' y 'manual': todo respeta la jornada del operario.
  if (is247(a) && effSetup(a) !== null && effSetup(a) !== undefined) {
    const setupMin = effSetup(a);
    const machineRest = D(a) - setupMin;
    // Walk del setup respetando jornada
    let rem = setupMin, cd = a.fecha, ct = tM(a.hora_inicio), safe = 0;
    while (rem > 0 && safe < 20) {
      safe++;
      const ds = sS(a.operario_id), de = sE(a.operario_id, cd);
      if (ct < ds) ct = ds;
      const avail = de - ct;
      if (avail <= 0) { cd = nwd(cd); ct = sS(a.operario_id); continue; }
      const used = Math.min(rem, avail);
      rem -= used;
      if (rem > 0) { cd = nwd(cd); ct = sS(a.operario_id); } else { ct += used; }
    }
    // Ahora cd/ct es donde termina el setup. La maquina sigue 24/7.
    // Sumar machineRest minutos calendario directos.
    if (machineRest > 0) {
      let totalMin = ct + machineRest;
      while (totalMin >= 1440) {
        cd = (function(ds){ const d = new Date(ds + 'T12:00:00'); d.setDate(d.getDate() + 1); return dK(d); })(cd);
        totalMin -= 1440;
      }
      ct = totalMin;
    }
    return { date: cd, time: ct };
  }
  // Manual o semi: todo respeta jornada del operario
  let rem = D(a), cd = a.fecha, ct = tM(a.hora_inicio), safe = 0;
  while (rem > 0 && safe < 20) {
    safe++;
    const ds = sS(a.operario_id), de = sE(a.operario_id, cd);
    if (ct < ds) ct = ds;
    const avail = de - ct;
    if (avail <= 0) { cd = nwd(cd); ct = sS(a.operario_id); continue; }
    const used = Math.min(rem, avail);
    rem -= used;
    if (rem > 0) { cd = nwd(cd); ct = sS(a.operario_id); } else { ct = ct + used; }
  }
  return { date: cd, time: ct };
}

// End of OPERATOR's attachment to the activity. Same walk as realEnd but using
// Dop (which is shorter for automaticas). Used by all cascades/conflict checks
// that care about when the operator becomes free (as opposed to the machine).
function realEndOp(a) {
  let rem = Dop(a), cd = a.fecha, ct = tM(a.hora_inicio), safe = 0;
  while (rem > 0 && safe < 20) {
    safe++;
    const ds = sS(a.operario_id), de = sE(a.operario_id, cd);
    if (ct < ds) ct = ds;
    const avail = de - ct;
    if (avail <= 0) { cd = nwd(cd); ct = sS(a.operario_id); continue; }
    const used = Math.min(rem, avail);
    rem -= used;
    if (rem > 0) { cd = nwd(cd); ct = sS(a.operario_id); } else { ct = ct + used; }
  }
  return { date: cd, time: ct };
}

// List of machine names iterated by globalResolve
const MCH_LIST = ['VF4','VF3-YT','Perfect-Jet','ST-30','TR-1','AR-3300','AR-1000','TC-Alfredo','Otra'];

async function globalResolve(undoBatch, justPlacedId) {
  let changed = true, iterations = 0;
  while (changed && iterations < 50) {
    changed = false; iterations++;
    for (const mn of MCH_LIST) {
      const machId = mI(mn); if (!machId) continue;
      const machActs = acts
        .filter(a => a.maquina_id === machId && a.estado !== 'sin_planificar' && a.fecha !== '1900-01-01')
        .sort((a, b) => {
          if (a.fecha < b.fecha) return -1;
          if (a.fecha > b.fecha) return 1;
          const td = tM(a.hora_inicio) - tM(b.hora_inicio);
          if (td !== 0) return td;
          if (a.id === justPlacedId) return -1;
          if (b.id === justPlacedId) return 1;
          return a.id - b.id;
        });
      for (let i = 0; i < machActs.length - 1; i++) {
        const A = machActs[i], B = machActs[i + 1];
        const endA = realEnd(A);
        const bDate = B.fecha, bTime = tM(B.hora_inicio);
        let needsMove = false;
        if (bDate < endA.date) needsMove = true;
        else if (bDate === endA.date && bTime < endA.time + GAP) needsMove = true;
        if (needsMove) {
          let newDate = endA.date, newTime = endA.time + GAP;
          // Si newDate cae domingo (puede pasar si A es auto 24/7), saltar a lunes.
          const dow = new Date(newDate + 'T12:00:00').getDay();
          if (dow === 0) { newDate = nwd(newDate); newTime = sS(B.operario_id); }
          const bShE = sE(B.operario_id, newDate), bShS = sS(B.operario_id);
          if (newTime < bShS) newTime = bShS;
          if (newTime >= bShE) { newDate = nwd(newDate); newTime = sS(B.operario_id); }
          if (B.fecha !== newDate || B.hora_inicio !== mT(newTime)) {
            const prev = { maquina_id: B.maquina_id, fecha: B.fecha, hora_inicio: B.hora_inicio, estado: B.estado };
            if (!undoBatch.find(u => u.id === B.id)) undoBatch.push({ id: B.id, prev });
            await sb.from('actividades_tablero').update({ fecha: newDate, hora_inicio: mT(newTime) }).eq('id', B.id);
            B.fecha = newDate; B.hora_inicio = mT(newTime);
            changed = true;
          }
        }
      }
    }
  }
}

function dayBlocks(machId, dateStr, excludeId) {
  const blocks = [];
  acts.filter(a => a.maquina_id === machId && a.estado !== 'sin_planificar' && a.fecha !== '1900-01-01' && a.id !== excludeId)
    .forEach(a => {
      const slices = machineSlicesOf(a);
      slices.forEach(sl => {
        if (sl.date === dateStr) blocks.push({ s: sl.start, e: sl.end, act: a });
      });
    });
  return blocks.sort((a, b) => a.s - b.s);
}

// 5-case drop logic: decides start time given X position of drop within a cell
function calcInsertTime(machId, dateStr, dropMin, excludeId) {
  const blocks = dayBlocks(machId, dateStr, excludeId);
  const act = acts.find(a => a.id === excludeId);
  const opStart = act && act.operario_id ? sS(act.operario_id) : 360;
  if (blocks.length === 0) return opStart;
  if (dropMin < blocks[0].s) {
    if (blocks[0].s > opStart + GAP) {
      const mid = (opStart + blocks[0].s) / 2;
      return dropMin <= mid ? opStart : blocks[0].s;
    } else return blocks[0].s;
  }
  if (dropMin === blocks[0].s) return blocks[0].s;
  for (let i = 0; i < blocks.length; i++) {
    const bl = blocks[i];
    if (dropMin >= bl.s && dropMin < bl.e) {
      const mid = (bl.s + bl.e) / 2;
      return dropMin <= mid ? bl.s : bl.e + GAP;
    }
    if (i < blocks.length - 1 && dropMin >= bl.e && dropMin < blocks[i + 1].s) {
      const mid = (bl.e + blocks[i + 1].s) / 2;
      return dropMin <= mid ? bl.e + GAP : blocks[i + 1].s;
    }
  }
  return blocks[blocks.length - 1].e + GAP;
}

// Same as dayBlocks but for an operator instead of a machine.
// Returns all blocks belonging to `opId` on `dateStr`, sorted by start.
function dayBlocksForOp(opId, dateStr, excludeId) {
  const blocks = [];
  acts.filter(a => a.operario_id === opId && a.estado !== 'sin_planificar' && a.fecha !== '1900-01-01' && a.id !== excludeId)
    .forEach(a => {
      // Operator is only attached for Dop(a) minutes (= setup time for automaticas)
      let rem = Dop(a), cd = a.fecha, ct = tM(a.hora_inicio), safe = 0;
      while (rem > 0 && safe < 20) {
        safe++;
        const ds = sS(a.operario_id), de = sE(a.operario_id, cd);
        if (ct < ds) ct = ds;
        const avail = de - ct;
        if (avail <= 0) { cd = nwd(cd); ct = sS(a.operario_id); continue; }
        const used = Math.min(rem, avail);
        if (cd === dateStr) blocks.push({ s: ct, e: ct + used, act: a });
        if (cd > dateStr) break;
        rem -= used;
        if (rem > 0) { cd = nwd(cd); ct = sS(a.operario_id); } else { ct += used; }
      }
    });
  return blocks.sort((a, b) => a.s - b.s);
}

// 5-case drop logic for the operator board. Uses the operator's timeline
// (not the machine's) to decide where an incoming drop lands.
function calcInsertTimeForOp(opId, dateStr, dropMin, excludeId) {
  const blocks = dayBlocksForOp(opId, dateStr, excludeId);
  const opStart = opId ? sS(opId) : 360;
  if (blocks.length === 0) return opStart;
  if (dropMin < blocks[0].s) {
    if (blocks[0].s > opStart + GAP) {
      const mid = (opStart + blocks[0].s) / 2;
      return dropMin <= mid ? opStart : blocks[0].s;
    } else return blocks[0].s;
  }
  if (dropMin === blocks[0].s) return blocks[0].s;
  for (let i = 0; i < blocks.length; i++) {
    const bl = blocks[i];
    if (dropMin >= bl.s && dropMin < bl.e) {
      const mid = (bl.s + bl.e) / 2;
      return dropMin <= mid ? bl.s : bl.e + GAP;
    }
    if (i < blocks.length - 1 && dropMin >= bl.e && dropMin < blocks[i + 1].s) {
      const mid = (bl.e + blocks[i + 1].s) / 2;
      return dropMin <= mid ? bl.e + GAP : blocks[i + 1].s;
    }
  }
  return blocks[blocks.length - 1].e + GAP;
}

// Find activities of OTHER operators that use the same machine and overlap
// in time with a proposed placement. Considers the full multi-day expansion
// of the incoming activity (it may span several days), and returns ALL
// conflicting activities across all affected days.
// Devuelve los slices de ocupacion de maquina para una actividad. Para
// manual y semi: respeta jornada del operario. Para auto 24/7: setup
// respeta jornada, despues calendar continuo.
function machineSlicesOf(a) {
  if (is247(a) && effSetup(a) !== null && effSetup(a) !== undefined) {
    const setupMin = effSetup(a);
    const machineRest = D(a) - setupMin;
    const slices = [];
    // Fase 1: setup respetando jornada
    let rem = setupMin, cd = a.fecha, ct = tM(a.hora_inicio), safe = 0;
    while (rem > 0 && safe < 20) {
      safe++;
      const ds = sS(a.operario_id), de = sE(a.operario_id, cd);
      if (ct < ds) ct = ds;
      const av = de - ct;
      if (av <= 0) { cd = nwd(cd); ct = sS(a.operario_id); continue; }
      const used = Math.min(rem, av);
      slices.push({ date: cd, start: ct, end: ct + used });
      rem -= used;
      if (rem > 0) { cd = nwd(cd); ct = sS(a.operario_id); } else { ct += used; }
    }
    // Fase 2: maquina sola 24/7 (calendar continuo, dia por dia)
    if (machineRest > 0) {
      let calRem = machineRest;
      let curDate = cd, curTime = ct;
      let dayHop = 0;
      while (calRem > 0 && dayHop < 30) {
        dayHop++;
        const minsLeftInDay = 1440 - curTime;
        const consume = Math.min(calRem, minsLeftInDay);
        // Fusionar con slice previo si es contiguo (mismo dia y empieza donde termino)
        const last = slices[slices.length - 1];
        if (last && last.date === curDate && Math.abs(last.end - curTime) < 1) {
          last.end = curTime + consume;
        } else {
          slices.push({ date: curDate, start: curTime, end: curTime + consume });
        }
        calRem -= consume;
        if (calRem > 0) {
          const d = new Date(curDate + 'T12:00:00'); d.setDate(d.getDate() + 1);
          curDate = dK(d);
          curTime = 0;
        }
      }
    }
    return slices;
  }
  // Manual / semi: walk normal por jornada
  const slices = [];
  let rem = D(a), cd = a.fecha, ct = tM(a.hora_inicio), safe = 0;
  while (rem > 0 && safe < 20) {
    safe++;
    const ds = sS(a.operario_id), de = sE(a.operario_id, cd);
    if (ct < ds) ct = ds;
    const av = de - ct;
    if (av <= 0) { cd = nwd(cd); ct = sS(a.operario_id); continue; }
    const used = Math.min(rem, av);
    slices.push({ date: cd, start: ct, end: ct + used });
    rem -= used;
    if (rem > 0) { cd = nwd(cd); ct = sS(a.operario_id); } else { ct += used; }
  }
  return slices;
}

function findMachineConflictsOtherOps(actId, machId, opId, fecha, startMin, dur) {
  const conflicts = [];
  if (!machId) return conflicts;

  // Slices de la actividad entrante. Para detectar conflicto contra una
  // existente, usamos los slices REALES (que tienen en cuenta auto 24/7 si
  // la entrante lo es). Notar: el caller pasa solo dur+opId+fecha+startMin,
  // sin tipo. Usamos simulatePlacement (jornada-respetada) como aproximacion;
  // es suficiente porque cuando se llama esta funcion la entrante no es 24/7
  // calendar (los conflict checks de 24/7 vs maquina se gestionan al inicio
  // del placement). En la gran mayoria de casos basta con esto.
  const slices = simulatePlacement({ duracion_estimada_min: dur, duracion_margen_min: 0 }, opId, fecha, startMin);
  if (slices.length === 0) return conflicts;

  acts.forEach(a => {
    if (a.id === actId) return;
    if (a.maquina_id !== machId) return;
    if (a.operario_id === opId) return;
    if (a.estado === 'sin_planificar') return;
    const aSlices = machineSlicesOf(a);
    for (const as of aSlices) {
      let pushed = false;
      for (const s of slices) {
        if (as.date === s.date && as.start < s.end && as.end > s.start) {
          conflicts.push(a); pushed = true; break;
        }
      }
      if (pushed) break;
    }
  });
  return conflicts;
}

// ========== OPERATOR CONFLICT DETECTION ==========
// `dur` is the operator-time duration of the incoming activity (Dop, not D).
// Each existing activity `a` is compared using its own Dop(a) — the operator
// is only attached to it for that long.
function findOpConflicts(actId, opId, machId, fecha, startMin, dur) {
  const conflicts = [];
  if (!opId) return conflicts;
  acts.forEach(a => {
    if (a.id === actId) return;
    if (a.operario_id !== opId) return;
    if (a.estado === 'sin_planificar') return;
    if (a.maquina_id === machId) return;
    let rem = Dop(a), cd = a.fecha, ct = tM(a.hora_inicio), safe = 0;
    while (rem > 0 && safe < 20) {
      safe++;
      const ds = sS(a.operario_id), de = sE(a.operario_id, cd);
      if (ct < ds) ct = ds;
      const av = de - ct;
      if (av <= 0) { cd = nwd(cd); ct = sS(a.operario_id); continue; }
      const used = Math.min(rem, av);
      if (cd === fecha && ct < startMin + dur && ct + used > startMin) {
        conflicts.push(a); break;
      }
      if (cd > fecha) break;
      rem -= used;
      if (rem > 0) { cd = nwd(cd); ct = sS(a.operario_id); } else { ct += used; }
    }
  });
  return conflicts;
}

// 3+ simultaneous = blocked (was 4 in v10, lowered per user request)
function classifyOpConflict(act, conflicts) {
  if (conflicts.length === 0) return 'ok';
  const all = [act, ...conflicts];
  const manC = all.filter(a => isManual(a)).length;
  const total = all.length;
  if (total > MAX_SIMULTANEAS) return 'blocked';
  if (manC >= 2) return 'blocked';
  if (total === 3 && manC >= 1) return 'red';
  return 'yellow';
}

function getManualRanges(excludeActId, opId, fecha) {
  const ranges = [];
  acts.forEach(a => {
    if (a.id === excludeActId) return;
    if (a.operario_id !== opId) return;
    if (!isManual(a)) return;
    if (a.estado === 'sin_planificar') return;
    let rem = D(a), cd = a.fecha, ct = tM(a.hora_inicio), safe = 0;
    while (rem > 0 && safe < 30) {
      safe++;
      const ds = sS(a.operario_id), de = sE(a.operario_id, cd);
      if (ct < ds) ct = ds;
      const av = de - ct;
      if (av <= 0) { cd = nwd(cd); ct = sS(a.operario_id); continue; }
      const used = Math.min(rem, av);
      if (cd === fecha) ranges.push({ start: ct, end: ct + used });
      if (cd > fecha) break;
      rem -= used;
      if (rem > 0) { cd = nwd(cd); ct = sS(a.operario_id); } else { ct += used; }
    }
  });
  ranges.sort((a, b) => a.start - b.start);
  return ranges;
}

function simulatePlacement(act, opId, fecha, startMin) {
  const slices = [];
  let rem = D(act), cd = fecha, ct = startMin, safe = 0;
  while (rem > 0 && safe < 30) {
    safe++;
    const ds = sS(opId), de = sE(opId, cd);
    if (ct < ds) ct = ds;
    const av = de - ct;
    if (av <= 0) { cd = nwd(cd); ct = sS(opId); continue; }
    const used = Math.min(rem, av);
    slices.push({ date: cd, start: ct, end: ct + used });
    rem -= used;
    if (rem > 0) { cd = nwd(cd); ct = sS(opId); } else { ct += used; }
  }
  return rem > 0 ? [] : slices;
}

function isManualTimeValid(act, opId, fecha, startMin) {
  // Operator conflict check uses Dop (operator-time), not full machine time.
  const slices = simulatePlacement({ duracion_estimada_min: Dop(act), duracion_margen_min: 0 }, opId, fecha, startMin);
  if (slices.length === 0) return false;
  for (const s of slices) {
    const ranges = getManualRanges(act.id, opId, s.date);
    for (const r of ranges) if (r.start < s.end && r.end > s.start) return false;
  }
  return true;
}

function findFreeManualSlot(act, opId, fechaFrom) {
  const maxDays = 30;
  let cd = fechaFrom;
  for (let day = 0; day < maxDays; day++) {
    const ranges = getManualRanges(act.id, opId, cd);
    const dayStart = sS(opId), dayEnd = sE(opId, cd);
    const candidates = new Set([dayStart]);
    for (const r of ranges) { const c = r.end + GAP; if (c < dayEnd) candidates.add(c); }
    const sorted = [...candidates].sort((a, b) => a - b);
    for (const candidate of sorted) {
      if (candidate >= dayEnd) continue;
      if (isManualTimeValid(act, opId, cd, candidate)) return { fecha: cd, startMin: candidate };
    }
    cd = nwd(cd);
  }
  return null;
}

// ========== OPERATOR CASCADE HELPERS ==========
// Find all activities of `opId` that overlap temporally with the new
// activity (actId, fecha, startMin, dur). Returns array of act objects.
// `dur` is the operator-time duration (Dop) of the incoming activity.
// Used to detect what would need to be pushed when placing on a busy operator.
function findOverlappingActivitiesForOp(actId, opId, fecha, startMin, dur) {
  const overlapping = [];
  if (!opId) return overlapping;
  const endMin = startMin + dur;
  acts.forEach(a => {
    if (a.id === actId) return;
    if (a.operario_id !== opId) return;
    if (a.estado === 'sin_planificar') return;
    // Walk a's slices using Dop(a): operator is only attached that long.
    let rem = Dop(a), cd = a.fecha, ct = tM(a.hora_inicio), safe = 0;
    while (rem > 0 && safe < 20) {
      safe++;
      const ds = sS(a.operario_id), de = sE(a.operario_id, cd);
      if (ct < ds) ct = ds;
      const av = de - ct;
      if (av <= 0) { cd = nwd(cd); ct = sS(a.operario_id); continue; }
      const used = Math.min(rem, av);
      if (cd === fecha && ct < endMin && ct + used > startMin) {
        overlapping.push(a); break;
      }
      if (cd > fecha) break;
      rem -= used;
      if (rem > 0) { cd = nwd(cd); ct = sS(a.operario_id); } else { ct += used; }
    }
  });
  return overlapping;
}

// Dry-run version of cascadeOverlapsForOperator. Returns a snapshot of the
// operator's activities with all cascade pushes applied, WITHOUT touching
// the actual data. Used to predict conflicts before executing the move.
// `placedActId` is the activity being placed; `placedFecha`/`placedStart`
// are its proposed values. If `placedActId` isn't currently owned by opId,
// it's added to the snapshot (for the case where we're reassigning an act
// from another operator).
function simulateOpCascade(opId, placedActId, placedFecha, placedStart, placedMachId, omitPulmonIds) {
  if (!opId) return [];
  const omit = omitPulmonIds instanceof Set ? omitPulmonIds : new Set();
  // Clone activities of this operator (they're the only ones the cascade touches).
  // Excludes activities flagged in `omit` (pulmones to be deleted by 'pisar').
  const snapshot = acts
    .filter(a => a.operario_id === opId && a.estado !== 'sin_planificar' && a.fecha !== '1900-01-01' && a.id !== placedActId && !omit.has(a.id))
    .map(a => ({ id: a.id, operario_id: a.operario_id, maquina_id: a.maquina_id, fecha: a.fecha, hora_inicio: a.hora_inicio, duracion_estimada_min: a.duracion_estimada_min, duracion_margen_min: a.duracion_margen_min, duracion_operario_min: a.duracion_operario_min, descripcion: a.descripcion, pedido_nro: a.pedido_nro, tipo: a.tipo, es_pulmon: a.es_pulmon }));
  // Add the placed activity (pulling its other fields from the actual act)
  const srcAct = acts.find(a => a.id === placedActId);
  if (srcAct) {
    snapshot.push({
      id: placedActId, operario_id: opId,
      maquina_id: placedMachId !== undefined ? placedMachId : srcAct.maquina_id,
      fecha: placedFecha, hora_inicio: mT(placedStart),
      duracion_estimada_min: srcAct.duracion_estimada_min, duracion_margen_min: srcAct.duracion_margen_min,
      duracion_operario_min: srcAct.duracion_operario_min,
      descripcion: srcAct.descripcion, pedido_nro: srcAct.pedido_nro, tipo: srcAct.tipo
    });
  }
  // Run the cascade on the snapshot (same logic as cascadeOverlapsForOperator)
  let iter = 0;
  while (iter < 50) {
    iter++;
    snapshot.sort((a, b) => {
      if (a.fecha < b.fecha) return -1;
      if (a.fecha > b.fecha) return 1;
      const td = tM(a.hora_inicio) - tM(b.hora_inicio);
      if (td !== 0) return td;
      if (a.id === placedActId) return -1;
      if (b.id === placedActId) return 1;
      return a.id - b.id;
    });
    let pushed = false;
    for (let i = 0; i < snapshot.length - 1; i++) {
      const A = snapshot[i], B = snapshot[i + 1];
      // Operator cascade uses the MANUAL end: after A's setup finishes, the
      // operator is free to start B even if A's machine is still running.
      const endA = realEndOp(A);
      const bDate = B.fecha, bTime = tM(B.hora_inicio);
      let needsMove = false;
      if (bDate < endA.date) needsMove = true;
      else if (bDate === endA.date && bTime < endA.time + GAP) needsMove = true;
      if (needsMove) {
        let newDate = endA.date, newTime = endA.time + GAP;
        const bShS = sS(opId);
        if (newTime < bShS) newTime = bShS;
        const bShE = sE(opId, newDate);
        if (newTime >= bShE) { newDate = nwd(newDate); newTime = sS(opId); }
        if (B.fecha !== newDate || B.hora_inicio !== mT(newTime)) {
          B.fecha = newDate; B.hora_inicio = mT(newTime);
          pushed = true;
        }
      }
    }
    if (!pushed) break;
  }
  return snapshot;
}

// Resolve overlaps within a single operator's timeline, pushing conflicts
// forward. Walks the operator's activities in chronological order; whenever
// two consecutive activities overlap, the later one is pushed after the
// earlier one ends (+GAP), carrying into next days if needed.
// `priorityActId` (optional): when two activities tie on fecha+hora_inicio,
// this one wins the tie (goes first), ensuring it stays put while others
// around it get cascaded.
async function cascadeOverlapsForOperator(opId, undoBatch, priorityActId) {
  if (!opId) return;
  let iter = 0;
  while (iter < 50) {
    iter++;
    const ownActs = acts.filter(a =>
      a.operario_id === opId && a.estado !== 'sin_planificar' && a.fecha !== '1900-01-01'
    ).sort((a, b) => {
      if (a.fecha < b.fecha) return -1;
      if (a.fecha > b.fecha) return 1;
      const td = tM(a.hora_inicio) - tM(b.hora_inicio);
      if (td !== 0) return td;
      // Tiebreak: the priority activity (the one just placed by the user) goes first
      if (priorityActId !== undefined) {
        if (a.id === priorityActId) return -1;
        if (b.id === priorityActId) return 1;
      }
      return a.id - b.id;
    });
    let pushedAny = false;
    for (let i = 0; i < ownActs.length - 1; i++) {
      const A = ownActs[i], B = ownActs[i + 1];
      // Operator becomes free when the MANUAL portion ends (Dop-based end).
      // For automaticas, the machine keeps running alone afterwards but the
      // operator can already take B.
      const endA = realEndOp(A);
      const bDate = B.fecha, bTime = tM(B.hora_inicio);
      let needsMove = false;
      if (bDate < endA.date) needsMove = true;
      else if (bDate === endA.date && bTime < endA.time + GAP) needsMove = true;
      if (needsMove) {
        let newDate = endA.date, newTime = endA.time + GAP;
        const bShS = sS(opId);
        if (newTime < bShS) newTime = bShS;
        const bShE = sE(opId, newDate);
        if (newTime >= bShE) { newDate = nwd(newDate); newTime = sS(opId); }
        if (B.fecha !== newDate || B.hora_inicio !== mT(newTime)) {
          const prev = { maquina_id: B.maquina_id, fecha: B.fecha, hora_inicio: B.hora_inicio, estado: B.estado, operario_id: B.operario_id };
          if (!undoBatch.find(u => u.id === B.id)) undoBatch.push({ id: B.id, prev });
          await sb.from('actividades_tablero').update({ fecha: newDate, hora_inicio: mT(newTime) }).eq('id', B.id);
          B.fecha = newDate; B.hora_inicio = mT(newTime);
          pushedAny = true;
        }
      }
    }
    if (!pushedAny) break;
  }
}

// ========== PLACEMENT ==========
// `newOpId` (optional): if set, changes act.operario_id as part of this
// placement. Default = null = keep current operator.
async function placeAct(actId, machId, fecha, startTime, newOpId) {
  const act = acts.find(a => a.id === actId);
  if (!act) return;
  if (act.estado === 'completada') { toast('Actividad completada'); return; }
  if (!canPlace(act, machId)) { toast('Maquina no permitida. Ideal: ' + mN(act.maquina_ideal_id)); return; }
  // Correlatividad check
  const corrConflict = checkCorrelatividadConflict(actId, fecha, startTime);
  if (corrConflict) {
    alert(describeCorrelatividadConflict(corrConflict));
    return;
  }

  const effectiveOpId = (newOpId !== undefined && newOpId !== null) ? newOpId : act.operario_id;
  // Auto-adjust hora_inicio to the NEW operator's shift start if needed
  const opStart = sS(effectiveOpId);
  if (startTime < opStart) startTime = opStart;

  // Capture prev state BEFORE any mutation (includes operario_id)
  const prev = { maquina_id: act.maquina_id, fecha: act.fecha, hora_inicio: act.hora_inicio, estado: act.estado, operario_id: act.operario_id };
  const ns = act.estado === 'sin_planificar' ? 'pendiente' : act.estado;
  const undoBatch = [{ id: actId, prev }];

  const updatePayload = { maquina_id: machId, fecha: fecha, hora_inicio: mT(startTime), estado: ns, estado_proceso: 'Planificado' };
  if (effectiveOpId !== act.operario_id) updatePayload.operario_id = effectiveOpId;
  // Al planificar por primera vez (sin_planificar -> pendiente), inicializar
  // los ot_ack_* con los valores actuales del proceso. Esto evita que al
  // recien planificar aparezca el triangulo amarillo (se considera "sincronizada"
  // desde el momento de planificacion). Solo se setean si NO estan ya seteados,
  // por seguridad.
  if (act.estado === 'sin_planificar') {
    if (act.ot_ack_dur_estimada_min === null || act.ot_ack_dur_estimada_min === undefined) updatePayload.ot_ack_dur_estimada_min = act.duracion_estimada_min;
    if (act.ot_ack_margen_min === null || act.ot_ack_margen_min === undefined) updatePayload.ot_ack_margen_min = act.duracion_margen_min || 0;
    if (act.ot_ack_setup_min === null || act.ot_ack_setup_min === undefined) updatePayload.ot_ack_setup_min = act.duracion_operario_min;
    if (act.ot_ack_tipo === null || act.ot_ack_tipo === undefined || act.ot_ack_tipo === '') updatePayload.ot_ack_tipo = act.tipo;
    if (act.ot_ack_operario_ideal_id === null || act.ot_ack_operario_ideal_id === undefined) updatePayload.ot_ack_operario_ideal_id = act.operario_ideal_id;
    if (act.ot_ack_maquina_ideal_id === null || act.ot_ack_maquina_ideal_id === undefined) updatePayload.ot_ack_maquina_ideal_id = act.maquina_ideal_id;
    if (act.ot_ack_maquina_ideal_nombre === null || act.ot_ack_maquina_ideal_nombre === undefined) updatePayload.ot_ack_maquina_ideal_nombre = act.maquina_ideal_nombre;
  }
  await sb.from('actividades_tablero').update(updatePayload).eq('id', actId);
  Object.keys(updatePayload).forEach(k => { act[k] = updatePayload[k]; });

  // EXPLICIT PUSH: any activity on same machine+day that would overlap, gets pushed
  // Si machId=null (actividad sin maquina), no hay carril de maquina compartido
  // entre operarios, asi que este push de maquina no aplica.
  const placedEnd = realEnd(act);
  const sameCell = (machId === null) ? [] : acts.filter(a =>
    a.id !== actId && a.maquina_id === machId && a.estado !== 'sin_planificar' && a.fecha === fecha
  ).sort((a, b) => tM(a.hora_inicio) - tM(b.hora_inicio));
  // Track which operators were affected by the machine push (we need to run
  // an operator-cascade for each, to avoid leaving overlaps within one operator)
  const affectedOps = new Set();
  affectedOps.add(effectiveOpId);
  for (const other of sameCell) {
    const otherStart = tM(other.hora_inicio);
    if (other.fecha < placedEnd.date || (other.fecha === placedEnd.date && otherStart < placedEnd.time + GAP)) {
      const otherEnd = otherStart + D(other);
      if (otherEnd > startTime) {
        const oPrev = { maquina_id: other.maquina_id, fecha: other.fecha, hora_inicio: other.hora_inicio, estado: other.estado, operario_id: other.operario_id };
        if (!undoBatch.find(u => u.id === other.id)) undoBatch.push({ id: other.id, prev: oPrev });
        let pushTime = placedEnd.time + GAP, pushDate = placedEnd.date;
        const oShE = sE(other.operario_id, pushDate);
        if (pushTime >= oShE) { pushDate = nwd(pushDate); pushTime = sS(other.operario_id); }
        await sb.from('actividades_tablero').update({ fecha: pushDate, hora_inicio: mT(pushTime) }).eq('id', other.id);
        other.fecha = pushDate; other.hora_inicio = mT(pushTime);
        affectedOps.add(other.operario_id);
      }
    }
  }

  // OPERATOR CASCADE: for each operator that was affected (the inserted
  // activity's operator + any operator whose activity was pushed by the
  // machine cascade), resolve overlaps within that operator's timeline.
  for (const opIdForCascade of affectedOps) {
    await cascadeOverlapsForOperator(opIdForCascade, undoBatch, actId);
  }

  // MACHINE CASCADE AFTER OP CASCADE: any activity of OUR operator that was
  // moved (including the newly placed one) may now collide on its machine
  // with activities of OTHER operators. The user explicitly confirmed they
  // want to cascade, so we push those other-op activities forward to clear
  // the collision (instead of having globalResolve silently push OURS back).
  const itemsToCheck = undoBatch.slice();  // snapshot: we may push more items later
  for (const item of itemsToCheck) {
    const A = acts.find(x => x.id === item.id);
    if (!A || A.estado === 'sin_planificar' || A.fecha === '1900-01-01') continue;
    let more = true;
    let safety = 0;
    while (more && safety < 10) {
      safety++;
      const confs = findMachineConflictsOtherOps(A.id, A.maquina_id, A.operario_id, A.fecha, tM(A.hora_inicio), D(A));
      if (confs.length === 0) { more = false; break; }
      more = false;
      for (const C of confs) {
        // Push C to just after A's realEnd + GAP
        const endA = realEnd(A);
        let newDate = endA.date, newTime = endA.time + GAP;
        const cShS = sS(C.operario_id);
        if (newTime < cShS) newTime = cShS;
        const cShE = sE(C.operario_id, newDate);
        if (newTime >= cShE) { newDate = nwd(newDate); newTime = sS(C.operario_id); }
        if (C.fecha !== newDate || C.hora_inicio !== mT(newTime)) {
          const cPrev = { maquina_id: C.maquina_id, fecha: C.fecha, hora_inicio: C.hora_inicio, estado: C.estado, operario_id: C.operario_id };
          if (!undoBatch.find(u => u.id === C.id)) undoBatch.push({ id: C.id, prev: cPrev });
          await sb.from('actividades_tablero').update({ fecha: newDate, hora_inicio: mT(newTime) }).eq('id', C.id);
          C.fecha = newDate; C.hora_inicio = mT(newTime);
          affectedOps.add(C.operario_id);
          more = true;  // re-check A after this push (in case another conflict appears)
        }
      }
    }
  }

  // Re-run operator cascade for any newly affected operators (the ones we just
  // pushed out of the way), so their own timelines stay consistent.
  for (const opIdForCascade of affectedOps) {
    await cascadeOverlapsForOperator(opIdForCascade, undoBatch, actId);
  }

  await globalResolve(undoBatch, actId);
  uStack.push(undoBatch); updU();
  const casc = undoBatch.length - 1;
  if (!suppressNextToast) {
    let msg = act.descripcion + ' → ' + opN(act.operario_id) + ' ' + mT(startTime);
    if (casc > 0) msg += ' (cascada: ' + casc + ' actividad' + (casc > 1 ? 'es' : '') + ' movida' + (casc > 1 ? 's' : '') + ')';
    toast(msg);
  }
  suppressNextToast = false;
  render();
}

// Returns null when the move is allowed, or an object with the conflicting
// predecessor or successor activity that violates correlatividad.
// fecha + startTime: where the activity is being moved.
function checkCorrelatividadConflict(actId, fecha, startTime) {
  const act = acts.find(a => a.id === actId);
  if (!act) return null;
  // Compute new end of the moved activity for successor checks
  const dur = D(act);
  const newEndDate = fecha;
  const newEndTime = startTime + dur;
  // Predecessors: must finish BEFORE startTime (in chronological order)
  const predIds = corrs.filter(c => c.sucesor_id === actId).map(c => c.predecesor_id);
  for (const pid of predIds) {
    const pa = acts.find(a => a.id === pid);
    if (!pa) continue;
    // v70 Fase 10: predecesor marcado como hecho no bloquea.
    if (pa.estado === 'completada') continue;
    const ps = pa.estado_proceso || 'Planificación Pendiente';
    // A Cerrado predecessor doesn't constrain
    if (ps === 'Cerrado') continue;
    // If predecessor is unplaced, block
    if (ps === 'Planificación Pendiente' || pa.estado === 'sin_planificar') {
      return { type: 'pred-unplaced', other: pa };
    }
    // Compare predecessor end vs sucesor start
    const pe = realEnd(pa);
    if (pe.date > fecha || (pe.date === fecha && pe.time > startTime)) {
      return { type: 'pred-overlap', other: pa };
    }
  }
  // Successors: must start AFTER newEndTime
  const sucIds = corrs.filter(c => c.predecesor_id === actId).map(c => c.sucesor_id);
  for (const sid of sucIds) {
    const sa = acts.find(a => a.id === sid);
    if (!sa) continue;
    const ss = sa.estado_proceso || 'Planificación Pendiente';
    if (ss === 'Cerrado') continue;
    // Unplaced successor doesn't block (it'll be placed later respecting our new end)
    if (sa.estado === 'sin_planificar') continue;
    const sStart = tM(sa.hora_inicio);
    // Compare successor start vs predecessor (this) end
    if (sa.fecha < newEndDate || (sa.fecha === newEndDate && sStart < newEndTime)) {
      return { type: 'suc-overlap', other: sa };
    }
  }
  return null;
}

function describeCorrelatividadConflict(conflict) {
  const o = conflict.other;
  const oItem = items.find(x => x.id === o.item_id);
  const oLabel = (oItem ? oItem.descripcion + ' / ' : '') + (o.proceso || '?');
  if (conflict.type === 'pred-unplaced') {
    return 'No se puede mover: el predecesor "' + oLabel + '" todavia no esta planificado/cerrado.';
  }
  if (conflict.type === 'pred-overlap') {
    return 'No se puede mover: el predecesor "' + oLabel + '" termina despues del nuevo inicio.';
  }
  if (conflict.type === 'suc-overlap') {
    return 'No se puede mover: el sucesor "' + oLabel + '" empieza antes del nuevo fin.';
  }
  return 'Conflicto de correlatividad';
}

// Returns the latest end (date+time) among PLANIFICADO predecessors of `actId`.
// Cerrado predecessors don't constrain. Returns null if no constraining preds.
function latestPredecessorEnd(actId) {
  const predIds = corrs.filter(c => c.sucesor_id === actId).map(c => c.predecesor_id);
  let latest = null;
  for (const pid of predIds) {
    const pa = acts.find(a => a.id === pid);
    if (!pa) continue;
    // v70 Fase 10: una actividad completada no impone constraint sobre el fin
    // de los sucesores — ya pasó.
    if (pa.estado === 'completada') continue;
    const ps = pa.estado_proceso || 'Planificación Pendiente';
    if (ps === 'Cerrado') continue;
    // Skip predecessors that aren't placed yet
    if (ps === 'Planificación Pendiente' || pa.estado === 'sin_planificar') continue;
    const pe = realEnd(pa);
    if (!latest || pe.date > latest.date || (pe.date === latest.date && pe.time > latest.time)) {
      latest = pe;
      latest.predName = (items.find(x => x.id === pa.item_id)?.descripcion || '?') + ' / ' + (pa.proceso || '?');
    }
  }
  return latest;
}

// Returns the earliest start (date+time) among PLANIFICADO successors of `actId`.
// Cerrado successors don't constrain. Returns null if no constraining sucs.
function earliestSuccessorStart(actId) {
  const sucIds = corrs.filter(c => c.predecesor_id === actId).map(c => c.sucesor_id);
  let earliest = null;
  for (const sid of sucIds) {
    const sa = acts.find(a => a.id === sid);
    if (!sa) continue;
    const ss = sa.estado_proceso || 'Planificación Pendiente';
    if (ss === 'Cerrado') continue;
    if (sa.estado === 'sin_planificar') continue;
    const sStart = { date: sa.fecha, time: tM(sa.hora_inicio) };
    if (!earliest || sStart.date < earliest.date || (sStart.date === earliest.date && sStart.time < earliest.time)) {
      earliest = sStart;
      earliest.sucName = (items.find(x => x.id === sa.item_id)?.descripcion || '?') + ' / ' + (sa.proceso || '?');
    }
  }
  return earliest;
}

// Adjusts a (date, time) so that it falls within the operator's working hours.
// If time is before shift start → moves to shift start.
// If time is at or past shift end → moves to next working day's start.
// Returns { date, time }.
function adjustToWorkingHours(opId, date, time) {
  const ds = sS(opId);
  const de = sE(opId, date);
  if (time < ds) time = ds;
  if (time >= de) {
    date = nwd(date);
    time = sS(opId);
  }
  return { date, time };
}

// =============================================================
// PARCHE B: simulacion robusta de cascadas combinadas (op+maq).
// =============================================================
// Las funciones *OnState operan sobre un Map id -> activItem (con todas las
// propiedades necesarias para D(), Dop(), realEnd(), etc.). NUNCA tocan DB.
// Esto permite simular el efecto en cadena de un cambio antes de aplicarlo.

// Simula el explicit push de maquina sobre el estado. Devuelve un Set con los
// ids que se movieron en esta pasada. Repite el barrido hasta que no haya mas
// movimientos por maquina.
function simulateMachinePushOnState(state, placedActId) {
  const moved = new Set();
  let safety = 50;
  while (safety-- > 0) {
    let anyMove = false;
    // Por cada maquina+fecha, ordenar por hora_inicio y empujar la siguiente
    // si la anterior la pisa (en su slice de maquina).
    // Optimizacion: agrupar por maquina_id+fecha
    const groups = new Map();
    state.forEach(it => {
      if (!it.maquina_id) return; // sin maquina: sin push
      const key = it.maquina_id + '|' + it.fecha;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(it);
    });
    groups.forEach(arr => {
      arr.sort((a, b) => {
        const td = tM(a.hora_inicio) - tM(b.hora_inicio);
        if (td !== 0) return td;
        // Si empatan en hora, la placed va primero (prioridad)
        if (a.id === placedActId) return -1;
        if (b.id === placedActId) return 1;
        return a.id - b.id;
      });
      for (let i = 0; i < arr.length - 1; i++) {
        const A = arr[i], B = arr[i + 1];
        const aEnd = realEndForState(A);
        const bDate = B.fecha, bTime = tM(B.hora_inicio);
        let needs = false;
        if (bDate < aEnd.date) needs = true;
        else if (bDate === aEnd.date && bTime < aEnd.time + GAP) needs = true;
        if (needs) {
          let newDate = aEnd.date, newTime = aEnd.time + GAP;
          const bShS = sS(B.operario_id);
          if (newTime < bShS) newTime = bShS;
          const bShE = sE(B.operario_id, newDate);
          if (newTime >= bShE) { newDate = nwd(newDate); newTime = sS(B.operario_id); }
          if (B.fecha !== newDate || B.hora_inicio !== mT(newTime)) {
            B.fecha = newDate;
            B.hora_inicio = mT(newTime);
            moved.add(B.id);
            anyMove = true;
          }
        }
      }
    });
    if (!anyMove) break;
  }
  return moved;
}

// Cascadea las actividades del operario opId dentro del state hasta que no
// queden overlaps. Devuelve true si movio algo.
function simulateOpCascadeOnState(state, opId) {
  let movedAny = false;
  let safety = 50;
  while (safety-- > 0) {
    const arr = [];
    state.forEach(it => { if (it.operario_id === opId) arr.push(it); });
    arr.sort((a, b) => {
      if (a.fecha < b.fecha) return -1;
      if (a.fecha > b.fecha) return 1;
      return tM(a.hora_inicio) - tM(b.hora_inicio);
    });
    let pushed = false;
    for (let i = 0; i < arr.length - 1; i++) {
      const A = arr[i], B = arr[i + 1];
      const endA = realEndOpForState(A);
      const bDate = B.fecha, bTime = tM(B.hora_inicio);
      let needs = false;
      if (bDate < endA.date) needs = true;
      else if (bDate === endA.date && bTime < endA.time + GAP) needs = true;
      if (needs) {
        let newDate = endA.date, newTime = endA.time + GAP;
        const bShS = sS(opId);
        if (newTime < bShS) newTime = bShS;
        const bShE = sE(opId, newDate);
        if (newTime >= bShE) { newDate = nwd(newDate); newTime = sS(opId); }
        if (B.fecha !== newDate || B.hora_inicio !== mT(newTime)) {
          B.fecha = newDate;
          B.hora_inicio = mT(newTime);
          pushed = true;
          movedAny = true;
        }
      }
    }
    if (!pushed) break;
  }
  return movedAny;
}

// Detecta conflictos de maquina con OTROS operarios en el state simulado.
// Igual que findMachineConflictsOtherOps pero sobre el state, no sobre acts.
function findMachineConflictsOtherOpsInState(state, actId, machId, opId, fecha, startMin, dur) {
  const conflicts = [];
  if (!machId) return conflicts;
  // Slices de la actividad entrante (asumimos manual para simplicidad de chequeo)
  const slices = simulatePlacement({ duracion_estimada_min: dur, duracion_margen_min: 0 }, opId, fecha, startMin);
  if (slices.length === 0) return conflicts;
  state.forEach(a => {
    if (a.id === actId) return;
    if (a.maquina_id !== machId) return;
    if (a.operario_id === opId) return;
    const aSlices = machineSlicesOfState(a);
    for (const as of aSlices) {
      let pushed = false;
      for (const s of slices) {
        if (as.date === s.date && as.start < s.end && as.end > s.start) {
          conflicts.push(a); pushed = true; break;
        }
      }
      if (pushed) break;
    }
  });
  return conflicts;
}

// realEnd para items del state (mismo computo que realEnd pero sin asumir
// que viene de acts; usa los campos del item tal cual estan).
function realEndForState(a) { return realEnd(a); }
function realEndOpForState(a) { return realEndOp(a); }
function machineSlicesOfState(a) { return machineSlicesOf(a); }
// =============================================================

function placeActWithCheck(actId, machId, fecha, startTime, newOpId, skipOpCheck) {
  const act = acts.find(a => a.id === actId);
  if (!act) return;
  const effectiveOpId = (newOpId !== undefined && newOpId !== null) ? newOpId : act.operario_id;
  if (!effectiveOpId) { placeAct(actId, machId, fecha, startTime, newOpId); return; }

  // STEP 0: correlatividad. Two cases:
  // - pred-unplaced or suc-overlap → block with alert (can't auto-resolve).
  // - pred-overlap → offer to move just-after the latest predecessor end.
  const corrConflict = checkCorrelatividadConflict(actId, fecha, startTime);
  if (corrConflict) {
    if (corrConflict.type === 'pred-overlap') {
      const latestPred = latestPredecessorEnd(actId);
      if (latestPred) {
        const adjStart = adjustToWorkingHours(effectiveOpId, latestPred.date, latestPred.time + GAP);
        showMoveAfterPredecessorModal(actId, machId, latestPred, adjStart, newOpId);
        return;
      }
    }
    alert(describeCorrelatividadConflict(corrConflict));
    return;
  }

  // STEP 0.5: detectar pulmones del mismo operario que se cruzan con la activ.
  // Aplica la preferencia sticky (pisar / cascadear) sin preguntar al usuario.
  // Si pisar → eliminamos el pulmón antes de la simulación.
  // Si cascadear → no hacemos nada acá; la cascada de simulación los va a mover.
  const placedDur = D(act);
  const pulmonesAfectadosIds = acts.filter(a => {
    if (!a.es_pulmon) return false;
    if (a.operario_id !== effectiveOpId) return false;
    if (a.fecha !== fecha) return false;
    if (a.id === actId) return false;
    const pStart = tM(a.hora_inicio);
    const pEnd = pStart + D(a);
    return !(pEnd <= startTime || pStart >= startTime + placedDur);
  }).map(p => p.id);

  // Build the simulation. If pulmonActionPref === 'pisar', remove the affected
  // pulmones from the snapshot before simulating (so the cascade doesn't "see" them).
  // We'll delete them from DB only if the user confirms the move.
  const pulmonesAPisar = (pulmonActionPref === 'pisar') ? new Set(pulmonesAfectadosIds) : new Set();

  // ============================================================
  // MOTOR A: simulacion unificada (reemplaza STEP 1, 1.5, 2 y 3 del parche B).
  // ============================================================
  // Construir el cambio propuesto y delegar en _runMotorAndApply, que se
  // encarga de simular, mostrar modal si hace falta, y aplicar.
  const changes = [{
    id: actId,
    operario_id: effectiveOpId,
    maquina_id: machId,
    fecha: fecha,
    hora_inicio: mT(startTime)
  }];
  _runMotorAndApply(changes, { pulmonAction: pulmonActionPref });
}

// _runMotorAndApply: wrapper unificado. Toma una lista de cambios genericos,
// simula con simulateChange, muestra el modal "Actividades afectadas" si hay
// algo que confirmar, o aplica directamente si solo afecta a las activ ancladas
// (las pasadas en `changes`).
// Este wrapper sirve para cualquier accion que cambie estado: mover una activ,
// cambiar duracion, aplicar OT, eliminar, etc. La idea es centralizar el flujo
// "simular -> mostrar modal si hace falta -> aplicar".
function _runMotorAndApply(changes, options) {
  options = options || {};
  const pulmonAction = options.pulmonAction || pulmonActionPref;
  const simResult = simulateChange(changes, { pulmonAction });

  if (!simResult.ok) {
    if (simResult.error === 'predecesor_no_planificado') {
      const predId = simResult.detail.predecesor_id;
      const sucId = simResult.detail.sucesor_id;
      const pAct = acts.find(a => a.id === predId);
      const sAct = acts.find(a => a.id === sucId);
      alert('No se puede aplicar este cambio:\n\nLa actividad "' + (sAct ? sAct.descripcion : '#' + sucId) + '" tiene como predecesor a "' + (pAct ? pAct.descripcion : '#' + predId) + '", que no esta planificada todavia. Planifica el predecesor primero.');
      return;
    }
    if (simResult.error === 'no_converge') {
      alert('La simulacion no convergio en ' + simResult.detail.iterations + ' iteraciones. Esto es un bug del motor; reportalo a Tomi.');
      return;
    }
    if (simResult.error === 'conflicto_no_resoluble') {
      const det = simResult.detail.residual.map(r => {
        if (r.type === 'op') return '• Operario ' + opN(r.opId) + ': activ #' + r.a + ' choca con activ #' + r.b;
        return '• Maquina ' + mN(r.machId) + ': activ #' + r.a + ' choca con activ #' + r.b;
      }).join('\n');
      alert('No se pudo resolver el cambio sin pisar otras actividades:\n\n' + det + '\n\nProba mover alguna a otra fecha/hora primero.');
      return;
    }
    if (simResult.error === 'bug_motor_residual') {
      // Bug del motor: la simulacion termino con conflictos no resueltos donde
      // al menos una de las activ NO es ancla. El motor deberia haberla
      // cascadeado. Mostramos el detalle al usuario pero le pedimos reportar.
      const det = simResult.detail.residual.map(r => {
        if (r.type === 'op') return '• Operario ' + opN(r.opId) + ': activ #' + r.a + ' choca con activ #' + r.b + (r.bothAnchors ? '' : ' (deberia haberse cascadeado)');
        return '• Maquina ' + mN(r.machId) + ': activ #' + r.a + ' choca con activ #' + r.b + (r.bothAnchors ? '' : ' (deberia haberse cascadeado)');
      }).join('\n');
      console.error('[motor] bug_motor_residual:', simResult.detail.residual);
      alert('Se detecto un caso que el motor no logro resolver automaticamente. Esto es un bug.\n\nDetalle:\n' + det + '\n\nReportalo a Tomi con la accion que estabas haciendo.');
      return;
    }
    alert('Error en simulacion: ' + simResult.error);
    return;
  }

  // v70 Fase 10f: filtro de invariantes. Si hay violaciones, mostrar modal
  // rojo bloqueante y NO aplicar nada.
  if (!commitInvariantesOk(simResult)) {
    return;
  }

  // Pulmones eliminados por la simulacion (estan en acts pero no en state)
  const pulmonesPisados = [];
  acts.forEach(a => {
    if (!a.es_pulmon) return;
    if (a.estado === 'sin_planificar' || a.fecha === '1900-01-01') return;
    if (!simResult.state.has(a.id)) pulmonesPisados.push(a.id);
  });

  const affectedItems = simResult.affected;
  const placedActId = changes[0] ? changes[0].id : null;

  // CASE: nada se movio aparte de las anchors → aplicar directo.
  if (affectedItems.length === 0 && pulmonesPisados.length === 0) {
    proceedWithPlacementMotor(placedActId, simResult.applyPlan, []);
    return;
  }

  // CASE: solo pulmones afectados → aplicar directo (regla establecida).
  const onlyPulmones = affectedItems.every(it => it.es_pulmon || it._deleted);
  if (onlyPulmones && affectedItems.length + pulmonesPisados.length > 0) {
    proceedWithPlacementMotor(placedActId, simResult.applyPlan, pulmonesPisados);
    return;
  }

  // CASE: hay otras activ afectadas → modal de confirmacion.
  showAffectedActivitiesModalMotor(placedActId, simResult.applyPlan, affectedItems, pulmonesPisados, changes);
}


// plan es {id, fecha?, hora_inicio?, operario_id?, maquina_id?, ..., _delete?}.
// Toma snapshot de los valores anteriores para undo, ejecuta los updates, y
// refleja en `acts`.
async function proceedWithPlacementMotor(placedActId, applyPlan, pulmonIdsToDelete) {
  const fullPlan = (applyPlan || []).slice();
  // Combinar pulmones-a-borrar dentro del plan (todo va al RPC junto).
  (pulmonIdsToDelete || []).forEach(pid => {
    if (!fullPlan.find(it => it.id === pid && it._delete)) {
      fullPlan.push({ id: pid, _delete: true });
    }
  });
  if (fullPlan.length === 0) return;

  // Snapshot para undo: por cada item del plan, capturar estado previo en acts.
  const undoBatch = [];
  for (const item of fullPlan) {
    if (item._isNew) continue;
    const orig = acts.find(a => a.id === item.id);
    if (!orig) continue;
    if (item._delete) {
      undoBatch.push({ id: item.id, prev: _cloneActSnapshot(orig), _wasDeleted: true });
    } else {
      undoBatch.push({ id: item.id, prev: _cloneActSnapshot(orig) });
    }
  }

  // Para cada activ que pasa de sin_planificar a planificada, agregar al item
  // el estado y estado_proceso, y los ot_ack_* iniciales.
  for (const item of fullPlan) {
    if (item._delete) continue;
    const orig = acts.find(a => a.id === item.id);
    if (orig && orig.estado === 'sin_planificar' && item.fecha && item.fecha !== '1900-01-01') {
      item.estado = 'pendiente';
      item.estado_proceso = 'Planificado';
      if (orig.ot_ack_dur_estimada_min === null || orig.ot_ack_dur_estimada_min === undefined) item.ot_ack_dur_estimada_min = orig.duracion_estimada_min;
      if (orig.ot_ack_margen_min === null || orig.ot_ack_margen_min === undefined) item.ot_ack_margen_min = orig.duracion_margen_min || 0;
      if (orig.ot_ack_setup_min === null || orig.ot_ack_setup_min === undefined) item.ot_ack_setup_min = orig.duracion_operario_min;
      if (orig.ot_ack_tipo === null || orig.ot_ack_tipo === undefined || orig.ot_ack_tipo === '') item.ot_ack_tipo = orig.tipo;
      if (orig.ot_ack_operario_ideal_id === null || orig.ot_ack_operario_ideal_id === undefined) item.ot_ack_operario_ideal_id = orig.operario_ideal_id;
      if (orig.ot_ack_maquina_ideal_id === null || orig.ot_ack_maquina_ideal_id === undefined) item.ot_ack_maquina_ideal_id = orig.maquina_ideal_id;
      if (orig.ot_ack_maquina_ideal_nombre === null || orig.ot_ack_maquina_ideal_nombre === undefined) item.ot_ack_maquina_ideal_nombre = orig.maquina_ideal_nombre;
    }
  }

  // Limpiar campos internos del motor antes de mandar al RPC.
  const planForRpc = fullPlan.map(item => {
    const clean = {};
    Object.keys(item).forEach(k => {
      if (k.startsWith('_')) return;
      if (item[k] !== undefined && item[k] !== null) clean[k] = item[k];
      else if (item[k] === null) clean[k] = null; // mantener nulls explicitos
    });
    if (item._delete) clean._delete = true;
    return clean;
  });

  // Llamar al RPC. Atomicidad garantizada por la funcion SQL.
  const { error } = await sb.rpc('apply_motor_plan', { plan: planForRpc });
  if (error) {
    toast('Error al aplicar cambios: ' + error.message, true);
    console.error('apply_motor_plan error:', error);
    return;
  }

  // Reflejar en `acts` localmente.
  let appliedCount = 0, deletedCount = 0;
  for (const item of fullPlan) {
    if (item._delete) {
      const idx = acts.findIndex(x => x.id === item.id);
      if (idx >= 0) acts.splice(idx, 1);
      deletedCount++;
      continue;
    }
    const orig = acts.find(a => a.id === item.id);
    if (!orig) continue;
    Object.keys(item).forEach(k => {
      if (k.startsWith('_')) return;
      if (item[k] !== undefined) orig[k] = item[k];
    });
    appliedCount++;
  }

  if (undoBatch.length > 0) uStack.push(undoBatch);
  updU();
  let msg = 'Cambios aplicados';
  if (appliedCount > 0) msg += ' (' + appliedCount + ' activ.';
  if (deletedCount > 0) msg += ', ' + deletedCount + ' eliminada' + (deletedCount > 1 ? 's' : '');
  if (appliedCount > 0 || deletedCount > 0) msg += ')';
  toast(msg);
  render();
}

function _cloneActSnapshot(a) {
  return {
    fecha: a.fecha,
    hora_inicio: a.hora_inicio,
    operario_id: a.operario_id,
    maquina_id: a.maquina_id,
    estado: a.estado,
    duracion_planificador_min: a.duracion_planificador_min,
    duracion_operario_min: a.duracion_operario_min,
    tipo: a.tipo
  };
}

  function _stripProc(desc, proc) {

  affectedItems.sort((a, b) => {

  });

    const icon = it.es_pulmon ? '🫁 ' : '';

  pulmonIdsToDelete.forEach(pid => {

    const oldStr = fmtDate(p.fecha) + ' ' + p.hora_inicio.substring(0,5);

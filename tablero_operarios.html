$$ LANGUAGE plpgsql;
*/
// =============================================================================

const SIM_MAX_ITER = 200;
const SIM_GAP = (typeof GAP !== 'undefined' ? GAP : 0);

// Construye un item en formato del state desde una actividad (objeto de acts).
function _simBuildStateItem(a) {
  return {
    id: a.id,
    operario_id: a.operario_id,
    maquina_id: a.maquina_id,
    fecha: a.fecha,
    hora_inicio: a.hora_inicio,
    duracion_estimada_min: a.duracion_estimada_min,
    duracion_margen_min: a.duracion_margen_min,
    duracion_operario_min: a.duracion_operario_min,
    duracion_planificador_min: a.duracion_planificador_min,
    tipo: a.tipo,
    ot_ack_dur_estimada_min: a.ot_ack_dur_estimada_min,
    ot_ack_margen_min: a.ot_ack_margen_min,
    ot_ack_setup_min: a.ot_ack_setup_min,
    ot_ack_tipo: a.ot_ack_tipo,
    es_pulmon: !!a.es_pulmon,
    estado: a.estado,
    descripcion: a.descripcion,
    cliente_id: a.cliente_id
  };
}

// Aplica un cambio sobre un item del state (o crea uno nuevo).
function _simApplyChange(state, change) {
  const existing = state.get(change.id);
  if (change._delete) {
    if (existing) state.delete(change.id);
    return;
  }
  if (existing) {
    Object.keys(change).forEach(k => {
      if (k === '_delete') return;
      if (change[k] !== undefined) existing[k] = change[k];
    });
  } else {
    // Nueva activ: copiar todo el cambio como item
    const item = { ...change };
    delete item._delete;
    state.set(change.id, item);
  }
}

// Devuelve el end de OPERARIO de un item del state (Dop respetando jornada).
function _simEndOp(item) {
  // Operario ocupado por Dop minutos, respetando jornada.
  let rem = Dop(item), cd = item.fecha, ct = tM(item.hora_inicio), safe = 0;
  while (rem > 0 && safe < 30) {
    safe++;
    const ds = sS(item.operario_id), de = sE(item.operario_id, cd);
    if (ct < ds) ct = ds;
    const av = de - ct;
    if (av <= 0) { cd = nwd(cd); ct = sS(item.operario_id); continue; }
    const used = Math.min(rem, av);
    rem -= used;
    if (rem > 0) { cd = nwd(cd); ct = sS(item.operario_id); }
    else { ct += used; }
  }
  return { date: cd, time: ct };
}

// Devuelve el end de MAQUINA de un item del state (D total respetando reglas
// del tipo: auto-24/7 corre calendar, semi/manual respetan jornada).
function _simEndMach(item) {
  // Reusa realEnd que ya tiene la logica correcta para los 3 tipos
  return realEnd(item);
}

// Suma 1 al ds (formato YYYY-MM-DD), saltando domingos.
function _simNextWorkDay(ds) {
  return nwd(ds);
}

// Mueve un item adelante a (newDate, newTime), respetando jornada del operario.
// Si newTime cae fuera de jornada, mueve al siguiente dia laboral.
function _simAdjustToWorkingHours(item, newDate, newTime) {
  const opId = item.operario_id;
  const shS = sS(opId);
  if (newTime < shS) newTime = shS;
  const shE = sE(opId, newDate);
  if (newTime >= shE) {
    newDate = _simNextWorkDay(newDate);
    newTime = sS(opId);
  }
  return { date: newDate, time: newTime };
}

// Aplica una pasada de cascada por operario sobre el state.
// Las activ ancladas (en `anchors`) no se mueven.
// Devuelve true si movio algo.
function _simCascadeOp(state, anchors) {
  let movedAny = false;
  // Agrupar por operario
  const byOp = new Map();
  state.forEach(it => {
    if (!it.operario_id) return;
    if (!byOp.has(it.operario_id)) byOp.set(it.operario_id, []);
    byOp.get(it.operario_id).push(it);
  });
  for (const [opId, arr] of byOp) {
    arr.sort((a, b) => {
      if (a.fecha < b.fecha) return -1;
      if (a.fecha > b.fecha) return 1;
      const td = tM(a.hora_inicio) - tM(b.hora_inicio);
      if (td !== 0) return td;
      // Empate de tiempo: anchors van primero
      if (anchors.has(a.id)) return -1;
      if (anchors.has(b.id)) return 1;
      return a.id - b.id;
    });
    // Casos cuando A pisa a B (A esta antes en el orden):
    // 1. A no ancla, B no ancla -> mover B despues del fin OPERARIO de A.
    // 2. A no ancla, B ancla    -> mover A DESPUES del fin OPERARIO de B (la ancla manda).
    // 3. A ancla, B no ancla    -> mover B despues del fin OPERARIO de A.
    // 4. ambas anclas           -> conflicto residual.
    for (let i = 0; i < arr.length - 1; i++) {
      const A = arr[i], B = arr[i + 1];
      const endA = _simEndOp(A);
      const bDate = B.fecha, bTime = tM(B.hora_inicio);
      let needs = false;
      if (bDate < endA.date) needs = true;
      else if (bDate === endA.date && bTime < endA.time + SIM_GAP) needs = true;
      if (!needs) continue;
      const aIsAnchor = anchors.has(A.id);
      const bIsAnchor = anchors.has(B.id);
      if (!bIsAnchor) {
        const adj = _simAdjustToWorkingHours(B, endA.date, endA.time + SIM_GAP);
        if (B.fecha !== adj.date || B.hora_inicio !== mT(adj.time)) {
          B.fecha = adj.date;
          B.hora_inicio = mT(adj.time);
          movedAny = true;
          break; // re-ordenar
        }
      } else if (!aIsAnchor) {
        // B es ancla y A no. Mover A despues de B (operario).
        const endB = _simEndOp(B);
        const adj = _simAdjustToWorkingHours(A, endB.date, endB.time + SIM_GAP);
        if (A.fecha !== adj.date || A.hora_inicio !== mT(adj.time)) {
          A.fecha = adj.date;
          A.hora_inicio = mT(adj.time);
          movedAny = true;
          break; // re-ordenar
        }
      }
      // Caso 4: ambas anclas - se reporta en el detector de residuales.
    }
  }
  return movedAny;
}

// Aplica una pasada de push de maquina sobre el state.
// Activs ancladas no se mueven.
function _simPushMach(state, anchors) {
  let movedAny = false;
  // v70 Fase 9c: agrupar por máquina, NO solo por fecha de inicio. Una
  // actividad puede empezar el día X y terminar el X+1; debe compararse
  // contra cualquier otra actividad en la misma máquina cuyos rangos
  // ocupen días que se solapan con los suyos.
  const byMach = new Map();
  state.forEach(it => {
    if (!it.maquina_id) return;
    const key = String(it.maquina_id);
    if (!byMach.has(key)) byMach.set(key, []);
    byMach.get(key).push(it);
  });
  byMach.forEach(arr => {
    arr.sort((a, b) => {
      // v70 Fase 9c: ordenar por fecha+hora juntas (antes solo por hora,
      // asumiendo mismo día).
      if (a.fecha < b.fecha) return -1;
      if (a.fecha > b.fecha) return 1;
      const td = tM(a.hora_inicio) - tM(b.hora_inicio);
      if (td !== 0) return td;
      if (anchors.has(a.id)) return -1;
      if (anchors.has(b.id)) return 1;
      return a.id - b.id;
    });
    // Recorrer pares consecutivos. Hay 4 casos cuando A pisa a B:
    // 1. A no ancla, B no ancla -> mover B despues de A (caso clasico).
    // 2. A no ancla, B ancla -> mover A DESPUES de B (la ancla manda; A se desplaza hacia adelante mas alla del fin de B).
    // 3. A ancla, B no ancla -> mover B despues de A.
    // 4. A ancla, B ancla -> conflicto irresoluble (se reporta luego).
    for (let i = 0; i < arr.length - 1; i++) {
      const A = arr[i], B = arr[i + 1];
      const aEnd = _simEndMach(A);
      const bDate = B.fecha, bTime = tM(B.hora_inicio);
      let needs = false;
      if (bDate < aEnd.date) needs = true;
      else if (bDate === aEnd.date && bTime < aEnd.time + SIM_GAP) needs = true;
      if (!needs) continue;
      const aIsAnchor = anchors.has(A.id);
      const bIsAnchor = anchors.has(B.id);
      if (!bIsAnchor) {
        // Caso 1 o 3: mover B despues de A.
        const adj = _simAdjustToWorkingHours(B, aEnd.date, aEnd.time + SIM_GAP);
        if (B.fecha !== adj.date || B.hora_inicio !== mT(adj.time)) {
          B.fecha = adj.date;
          B.hora_inicio = mT(adj.time);
          movedAny = true;
        }
      } else if (!aIsAnchor) {
        // Caso 2: B es ancla, A no. Mover A DESPUES del fin de B.
        const bEndMach = _simEndMach(B);
        const adj = _simAdjustToWorkingHours(A, bEndMach.date, bEndMach.time + SIM_GAP);
        if (A.fecha !== adj.date || A.hora_inicio !== mT(adj.time)) {
          A.fecha = adj.date;
          A.hora_inicio = mT(adj.time);
          movedAny = true;
        }
      }
      // Caso 4 (ambos anclas): no se hace nada, el detector de residuales lo reporta.
    }
  });
  return movedAny;
}

// Verifica correlatividades: cada sucesor debe arrancar despues del fin del
// predecesor + GAP. Si no, se cascadea. Si el predecesor no esta planificado,
// devuelve { ok: false, error: 'predecesor_no_planificado', detail: ... }.
function _simEnforceCorrs(state, anchors) {
  let movedAny = false;
  for (const corr of corrs) {
    const pred = state.get(corr.predecesor_id);
    const suc = state.get(corr.sucesor_id);
    if (!suc) continue; // sucesor borrado/no planificado, no aplica
    if (!pred) {
      // v70 Fase 10: si el predecesor está marcado como 'completada' (hecho)
      // pero no está en el state (porque tiene fecha='1900-01-01' o similar),
      // no debe bloquear — ya se hizo, no hay nada que esperar.
      const predAct = acts.find(a => a.id === corr.predecesor_id);
      if (predAct && predAct.estado === 'completada') continue;
      // Sucesor planificado pero predecesor no existe en state: bloqueo.
      return { ok: false, error: 'predecesor_no_planificado', detail: { sucesor_id: corr.sucesor_id, predecesor_id: corr.predecesor_id } };
    }
    const predEnd = _simEndMach(pred);
    const sDate = suc.fecha, sTime = tM(suc.hora_inicio);
    let needs = false;
    if (sDate < predEnd.date) needs = true;
    else if (sDate === predEnd.date && sTime < predEnd.time + SIM_GAP) needs = true;
    if (needs) {
      if (anchors.has(suc.id)) continue;
      const adj = _simAdjustToWorkingHours(suc, predEnd.date, predEnd.time + SIM_GAP);
      if (suc.fecha !== adj.date || suc.hora_inicio !== mT(adj.time)) {
        suc.fecha = adj.date;
        suc.hora_inicio = mT(adj.time);
        movedAny = true;
      }
    }
  }
  return { ok: true, moved: movedAny };
}

// Funcion principal: simula los `changes` aplicados al estado actual y
// resuelve todas las cascadas hasta punto fijo.
function simulateChange(changes, options) {
  options = options || {};
  const pulmonAction = options.pulmonAction || 'cascadear';

  // 1. Construir state inicial a partir de acts (excluyendo sin_planificar).
  const state = new Map();
  acts.forEach(a => {
    if (a.estado === 'sin_planificar' || a.fecha === '1900-01-01') return;
    state.set(a.id, _simBuildStateItem(a));
  });

  // 2. Aplicar cambios al state y registrar anchors.
  const anchors = new Set();
  changes.forEach(c => {
    _simApplyChange(state, c);
    if (!c._delete) anchors.add(c.id);
  });

  // 3. Iterar hasta punto fijo. En cada iteracion:
  //    a) Si pulmonAction='pisar', detectar pulmones que se pisan con activ
  //       no-pulmon y eliminarlos.
  //    b) Cascadear por operario.
  //    c) Empujar por maquina.
  //    d) Verificar correlatividades.
  //    Si nada cambio, terminar. Si en a) se elimino algo, b/c/d se aplican
  //    igual.
  for (let iter = 0; iter < SIM_MAX_ITER; iter++) {
    let any = false;
    if (pulmonAction === 'pisar') {
      const pisados = _simPisarPulmonesEnConflicto(state, anchors);
      if (pisados > 0) any = true;
    }
    if (_simCascadeOp(state, anchors)) any = true;
    if (_simPushMach(state, anchors)) any = true;
    const corrRes = _simEnforceCorrs(state, anchors);
    if (!corrRes.ok) return corrRes;
    if (corrRes.moved) any = true;
    if (!any) {
      return _simBuildResult(state, anchors);
    }
  }
  return { ok: false, error: 'no_converge', detail: { iterations: SIM_MAX_ITER } };
}

// Detecta pulmones del state que se pisan con CUALQUIER activ no-pulmon del
// mismo operario en el mismo dia, y los elimina del state. Devuelve cuantos
// elimino. Se usa solo si pulmonAction='pisar'.
function _simPisarPulmonesEnConflicto(state, anchors) {
  let pisados = 0;
  // Pre-computar slices de operario de las activ no-pulmon (los rangos donde
  // ocupan al operario)
  const opRanges = new Map(); // opId+fecha -> array de {start, end}
  state.forEach(it => {
    if (it.es_pulmon) return;
    if (!it.operario_id) return;
    const start = tM(it.hora_inicio);
    const end = start + Dop(it);
    const key = it.operario_id + '|' + it.fecha;
    if (!opRanges.has(key)) opRanges.set(key, []);
    opRanges.get(key).push({ start, end });
  });
  // Recorrer pulmones y eliminar los que se pisan
  const aEliminar = [];
  state.forEach(it => {
    if (!it.es_pulmon) return;
    if (anchors.has(it.id)) return; // no eliminamos pulmones ancla (improbable)
    const key = it.operario_id + '|' + it.fecha;
    const ranges = opRanges.get(key);
    if (!ranges) return;
    const pStart = tM(it.hora_inicio);
    const pEnd = pStart + D(it);
    for (const r of ranges) {
      if (!(r.end <= pStart || r.start >= pEnd)) {
        aEliminar.push(it.id);
        break;
      }
    }
  });
  aEliminar.forEach(id => { state.delete(id); pisados++; });
  return pisados;
}

// Detecta TODOS los conflictos residuales en el state. No filtra por anchors:
// si encuentra dos activ que se pisan, las reporta. El caller decide que hacer.
function _simDetectResidualConflicts(state, anchors) {
  const residual = [];
  // Conflictos de operario
  const byOp = new Map();
  state.forEach(it => {
    if (!it.operario_id) return;
    if (!byOp.has(it.operario_id)) byOp.set(it.operario_id, []);
    byOp.get(it.operario_id).push(it);
  });
  byOp.forEach((arr) => {
    arr.sort((a, b) => {
      if (a.fecha < b.fecha) return -1;
      if (a.fecha > b.fecha) return 1;
      return tM(a.hora_inicio) - tM(b.hora_inicio);
    });
    for (let i = 0; i < arr.length - 1; i++) {
      const A = arr[i], B = arr[i + 1];
      const endA = _simEndOp(A);
      const bDate = B.fecha, bTime = tM(B.hora_inicio);
      let conflicts = false;
      if (bDate < endA.date) conflicts = true;
      else if (bDate === endA.date && bTime < endA.time + SIM_GAP) conflicts = true;
      if (conflicts) {
        residual.push({ type: 'op', a: A.id, b: B.id, opId: A.operario_id, bothAnchors: anchors.has(A.id) && anchors.has(B.id) });
      }
    }
  });
  // Conflictos de maquina
  const byMach = new Map();
  state.forEach(it => {
    if (!it.maquina_id) return;
    const key = it.maquina_id + '|' + it.fecha;
    if (!byMach.has(key)) byMach.set(key, []);
    byMach.get(key).push(it);
  });
  byMach.forEach(arr => {
    arr.sort((a, b) => tM(a.hora_inicio) - tM(b.hora_inicio));
    for (let i = 0; i < arr.length - 1; i++) {
      const A = arr[i], B = arr[i + 1];
      const aEnd = _simEndMach(A);
      const bDate = B.fecha, bTime = tM(B.hora_inicio);
      let conflicts = false;
      if (bDate < aEnd.date) conflicts = true;
      else if (bDate === aEnd.date && bTime < aEnd.time + SIM_GAP) conflicts = true;
      if (conflicts) {
        residual.push({ type: 'mach', a: A.id, b: B.id, machId: A.maquina_id, bothAnchors: anchors.has(A.id) && anchors.has(B.id) });
      }
    }
  });
  return residual;
}

// Construye el resultado final comparando state vs acts.
function _simBuildResult(state, anchors) {
  // Rutina de control: detectar TODOS los conflictos residuales (cualquiera).
  const residual = _simDetectResidualConflicts(state, anchors);
  if (residual.length > 0) {
    // Caso 1: SOLO residuales entre anchors -> error 'conflicto_no_resoluble'.
    //   El usuario tiene que mover algo manualmente.
    // Caso 2: hay residuales con AL MENOS UNA no-ancla -> es un bug del motor
    //   (deberia haberlo cascadeado). Lo reportamos para diagnostico, pero
    //   con el error 'bug_motor_residual' para distinguir del caso valido.
    const allBothAnchors = residual.every(r => r.bothAnchors);
    if (allBothAnchors) {
      return { ok: false, error: 'conflicto_no_resoluble', detail: { residual } };
    } else {
      // Bug del motor. Logueamos para diagnostico pero devolvemos error claro.
      console.error('[motor] Conflictos residuales no resueltos por la simulacion:', residual);
      return { ok: false, error: 'bug_motor_residual', detail: { residual } };
    }
  }
  const affected = [];
  const applyPlan = [];
  state.forEach((sim, id) => {
    const orig = acts.find(a => a.id === id);
    if (!orig) {
      // activ nueva insertada - va al apply plan completo
      applyPlan.push({ id, ...sim, _isNew: true });
      return;
    }
    const moved = (orig.fecha !== sim.fecha) || (orig.hora_inicio !== sim.hora_inicio);
    const opChanged = (orig.operario_id !== sim.operario_id);
    const machChanged = (orig.maquina_id !== sim.maquina_id);
    const durChanged = (orig.duracion_planificador_min !== sim.duracion_planificador_min);
    const tipoChanged = (orig.tipo !== sim.tipo);
    const setupChanged = (orig.duracion_operario_min !== sim.duracion_operario_min);
    const ackDurChanged = (orig.ot_ack_dur_estimada_min !== sim.ot_ack_dur_estimada_min);
    const ackMargenChanged = (orig.ot_ack_margen_min !== sim.ot_ack_margen_min);
    const ackSetupChanged = (orig.ot_ack_setup_min !== sim.ot_ack_setup_min);
    const ackTipoChanged = (orig.ot_ack_tipo !== sim.ot_ack_tipo);
    if (moved || opChanged || machChanged || durChanged || tipoChanged || setupChanged ||
        ackDurChanged || ackMargenChanged || ackSetupChanged || ackTipoChanged) {
      const planItem = { id, _isAnchor: anchors.has(id) };
      // Solo incluir campos que cambiaron (para no pisar valores con undefined)
      if (moved) { planItem.fecha = sim.fecha; planItem.hora_inicio = sim.hora_inicio; }
      if (opChanged) planItem.operario_id = sim.operario_id;
      if (machChanged) planItem.maquina_id = sim.maquina_id;
      if (durChanged) planItem.duracion_planificador_min = sim.duracion_planificador_min;
      if (setupChanged) planItem.duracion_operario_min = sim.duracion_operario_min;
      if (tipoChanged) planItem.tipo = sim.tipo;
      if (ackDurChanged) planItem.ot_ack_dur_estimada_min = sim.ot_ack_dur_estimada_min;
      if (ackMargenChanged) planItem.ot_ack_margen_min = sim.ot_ack_margen_min;
      if (ackSetupChanged) planItem.ot_ack_setup_min = sim.ot_ack_setup_min;
      if (ackTipoChanged) planItem.ot_ack_tipo = sim.ot_ack_tipo;
      applyPlan.push(planItem);
    }
    if (moved && !anchors.has(id)) {
      affected.push({
        id,
        descripcion: orig.descripcion,
        proceso: orig.proceso,
        cliente: clN(orig.cliente_id),
        maquina_id: sim.maquina_id,
        operario_id: sim.operario_id,
        es_pulmon: !!orig.es_pulmon,
        oldFecha: orig.fecha, oldHora: orig.hora_inicio,
        newFecha: sim.fecha, newHora: sim.hora_inicio
      });
    }
  });
  // Detectar deletes (estaban en acts y no en state)
  acts.forEach(a => {
    if (a.estado === 'sin_planificar' || a.fecha === '1900-01-01') return;
    if (!state.has(a.id)) {
      applyPlan.push({ id: a.id, _delete: true });
      affected.push({
        id: a.id,
        descripcion: a.descripcion,
        proceso: a.proceso,
        cliente: clN(a.cliente_id),
        maquina_id: a.maquina_id,
        operario_id: a.operario_id,
        es_pulmon: !!a.es_pulmon,
        oldFecha: a.fecha, oldHora: a.hora_inicio,
        newFecha: null, newHora: null,
        _deleted: true
      });
    }
  });
  return { ok: true, state, affected, applyPlan };
}

// =====================================================================
// v70 Fase 10f - FILTRO DE INVARIANTES
// =====================================================================
//
// Antes de aplicar cualquier resultado de simulateChange a la base, este
// filtro detecta violaciones de invariantes físicas y bloquea la escritura.
//
// Invariantes verificadas (en estado FINAL del simulador):
//   1) No hay solapamiento de máquina entre actividades activas.
//   2) Ancladas (estado='completada') no se mueven respecto al estado actual.
//   3) Sucesora no empieza antes del fin de máquina de su predecesora.
//
// Política para solapamientos preexistentes:
//   Modo B (confirmado): solo se bloquea si el cambio INTRODUCE un solapamiento
//   nuevo. Solapamientos que ya existían en `acts` antes del cambio se ignoran
//   (no bloquean nuevos cambios, pero quedan listados aparte por si querés
//   verlos).
//
// Devuelve un array de violaciones. Vacío = OK.
function _validarInvariantesEnState(state, _applyPlan) {
  const violaciones = [];

  // --- Helper: calcular pares solapados en máquina dentro de un set de items.
  // Devuelve [{aId, bId, machId, ...}] con info para mostrar.
  function paresSolapadosMaquina(itemsArr) {
    const pares = [];
    // Agrupar por máquina.
    const porMaq = new Map();
    itemsArr.forEach(it => {
      if (!it.maquina_id) return;
      const key = String(it.maquina_id);
      if (!porMaq.has(key)) porMaq.set(key, []);
      porMaq.get(key).push(it);
    });
    porMaq.forEach((arr, machIdStr) => {
      // Ordenar por fecha+hora.
      arr.sort((a, b) => {
        if (a.fecha < b.fecha) return -1;
        if (a.fecha > b.fecha) return 1;
        return tM(a.hora_inicio) - tM(b.hora_inicio);
      });
      for (let i = 0; i < arr.length; i++) {
        const A = arr[i];
        const aEnd = _simEndMach(A);
        for (let j = i + 1; j < arr.length; j++) {
          const B = arr[j];
          // B empieza antes de que A termine? (B.fecha+B.hora < aEnd)
          if (B.fecha < aEnd.date || (B.fecha === aEnd.date && tM(B.hora_inicio) < aEnd.time)) {
            pares.push({ aId: A.id, bId: B.id, machId: parseInt(machIdStr) });
          } else {
            break;  // ordenadas: si esta no solapa, las que siguen tampoco con A.
          }
        }
      }
    });
    return pares;
  }

  // --- 1) Solapamiento de máquina ---
  // Calculamos solapamientos AHORA (state) y antes (acts originales).
  // Solo bloqueamos los que sean nuevos.
  const stateArr = Array.from(state.values());
  const solapNuevos = paresSolapadosMaquina(stateArr);
  // Solapamientos preexistentes (en `acts` con activ activas).
  const actsActivas = acts.filter(a => a.estado !== 'sin_planificar' && a.fecha !== '1900-01-01')
    .map(a => _simBuildStateItem(a));
  const solapViejos = paresSolapadosMaquina(actsActivas);
  // Un solapamiento es "preexistente" si los mismos dos IDs ya se solapaban
  // antes (sin importar máquina exacta).
  const claveViejos = new Set(solapViejos.map(s => {
    const lo = Math.min(s.aId, s.bId), hi = Math.max(s.aId, s.bId);
    return lo + '-' + hi;
  }));
  solapNuevos.forEach(s => {
    const lo = Math.min(s.aId, s.bId), hi = Math.max(s.aId, s.bId);
    if (!claveViejos.has(lo + '-' + hi)) {
      const A = state.get(s.aId), B = state.get(s.bId);
      const aEnd = _simEndMach(A);
      violaciones.push({
        tipo: 'solapamiento_maquina',
        actA: { id: A.id, descripcion: A.descripcion, fecha: A.fecha, hora: A.hora_inicio, finFecha: aEnd.date, finHora: aEnd.time },
        actB: { id: B.id, descripcion: B.descripcion, fecha: B.fecha, hora: B.hora_inicio },
        maquina_id: s.machId
      });
    }
  });

  // --- 2) Ancladas no se mueven ---
  // Una anclada (estado='completada' en `acts`) no debe haber cambiado
  // fecha/hora/máquina/operario en el state.
  // v70 Fase 10: solo controlamos las que estaban realmente planificadas en
  // el tablero (con fecha distinta de '1900-01-01'). Las que se marcaron como
  // hechas sin haber estado planificadas (caso típico: marcar "hecho" desde
  // el proyecto a procesos que nunca llegaron al tablero) NO se controlan,
  // porque no están en el state ni deberían estarlo.
  acts.forEach(a => {
    if (a.estado !== 'completada') return;
    if (!a.fecha || a.fecha === '1900-01-01') return;
    const sim = state.get(a.id);
    if (!sim) {
      violaciones.push({ tipo: 'anclada_eliminada', act: { id: a.id, descripcion: a.descripcion } });
      return;
    }
    const movida = (sim.fecha !== a.fecha) ||
      (sim.hora_inicio !== a.hora_inicio) ||
      (sim.maquina_id !== a.maquina_id) ||
      (sim.operario_id !== a.operario_id);
    if (movida) {
      violaciones.push({
        tipo: 'anclada_movida',
        act: {
          id: a.id, descripcion: a.descripcion,
          oldFecha: a.fecha, oldHora: a.hora_inicio,
          newFecha: sim.fecha, newHora: sim.hora_inicio
        }
      });
    }
  });

  // --- 3) Sucesora no antes del fin de máquina de su predecesora ---
  // Solo controlamos correlatividades donde ambas estén activas en el state.
  if (typeof corrs !== 'undefined' && corrs && corrs.length) {
    corrs.forEach(c => {
      const pred = state.get(c.predecesor_id);
      const suc = state.get(c.sucesor_id);
      if (!pred || !suc) return;
      const predEnd = _simEndMach(pred);
      // suc.fecha+suc.hora >= predEnd ?
      if (suc.fecha < predEnd.date ||
        (suc.fecha === predEnd.date && tM(suc.hora_inicio) < predEnd.time)) {
        // Solo reportar si NO era violación preexistente.
        const predA = acts.find(x => x.id === c.predecesor_id);
        const sucA = acts.find(x => x.id === c.sucesor_id);
        let eraViolacionAntes = false;
        if (predA && sucA && predA.estado !== 'sin_planificar' && sucA.estado !== 'sin_planificar') {
          const predAItem = _simBuildStateItem(predA);
          const predAEnd = _simEndMach(predAItem);
          if (sucA.fecha < predAEnd.date ||
            (sucA.fecha === predAEnd.date && tM(sucA.hora_inicio) < predAEnd.time)) {
            eraViolacionAntes = true;
          }
        }
        if (!eraViolacionAntes) {
          violaciones.push({
            tipo: 'correlatividad_violada',
            pred: { id: pred.id, descripcion: pred.descripcion, finFecha: predEnd.date, finHora: predEnd.time },
            suc: { id: suc.id, descripcion: suc.descripcion, fecha: suc.fecha, hora: suc.hora_inicio }
          });
        }
      }
    });
  }

  return violaciones;
}

// Muestra un modal bloqueante con la lista de violaciones. Sin opción de
// forzar (modo A confirmado). El cambio NO se aplica.
function _mostrarModalViolaciones(violaciones) {
  const prev = document.getElementById('inv-modal');
  if (prev) prev.remove();
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'inv-modal';
  const m = document.createElement('div'); m.className = 'md';
  m.style.maxWidth = '640px';
  m.style.maxHeight = '88vh';
  m.style.overflowY = 'auto';
  m.style.borderTop = '4px solid #A32D2D';

  let h = '<div class="md-t" style="color:#A32D2D">⚠ No se puede aplicar el cambio</div>';
  h += '<div style="font-size:12px;color:#5F5E5A;margin-bottom:10px">El cambio propuesto rompe reglas del tablero. Ningún cambio se aplicó. Revisá y volvé a intentar.</div>';
  // Agrupar por tipo para mostrar más prolijo.
  const porTipo = {};
  violaciones.forEach(v => {
    if (!porTipo[v.tipo]) porTipo[v.tipo] = [];
    porTipo[v.tipo].push(v);
  });
  const titulos = {
    solapamiento_maquina:   'Solapamiento en máquina',
    anclada_movida:         'Actividad anclada que se movería',
    anclada_eliminada:      'Actividad anclada que se eliminaría',
    correlatividad_violada: 'Predecesor que no termina a tiempo'
  };
  Object.keys(porTipo).forEach(tipo => {
    h += '<div style="margin-bottom:10px;background:#FEF0F0;border:1px solid #FEDADA;border-radius:5px;padding:8px 11px">';
    h += '<div style="font-weight:700;font-size:12px;color:#A32D2D;margin-bottom:5px">' + (titulos[tipo] || tipo) + ' (' + porTipo[tipo].length + ')</div>';
    porTipo[tipo].forEach(v => {
      h += '<div style="font-size:11px;color:#5F5E5A;padding:3px 0;border-top:1px solid #FEDADA">';
      if (tipo === 'solapamiento_maquina') {
        const maqName = (typeof mN === 'function') ? mN(v.maquina_id) : ('maq #' + v.maquina_id);
        h += '<b>' + escapeHtml(v.actA.descripcion || '?') + '</b> termina el ' + v.actA.finFecha + ' a las ' + mT(v.actA.finHora) + ' en ' + escapeHtml(maqName) + ', pero <b>' + escapeHtml(v.actB.descripcion || '?') + '</b> arrancaría el ' + v.actB.fecha + ' a las ' + (v.actB.hora || '').substring(0,5);
      } else if (tipo === 'anclada_movida') {
        h += '<b>' + escapeHtml(v.act.descripcion || '?') + '</b> está marcada como hecha el ' + v.act.oldFecha + ' a las ' + (v.act.oldHora || '').substring(0,5) + ', pero el cambio la movería al ' + v.act.newFecha + ' a las ' + (v.act.newHora || '').substring(0,5);
      } else if (tipo === 'anclada_eliminada') {
        h += '<b>' + escapeHtml(v.act.descripcion || '?') + '</b> está marcada como hecha y el cambio la eliminaría';
      } else if (tipo === 'correlatividad_violada') {
        h += '<b>' + escapeHtml(v.pred.descripcion || '?') + '</b> termina el ' + v.pred.finFecha + ' a las ' + mT(v.pred.finHora) + ', pero <b>' + escapeHtml(v.suc.descripcion || '?') + '</b> arrancaría antes (' + v.suc.fecha + ' ' + (v.suc.hora || '').substring(0,5) + ')';
      }
      h += '</div>';
    });
    h += '</div>';
  });
  h += '<div class="actions">';
  h += '<button class="b b-p" onclick="this.closest(\'.mo\').remove()" autofocus>Entendido</button></div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd); makeModalDraggable(m);
}

// Helper para los puntos de aplicación de simulateChange:
// recibe el resultado del simulador y devuelve true si se puede aplicar,
// false si hay violaciones (y muestra el modal).
function commitInvariantesOk(simResult) {
  if (!simResult || !simResult.state) return true;  // nada que validar
  const viol = _validarInvariantesEnState(simResult.state, simResult.applyPlan);
  if (viol.length > 0) {
    _mostrarModalViolaciones(viol);
    return false;
  }
  return true;
}

// Exponer para testing.
window.validarInvariantes = _validarInvariantesEnState;
window.commitInvariantesOk = commitInvariantesOk;

// Exponer en window para testing desde consola
window.simulateChange = simulateChange;

// =============================================================================
// SUITE DE TESTS SINTETICOS DEL MOTOR
// =============================================================================
// Para correr: window.testMotor() desde la consola del browser.
// Cada test arma un escenario controlado guardando acts/corrs viejas, corre el
// motor con un cambio propuesto, y verifica que el resultado matchee lo
// esperado. Al final restaura acts/corrs.
//
// Los tests NO tocan DB. Solo manipulan acts/corrs en memoria.
//
// Cobertura:
//   1-3:   Casos basicos manuales (sin impacto, cascada simple, multinivel).
//   4-5:   Pulmones (cascadear vs pisar).
//   6:     Correlatividades simples.
//   7-8:   Correlatividades en cadena y bloqueo por predecesor sin planificar.
//   9-11:  Auto/semi (setup, cascada por setup, comportamiento 24/7).
//   12:    Maquina compartida entre operarios.
//   13-14: Cascadas mixtas operario+maquina.
//   15:    Multiples cambios simultaneos.
//   16-17: Limites: convergencia, no convergencia.
//   18:    Cambio de duracion afecta cascada.
//   19:    Cambio de tipo (manual a auto) afecta tiempos.
//   20:    Conflicto residual entre dos anclas.
// =============================================================================
window.testMotor = function(verbose) {
  verbose = !!verbose;
  const origActs = acts.slice();
  const origCorrs = corrs.slice();
  let pass = 0, fail = 0;
  const results = [];
  function expectEq(label, got, expected) {
    const eq = JSON.stringify(got) === JSON.stringify(expected);
    if (eq) {
      pass++;
      if (verbose) results.push('✓ ' + label);
      else results.push('✓ ' + label);
    } else {
      fail++;
      results.push('✗ ' + label + '\n  esperado: ' + JSON.stringify(expected) + '\n  obtenido: ' + JSON.stringify(got));
    }
  }
  function expectTrue(label, got) { expectEq(label, !!got, true); }
  function setActs(arr) { acts.length = 0; arr.forEach(a => acts.push(a)); }
  function setCorrs(arr) { corrs.length = 0; arr.forEach(c => corrs.push(c)); }

  // Helpers de operario y maquina (toman los reales de la app)
  const opId1 = (ops[0] || {}).id;
  const opId2 = (ops[1] || {}).id;
  const machId1 = (maq[0] || {}).id;
  const machId2 = (maq[1] || {}).id;
  if (!opId1 || !opId2 || !machId1 || !machId2) {
    console.warn('No hay suficientes operarios o maquinas; tests omitidos.');
    return { pass: 0, fail: 0, results: ['No hay suficientes operarios/maquinas para correr la suite'] };
  }

  // Helper para crear activ "estandar"
  function ma(id, fecha, hora, opId, machId, dur, opts) {
    opts = opts || {};
    return {
      id, fecha,
      hora_inicio: hora.length === 5 ? hora + ':00' : hora,
      operario_id: opId, maquina_id: machId,
      duracion_estimada_min: dur, duracion_margen_min: 0,
      duracion_planificador_min: dur,
      duracion_operario_min: opts.setup !== undefined ? opts.setup : null,
      tipo: opts.tipo || 'manual',
      ot_ack_dur_estimada_min: dur, ot_ack_margen_min: 0,
      ot_ack_setup_min: opts.setup !== undefined ? opts.setup : null,
      ot_ack_tipo: opts.tipo || 'manual',
      estado: 'pendiente', es_pulmon: !!opts.pulmon,
      descripcion: opts.desc || ('A' + id), cliente_id: null, urgencia: 'media'
    };
  }

  // ===== TEST 1: cambio simple sin afectar a nadie =====
  setActs([ ma(1, '2026-06-01', '08:00', opId1, machId1, 60) ]);
  setCorrs([]);
  let r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1 }]);
  expectEq('T1: cambio sin impacto', { ok: r.ok, n: r.affected ? r.affected.length : -1 }, { ok: true, n: 0 });

  // ===== TEST 2: A se mueve y B se debe cascadear =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(2, '2026-06-01', '10:00', opId1, machId1, 60)
  ]);
  // Mover A a 09:30 con duracion nueva 120 (termina ~11:30, pisa B@10:00)
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '09:30:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 120 }]);
  expectEq('T2: B se cascadea',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [2] });

  // ===== TEST 3: cascada multinivel A->B->C =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(2, '2026-06-01', '09:00', opId1, machId1, 60),
    ma(3, '2026-06-01', '10:00', opId1, machId1, 60)
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 120 }]);
  expectEq('T3: cascada multinivel A->B->C',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [2, 3] });

  // ===== TEST 4: pulmon, modo cascadear =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(2, '2026-06-01', '09:00', opId1, machId1, 60, { pulmon: true })
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 90 }], { pulmonAction: 'cascadear' });
  expectEq('T4: pulmon cascadear -> pulmon se mueve',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [2] });

  // ===== TEST 5: pulmon, modo pisar =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(2, '2026-06-01', '09:00', opId1, machId1, 60, { pulmon: true })
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 90 }], { pulmonAction: 'pisar' });
  expectEq('T5: pulmon pisar -> pulmon eliminado del state',
    { ok: r.ok, pulmonInState: r.ok ? r.state.has(2) : true },
    { ok: true, pulmonInState: false });

  // ===== TEST 6: correlatividad - sucesor cascadeado =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(10, '2026-06-01', '10:00', opId1, machId1, 60, { desc: 'B-suc' })
  ]);
  setCorrs([{ id: 100, predecesor_id: 1, sucesor_id: 10 }]);
  // Aumentamos A a 4hs (480min): debe pisar a B y B debe cascadearse por correlatividad+operario
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 240 }]);
  expectEq('T6: sucesor con correlatividad cascadeado',
    { ok: r.ok, bMoved: r.ok ? r.affected.some(a => a.id === 10) : false },
    { ok: true, bMoved: true });

  // ===== TEST 7: correlatividad en cadena P -> S1 -> S2 =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60, { desc: 'P' }),
    ma(2, '2026-06-01', '10:00', opId1, machId1, 60, { desc: 'S1' }),
    ma(3, '2026-06-01', '12:00', opId1, machId1, 60, { desc: 'S2' })
  ]);
  setCorrs([
    { id: 1, predecesor_id: 1, sucesor_id: 2 },
    { id: 2, predecesor_id: 2, sucesor_id: 3 }
  ]);
  // Aumento P a 180min: arrastra S1 y S1 debe arrastrar S2
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 180 }]);
  expectEq('T7: cadena de correlatividades',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [2, 3] });

  // ===== TEST 8: predecesor sin planificar (debe bloquear) =====
  setActs([
    // Solo el sucesor planificado, predecesor 999 no existe en acts
    ma(10, '2026-06-01', '10:00', opId1, machId1, 60, { desc: 'S' })
  ]);
  setCorrs([{ id: 1, predecesor_id: 999, sucesor_id: 10 }]);
  r = simulateChange([{ id: 10, fecha: '2026-06-01', hora_inicio: '10:00:00', operario_id: opId1, maquina_id: machId1 }]);
  expectEq('T8: predecesor sin planificar -> error', r.ok, false);
  expectEq('T8: error type', r.error, 'predecesor_no_planificado');

  // ===== TEST 9: auto-24/7, setup ata operario =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 240, { tipo: 'automatica', setup: 30 }),
    // Activ del mismo operario justo despues del setup (08:30+)
    ma(2, '2026-06-01', '09:00', opId1, machId2, 60)
  ]);
  setCorrs([]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1 }]);
  // El setup va de 08:00 a 08:30, B@09:00 NO se pisa con el setup -> no se mueve
  expectEq('T9: B no se cascadea (setup termina antes)',
    { ok: r.ok, n: r.affected ? r.affected.length : -1 },
    { ok: true, n: 0 });

  // ===== TEST 10: auto-24/7, setup mas largo pisa B =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 240, { tipo: 'automatica', setup: 90 }),
    // Activ del mismo operario en otra maquina, dentro del setup de A
    ma(2, '2026-06-01', '09:00', opId1, machId2, 60)
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1 }]);
  // Setup va 08:00-09:30, B@09:00 SI se pisa con el setup -> B cascadea
  expectEq('T10: B cascadea por setup mas largo',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [2] });

  // ===== TEST 11: dos manuales mismo operario, conflicto operario =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 120),
    ma(2, '2026-06-01', '09:00', opId1, machId2, 60)  // distinta maquina pero mismo op
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1 }]);
  // A ata operario hasta 10:00, B@09:00 distinta maquina pero mismo op -> cascadea
  expectEq('T11: conflicto operario distinta maquina',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [2] });

  // ===== TEST 12: maquina compartida entre operarios =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(2, '2026-06-01', '09:00', opId2, machId1, 60)  // distinto op, misma maquina
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 120 }]);
  // A termina a las 10:00 en machId1, B@09:00 en machId1 distinto op -> cascadea por maquina
  expectEq('T12: cascada maquina entre operarios',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [2] });

  // ===== TEST 13: cascada mixta op+maquina (B mueve, C mismo op de B se afecta) =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 240),       // A op1 mach1, dura 4h, ata op1
    ma(2, '2026-06-01', '09:00', opId2, machId1, 120),       // B op2 mach1 -> cascadea por maquina (cae despues de A)
    ma(3, '2026-06-01', '12:30', opId2, machId2, 60)         // C op2 mach2 -> debe cascadear si B se mueve y la pisa
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1 }]);
  // A@08:00 dura 4h en machId1: A ocupa machId1 hasta 12:00.
  // B@09:00 op2 machId1 -> cascadea a 12:00, dura 2h -> hasta 14:00.
  // C@12:30 op2 machId2 -> ahora pisa con B nueva (12:00-14:00 mismo op) -> debe cascadear.
  expectEq('T13: cascada mixta op+mach',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [2, 3] });

  // ===== TEST 14: multiples ciclos de cascada (A->B por mach, B->A por op?) =====
  // Caso patologico: A en mach1 termina 10:00. B en mach1 a las 09:00 se va a las 10:00.
  // Si B esta en op1 tambien, op1 ya esta libre tras A, OK no hay segundo loop.
  // Verificamos que la simulacion converge.
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 120),
    ma(2, '2026-06-01', '09:00', opId2, machId1, 60),
    ma(3, '2026-06-01', '11:00', opId1, machId1, 60)  // posterior a A en mach1, ya despues de cascadea
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 180 }]);
  // A nuevo: 08:00-11:00. B@09:00 op2 mach1 -> 11:00. C@11:00 op1 mach1 -> 12:00 (despues de B@11:00).
  // Pero C es op1 igual a A, entonces tambien debe esperar fin op1: A op1 termina 11:00 -> OK.
  expectEq('T14: convergencia con 3 activ',
    { ok: r.ok },
    { ok: true });
  if (r.ok) {
    const c = r.state.get(3);
    expectTrue('T14: C arranca >= 12:00 (despues de B)', tM(c.hora_inicio) >= 720 || c.fecha > '2026-06-01');
  }

  // ===== TEST 15: multiples cambios simultaneos =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(2, '2026-06-01', '14:00', opId2, machId2, 60),
    ma(3, '2026-06-01', '10:00', opId1, machId1, 60)
  ]);
  // Cambiamos A (dur 180min, ahora pisa a C@10:00) y B simultaneamente
  r = simulateChange([
    { id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 180 },
    { id: 2, fecha: '2026-06-01', hora_inicio: '13:00:00', operario_id: opId2, maquina_id: machId2 }
  ]);
  expectEq('T15: dos cambios simultaneos, A cascadea C',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [3] });

  // ===== TEST 16: convergencia con muchos elementos =====
  // Cadena de 10 activ del mismo operario consecutivas, primera crece.
  const longSet = [];
  for (let i = 0; i < 10; i++) {
    longSet.push(ma(100 + i, '2026-06-01', String(8 + i).padStart(2, '0') + ':00', opId1, machId1, 60));
  }
  setActs(longSet);
  setCorrs([]);
  r = simulateChange([{ id: 100, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 120 }]);
  expectEq('T16: cadena larga converge',
    { ok: r.ok, n: r.affected ? r.affected.length : -1 },
    { ok: true, n: 9 });

  // ===== TEST 17: cambio que NO hace converger? Verificamos que detecta no_converge =====
  // No es facil construir un escenario que no converja con la logica actual
  // (siempre se mueve hacia adelante). Skipeamos este test.

  // ===== TEST 18: cambio de duracion via change.duracion_planificador_min =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(2, '2026-06-01', '09:30', opId1, machId1, 60)
  ]);
  // Cambiamos solo duracion (no posicion), el motor debe detectar que pisa a B
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 120 }]);
  expectEq('T18: cambio solo duracion cascadea correctamente',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [2] });

  // ===== TEST 19: cambio de tipo manual -> auto cambia comportamiento =====
  setActs([
    // A originalmente manual de 60min, ata operario las 60min
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    // B en otra maquina del mismo operario a las 08:30 (se solaparia con A si A es manual)
    ma(2, '2026-06-01', '08:30', opId1, machId2, 60)
  ]);
  // Cambiamos A a auto con setup 15 (operario solo atado 15min)
  r = simulateChange([{
    id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1,
    tipo: 'automatica', duracion_operario_min: 15,
    ot_ack_tipo: 'automatica', ot_ack_setup_min: 15
  }]);
  // Ahora A solo ata operario hasta 08:15. B@08:30 ya no se solapa.
  expectEq('T19: cambio a auto libera operario (B no cascadea)',
    { ok: r.ok, n: r.affected ? r.affected.length : -1 },
    { ok: true, n: 0 });

  // ===== TEST 20: dos anchors que se pisan -> conflicto residual =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(2, '2026-06-01', '14:00', opId1, machId1, 60)
  ]);
  // Anclamos ambas en la misma posicion (imposible)
  r = simulateChange([
    { id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1 },
    { id: 2, fecha: '2026-06-01', hora_inicio: '08:30:00', operario_id: opId1, maquina_id: machId1 }
  ]);
  expectEq('T20: dos anchors solapadas -> conflicto_no_resoluble', { ok: r.ok, err: r.error }, { ok: false, err: 'conflicto_no_resoluble' });

  // ===== TEST 21: cambio de operario - activ se mueve a otro track =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    // C en op2 a la misma hora (libre, no se pisa)
    ma(2, '2026-06-01', '08:00', opId2, machId2, 60)
  ]);
  // Movemos A a op2: deberia chocar con C
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId2, maquina_id: machId1 }]);
  expectEq('T21: cambio de operario cascadea por op',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [2] });

  // ===== TEST 22: planificar activ nueva (placedActId que no existe en acts) =====
  setActs([
    ma(2, '2026-06-01', '10:00', opId1, machId1, 60)
  ]);
  // "Planificamos" la id=99 con todos los campos
  r = simulateChange([{
    id: 99, fecha: '2026-06-01', hora_inicio: '08:00:00',
    operario_id: opId1, maquina_id: machId1,
    duracion_estimada_min: 180, duracion_margen_min: 0, duracion_planificador_min: 180,
    duracion_operario_min: null, tipo: 'manual',
    es_pulmon: false, descripcion: 'Nueva', cliente_id: null,
    estado: 'pendiente'
  }]);
  // Nueva ata operario 08-11, B@10:00 se pisa -> cascadea
  expectEq('T22: planificar activ nueva (no estaba en acts)',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [2] });

  // ===== TEST 23: actividad cruza dia (jornada termina, sigue al siguiente) =====
  setActs([
    // Una activ de 600min (10h) que arranca 13:00 -> tiene que cruzar jornada
    ma(1, '2026-06-01', '13:00', opId1, machId1, 600)
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '13:00:00', operario_id: opId1, maquina_id: machId1 }]);
  // El motor calcula realEnd respetando jornada (06-15). Validamos que no hay
  // error y la activ no se mueve (es la anchor).
  expectEq('T23: activ que cruza dia, no mueve', { ok: r.ok, n: r.affected ? r.affected.length : -1 }, { ok: true, n: 0 });

  // ===== TEST 24: cascada que cruza dia =====
  setActs([
    // A de 240min (4h) arranca 13:00 -> queda en jornada del dia 1 hasta 15:00 y sigue dia 2
    ma(1, '2026-06-01', '13:00', opId1, machId1, 240),
    // B en mismo op/dia despues de A pero antes que termine A en dia 2
    ma(2, '2026-06-02', '06:30', opId1, machId1, 60)
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '13:00:00', operario_id: opId1, maquina_id: machId1 }]);
  // A nuevo: 13:00-15:00 (dia 1) + sigue 06:00-08:00 (dia 2) total 4h.
  // B@06:30 dia 2 se pisa con A en dia 2 -> debe cascadear
  expectEq('T24: cascada cruzando dia',
    { ok: r.ok, bMoved: r.ok ? r.affected.some(a => a.id === 2) : false },
    { ok: true, bMoved: true });

  // ===== TEST 25: cascada salta domingo =====
  // Suponemos que '2026-06-06' es sabado y '2026-06-07' es domingo
  // (verificacion: new Date('2026-06-06').getDay() = 6 para sabado correcto)
  // 6/6/2026 segun calendar real es sabado, 7/6/2026 domingo
  setActs([
    // A enorme un viernes (5/6) que tiene que saltar el domingo
    ma(1, '2026-06-05', '14:00', opId1, machId1, 60),
    // B el lunes
    ma(2, '2026-06-08', '07:00', opId1, machId1, 60)
  ]);
  // No cambiamos posicion de A pero le ponemos duracion enorme: 30hs (1800min)
  r = simulateChange([{ id: 1, fecha: '2026-06-05', hora_inicio: '14:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 1800 }]);
  // A debe cubrir hasta lunes/martes saltando domingo. B al lunes 07:00 se debe cascadear.
  expectEq('T25: cascada con domingo saltado',
    { ok: r.ok, bMoved: r.ok ? r.affected.some(a => a.id === 2) : false },
    { ok: true, bMoved: true });

  // ===== TEST 26: pulmon en otro operario no se afecta =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(2, '2026-06-01', '08:30', opId2, machId2, 60, { pulmon: true })  // pulmon op2
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 90 }], { pulmonAction: 'pisar' });
  expectEq('T26: pulmon de otro op no se afecta',
    { ok: r.ok, pulmonInState: r.ok ? r.state.has(2) : false },
    { ok: true, pulmonInState: true });

  // ===== TEST 27: cambio que reduce duracion (no debe cascadear nada) =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 120),
    ma(2, '2026-06-01', '10:30', opId1, machId1, 60)  // estaba justo despues
  ]);
  // Reducimos A a 60min: B sigue donde estaba sin conflicto
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 60 }]);
  expectEq('T27: reducir duracion no cascadea',
    { ok: r.ok, n: r.affected ? r.affected.length : -1 },
    { ok: true, n: 0 });

  // ===== TEST 28: dos activ con setup auto-24/7 - choque por setup =====
  setActs([
    // A auto-24/7, setup 30, dura 240
    ma(1, '2026-06-01', '08:00', opId1, machId1, 240, { tipo: 'automatica', setup: 30 }),
    // B auto, setup 30, mismo op pero distinta maquina, arranca cuando A todavia esta en setup
    ma(2, '2026-06-01', '08:15', opId1, machId2, 120, { tipo: 'automatica', setup: 30 })
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1 }]);
  // A setup 08:00-08:30, B@08:15 mismo op tambien tiene setup 30 -> chocan
  expectEq('T28: setups auto-24/7 chocan, B cascadea',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [2] });

  // ===== TEST 29: re-aplicar el mismo cambio idempotente =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60)
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 60 }]);
  // Cambio que no cambia nada
  expectEq('T29: idempotencia',
    { ok: r.ok, n: r.affected ? r.affected.length : -1, plan: r.applyPlan ? r.applyPlan.length : -1 },
    { ok: true, n: 0, plan: 0 });

  // ===== TEST 30: applyPlan refleja correctamente los cambios =====
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(2, '2026-06-01', '09:30', opId1, machId1, 60)
  ]);
  r = simulateChange([{ id: 1, fecha: '2026-06-01', hora_inicio: '08:00:00', operario_id: opId1, maquina_id: machId1, duracion_planificador_min: 120 }]);
  // applyPlan debe contener el cambio de la anchor (dur) y el movimiento de B
  expectEq('T30: applyPlan correcto',
    { ok: r.ok, planLen: r.applyPlan ? r.applyPlan.length : -1 },
    { ok: true, planLen: 2 });
  if (r.ok) {
    const planAnchor = r.applyPlan.find(p => p.id === 1);
    const planB = r.applyPlan.find(p => p.id === 2);
    expectTrue('T30: anchor en applyPlan tiene duracion_planificador_min', planAnchor && planAnchor.duracion_planificador_min === 120);
    expectTrue('T30: B en applyPlan tiene fecha y hora_inicio', planB && planB.fecha && planB.hora_inicio);
  }

  // ===== TEST 31: ancla cae sobre actividad existente (mismo op, misma maq) =====
  // A existente 08:00-09:00, B existente 10:00-11:00.
  // Movemos C nueva al medio: 08:30 (pisa con A).
  // Esperado: A se desplaza despues de C, B tambien se reacomoda si hace falta.
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(2, '2026-06-01', '10:00', opId1, machId1, 60),
    ma(3, '2026-06-15', '08:00', opId1, machId1, 60)  // existente lejos, sera el "ancla"
  ]);
  setCorrs([]);
  // Movemos act 3 al 06-01 a las 08:30 (en medio de 1 y 2)
  r = simulateChange([{ id: 3, fecha: '2026-06-01', hora_inicio: '08:30:00', operario_id: opId1, maquina_id: machId1 }]);
  expectEq('T31: ancla en medio empuja existentes',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [1, 2] });

  // ===== TEST 32: ancla en maquina compartida con otro operario =====
  // A op1 mach1 08:00-09:00. B op2 mach1 10:00-11:00.
  // Movemos C op1 mach1 a las 08:30 (pisa A en op+mach, y "salta" B en mach por cascada).
  setActs([
    ma(1, '2026-06-01', '08:00', opId1, machId1, 60),
    ma(2, '2026-06-01', '10:00', opId2, machId1, 60),  // distinto op pero misma maq
    ma(3, '2026-06-15', '08:00', opId1, machId1, 60)
  ]);
  r = simulateChange([{ id: 3, fecha: '2026-06-01', hora_inicio: '08:30:00', operario_id: opId1, maquina_id: machId1 }]);
  // 3 ancla 08:30-09:30. A pisa por op (op1) -> A se mueve a >=09:30. A nueva en mach1 09:30-10:30. Pisa B (op2 mach1 10:00). B se cascadea a >=10:30.
  expectEq('T32: ancla en medio + cascada cruzada (op+mach)',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [1, 2] });

  // ===== TEST 33: ancla cae despues del predecesor pero pisa actividad de OTRO operario =====
  // Replica del bug reportado por el usuario:
  //   Eje T (op2, mach1) tiene predecesor torneado.
  //   Movemos Eje T a las 12:30 del 5/5. A las 12:30 esta corriendo Buje (op_otro, mach1).
  //   Esperado: Buje se cascadea (op distinto pero misma maq).
  setActs([
    ma(1, '2026-05-05', '12:00', opId1, machId1, 105),  // "Buje po..." op1 mach1 12:00-13:45
    ma(2, '2026-06-15', '08:00', opId2, machId1, 90)   // "Eje T" op2 mach1, lejos, va a moverse al 5/5 12:30
  ]);
  r = simulateChange([{ id: 2, fecha: '2026-05-05', hora_inicio: '12:30:00', operario_id: opId2, maquina_id: machId1 }]);
  // Eje T ancla 12:30-14:00. Buje 12:00-13:45 mach1. Buje y Eje T comparten maq -> Buje pisa por maq.
  // Como Buje no es ancla y Eje T si, Buje se mueve DESPUES del fin de Eje T (>= 14:00).
  expectEq('T33: bug del usuario - ancla a las 12:30 desplaza buje en mach compartida',
    { ok: r.ok, ids: r.affected ? r.affected.map(a => a.id).sort() : [] },
    { ok: true, ids: [1] });
  if (r.ok) {
    const buje = r.state.get(1);
    expectTrue('T33: Buje arranca >= 14:00 (despues del fin de Eje T)',
      tM(buje.hora_inicio) >= 840 || buje.fecha > '2026-05-05');
  }

  // ===== Restaurar =====
  setActs(origActs);
  setCorrs(origCorrs);

  console.log('=== RESULTADOS TESTS MOTOR A ===');
  results.forEach(line => console.log(line));
  console.log('=== ' + pass + ' pass / ' + (pass + fail) + ' (' + fail + ' fail) ===');
  return { pass, fail, results };
};

// =============================================================================
// FIN MOTOR A
// =============================================================================

// ========== INIT ==========
async function init() {
  const { data: mD } = await sb.from('maquinas').select('id,nombre'); maq = mD || [];
  // v70 Fase 9: solo se planifican en el tablero las personas marcadas con
  // en_tablero. El resto (administración, dirección) queda fuera.
  const { data: oD } = await sb.from('operarios').select('*');
  ops = (oD || []).filter(o => o.en_tablero !== false && o.activo !== false);
  const { data: cD } = await sb.from('clientes').select('*'); cls = cD || [];
  const { data: aD } = await sb.from('actividades_tablero').select('*'); acts = aD || [];
  // Cleanup: eliminar de la DB cualquier activ con proceso_eliminado=true que
  // este como sin_planificar. Estas filas son huerfanas (el proceso ya no
  // existe en Proyectos y la activ no esta planificada). De lo contrario
  // reaparecerian en el modal "+".
  const huerfanas = acts.filter(a => a.proceso_eliminado === true && a.estado === 'sin_planificar');
  if (huerfanas.length > 0) {
    const ids = huerfanas.map(a => a.id);
    await sb.from('actividades_tablero').delete().in('id', ids);
    acts = acts.filter(a => !ids.includes(a.id));
  }
  const { data: iD } = await sb.from('items').select('*'); items = iD || [];
  const { data: pD } = await sb.from('proyectos').select('*'); proys = pD || [];
  const { data: corrD } = await sb.from('correlatividades').select('*'); corrs = corrD || [];
  document.getElementById('hd-d').textContent = new Date().toLocaleDateString('es-AR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  renderLg(); render();
}
init();
</script>

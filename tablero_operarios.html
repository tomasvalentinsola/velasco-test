function toggleAffectedPulmonAction(actId, machId, fecha, startTime, newOpId, skipOpCheck) {
  const checked = document.getElementById('aff-pisar').checked;
  setPulmonActionPref(checked ? 'pisar' : 'cascadear');
  // Re-run placeActWithCheck — it'll recompute and refresh the modal
  placeActWithCheck(actId, machId, fecha, startTime, newOpId, skipOpCheck);
}

function confirmAffectedAndProceed(actId, machId, fecha, startTime, newOpId, skipOpCheck, pulmonIdsToDelete) {
  const modal = document.getElementById('affected-modal');
  if (modal) modal.remove();
  proceedWithPlacement(actId, machId, fecha, startTime, newOpId, skipOpCheck, pulmonIdsToDelete);
}

// Dialog shown when the proposed placement conflicts with activities of
// OTHER operators using the same machine. Gives the user the choice to:
//   - Cancel the move
//   - Accept the move (which will push the other operators' activities via cascade)
//   - Try an alternative start time (next free slot on this machine+day)
function showMachineConflictAlert(act, machId, fecha, startTime, conflicts, newOpId, effectiveOpId, conflictSourceMap) {
  const bd = document.createElement('div'); bd.className = 'mo';
  const m = document.createElement('div'); m.className = 'md';
  const fDate = ds => fDn(ds);

  // For each conflict, figure out which of OUR activities (the placed one or
  // a cascaded one) actually collides with it, and show the overlap range.
  const cList = conflicts.map(c => {
    const source = conflictSourceMap ? conflictSourceMap.get(c.id) : null;
    // `source` is the simulated "our" activity that collides with c. If not
    // provided (legacy path), default to the placed activity's slices.
    const ourSlices = source
      ? simulatePlacement({ duracion_estimada_min: D(source), duracion_margen_min: 0 }, source.operario_id, source.fecha, tM(source.hora_inicio))
      : simulatePlacement({ duracion_estimada_min: D(act), duracion_margen_min: 0 }, effectiveOpId, fecha, startTime);
    // Walk c's own slices and find the one that overlaps ours
    let matched = null;
    let rem = D(c), cd = c.fecha, ct = tM(c.hora_inicio), safe = 0;
    while (rem > 0 && safe < 20 && !matched) {
      safe++;
      const ds = sS(c.operario_id), de = sE(c.operario_id, cd);
      if (ct < ds) ct = ds;
      const av = de - ct;
      if (av <= 0) { cd = nwd(cd); ct = sS(c.operario_id); continue; }
      const used = Math.min(rem, av);
      for (const s of ourSlices) {
        if (cd === s.date && ct < s.end && ct + used > s.start) {
          matched = { date: cd, start: ct, end: ct + used };
          break;
        }
      }
      if (!matched) { rem -= used; if (rem > 0) { cd = nwd(cd); ct = sS(c.operario_id); } else { ct += used; } }
    }
    const rangeLabel = matched
      ? (matched.date !== fecha ? fDate(matched.date) + ' ' : '') + mT(matched.start) + '-' + mT(matched.end)
      : c.hora_inicio.substring(0, 5);
    // Hint about which of OUR activities is causing the collision (in case it's
    // a cascaded one, not the one the user dragged).
    const sourceLabel = source && source.id !== act.id
      ? ' <span style="color:#5F5E5A;font-size:11px">(colisiona con <b>' + source.descripcion + '</b> por cascada)</span>'
      : '';
    return '<div style="margin:3px 0">• <b>' + c.descripcion + '</b> — Ped. ' + (c.pedido_nro||'-') + ' — <b>' + opN(c.operario_id) + '</b> — ' + rangeLabel + ' (' + tipoLabel(c) + ')' + sourceLabel + '</div>';
  }).join('');

  // Find an alternative start time where the full multi-day expansion of the
  // incoming activity has NO conflicts: neither machine conflicts with other
  // operators, NOR operator conflicts (i.e. the operator's own activities).
  // This gives the "slot where nothing needs to move" — the most conservative
  // alternative the system can offer.
  function findAltStart() {
    const maxDays = 60;
    let cd = fecha;
    let cand = startTime;
    for (let dayIter = 0; dayIter < maxDays; dayIter++) {
      const dayEnd = sE(effectiveOpId, cd);
      const dayStart = sS(effectiveOpId);
      if (cand < dayStart) cand = dayStart;
      let safety = 0;
      while (cand < dayEnd && safety < 100) {
        safety++;
        const testSlices = simulatePlacement({ duracion_estimada_min: D(act), duracion_margen_min: 0 }, effectiveOpId, cd, cand);
        if (testSlices.length === 0) break;
        // Find the earliest collision across all slices, considering both:
        //   (a) machine blocks of OTHER operators
        //   (b) any activities of the operator himself
        let earliestBlockEnd = null;  // time after which candidate can retry
        let earliestBlockDate = null;
        for (const s of testSlices) {
          const machBlocksOther = dayBlocks(machId, s.date, act.id)
            .filter(b => b.act.operario_id !== effectiveOpId);
          const opBlocksSelf = dayBlocksForOp(effectiveOpId, s.date, act.id);
          const allBlocks = [...machBlocksOther, ...opBlocksSelf];
          for (const b of allBlocks) {
            if (b.s < s.end && b.e > s.start) {
              if (!earliestBlockDate
                  || s.date < earliestBlockDate
                  || (s.date === earliestBlockDate && b.e < earliestBlockEnd)) {
                earliestBlockDate = s.date; earliestBlockEnd = b.e;
              }
            }
          }
          if (earliestBlockDate) break;  // first slice with collision defines the retry point
        }
        if (!earliestBlockDate) return { fecha: cd, startMin: cand };
        // Retry after the blocking activity ends + GAP
        if (earliestBlockDate === cd) {
          cand = earliestBlockEnd + GAP;
        } else {
          // Collision on a later day: jump the cursor there
          cd = earliestBlockDate;
          cand = earliestBlockEnd + GAP;
        }
      }
      // Nothing on this day fit — move to next
      cd = nwd(cd); cand = sS(effectiveOpId);
    }
    return null;
  }

  const alt = findAltStart();
  const canAlt = alt !== null && !(alt.fecha === fecha && alt.startMin === startTime);
  const altLabel = canAlt
    ? (alt.fecha !== fecha ? 'Setear el ' + fDate(alt.fecha) + ' a las ' + mT(alt.startMin) : 'Setear a las ' + mT(alt.startMin))
    : '';

  // Collect unique machine names from the actual conflicts (not the placed act,
  // since a conflict may come from a cascaded activity with a different machine).
  const conflictMachIds = [...new Set(conflicts.map(c => c.maquina_id))];
  const machineLabel = conflictMachIds.length === 1
    ? 'La <b>' + mN(conflictMachIds[0]) + '</b>'
    : 'Las maquinas <b>' + conflictMachIds.map(id => mN(id)).join(', ') + '</b>';

  m.innerHTML = '<div class="md-t" style="color:#A32D2D">⚠ Maquina ocupada por otro operario</div>' +
    '<div style="font-size:13px;margin-bottom:12px;line-height:1.5">' + machineLabel + ' ya esta siendo usada por:</div>' +
    '<div style="font-size:12px;margin-bottom:12px;padding:10px;background:#FEF0F0;border-radius:6px;border:1px solid #E24B4A">' + cList + '</div>' +
    '<div style="font-size:11px;color:#5F5E5A;margin-bottom:12px">Si confirmas, las actividades afectadas seran movidas hacia adelante (con sus propias cascadas en sus operarios).</div>' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
      '<button class="b" id="mc-cancel">Cancelar</button>' +
      (canAlt ? '<button class="b" id="mc-alt">' + altLabel + '</button>' : '') +
      '<button class="b" style="background:#FEF0F0;color:#A32D2D;border-color:#E24B4A;font-weight:600" id="mc-confirm">Confirmar con cascada</button>' +
    '</div>';
  bd.appendChild(m); document.body.appendChild(bd);
  document.getElementById('mc-cancel').onclick = () => bd.remove();
  document.getElementById('mc-confirm').onclick = () => {
    bd.remove();
    placeAct(act.id, machId, fecha, startTime, newOpId);
  };
  if (canAlt) {
    document.getElementById('mc-alt').onclick = () => {
      bd.remove();
      placeActWithCheck(act.id, machId, alt.fecha, alt.startMin, newOpId);
    };
  }
}

// ========== MOVE (operator board specific) ==========
// In the operator board, drag & drop:
//   - Keeps the SAME machine (machine is NOT a column here)
//   - Changes the operator (target column)
//   - Changes hora_inicio (based on X position of the drop)
// All three mutations are bundled into placeAct so undo restores the whole set.
async function moveActOp(actId, newOpId, fecha, dropMin) {
  const act = acts.find(a => a.id === actId);
  if (!act) { toast('[DBG] Actividad no encontrada'); return; }
  if (!act.maquina_id) { toast('[DBG] Actividad sin maquina asignada'); return; }
  const fromOp = opN(act.operario_id), toOp = opN(newOpId);
  const fromDate = act.fecha, fromTime = act.hora_inicio;
  console.log('[drop] moveActOp: ' + act.descripcion + ' | from ' + fromOp + ' ' + fromDate + ' ' + fromTime + ' → to ' + toOp + ' ' + fecha + ' dropMin=' + mT(dropMin) + ' (mach=' + mN(act.maquina_id) + ')');

  // Snap start time using the OPERATOR's timeline (5-case drop logic).
  // The operator board's "columns" are operators, so the insertion slot
  // must respect the operator's existing activities, not the machine's.
  const rawStart = calcInsertTimeForOp(newOpId, fecha, dropMin, actId);
  let startTime = rawStart;
  // Ensure it's within the NEW operator's shift
  const opStart = sS(newOpId);
  if (startTime < opStart) startTime = opStart;
  // Detect no-op movements (same op, same date, ≤1min delta)
  if (act.operario_id === newOpId && fromDate === fecha && Math.abs(tM(fromTime) - startTime) < 2) {
    toast('[DBG] Sin cambios — misma posicion');
    return;
  }
  console.log('[drop] calcInsertTimeForOp returned=' + mT(rawStart) + ' adjusted=' + mT(startTime));

  // v70 Fase 9c: chequeo extra de máquina. La grilla del tablero es por
  // operario, pero la MÁQUINA puede estar ocupada por una semi/auto del
  // mismo (o de otro) operario aunque su carril de operario se vea libre
  // (porque el operario quedó libre tras el setup). Si la posición elegida
  // solapa con la ocupación real de la máquina, reposicionar al fin de la
  // otra + GAP. Después el motor decide si hay cascada.
  const incomingDur = D(act);
  const incomingEnd = startTime + incomingDur;
  const machBlocks = dayBlocks(act.maquina_id, fecha, actId);
  for (const mb of machBlocks) {
    const solapa = !(incomingEnd <= mb.s || startTime >= mb.e);
    if (solapa) {
      // Reposicionar al final del bloque solapado + GAP.
      const ajuste = mb.e + GAP;
      console.log('[drop] machine overlap with ' + (mb.act ? mb.act.descripcion : '?') + ' [' + mT(mb.s) + '-' + mT(mb.e) + '] → ajuste a ' + mT(ajuste));
      // Si el ajuste cae fuera de jornada, lo limita el motor más adelante.
      startTime = ajuste;
      break;
    }
  }
  // Si bajamos startTime, hay que asegurar que sigue dentro del turno.
  if (startTime < opStart) startTime = opStart;

  // If dragging within the SAME operator's column, the user's intent is
  // explicit: they want to reorder within this operator's timeline. Skip
  // the operator-conflict dialog (it would block obvious valid rearrangements
  // because of the 2-manuals-blocked rule). Machine conflicts with OTHER
  // operators are still checked inside placeActWithCheck.
  const skipOpCheck = act.operario_id === newOpId;
  placeActWithCheck(actId, act.maquina_id, fecha, startTime, newOpId, skipOpCheck);
}

// ========== UNDO ==========
async function undo() {
  if (!uStack.length) return;
  const batch = uStack.pop();
  for (const a of batch) {
    const updateObj = { maquina_id: a.prev.maquina_id, fecha: a.prev.fecha, hora_inicio: a.prev.hora_inicio, estado: a.prev.estado };
    if (a.prev.operario_id !== undefined) updateObj.operario_id = a.prev.operario_id;
    if (a.prev.urgencia !== undefined) updateObj.urgencia = a.prev.urgencia;
    if (a.prev.duracion_operario_min !== undefined) updateObj.duracion_operario_min = a.prev.duracion_operario_min;
    await sb.from('actividades_tablero').update(updateObj).eq('id', a.id);
    const act = acts.find(x => x.id === a.id); if (act) Object.assign(act, a.prev);
  }
  toast('Deshechos ' + batch.length + ' cambio(s)'); updU(); render();
}

// ========== TRACK ASSIGNMENT (stable across multi-day activities) ==========
// Assigns each block to a vertical "track". Activities that span multiple days
// keep the SAME track on all their parts — so a block that starts "below"
// stays below in every day it appears.
//
// Algorithm:
//   1. Group blocks by operator
//   2. For each operator, process days in chronological order
//   3. For each day:
//      a. Pass 1: blocks whose activity already has a remembered track (from a
//         previous day) reclaim that track
//      b. Pass 2: blocks of new activities get the lowest free track that isn't
//         occupied at their start time
//
// Returns: map of "date|opId" -> maxStack for that operator-day cell.
function assignTracksAcrossDays(vBlocks) {
  // Group by operator
  const byOp = {};
  vBlocks.forEach(b => {
    const opId = b.act.operario_id;
    if (!byOp[opId]) byOp[opId] = [];
    byOp[opId].push(b);
  });

  const maxStackByDayOp = {};

  Object.keys(byOp).forEach(opId => {
    // Remembered track per actId (persists across days for this operator)
    const actTrack = {};
    // Dates this operator has blocks on, in chronological order
    const dates = [...new Set(byOp[opId].map(b => b.date))].sort();

    dates.forEach(date => {
      const dayBlocks = byOp[opId]
        .filter(b => b.date === date)
        .sort((a, b) => a.startMin - b.startMin || a.actId - b.actId);

      // trackEnds[i] = endMin of last assignment to track i (on this day)
      const trackEnds = [];

      // Pass 1: blocks whose activity already has a track from a previous day
      dayBlocks.forEach(b => {
        if (actTrack[b.actId] !== undefined) {
          b.track = actTrack[b.actId];
          while (trackEnds.length <= b.track) trackEnds.push(0);
          trackEnds[b.track] = Math.max(trackEnds[b.track], b.startMin + b.dur);
        }
      });

      // Pass 2a: MANUAL activities always go to track 0 (upper row).
      // Semi-automaticas y automaticas van a track >= 1.
      dayBlocks.forEach(b => {
        if (b.track !== undefined) return;
        if (!b.act || isAuto(b.act)) return;
        b.track = 0;
        actTrack[b.actId] = 0;
        while (trackEnds.length <= 0) trackEnds.push(0);
        trackEnds[0] = Math.max(trackEnds[0], b.startMin + b.dur);
      });

      // Pass 2b: AUTOMATICAS y SEMI-AUTOMATICAS go to tracks ≥ 1. Sorted by start
      // time ascending, so earlier-starting take lower tracks (middle), later
      // ones go further down. Multi-day consistency is preserved by Pass 1.
      const autoBlocks = dayBlocks
        .filter(b => b.track === undefined && b.act && isAuto(b.act))
        .sort((a, b) => a.startMin - b.startMin || a.actId - b.actId);
      autoBlocks.forEach(b => {
        let t = 1;
        while (trackEnds.length > t && trackEnds[t] > b.startMin) t++;
        b.track = t;
        actTrack[b.actId] = t;
        while (trackEnds.length <= t) trackEnds.push(0);
        trackEnds[t] = Math.max(trackEnds[t], b.startMin + b.dur);
      });

      // Fallback (edge case): any block without a track yet — lowest free
      dayBlocks.forEach(b => {
        if (b.track !== undefined) return;
        let t = 0;
        while (t < trackEnds.length && trackEnds[t] > b.startMin) t++;
        b.track = t;
        actTrack[b.actId] = t;
        while (trackEnds.length <= t) trackEnds.push(0);
        trackEnds[t] = Math.max(trackEnds[t], b.startMin + b.dur);
      });

      maxStackByDayOp[date + '|' + opId] = trackEnds.length;
    });
  });

  return maxStackByDayOp;
}

// ========== RENDER ==========
function render() {
  const board = document.getElementById('bd');
  const days = getDays();
  const vBlocks = computeVB();

  // v70 Fase 9: las columnas son los operarios con en_tablero=true (ya
  // filtrados al cargar `ops`), ordenados alfabéticamente por nombre de
  // display. Antes la lista estaba hardcodeada y se rompía al cambiar nombres.
  const colOps = ops.slice()
    .sort((a, b) => opN(a.id).localeCompare(opN(b.id)))
    .map(o => ({ name: opN(o.id), id: o.id }));

  // Assign tracks ONCE across all days so multi-day activities keep their track
  const maxStackByDayOp = assignTracksAcrossDays(vBlocks);

  board.style.gridTemplateColumns = '80px repeat(' + colOps.length + ',400px)';
  board.innerHTML = '';
  board.appendChild(Object.assign(document.createElement('div'), { className: 'hc', textContent: '6h -> 17h' }));
  colOps.forEach(co => {
    const h = document.createElement('div'); h.className = 'ho';
    h.textContent = co.name;
    board.appendChild(h);
  });

  days.forEach((day, di) => {
    const dk = dK(day.date), isAlt = di % 2 === 1, isSat = day.date.getDay() === 6;

    // Collect per-operator data for this day
    const perOp = {};
    colOps.forEach(co => {
      const opBlocks = vBlocks.filter(b => b.date === dk && b.act.operario_id === co.id);
      const maxStack = maxStackByDayOp[dk + '|' + co.id] || 0;
      perOp[co.id] = { blocks: opBlocks, maxStack };
    });

    // Row height rule: ALWAYS 2 blocks tall (180px). When an operator has 3+
    // simultaneous activities, the blocks COMPRESS inside the same row height
    // — the row does not grow.
    const rowHeight = DAY_MIN_HEIGHT * 2;
    // Compensate for border-bottom that eats into content area (box-sizing).
    // Normal days: 2px black border. Saturday: 8px week separator.
    const cellPixelHeight = rowHeight + (isSat ? 8 : 2);

    // Day header (sticky left column)
    const dh = document.createElement('div'); dh.className = 'hr';
    if (day.type === 'today') dh.classList.add('td');
    if (day.type === 'past') dh.classList.add('ps');
    if (isSat) dh.classList.add('wk-sep');
    dh.style.minHeight = cellPixelHeight + 'px';
    dh.appendChild(Object.assign(document.createElement('div'), { textContent: fD(day.date) }));
    const dn = document.createElement('div'); dn.className = 'hr-n';
    dn.textContent = day.type === 'today' ? 'hoy' : day.type === 'past' ? 'ayer' : '';
    dh.appendChild(dn);
    const vacs = getVacaciones(dk);
    if (vacs.length) {
      const vw = document.createElement('div');
      vw.style.cssText = 'position:absolute;right:0;top:0;bottom:0;display:flex';
      vacs.forEach(v => {
        const vb2 = document.createElement('div');
        vb2.style.cssText = 'width:14px;height:100%;display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;font-size:7px;font-weight:600;color:#fff;letter-spacing:0.3px;background:' + v.color;
        vb2.textContent = v.nombre;
        vw.appendChild(vb2);
      });
      dh.style.position = 'relative'; dh.style.paddingRight = (14 * vacs.length + 8) + 'px';
      dh.appendChild(vw);
    }
    board.appendChild(dh);

    // One cell per operator
    colOps.forEach(co => {
      const cell = document.createElement('div'); cell.className = 'cl';
      if (day.type === 'past') cell.classList.add('ps');
      if (day.type === 'today') cell.classList.add('td');
      if (isAlt) cell.classList.add('ra');
      if (isSat) cell.classList.add('wk-sep');
      cell.style.height = cellPixelHeight + 'px';
      cell.dataset.opId = co.id; cell.dataset.date = dk;
      cell.appendChild(Object.assign(document.createElement('div'), { className: 'nl' }));
      if (isSat) cell.appendChild(Object.assign(document.createElement('div'), { className: 'sg' }));

      // DRAG & DROP: cell is the drop target
      cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('dov'); });
      cell.addEventListener('dragleave', () => cell.classList.remove('dov'));
      cell.addEventListener('drop', e => {
        e.preventDefault(); cell.classList.remove('dov');
        if (!dragD) return;
        const rect = cell.getBoundingClientRect();
        const dropMin = Math.round(360 + (e.clientX - rect.left) / rect.width * 660);
        const targetOpId = parseInt(cell.dataset.opId);
        moveActOp(dragD.actId, targetOpId, dk, dropMin);
        dragD = null;
      });

      const data = perOp[co.id];
      if (data.maxStack > 0) {
        // Per-operator effective stack: never less than 2 (so a single block
        // shows at half cell height, not full), but at least as tall as needed.
        const effectiveOpStack = Math.max(2, data.maxStack);
        const blockH = rowHeight / effectiveOpStack;
        data.blocks.forEach(bl => {
          const act = bl.act;
          const block = document.createElement('div'); block.className = 'bk';
          if (act.es_pulmon) block.classList.add('bk-pulmon');
          else block.classList.add(act.urgencia === 'urgente' ? 'bk-u' : act.urgencia === 'alta' ? 'bk-a' : act.urgencia === 'media' ? 'bk-m' : 'bk-b');
          if (act.estado === 'completada') block.classList.add('bk-d');
          block.style.borderColor = machColor(act.maquina_id);
          // Indicador en esquina superior izquierda:
          // - Triangulo amarillo (⚠) si hay divergencia OT vs ack del planificador.
          // - Octagono rojo (⛔) si el proceso fue eliminado desde Proyectos.
          // Solo aplica a actividades no-pulmon.
          if (!act.es_pulmon) {
            if (act.proceso_eliminado) {
              const warn = document.createElement('div');
              warn.className = 'bk-deleted';
              warn.textContent = '⛔';
              warn.title = 'Proceso eliminado desde Proyectos';
              block.appendChild(warn);
            } else {
              const div = hasOTDivergence(act);
              if (div.hasDiv) {
                const warn = document.createElement('div');
                warn.className = 'bk-warn';
                warn.textContent = '⚠️';
                warn.title = 'Hay cambios desde Oficina Tecnica';
                block.appendChild(warn);
              }
            }
          }

          block.style.left = 'calc(' + pL(bl.startMin) + '% + 1px)';
          block.style.width = 'calc(' + Math.min(pW(bl.dur), 100 - pL(bl.startMin)) + '%)';
          block.style.top = (bl.track * blockH + 2) + 'px';
          block.style.height = (blockH - 4) + 'px';

          // DRAG: block is the drag source
          block.draggable = act.estado !== 'completada';
          block.addEventListener('dragstart', e => {
            dragD = { actId: act.id }; block.classList.add('dg');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', String(act.id));
          });
          block.addEventListener('dragend', () => {
            block.classList.remove('dg');
            document.querySelectorAll('.dov').forEach(c => c.classList.remove('dov'));
          });

          // Click: pulmones abren modal de pulmón, activs normales abren edit
          if (act.es_pulmon) {
            block.addEventListener('click', e => { e.stopPropagation(); hideTip(); showPulmonEditModal(act.id); });
          } else {
            block.addEventListener('click', e => { e.stopPropagation(); hideTip(); showEdit(act, bl); });
          }
          let tt; block.addEventListener('mouseenter', e => { tt = setTimeout(() => showTip(e, act, bl), 800); });
          block.addEventListener('mouseleave', () => { clearTimeout(tt); hideTip(); });
          block.addEventListener('mousemove', e => { if (tipEl) { tipEl.style.left = Math.min(e.clientX + 12, window.innerWidth - 290) + 'px'; tipEl.style.top = (e.clientY + 16) + 'px'; } });

          const bE = bl.startMin + bl.dur;
          const foto = act.foto_url || act.foto_proyecto_url;
          const showPhoto = !act.es_pulmon && bl.dur >= 150 && blockH >= 56 && foto;

          if (showPhoto) {
            block.style.flexDirection = 'row';
            block.style.alignItems = 'stretch';
            block.style.gap = '3px';
            block.style.justifyContent = 'flex-start';
          }

          const tx = document.createElement('div');
          // Activities default to left-align. Pulmones override to center below.
          tx.style.cssText = 'display:flex;flex-direction:column;justify-content:center;overflow:hidden;text-align:left' + (showPhoto ? ';flex:1;min-width:0' : '');

          if (act.es_pulmon) {
            // Pulmón block: "Pulmón" centered + hora_inicio - hora_fin below
            tx.style.textAlign = 'center';
            const lbl = document.createElement('div');
            lbl.className = 'bt';
            lbl.style.fontWeight = '700';
            lbl.style.fontSize = '11px';
            lbl.textContent = 'Pulmón';
            tx.appendChild(lbl);
            const hrDiv = document.createElement('div');
            hrDiv.className = 'bm';
            hrDiv.textContent = mT(bl.startMin) + '-' + mT(bE);
            tx.appendChild(hrDiv);
            block.appendChild(tx);
            cell.appendChild(block);
            return;  // skip rest of normal render
          }

          // Title: "Item - Proceso" → item in bold, proceso in normal weight.
          // The descripcion field is already formatted as "<Item> - <Proceso>"
          // by the projects module. Split on the first " - " for display.
          const titleDiv = document.createElement('div');
          titleDiv.className = 'bt';
          const fullDesc = act.descripcion || '';
          const sepIdx = fullDesc.indexOf(' - ');
          if (sepIdx > 0) {
            const itemPart = fullDesc.substring(0, sepIdx);
            const procPart = fullDesc.substring(sepIdx + 3);
            const itemSpan = document.createElement('span');
            itemSpan.style.fontWeight = '700';
            itemSpan.textContent = itemPart;
            const procSpan = document.createElement('span');
            procSpan.style.fontWeight = '400';
            procSpan.textContent = ' - ' + procPart;
            titleDiv.appendChild(itemSpan);
            titleDiv.appendChild(procSpan);
          } else {
            // Fallback: no separator → render as before (whole text bold)
            titleDiv.textContent = fullDesc;
          }
          tx.appendChild(titleDiv);
          tx.appendChild(Object.assign(document.createElement('div'), { className: 'bs', textContent: clN(act.cliente_id) }));
          tx.appendChild(Object.assign(document.createElement('div'), { className: 'bm', textContent: mT(bl.startMin) + '-' + mT(bE) }));
          // Show machine name only when machine is "Otra" (there's no column that identifies it)
          if (mN(act.maquina_id) === 'Otra') {
            const mq = document.createElement('div'); mq.className = 'bma';
            const idealName = act.maquina_ideal_id ? mN(act.maquina_ideal_id) : null;
            mq.textContent = (idealName && idealName !== 'Otra') ? idealName : 'Otra';
            tx.appendChild(mq);
          }
          if (act.pedido_nro) {
            const ped = document.createElement('div');
            ped.style.cssText = 'font-size:9px;font-weight:700;color:inherit;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
            ped.textContent = 'Ped. ' + act.pedido_nro;
            tx.appendChild(ped);
          }
          // Part badge (N/M) — top right corner, shown when activity spans multiple blocks
          if (bl.totalParts > 1) {
            const pb = document.createElement('div');
            pb.style.cssText = 'position:absolute;top:2px;right:3px;background:rgba(0,0,0,.65);color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;line-height:1.2';
            pb.textContent = bl.part + '/' + bl.totalParts;
            block.appendChild(pb);
          }
          // Badge "A" (auto) o "S" (semi) en la esquina del bloque.
          if (isAuto(act)) {
            const ai = document.createElement('div'); ai.className = 'ba';
            ai.textContent = is247(act) ? 'A' : 'S';
            if (bl.totalParts > 1) ai.style.right = '30px';
            tx.appendChild(ai);
          }
          block.appendChild(tx);

          // AUTOMATICA y SEMI-AUTOMATICA: split the block into "setup" (solid) vs
          // "machine-alone" (diagonal stripes). Computed per-block so multi-day
          // activities handle each slice correctly.
          if (isAuto(act)) {
            const setupTotal = Dop(act);
            let setupUsedBefore = 0;
            let setupInThisBlock = 0;

            if (is247(act)) {
              // Para auto 24/7, el setup esta solo en los primeros bloques (los
              // que respetaron jornada). Walk del setup respetando jornada del
              // operario para encontrar cuanto setup hay en este bloque.
              let rem = setupTotal, cd = act.fecha, ct = tM(act.hora_inicio), partIdx = 0, safe = 0;
              while (rem > 0 && safe < 30) {
                safe++;
                const ds = sS(act.operario_id), de = sE(act.operario_id, cd);
                if (ct < ds) ct = ds;
                const av = de - ct;
                if (av <= 0) { cd = nwd(cd); ct = sS(act.operario_id); continue; }
                const used = Math.min(rem, av);
                partIdx++;
                if (partIdx === bl.part) {
                  setupInThisBlock = used;
                  break;
                }
                setupUsedBefore += used;
                rem -= used;
                if (rem > 0) { cd = nwd(cd); ct = sS(act.operario_id); } else { ct += used; }
              }
              // Si el bloque actual es posterior al setup (partIdx no llego)
              // setupInThisBlock queda 0 -> todo el bloque sera rayado.
            } else {
              // SEMI: walk completo respetando jornada (igual que antes)
              let rem = D(act), cd = act.fecha, ct = tM(act.hora_inicio), partIdx = 0, safe = 0;
              while (rem > 0 && safe < 30) {
                safe++;
                const ds = sS(act.operario_id), de = sE(act.operario_id, cd);
                if (ct < ds) ct = ds;
                const av = de - ct;
                if (av <= 0) { cd = nwd(cd); ct = sS(act.operario_id); continue; }
                const used = Math.min(rem, av);
                partIdx++;
                if (partIdx === bl.part) {
                  const remainingSetup = Math.max(0, setupTotal - setupUsedBefore);
                  setupInThisBlock = Math.min(remainingSetup, used);
                  break;
                }
                const remainingSetup = Math.max(0, setupTotal - setupUsedBefore);
                setupUsedBefore += Math.min(remainingSetup, used);
                rem -= used;
                if (rem > 0) { cd = nwd(cd); ct = sS(act.operario_id); } else { ct += used; }
              }
            }

            if (setupInThisBlock < bl.dur) {
              const setupPct = (setupInThisBlock / bl.dur) * 100;
              // Diagonal-stripe overlay for the machine-alone portion
              const overlay = document.createElement('div');
              overlay.style.cssText = 'position:absolute;top:0;bottom:0;left:' + setupPct.toFixed(3) + '%;right:0;' +
                'background:repeating-linear-gradient(135deg,rgba(0,0,0,.08) 0 6px,rgba(0,0,0,0) 6px 12px);' +
                'pointer-events:none;border-radius:0 4px 4px 0;z-index:1';
              block.appendChild(overlay);
              // Vertical separator line at the setup/machine boundary
              if (setupInThisBlock > 0) {
                const sep = document.createElement('div');
                sep.style.cssText = 'position:absolute;top:0;bottom:0;left:' + setupPct.toFixed(3) + '%;' +
                  'width:2px;background:rgba(0,0,0,.55);pointer-events:none;z-index:2';
                block.appendChild(sep);
                // Vertical "MANUAL" label inside the setup zone — one letter per line.
                const blockWidthPx = (Math.min(pW(bl.dur), 100 - pL(bl.startMin)) / 100) * 400;
                const setupWidthPx = blockWidthPx * (setupInThisBlock / bl.dur);
                const blockHeightPx = blockH - 4;
                const canFit = setupWidthPx >= 12 && blockHeightPx >= 56;
                if (canFit) {
                  const lbl = document.createElement('div');
                  lbl.style.cssText = 'position:absolute;top:0;left:0;' +
                    'width:' + setupPct.toFixed(3) + '%;height:100%;' +
                    'display:flex;flex-direction:column;align-items:center;justify-content:center;' +
                    'pointer-events:none;z-index:2;user-select:none';
                  const letterCellPx = Math.min(11, Math.max(7, Math.floor(blockHeightPx * 0.70 / 6)));
                  'MANUAL'.split('').forEach(ch => {
                    const s = document.createElement('div');
                    s.textContent = ch;
                    s.style.cssText = 'font-size:' + letterCellPx + 'px;line-height:' + letterCellPx + 'px;' +
                      'height:' + letterCellPx + 'px;font-weight:800;color:rgba(0,0,0,.85);' +
                      'text-align:center;font-family:Arial,sans-serif';
                    lbl.appendChild(s);
                  });
                  block.appendChild(lbl);
                }
                tx.style.paddingLeft = 'calc(' + setupPct.toFixed(3) + '% + 6px)';
              }
            }
          }

          if (showPhoto) {
            const img = document.createElement('img');
            img.src = foto;
            img.style.cssText = 'width:35px;object-fit:cover;border-radius:2px;flex-shrink:0;align-self:stretch';
            img.onerror = function() { this.style.display = 'none' };
            block.appendChild(img);
          }
          cell.appendChild(block);
        });

        // GHOST BLOCKS: for each auto/semi in this cell, render a non-interactive
        // "ghost" in the upper row (track 0) spanning its setup portion. Visually
        // signals that the operator IS busy during setup even though the real
        // block sits on the lower row. Not draggable, not clickable.
        data.blocks.forEach(bl => {
          const act = bl.act;
          if (!isAuto(act)) return;
          if (bl.track === 0) return;  // real block already sits on top row (no ghost needed)
          // Compute setup minutes that fall within THIS visible block
          const setupTotal = Dop(act);
          let setupInThisBlock = 0;

          if (is247(act)) {
            // Para auto 24/7, walk solo del setup respetando jornada
            let setupUsedBefore = 0;
            let rem = setupTotal, cd = act.fecha, ct = tM(act.hora_inicio), partIdx = 0, safe = 0;
            while (rem > 0 && safe < 30) {
              safe++;
              const ds = sS(act.operario_id), de = sE(act.operario_id, cd);
              if (ct < ds) ct = ds;
              const av = de - ct;
              if (av <= 0) { cd = nwd(cd); ct = sS(act.operario_id); continue; }
              const used = Math.min(rem, av);
              partIdx++;
              if (partIdx === bl.part) {
                setupInThisBlock = used;
                break;
              }
              setupUsedBefore += used;
              rem -= used;
              if (rem > 0) { cd = nwd(cd); ct = sS(act.operario_id); } else { ct += used; }
            }
          } else {
            // SEMI: walk completo respetando jornada
            let setupUsedBefore = 0;
            let rem = D(act), cd = act.fecha, ct = tM(act.hora_inicio), partIdx = 0, safe = 0;
            while (rem > 0 && safe < 30) {
              safe++;
              const ds = sS(act.operario_id), de = sE(act.operario_id, cd);
              if (ct < ds) ct = ds;
              const av = de - ct;
              if (av <= 0) { cd = nwd(cd); ct = sS(act.operario_id); continue; }
              const used = Math.min(rem, av);
              partIdx++;
              if (partIdx === bl.part) {
                const remainingSetup = Math.max(0, setupTotal - setupUsedBefore);
                setupInThisBlock = Math.min(remainingSetup, used);
                break;
              }
              const remainingSetup = Math.max(0, setupTotal - setupUsedBefore);
              setupUsedBefore += Math.min(remainingSetup, used);
              rem -= used;
              if (rem > 0) { cd = nwd(cd); ct = sS(act.operario_id); } else { ct += used; }
            }
          }
          if (setupInThisBlock <= 0) return;  // no setup in this slice (already past setup)

          const ghost = document.createElement('div');
          ghost.className = 'bk';
          ghost.style.cssText =
            'position:absolute;left:calc(' + pL(bl.startMin) + '% + 1px);' +
            'width:calc(' + Math.min(pW(setupInThisBlock), 100 - pL(bl.startMin)) + '%);' +
            'top:2px;height:' + (blockH - 4) + 'px;' +
            'background:repeating-linear-gradient(135deg,rgba(128,128,128,.22) 0 6px,rgba(200,200,200,.12) 6px 12px);' +
            'border:1px dashed rgba(0,0,0,.35);border-radius:4px;' +
            'cursor:default;pointer-events:auto;' +
            'display:flex;align-items:center;justify-content:center;gap:4px;' +
            'font-size:10px;color:#5F5E5A;font-weight:600;overflow:hidden;padding:0 6px';
          ghost.title = '';  // remove native title to avoid double tooltip
          // Show same tooltip as the real block on hover (over manual portion)
          let gtt;
          ghost.addEventListener('mouseenter', e => {
            gtt = setTimeout(() => showTip(e, act, bl), 60);
          });
          ghost.addEventListener('mouseleave', () => { clearTimeout(gtt); hideTip(); });
          ghost.addEventListener('mousemove', e => { if (tipEl) { tipEl.style.left = Math.min(e.clientX + 12, window.innerWidth - 290) + 'px'; tipEl.style.top = (e.clientY + 16) + 'px'; } });
          // Lock icon + short label (description, truncated)
          const icon = document.createElement('span');
          icon.textContent = '🔒';
          icon.style.cssText = 'font-size:10px;flex-shrink:0';
          ghost.appendChild(icon);
          const lbl = document.createElement('span');
          lbl.textContent = act.descripcion + (act.pedido_nro ? ' — Ped. ' + act.pedido_nro : '');
          lbl.style.cssText = 'white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
          ghost.appendChild(lbl);
          cell.appendChild(ghost);
        });
      }

      // "+" button: opens assign selector for this operator+day
      const ab = document.createElement('div'); ab.className = 'ab';
      ab.textContent = '+';
      ab.title = 'Asignar actividad';
      ab.addEventListener('click', e => {
        e.stopPropagation();
        showOpSelector(co.id, co.name, dk);
      });
      cell.appendChild(ab);

      board.appendChild(cell);
    });
  });
}

// ========== TOOLTIP ==========
function showTip(e, act, bl) {
  hideTip();
  const bE = bl.startMin + bl.dur;
  const tot = D(act);
  const fmtDur = m => Math.floor(m / 60) + 'h' + (m % 60 ? (m % 60) + 'm' : '');
  const el = document.createElement('div'); el.className = 'tip';
  let h = '';
  if (act.es_pulmon) {
    h += '<div style="font-weight:700;font-size:12px;margin-bottom:6px">🫁 Pulmón</div>';
    h += '<div><b>Inicio:</b> ' + mT(bl.startMin) + ' &nbsp; <b>Fin:</b> ' + mT(bE) + '</div>';
    h += '<div>Maquina: ' + mN(act.maquina_id) + '</div>';
    h += '<div>Operario: ' + opN(act.operario_id) + '</div>';
  } else {
    h += '<div style="font-weight:700;font-size:12px;margin-bottom:6px">' + act.descripcion + '</div>';
    h += '<div>' + clN(act.cliente_id) + (act.pedido_nro ? ' - Ped. ' + act.pedido_nro : '') + '</div>';
    h += '<div>Urgencia: ' + (act.urgencia || '-') + '</div>';
    h += '<div>Maquina: ' + mN(act.maquina_id) + '</div>';
    h += '<div>Operario: ' + opN(act.operario_id) + '</div>';
    if (isAuto(act) && effSetup(act)) {
      // Auto/semi: show manual + machine-alone ranges separately
      const setupMin = effSetup(act);
      const manStart = bl.startMin;
      const manEnd = manStart + setupMin;
      const autoStart = manEnd;
      const autoEnd = bE;
      h += '<div><b>Manual:</b> ' + mT(manStart) + ' - ' + mT(manEnd) + ' (' + fmtDur(setupMin) + ')</div>';
      h += '<div><b>Maquina sola:</b> ' + mT(autoStart) + ' - ' + mT(autoEnd) + ' (' + fmtDur(autoEnd - autoStart) + ')</div>';
      h += '<div><b>Bloque:</b> ' + mT(manStart) + ' - ' + mT(autoEnd) + ' (' + fmtDur(bl.dur) + ')</div>';
      // Para auto 24/7 mostrar fecha+hora completa de inicio y fin reales del proceso
      if (is247(act)) {
        const re = realEnd(act);
        h += '<div style="margin-top:4px;padding-top:4px;border-top:1px dashed rgba(255,255,255,.25)">';
        h += '<b>Inicio real:</b> ' + fDn(act.fecha) + ' ' + act.hora_inicio.substring(0,5) + '</div>';
        h += '<div><b>Fin real (maquina):</b> ' + fDn(re.date) + ' ' + mT(re.time) + '</div>';
      }
    } else {
      // Manual activity (or auto without setup)
      h += '<div><b>Inicio:</b> ' + mT(bl.startMin) + ' &nbsp; <b>Fin:</b> ' + mT(bE) + ' &nbsp; <b>Total:</b> ' + fmtDur(bl.dur) + '</div>';
    }
    if (bl.totalParts > 1) h += '<div>Parte ' + bl.part + '/' + bl.totalParts + ' | Total actividad: ' + fmtDur(tot) + '</div>';
    const tipoEff = effTipo(act);
    const tipoTxt = tipoEff === 'automatica' ? 'automatica (24/7)' : (tipoEff === 'semi_automatica' ? 'semi-automatica' : 'manual');
    h += '<div>Tipo: ' + tipoTxt + '</div>';
  }
  el.innerHTML = h;
  el.style.left = Math.min(e.clientX + 12, window.innerWidth - 290) + 'px';
  el.style.top = (e.clientY + 16) + 'px';
  document.body.appendChild(el); tipEl = el;
}
function hideTip() { if (tipEl) { tipEl.remove(); tipEl = null; } }

// ========== EDIT MODAL ==========
// Editable fields: operario (ideal+suplentes), maquina (ideal+suplentes),
// hora_inicio, urgencia. Read-only: descripción, cliente, pedido, tipo, fin,
// duración, parte N/M, foto.
function showEdit(act, bl) {
  const bd = document.createElement('div'); bd.className = 'mo';
  // No se cierra al click fuera (decision deliberada: el modal de edicion
  // tiene cambios que se pierden si se cierra por accidente). Cerrar solo via
  // boton "Cerrar", la "X" del header, o tecla Escape.
  const escHandler = (e) => {
    if (e.key === 'Escape') { bd.remove(); document.removeEventListener('keydown', escHandler); }
  };
  document.addEventListener('keydown', escHandler);
  // Cleanup el handler cuando el modal se elimina
  const observer = new MutationObserver(() => {
    if (!document.body.contains(bd)) {
      document.removeEventListener('keydown', escHandler);
      observer.disconnect();
    }
  });
  observer.observe(document.body, { childList: true });
  const m = document.createElement('div'); m.className = 'md';
  const bE = bl.startMin + bl.dur;
  const tot = D(act);
  const foto = act.foto_url || act.foto_proyecto_url;

  // Build operator options: ideal first, then suplentes (in order)
  const opIdealId = act.operario_ideal_id;
  const opSuplIds = Array.isArray(act.operarios_suplentes_ids)
    ? act.operarios_suplentes_ids.map(x => parseInt(x))
    : [];
  const opOptions = [];
  if (opIdealId) opOptions.push({ id: opIdealId, isIdeal: true });
  opSuplIds.forEach(sid => { if (!opOptions.find(o => o.id === sid)) opOptions.push({ id: sid, isIdeal: false }); });
  // Safety: if current operario isn't in ideal/suplentes (data inconsistency),
  // include it so the user can still see + change it.
  if (act.operario_id && !opOptions.find(o => o.id === act.operario_id)) {
    opOptions.push({ id: act.operario_id, isIdeal: false, isOther: true });
  }

  // Build machine options: ideal first, then suplentes
  const mqIdealId = act.maquina_ideal_id;
  const mqSuplIds = Array.isArray(act.maquinas_suplentes_ids)
    ? act.maquinas_suplentes_ids.map(x => parseInt(x))
    : [];
  const mqOptions = [];
  if (mqIdealId) mqOptions.push({ id: mqIdealId, isIdeal: true });
  mqSuplIds.forEach(sid => { if (!mqOptions.find(o => o.id === sid)) mqOptions.push({ id: sid, isIdeal: false }); });
  if (act.maquina_id && !mqOptions.find(o => o.id === act.maquina_id)) {
    mqOptions.push({ id: act.maquina_id, isIdeal: false, isOther: true });
  }

  const opOptionsHtml = opOptions.map(o => {
    const label = opN(o.id) + (o.isIdeal ? ' (ideal)' : (o.isOther ? ' (otro)' : ''));
    const sel = o.id === act.operario_id ? ' selected' : '';
    return '<option value="' + o.id + '"' + sel + '>' + label + '</option>';
  }).join('');

  const mqOptionsHtml = mqOptions.map(o => {
    const label = mN(o.id) + (o.isIdeal ? ' (ideal)' : (o.isOther ? ' (otro)' : ''));
    const sel = o.id === act.maquina_id ? ' selected' : '';
    return '<option value="' + o.id + '"' + sel + '>' + label + '</option>';
  }).join('');

  const urgencias = ['urgente', 'alta', 'media', 'baja'];
  const urgOptionsHtml = urgencias.map(u =>
    '<option value="' + u + '"' + (u === act.urgencia ? ' selected' : '') + '>' + u.charAt(0).toUpperCase() + u.slice(1) + '</option>'
  ).join('');

  // Read-only info block
  const tipoEffShow = effTipo(act);
  const tipoTxt = tipoEffShow === 'automatica' ? 'automatica (24/7)' : (tipoEffShow === 'semi_automatica' ? 'semi-automatica' : 'manual');
  let infoHtml = '<div style="font-size:12px;line-height:1.7;margin-bottom:14px">';
  infoHtml += '<div><b>Cliente:</b> ' + clN(act.cliente_id) + '</div>';
  if (act.pedido_nro) infoHtml += '<div><b>Pedido:</b> ' + act.pedido_nro + '</div>';
  infoHtml += '<div><b>Tipo:</b> ' + tipoTxt + '</div>';
  infoHtml += '<div><b>Bloque actual:</b> ' + mT(bl.startMin) + '-' + mT(bE) + ' (' + Math.floor(bl.dur / 60) + 'h' + (bl.dur % 60 ? (bl.dur % 60) + 'm' : '') + ')</div>';
  if (bl.totalParts > 1) infoHtml += '<div><b>Parte:</b> ' + bl.part + '/' + bl.totalParts + ' | <b>Total:</b> ' + Math.floor(tot / 60) + 'h' + (tot % 60 ? (tot % 60) + 'm' : '') + '</div>';
  // Para auto 24/7 mostrar fecha+hora completa de fin real
  if (is247(act)) {
    const re = realEnd(act);
    infoHtml += '<div><b>Inicio real:</b> ' + fDn(act.fecha) + ' ' + act.hora_inicio.substring(0,5) + '</div>';
    infoHtml += '<div><b>Fin real (maquina):</b> ' + fDn(re.date) + ' ' + mT(re.time) + '</div>';
  }
  infoHtml += '</div>';

  // === Bloque de informacion del proceso (Oficina Tecnica) ===
  // Muestra los valores definidos por OT en proyectos.html. Si hay divergencia
  // contra el ack del planificador, se muestra badge naranja con el valor nuevo.
  const div = hasOTDivergence(act);
  let otHtml = '';
  if (act.proceso_eliminado) {
    // Caso especial: proceso eliminado desde Proyectos. Cartel rojo grande.
    otHtml += '<div style="border:1.5px solid #E24B4A;background:#FEF0F0;color:#A32D2D;padding:10px 12px;border-radius:6px;margin-bottom:14px;font-size:12px">';
    otHtml += '<div style="font-weight:700;margin-bottom:4px">⚠ Proceso eliminado desde Proyectos</div>';
    otHtml += '<div>Esta actividad ya no tiene un proceso vinculado. Quitala del tablero con el boton "Quitar".</div>';
    otHtml += '</div>';
  } else {
    // Bloque informativo normal con campos siempre visibles.
    function badge(label, value) {
      return ' <span style="display:inline-block;background:#FFC107;color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:6px;vertical-align:middle">⚠ OT: ' + value + '</span>';
    }
    otHtml += '<div style="border:1px solid #C8C6BE;background:#FAFAF7;padding:10px 12px;border-radius:6px;margin-bottom:14px;font-size:12px;line-height:1.8">';
    otHtml += '<div style="font-weight:700;margin-bottom:4px;font-size:11px;color:#5F5E5A;text-transform:uppercase;letter-spacing:0.5px">Datos del proceso (Oficina Tecnica)</div>';
    // Duracion estimada
    const ackDurEst = (act.ot_ack_dur_estimada_min !== null && act.ot_ack_dur_estimada_min !== undefined) ? act.ot_ack_dur_estimada_min : act.duracion_estimada_min;
    otHtml += '<div><b>Duracion estimada:</b> ' + ackDurEst + ' min' + (div.fields.dur_estimada ? badge('estimada', div.fields.dur_estimada.ot + ' min') : '') + '</div>';
    // Margen
    const ackMar = (act.ot_ack_margen_min !== null && act.ot_ack_margen_min !== undefined) ? act.ot_ack_margen_min : (act.duracion_margen_min || 0);
    otHtml += '<div><b>Margen:</b> ' + ackMar + ' min' + (div.fields.margen ? badge('margen', div.fields.margen.ot + ' min') : '') + '</div>';
    // Setup (solo si auto/semi)
    if (isAuto(act) || (act.ot_ack_setup_min !== null && act.ot_ack_setup_min !== undefined)) {
      const ackSet = (act.ot_ack_setup_min !== null && act.ot_ack_setup_min !== undefined) ? act.ot_ack_setup_min : (act.duracion_operario_min || 0);
      otHtml += '<div><b>Setup (operario):</b> ' + ackSet + ' min' + (div.fields.setup ? badge('setup', div.fields.setup.ot + ' min') : '') + '</div>';
    }
    // Tipo
    if (div.fields.tipo) {
      const ackTipoLabel = div.fields.tipo.ack === 'automatica' ? 'auto 24/7' : (div.fields.tipo.ack === 'semi_automatica' ? 'semi' : 'manual');
      const otTipoLabel = div.fields.tipo.ot === 'automatica' ? 'auto 24/7' : (div.fields.tipo.ot === 'semi_automatica' ? 'semi' : 'manual');
      otHtml += '<div><b>Tipo:</b> ' + ackTipoLabel + badge('tipo', otTipoLabel) + '</div>';
    }
    // Operario ideal
    const ackOp = (act.ot_ack_operario_ideal_id !== null && act.ot_ack_operario_ideal_id !== undefined) ? act.ot_ack_operario_ideal_id : act.operario_ideal_id;
    otHtml += '<div><b>Operario ideal:</b> ' + (ackOp ? opN(ackOp) : '—') + (div.fields.op_ideal ? badge('op', opN(div.fields.op_ideal.ot)) : '') + '</div>';
    // Maquina ideal
    let ackMaqLabel;
    if (act.ot_ack_maquina_ideal_id) ackMaqLabel = mN(act.ot_ack_maquina_ideal_id);
    else if (act.ot_ack_maquina_ideal_nombre) ackMaqLabel = act.ot_ack_maquina_ideal_nombre + ' (otra)';
    else if (act.maquina_ideal_id) ackMaqLabel = mN(act.maquina_ideal_id);
    else if (act.maquina_ideal_nombre) ackMaqLabel = act.maquina_ideal_nombre + ' (otra)';
    else ackMaqLabel = '—';
    let otMaqLabel = null;
    if (div.fields.maq_ideal) {
      if (div.fields.maq_ideal.ot) otMaqLabel = mN(div.fields.maq_ideal.ot);
      else if (div.fields.maq_ideal.otNombre) otMaqLabel = div.fields.maq_ideal.otNombre + ' (otra)';
      else otMaqLabel = '—';
    }
    otHtml += '<div><b>Maquina ideal:</b> ' + ackMaqLabel + (otMaqLabel !== null ? badge('maq', otMaqLabel) : '') + '</div>';

    // Si hay divergencia, agregar nota de "tiene cambios pendientes"
    if (div.hasDiv) {
      otHtml += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #DCDAD3;font-size:11px;color:#A66A00"><b>⚠ Hay cambios desde Oficina Tecnica.</b> Revisa los campos marcados con badge naranja.</div>';
    }
    otHtml += '</div>';
  }

  // Editable fields block
  let editHtml = '<div style="border-top:1px solid #C8C6BE;padding-top:14px">';
  editHtml += '<div class="ef"><div class="ef-l">Operario</div><select class="ef-i" id="ed-op">' + opOptionsHtml + '</select></div>';
  editHtml += '<div class="ef"><div class="ef-l">Maquina</div><select class="ef-i" id="ed-mq">' + mqOptionsHtml + '</select></div>';
  editHtml += '<div style="display:flex;gap:10px">';
  editHtml += '<div class="ef" style="flex:1"><div class="ef-l">Hora de inicio</div><input type="time" class="ef-i" id="ed-h" value="' + act.hora_inicio.substring(0, 5) + '" step="600"></div>';
  editHtml += '<div class="ef" style="flex:1"><div class="ef-l">Urgencia</div><select class="ef-i" id="ed-u">' + urgOptionsHtml + '</select></div>';
  editHtml += '</div>';
  // Operator-time (setup) field: shown for auto y semi-auto.
  if (isAuto(act)) {
    const currentOpMin = (act.duracion_operario_min !== null && act.duracion_operario_min !== undefined)
      ? act.duracion_operario_min : '';
    editHtml += '<div class="ef"><div class="ef-l">Setup / tiempo del operario (min)</div>';
    editHtml += '<input type="number" class="ef-i" id="ed-dop" value="' + currentOpMin + '" min="0" step="5" placeholder="ej. 30"></div>';
  }
  // Duracion total (min): editable in todos los tipos.
  // Stored in duracion_planificador_min. Defaults to estimada+margen if null.
  const totalMin = act.duracion_planificador_min ||
    ((act.duracion_estimada_min || 0) + (act.duracion_margen_min || 0));
  editHtml += '<div class="ef"><div class="ef-l">Duracion total (min) <span style="color:#888780;font-weight:400">— ancho del bloque en el tablero</span></div>';
  editHtml += '<input type="number" class="ef-i" id="ed-dur" value="' + totalMin + '" min="10" step="10"></div>';
  editHtml += '</div>';

  // Botones extra para divergencia OT.
  // - "Aplicar cambios de OT": si hay cualquier divergencia que afecte el
  //   comportamiento del tablero (duracion total, setup, tipo), el boton
  //   aparece y aplica TODO de una vez. Despues dispara placeActWithCheck
  //   para mostrar el cartel "Actividades afectadas" y que el responsable
  //   pueda decidir como cascadear.
  //   Cambios solo de operario_ideal_id o maquina_ideal_id NO se aplican
  //   automaticamente (el responsable los modifica manualmente desde el
  //   tablero); para esos casos el boton sigue apareciendo solo si TAMBIEN
  //   hay alguna divergencia que SI se puede aplicar.
  // - "Ignorar": copia los valores actuales del proceso a ot_ack_* para que
  //   la divergencia desaparezca hasta que OT modifique algo nuevamente.
  let extraBtns = '';
  if (!act.proceso_eliminado && div.hasDiv) {
    // Hay algo aplicable si difiere algun campo que afecta comportamiento
    const aplicable = !!(div.fields.dur_estimada || div.fields.margen || div.fields.setup || div.fields.tipo);
    if (aplicable) {
      extraBtns += '<button class="b" id="ed-apply-ot" style="background:#FFC107;color:#000;border-color:#E0A800;font-weight:600">Aplicar cambios de OT</button>';
    }
    extraBtns += '<button class="b" id="ed-ignore-ot" style="background:#fff;color:#5F5E5A;border-color:#C8C6BE">Ignorar</button>';
  }
  // v70 Fase 10c: si la actividad está anclada (completada), agregar el
  // botón Desanclar para volverla al estado planificable.
  if (act.estado === 'completada') {
    extraBtns += '<button class="b" id="ed-desanclar" style="background:#FFF4E0;color:#854F0B;border-color:#E0A800">🔓 Desanclar</button>';
  }

  m.innerHTML =
    '<button class="md-x" onclick="this.closest(\'.mo\').remove()">&times;</button>' +
    '<div class="md-t">' + act.descripcion + '</div>' +
    infoHtml +
    otHtml +
    editHtml +
    (foto ? '<img src="' + foto + '" style="max-width:100%;max-height:160px;margin-top:12px;border-radius:6px;display:block" onerror="this.style.display=\'none\'">' : '') +
    '<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">' +
      '<button class="b" onclick="this.closest(\'.mo\').remove()">Cerrar</button>' +
      '<button class="b b-p" id="ed-save">Guardar</button>' +
      extraBtns +
      '<button class="b" style="color:#A32D2D;border-color:#E24B4A" id="ed-remove">Quitar</button>' +
    '</div>';
  bd.appendChild(m); document.body.appendChild(bd);

  document.getElementById('ed-save').onclick = () => { saveEdit(act.id); bd.remove(); };
  document.getElementById('ed-remove').onclick = () => { removeAct(act.id); bd.remove(); };
  // v70 Fase 10c: desanclar una actividad completada (vuelve a planificable).
  const desBtn = document.getElementById('ed-desanclar');
  if (desBtn) {
    desBtn.onclick = async () => {
      if (!confirm('La actividad vuelve a ser planificable y deja de ser histórico. Los tiempos reales se borran. ¿Continuar?')) return;
      // Si tenía fecha y hora cuando se ancló, vuelve a "pendiente"; si no,
      // a "sin_planificar".
      const teniaPlan = act.fecha && act.fecha !== '1900-01-01' && act.hora_inicio;
      const payload = {
        estado: teniaPlan ? 'pendiente' : 'sin_planificar',
        estado_proceso: teniaPlan ? 'Planificado' : 'Planificación Pendiente',
        fecha_real: null,
        hora_real_inicio: null,
        hora_real_fin: null
      };
      const { error } = await sb.from('actividades_tablero').update(payload).eq('id', act.id);
      if (error) {
        let msg = error.message || '';
        if (/check constraint/i.test(msg)) {
          msg = 'No se pudo desanclar el proceso. La base de datos rechazó el cambio de estado.';
        } else {
          msg = 'Error al desanclar: ' + msg;
        }
        toast(msg, true);
        return;
      }
      bd.remove();
      // Recargar y re-render.
      const { data: aD } = await sb.from('actividades_tablero').select('*'); acts = aD || [];
      toast('Proceso desanclado');
      render();
    };
  }
  const applyBtn = document.getElementById('ed-apply-ot');
  if (applyBtn) {
    applyBtn.onclick = async () => {
      // MOTOR A: el cambio compuesto (duracion/setup/tipo + ack) se pasa al
      // motor para que simule TODA la cascada. Si hay afectados, modal; si
      // no, aplica directo. La DB no se toca hasta que el motor confirme.
      const newDurEst = act.duracion_estimada_min;
      const newMar = act.duracion_margen_min || 0;
      const newSetup = act.duracion_operario_min;
      const newTipo = act.tipo;
      const newTotal = newDurEst + newMar;
      const change = {
        id: act.id,
        operario_id: act.operario_id,
        maquina_id: act.maquina_id,
        fecha: act.fecha,
        hora_inicio: act.hora_inicio
      };
      // Solo agregamos los campos que difieren. El motor los aplica al state
      // antes de simular, asi la cascada se calcula con el nuevo tamano/tipo.
      if (div.fields.dur_estimada || div.fields.margen) {
        change.duracion_planificador_min = newTotal;
        change.ot_ack_dur_estimada_min = newDurEst;
        change.ot_ack_margen_min = newMar;
      }
      if (div.fields.setup) {
        change.duracion_operario_min = newSetup;
        change.ot_ack_setup_min = newSetup;
      }
      if (div.fields.tipo) {
        change.tipo = newTipo;
        change.ot_ack_tipo = newTipo;
      }
      bd.remove();
      // Llamar al motor con el cambio compuesto. La logica de cascada y modal
      // de afectadas vive en _runMotorAndApply.
      _runMotorAndApply([change]);
    };
  }
  const ignoreBtn = document.getElementById('ed-ignore-ot');
  if (ignoreBtn) {
    ignoreBtn.onclick = async () => {
      // Copia todos los valores actuales del proceso a ot_ack_*. La divergencia
      // dejara de aparecer hasta que OT modifique algo nuevamente.
      await applyOTAck(act.id, null);
      toast('Cambios de OT ignorados');
      bd.remove();
      render();
    };
  }
}

// Reads all editable fields from the modal, diffs against current state,
// applies the smallest operation possible:
//   - Only urgency changed → direct update, no cascade
//   - Any of operator/machine/time changed → placeActWithCheck to run cascade
async function saveEdit(actId) {
  const act = acts.find(a => a.id === actId); if (!act) return;
  const newOpId = parseInt(document.getElementById('ed-op').value);
  const newMqId = parseInt(document.getElementById('ed-mq').value);
  const newHora = document.getElementById('ed-h').value + ':00';
  const newUrg = document.getElementById('ed-u').value;
  // Operator-time editable for auto y semi-auto
  let newDopMin = act.duracion_operario_min;
  if (isAuto(act)) {
    const dopInput = document.getElementById('ed-dop');
    if (dopInput) {
      const v = dopInput.value.trim();
      newDopMin = v === '' ? null : parseInt(v);
      if (isNaN(newDopMin)) newDopMin = null;
    }
  }
  // Duración total (planificador) editable in both manual and automatica
  let newDurTotal = act.duracion_planificador_min;
  const durInput = document.getElementById('ed-dur');
  if (durInput) {
    const v = parseInt(durInput.value);
    if (!isNaN(v) && v >= 10) newDurTotal = v;
  }

  const opChanged = newOpId !== act.operario_id;
  const mqChanged = newMqId !== act.maquina_id;
  const timeChanged = newHora !== act.hora_inicio;
  const urgChanged = newUrg !== act.urgencia;
  const dopChanged = newDopMin !== act.duracion_operario_min;
  const durChanged = newDurTotal !== act.duracion_planificador_min;

  // Urgencia se aplica directo sin cascada (no afecta tiempos)
  if (urgChanged) {
    await sb.from('actividades_tablero').update({ urgencia: newUrg }).eq('id', actId);
    act.urgencia = newUrg;
  }

  // Si NO hubo cambios de tamano/posicion/op/maq, refrescamos y salimos.
  if (!opChanged && !mqChanged && !timeChanged && !dopChanged && !durChanged) {
    if (urgChanged) toast('Urgencia actualizada');
    else toast('Sin cambios');
    render();
    return;
  }

  // MOTOR: construir cambio compuesto y llamar al wrapper.
  const change = {
    id: actId,
    operario_id: opChanged ? newOpId : act.operario_id,
    maquina_id: mqChanged ? newMqId : act.maquina_id,
    fecha: act.fecha,
    hora_inicio: timeChanged ? newHora : act.hora_inicio
  };
  if (durChanged) change.duracion_planificador_min = newDurTotal;
  if (dopChanged) change.duracion_operario_min = newDopMin;
  _runMotorAndApply([change]);
}

async function removeAct(actId) {
  const act = acts.find(a => a.id === actId); if (!act) return;
  // Si el proceso fue eliminado desde Proyectos, hacer DELETE real (no dejar
  // la fila como sin_planificar, porque el proceso ya no existe en Proyectos
  // y no tiene sentido mantener registro huerfano que reaparece en el "+").
  if (act.proceso_eliminado) {
    await sb.from('actividades_tablero').delete().eq('id', actId);
    const idx = acts.findIndex(a => a.id === actId);
    if (idx >= 0) acts.splice(idx, 1);
    toast('Eliminado: ' + act.descripcion);
    render();
    return;
  }
  const prev = { maquina_id: act.maquina_id, fecha: act.fecha, hora_inicio: act.hora_inicio, estado: act.estado, operario_id: act.operario_id, estado_proceso: act.estado_proceso };
  await sb.from('actividades_tablero').update({ fecha: '1900-01-01', estado: 'sin_planificar', maquina_id: null, estado_proceso: 'Planificación Pendiente' }).eq('id', actId);
  act.fecha = '1900-01-01'; act.estado = 'sin_planificar'; act.maquina_id = null; act.estado_proceso = 'Planificación Pendiente';
  uStack.push([{ id: actId, prev }]); updU();
  toast('Quitado: ' + act.descripcion); render();
}

// ========== ASSIGN SELECTOR (operator board specific) ==========
// First step: list of sin_planificar activities where this operator is ideal or suplente.
// Second step: after picking an activity, user chooses a machine (ideal + suplentes).
// Third step: if chosen machine is free, assign. Otherwise show informative card.

let opSelectorState = {
  opId: null, opName: null, fecha: null,
  filterMachines: [],       // array of machine ids (empty = all)
  filterUrgency: 'all',     // 'all' | 'urgente' | 'alta' | 'media' | 'baja'
  sortBy: 'urgencia',       // 'urgencia' | 'maquina'
  ddOpen: null,             // which dropdown is open: 'maq' | null
  // v70 Fase 10: filtros adicionales (texto libre, búsqueda parcial).
  filterCliente: '',        // matchea cliente_id name + cliente_final
  filterDesc: '',           // matchea descripcion del proyecto o de los items
  filterProceso: '',        // matchea proceso (Torneado, Fresado, etc.)
  filterPedido: ''          // matchea pedido_nro
};

// v70 Fase 10: helper para inputs de texto del selector. Actualiza el state,
// re-renderiza, y restaura el foco al input correspondiente al final.
function _opSelInput(key, value) {
  opSelectorState[key] = value;
  // Mapeo key → id del input para restaurar el foco.
  const inputIds = {
    filterCliente: 'opsel-f-cliente',
    filterDesc:    'opsel-f-desc',
    filterProceso: 'opsel-f-proc',
    filterPedido:  'opsel-f-pedido'
  };
  renderOpSelector();
  const id = inputIds[key];
  if (id) {
    const el = document.getElementById(id);
    if (el) {
      el.focus();
      try { el.setSelectionRange(value.length, value.length); } catch (e) {}
    }
  }
}

// ========== PULMONES ==========
function createPulmonInFreeSlot(opId, fecha) {
  // Close the opSelector modal first
  const sel = document.getElementById('op-selector-modal');
  if (sel) sel.remove();
  // Find earliest free slot of this op on this date.
  const dayActs = acts.filter(a => a.operario_id === opId && a.fecha === fecha && a.estado !== 'sin_planificar')
    .map(a => ({ s: tM(a.hora_inicio), e: tM(a.hora_inicio) + D(a) }))
    .sort((x, y) => x.s - y.s);
  // Default start: 06:00 (360 min). If first slot occupied, try after it.
  let startMin = 360;
  for (const dy of dayActs) {
    if (startMin + 60 <= dy.s) break;  // there's a gap before this one
    startMin = Math.max(startMin, dy.e);
  }
  const opName = opN(opId);
  showPulmonModal(null, opId, opName, fecha, startMin);
}

function showCreatePulmonModal(opId, opName, fecha) {
  showPulmonModal(null, opId, opName, fecha);
}

function showPulmonEditModal(actId) {
  const a = acts.find(x => x.id === actId);
  if (!a || !a.es_pulmon) return;
  showPulmonModal(actId);
}

function showPulmonModal(actId, opId, opName, fecha, startMin) {
  // If editing, load values from the existing pulmon.
  let a = null;
  if (actId) {
    a = acts.find(x => x.id === actId);
    if (!a) return;
    opId = a.operario_id;
    opName = opN(opId);
    fecha = a.fecha;
  }
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'pulmon-modal';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '480px';
  let h = '<div class="md-t">' + (actId ? 'Editar pulmon' : 'Nuevo pulmon') + '</div>';
  h += '<div style="font-size:12px;color:#5F5E5A;margin-bottom:10px">Operario: <b>' + escapeHtml(opName) + '</b> &nbsp; Fecha: <b>' + fecha + '</b></div>';
  // Machine selector with all available machines
  h += '<div class="ef"><div class="ef-l">Maquina <span style="color:#A32D2D">*</span></div>';
  h += '<select class="ef-i" id="pul-maq">';
  h += '<option value="">— elegir —</option>';
  maq.forEach(mm => {
    h += '<option value="' + mm.id + '"' + (a && a.maquina_id === mm.id ? ' selected' : '') + '>' + escapeHtml(mm.nombre) + '</option>';
  });
  h += '</select></div>';
  h += '<div class="row" style="display:flex;gap:10px">';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Hora de inicio <span style="color:#A32D2D">*</span></div>';
  // Default hora inicio: from existing pulmon, from startMin (when called from "+"), or 08:00.
  let horaInicio;
  if (a) horaInicio = a.hora_inicio.substring(0,5);
  else if (typeof startMin === 'number') horaInicio = mT(startMin);
  else horaInicio = '08:00';
  h += '<input type="time" class="ef-i" id="pul-hora" value="' + horaInicio + '" step="600"></div>';
  h += '<div class="ef" style="flex:1"><div class="ef-l">Duracion (minutos) <span style="color:#A32D2D">*</span></div>';
  const dur = a ? (a.duracion_planificador_min || a.duracion_estimada_min) : 60;
  h += '<input type="number" class="ef-i" id="pul-dur" value="' + dur + '" min="10" step="10"></div>';
  h += '</div>';
  h += '<div class="actions">';
  h += '<button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button>';
  if (actId) h += '<button class="b b-d" onclick="deletePulmon(' + actId + ')">Eliminar</button>';
  h += '<button class="b b-p" onclick="savePulmon(' + (actId || 'null') + ',' + opId + ',\'' + fecha + '\')">' + (actId ? 'Guardar' : 'Crear') + '</button>';
  h += '</div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd);
  if (typeof makeModalDraggable === 'function') makeModalDraggable(m);
}

async function savePulmon(actId, opId, fecha) {
  const machId = parseInt(document.getElementById('pul-maq').value);
  const hora = document.getElementById('pul-hora').value;
  const durMin = parseInt(document.getElementById('pul-dur').value);
  if (!machId) { toast('Elegi maquina', true); return; }
  if (!hora) { toast('Ingresa hora de inicio', true); return; }
  if (!durMin || durMin < 10) { toast('Duracion minima: 10 min', true); return; }
  const horaFull = hora + ':00';
  const payload = {
    es_pulmon: true,

    operario_id: opId,
    maquina_id: machId,
    fecha: fecha,
    hora_inicio: horaFull,
    duracion_estimada_min: durMin,
    duracion_planificador_min: durMin,
    duracion_margen_min: 0,
    duracion_operario_min: null,
    tipo: 'manual',
    estado: 'pendiente',
    estado_proceso: 'Planificado',
    descripcion: 'Pulmón',
    proceso: 'Pulmón',
    urgencia: 'media',
    operario_ideal_id: opId,
    maquina_ideal_id: machId
  };
  if (actId) {
    await sb.from('actividades_tablero').update(payload).eq('id', actId);
    const idx = acts.findIndex(x => x.id === actId);
    if (idx >= 0) Object.assign(acts[idx], payload);
    toast('Pulmon actualizado');
  } else {
    const { data: created, error } = await sb.from('actividades_tablero').insert(payload).select().single();
    if (error) { toast('Error: ' + error.message, true); return; }
    acts.push(created);
    toast('Pulmon creado');
  }
  document.getElementById('pulmon-modal').remove();
  render();
}

async function deletePulmon(actId) {
  if (!confirm('Eliminar este pulmon?')) return;
  await sb.from('actividades_tablero').delete().eq('id', actId);
  const idx = acts.findIndex(x => x.id === actId);
  if (idx >= 0) acts.splice(idx, 1);
  document.getElementById('pulmon-modal').remove();
  toast('Pulmon eliminado');
  render();
}

// Shows a dialog when a placement would start before a predecessor's end.
// Offers to move the activity to start right after the latest predecessor.
function showMoveAfterPredecessorModal(actId, machId, latestPred, adjStart, newOpId) {
  const act = acts.find(a => a.id === actId);
  if (!act) return;
  const fmtDate = d => { const [y, m, da] = d.split('-'); return da + '/' + m + '/' + y; };
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'move-after-pred';
  const m = document.createElement('div'); m.className = 'md'; m.style.maxWidth = '520px';
  let h = '<div class="md-t">Conflicto con predecesor</div>';
  h += '<div style="font-size:12px;color:#5F5E5A;margin-bottom:12px">No se puede colocar a esa hora porque el predecesor <b>' + escapeHtml(latestPred.predName) + '</b> termina mas tarde.</div>';
  h += '<div style="background:#FFF4D5;border:1px solid #F5C842;border-radius:5px;padding:10px;margin-bottom:14px;font-size:12px">';
  h += '<div><b>Predecesor termina:</b> ' + fmtDate(latestPred.date) + ' ' + mT(latestPred.time) + '</div>';
  h += '<div><b>Sugerencia de inicio:</b> ' + fmtDate(adjStart.date) + ' ' + mT(adjStart.time) + '</div>';
  h += '</div>';
  h += '<div style="font-size:12px;color:#5F5E5A;margin-bottom:14px">¿Que hacer?</div>';
  h += '<div style="display:flex;flex-direction:column;gap:8px">';
  // Option A: accept the suggestion
  h += '<button class="b b-p" style="text-align:left;padding:10px" onclick="acceptMoveAfterPred(' + actId + ',' + machId + ',\'' + adjStart.date + '\',' + adjStart.time + ',' + (newOpId === null || newOpId === undefined ? 'null' : newOpId) + ')"><b>Mover justo despues del predecesor</b><br><span style="font-size:11px;color:#5F5E5A;font-weight:400">Inicio: ' + fmtDate(adjStart.date) + ' ' + mT(adjStart.time) + '</span></button>';
  // Option B: pick a custom time on a date >= predecessor end date
  h += '<div style="border:1px solid #C8C6BE;border-radius:5px;padding:10px">';
  h += '<div style="font-size:12px;font-weight:600;margin-bottom:6px">Elegir fecha y hora manualmente</div>';
  h += '<div style="display:flex;gap:6px;align-items:center">';
  h += '<input type="date" id="mvp-fecha" value="' + adjStart.date + '" min="' + latestPred.date + '" style="padding:5px;border:1px solid #C8C6BE;border-radius:4px;font-size:12px">';
  h += '<input type="time" id="mvp-hora" value="' + mT(adjStart.time) + '" step="600" style="padding:5px;border:1px solid #C8C6BE;border-radius:4px;font-size:12px">';
  h += '<button class="b" id="mvp-use" style="padding:5px 10px">Usar esta hora</button>';
  h += '</div>';
  h += '<div id="mvp-err" style="display:none;color:#A32D2D;font-size:11px;margin-top:6px"></div>';
  h += '</div>';
  h += '<button class="b" onclick="this.closest(\'.mo\').remove()" style="padding:10px">Cancelar</button>';
  h += '</div>';
  m.innerHTML = h; bd.appendChild(m); document.body.appendChild(bd);
  if (typeof makeModalDraggable === 'function') makeModalDraggable(m);
  // Wire up the "Use this time" button
  document.getElementById('mvp-use').onclick = () => {
    const fechaSel = document.getElementById('mvp-fecha').value;
    const horaSel = document.getElementById('mvp-hora').value;
    const errEl = document.getElementById('mvp-err');
    errEl.style.display = 'none';
    if (!fechaSel || !horaSel) {
      errEl.textContent = 'Completa fecha y hora'; errEl.style.display = 'block'; return;
    }
    const userTime = tM(horaSel + ':00');
    // Verify it's after predecessor end
    const predEndDate = latestPred.date;
    const predEndTime = latestPred.time;
    if (fechaSel < predEndDate || (fechaSel === predEndDate && userTime < predEndTime)) {
      errEl.textContent = 'La hora elegida es anterior al fin del predecesor (' + fmtDate(predEndDate) + ' ' + mT(predEndTime) + ')';
      errEl.style.display = 'block';
      return;
    }
    bd.remove();
    placeActWithCheck(actId, machId, fechaSel, userTime, newOpId);
  };
}

function acceptMoveAfterPred(actId, machId, fecha, startTime, newOpId) {
  const modal = document.getElementById('move-after-pred');
  if (modal) modal.remove();
  // Re-invoke placement with the new start time
  placeActWithCheck(actId, machId, fecha, startTime, newOpId);
}

function showPulmonDecisionModal(actId, machId, fecha, startTime, newOpId, pulmones) {

  h += '<button class="b" style="text-align:left;padding:10px" onclick="resolvePulmonDecision(\'cascadear\',' + actId + ',' + machId + ',\'' + fecha + '\',' + startTime + ',' + (newOpId === null || newOpId === undefined ? 'null' : newOpId) + ',[' + pulmones.map(p => p.id).join(',') + '])"><b>↪ Cascadear (mover) los pulmones</b><br><span style="font-size:11px;color:#5F5E5A">Los pulmones se mueven hacia adelante junto con todo lo demas. Va a verificar conflictos.</span></button>';
  h += '<button class="b" onclick="this.closest(\'.mo\').remove()" style="padding:10px">Cancelar</button>';
  h += '</div>';

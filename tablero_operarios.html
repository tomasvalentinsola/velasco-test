         '<td style="padding:5px 8px;border-bottom:1px solid #F5F3EC">' + escapeHtml(opN(p.operario_id) || '—') + '</td>' +
         '<td style="padding:5px 8px;border-bottom:1px solid #F5F3EC;color:#888780">' + oldStr + '</td>' +
         '<td style="padding:5px 8px;border-bottom:1px solid #F5F3EC;color:#A32D2D;font-weight:600">SE ELIMINA</td></tr>';
  });
  h += '</tbody></table></div>';
  h += '<div class="actions" style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end">';
  h += '<button class="b" id="motor-cancel">Cancelar</button>';
  h += '<button class="b b-p" id="motor-confirm">Aplicar cambios</button>';
  h += '</div>';
  m.innerHTML = h;
  bd.appendChild(m); document.body.appendChild(bd);

  // Toggle pisar/cascadear: re-simula con la nueva preferencia, manteniendo
  // los valores de hora/maquina que el usuario haya tocado.
  const cb = document.getElementById('aff-pisar');
  cb.onchange = () => {
    pulmonActionPref = cb.checked ? 'pisar' : 'cascadear';
    try { localStorage.setItem('velasco_pulmonAction', pulmonActionPref); } catch (e) {}
    _aff_recalc(originalChanges);
  };

  // Recalcular: lee hora y maquina del panel, actualiza el primer change y
  // re-corre el motor. El modal se reabre con los nuevos resultados.
  const recalcBtn = document.getElementById('aff-recalcular');
  if (recalcBtn) {
    recalcBtn.onclick = () => _aff_recalc(originalChanges);
  }

  document.getElementById('motor-cancel').onclick = () => bd.remove();
  document.getElementById('motor-confirm').onclick = async () => {
    bd.remove();
    await proceedWithPlacementMotor(placedActId, applyPlan, pulmonIdsToDelete);
  };
}

// Recalcula la simulacion con los valores actuales de los inputs hora/maquina
// y re-renderiza el modal "Actividades afectadas" con los nuevos resultados.
function _aff_recalc(originalChanges) {
  const horaEl = document.getElementById('aff-hora');
  const maqEl = document.getElementById('aff-maq');
  if (!originalChanges || !originalChanges[0]) return;
  const newChanges = originalChanges.map(c => ({ ...c }));
  if (horaEl && horaEl.value) {
    // Convertir HH:MM a HH:MM:00
    newChanges[0].hora_inicio = horaEl.value + ':00';
  }
  if (maqEl && maqEl.value) {
    newChanges[0].maquina_id = parseInt(maqEl.value);
  }
  // Cerrar modal actual y dejar que _runMotorAndApply abra uno nuevo
  const bd = document.getElementById('affected-modal');
  if (bd) bd.remove();
  _runMotorAndApply(newChanges);
}

// Helper called when we've confirmed (or auto-decided) to apply.
// pulmonIdsToDelete: ids of pulmones to delete from DB before placing.
async function proceedWithPlacement(actId, machId, fecha, startTime, newOpId, skipOpCheck, pulmonIdsToDelete) {
  // Delete pulmones to "pisar"
  for (const pid of (pulmonIdsToDelete || [])) {
    await sb.from('actividades_tablero').delete().eq('id', pid);
    const idx = acts.findIndex(x => x.id === pid);
    if (idx >= 0) acts.splice(idx, 1);
  }
  const act = acts.find(a => a.id === actId);
  if (!act) return;
  const effectiveOpId = (newOpId !== undefined && newOpId !== null) ? newOpId : act.operario_id;

  // STEP 4: operator conflicts (skipped when dragging within same operator)
  if (skipOpCheck) {
    placeAct(actId, machId, fecha, startTime, newOpId);
    return;
  }
  const conflicts = findOpConflicts(actId, effectiveOpId, machId, fecha, startTime, Dop(act));
  const level = classifyOpConflict(act, conflicts);
  if (level === 'ok') {
    placeAct(actId, machId, fecha, startTime, newOpId);
  } else {
    act._pendingFecha = fecha; act._pendingMachId = machId; act._pendingActId = actId; act._pendingNewOpId = newOpId;
    showOpAlert(level, act, conflicts, () => { suppressNextToast = true; placeAct(actId, machId, fecha, startTime, newOpId); }, effectiveOpId);
  }
}

  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'affected-modal';

  h += '<label style="display:flex;align-items:center;gap:8px;cursor:pointer">';
  h += '<input type="checkbox" id="aff-pisar"' + (pulmonActionPref === 'pisar' ? ' checked' : '') + ' onchange="toggleAffectedPulmonAction(' + actId + ',' + machId + ',\'' + fecha + '\',' + startTime + ',' + (newOpId === null || newOpId === undefined ? 'null' : newOpId) + ',' + (skipOpCheck ? 'true' : 'false') + ')">';
  h += '<span><b>Pisar (eliminar) pulmones afectados</b><br><span style="font-size:11px;color:#5F5E5A">Si esta desmarcado, los pulmones se desplazan junto con las demas actividades.</span></span>';
  h += '</label></div>';
  // List
  h += '<div style="max-height:340px;overflow-y:auto;border:1px solid #C8C6BE;border-radius:5px">';
  h += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
  h += '<thead><tr style="background:#F5F3EC"><th style="padding:6px 8px;text-align:left;border-bottom:1px solid #C8C6BE">Actividad</th><th style="padding:6px 8px;text-align:left;border-bottom:1px solid #C8C6BE">Cliente</th><th style="padding:6px 8px;text-align:left;border-bottom:1px solid #C8C6BE">Actual</th><th style="padding:6px 8px;text-align:left;border-bottom:1px solid #C8C6BE">Nuevo</th></tr></thead><tbody>';
  // Rows for affected (shifted) activities
  // v70: ordenar por fecha+hora "Actual" ascendente (más antiguas arriba).
  affectedItems.sort((a, b) => {
    const ka = (a.oldFecha || '') + ' ' + (a.oldHora || '');
    const kb = (b.oldFecha || '') + ' ' + (b.oldHora || '');
    return ka.localeCompare(kb);
  });
  affectedItems.forEach(it => {
    const oldStr = fmtDate(it.oldFecha) + ' ' + it.oldHora.substring(0,5);
    const newStr = fmtDate(it.newFecha) + ' ' + it.newHora.substring(0,5);
    const icon = it.es_pulmon ? '🫁 ' : '';
    h += '<tr><td style="padding:5px 8px;border-bottom:1px solid #F5F3EC">' + icon + escapeHtml(it.descripcion) + '</td>' +
         '<td style="padding:5px 8px;border-bottom:1px solid #F5F3EC">' + escapeHtml(it.cliente) + '</td>' +
         '<td style="padding:5px 8px;border-bottom:1px solid #F5F3EC;color:#888780">' + oldStr + '</td>' +

  pulmonIdsToDelete.forEach(pid => {

    const oldStr = fmtDate(p.fecha) + ' ' + p.hora_inicio.substring(0,5);
    h += '<tr><td style="padding:5px 8px;border-bottom:1px solid #F5F3EC">🫁 Pulmón</td>' +

         '<td style="padding:5px 8px;border-bottom:1px solid #F5F3EC;color:#888780">' + oldStr + '</td>' +
         '<td style="padding:5px 8px;border-bottom:1px solid #F5F3EC;color:#A32D2D;font-weight:600">SE ELIMINA</td></tr>';

async function resolvePulmonDecision(action, actId, machId, fecha, startTime, newOpId, pulmonIds) {
  const modal = document.getElementById('pulmon-decision');
  if (modal) modal.remove();
  const act = acts.find(a => a.id === actId);
  if (!act) return;
  if (action === 'pisar') {
    // Delete pulmones from DB and from acts[]
    for (const pid of pulmonIds) {
      await sb.from('actividades_tablero').delete().eq('id', pid);
      const idx = acts.findIndex(x => x.id === pid);
      if (idx >= 0) acts.splice(idx, 1);
    }
    toast(pulmonIds.length + ' pulmon(es) eliminados');
  }
  // Mark the act so the next placeActWithCheck doesn't re-prompt
  act._pulmonesAPisar = true;
  try {
    placeActWithCheck(actId, machId, fecha, startTime, newOpId);
  } finally {
    delete act._pulmonesAPisar;
  }
}

function showOpSelector(opId, opName, fecha) {
  opSelectorState = { opId, opName, fecha, filterMachines: [], filterUrgency: 'all', sortBy: 'urgencia', ddOpen: null };
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'op-selector-modal';
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove() });
  const m = document.createElement('div'); m.className = 'md'; m.style.minWidth = '540px'; m.style.maxWidth = '620px';
  m.id = 'op-selector-content';
  bd.appendChild(m); document.body.appendChild(bd);
  renderOpSelector();
}

function renderOpSelector() {
  const m = document.getElementById('op-selector-content'); if (!m) return;
  const S = opSelectorState;
  const { opId, opName, fecha } = S;

  // Pre-filter: sin_planificar activities where this operator is ideal or suplente,
  // AND the activity belongs to an item/proyecto in active states.
  const eligible = acts.filter(a => {
    if (!isActAvailableForPlanning(a)) return false;
    if (a.operario_ideal_id === opId) return true;
    const sup = a.operarios_suplentes_ids || [];
    return sup.map(x => parseInt(x)).includes(opId);
  });

  // Machines that appear in eligible activities (for the machine filter)
  const relevantMachIds = new Set();
  eligible.forEach(a => {
    if (a.maquina_ideal_id) relevantMachIds.add(a.maquina_ideal_id);
    (a.maquinas_suplentes_ids || []).forEach(id => relevantMachIds.add(parseInt(id)));
  });
  const MCH_NAMES = ['VF4','VF3-YT','Perfect-Jet','ST-30','TR-1','AR-3300','AR-1000','TC-Alfredo','Otra'];
  const relevantMachines = MCH_NAMES.filter(mn => { const id = mI(mn); return id && relevantMachIds.has(id); });

  let h = '<button class="md-x" onclick="this.closest(\'.mo\').remove()">&times;</button>';
  h += '<div class="md-t">Asignar a ' + opName + '</div>';
  h += '<div style="font-size:12px;color:#888780;margin-bottom:14px">Fecha: ' + fecha + '</div>';

  if (eligible.length === 0) {
    h += '<div style="padding:24px 0;text-align:center;color:#888780">No hay actividades disponibles para este operario</div>';
    h += '<div style="margin-top:14px"><button class="b" onclick="this.closest(\'.mo\').remove()">Cerrar</button></div>';
    m.innerHTML = h; return;
  }

  // CREATE PULMÓN card (top of selector)
  h += '<div onclick="createPulmonInFreeSlot(' + opId + ',\'' + fecha + '\')" style="cursor:pointer;border:1px solid #C8C6BE;border-radius:6px;padding:10px;margin-bottom:10px;display:flex;align-items:center;gap:10px;background:repeating-linear-gradient(45deg,#F5F3EC,#F5F3EC 6px,#E8E6DF 6px,#E8E6DF 12px)" onmouseenter="this.style.borderColor=\'#854F0B\'" onmouseleave="this.style.borderColor=\'#C8C6BE\'">';
  h += '<div style="font-size:14px;font-weight:700;color:#5F4811">Crear pulmón</div>';
  h += '<div style="font-size:11px;color:#5F5E5A;flex:1">En el espacio libre más temprano del día</div>';
  h += '</div>';

  // ROW 1: Machine filter + Urgency filter
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">';
  // Machine multi-select
  h += '<div style="flex:1;min-width:160px"><div style="font-size:10px;color:#888780;margin-bottom:3px">Maquina</div>';
  h += '<div class="ms-wrap">';
  let maqLabel = 'Todas';
  if (S.filterMachines.length) maqLabel = S.filterMachines.map(id => mN(id)).join(', ');
  h += '<div class="ms-btn" onclick="opSelectorState.ddOpen=opSelectorState.ddOpen===\'maq\'?null:\'maq\';renderOpSelector()">' + maqLabel + '</div>';
  if (S.ddOpen === 'maq') {
    h += '<div class="ms-dd">';
    h += '<label onclick="opSelectorState.filterMachines=[];opSelectorState.ddOpen=null;renderOpSelector()"><input type="checkbox" ' + (S.filterMachines.length === 0 ? 'checked' : '') + '>Todas</label>';
    h += '<div style="border-top:1px solid #E8E6DF;margin:2px 0"></div>';
    relevantMachines.forEach(mn => {
      const id = mI(mn); const chk = S.filterMachines.includes(id);
      h += '<label onclick="event.preventDefault();toggleOpSelMachFilter(' + id + ')"><input type="checkbox" ' + (chk ? 'checked' : '') + '>' + mn + '</label>';
    });
    h += '</div>';
  }
  h += '</div></div>';

  // Urgency — only show urgencies that exist among eligible activities
  const availableUrg = [...new Set(eligible.map(a => a.urgencia))];
  const urgAll = [['urgente', 'Urgente'], ['alta', 'Alta'], ['media', 'Media'], ['baja', 'Baja']].filter(([v]) => availableUrg.includes(v));
  h += '<div style="flex:1;min-width:110px"><div style="font-size:10px;color:#888780;margin-bottom:3px">Urgencia</div>';
  h += '<select onchange="opSelectorState.filterUrgency=this.value;renderOpSelector()" style="width:100%;padding:5px;border:1px solid #C8C6BE;border-radius:4px;font-size:12px">';
  h += '<option value="all"' + (S.filterUrgency === 'all' ? ' selected' : '') + '>Todas</option>';
  urgAll.forEach(([v, l]) => {
    h += '<option value="' + v + '"' + (S.filterUrgency === v ? ' selected' : '') + '>' + l + '</option>';
  });
  h += '</select></div>';
  h += '</div>';

  // ROW 2: Sort
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
  h += '<div style="flex:1;min-width:110px"><div style="font-size:10px;color:#888780;margin-bottom:3px">Ordenar por</div>';
  h += '<select onchange="opSelectorState.sortBy=this.value;renderOpSelector()" style="width:100%;padding:5px;border:1px solid #C8C6BE;border-radius:4px;font-size:12px">';
  h += '<option value="urgencia"' + (S.sortBy === 'urgencia' ? ' selected' : '') + '>Urgencia</option>';
  h += '<option value="maquina"' + (S.sortBy === 'maquina' ? ' selected' : '') + '>Maquina principal</option>';
  h += '</select></div>';
  h += '</div>';

  // Apply filters
  let list = eligible.slice();
  if (S.filterMachines.length) {
    list = list.filter(a => {
      const aMachIds = [a.maquina_ideal_id, ...(a.maquinas_suplentes_ids || []).map(x => parseInt(x))];
      return S.filterMachines.some(fid => aMachIds.includes(fid));
    });
  }
  if (S.filterUrgency !== 'all') list = list.filter(a => a.urgencia === S.filterUrgency);

  const urgOrder = { urgente: 0, alta: 1, media: 2, baja: 3 };
  list.sort((a, b) => {
    if (S.sortBy === 'urgencia') {
      // Bug fix: urgOrder['urgente'] === 0, and 0 || 3 is 3 in JS (falsy).
      // Use explicit `in` check / nullish coalescing to preserve 0.
      const aOrd = a.urgencia in urgOrder ? urgOrder[a.urgencia] : 3;
      const bOrd = b.urgencia in urgOrder ? urgOrder[b.urgencia] : 3;
      return aOrd - bOrd;
    }
    if (S.sortBy === 'maquina') return mN(a.maquina_ideal_id).localeCompare(mN(b.maquina_ideal_id));
    return 0;
  });

  h += '<div style="font-size:11px;color:#888780;margin-bottom:6px">' + list.length + ' actividad(es) disponible(s)</div>';

  if (!list.length) {
    h += '<div style="padding:24px 0;text-align:center;color:#888780">Sin actividades que coincidan con los filtros</div>';
  } else {
    list.forEach(a => { h += opSelectorItem(a, opId, fecha); });
  }

  h += '<div style="margin-top:14px"><button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button></div>';
  m.innerHTML = h;
}

function toggleOpSelMachFilter(id) {
  const S = opSelectorState;
  const idx = S.filterMachines.indexOf(id);
  if (idx >= 0) S.filterMachines.splice(idx, 1); else S.filterMachines.push(id);
  renderOpSelector();
}

function opSelectorItem(a, opId, fecha) {
  const dt = Math.floor(a.duracion_estimada_min / 60) + 'h' + (a.duracion_estimada_min % 60 ? ' ' + a.duracion_estimada_min % 60 + 'm' : '');
  const foto = a.foto_url || a.foto_proyecto_url;
  const urgColor = a.urgencia === 'urgente' ? '#1A1A1A' : a.urgencia === 'alta' ? '#C62828' : a.urgencia === 'media' ? '#854F0B' : '#1B6B1B';
  // Check if predecessors are ready (Planificado or Cerrado).
  // If not, the activity is shown but disabled with grey overlay.
  const predsReady = hasPredecessorsReady(a.id);
  // Find unmet predecessor labels for tooltip
  let pendingPreds = [];
  if (!predsReady) {
    const myPreds = corrs.filter(c => c.sucesor_id === a.id).map(c => c.predecesor_id);
    myPreds.forEach(pid => {
      const pa = acts.find(x => x.id === pid);
      if (pa && (pa.estado_proceso || 'Planificación Pendiente') === 'Planificación Pendiente') {
        const pi = items.find(x => x.id === pa.item_id);
        pendingPreds.push((pi ? pi.descripcion + ' / ' : '') + (pa.proceso || '?'));
      }
    });
  }
  let img;
  if (foto) {
    img = '<img src="' + foto + '" style="width:40px;height:40px;border-radius:4px;object-fit:cover;flex-shrink:0;background:#E8E6DF" onerror="this.style.visibility=\'hidden\'">';
  } else {
    img = '<div style="width:40px;height:40px;border-radius:4px;background:#E8E6DF;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:#888780">sin foto</div>';
  }
  const isIdealOp = a.operario_ideal_id === opId;
  const opMark = isIdealOp ? '<span style="color:#0C447C;font-weight:600">Operario ideal</span>' : '<span style="color:#5F5E5A">Operario suplente</span>';
  let machInfo = '<b>MP:</b> ' + mN(a.maquina_ideal_id);
  if (a.maquinas_suplentes_ids && a.maquinas_suplentes_ids.length) {
    machInfo += ' | <b>MS:</b> ' + a.maquinas_suplentes_ids.map(id => mN(parseInt(id))).join(', ');
  }
  // If predecessors not ready: render greyed-out, no click handler
  const containerStyle = predsReady ? '' : 'opacity:.45;pointer-events:none;background:#F5F3EC';
  const onclickAttr = predsReady ? 'onclick="chooseMachineForAssign(' + a.id + ',' + opId + ',\'' + fecha + '\')"' : '';
  const tooltip = predsReady ? '' : ' title="Bloqueado: predecesores aun no planificados/cerrados"';
  let h = '<div class="ao" ' + onclickAttr + tooltip + ' style="display:flex;align-items:center;gap:10px;' + containerStyle + '">';
  h += img;
  h += '<div style="flex:1;min-width:0">';
  let typeBadge;
  if (a.tipo === 'automatica') {
    typeBadge = '<span style="display:inline-block;background:#1A1A1A;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle">AUTO</span>';
  } else if (a.tipo === 'semi_automatica') {
    typeBadge = '<span style="display:inline-block;background:#5C4A8A;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle">SEMI</span>';
  } else {
    typeBadge = '<span style="display:inline-block;background:#E8E6DF;color:#5F5E5A;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle">MAN</span>';
  }
  // Predecessor block badge
  const blockedBadge = predsReady ? '' : '<span style="display:inline-block;background:#FEDADA;color:#A32D2D;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle">⚠ BLOQUEADA</span>';
  h += '<div class="ao-t">' + a.descripcion + typeBadge + blockedBadge + ' <span style="font-weight:400;color:#5F5E5A">— ' + a.proceso + '</span></div>';
  h += '<div class="ao-s">' + clN(a.cliente_id) + ' | Ped. <b>' + (a.pedido_nro || '-') + '</b> | <span style="color:' + urgColor + ';font-weight:600">' + a.urgencia + '</span> | ' + dt + '</div>';
  h += '<div class="ao-s" style="font-size:10px">' + opMark + ' | ' + machInfo + '</div>';
  if (!predsReady && pendingPreds.length) {
    h += '<div class="ao-s" style="font-size:10px;color:#A32D2D"><b>Esperando:</b> ' + pendingPreds.slice(0, 3).map(s => s.replace(/[<>&]/g, '')).join(', ') + (pendingPreds.length > 3 ? ' (+' + (pendingPreds.length - 3) + ' más)' : '') + '</div>';
  }
  h += '</div></div>';
  return h;
}

// Second step: after user picks activity, show machine selector
function chooseMachineForAssign(actId, opId, fecha) {
  const act = acts.find(a => a.id === actId);
  if (!act) return;
  // Close the first selector
  const first = document.getElementById('op-selector-modal');
  if (first) first.remove();
  // Build machine options: ideal + suplentes
  const mqOptions = [];
  if (act.maquina_ideal_id) mqOptions.push({ id: act.maquina_ideal_id, isIdeal: true });
  (act.maquinas_suplentes_ids || []).map(x => parseInt(x)).forEach(sid => {
    if (!mqOptions.find(o => o.id === sid)) mqOptions.push({ id: sid, isIdeal: false });
  });

  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'mach-chooser-modal';
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove() });
  const m = document.createElement('div'); m.className = 'md';
  let h = '<button class="md-x" onclick="this.closest(\'.mo\').remove()">&times;</button>';
  h += '<div class="md-t">Elegir maquina</div>';
  h += '<div style="font-size:12px;color:#5F5E5A;margin-bottom:14px"><b>' + act.descripcion + '</b> — Ped. ' + (act.pedido_nro || '-') + ' — ' + opN(opId) + ' — ' + fecha + '</div>';
  mqOptions.forEach(o => {
    const labelBase = mN(o.id);
    const idealBadge = o.isIdeal ? ' <span style="color:#0C447C;font-weight:600;font-size:11px">(ideal)</span>' : '';
    h += '<div class="ao" onclick="tryAssignToMachine(' + actId + ',' + opId + ',' + o.id + ',\'' + fecha + '\')" style="display:flex;align-items:center;gap:10px">';
    h += '<div style="width:30px;height:30px;border:3px solid ' + (MACH_COLORS[labelBase] || '#888') + ';border-radius:4px;flex-shrink:0;background:#fff"></div>';
    h += '<div style="flex:1;font-size:13px;font-weight:600">' + labelBase + idealBadge + '</div>';
    h += '<div style="font-size:18px;color:#888">→</div>';
    h += '</div>';
  });
  h += '<div id="mach-err" style="display:none;color:#A32D2D;font-size:12px;font-weight:600;margin-top:12px;padding:10px;background:#FEF0F0;border-radius:6px;border:1px solid #E24B4A"></div>';
  h += '<div style="margin-top:14px;display:flex;gap:8px">' +
       '<button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button>' +
       '<button class="b" onclick="showOpSelector(' + opId + ',\'' + opN(opId) + '\',\'' + fecha + '\');this.closest(\'.mo\').remove()">Volver</button>' +
       '</div>';
  m.innerHTML = h;
  bd.appendChild(m); document.body.appendChild(bd);
}

// Third step: try to assign on the chosen machine, given:
//   - Machine must be free that day at the natural insertion point
//   - If busy, show inline error and stay on modal
// When an automatica can't be placed at the end of the operator's day,
// offer insertion options: start-of-day, or "after activity X" for each
// existing activity that does NOT cross to the next day.
function showAutoInsertOptions(actId, opId, machId, fecha) {
  const act = acts.find(a => a.id === actId);
  if (!act) return;
  const bd = document.createElement('div'); bd.className = 'mo'; bd.id = 'auto-insert-modal';
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove() });
  const m = document.createElement('div'); m.className = 'md';

  // Gather the operator's activities on this day whose MANUAL portion ends
  // on this same day (i.e. they don't cross to the next day through setup).
  const dayActs = [];
  acts.forEach(a => {
    if (a.id === actId) return;
    if (a.operario_id !== opId) return;
    if (a.estado === 'sin_planificar') return;
    // Walk a's Dop slices; keep only if there's a slice that starts AND ends on fecha
    let rem = Dop(a), cd = a.fecha, ct = tM(a.hora_inicio), safe = 0;
    let dayEnd = null, started = false;
    while (rem > 0 && safe < 20) {
      safe++;
      const ds = sS(a.operario_id), de = sE(a.operario_id, cd);
      if (ct < ds) ct = ds;
      const av = de - ct;
      if (av <= 0) { cd = nwd(cd); ct = sS(a.operario_id); continue; }
      const used = Math.min(rem, av);
      if (cd === fecha) {
        // Has a slice on this day; track its end
        if (!started) started = true;
        dayEnd = ct + used;
      }
      rem -= used;
      if (rem > 0) {
        if (cd === fecha && started) {
          // Crosses to next day → skip (not eligible)
          dayEnd = null; break;
        }
        cd = nwd(cd); ct = sS(a.operario_id);
      } else { ct += used; }
    }
    if (dayEnd !== null) dayActs.push({ act: a, endMin: dayEnd });
  });
  dayActs.sort((a, b) => a.endMin - b.endMin);

  let h = '<button class="md-x" onclick="this.closest(\'.mo\').remove()">&times;</button>';
  h += '<div class="md-t">Donde insertar <b>' + act.descripcion + '</b>?</div>';
  h += '<div style="font-size:12px;color:#5F5E5A;margin-bottom:14px">Ped. ' + (act.pedido_nro || '-') + ' — ' + opN(opId) + ' — ' + mN(machId) + ' — ' + fDn(fecha) + '</div>';
  h += '<div style="font-size:11px;color:#5F5E5A;margin-bottom:10px">' + opN(opId) + ' tiene el dia completo. Elegi donde colocar esta actividad automatica (su tiempo manual es ' + Dop(act) + ' min):</div>';

  // Option 1: start of day
  const dayStart = sS(opId);
  h += '<div class="ao" onclick="assignAutoAt(' + actId + ',' + opId + ',' + machId + ',\'' + fecha + '\',' + dayStart + ')">';
  h += '<div class="ao-t">Al inicio de la jornada</div>';
  h += '<div class="ao-s">Arranca a las ' + mT(dayStart) + '</div>';
  h += '</div>';

  // Options 2+: after each day-activity
  dayActs.forEach(({ act: a, endMin }) => {
    const afterMin = endMin + GAP;
    h += '<div class="ao" onclick="assignAutoAt(' + actId + ',' + opId + ',' + machId + ',\'' + fecha + '\',' + afterMin + ')">';
    h += '<div class="ao-t">Despues de <b>' + a.descripcion + '</b> — Ped. ' + (a.pedido_nro || '-') + '</div>';
    h += '<div class="ao-s">Arranca a las ' + mT(afterMin) + '</div>';
    h += '</div>';
  });

  if (dayActs.length === 0) {
    h += '<div style="font-size:11px;color:#888780;padding:10px 0">(No hay actividades que terminen ese dia — todas cruzan al siguiente)</div>';
  }

  h += '<div style="margin-top:14px;display:flex;gap:8px">' +
       '<button class="b" onclick="this.closest(\'.mo\').remove()">Cancelar</button>' +
       '</div>';
  m.innerHTML = h;
  bd.appendChild(m); document.body.appendChild(bd);
}

// User picked an option in showAutoInsertOptions. Call placeActWithCheck which
// handles any machine/operator conflicts via the standard red alert flow.
function assignAutoAt(actId, opId, machId, fecha, startMin) {
  const modal = document.getElementById('auto-insert-modal');
  if (modal) modal.remove();
  const act = acts.find(a => a.id === actId);
  if (!act) return;
  placeActWithCheck(actId, machId, fecha, startMin, opId);
}


function tryAssignToMachine(actId, opId, machId, fecha) {
  const act = acts.find(a => a.id === actId);
  if (!act) return;
  const errEl = document.getElementById('mach-err');
  const hideErr = () => { if (errEl) errEl.style.display = 'none'; };
  hideErr();

  // Determine insertion time: first free moment in the day considering BOTH
  // the operator's existing activities AND the machine's existing activities.
  // Operator uses Dop (only setup blocks operator for automaticas).
  const machBlocks = dayBlocks(machId, fecha, actId);
  const dayStart = sS(opId);
  const dayEnd = sE(opId, fecha);
  const machineLatest = machBlocks.length === 0 ? dayStart : Math.max(...machBlocks.map(b => b.e)) + GAP;

  // Find end of each activity's operator-attached portion on this day.
  // For manuals this is the whole activity; for automaticas just the setup.
  const opEndsOnDay = [];
  acts.forEach(a => {
    if (a.id === actId) return;
    if (a.operario_id !== opId) return;
    if (a.estado === 'sin_planificar') return;
    let rem = Dop(a), cd = a.fecha, ct = tM(a.hora_inicio), safe = 0;
    while (rem > 0 && safe < 20) {
      safe++;
      const ds = sS(a.operario_id), de = sE(a.operario_id, cd);
      if (ct < ds) ct = ds;
      const av = de - ct;
      if (av <= 0) { cd = nwd(cd); ct = sS(a.operario_id); continue; }
      const used = Math.min(rem, av);
      if (cd === fecha) opEndsOnDay.push(ct + used);
      if (cd > fecha) break;
      rem -= used;
      if (rem > 0) { cd = nwd(cd); ct = sS(a.operario_id); } else { ct += used; }
    }
  });
  const operatorLatest = opEndsOnDay.length === 0 ? dayStart : Math.max(...opEndsOnDay) + GAP;
  const startTime = Math.max(machineLatest, operatorLatest);

  if (startTime >= dayEnd) {
    // Activity doesn't fit at the end of the day.
    // For auto y semi: offer options to insert BEFORE existing activities
    // (since the setup might fit in earlier gaps).
    if (isAuto(act)) {
      const chooser = document.getElementById('mach-chooser-modal');
      if (chooser) chooser.remove();
      showAutoInsertOptions(actId, opId, machId, fecha);
      return;
    }
    // Manual: show error
    let msg = 'No hay espacio el ' + fDn(fecha) + '.';
    const lastMach = machBlocks[machBlocks.length - 1];
    if (lastMach && machineLatest >= dayEnd) msg += ' Maquina ' + mN(machId) + ' ocupada hasta ' + mT(lastMach.e) + '.';
    if (opEndsOnDay.length && operatorLatest >= dayEnd) msg += ' ' + opN(opId) + ' ocupado hasta ' + mT(Math.max(...opEndsOnDay)) + '.';
    if (errEl) { errEl.innerHTML = msg; errEl.style.display = 'block'; }
    return;
  }

  // Close the modal and proceed
  const chooser = document.getElementById('mach-chooser-modal');
  if (chooser) chooser.remove();

  // placeActWithCheck: sets operator, machine, date, time; runs cascade + conflict dialogs
  placeActWithCheck(actId, machId, fecha, startTime, opId);
}

// ========== LEGEND ==========
function renderLg() {
  const lg = document.getElementById('lg');
  let h = '<span style="font-weight:600">Urgencia:</span>';
  h += '<div class="li"><div class="ls" style="background:#1A1A1A"></div>Urgente</div>';
  h += '<div class="li"><div class="ls" style="background:#FF9B9B"></div>Alta</div>';

}

// ========== MODAL BEHAVIORS: draggable + minimizable + resizable ==========
// Enhance any .md modal that gets added to the DOM: drag by title, minimize
// button, and CSS-native resize (via resize:both in the stylesheet).
function makeModalInteractive(md) {
  if (md._interactive) return; // idempotent
  md._interactive = true;
  const title = md.querySelector('.md-t');
  if (!title) return;

  // Drag by title
  let dragging = false, offsetX = 0, offsetY = 0;
  title.addEventListener('mousedown', e => {
    // Don't drag if click is on close button
    if (e.target.closest('.md-x')) return;
    const rect = md.getBoundingClientRect();
    // Switch to fixed positioning on first drag (decouples from flex centering)
    if (!md.classList.contains('dragging')) {
      md.classList.add('dragging');
      md.style.left = rect.left + 'px';
      md.style.top = rect.top + 'px';
      // Remove centering constraints
      const overlay = md.closest('.mo');
      if (overlay) overlay.style.display = 'block';
    }
    dragging = true;
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    let newX = e.clientX - offsetX;
    let newY = e.clientY - offsetY;
    // Keep within viewport
    const rect = md.getBoundingClientRect();
    newX = Math.max(0, Math.min(window.innerWidth - rect.width, newX));
    newY = Math.max(0, Math.min(window.innerHeight - rect.height, newY));
    md.style.left = newX + 'px';
    md.style.top = newY + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; document.body.style.userSelect = ''; }
  });
}

// Observe for new .md elements and enhance them
const modalObserver = new MutationObserver(mutations => {
  mutations.forEach(m => {
    m.addedNodes.forEach(node => {
      if (node.nodeType !== 1) return;
      if (node.classList && node.classList.contains('md')) makeModalInteractive(node);
      const found = node.querySelectorAll ? node.querySelectorAll('.md') : [];
      found.forEach(md => makeModalInteractive(md));
    });
  });
});
modalObserver.observe(document.body, { childList: true, subtree: true });

// ========== INIT ==========
async function init() {
  const { data: mD } = await sb.from('maquinas').select('id,nombre'); maq = mD || [];
  const { data: oD } = await sb.from('operarios').select('*'); ops = oD || [];
  const { data: cD } = await sb.from('clientes').select('*'); cls = cD || [];
  const { data: aD } = await sb.from('actividades_tablero').select('*'); acts = aD || [];
  const { data: iD } = await sb.from('items').select('*'); items = iD || [];
  const { data: pD } = await sb.from('proyectos').select('*'); proys = pD || [];
  const { data: corrD } = await sb.from('correlatividades').select('*'); corrs = corrD || [];
  document.getElementById('hd-d').textContent = new Date().toLocaleDateString('es-AR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  renderLg(); render();
}
init();
